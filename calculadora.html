<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ELITE | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --green: #2ecc71; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        .mesa-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: var(--glass); padding: 12px; border-radius: 12px; border: 1px solid var(--gold); }
        select { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 5px; border-radius: 5px; font-weight: bold; outline: none; }

        .search-area { background: var(--glass); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; }
        input { background: transparent; border: none; color: white; width: 100%; text-align: center; font-size: 20px; outline: none; font-weight: bold; }

        .item-list { background: var(--glass); border-radius: 15px; padding: 15px; min-height: 120px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        
        .total-box { background: var(--glass); border-radius: 15px; padding: 20px; text-align: right; border: 2px solid var(--green); margin-bottom: 15px; }
        .total-valor { color: var(--green); font-size: 45px; font-weight: bold; line-height: 1; }

        .pagamento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-pg { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 5px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .btn-pg.active { background: var(--green); color: black; border-color: white; }
        .btn-pendura { background: #c0392b !important; }

        .btn-zap { background: #25d366; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-voltar { margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 13px; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-crown"></i> BOTECO 934 | ELITE</div>

    <div class="mesa-area">
        <i class="fas fa-chair" style="color:var(--gold)"></i> 
        <select id="mesaSel">
            <option value="BALCÃO">ATENDIMENTO BALCÃO</option>
            <option value="MESA 01">MESA 01</option>
            <option value="MESA 02">MESA 02</option>
            <option value="MESA 03">MESA 03</option>
            <option value="MESA 04">MESA 04</option>
            <option value="MESA 05">MESA 05</option>
            <option value="MESA 06">MESA 06</option>
        </select>
    </div>

    <div class="search-area">
        <input type="text" id="barcode" placeholder="BIPE O PRODUTO..." autofocus>
    </div>

    <div id="listaItens" class="item-list"></div>

    <div class="total-box">
        <div style="font-size:12px; color:#94a3b8; margin-bottom:5px;">VALOR TOTAL</div>
        <div id="displayTotal" class="total-valor">R$ 0,00</div>
    </div>

    <div class="pagamento-grid">
        <button class="btn-pg" onclick="setPagamento('DINHEIRO', this)">DINHEIRO</button>
        <button class="btn-pg" onclick="setPagamento('PIX', this)">PIX</button>
        <button class="btn-pg" onclick="setPagamento('DÉBITO', this)">DÉBITO</button>
        <button class="btn-pg" onclick="setPagamento('CRÉDITO', this)">CRÉDITO</button>
        <button class="btn-pg btn-pendura" onclick="setPagamento('PENDURA', this)">PENDURA</button>
    </div>

    <button class="btn-zap" onclick="finalizarVenda()">
        <i class="fab fa-whatsapp"></i> FINALIZAR E ENVIAR RECIBO
    </button>

    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> VOLTAR AO MENU</a>
</div>

<script>
    const estoqueBoteco = {
        "7891991010856": { nome: "SPATEN LATA 350ML", preco: 5.00 },
        "7896045506934": { nome: "AMSTEL LATA 350ML", preco: 5.00 },
        "001": { nome: "DOSE CANA ELITE", preco: 4.00 }
    };

    let totalVenda = 0;
    let formaPg = "DINHEIRO"; 
    let itensNomes = [];

    function setPagamento(tipo, btn) {
        formaPg = tipo;
        document.querySelectorAll('.btn-pg').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    document.getElementById('barcode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && this.value !== '') {
            const produto = estoqueBoteco[this.value];
            if (produto) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${produto.nome}</span> <b>R$ ${produto.preco.toFixed(2)}</b>`;
                document.getElementById('listaItens').appendChild(div);
                totalVenda += produto.preco;
                itensNomes.push(produto.nome);
                document.getElementById('displayTotal').innerText = `R$ ${totalVenda.toFixed(2).replace('.', ',')}`;
            } else {
                alert("NÃO CADASTRADO: " + this.value);
            }
            this.value = '';
        }
    });

    function finalizarVenda() {
        if (totalVenda === 0) return alert("ADICIONE ITENS!");
        const mesa = document.getElementById('mesaSel').value;
        const texto = `*BOTECO 934 - RECIBO*\n*LOCAL:* ${mesa}\n*ITENS:* ${itensNomes.join(", ")}\n*PAGAMENTO:* ${formaPg}\n*TOTAL:* R$ ${totalVenda.toFixed(2)}\n\nObrigado pela preferência! 🍻`;
        window.open(`https://wa.me/5581999999999?text=${encodeURIComponent(texto)}`);
        location.reload(); 
    }
</script>
</body>
</html>
