<script>
    // [!] SEU ESTOQUE (Nome, Preço de Venda, Preço de Custo)
    const estoqueBoteco = {
        "7891991010856": { nome: "SPATEN LATA 350ML", preco: 5.00, custo: 3.84 },
        "7896045506934": { nome: "AMSTEL LATA 350ML", preco: 5.00, custo: 3.50 },
        "001": { nome: "DOSE CANA ELITE", preco: 4.00, custo: 1.50 }
    };

    let totalVenda = 0;
    let lucroAcumulado = 0;

    const input = document.getElementById('barcode');
    const lista = document.getElementById('listaItens');
    const displayTotal = document.getElementById('displayTotal');

    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && this.value !== '') {
            processarBipe(this.value);
            this.value = '';
        }
    });

    function processarBipe(codigo) {
        const produto = estoqueBoteco[codigo];
        if (produto) {
            if (totalVenda === 0) lista.innerHTML = ''; 

            const lucroUnitario = produto.preco - produto.custo;
            
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <span>${produto.nome}</span> 
                <small style="color:#ffd700; font-size:10px; margin-left:10px;">(Lucro: R$ ${lucroUnitario.toFixed(2)})</small>
                <b>R$ ${produto.preco.toFixed(2)}</b>
            `;
            lista.appendChild(div);

            totalVenda += produto.preco;
            lucroAcumulado += lucroUnitario;
            
            displayTotal.innerText = `R$ ${totalVenda.toFixed(2).replace('.', ',')}`;
            
            // Console log para você ver o lucro sem o cliente ver
            console.log("Lucro acumulado nesta venda: R$ " + lucroAcumulado.toFixed(2));
        } else {
            alert("PRODUTO NÃO CADASTRADO: " + codigo);
        }
    }

    function finalizarVenda() {
        if (totalVenda === 0) return alert("BIPE ALGO PRIMEIRO!");
        const tel = "5581999999999"; 
        const msg = encodeURIComponent(`*BOTECO 934 - RECIBO*\n--------------------\nTotal: R$ ${totalVenda.toFixed(2)}\nObrigado! 🍻`);
        window.open(`https://wa.me/${tel}?text=${msg}`);
        
        // Reseta tudo para a próxima venda
        totalVenda = 0;
        lucroAcumulado = 0;
    }
</script>
