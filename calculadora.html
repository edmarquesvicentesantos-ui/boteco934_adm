<script>
    // =========================================================
    // 🟢 ZONA 1: SEU ESTOQUE (PRODUTOS)
    // Para adicionar mais, copie uma linha e troque o código e o preço.
    // =========================================================
    const estoqueBoteco = {
        "7891991010856": { nome: "SPATEN LATA 350ML", preco: 5.00 },
        "7896045506934": { nome: "AMSTEL LATA 350ML", preco: 5.00 },
        "001": { nome: "DOSE CANA ELITE", preco: 4.00 },
        "002": { nome: "DOSE PITÚ", preco: 3.50 }, 
        // [COLE NOVAS LINHAS DE PRODUTOS AQUI]
    };

    // =========================================================
    // 🟡 ZONA 2: SUAS MESAS
    // Vá no HTML lá em cima e procure a tag <select id="mesaSel">.
    // Para aumentar as mesas, basta copiar a linha <option>.
    // =========================================================
    /* Exemplo do que fazer no HTML:
       <option value="MESA 05">MESA 05</option>
       <option value="MESA 06">MESA 06</option> 
    */

    // =========================================================
    // 🔴 ZONA 3: SEU WHATSAPP
    // Coloque seu número real aqui (55 + DDD + Número)
    // =========================================================
    const meuZap = "5581999999999"; 


    // --- ABAIXO É O "MOTOR" DO SISTEMA (NÃO PRECISA MEXER) ---
    let totalVenda = 0;
    let formaPg = "DINHEIRO"; 
    let itensNomes = [];

    function setPagamento(tipo, btn) {
        formaPg = tipo;
        document.querySelectorAll('.btn-pg').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    document.getElementById('barcode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && this.value !== '') {
            const produto = estoqueBoteco[this.value];
            if (produto) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${produto.nome}</span> <b>R$ ${produto.preco.toFixed(2)}</b>`;
                document.getElementById('listaItens').appendChild(div);
                totalVenda += produto.preco;
                itensNomes.push(produto.nome);
                document.getElementById('displayTotal').innerText = `R$ ${totalVenda.toFixed(2).replace('.', ',')}`;
            } else { alert("NÃO CADASTRADO!"); }
            this.value = '';
        }
    });

    function finalizarVenda() {
        const cliente = document.getElementById('nomeCliente').value || "Cliente";
        const mesa = document.getElementById('mesaSel').value;
        if (totalVenda === 0) return alert("SEM ITENS!");

        const texto = `*BOTECO 934 - RECIBO*\n--------------------\n*CLIENTE:* ${cliente}\n*LOCAL:* ${mesa}\n--------------------\n*ITENS:* ${itensNomes.join(", ")}\n*TOTAL:* R$ ${totalVenda.toFixed(2)}\n*PAGAMENTO:* ${formaPg}\n--------------------\nObrigado! 🍻`;
        
        window.open(`https://wa.me/${meuZap}?text=${encodeURIComponent(texto)}`);
        location.reload(); 
    }
</script>
