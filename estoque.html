<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - ESTOQUE & XML</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #ff8c00; --text: #c9d1d9; --success: #238636; --danger: #da3633; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--accent); text-align: center; margin: -15px -15px 20px -15px; }
        .win { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; }
        
        h3 { color: var(--accent); font-size: 14px; margin-bottom: 15px; text-transform: uppercase; }
        
        /* Botão de Upload Customizado */
        .file-input { display: none; }
        .btn-xml { background: #58a6ff; color: white; display: block; text-align: center; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        
        .btn-save { background: var(--success); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 10px 5px; text-align: left; border-bottom: 1px solid #30363d; }
        .status-low { color: var(--danger); font-weight: bold; }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; border-top: 1px solid #30363d; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: #8b949e; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h1>BOTECO <span>934</span> - ESTOQUE</h1></div>

<div class="win">
    <h3>📥 Importar Nota Fiscal (XML)</h3>
    <p style="font-size: 11px; margin-bottom: 10px; color: #8b949e;">Selecione o arquivo .xml da Ambev, Heineken ou Boticário</p>
    <label for="xmlFile" class="btn-xml">SELECIONAR XML DA NOTA</label>
    <input type="file" id="xmlFile" class="file-input" accept=".xml">
    <div id="preview-xml"></div>
</div>

<div class="win">
    <h3>📦 Itens em Estoque</h3>
    <table>
        <thead>
            <tr><th>PRODUTO</th><th>QTD</th><th>CUSTO (UN)</th></tr>
        </thead>
        <tbody id="lista-estoque">
            </tbody>
    </table>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzIpbRx7JupMZlRgpoeyCBMfrrEqzQNVpxaTrXI8ASVhbmozNxz0vNIPWvo0BT1jc0/exec";

    // LEITOR DE XML NO CELULAR
    document.getElementById('xmlFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(reader.result, "text/xml");
            const produtos = xmlDoc.getElementsByTagName("det");
            
            let html = "<hr><h4 style='margin:10px 0'>Produtos Identificados:</h4>";
            
            for (let i = 0; i < produtos.length; i++) {
                let nome = produtos[i].getElementsByTagName("xProd")[0].textContent;
                let qtd = produtos[i].getElementsByTagName("qCom")[0].textContent;
                let valor = produtos[i].getElementsByTagName("vUnCom")[0].textContent;
                
                html += `<div style='font-size:12px; margin-bottom:5px;'>✅ ${nome} - <b>${qtd} un</b> (R$ ${valor})</div>`;
                
                // Enviar cada item para o Google Sheets automaticamente
                salvarNoGoogle(nome, qtd, valor);
            }
            
            document.getElementById('preview-xml').innerHTML = html + "<p style='color:var(--success); margin-top:10px;'>🚀 Dados enviados para o Google Sheets!</p>";
        };
        reader.readAsText(e.target.files[0]);
    });

    // FUNÇÃO QUE MANDA PARA A SUA PLANILHA
    function salvarNoGoogle(nome, qtd, valor) {
        const dados = {
            desc: nome,
            valor: parseFloat(valor) * parseFloat(qtd),
            cat: "ESTOQUE (XML)",
            tipo: "SAÍDA",
            estoque: qtd
        };

        fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(dados)
        });
    }
</script>

</body>
</html>
