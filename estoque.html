<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque Inteligente - Boteco 934</title>
    <style>
        :root {
            --bg: #050505; 
            --card: #111; 
            --orange: #ff9800; 
            --green: #00ff88; 
            --gray: #888;
            --border: #333;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Abas */
        .tabs { display: flex; gap: 5px; margin-bottom: 5px; }
        .tab { 
            flex: 1; padding: 15px; background: #222; border: none; color: var(--gray); 
            cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 4px 4px 0 0;
        }
        .tab.active { background: var(--orange); color: #000; }

        .panel { background: var(--card); padding: 25px; border: 1px solid var(--border); display: none; border-radius: 0 0 4px 4px; }
        .panel.active { display: block; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }

        label { display: block; color: var(--gray); font-size: 11px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); 
            color: #fff; font-size: 16px; box-sizing: border-box; border-radius: 4px;
        }
        input:focus { border-color: var(--orange); outline: none; }

        /* Dashboard de Resultados */
        .dashboard { 
            grid-column: span 2; margin-top: 20px; padding: 20px; 
            border: 1px solid #222; border-radius: 8px; background: #000;
        }
        .main-price { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .main-price small { color: var(--orange); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .main-price span { display: block; font-size: 48px; color: var(--green); font-weight: bold; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .stat-box { padding: 12px; background: #151515; border: 1px solid #222; border-radius: 4px; }
        .stat-box label { font-size: 9px; margin-bottom: 5px; color: var(--gray); }
        .stat-box div { font-size: 18px; font-weight: bold; color: #fff; }

        .btn-save { 
            width: 100%; padding: 20px; background: var(--green); color: #000; 
            border: none; font-weight: bold; margin-top: 20px; cursor: pointer; 
            font-size: 16px; text-transform: uppercase; border-radius: 4px;
        }
        .btn-save:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="mudarAba('mercadoria', this)">Fardos / Unidades</button>
        <button class="tab" onclick="mudarAba('destilado', this)">Destilados (Doses)</button>
    </div>

    <div id="mercadoria" class="panel active">
        <div class="grid">
            <div class="full"><label>Nome do Produto</label><input type="text" id="m_nome" placeholder="Ex: Heineken 600ml"></div>
            <div><label>Custo do Fardo/Caixa (R$)</label><input type="number" id="m_custo" oninput="calcM()" step="0.01"></div>
            <div><label>Quantidade no Fardo</label><input type="number" id="m_qtd" oninput="calcM()" value="12"></div>
            <div class="full"><label>Markup Desejado (%)</label><input type="number" id="m_markup" oninput="calcM()" value="60"></div>
        </div>

        <div class="dashboard">
            <div class="main-price">
                <small>Preço Sugerido por Unidade</small>
                <span id="m_venda">R$ 0,00</span>
            </div>
            <div class="stats">
                <div class="stat-box"><label>Margem Real</label><div id="m_margem">0%</div></div>
                <div class="stat-box"><label>Lucro Unitário</label><div id="m_lucro">R$ 0,00</div></div>
                <div class="stat-box"><label>Custo Unit.</label><div id="m_c_unit">R$ 0,00</div></div>
            </div>
        </div>
        <button class="btn-save" onclick="alert('Salvo no estoque!')">SALVAR MERCADORIA</button>
    </div>

    <div id="destilado" class="panel">
        <div class="grid">
            <div class="full"><label>Nome do Destilado</label><input type="text" id="d_nome" placeholder="Ex: Black Label 1L"></div>
            <div><label>Custo da Garrafa (R$)</label><input type="number" id="d_custo" oninput="calcD()" step="0.01"></div>
            <div><label>Margem de Perda (%)</label><input type="number" id="d_perda" oninput="calcD()" value="10"></div>
            <div><label>Tamanho da Garrafa (ML)</label><input type="number" id="d_ml_g" oninput="calcD()" value="1000"></div>
            <div><label>Tamanho da Dose (ML)</label><input type="number" id="d_ml_d" oninput="calcD()" value="50"></div>
            <div class="full"><label>Markup na Dose (%)</label><input type="number" id="d_markup" oninput="calcD()" value="100"></div>
        </div>

        <div class="dashboard">
            <div class="main-price">
                <small>Preço Sugerido por Dose</small>
                <span id="d_venda">R$ 0,00</span>
            </div>
            <div class="stats">
                <div class="stat-box"><label>Doses Reais</label><div id="d_total_d">0</div></div>
                <div class="stat-box"><label>Margem Real</label><div id="d_margem">0%</div></div>
                <div class="stat-box"><label>Lucro p/ Dose</label><div id="d_lucro">R$ 0,00</div></div>
            </div>
        </div>
        <button class="btn-save" onclick="alert('Salvo no estoque!')">SALVAR DESTILADO</button>
    </div>
</div>

<script>
    function mudarAba(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function calcM() {
        const custo = parseFloat(document.getElementById('m_custo').value) || 0;
        const qtd = parseInt(document.getElementById('m_qtd').value) || 1;
        const markup = parseFloat(document.getElementById('m_markup').value) || 0;

        const cUnit = custo / qtd;
        const vUnit = cUnit * (1 + (markup / 100));
        const lucro = vUnit - cUnit;
        const margem = vUnit > 0 ? (lucro / vUnit) * 100 : 0;

        document.getElementById('m_venda').innerText = `R$ ${vUnit.toFixed(2)}`;
        document.getElementById('m_margem').innerText = `${margem.toFixed(1)}%`;
        document.getElementById('m_lucro').innerText = `R$ ${lucro.toFixed(2)}`;
        document.getElementById('m_c_unit').innerText = `R$ ${cUnit.toFixed(2)}`;
    }

    function calcD() {
        const custoG = parseFloat(document.getElementById('d_custo').value) || 0;
        const perda = parseFloat(document.getElementById('d_perda').value) || 0;
        const mlG = parseFloat(document.getElementById('d_ml_g').value) || 1;
        const mlD = parseFloat(document.getElementById('d_ml_d').value) || 1;
        const markup = parseFloat(document.getElementById('d_markup').value) || 0;

        // Lógica: Calcula o volume útil real (Ex: 1000ml - 10% = 900ml úteis)
        const mlUtil = mlG * (1 - (perda / 100));
        const dosesReais = mlUtil / mlD; // Ex: 900 / 50 = 18 doses
        
        const custoDoseReal = custoG / dosesReais;
        const precoDose = custoDoseReal * (1 + (markup / 100));
        const lucroDose = precoDose - custoDoseReal;
        const margemDose = precoDose > 0 ? (lucroDose / precoDose) * 100 : 0;

        document.getElementById('d_venda').innerText = `R$ ${precoDose.toFixed(2)}`;
        document.getElementById('d_total_d').innerText = Math.floor(dosesReais);
        document.getElementById('d_margem').innerText = `${margemDose.toFixed(1)}%`;
        document.getElementById('d_lucro').innerText = `R$ ${lucroDose.toFixed(2)}`;
    }
</script>
</body>
</html>
