<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - ENGENHARIA DE LUCRO</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00ff41; --text: #c9d1d9; --danger: #ff4500; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--accent); text-align: center; margin: -15px -15px 20px -15px; }
        .win { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; }
        h3 { color: var(--accent); font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-xml { background: #238636; color: white; display: block; text-align: center; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; border: 1px solid #3fb950; }
        .file-input { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 12px 5px; text-align: left; border-bottom: 1px solid #30363d; }
        .sugestao { color: var(--accent); font-weight: bold; font-size: 13px; }
        .custo { color: #8b949e; text-decoration: line-through; font-size: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>BOTECO <span>934</span></h1></div>

<div class="win">
    <h3>📥 IMPORTAR NOTA FISCAL (XML)</h3>
    <label for="xmlFile" class="btn-xml">LER XML E CALCULAR LUCRO</label>
    <input type="file" id="xmlFile" class="file-input" accept=".xml">
</div>

<div id="painel-resultados"></div>

<div class="win">
    <h3>📦 ANALISE DE PREÇO DE VENDA</h3>
    <table>
        <thead>
            <tr>
                <th>ITEM</th>
                <th>CUSTO UN.</th>
                <th>SUGESTÃO (50%)</th>
                <th>SUGESTÃO (100%)</th>
            </tr>
        </thead>
        <tbody id="lista-estoque"></tbody>
    </table>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzIpbRx7JupMZlRgpoeyCBMfrrEqzQNVpxaTrXI8ASVhbmozNxz0vNIPWvo0BT1jc0/exec";

    document.getElementById('xmlFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        const lista = document.getElementById('lista-estoque');
        lista.innerHTML = ""; 

        reader.onload = function() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(reader.result, "text/xml");
            const produtos = xmlDoc.getElementsByTagName("det");
            
            for (let i = 0; i < produtos.length; i++) {
                let nome = produtos[i].getElementsByTagName("xProd")[0].textContent.substring(0, 20);
                let qtd = produtos[i].getElementsByTagName("qCom")[0].textContent;
                let vUn = parseFloat(produtos[i].getElementsByTagName("vUnCom")[0].textContent);
                
                // CÁLCULO DE MARGEM (Engenharia de Preço)
                let preco50 = (vUn * 1.5).toFixed(2);
                let preco100 = (vUn * 2.0).toFixed(2);
                
                let row = `<tr>
                    <td>${nome}</td>
                    <td>R$ ${vUn.toFixed(2)}</td>
                    <td class="sugestao">R$ ${preco50}</td>
                    <td class="sugestao" style="color:#ff8c00">R$ ${preco100}</td>
                </tr>`;
                lista.innerHTML += row;
                
                salvarNoGoogle(nome, qtd, vUn, (vUn * qtd).toFixed(2));
            }
            alert("✅ Nota Importada e Lucro Calculado!");
        };
        reader.readAsText(e.target.files[0]);
    });

    function salvarNoGoogle(nome, qtd, vUn, vTotal) {
        fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                desc: nome,
                valor: vTotal,
                cat: "ESTOQUE (XML)",
                tipo: "ENTRADA",
                estoque: `${qtd} un (Custo: R$ ${vUn})`
            })
        });
    }
</script>
</body>
</html>
