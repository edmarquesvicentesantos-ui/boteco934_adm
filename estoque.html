<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - ESTOQUE & XML</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #ff8c00; --text: #c9d1d9; --success: #238636; --danger: #da3633; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 80px; }
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--accent); text-align: center; margin: -15px -15px 20px -15px; }
        .win { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; }
        h3 { color: var(--accent); font-size: 14px; margin-bottom: 15px; text-transform: uppercase; }
        .file-input { display: none; }
        .btn-xml { background: #58a6ff; color: white; display: block; text-align: center; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th, td { padding: 10px 5px; text-align: left; border-bottom: 1px solid #30363d; }
        .val-destaque { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h1>BOTECO <span>934</span> - ESTOQUE</h1></div>

<div class="win">
    <h3>📥 Importar Nota Fiscal (XML)</h3>
    <label for="xmlFile" class="btn-xml">SELECIONAR XML DA NOTA</label>
    <input type="file" id="xmlFile" class="file-input" accept=".xml">
    <div id="preview-xml"></div>
</div>

<div class="win">
    <h3>📦 Itens Identificados na Nota</h3>
    <table>
        <thead>
            <tr>
                <th>PRODUTO</th>
                <th>QTD</th>
                <th>VALOR UN.</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody id="lista-estoque">
            </tbody>
    </table>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzIpbRx7JupMZlRgpoeyCBMfrrEqzQNVpxaTrXI8ASVhbmozNxz0vNIPWvo0BT1jc0/exec";

    document.getElementById('xmlFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        const lista = document.getElementById('lista-estoque');
        lista.innerHTML = ""; // Limpa a lista anterior

        reader.onload = function() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(reader.result, "text/xml");
            const produtos = xmlDoc.getElementsByTagName("det");
            
            for (let i = 0; i < produtos.length; i++) {
                let nome = produtos[i].getElementsByTagName("xProd")[0].textContent;
                let qtd = produtos[i].getElementsByTagName("qCom")[0].textContent;
                let valorUn = produtos[i].getElementsByTagName("vUnCom")[0].textContent;
                let valorTotalItem = (parseFloat(valorUn) * parseFloat(qtd)).toFixed(2);
                
                // Adiciona na tabela visual para conferência
                let row = `<tr>
                    <td>${nome}</td>
                    <td>${parseFloat(qtd)}</td>
                    <td class="val-destaque">R$ ${parseFloat(valorUn).toFixed(2)}</td>
                    <td>R$ ${valorTotalItem}</td>
                </tr>`;
                lista.innerHTML += row;
                
                // Envia para o Google Sheets com o valor unitário detalhado
                salvarNoGoogle(nome, qtd, valorUn, valorTotalItem);
            }
            alert("Nota processada e enviada para a planilha!");
        };
        reader.readAsText(e.target.files[0]);
    });

    function salvarNoGoogle(nome, qtd, vUn, vTotal) {
        const dados = {
            desc: nome,
            valor: vTotal,
            cat: "ESTOQUE (XML)",
            tipo: "ENTRADA", // Mudei para entrada pois é compra
            estoque: qtd + " un (R$ " + vUn + " cada)"
        };

        fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(dados)
        });
    }
</script>

</body>
</html>
