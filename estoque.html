<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --border: #1e293b; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 10px; font-size: 0.8rem; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 10px; }
        input { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 0.8rem; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; color: var(--bg); background: var(--accent); width: 100%; }
        .btn-xml { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 2px dashed #3b82f6; padding: 15px; text-align: center; cursor: pointer; border-radius: 8px; display: block; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #94a3b8; padding: 10px; border-bottom: 2px solid var(--border); font-size: 0.65rem; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .pos { color: var(--green); } .neg { color: var(--red); }
        #msg { padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; text-align: center; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="font-size:0.9rem; margin-bottom:15px; text-align:center">ENTRADA DE ESTOQUE</h2>
        
        <div id="msg"></div>

        <label for="xmlInput" class="btn-xml" id="labelXml">
            <i class="fas fa-file-code"></i> CLIQUE PARA IMPORTAR XML
        </label>
        <input type="file" id="xmlInput" accept=".xml" style="display: none;" onchange="lerXML(this)">
        
        <div class="form-row">
            <input type="text" id="pNome" placeholder="Nome do Produto">
            <input type="number" id="pQtd" placeholder="Qtd Cx" value="1" oninput="recalc()">
            <input type="number" id="pCustoCx" placeholder="Preço Custo" oninput="recalc()">
        </div>

        <div class="form-row">
            <input type="number" id="pVenda" placeholder="Preço Venda" oninput="recalc()">
            <input type="number" id="pImposto" value="10" oninput="recalc()">
            <button class="btn" onclick="salvarItem()">SALVAR PRODUTO</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr><th>Produto (A-Z)</th><th>Custo</th><th>Venda</th><th>Margem</th><th>Ação</th></tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showMsg(txt, cor) {
        const m = document.getElementById('msg');
        m.style.display = 'block';
        m.style.backgroundColor = cor === 'red' ? 'rgba(239,68,68,0.2)' : 'rgba(16,185,129,0.2)';
        m.style.color = cor === 'red' ? '#ef4444' : '#10b981';
        m.innerHTML = txt;
    }

    function lerXML(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(e.target.result, "text/xml");
            const n = xml.getElementsByTagName("xProd")[0]?.textContent || "";
            const v = xml.getElementsByTagName("vUnCom")[0]?.textContent || xml.getElementsByTagName("vProd")[0]?.textContent || 0;
            
            if(n) {
                document.getElementById('pNome').value = n.toUpperCase();
                document.getElementById('pCustoCx').value = parseFloat(v).toFixed(2);
                showMsg("✅ XML Lido: " + n, 'green');
                recalc();
            } else {
                showMsg("❌ Tags não encontradas no XML", 'red');
            }
        };
        reader.readAsText(file);
    }

    function recalc() {
        const custo = parseFloat(document.getElementById('pCustoCx').value) || 0;
        const qtd = parseFloat(document.getElementById('pQtd').value) || 1;
        const venda = parseFloat(document.getElementById('pVenda').value) || 0;
        const imp = parseFloat(document.getElementById('pImposto').value) || 0;
        
        const cUn = custo / qtd;
        const margem = venda > 0 ? ((venda - cUn - (venda*(imp/100))) / venda) * 100 : 0;
        return { cUn, margem };
    }

    function salvarItem() {
        const nome = document.getElementById('pNome').value.trim().toUpperCase();
        const precoVenda = parseFloat(document.getElementById('pVenda').value) || 0;
        const dados = recalc();

        if(!nome || precoVenda <= 0) {
            showMsg("❌ Preencha Nome e Preço de Venda!", 'red');
            return;
        }

        db.ref('produtos/' + nome).set({
            nome: nome,
            custo: dados.cUn,
            venda: precoVenda,
            margem: dados.margem
        }).then(() => {
            showMsg("✅ Salvo com Sucesso!", 'green');
            document.getElementById('pNome').value = "";
            document.getElementById('pCustoCx').value = "";
            document.getElementById('pVenda').value = "";
        }).catch(e => showMsg("❌ Erro no Banco: " + e.message, 'red'));
    }

    db.ref('produtos').on('value', snap => {
        const items = snap.val() ? Object.values(snap.val()) : [];
        items.sort((a,b) => a.nome.localeCompare(b.nome));
        document.getElementById('lista').innerHTML = items.map(p => `
            <tr>
                <td><b>${p.nome}</b></td>
                <td>R$ ${p.custo.toFixed(2)}</td>
                <td style="color:var(--accent)">R$ ${p.venda.toFixed(2)}</td>
                <td class="${p.margem > 15 ? 'pos' : 'neg'}">${p.margem.toFixed(1)}%</td>
                <td><i class="fas fa-trash" onclick="remover('${p.nome}')" style="color:var(--red); cursor:pointer"></i></td>
            </tr>
        `).join('');
    });

    function remover(n) { if(confirm("Apagar " + n + "?")) db.ref('produtos/'+n).remove(); }
</script>
</body>
</html>
