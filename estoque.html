<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --border: #1e293b; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 10px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 0.9rem; }
        .btn-acao { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .btn-xml { background: #3b82f6; color: #fff; padding: 10px; border-radius: 8px; display: block; text-align: center; cursor: pointer; margin-bottom: 15px; border: 1px dashed #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td, th { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.8rem; }
        .status-badge { padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; font-weight: 700; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="statusNotificacao" class="status-badge"></div>

        <label for="xmlArquivo" class="btn-xml">📁 CLIQUE AQUI PARA IMPORTAR XML</label>
        <input type="file" id="xmlArquivo" accept=".xml" style="display:none" onchange="processarXML(this)">

        <input type="text" id="nomeProd" placeholder="NOME DO PRODUTO (OU LEIA O XML)">
        <input type="number" id="custoProd" placeholder="PREÇO DE CUSTO (DA NOTA)">
        <input type="number" id="vendaProd" placeholder="PREÇO DE VENDA (SEU PREÇO)">
        
        <button class="btn-acao" onclick="forcarSalvar()">💾 SALVAR AGORA NO SISTEMA</button>
    </div>

    <div class="card">
        <table id="minhaTabela">
            <thead>
                <tr><th>PRODUTO</th><th>CUSTO</th><th>VENDA</th><th>AÇÃO</th></tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

<script>
    // Inicialização Blindada
    const config = { 
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", 
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", 
        projectId: "boteco934-afc3f" 
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const database = firebase.database();

    function avisar(texto, sucesso) {
        const div = document.getElementById('statusNotificacao');
        div.style.display = 'block';
        div.style.background = sucesso ? '#10b98133' : '#ef444433';
        div.style.color = sucesso ? '#10b981' : '#ef4444';
        div.innerHTML = texto;
    }

    function processarXML(input) {
        const arquivo = input.files[0];
        const leitor = new FileReader();
        leitor.onload = function(e) {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const nome = xml.getElementsByTagName("xProd")[0]?.textContent || "";
            const preco = xml.getElementsByTagName("vUnCom")[0]?.textContent || xml.getElementsByTagName("vProd")[0]?.textContent || "";
            
            if (nome) {
                document.getElementById('nomeProd').value = nome.toUpperCase();
                document.getElementById('custoProd').value = parseFloat(preco).toFixed(2);
                avisar("✅ XML Lido! Agora coloque o preço de venda e salve.", true);
            }
        };
        leitor.readAsText(arquivo);
    }

    function forcarSalvar() {
        const n = document.getElementById('nomeProd').value.trim().toUpperCase();
        const c = parseFloat(document.getElementById('custoProd').value) || 0;
        const v = parseFloat(document.getElementById('vendaProd').value) || 0;

        if (!n || v <= 0) {
            avisar("❌ Erro: Nome e Preço de Venda são obrigatórios!", false);
            return;
        }

        database.ref('produtos/' + n).set({
            nome: n,
            custo: c,
            venda: v,
            margem: v > 0 ? ((v - c) / v * 100).toFixed(1) : 0
        }).then(() => {
            avisar("✅ PRODUTO SALVO COM SUCESSO!", true);
            document.getElementById('nomeProd').value = "";
            document.getElementById('custoProd').value = "";
            document.getElementById('vendaProd').value = "";
        }).catch(err => avisar("❌ Erro no Banco: " + err.message, false));
    }

    // Carregamento da Lista
    database.ref('produtos').on('value', snapshot => {
        const lista = snapshot.val() ? Object.values(snapshot.val()) : [];
        lista.sort((a,b) => a.nome.localeCompare(b.nome));
        document.getElementById('corpoTabela').innerHTML = lista.map(p => `
            <tr>
                <td><b>${p.nome}</b></td>
                <td>R$ ${parseFloat(p.custo).toFixed(2)}</td>
                <td style="color:var(--accent)">R$ ${parseFloat(p.venda).toFixed(2)}</td>
                <td><i class="fas fa-trash" onclick="apagar('${p.nome}')" style="color:var(--red); cursor:pointer"></i></td>
            </tr>
        `).join('');
    });

    function apagar(nome) { if(confirm("Apagar " + nome + "?")) database.ref('produtos/'+nome).remove(); }
</script>
</body>
</html>
