<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --border: #1e293b; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 10px; font-size: 0.85rem; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        input { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 0.85rem; }
        label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; font-weight: bold; }
        
        .sugestao-box { background: rgba(255,184,0,0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .sugestao-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
        .destaque { color: var(--accent); font-weight: 700; font-size: 1rem; }

        .btn-salvar { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #94a3b8; padding: 10px; border-bottom: 2px solid var(--border); font-size: 0.65rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .pos { color: var(--green); font-weight: bold; }
        .neg { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align:center; font-size:0.9rem; margin-bottom:15px;"><i class="fas fa-calculator"></i> ENTRADA UNITÁRIA INTELIGENTE</h2>
        
        <div id="boxSugestao" class="sugestao-box" style="display:none;">
            <div class="sugestao-item">Custo por Unidade: <span id="resCustoUn">R$ 0,00</span></div>
            <div class="sugestao-item">Sugestão p/ 30% Lucro: <span id="resSugestao" class="destaque">R$ 0,00</span></div>
            <div class="sugestao-item">Lucro Real Unitário: <span id="resLucroAbs" class="pos">R$ 0,00</span></div>
        </div>

        <div class="grid-inputs">
            <div style="grid-column: span 2;"><label>Nome do Produto (Ex: Amstel Sleek)</label><input type="text" id="nome"></div>
            <div><label>Qtd na Caixa</label><input type="number" id="qtd" value="12" oninput="calcular()"></div>
            <div><label>Valor da Caixa (R$)</label><input type="number" id="custoTotal" placeholder="38.73" oninput="calcular()"></div>
            <div><label>Sua Venda (Unit.)</label><input type="number" id="vendaUnit" placeholder="5.00" oninput="calcular()"></div>
            <div><label>Imposto %</label><input type="number" id="imposto" value="10" oninput="calcular()"></div>
        </div>
        
        <button class="btn-salvar" onclick="salvar()">💾 SALVAR NO SISTEMA</button>
    </div>

    <div class="card" style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>PRODUTO (A-Z)</th>
                    <th>CUSTO UN.</th>
                    <th>VENDA UN.</th>
                    <th>LUCRO R$</th>
                    <th>MARGEM %</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="listaCorpo"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function calcular() {
        const custoTotal = parseFloat(document.getElementById('custoTotal').value) || 0;
        const qtd = parseFloat(document.getElementById('qtd').value) || 1;
        const venda = parseFloat(document.getElementById('vendaUnit').value) || 0;
        const imp = parseFloat(document.getElementById('imposto').value) || 0;

        // Cálculo do Custo por Unidade
        const custoUn = custoTotal / qtd;
        
        // Sugestão de Venda (30% de margem real após imposto)
        // Fórmula: Preço = Custo / (1 - MargemDesejada - Imposto)
        const precoSugerido = custoUn / (1 - 0.30 - (imp/100));

        // Cálculo de Lucro Real com base no que você digitar em Venda
        const impostoR$ = venda * (imp/100);
        const lucroR$ = venda - custoUn - impostoR$;
        const margemFinal = venda > 0 ? (lucroR$ / venda) * 100 : 0;

        // Mostra na tela
        document.getElementById('boxSugestao').style.display = 'block';
        document.getElementById('resCustoUn').innerText = `R$ ${custoUn.toFixed(2)}`;
        document.getElementById('resSugestao').innerText = `R$ ${precoSugerido.toFixed(2)}`;
        document.getElementById('resLucroAbs').innerText = `R$ ${lucroR$.toFixed(2)}`;
        
        return { custoUn, venda, lucroR$, margemFinal };
    }

    function salvar() {
        const n = document.getElementById('nome').value.trim().toUpperCase();
        const res = calcular();

        if(!n || res.venda <= 0) return alert("Preencha o Nome e o Preço de Venda!");

        db.ref('produtos/' + n).set({
            nome: n,
            custo: res.custoUn,
            venda: res.venda,
            lucro: res.lucroR$,
            margem: res.margemFinal
        }).then(() => {
            alert("✅ " + n + " Salvo!");
            document.getElementById('nome').value = "";
            document.getElementById('custoTotal').value = "";
            document.getElementById('vendaUnit').value = "";
        });
    }

    db.ref('produtos').on('value', (snap) => {
        const corpo = document.getElementById('listaCorpo');
        corpo.innerHTML = "";
        const dados = [];
        snap.forEach(i => dados.push(i.val()));
        dados.sort((a,b) => a.nome.localeCompare(b.nome));
        
        dados.forEach(p => {
            corpo.innerHTML += `<tr>
                <td><b>${p.nome}</b></td>
                <td>R$ ${p.custo.toFixed(2)}</td>
                <td style="color:var(--accent)">R$ ${p.venda.toFixed(2)}</td>
                <td class="pos">R$ ${p.lucro.toFixed(2)}</td>
                <td class="${p.margem > 20 ? 'pos' : 'neg'}">${p.margem.toFixed(1)}%</td>
                <td><i class="fas fa-trash" style="color:var(--red); cursor:pointer" onclick="remover('${p.nome}')"></i></td>
            </tr>`;
        });
    });

    function remover(n) { if(confirm("Apagar " + n + "?")) db.ref('produtos/'+n).remove(); }
</script>
</body>
</html>
