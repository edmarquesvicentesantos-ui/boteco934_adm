<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada Estoque - Boteco 934</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; text-decoration: none; text-align: center; color: white; }
        .btn-blue { background: #0a84ff; }
        .btn-green { background: #30d158; color: black; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #2c2c2e; color: #30d158; margin: 10px 0; font-size: 16px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>
    <h3 style="color: #30d158;">📦 Entrada Boteco 934</h3>

    <div class="card">
        <p style="font-size: 14px; color: #8e8e93;">1º PASSO: OBTER XML</p>
        <p style="font-size: 13px;">Toque abaixo, use o <b>Escanear Texto</b> do iPhone na nota e clique no botão azul:</p>
        
        <input type="text" id="chave" placeholder="Toque aqui para escanear a nota">
        
        <button onclick="baixarXML()" class="btn btn-blue">BAIXAR XML NO FSIST</button>
    </div>

    <div class="card">
        <p style="font-size: 14px; color: #8e8e93;">2º PASSO: LANÇAR NO BANCO</p>
        <label for="xml" class="btn btn-green">SELECIONAR XML BAIXADO</label>
        <input type="file" id="xml" accept=".xml" style="display:none" onchange="lerXML(this)">
    </div>

    <div id="lista"></div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function baixarXML() {
            const num = document.getElementById('chave').value.replace(/\D/g, '');
            if(num.length >= 44) {
                window.open("https://www.fsist.com.br/consultar-nfe?chave=" + num, "_blank");
            } else {
                window.open("https://www.fsist.com.br", "_blank");
            }
        }

        function lerXML(input) {
            if (input.files[0]) {
                const leitor = new FileReader();
                leitor.onload = function() {
                    const xmlDoc = new DOMParser().parseFromString(leitor.result, "text/xml");
                    const itens = xmlDoc.getElementsByTagName("det");
                    let html = "<h4>Produtos na Nota:</h4>";
                    let produtos = [];
                    for (let i = 0; i < itens.length; i++) {
                        let p = itens[i].getElementsByTagName("prod")[0];
                        let nome = p.getElementsByTagName("xProd")[0].textContent;
                        let qtd = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                        produtos.push({ nome, qtd });
                        html += `<div style="text-align:left; background:#2c2c2e; padding:10px; margin:5px; border-radius:8px; border-left:4px solid #30d158;">${nome} - ${qtd} un</div>`;
                    }
                    document.getElementById('lista').innerHTML = html + `<button onclick='salvar(${JSON.stringify(produtos)})' class="btn btn-green">CONFIRMAR NO ESTOQUE</button>`;
                };
                leitor.readAsText(input.files[0]);
            }
        }

        async function salvar(lista) {
            try {
                for (let item of lista) {
                    await db.collection("estoque").doc(item.nome).set({
                        nome: item.nome,
                        quantidade: firebase.firestore.FieldValue.increment(item.qtd),
                        data: new Date()
                    }, { merge: true });
                }
                alert("✅ Estoque Atualizado!");
                location.reload();
            } catch (e) { alert("Erro ao salvar."); }
        }
    </script>
</body>
</html>
