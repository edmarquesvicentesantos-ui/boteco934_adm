<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrada Direta - Boteco 934</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: auto; }
        h3 { color: #30d158; margin-bottom: 30px; }
        
        .card { background: #1c1c1e; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        label { display: block; text-align: left; font-size: 14px; color: #8e8e93; margin: 10px 0 5px 5px; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #444; 
            background: #2c2c2e; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-bottom: 15px;
            outline: none;
        }
        
        input:focus { border-color: #30d158; }

        .btn-lancar { 
            width: 100%; 
            padding: 18px; 
            background: #30d158; 
            color: black; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        
        .btn-lancar:active { transform: scale(0.98); background: #28b84d; }

        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h3>📦 Entrada de Estoque</h3>

    <div class="card">
        <label>NOME DO PRODUTO (OU BOTICÁRIO)</label>
        <input type="text" id="nome" placeholder="Ex: Cerveja Lata 350ml" autocomplete="off">

        <label>QUANTIDADE QUE CHEGOU</label>
        <input type="number" id="qtd" placeholder="Ex: 24" inputmode="numeric">

        <button class="btn-lancar" onclick="lancarNoEstoque()">SALVAR NO ESTOQUE</button>
    </div>

    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<script>
    // Suas configurações do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.firebasestorage.app",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function lancarNoEstoque() {
        const nome = document.getElementById('nome').value.trim().toUpperCase();
        const qtd = parseFloat(document.getElementById('qtd').value);
        const status = document.getElementById('status');

        if (!nome || isNaN(qtd)) {
            alert("Preencha o nome e a quantidade corretamente!");
            return;
        }

        status.innerHTML = "⏳ Lançando...";

        try {
            // Atualiza ou cria o produto no Firebase somando a quantidade
            await db.collection("estoque").doc(nome).set({
                nome: nome,
                quantidade: firebase.firestore.FieldValue.increment(qtd),
                ultima_atualizacao: new Date()
            }, { merge: true });

            status.innerHTML = `<b style="color: #30d158;">✅ ${qtd} un de ${nome} adicionados!</b>`;
            
            // Limpa os campos para o próximo lançamento
            document.getElementById('nome').value = "";
            document.getElementById('qtd').value = "";
            document.getElementById('nome').focus();

            // Remove a mensagem de sucesso após 3 segundos
            setTimeout(() => { status.innerHTML = ""; }, 3000);

        } catch (e) {
            console.error(e);
            status.innerHTML = `<b style="color: #ff453a;">❌ Erro ao salvar. Verifique a internet.</b>`;
        }
    }
</script>

</body>
</html>
