<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada Boteco 934</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 10px; overflow: hidden; background: #000; }
        .btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; text-decoration: none; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        #info-arquivo { background: #444; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; color: #30d158; font-weight: bold; }
        #resultado-scan { background: #333; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid #007bff; }
    </style>
</head>
<body>
    <h2>📸 Scanner Boteco 934</h2>
    
    <div id="reader"></div>

    <div id="resultado-scan">
        <p>Chave Identificada:</p>
        <strong id="chave-num" style="word-break: break-all;"></strong>
        <a id="link-xml" href="#" target="_blank" class="btn btn-blue">1. BAIXAR XML AGORA</a>
    </div>

    <hr style="margin: 25px 0; border: 0.5px solid #444;">

    <label for="xml" class="btn btn-green">2. SELECIONAR XML BAIXADO</label>
    <input type="file" id="xml" accept=".xml" style="display:none" onchange="mostrarNomeArquivo(this)">
    
    <div id="info-arquivo">
        📄 Arquivo: <span id="nome-arquivo"></span>
    </div>

    <div id="lista-produtos"></div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        // Suas chaves do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Lógica do Scanner
        function onScanSuccess(decodedText) {
            if(decodedText.length >= 44) {
                document.getElementById('resultado-scan').style.display = 'block';
                document.getElementById('chave-num').innerText = decodedText;
                document.getElementById('link-xml').href = "https://www.fsist.com.br/consultar-nfe?chave=" + decodedText;
                html5QrcodeScanner.clear();
            }
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // 2. Lógica de Mostrar Nome e Ler XML
        function mostrarNomeArquivo(input) {
            if (input.files && input.files[0]) {
                const nome = input.files[0].name;
                document.getElementById('nome-arquivo').innerText = nome;
                document.getElementById('info-arquivo').style.display = 'block';
                
                // Começa a ler os produtos
                const leitor = new FileReader();
                leitor.onload = function() {
                    const xmlDoc = new DOMParser().parseFromString(leitor.result, "text/xml");
                    const itens = xmlDoc.getElementsByTagName("det");
                    let html = "<h3>Produtos da Nota:</h3>";
                    let produtos = [];

                    for (let i = 0; i < itens.length; i++) {
                        let p = itens[i].getElementsByTagName("prod")[0];
                        let nomeP = p.getElementsByTagName("xProd")[0].textContent;
                        let qtd = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                        produtos.push({ nome: nomeP, qtd: qtd });
                        html += `<div style="text-align:left; background:#333; padding:10px; margin:5px; border-radius:5px;">${nomeP} - Qtd: ${qtd}</div>`;
                    }

                    document.getElementById('lista-produtos').innerHTML = html + 
                    `<button onclick='salvar(${JSON.stringify(produtos)})' class="btn btn-green">3. CONFIRMAR ENTRADA</button>`;
                };
                leitor.readAsText(input.files[0]);
            }
        }

        async function salvar(lista) {
            try {
                for (let item of lista) {
                    await db.collection("estoque").doc(item.nome).set({
                        nome: item.nome,
                        quantidade: firebase.firestore.FieldValue.increment(item.qtd),
                        data: new Date()
                    }, { merge: true });
                }
                alert("✅ Sucesso! Estoque atualizado.");
                location.reload();
            } catch (e) {
                alert("❌ Erro ao salvar no banco.");
            }
        }
    </script>
</body>
</html>
