<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Entrada Boteco 934</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 18px; border: 1px solid #333; margin-bottom: 20px; }
        
        /* Campo de Texto TOTALMENTE LIBERADO */
        #chave-input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 10px; 
            border: 2px solid #0a84ff; 
            background: #fff; /* Fundo branco para o iPhone entender que é um campo de texto comum */
            color: #000; 
            font-size: 18px; 
            margin-bottom: 15px; 
            box-sizing: border-box;
            -webkit-user-select: text; /* Força o iPhone a permitir seleção e colagem */
            user-select: text;
        }

        .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; border-radius: 15px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; text-decoration: none; box-sizing: border-box; }
        .btn-blue { background: #0a84ff; color: white; }
        .btn-green { background: #30d158; color: black; }
    </style>
</head>
<body>

<div style="max-width: 500px; margin: auto;">
    <h3 style="color: #30d158;">📦 Estoque Boteco 934</h3>

    <div class="card">
        <p>1. Digite ou Cole a Chave aqui:</p>
        <input type="text" id="chave-input" inputmode="numeric" placeholder="Toque aqui para escrever">
        
        <button onclick="baixarNoFsist()" class="btn btn-blue">BAIXAR XML NO FSIST</button>
    </div>

    <div class="card">
        <p>2. Selecione o XML baixado:</p>
        <label for="xml-upload" class="btn btn-green">ESCOLHER ARQUIVO XML</label>
        <input type="file" id="xml-upload" accept=".xml" style="display:none" onchange="lerXML(this)">
    </div>

    <div id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.firebasestorage.app",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function baixarNoFsist() {
        const c = document.getElementById('chave-input').value;
        if(c.length > 5) {
            window.open("https://www.fsist.com.br/consultar-nfe?chave=" + c, "_blank");
        } else {
            alert("Digite a chave primeiro!");
        }
    }

    function lerXML(input) {
        if (input.files[0]) {
            const leitor = new FileReader();
            leitor.onload = function() {
                const xmlDoc = new DOMParser().parseFromString(leitor.result, "text/xml");
                const itens = xmlDoc.getElementsByTagName("det");
                let html = "<h4>Confira:</h4>";
                let produtos = [];
                for (let i = 0; i < itens.length; i++) {
                    let p = itens[i].getElementsByTagName("prod")[0];
                    let nome = p.getElementsByTagName("xProd")[0].textContent;
                    let qtd = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                    produtos.push({ nome, qtd });
                    html += `<div style="text-align:left; background:#2c2c2e; padding:10px; margin:5px; border-radius:8px;">${nome} - ${qtd}</div>`;
                }
                document.getElementById('lista').innerHTML = html + 
                `<button onclick='salvar(${JSON.stringify(produtos)})' class="btn btn-green">SALVAR NO ESTOQUE</button>`;
            };
            leitor.readAsText(input.files[0]);
        }
    }

    async function salvar(lista) {
        try {
            for (let item of lista) {
                await db.collection("estoque").doc(item.nome).set({
                    nome: item.nome,
                    quantidade: firebase.firestore.FieldValue.increment(item.qtd),
                    data: new Date()
                }, { merge: true });
            }
            alert("✅ Estoque Atualizado!");
            location.reload();
        } catch (e) { alert("Erro ao salvar."); }
    }
</script>

</body>
</html>
