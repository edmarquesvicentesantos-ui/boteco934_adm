<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Boteco 934</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 10px; overflow: hidden; }
        .btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; text-decoration: none; }
        .btn-blue { background: #007bff; color: white; }
        #resultado-scan { background: #333; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <h2>📸 Scanner de Nota Fiscal</h2>
    
    <div id="reader"></div>

    <div id="resultado-scan">
        <p>Chave Identificada:</p>
        <strong id="chave-num" style="color: #30d158; word-break: break-all;"></strong>
        <a id="link-xml" href="#" target="_blank" class="btn btn-blue">BAIXAR XML DESTA NOTA</a>
        <p style="font-size: 12px; color: #8e8e93;">Após baixar, use o botão verde de "Selecionar XML" abaixo.</p>
    </div>

    <hr style="margin: 30px 0; border: 0.5px solid #444;">

    <label for="xml" style="background:#28a745;" class="btn">2. SELECIONAR XML BAIXADO</label>
    <input type="file" id="xml" accept=".xml" style="display:none" onchange="alert('Arquivo carregado! Siga com o lançamento.')">

    <script>
        function onScanSuccess(decodedText) {
            // O código de barras da nota tem 44 números
            if(decodedText.length >= 44) {
                document.getElementById('resultado-scan').style.display = 'block';
                document.getElementById('chave-num').innerText = decodedText;
                
                // Link direto para o FSist com a chave já preenchida
                document.getElementById('link-xml').href = "https://www.fsist.com.br/consultar-nfe?chave=" + decodedText;
                
                // Para o scanner após ler com sucesso
                html5QrcodeScanner.clear();
            }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
