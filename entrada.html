<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada Boteco 934</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .card { background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; text-decoration: none; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .item { background: #444; padding: 10px; margin-bottom: 5px; border-radius: 5px; text-align: left; border-left: 5px solid #28a745; }
    </style>
</head>
<body>
    <h2>📥 Entrada de Nota Fiscal</h2>
    
    <div class="card">
        <a href="https://www.fsist.com.br" target="_blank" class="btn btn-blue">1. BAIXAR XML NO FSIST</a>
        <label for="xml" class="btn btn-green">2. ESCOLHER XML BAIXADO</label>
        <input type="file" id="xml" accept=".xml" style="display:none" onchange="lerXML(this)">
    </div>

    <div id="lista"></div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        // Dados do seu projeto Boteco 934
        const firebaseConfig = {
            apiKey: "COLE_AQUI_A_SUA_API_KEY_DO_FIREBASE", 
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.appspot.com",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function lerXML(input) {
            const leitor = new FileReader();
            leitor.onload = function() {
                const xmlDoc = new DOMParser().parseFromString(leitor.result, "text/xml");
                const itens = xmlDoc.getElementsByTagName("det");
                let produtos = [];
                let html = "<h3>Produtos na Nota:</h3>";

                for (let i = 0; i < itens.length; i++) {
                    let p = itens[i].getElementsByTagName("prod")[0];
                    let nome = p.getElementsByTagName("xProd")[0].textContent;
                    let qtd = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                    produtos.push({ nome, qtd });
                    html += `<div class="item"><b>${nome}</b><br>Quantidade: ${qtd}</div>`;
                }

                document.getElementById("lista").innerHTML = html + 
                `<button class="btn btn-green" onclick='salvar(${JSON.stringify(produtos)})'>3. CONFIRMAR NO ESTOQUE</button>`;
            };
            leitor.readAsText(input.files[0]);
        }

        async function salvar(lista) {
            try {
                for (let item of lista) {
                    await db.collection("estoque").doc(item.nome).set({
                        nome: item.nome,
                        quantidade: firebase.firestore.FieldValue.increment(item.qtd),
                        ultimaAtualizacao: new Date()
                    }, { merge: true });
                }
                alert("✅ Estoque Atualizado com Sucesso!");
                location.reload();
            } catch (e) {
                alert("❌ Erro ao salvar! Verifique se as 'Rules' do Banco estão abertas.");
            }
        }
    </script>
</body>
</html>
