<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada - Boteco 934</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; text-decoration: none; color: white; }
        .btn-blue { background: #0a84ff; }
        .btn-green { background: #30d158; color: black; }
        .btn-camera { background: #ff9f0a; color: black; }
    </style>
</head>
<body>
    <h3 style="color: #30d158;">📦 Estoque Boteco 934</h3>

    <div class="card">
        <p>1. Use a câmera para ler a Chave:</p>
        <label class="btn btn-camera">
            📸 LER CÓDIGO DA NOTA
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="alert('Dica: O iPhone 16 detecta o código na foto. Copie os números e use no site FSist.')">
        </label>
        <a href="https://www.fsist.com.br" target="_blank" class="btn btn-blue">IR PARA O SITE FSIST</a>
    </div>

    <div class="card">
        <p>2. Selecione o XML baixado:</p>
        <label for="xml" class="btn btn-green">ESCOLHER ARQUIVO XML</label>
        <input type="file" id="xml" accept=".xml" style="display:none" onchange="processarXML(this)">
    </div>

    <div id="lista"></div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function processarXML(input) {
            if (input.files[0]) {
                const leitor = new FileReader();
                leitor.onload = function() {
                    const xmlDoc = new DOMParser().parseFromString(leitor.result, "text/xml");
                    const itens = xmlDoc.getElementsByTagName("det");
                    let html = "<h4>Produtos Identificados:</h4>";
                    let produtos = [];

                    for (let i = 0; i < itens.length; i++) {
                        let p = itens[i].getElementsByTagName("prod")[0];
                        let nome = p.getElementsByTagName("xProd")[0].textContent;
                        let qtd = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                        produtos.push({ nome, qtd });
                        html += `<div style="text-align:left; background:#2c2c2e; padding:12px; margin:5px; border-radius:10px; border-left:4px solid #30d158;">${nome} - ${qtd} un</div>`;
                    }
                    document.getElementById('lista').innerHTML = html + 
                    `<button onclick='salvar(${JSON.stringify(produtos)})' class="btn btn-green">CONFIRMAR NO ESTOQUE</button>`;
                };
                leitor.readAsText(input.files[0]);
            }
        }

        async function salvar(lista) {
            try {
                for (let item of lista) {
                    await db.collection("estoque").doc(item.nome).set({
                        nome: item.nome,
                        quantidade: firebase.firestore.FieldValue.increment(item.qtd),
                        data: new Date()
                    }, { merge: true });
                }
                alert("✅ Sucesso! Estoque do Boteco 934 atualizado.");
                location.reload();
            } catch (e) { alert("Erro ao salvar."); }
        }
    </script>
</body>
</html>
