<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .btn-menu { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; cursor: pointer; }
        .box { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; margin-bottom: 10px; }
        .valor { font-size: 18px; font-weight: bold; color: #30d158; }
    </style>
</head>
<body>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
        <button onclick="location.href='index.html'" class="btn-menu" style="background: #333; color: #fff;">🍺 PRODUTOS</button>
        <button onclick="location.href='vendas.html'" class="btn-menu" style="background: #333; color: #fff;">💰 VENDAS</button>
        <button onclick="location.href='clientes.html'" class="btn-menu" style="background: #333; color: #fff;">👥 PENDURA</button>
        <button onclick="location.href='boticario.html'" class="btn-menu" style="background: #333; color: #fff;">✨ BOTICÁRIO</button>
        <button onclick="location.href='despesas.html'" class="btn-menu" style="background: #333; color: #fff;">📉 GASTOS</button>
        <button onclick="location.href='dashboard.html'" class="btn-menu" style="background: #5856d6; color: #fff;">📊 LUCRO</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="box">VENDAS<br><span id="total-vendas" class="valor">R$ 0,00</span></div>
        <div class="box">LUCRO LIMPO<br><span id="total-lucro" class="valor">R$ 0,00</span></div>
    </div>

    <canvas id="graficoResumo" style="margin-top:20px;"></canvas>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function carregar() {
            let vTotal = 0, dTotal = 0;
            const vSnap = await db.collection("vendas_realizadas").get();
            vSnap.forEach(d => vTotal += parseFloat(d.data().valor || 0));
            const dSnap = await db.collection("despesas").get();
            dSnap.forEach(d => dTotal += parseFloat(d.data().valor || 0));

            let lucro = vTotal - (vTotal * 0.55) - dTotal;
            document.getElementById('total-vendas').innerText = "R$ " + vTotal.toFixed(2);
            document.getElementById('total-lucro').innerText = "R$ " + lucro.toFixed(2);

            new Chart(document.getElementById('graficoResumo'), {
                type: 'bar',
                data: {
                    labels: ['Vendas', 'Gastos', 'Lucro'],
                    datasets: [{ data: [vTotal, dTotal, lucro], backgroundColor: ['#5856d6', '#ff453a', '#30d158'] }]
                }
            });
        }
        carregar();
    </script>
</body>
</html>
