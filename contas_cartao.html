<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTÕES | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        .card-form { background: var(--glass); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .tabela-area { background: var(--glass); border-radius: 15px; padding: 10px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { color: var(--gold); padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-pago { color: #2ecc71; font-weight: bold; }
        .status-aberto { color: #e74c3c; font-weight: bold; }
        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><i class="fas fa-credit-card"></i> CONTAS DE CARTÃO</div>
    <div class="card-form">
        <div class="grid-input">
            <div><label>BANCO</label><select id="banco"><option>NUBANK</option><option>INTER</option><option>BRADESCO</option><option>SANTANDER</option></select></div>
            <div><label>VALOR R$</label><input type="number" id="valor" placeholder="0,00"></div>
            <div><label>VENCIMENTO</label><input type="date" id="dataVenc"></div>
            <div><label>MELHOR DIA</label><input type="number" id="melhorDia" placeholder="Ex: 05"></div>
        </div>
        <button class="btn-add" onclick="salvar()">LANÇAR CONTA</button>
    </div>
    <div class="tabela-area">
        <table>
            <thead><tr><th>Banco</th><th>Valor</th><th>Venc.</th><th>Status</th></tr></thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
    <a href="index.html" class="btn-voltar">VOLTAR AO MENU</a>
</div>
<script>
    function salvar() {
        const v = parseFloat(document.getElementById('valor').value);
        const d = document.getElementById('dataVenc').value;
        if (!v || !d) return alert("Preencha tudo!");
        let contas = JSON.parse(localStorage.getItem('contas934')) || [];
        contas.push({ banco: document.getElementById('banco').value, valor: v, dataVenc: d, melhorDia: document.getElementById('melhorDia').value, pago: false });
        localStorage.setItem('contas934', JSON.stringify(contas));
        render();
    }
    function render() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        let contas = JSON.parse(localStorage.getItem('contas934')) || [];
        contas.forEach((c, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${c.banco}</td><td>R$ ${c.valor.toFixed(2)}</td><td>${c.dataVenc}</td>
            <td class="${c.pago ? 'status-pago' : 'status-aberto'}" onclick="pagar(${i})">${c.pago ? 'PAGO' : 'ABERTO'}</td>`;
            corpo.appendChild(tr);
        });
    }
    function pagar(i) {
        let contas = JSON.parse(localStorage.getItem('contas934'));
        contas[i].pago = !contas[i].pago;
        localStorage.setItem('contas934', JSON.stringify(contas));
        render();
    }
    window.onload = render;
</script>
</body>
</html>
