<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENDAS AO VIVO | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        
        /* Cabeçalho */
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .header h2 { color: var(--gold); text-transform: uppercase; margin: 5px 0; }

        /* Cards de Resumo */
        .resumo-vendas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: var(--glass); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .card i { font-size: 20px; margin-bottom: 8px; }
        .card .valor { font-size: 20px; font-weight: bold; display: block; }
        .total-dia { border-color: var(--gold); background: rgba(255, 215, 0, 0.05); }

        /* Lista de Vendas */
        .lista-vendas { background: var(--glass); border-radius: 20px; padding: 10px; border: 1px solid #222; min-height: 300px; }
        .venda-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .info-venda b { color: var(--green); font-size: 16px; }
        .info-venda span { font-size: 11px; color: #888; display: block; }
        .metodo { font-size: 10px; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; font-weight: bold; }
        .pix { background: #008080; color: white; }
        .cartao { background: #f39c12; color: white; }

        .btn-voltar { display: block; text-align: center; margin-top: 30px; color: var(--gold); text-decoration: none; font-size: 13px; border: 1px solid var(--gold); padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-chart-line fa-2x"></i>
        <h2>Monitor de Vendas 934</h2>
        <small id="data-atual"></small>
    </div>

    <div class="resumo-vendas">
        <div class="card total-dia">
            <i class="fas fa-wallet" style="color:var(--gold)"></i>
            <span class="valor" id="total-valor">R$ 0,00</span>
            <small>Total de Hoje</small>
        </div>
        <div class="card">
            <i class="fas fa-shopping-cart" style="color:var(--blue)"></i>
            <span class="valor" id="total-vendas">0</span>
            <small>Vendas</small>
        </div>
    </div>

    <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--gold);"><i class="fas fa-history"></i> ÚLTIMOS RECEBIMENTOS</h3>
    <div class="lista-vendas" id="fluxo-vendas">
        <p style="text-align:center; color:#555; margin-top:50px;">Aguardando pagamentos...</p>
    </div>

    <a href="index.html" class="btn-voltar">VOLTAR AO MENU</a>
</div>

<audio id="som-caixa" src="https://www.myinstants.com/media/sounds/cash-register-purchase.mp3"></audio>

<script>
    // Data de hoje
    document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

    // Função para simular a chegada de uma venda (Depois conectaremos ao Mercado Pago)
    function registrarVenda(valor, metodo) {
        const som = document.getElementById('som-caixa');
        som.play(); // Toca o Din-Din!

        const lista = document.getElementById('fluxo-vendas');
        if (lista.innerHTML.includes("Aguardando")) lista.innerHTML = "";

        const hora = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        
        const item = `
            <div class="venda-item">
                <div class="info-venda">
                    <b>R$ ${valor.toFixed(2)}</b>
                    <span>${hora} - Recebido com sucesso</span>
                </div>
                <span class="metodo ${metodo.toLowerCase()}">${metodo}</span>
            </div>
        `;
        
        lista.insertAdjacentHTML('afterbegin', item);
        atualizarResumo(valor);
    }

    let totalDinheiro = 0;
    let totalVendas = 0;

    function atualizarResumo(valor) {
        totalDinheiro += valor;
        totalVendas += 1;
        document.getElementById('total-valor').innerText = `R$ ${totalDinheiro.toFixed(2)}`;
        document.getElementById('total-vendas').innerText = totalVendas;
    }

    // TESTE AUTOMÁTICO (Só para você ver como funciona)
    // Pode apagar essas linhas abaixo depois
    setTimeout(() => registrarVenda(15.50, 'PIX'), 2000);
    setTimeout(() => registrarVenda(22.00, 'CARTAO'), 5000);
</script>

</body>
</html>
