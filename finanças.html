<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --border: #1e293b; --green: #10b981; --blue: #3b82f6; --red: #ef4444; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 20px; }
        
        .grid-financas { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; }
        .box h4 { font-size: 0.7rem; color: #94a3b8; margin: 0 0 10px 0; text-transform: uppercase; }
        .box .valor { font-size: 1.3rem; font-weight: 700; }
        
        /* Cores específicas para cada tipo */
        .txt-dinheiro { color: #22c55e; }
        .txt-pix { color: #00fdca; }
        .txt-cartao { color: #6366f1; }
        .txt-pendura { color: #ef4444; }

        .total-geral { background: #1c222d; border: 2px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="total-geral">
        <h2 style="margin:0; font-size: 0.9rem; color: var(--accent);">FATURAMENTO TOTAL DO DIA</h2>
        <div class="valor" id="faturamentoTotal" style="font-size: 2.5rem;">R$ 0,00</div>
    </div>

    <div class="grid-financas">
        <div class="box">
            <h4><i class="fas fa-money-bill-wave"></i> Dinheiro</h4>
            <div class="valor txt-dinheiro" id="vendaDinheiro">R$ 0,00</div>
        </div>
        <div class="box">
            <h4><i class="fas fa-qrcode"></i> Pix</h4>
            <div class="valor txt-pix" id="vendaPix">R$ 0,00</div>
        </div>
        <div class="box">
            <h4><i class="fas fa-credit-card"></i> Cartão Débito</h4>
            <div class="valor txt-cartao" id="vendaDebito">R$ 0,00</div>
        </div>
        <div class="box">
            <h4><i class="fas fa-credit-card"></i> Cartão Crédito</h4>
            <div class="valor txt-cartao" id="vendaCredito">R$ 0,00</div>
        </div>
        <div class="box">
            <h4><i class="fas fa-hand-holding-usd"></i> Pendura (Fiado)</h4>
            <div class="valor txt-pendura" id="vendaPendura">R$ 0,00</div>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", 
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", 
        projectId: "boteco934-afc3f" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Função para ler as vendas do dia
    function carregarFinancas() {
        db.ref('vendas').on('value', snap => {
            let d = 0, p = 0, deb = 0, cre = 0, pen = 0;
            
            snap.forEach(vendaSnap => {
                const v = vendaSnap.val();
                const valor = parseFloat(v.total || 0);

                if(v.metodo === 'DINHEIRO') d += valor;
                if(v.metodo === 'PIX') p += valor;
                if(v.metodo === 'DÉBITO') deb += valor;
                if(v.metodo === 'CRÉDITO') cre += valor;
                if(v.metodo === 'PENDURA') pen += valor;
            });

            document.getElementById('vendaDinheiro').innerText = `R$ ${d.toFixed(2)}`;
            document.getElementById('vendaPix').innerText = `R$ ${p.toFixed(2)}`;
            document.getElementById('vendaDebito').innerText = `R$ ${deb.toFixed(2)}`;
            document.getElementById('vendaCredito').innerText = `R$ ${cre.toFixed(2)}`;
            document.getElementById('vendaPendura').innerText = `R$ ${pen.toFixed(2)}`;
            
            const totalGeral = d + p + deb + cre + pen;
            document.getElementById('faturamentoTotal').innerText = `R$ ${totalGeral.toFixed(2)}`;
        });
    }

    carregarFinancas();
</script>
</body>
</html>
