<div class="card">
    <h3 style="color: #ff9f0a;">BEBIDAS / CERVEJAS</h3>
    
    <label>NOME</label>
    <input type="text" id="nome-cerv" class="input-dark">

    <label>CÓDIGO (BIP)</label>
    <input type="text" id="cod-cerv" class="input-dark">

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>CUSTO FARDO</label>
            <input type="number" id="custo-fardo" class="input-dark" oninput="calcularCerveja()">
        </div>
        <div style="flex: 1;">
            <label>LUCRO % (MARKUP)</label>
            <input type="number" id="markup-cerv" value="100" class="input-dark" oninput="calcularCerveja()">
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 10px; background: #2c2c2e; padding: 10px; border-radius: 10px; border: 1px dashed #30d158;">
        <div style="flex: 1;">
            <label style="color: #30d158;">MARGEM REAL</label>
            <input type="text" id="margem-real" style="color: #30d158; font-weight: bold; background: none; border: none;" readonly>
        </div>
        <div style="flex: 1;">
            <label style="color: #30d158;">LUCRO R$</label>
            <input type="text" id="lucro-reais" style="color: #30d158; font-weight: bold; background: none; border: none;" readonly>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div style="flex: 1;">
            <label>VDA UN</label>
            <input type="text" id="vda-un" class="input-dark" readonly>
        </div>
        <div style="flex: 1;">
            <label>VDA FARDO</label>
            <input type="text" id="vda-fardo" class="input-dark" readonly>
        </div>
    </div>

    <button class="btn-salvar" style="background: #28a745; width: 100%; padding: 15px; border: none; color: white; font-weight: bold; margin-top: 10px; border-radius: 8px;" onclick="salvar()">SALVAR PRODUTO</button>
</div>

<script>
// ESSA FUNÇÃO É O QUE FAZ O PC ATUALIZAR OS NÚMEROS NA HORA
function calcularCerveja() {
    let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
    let markup = parseFloat(document.getElementById('markup-cerv').value) || 0;

    if (custo > 0) {
        let vendaFardo = custo * (1 + (markup / 100));
        let lucroTotal = vendaFardo - custo;
        let margemReal = (lucroTotal / vendaFardo) * 100;

        document.getElementById('vda-fardo').value = "R$ " + vendaFardo.toFixed(2);
        document.getElementById('vda-un').value = "R$ " + (vendaFardo / 12).toFixed(2);
        document.getElementById('margem-real').value = margemReal.toFixed(1) + "%";
        document.getElementById('lucro-reais').value = "R$ " + lucroTotal.toFixed(2);
    }
}
</script>
