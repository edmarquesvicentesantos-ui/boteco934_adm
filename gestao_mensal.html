<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTÕES | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        
        /* Formulário */
        .card-form { background: var(--glass); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        input, select { width: 100%; background: #000; border: 1px solid rgba(255,215,0,0.3); padding: 10px; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Tabela Digital */
        .tabela-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 10px; font-size: 12px; }
        th { background: rgba(255,215,0,0.1); color: var(--gold); padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-pago { color: #2ecc71; font-weight: bold; }
        .status-aberto { color: #e74c3c; font-weight: bold; }
        .btn-acao { border: none; padding: 5px; border-radius: 4px; cursor: pointer; }

        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-credit-card"></i> CONTAS DE CARTÃO</div>

    <div class="card-form">
        <div class="grid-form">
            <div>
                <label>BANCO</label>
                <select id="banco">
                    <option value="NUBANK">NUBANK</option>
                    <option value="INTER">INTER</option>
                    <option value="BRADESCO">BRADESCO</option>
                    <option value="SANTANDER">SANTANDER</option>
                    <option value="OUTRO">OUTRO</option>
                </select>
            </div>
            <div>
                <label>VALOR (R$)</label>
                <input type="number" id="valor" placeholder="0.00">
            </div>
            <div>
                <label>VENCIMENTO</label>
                <input type="date" id="dataVenc">
            </div>
            <div>
                <label>MELHOR DIA COMPRA</label>
                <input type="number" id="melhorDia" placeholder="Ex: 05">
            </div>
        </div>
        <button class="btn-add" onclick="salvarConta()">LANÇAR CONTA</button>
    </div>

    <div class="tabela-container">
        <table id="tabelaCartoes">
            <thead>
                <tr>
                    <th>Banco</th>
                    <th>Valor</th>
                    <th>Venc.</th>
                    <th>Melhor Dia</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> VOLTAR AO MENU</a>
</div>

<script>
    function salvarConta() {
        const banco = document.getElementById('banco').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const dataVenc = document.getElementById('dataVenc').value;
        const melhorDia = document.getElementById('melhorDia').value;

        if (!valor || !dataVenc) return alert("Preencha Valor e Vencimento!");

        const novaConta = { banco, valor, dataVenc, melhorDia, pago: false };
        let contas = JSON.parse(localStorage.getItem('contas934')) || [];
        contas.push(novaConta);
        localStorage.setItem('contas934', JSON.stringify(contas));
        
        limparCampos();
        carregarTabela();
    }

    function carregarTabela() {
        const contas = JSON.parse(localStorage.getItem('contas934')) || [];
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';

        contas.sort((a, b) => new Date(a.dataVenc) - new Date(b.dataVenc));

        contas.forEach((c, i) => {
            const dataFormatada = new Date(c.dataVenc).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${c.banco}</td>
                <td>R$ ${c.valor.toFixed(2)}</td>
                <td>${dataFormatada}</td>
                <td>Dia ${c.melhorDia}</td>
                <td>
                    <span class="${c.pago ? 'status-pago' : 'status-aberto'}" onclick="alternarStatus(${i})" style="cursor:pointer">
                        ${c.pago ? 'PAGO' : 'ABERTO'}
                    </span>
                    <button class="btn-acao" onclick="excluir(${i})" style="background:none; color:#555"><i class="fas fa-trash"></i></button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    function alternarStatus(i) {
        let contas = JSON.parse(localStorage.getItem('contas934'));
        contas[i].pago = !contas[i].pago;
        localStorage.setItem('contas934', JSON.stringify(contas));
        carregarTabela();
    }

    function excluir(i) {
        if(confirm("Excluir este lançamento?")) {
            let contas = JSON.parse(localStorage.getItem('contas934'));
            contas.splice(i, 1);
            localStorage.setItem('contas934', JSON.stringify(contas));
            carregarTabela();
        }
    }

    function limparCampos() {
        document.getElementById('valor').value = '';
        document.getElementById('dataVenc').value = '';
        document.getElementById('melhorDia').value = '';
    }

    window.onload = carregarTabela;
</script>
</body>
</html>
