<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - GESTÃO TOTAL</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #ff8c00; --text: #c9d1d9; --success: #238636; --danger: #da3633; --info: #2b7da3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 20px; color: #fff; }
        .header span { color: var(--accent); }

        /* Dashboard Financeiro */
        .dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card-f { background: var(--card); padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent); }
        .card-f small { font-size: 10px; text-transform: uppercase; color: #8b949e; }
        .card-f h2 { font-size: 18px; margin-top: 5px; }

        .container { padding: 15px; }
        .win { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; }
        
        input, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-add { background: var(--success); color: white; }
        .btn-out { background: var(--danger); color: white; }
        .btn-nav { background: #161b22; color: #8b949e; border-bottom: 2px solid transparent; border-radius: 0; margin: 0; flex: 1; }
        .btn-nav.active { color: var(--accent); border-bottom-color: var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #30363d; }
        th { color: var(--accent); text-transform: uppercase; font-size: 10px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; z-index: 1000; border-top: 1px solid #30363d; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="header"><h1>BOTECO <span>934</span> - FINANCEIRO</h1></div>

<div class="dash">
    <div class="card-f" style="border-color: var(--success);">
        <small>Entradas (Mês)</small>
        <h2 id="total-entradas">R$ 0,00</h2>
    </div>
    <div class="card-f" style="border-color: var(--danger);">
        <small>Saídas (Mês)</small>
        <h2 id="total-saidas">R$ 0,00</h2>
    </div>
</div>

<div class="container">
    <div id="pg-caixa" class="page active">
        <div class="win">
            <h3 style="margin-bottom:10px; font-size:14px; color:var(--accent)">NOVO LANÇAMENTO</h3>
            <label style="font-size:10px;">DESCRIÇÃO</label>
            <input type="text" id="f-desc" placeholder="Ex: Venda Cerveja / Aluguel">
            <label style="font-size:10px;">VALOR (R$)</label>
            <input type="number" id="f-valor" placeholder="0.00">
            <label style="font-size:10px;">CATEGORIA</label>
            <select id="f-cat">
                <option value="VENDA">Venda (Entrada)</option>
                <option value="ESTOQUE">Compra Mercadoria (Saída)</option>
                <option value="FIXA">Conta Fixa/Luz/Aluguel (Saída)</option>
                <option value="OUTROS">Outros (Saída)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-add" onclick="lancar('E')">Entrada (+)</button>
                <button class="btn btn-out" onclick="lancar('S')">Saída (-)</button>
            </div>
        </div>

        <div class="win">
            <h3 style="margin-bottom:10px; font-size:14px; color:var(--accent)">EXTRATO RECENTE</h3>
            <table>
                <thead><tr><th>DATA</th><th>DESC</th><th>VALOR</th></tr></thead>
                <tbody id="lista-financeiro"></tbody>
            </table>
        </div>
    </div>

    <div id="pg-fiado" class="page">
        <div class="win">
            <h3 style="margin-bottom:10px; font-size:14px; color:var(--accent)">CLIENTES QUE DEVEM</h3>
            <table>
                <thead><tr><th>CLIENTE</th><th>DÍVIDA</th><th>AÇÃO</th></tr></thead>
                <tbody id="lista-fiados"></tbody>
            </table>
        </div>
    </div>
</div>

<nav>
    <button class="btn-nav active" onclick="tab('pg-caixa', this)">CAIXA</button>
    <button class="btn-nav" onclick="tab('pg-fiado', this)">FIADOS</button>
</nav>

<script>
    // BANCO DE DADOS BLINDADO
    let fin = JSON.parse(localStorage.getItem('B934_FIN')) || { mov: [], fiados: {} };

    function salvar() { 
        localStorage.setItem('B934_FIN', JSON.stringify(fin)); 
        renderizar();
    }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function lancar(tipo) {
        let d = document.getElementById('f-desc').value.toUpperCase();
        let v = parseFloat(document.getElementById('f-valor').value);
        let c = document.getElementById('f-cat').value;
        
        if(!d || !v) return alert("Preencha descrição e valor!");

        fin.mov.unshift({
            data: new Date().toLocaleDateString('pt-BR'),
            desc: d,
            valor: tipo === 'E' ? v : -v,
            cat: c
        });

        document.getElementById('f-desc').value = "";
        document.getElementById('f-valor').value = "";
        salvar();
    }

    function renderizar() {
        let e = 0; let s = 0; let h = "";
        
        fin.mov.forEach((m, i) => {
            if(m.valor > 0) e += m.valor; else s += Math.abs(m.valor);
            h += `<tr>
                <td>${m.data}</td>
                <td>${m.desc} <br><small style="color:#666">${m.cat}</small></td>
                <td style="color:${m.valor > 0 ? 'var(--success)' : 'var(--danger)'}">
                    R$ ${Math.abs(m.valor).toFixed(2)}
                </td>
            </tr>`;
        });

        document.getElementById('total-entradas').innerText = "R$ " + e.toFixed(2);
        document.getElementById('total-saidas').innerText = "R$ " + s.toFixed(2);
        document.getElementById('lista-financeiro').innerHTML = h;
    }

    window.onload = renderizar;
</script>
</body>
</html>
