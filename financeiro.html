<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - VENDAS</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --text: #c9d1d9; --accent: #00ff41; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; }
        .win { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #30363d; margin-bottom: 20px; }
        h2 { color: var(--blue); font-size: 18px; margin-bottom: 15px; text-align: center; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #fff; font-size: 16px; }
        .btn-venda { background: var(--blue); color: #fff; padding: 18px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .info-lucro { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--accent); padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .info-lucro span { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="win">
    <h2>💰 REGISTRAR VENDA</h2>
    
    <label>Código ou Nome do Produto:</label>
    <input type="text" id="buscaProduto" placeholder="Digite o código ou nome..." list="listaProdutos">
    <datalist id="listaProdutos">
        <option value="Heineken 600ml">
        <option value="Amstel Lata 350ml">
        <option value="Baden Baden IPA">
    </datalist>

    <label>Quantidade:</label>
    <input type="number" id="qtdVenda" value="1" min="1">

    <div id="painelLucro" class="info-lucro">
        Margem Estimada: <span id="margemShow">0%</span><br>
        Lucro nesta venda: <span id="lucroShow">R$ 0,00</span>
    </div>

    <button class="btn-venda" onclick="finalizarVenda()">CONFIRMAR VENDA (LANÇAR)</button>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzIpbRx7JupMZlRgpoeyCBMfrrEqzQNVpxaTrXI8ASVhbmozNxz0vNIPWvo0BT1jc0/exec";

    // Simulação de cálculo de lucro para teste
    document.getElementById('buscaProduto').addEventListener('input', function() {
        document.getElementById('painelLucro').style.display = 'block';
        // Aqui no futuro faremos a busca real na sua planilha
        document.getElementById('margemShow').innerText = '45%';
        document.getElementById('lucroShow').innerText = 'R$ 6,50';
    });

    function finalizarVenda() {
        const prod = document.getElementById('buscaProduto').value;
        const qtd = document.getElementById('qtdVenda').value;

        if(!prod) return alert("Digite o produto!");

        fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                desc: prod,
                valor: "0.00", // Aqui pegaremos o valor da Coluna E da sua planilha
                cat: "VENDA BALCÃO",
                tipo: "SAÍDA",
                estoque: `- ${qtd} un`
            })
        });

        alert("🚀 Venda lançada no Boteco 934!");
        location.reload();
    }
</script>
</body>
</html>
