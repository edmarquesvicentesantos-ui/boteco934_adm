<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid #ff453a; padding-bottom: 10px; margin-bottom: 15px; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-dark { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn-salvar { width: 100%; padding: 15px; background: #ff453a; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .item-gasto { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; background: #121212; margin-bottom: 5px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: #ff453a;">SAÍDAS E GASTOS</h2>
        <button onclick="location.href='index.html'" style="background:none; border:1px solid #ff453a; color:#ff453a; margin-top:10px; border-radius:5px; padding: 5px 10px;">VOLTAR</button>
    </div>

    <div class="card">
        <label style="font-size: 12px; color: #8e8e93;">O QUE FOI PAGO?</label>
        <input type="text" id="desp-nome" class="input-dark" placeholder="Ex: Gelo, Aluguel, Luz">
        <label style="font-size: 12px; color: #8e8e93;">VALOR (R$)</label>
        <input type="number" id="desp-valor" class="input-dark" placeholder="0.00" step="0.01">
        <button onclick="salvarDespesa()" class="btn-salvar">REGISTRAR SAÍDA</button>
    </div>
<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
    <button onclick="location.href='index.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #ff9f0a; color: #000;">🍺 PRODUTOS</button>
    <button onclick="location.href='vendas.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #333; color: #fff;">💰 VENDAS</button>
    <button onclick="location.href='clientes.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #333; color: #fff;">👥 PENDURA</button>
    
    <button onclick="location.href='boticario.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #00a896; color: #fff;">✨ BOTICÁRIO</button>
    <button onclick="location.href='despesas.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #ff453a; color: #fff;">📉 GASTOS</button>
    <button onclick="location.href='dashboard.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #5856d6; color: #fff;">📊 LUCRO</button>
</div>
<hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">
    <div id="lista-despesas"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function salvarDespesa() {
            const nome = document.getElementById('desp-nome').value.toUpperCase();
            const valor = document.getElementById('desp-valor').value;
            if(!nome || !valor) return alert("Preencha a descrição e o valor!");

            try {
                await db.collection("despesas").add({ nome, valor: parseFloat(valor), data: new Date() });
                alert("✅ Despesa de R$ " + valor + " registrada!");
                location.reload();
            } catch (e) { alert("Erro ao salvar despesa!"); }
        }

        db.collection("despesas").orderBy("data", "desc").limit(15).onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                let d = doc.data();
                h += `<div class="item-gasto"><span>${d.nome}</span><span style="color:#ff453a; font-weight:bold;">- R$ ${parseFloat(d.valor).toFixed(2)}</span></div>`;
            });
            document.getElementById('lista-despesas').innerHTML = h;
        });
    </script>
</body>
</html>
