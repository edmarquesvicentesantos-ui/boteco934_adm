<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 - MERCADORIAS PDV</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --gray: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-size: 13px; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Cabeçalho Compacto */
        header { background: #000; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .logo-circulo { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--gold); }
        .brand { font-weight: bold; letter-spacing: 1px; color: #fff; }

        /* Área de Busca e Leitor */
        .secao-busca { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .input-leitor { width: 100%; padding: 15px; background: #1a1a1a; border: 2px solid #333; color: var(--gold); border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; outline: none; }
        .input-leitor:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,204,0,0.2); }

        .conteudo-venda { display: flex; flex: 1; overflow: hidden; }
        
        /* Grid de Mercadorias (Ordem Alfabética) */
        .vitrine-produtos { flex: 1; padding: 10px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; align-content: start; }
        .card-prod { background: #fff; color: #000; padding: 15px 5px; border-radius: 6px; text-align: center; cursor: pointer; font-weight: bold; border: none; min-height: 70px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 0 #bbb; active: transform: translateY(2px); }
        .card-prod span { font-size: 10px; color: #666; margin-top: 4px; }

        /* Lateral da Comanda Atual */
        .painel-checkout { width: 280px; background: #fff; color: #000; padding: 15px; display: flex; flex-direction: column; border-left: 1px solid #ddd; }
        .lista-venda { flex: 1; overflow-y: auto; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }
        .linha-venda { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted #ccc; font-size: 12px; }
        .total-venda { border-top: 2px solid #000; padding-top: 10px; font-weight: 900; display: flex; justify-content: space-between; font-size: 18px; color: #d32f2f; }
        .btn-confirmar { background: #25d366; color: #fff; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="logo-circulo">934</div>
        <div class="brand">PDV MERCADORIAS</div>
    </div>
    <div id="hora" style="color:var(--gold); font-weight:bold;">00:00</div>
</header>

<div class="secao-busca">
    <input type="text" id="campoBusca" class="input-leitor" placeholder="[ BIPAR CÓDIGO OU DIGITAR NOME ]" oninput="filtrar()" autofocus>
</div>

<div class="conteudo-venda">
    <div id="vitrine" class="vitrine-produtos"></div>

    <div class="painel-checkout">
        <h3 style="font-size: 14px; text-transform: uppercase; color: #444;">Venda Atual</h3>
        <div id="carrinho" class="lista-venda"></div>
        
        <div class="total-venda">
            <span>TOTAL</span>
            <span>R$ <span id="totalGeral">0,00</span></span>
        </div>
        <button class="btn-confirmar" onclick="finalizarVenda()">FINALIZAR E ENVIAR</button>
    </div>
</div>

<script>
    let itensVenda = [];
    let totalVenda = 0;
    // Puxa o estoque do mesmo banco da Gestão
    let estoque = JSON.parse(localStorage.getItem('boteco_est')) || [];

    // Organiza por ordem alfabética logo no início
    estoque.sort((a, b) => a.nome.localeCompare(b.nome));

    function renderVitrine(lista) {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = lista.map(p => `
            <button class="card-prod" onclick="adicionar('${p.nome}', ${p.venda})">
                ${p.nome}
                <span>R$ ${p.venda.toFixed(2)}</span>
            </button>
        `).join('');
    }

    function filtrar() {
        const termo = document.getElementById('campoBusca').value.toLowerCase();
        const filtrados = estoque.filter(p => p.nome.toLowerCase().includes(termo));
        renderVitrine(filtrados);
        
        // Se houver apenas 1 resultado e for um código de barras exato, pode adicionar automático
        if(filtrados.length === 1 && termo === filtrados[0].codigo) { // Se você usar campo 'codigo' no futuro
             adicionar(filtrados[0].nome, filtrados[0].venda);
             document.getElementById('campoBusca').value = '';
        }
    }

    function adicionar(nome, preco) {
        itensVenda.push({ nome, preco });
        totalVenda += preco;
        atualizarCarrinho();
        document.getElementById('campoBusca').value = '';
        document.getElementById('campoBusca').focus();
        renderVitrine(estoque); // Reseta a vitrine para mostrar todos após adicionar
    }

    function atualizarCarrinho() {
        const container = document.getElementById('carrinho');
        container.innerHTML = itensVenda.map(item => `
            <div class="linha-venda">
                <span>${item.nome}</span>
                <span>${item.preco.toFixed(2)}</span>
            </div>
        `).join('');
        document.getElementById('totalGeral').innerText = totalVenda.toFixed(2);
    }

    function finalizarVenda() {
        if(itensVenda.length === 0) return alert("Carrinho vazio!");
        const texto = `*BOTECO 934*%0A*Venda Balcão*%0ATotal: R$ ${totalVenda.toFixed(2)}`;
        window.open(`https://wa.me/?text=${texto}`);
        
        // Limpa tudo para a próxima venda
        itensVenda = [];
        totalVenda = 0;
        atualizarCarrinho();
    }

    // Relógio
    setInterval(() => { 
        document.getElementById('hora').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); 
    }, 1000);

    // Inicializa a tela com todos os produtos em ordem alfabética
    renderVitrine(estoque);
</script>
</body>
</html>
