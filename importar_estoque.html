<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPORTADOR XML | 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        .header { text-align: center; color: var(--gold); margin-bottom: 20px; }
        
        /* Área de Upload */
        .upload-box { border: 2px dashed var(--gold); padding: 30px; border-radius: 15px; text-align: center; background: var(--glass); cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .upload-box:hover { background: rgba(255, 215, 0, 0.1); }
        #fileXML { display: none; }

        /* Tabela de Conferência */
        .table-container { width: 100%; overflow-x: auto; background: var(--glass); border-radius: 12px; margin-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 12px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        input { background: #000; border: 1px solid #444; color: white; padding: 6px; border-radius: 5px; width: 90%; font-size: 13px; }
        input:focus { border-color: var(--gold); outline: none; }

        .btn-salvar { background: var(--green); color: black; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; display: none; font-size: 16px; }
        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-file-code fa-2x"></i>
        <h2>IMPORTAÇÃO VIA XML (NFe)</h2>
        <small>Conferência aberta para ajustes manuais</small>
    </div>

    <label for="fileXML" class="upload-box" id="dropArea">
        <i class="fas fa-upload fa-3x" style="margin-bottom: 15px;"></i><br>
        <strong>CLIQUE AQUI PARA SELECIONAR O XML DA NOTA</strong><br>
        <small>(Ou arraste o arquivo aqui)</small>
        <input type="file" id="fileXML" accept=".xml">
    </label>

    <div id="containerTabela" class="table-container">
        <table id="tabelaItens">
            <thead>
                <tr>
                    <th>CÓDIGO (EAN)</th>
                    <th>PRODUTO (DESCRIÇÃO)</th>
                    <th>PREÇO DE VENDA (R$)</th>
                    <th>QTD ENTRADA</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <button id="btnSalvarTudo" class="btn-salvar" onclick="salvarEstoqueFinal()">
        <i class="fas fa-check-double"></i> TUDO CERTO! SALVAR NO ESTOQUE (A-Z)
    </button>

    <a href="index.html" class="btn-voltar">VOLTAR AO MENU PRINCIPAL</a>
</div>

<script>
    const fileInput = document.getElementById('fileXML');
    const corpoTabela = document.getElementById('corpoTabela');
    const containerTabela = document.getElementById('containerTabela');
    const btnSalvar = document.getElementById('btnSalvarTudo');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            processarXML(xmlDoc);
        };
        reader.readAsText(file);
    });

    function processarXML(xml) {
        const itens = xml.getElementsByTagName("det");
        corpoTabela.innerHTML = '';
        
        if (itens.length === 0) return alert("XML inválido ou sem itens!");

        for (let i = 0; i < itens.length; i++) {
            const prod = itens[i].getElementsByTagName("prod")[0];
            const codigo = prod.getElementsByTagName("cEAN")[0]?.textContent || "SEM-EAN";
            const nome = prod.getElementsByTagName("xProd")[0]?.textContent.toUpperCase() || "SEM NOME";
            const valorCusto = parseFloat(prod.getElementsByTagName("vUnCom")[0]?.textContent || 0);
            const qtd = parseInt(prod.getElementsByTagName("qCom")[0]?.textContent || 0);

            // Cálculo sugerido: Custo + 50% (você pode alterar na tabela)
            const precoSugerido = (valorCusto * 1.5).toFixed(2);

            const row = `
                <tr>
                    <td><input type="text" value="${codigo}"></td>
                    <td><input type="text" value="${nome}"></td>
                    <td><input type="number" step="0.01" value="${precoSugerido}"></td>
                    <td><input type="number" value="${qtd}"></td>
                </tr>
            `;
            corpoTabela.innerHTML += row;
        }

        containerTabela.style.display = 'block';
        btnSalvar.style.display = 'block';
    }

    function salvarEstoqueFinal() {
        const estoqueAtual = JSON.parse(localStorage.getItem('estoqueBoteco934')) || {};
        const linhas = corpoTabela.getElementsByTagName("tr");
        let contagem = 0;

        for (let i = 0; i < linhas.length; i++) {
            const inputs = linhas[i].getElementsByTagName("input");
            const codigo = inputs[0].value.trim();
            const nome = inputs[1].value.trim().toUpperCase();
            const preco = parseFloat(inputs[2].value);
            const qtdNova = parseInt(inputs[3].value);

            if (codigo && nome && !isNaN(preco)) {
                // Se o produto já existe, ele SOMA a quantidade nova à que já tem
                const qtdAntiga = (estoqueAtual[codigo] && estoqueAtual[codigo].qtd) ? estoqueAtual[codigo].qtd : 0;
                
                estoqueAtual[codigo] = {
                    nome: nome,
                    preco: preco,
                    qtd: qtdAntiga + qtdNova
                };
                contagem++;
            }
        }

        // Ordenação A-Z
        const estoqueOrdenado = {};
        Object.keys(estoqueAtual)
            .sort((a, b) => estoqueAtual[a].nome.localeCompare(estoqueAtual[b].nome))
            .forEach(key => {
                estoqueOrdenado[key] = estoqueAtual[key];
            });

        localStorage.setItem('estoqueBoteco934', JSON.stringify(estoqueOrdenado));
        
        alert(`SUCESSO! ${contagem} itens processados e organizados de A a Z.`);
        location.reload();
    }
</script>

</body>
</html>
