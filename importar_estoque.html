<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTÃO DE ESTOQUE | 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; --red: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header i { color: var(--gold); font-size: 30px; }
        .header h2 { color: var(--gold); margin: 5px 0; font-size: 20px; text-transform: uppercase; }

        /* Área XML */
        .upload-section { background: var(--glass); border: 2px dashed rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #fileXML { display: none; }
        .btn-xml { background: var(--gold); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 10px; }

        /* Área Texto/CSV */
        .text-section { background: var(--glass); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        textarea { width: 100%; height: 120px; background: #000; color: var(--green); border: 1px solid #444; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; resize: none; }

        /* Tabela de Conferência */
        .table-container { width: 100%; overflow-x: auto; background: #161b22; border-radius: 12px; margin-top: 20px; display: none; border: 1px solid var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #000; color: var(--gold); padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        input { background: #0b0f19; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }

        .btn-acao { border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }
        .btn-confirmar { background: var(--green); color: black; display: none; }
        .btn-processar-txt { background: #3498db; color: white; margin-top: 5px; font-size: 14px; padding: 12px; }
        
        #avisoDuplicado { display: none; background: var(--red); color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .btn-voltar { display: block; text-align: center; margin-top: 30px; color: #888; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-boxes"></i>
        <h2>Entrada de Mercadoria</h2>
    </div>

    <div class="upload-section">
        <i class="fas fa-file-invoice-dollar" style="font-size: 24px; color: var(--gold);"></i><br>
        <strong>TEM NOTA FISCAL (XML)?</strong><br>
        <label for="fileXML" class="btn-xml">SELECIONAR ARQUIVO</label>
        <input type="file" id="fileXML" accept=".xml">
    </div>

    <div id="avisoDuplicado"><i class="fas fa-ban"></i> NOTA JÁ IMPORTADA ANTES!</div>

    <div class="text-section">
        <strong>COPIAR DA PLANILHA (CSV)</strong>
        <p style="font-size: 10px; color: #888; margin: 5px 0;">Formato: CÓDIGO;NOME;PREÇO;QTD</p>
        <textarea id="listaTexto" placeholder="789123;PRODUTO;5.50;12"></textarea>
        <button class="btn-acao btn-processar-txt" onclick="processarTexto()">
            <i class="fas fa-list"></i> CARREGAR DA LISTA
        </button>
    </div>

    <div id="containerTabela" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>PRODUTO / EAN</th>
                    <th width="80">PREÇO R$</th>
                    <th width="60">QTD</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
        <button id="btnConfirmarTudo" class="btn-acao btn-confirmar" onclick="salvarEstoqueFinal()">
            <i class="fas fa-check-double"></i> CONFIRMAR E SALVAR TUDO
        </button>
    </div>

    <a href="index.html" class="btn-voltar">VOLTAR AO MENU PRINCIPAL</a>
</div>

<script>
    let chaveNota = "";
    const estoqueKey = 'estoqueBoteco934';
    const notasKey = 'notasImportadas934';

    // LOGICA PARA XML
    document.getElementById('fileXML').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            
            const infNFe = xmlDoc.getElementsByTagName("infNFe")[0];
            chaveNota = infNFe ? infNFe.getAttribute("Id") : "";

            const notasLidas = JSON.parse(localStorage.getItem(notasKey)) || [];
            if (chaveNota && notasLidas.includes(chaveNota)) {
                document.getElementById('avisoDuplicado').style.display = "block";
                document.getElementById('containerTabela').style.display = "none";
            } else {
                document.getElementById('avisoDuplicado').style.display = "none";
                lerItensXML(xmlDoc);
            }
        };
        reader.readAsText(file);
    });

    function lerItensXML(xml) {
        const itens = xml.getElementsByTagName("det");
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        
        for (let i = 0; i < itens.length; i++) {
            const prod = itens[i].getElementsByTagName("prod")[0];
            const codigo = prod.getElementsByTagName("cEAN")[0]?.textContent || "S/EAN";
            const nome = prod.getElementsByTagName("xProd")[0]?.textContent.toUpperCase() || "SEM NOME";
            const custo = parseFloat(prod.getElementsByTagName("vUnCom")[0]?.textContent || 0);
            const qtd = parseInt(prod.getElementsByTagName("qCom")[0]?.textContent || 0);
            const venda = (custo * 1.5).toFixed(2);

            adicionarLinhaTabela(codigo, nome, venda, qtd);
        }
        abrirTabela();
    }

    // LOGICA PARA TEXTO (PLANILHA)
    function processarTexto() {
        const texto = document.getElementById('listaTexto').value.trim();
        if (!texto) return alert("Cole os dados da planilha!");
        
        const linhas = texto.split('\n');
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        chaveNota = ""; // Limpa chave pois não é XML

        linhas.forEach(linha => {
            const p = linha.split(';');
            if (p.length >= 3) {
                const cod = p[0].trim();
                const nom = p[1].trim().toUpperCase();
                const pre = parseFloat(p[2].trim());
                const qtd = p[3] ? parseInt(p[3].trim()) : 0;
                adicionarLinhaTabela(cod, nom, pre, qtd);
            }
        });
        abrirTabela();
    }

    function adicionarLinhaTabela(cod, nom, pre, qtd) {
        document.getElementById('corpoTabela').innerHTML += `
            <tr>
                <td><input type="hidden" value="${cod}"><input type="text" value="${nom}"></td>
                <td><input type="number" step="0.01" value="${pre}"></td>
                <td><input type="number" value="${qtd}"></td>
            </tr>`;
    }

    function abrirTabela() {
        document.getElementById('containerTabela').style.display = 'block';
        document.getElementById('btnConfirmarTudo').style.display = 'block';
    }

    function salvarEstoqueFinal() {
        const estoque = JSON.parse(localStorage.getItem(estoqueKey)) || {};
        const linhas = document.querySelectorAll("#corpoTabela tr");
        
        linhas.forEach(tr => {
            const inputs = tr.querySelectorAll("input");
            const cod = inputs[0].value;
            const nom = inputs[1].value.toUpperCase();
            const pre = parseFloat(inputs[2].value);
            const qtdN = parseInt(inputs[3].value);
            const qtdA = estoque[cod] ? estoque[cod].qtd : 0;
            estoque[cod] = { nome: nom, preco: pre, qtd: qtdA + qtdN };
        });

        if (chaveNota) {
            const notas = JSON.parse(localStorage.getItem(notasKey)) || [];
            notas.push(chaveNota);
            localStorage.setItem(notasKey, JSON.stringify(notas));
        }

        localStorage.setItem(estoqueKey, JSON.stringify(estoque));
        alert("ESTOQUE ATUALIZADO!");
        location.reload();
    }
</script>
</body>
</html>
