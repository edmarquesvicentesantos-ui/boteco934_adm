<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPORTADOR XML | 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; --red: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header i { color: var(--gold); font-size: 35px; }
        
        .upload-box { border: 2px solid rgba(255, 215, 0, 0.3); padding: 30px 20px; border-radius: 20px; text-align: center; background: var(--glass); display: block; cursor: pointer; }
        #fileXML { display: none; }

        /* Alerta de Nota Duplicada */
        #avisoDuplicado { display: none; background: var(--red); color: white; padding: 10px; border-radius: 10px; margin-top: 15px; text-align: center; font-weight: bold; font-size: 13px; animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 100% { transform: translateX(0); } }

        .table-container { width: 100%; overflow-x: auto; background: var(--glass); border-radius: 12px; margin-top: 20px; display: none; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1a1f2c; color: var(--gold); padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        input { background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }

        .btn-salvar { background: var(--green); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 20px; font-size: 16px; display: none; }
        .btn-voltar { display: block; text-align: center; margin-top: 30px; color: var(--gold); text-decoration: none; font-weight: bold; font-size: 13px; border: 1px solid var(--gold); padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-file-invoice"></i>
        <h2 style="color:var(--gold); margin:10px 0 0 0; font-size:18px;">IMPORTAÇÃO DE NOTA</h2>
    </div>

    <label for="fileXML" class="upload-box">
        <i class="fas fa-cloud-upload-alt" style="font-size:40px; color:var(--gold);"></i><br>
        <strong>SELECIONAR XML DA NOTA</strong>
        <input type="file" id="fileXML" accept=".xml">
    </label>

    <div id="avisoDuplicado">
        <i class="fas fa-exclamation-triangle"></i> ATENÇÃO: ESTA NOTA JÁ FOI IMPORTADA ANTES!
    </div>

    <div id="containerTabela" class="table-container">
        <table id="tabelaItens">
            <thead>
                <tr>
                    <th>PRODUTO</th>
                    <th width="70">PREÇO</th>
                    <th width="50">QTD</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <button id="btnSalvarTudo" class="btn-salvar" onclick="salvarEstoqueFinal()">
        <i class="fas fa-check-circle"></i> CONFIRMAR ENTRADA
    </button>

    <a href="index.html" class="btn-voltar">VOLTAR AO MENU</a>
</div>

<script>
    let chaveAtual = "";
    const fileInput = document.getElementById('fileXML');
    const aviso = document.getElementById('avisoDuplicado');
    const btnSalvar = document.getElementById('btnSalvarTudo');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            
            // PEGA A CHAVE DE ACESSO DA NOTA (Identidade única)
            const infNFe = xmlDoc.getElementsByTagName("infNFe")[0];
            chaveAtual = infNFe ? infNFe.getAttribute("Id") : "";

            if (verificarNotaDuplicada(chaveAtual)) {
                aviso.style.display = "block";
                btnSalvar.style.display = "none"; // Bloqueia o botão
                document.getElementById('containerTabela').style.display = "none";
            } else {
                aviso.style.display = "none";
                processarXML(xmlDoc);
            }
        };
        reader.readAsText(file);
    });

    function verificarNotaDuplicada(chave) {
        if (!chave) return false;
        const notasLidas = JSON.parse(localStorage.getItem('notasImportadas934')) || [];
        return notasLidas.includes(chave);
    }

    function processarXML(xml) {
        const itens = xml.getElementsByTagName("det");
        const corpoTabela = document.getElementById('corpoTabela');
        corpoTabela.innerHTML = '';
        
        for (let i = 0; i < itens.length; i++) {
            const prod = itens[i].getElementsByTagName("prod")[0];
            const codigo = prod.getElementsByTagName("cEAN")[0]?.textContent || "S/EAN";
            const nome = prod.getElementsByTagName("xProd")[0]?.textContent.toUpperCase() || "SEM NOME";
            const valorCusto = parseFloat(prod.getElementsByTagName("vUnCom")[0]?.textContent || 0);
            const qtd = parseInt(prod.getElementsByTagName("qCom")[0]?.textContent || 0);
            const precoSugerido = (valorCusto * 1.5).toFixed(2);

            corpoTabela.innerHTML += `
                <tr>
                    <td><input type="hidden" value="${codigo}"><input type="text" value="${nome}"></td>
                    <td><input type="number" step="0.01" value="${precoSugerido}"></td>
                    <td><input type="number" value="${qtd}"></td>
                </tr>`;
        }
        document.getElementById('containerTabela').style.display = 'block';
        btnSalvar.style.display = 'block';
    }

    function salvarEstoqueFinal() {
        const estoqueAtual = JSON.parse(localStorage.getItem('estoqueBoteco934')) || {};
        const linhas = document.querySelectorAll("#corpoTabela tr");
        
        linhas.forEach(tr => {
            const inputs = tr.querySelectorAll("input");
            const codigo = inputs[0].value;
            const nome = inputs[1].value.toUpperCase();
            const preco = parseFloat(inputs[2].value);
            const qtdNova = parseInt(inputs[3].value);

            const qtdAntiga = estoqueAtual[codigo] ? estoqueAtual[codigo].qtd : 0;
            estoqueAtual[codigo] = { nome: nome, preco: preco, qtd: qtdAntiga + qtdNova };
        });

        // SALVA A CHAVE DA NOTA PARA NÃO REPETIR
        if (chaveAtual) {
            const notasLidas = JSON.parse(localStorage.getItem('notasImportadas934')) || [];
            notasLidas.push(chaveAtual);
            localStorage.setItem('notasImportadas934', JSON.stringify(notasLidas));
        }

        localStorage.setItem('estoqueBoteco934', JSON.stringify(estoqueAtual));
        alert("ESTOQUE ATUALIZADO E NOTA REGISTRADA!");
        location.reload();
    }
</script>
</body>
</html>
