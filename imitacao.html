<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - V1.7 OFICIAL</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #ff8c00; --text: #c9d1d9; --success: #238636; --destilado: #2b7da3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); }
        
        .header { background: #000; padding: 15px; border-bottom: 3px solid var(--accent); text-align: center; }
        .header h1 { font-size: 24px; font-weight: 900; color: #fff; }
        .header span { color: var(--accent); }

        nav { display: flex; background: #161b22; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #30363d; }
        nav button { flex: 1; padding: 18px; border: none; background: none; color: #8b949e; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        nav button.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        .win { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--accent); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 10px; font-size: 16px; }
        
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .mesa { background: var(--card); border: 2px solid #30363d; padding: 25px 5px; border-radius: 10px; text-align: center; cursor: pointer; }
        .mesa.ocupada { border-color: var(--accent); background: #1c160d; }

        #modal-caixa, .modal-full { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; display: none; padding: 10px; overflow-y: auto; }
        .caixa-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 800px) { .caixa-grid { grid-template-columns: 1fr 400px; } }

        .cupom { background: #fff; color: #000; border-radius: 8px; padding: 15px; font-family: monospace; min-height: 200px; display: flex; flex-direction: column; }
        .total-venda { font-size: 38px; font-weight: 900; text-align: right; color: var(--success); }
        
        .btn { padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-bottom: 8px; }
        .btn-x { background: #ff4444; color: white; padding: 5px 10px; border-radius: 4px; border:none; margin-right: 5px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td, th { padding: 12px 8px; border-bottom: 1px solid #30363d; text-align: left; }
    </style>
</head>
<body>

<div class="header"><h1>BOTECO <span>934</span></h1></div>

<nav>
    <button onclick="tab('vendas', this)" class="active">VENDAS</button>
    <button onclick="tab('cadastro', this)">PRODUTOS</button>
    <button onclick="tab('clientes', this)">CLIENTES</button>
</nav>

<div class="container">
    <div id="vendas" class="page active"><div class="grid-mesas" id="grid-mesas"></div></div>

    <div id="cadastro" class="page">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
            <div class="win">
                <h3 style="color:var(--accent); margin-bottom:10px;">BEBIDAS / CERVEJAS</h3>
                <label>NOME</label><input type="text" id="p-nome">
                <label>CÓDIGO (BIP)</label><input type="text" id="p-cod">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div><label>CUSTO FARDO</label><input type="number" id="f-custo" oninput="recalcGeral()"></div>
                    <div><label>LUCRO %</label><input type="number" id="p-lucro" value="100" oninput="recalcGeral()"></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div><label>VDA UN</label><input type="text" id="res-un" readonly></div>
                    <div><label>VDA FARDO</label><input type="text" id="res-fardo" readonly></div>
                </div>
                <button class="btn" style="background:var(--success); color:white;" onclick="salvarProd('GERAL')">SALVAR PRODUTO</button>
            </div>
            <div class="win" style="border-left: 5px solid var(--destilado);">
                <h3 style="color:var(--destilado); margin-bottom:10px;">DESTILADOS</h3>
                <label>NOME</label><input type="text" id="d-nome">
                <label>CÓDIGO (BIP)</label><input type="text" id="d-cod">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div><label>CUSTO GARR</label><input type="number" id="d-custo-garr" oninput="recalcDestilado()"></div>
                    <div><label>LUCRO %</label><input type="number" id="d-lucro" value="100" oninput="recalcDestilado()"></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div><label>VDA GARR</label><input type="text" id="res-d-garr" readonly></div>
                    <div><label>VDA DOSE</label><input type="text" id="res-d-dose" readonly></div>
                </div>
                <button class="btn" style="background:var(--destilado); color:white;" onclick="salvarProd('DESTILADO')">SALVAR DESTILADO</button>
            </div>
        </div>
        <div class="win">
            <table><thead><tr><th>ITEM</th><th>UN/GARR</th><th>FARDO</th><th>DOSE</th><th>X</th></tr></thead><tbody id="lista-estoque-body"></tbody></table>
        </div>
    </div>

    <div id="clientes" class="page">
        <div class="win" style="max-width:400px; margin:auto;">
            <label>NOME DO CLIENTE</label><input type="text" id="c-nome">
            <label>WHATSAPP (879...)</label><input type="number" id="c-zap">
            <button class="btn" style="background:var(--accent); color:black;" onclick="salvarCli()">CADASTRAR</button>
        </div>
        <div class="win">
            <table><thead><tr><th>NOME</th><th>WHATSAPP</th><th>X</th></tr></thead><tbody id="lista-clientes-body"></tbody></table>
        </div>
    </div>
</div>

<div id="modal-caixa">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 id="titulo-caixa" style="color:var(--accent); font-size:18px;">MESA</h2>
        <button class="btn" style="width:45px; background:red; color:white; margin:0;" onclick="fecharCaixa()">X</button>
    </div>
    <div class="caixa-grid">
        <div class="win">
            <div style="display:flex; gap:10px; margin-bottom:10px; font-weight:bold;">
                <label><input type="radio" name="m" value="un" checked> UN/GARR</label>
                <label><input type="radio" name="m" value="fardo"> FARDO</label>
                <label><input type="radio" name="m" value="dose"> DOSE</label>
            </div>
            <input type="text" id="bip" onkeydown="leitor(event)" placeholder="BIPE O ITEM..." style="font-size:22px; height:55px; text-align:center; border:2px solid var(--accent); background:#000;">
            <button class="btn" style="background:#444; color:white;" onclick="dividirConta()">➗ DIVIDIR</button>
            <button class="btn" style="background:var(--success); color:white;" onclick="abrirPagamento()">PAGO</button>
            <button class="btn" style="background:var(--accent); color:black;" onclick="abrirFiado()">FIADO</button>
        </div>
        <div class="cupom">
            <div id="itens-cupom" style="flex:1; overflow-y:auto; font-size:12px; color:#000;"></div>
            <div id="resumo-divisao" style="font-weight:bold; color:blue; font-size:12px; text-align:right;"></div>
            <div class="total-venda" id="total-venda">R$ 0.00</div>
        </div>
    </div>
</div>

<div id="modal-pag" class="modal-full">
    <div class="win" style="max-width:350px; margin: 40px auto; text-align:center;">
        <h3 style="color:var(--accent); margin-bottom:20px;">PAGAMENTO</h3>
        <button class="btn" style="background:#2ecc71; color:white;" onclick="finalizar('DINHEIRO')">DINHEIRO</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="finalizar('PIX')">PIX</button>
        <button class="btn" style="background:#9b59b6; color:white;" onclick="finalizar('CARTÃO')">CARTÃO</button>
        <button class="btn" style="background:#444; color:white;" onclick="this.parentElement.parentElement.style.display='none'">VOLTAR</button>
    </div>
</div>

<div id="modal-fiado" class="modal-full">
    <div class="win" style="max-width:400px; margin: 40px auto;">
        <h3 style="color:var(--accent); margin-bottom:15px;">DEVEDOR:</h3>
        <div id="lista-fiado-clientes" style="max-height:350px; overflow-y:auto;"></div>
        <button class="btn" style="background:#444; color:white; margin-top:10px;" onclick="this.parentElement.parentElement.style.display='none'">VOLTAR</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('boteco_934_vRedonda')) || { produtos: {}, clientes: {}, mesas: Array.from({length: 15}, (_, i) => ({ id: i+1, cli: "", ativa: false, itens: [] })) };
    let mesaAtiva = null;

    function salvarDB() { localStorage.setItem('boteco_934_vRedonda', JSON.stringify(db)); }
    function tab(p, b) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.querySelectorAll('nav button').forEach(x => x.classList.remove('active')); document.getElementById(p).classList.add('active'); b.classList.add('active'); }

    function recalcGeral() {
        let c = parseFloat(document.getElementById('f-custo').value) || 0;
        let m = (parseFloat(document.getElementById('p-lucro').value) || 0) / 100;
        document.getElementById('res-un').value = ((c/12) * (1 + m)).toFixed(2);
        document.getElementById('res-fardo').value = (c * (1 + m)).toFixed(2);
    }

    function recalcDestilado() {
        let c = parseFloat(document.getElementById('d-custo-garr').value) || 0;
        let m = (parseFloat(document.getElementById('d-lucro').value) || 0) / 100;
        let vg = c * (1 + m);
        document.getElementById('res-d-garr').value = vg.toFixed(2);
        document.getElementById('res-d-dose').value = ((vg / 15) * 1.25).toFixed(2);
    }

    function salvarProd(t) {
        let cod = t === 'GERAL' ? document.getElementById('p-cod').value : document.getElementById('d-cod').value;
        let n = (t === 'GERAL' ? document.getElementById('p-nome').value : document.getElementById('d-nome').value).toUpperCase();
        if(!cod || !n) return alert("Preencha Nome e Código!");
        db.produtos[cod] = { n: n, un: parseFloat(t === 'GERAL' ? document.getElementById('res-un').value : document.getElementById('res-d-garr').value), f: parseFloat(t === 'GERAL' ? document.getElementById('res-fardo').value : 0), d: parseFloat(t === 'GERAL' ? 0 : document.getElementById('res-d-dose').value) };
        salvarDB(); renderEstoque();
    }

    function renderEstoque() {
        let h = "";
        Object.keys(db.produtos).sort((a,b)=>db.produtos[a].n.localeCompare(db.produtos[b].n)).forEach(k => { 
            let p = db.produtos[k]; 
            h += `<tr><td>${p.n}</td><td>${p.un.toFixed(2)}</td><td>${p.f.toFixed(2)}</td><td>${p.d.toFixed(2)}</td><td onclick="delP('${k}')" style="color:red;">X</td></tr>`; 
        });
        document.getElementById('lista-estoque-body').innerHTML = h;
    }

    function salvarCli() {
        let n = document.getElementById('c-nome').value.toUpperCase(); if(!n) return;
        db.clientes[n] = { n: n, z: document.getElementById('c-zap').value };
        salvarDB(); renderClientes();
    }

    function renderClientes() {
        let h = "";
        Object.keys(db.clientes).sort().forEach(k => { 
            h += `<tr><td>${db.clientes[k].n}</td><td>${db.clientes[k].z}</td><td onclick="delC('${k}')" style="color:red;">X</td></tr>`; 
        });
        document.getElementById('lista-clientes-body').innerHTML = h;
    }

    function abrirMesa(id) {
        mesaAtiva = db.mesas.find(m => m.id === id);
        if(!mesaAtiva.ativa) {
            let n = prompt("NOME NA MESA:"); if(!n) return;
            mesaAtiva.cli = n.toUpperCase(); mesaAtiva.ativa = true; mesaAtiva.itens = []; salvarDB();
        }
        document.getElementById('modal-caixa').style.display='block';
        document.getElementById('titulo-caixa').innerText = `MESA ${id} - ${mesaAtiva.cli}`;
        atualizarCupom();
        setTimeout(() => document.getElementById('bip').focus(), 300);
    }

    function leitor(e) {
        if(e.key === 'Enter') {
            let p = db.produtos[e.target.value.trim()];
            let modo = document.querySelector('input[name="m"]:checked').value;
            if(p) {
                let v = modo === 'un' ? p.un : (modo === 'fardo' ? p.f : p.d);
                mesaAtiva.itens.push({ n: p.n + " ("+modo.toUpperCase()+")", v: v });
                salvarDB(); atualizarCupom();
            }
            e.target.value = "";
        }
    }

    function atualizarCupom() {
        let t = 0; let h = "";
        mesaAtiva.itens.forEach((it, i) => {
            t += it.v;
            h += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #eee;">
                <span><button class="btn-x" onclick="removerItem(${i})">X</button>${it.n}</span>
                <span>R$ ${it.v.toFixed(2)}</span>
            </div>`;
        });
        document.getElementById('itens-cupom').innerHTML = h;
        document.getElementById('total-venda').innerText = "R$ " + t.toFixed(2);
    }

    function removerItem(i) { mesaAtiva.itens.splice(i, 1); salvarDB(); atualizarCupom(); }

    function dividirConta() {
        let p = prompt("PARA QUANTOS?");
        if(p > 0) {
            let total = parseFloat(document.getElementById('total-venda').innerText.replace("R$ ",""));
            document.getElementById('resumo-divisao').innerText = `${p} PESSOAS: R$ ${(total/p).toFixed(2)} CADA`;
        }
    }

    function abrirPagamento() { document.getElementById('modal-pag').style.display='block'; }
    function abrirFiado() {
        let h = "";
        Object.keys(db.clientes).sort().forEach(k => { 
            h += `<button class="btn" style="background:#333; color:white;" onclick="finalizar('FIADO', '${k}')">${db.clientes[k].n}</button>`; 
        });
        document.getElementById('lista-fiado-clientes').innerHTML = h || "CADASTRE CLIENTES!";
        document.getElementById('modal-fiado').style.display='block';
    }

    function finalizar(tipo, devedor = "") {
        let total = document.getElementById('total-venda').innerText;
        let itTxt = "";
        mesaAtiva.itens.forEach(it => { itTxt += `• ${it.n}: R$ ${it.v.toFixed(2)}\n`; });

        let msg = `*BOTECO 934 - RECIBO*\n------------------\n*CLIENTE:* ${devedor ? db.clientes[devedor].n : mesaAtiva.cli}\n------------------\n${itTxt}------------------\n*TIPO:* ${tipo}\n*TOTAL:* ${total}\n\nOBRIGADO! 🍻`;

        let zap = devedor ? db.clientes[devedor].z : (db.clientes[mesaAtiva.cli] ? db.clientes[mesaAtiva.cli].z : "");
        
        if(zap) {
            window.location.href = `whatsapp://send?phone=55${zap}&text=${encodeURIComponent(msg)}`;
        } else {
            alert("FINALIZADO!");
        }

        mesaAtiva.ativa = false; mesaAtiva.itens = []; mesaAtiva.cli = "";
        salvarDB();
        document.querySelectorAll('.modal-full, #modal-caixa').forEach(m => m.style.display='none');
        renderMesas();
    }

    function renderMesas() { document.getElementById('grid-mesas').innerHTML = db.mesas.map(m => `<div class="mesa ${m.ativa?'ocupada':''}" onclick="abrirMesa(${m.id})"><b>MESA ${m.id}</b><small>${m.ativa?m.cli:'LIVRE'}</small></div>`).join(''); }
    function fecharCaixa() { document.getElementById('modal-caixa').style.display='none'; }
    function delP(k) { if(confirm("EXCLUIR?")) { delete db.produtos[k]; salvarDB(); renderEstoque(); } }
    function delC(k) { if(confirm("EXCLUIR?")) { delete db.clientes[k]; salvarDB(); renderClientes(); } }

    window.onload = () => { renderMesas(); renderEstoque(); renderClientes(); };
</script>
</body>
</html>
