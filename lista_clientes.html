<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIENTES | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .header h2 { color: var(--gold); text-transform: uppercase; margin: 5px 0; }

        .search-box { width: 100%; margin-bottom: 20px; position: relative; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 10px; border: 1px solid #444; background: #161b22; color: white; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 12px; color: var(--gold); }

        .lista-container { background: var(--glass); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .cliente-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .cliente-item:last-child { border-bottom: none; }
        
        .nome-cliente { font-weight: bold; font-size: 16px; text-transform: capitalize; }
        .contato-cliente { font-size: 12px; color: #888; display: block; }
        
        .btn-acao { color: var(--gold); background: none; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: var(--gold); text-decoration: none; font-size: 13px; padding: 10px; border: 1px solid var(--gold); border-radius: 8px; }
        .contador { text-align: center; font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-users fa-2x" style="color: var(--gold);"></i>
        <h2>Lista de Clientes</h2>
    </div>

    <div class="search-box">
        <input type="text" id="busca" placeholder="Procurar cliente..." onkeyup="filtrarClientes()">
        <i class="fas fa-search"></i>
    </div>

    <div class="lista-container" id="lista-clientes">
        </div>

    <div class="contador" id="total-clientes">Carregando...</div>

    <a href="index.html" class="btn-voltar">VOLTAR AO INÍCIO</a>
</div>

<script>
    function carregarClientes() {
        // Pega os dados que você já tem salvos no seu navegador
        const clientesSalvos = JSON.parse(localStorage.getItem('clientesBoteco934')) || [];
        const listaDiv = document.getElementById('lista-clientes');
        const contadorDiv = document.getElementById('total-clientes');

        if (clientesSalvos.length === 0) {
            listaDiv.innerHTML = '<div style="padding: 20px; text-align:center; color:#555;">Nenhum cliente cadastrado.</div>';
            contadorDiv.innerText = "0 clientes encontrados";
            return;
        }

        // 1. Organiza em Ordem Alfabética
        clientesSalvos.sort((a, b) => a.nome.localeCompare(b.nome));

        // 2. Renderiza na tela
        listaDiv.innerHTML = '';
        clientesSalvos.forEach(cliente => {
            // Garante letras maiúsculas no início de cada palavra
            const nomeFormatado = cliente.nome.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, letra => letra.toUpperCase());
            
            listaDiv.innerHTML += `
                <div class="cliente-item">
                    <div>
                        <span class="nome-cliente">${nomeFormatado}</span>
                        <span class="contato-cliente"><i class="fas fa-phone-alt"></i> ${cliente.contato || 'Sem contato'}</span>
                    </div>
                    <button class="btn-acao" onclick="alert('Ver detalhes de ${nomeFormatado}')">VER</button>
                </div>
            `;
        });

        contadorDiv.innerText = `${clientesSalvos.length} clientes na lista`;
    }

    function filtrarClientes() {
        const input = document.getElementById('busca').value.toUpperCase();
        const itens = document.getElementsByClassName('cliente-item');

        for (let i = 0; i < itens.length; i++) {
            let nome = itens[i].getElementsByClassName('nome-cliente')[0].innerText;
            if (nome.toUpperCase().indexOf(input) > -1) {
                itens[i].style.display = "";
            } else {
                itens[i].style.display = "none";
            }
        }
    }

    // Inicia a lista ao abrir a página
    carregarClientes();
</script>

</body>
</html>
