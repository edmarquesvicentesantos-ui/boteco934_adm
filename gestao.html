<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 - GESTÃO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0b0b0b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin: 10px 0; }
        button { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--gold); text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <h1>📦 Gestão e Estoque</h1>
    
    <div class="card">
        <h3>Cadastrar Nova Mercadoria</h3>
        <input type="text" id="nome" placeholder="Nome (Ex: Brahma Chopp)">
        <input type="number" id="custo" placeholder="Custo Total do Fardo">
        <input type="number" id="qtd" placeholder="Quantidade no Fardo" value="1">
        <input type="number" id="venda" placeholder="Preço de Venda Unitário">
        <button onclick="salvar()">Salvar no Sistema</button>
    </div>

    <div class="card">
        <h3>Lista de Produtos</h3>
        <table>
            <thead><tr><th>PRODUTO</th><th>CUSTO UN.</th><th>VENDA</th><th>AÇÃO</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        let estoque = JSON.parse(localStorage.getItem('boteco_est')) || [];

        function salvar() {
            const n = document.getElementById('nome').value;
            const c = parseFloat(document.getElementById('custo').value) || 0;
            const q = parseInt(document.getElementById('qtd').value) || 1;
            const v = parseFloat(document.getElementById('venda').value) || 0;
            
            if(!n || !v) return alert("Preencha o nome e preço de venda!");
            
            estoque.push({ nome: n, custo: c/q, venda: v });
            localStorage.setItem('boteco_est', JSON.stringify(estoque));
            location.reload();
        }

        function render() {
            const tbody = document.getElementById('lista');
            tbody.innerHTML = estoque.map((p, i) => `
                <tr>
                    <td>${p.nome}</td>
                    <td>R$ ${p.custo.toFixed(2)}</td>
                    <td>R$ ${p.venda.toFixed(2)}</td>
                    <td onclick="remover(${i})" style="color:red; cursor:pointer;">🗑️</td>
                </tr>
            `).join('');
        }

        function remover(i) {
            estoque.splice(i, 1);
            localStorage.setItem('boteco_est', JSON.stringify(estoque));
            render();
        }
        render();
    </script>
</body>
</html>
