<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 - GESTÃO E PRECIFICAÇÃO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --gray: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-size: 13px; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        
        /* Cabeçalho com espaço para Logo */
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--gold); background: #000; }
        
        .card { background: var(--gray); padding: 15px; border-radius: 8px; border: 1px solid #222; margin-bottom: 15px; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin: 5px 0; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--gold); }
        button { width: 100%; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; transition: 0.2s; }
        
        /* Estilo da Calculadora Robusta */
        .calc-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .res-box { background: #000; padding: 15px; border-radius: 6px; border: 1px solid #25d366; text-align: center; }
        label { font-size: 11px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">934</div>
    <div>
        <h1 style="font-size: 16px; letter-spacing: 1px;">BOTECO 934</h1>
        <p style="font-size: 11px; color: var(--gold);">PAINEL DE ESTRATÉGIA E GESTÃO</p>
    </div>
</header>

<div class="card" style="border-left: 4px solid var(--gold);">
    <h2 style="color: var(--gold); margin-bottom: 10px;">📊 Calculadora de Precificação</h2>
    <div class="calc-container">
        <div>
            <label>Custo do Fardo/Caixa</label>
            <input type="number" id="c_fardo" placeholder="0,00" oninput="rodarCalculo()">
            <label>Unidades no Fardo</label>
            <input type="number" id="c_qtd" placeholder="Ex: 12" oninput="rodarCalculo()">
            <label>Margem de Lucro (%)</label>
            <input type="number" id="c_margem" value="30" oninput="rodarCalculo()">
        </div>
        <div class="res-box">
            <label>Preço de Venda Sugerido</label>
            <div id="venda_sugerida" style="font-size: 24px; font-weight: 900; color: var(--gold); margin: 10px 0;">R$ 0,00</div>
            <label>Custo Unitário: <span id="custo_un" style="color:#fff;">R$ 0,00</span></label><br>
            <label>Lucro/Unidade: <span id="lucro_un" style="color:#25d366;">R$ 0,00</span></label>
        </div>
    </div>
    <button onclick="copiarParaCadastro()" style="margin-top: 10px; background: #fff; color: #000;">
        USAR ESTES VALORES NO CADASTRO ↓
    </button>
</div>

<div class="card">
    <h2 style="margin-bottom: 10px;">📦 Cadastro de Mercadoria</h2>
    <input type="text" id="nome" placeholder="Nome do Produto (Ex: Heineken 600ml)">
    <div style="display: flex; gap: 5px;">
        <input type="number" id="custo" placeholder="Custo Fardo">
        <input type="number" id="qtd" placeholder="Qtd">
        <input type="number" id="venda" placeholder="Preço Venda">
    </div>
    <button onclick="salvarProduto()" style="background: var(--gold); color: #000; margin-top: 10px;">SALVAR NO SISTEMA</button>
</div>

<script>
    function rodarCalculo() {
        const fardo = parseFloat(document.getElementById('c_fardo').value) || 0;
        const unidades = parseInt(document.getElementById('c_qtd').value) || 1;
        const margem = parseFloat(document.getElementById('c_margem').value) || 0;

        const unitario = fardo / unidades;
        const sugerido = unitario * (1 + (margem / 100));
        const lucro = sugerido - unitario;

        document.getElementById('custo_un').innerText = `R$ ${unitario.toFixed(2)}`;
        document.getElementById('venda_sugerida').innerText = `R$ ${sugerido.toFixed(2)}`;
        document.getElementById('lucro_un').innerText = `R$ ${lucro.toFixed(2)}`;
    }

    function copiarParaCadastro() {
        const preco = document.getElementById('venda_sugerida').innerText.replace('R$ ', '');
        document.getElementById('venda').value = preco;
        document.getElementById('custo').value = document.getElementById('c_fardo').value;
        document.getElementById('qtd').value = document.getElementById('c_qtd').value;
    }

    function salvarProduto() {
        const nome = document.getElementById('nome').value;
        const custo = parseFloat(document.getElementById('custo').value) || 0;
        const qtd = parseInt(document.getElementById('qtd').value) || 1;
        const venda = parseFloat(document.getElementById('venda').value) || 0;

        if(!nome || !venda) return alert("Preencha o nome e o preço de venda!");

        let estoque = JSON.parse(localStorage.getItem('boteco_est')) || [];
        estoque.push({ nome, custo: custo/qtd, venda });
        localStorage.setItem('boteco_est', JSON.stringify(estoque));
        
        alert("Produto salvo com sucesso!");
        location.reload();
    }
</script>
</body>
</html>
