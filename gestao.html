<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 - GESTÃO E ESTRATÉGIA</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --gray: #111; --destilado: #ff4500; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-size: 13px; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        
        .card { background: var(--gray); padding: 15px; border-radius: 8px; border: 1px solid #222; margin-bottom: 15px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 10px; }
        
        input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin-top: 5px; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .res-destaque { background: #000; padding: 20px; border-radius: 8px; border: 2px solid var(--gold); text-align: center; }
        
        .btn-copy { width: 100%; padding: 15px; background: #fff; color: #000; font-weight: bold; border-radius: 4px; margin-top: 15px; cursor: pointer; border: none; }
        .btn-save { width: 100%; padding: 15px; background: var(--gold); color: #000; font-weight: bold; border-radius: 4px; margin-top: 15px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="card" style="border-top: 4px solid var(--gold);">
    <h2 style="color: var(--gold); margin-bottom: 15px;">📊 Calculadora Robusta 934</h2>
    
    <div class="calc-grid">
        <div>
            <label>O que você vai precificar?</label>
            <select id="tipo_prod" onchange="ajustarMargem()">
                <option value="cerveja">Cervejas / Bebidas (Geral)</option>
                <option value="destilado">Destilados / Doses</option>
            </select>

            <label id="label_custo">Custo da Garrafa/Fardo (R$)</label>
            <input type="number" id="c_custo" placeholder="0.00" oninput="calcularPreco()">

            <label id="label_unidades">Unidades ou Doses (Quantidade)</label>
            <input type="number" id="c_unidades" value="1" oninput="calcularPreco()">

            <label>Margem de Lucro (%)</label>
            <input type="number" id="c_margem" value="30" oninput="calcularPreco()">
        </div>

        <div class="res-destaque">
            <label style="color:var(--gold)">Sugestão de Venda (Un/Dose)</label>
            <div id="venda_final" style="font-size: 32px; font-weight: 900; color: #fff; margin: 15px 0;">R$ 0,00</div>
            
            <div style="text-align: left; border-top: 1px solid #222; padding-top: 10px;">
                <p>Custo por Dose/Un: <span id="res_custo" style="float: right;">R$ 0,00</span></p>
                <p style="color:#25d366">Lucro por Dose/Un: <span id="res_lucro" style="float: right;">R$ 0,00</span></p>
            </div>
        </div>
    </div>

    <button class="btn-copy" onclick="copiarValores()">COPIAR PARA O CADASTRO ↓</button>
</div>

<div class="card">
    <h2 style="margin-bottom: 10px;">📦 Cadastro Final</h2>
    <input type="text" id="nome_final" placeholder="Nome do Produto">
    <div style="display: flex; gap: 10px;">
        <input type="number" id="form_custo" placeholder="Custo Un.">
        <input type="number" id="form_venda" placeholder="Venda Un.">
    </div>
    <button class="btn-save" onclick="salvarEstoque()">SALVAR NO ESTOQUE</button>
</div>

<script>
    function ajustarMargem() {
        const tipo = document.getElementById('tipo_prod').value;
        const margemInput = document.getElementById('c_margem');
        
        if (tipo === 'destilado') {
            margemInput.value = 100; // Sugestão inicial de 100% para doses
            document.getElementById('label_custo').innerText = "Custo da Garrafa (R$)";
            document.getElementById('label_unidades').innerText = "Quantas Doses por Garrafa?";
        } else {
            margemInput.value = 30;
            document.getElementById('label_custo').innerText = "Custo do Fardo/Caixa (R$)";
            document.getElementById('label_unidades').innerText = "Unidades no Fardo";
        }
        calcularPreco();
    }

    function calcularPreco() {
        const custoTotal = parseFloat(document.getElementById('c_custo').value) || 0;
        const qtd = parseFloat(document.getElementById('c_unidades').value) || 1;
        const margem = parseFloat(document.getElementById('c_margem').value) || 0;

        const custoUnitario = custoTotal / qtd;
        // Cálculo de Markup: (Custo * (1 + Margem/100))
        const precoVenda = custoUnitario * (1 + (margem / 100));
        const lucroReal = precoVenda - custoUnitario;

        document.getElementById('res_custo').innerText = `R$ ${custoUnitario.toFixed(2)}`;
        document.getElementById('venda_final').innerText = `R$ ${precoVenda.toFixed(2)}`;
        document.getElementById('res_lucro').innerText = `R$ ${lucroReal.toFixed(2)}`;
    }

    function copiarValores() {
        const venda = document.getElementById('venda_final').innerText.replace('R$ ', '');
        const custo = document.getElementById('res_custo').innerText.replace('R$ ', '');
        document.getElementById('form_venda').value = venda;
        document.getElementById('form_custo').value = custo;
        document.getElementById('nome_final').focus();
    }

    function salvarEstoque() {
        const nome = document.getElementById('nome_final').value;
        const c = document.getElementById('form_custo').value;
        const v = document.getElementById('form_venda').value;
        
        if(!nome || !v) return alert("Preencha o nome e o preço!");

        let estoque = JSON.parse(localStorage.getItem('boteco_est')) || [];
        estoque.push({ nome, custo: parseFloat(c), venda: parseFloat(v) });
        localStorage.setItem('boteco_est', JSON.stringify(estoque));
        alert("Salvo com sucesso!");
        location.reload();
    }
</script>
</body>
</html>
