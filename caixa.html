<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --border: #1e293b; --green: #10b981; --blue: #3b82f6; --red: #ef4444; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 10px; display: grid; grid-template-columns: 1fr 320px; gap: 10px; height: 98vh; margin: 0; }
        
        /* Área das Mesas Pequenas */
        .mesas-area { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-y: auto; }
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
        
        .mesa-card { 
            background: #1c222d; padding: 10px 5px; border-radius: 6px; text-align: center; 
            cursor: pointer; border: 1px solid var(--border); transition: 0.2s; 
        }
        .mesa-card.ocupada { border-color: var(--accent); background: rgba(255, 184, 0, 0.1); }
        .mesa-card i { font-size: 1rem; display: block; margin-bottom: 3px; color: #64748b; }
        .mesa-card.ocupada i { color: var(--accent); }
        .mesa-card b { font-size: 0.7rem; display: block; }
        .mesa-card span { display: block; font-size: 0.55rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        /* Comanda Lateral */
        .comanda-area { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; border-left: 2px solid var(--border); }
        .header-comanda { border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }
        .header-comanda h3 { font-size: 0.85rem; margin: 0; color: var(--accent); }
        
        .lista-itens { flex: 1; overflow-y: auto; margin: 10px 0; border-bottom: 1px solid var(--border); }
        .item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #1e293b; font-size: 0.75rem; }
        
        .select-prod { background: #0a0c10; color: white; border: 1px solid var(--border); padding: 8px; width: 100%; border-radius: 6px; font-size: 0.75rem; margin-bottom: 5px; }
        
        .btn { border: none; padding: 10px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; font-size: 0.75rem; }
        .btn-add { background: var(--blue); color: white; }
        .btn-fechar { background: var(--green); color: black; margin-top: 10px; }
        
        .total-box { font-size: 1.4rem; text-align: center; color: var(--accent); font-weight: 700; padding: 5px 0; }
    </style>
</head>
<body>

    <div class="mesas-area">
        <h2 style="font-size: 0.75rem; margin-bottom: 10px; color: #64748b;">MAPA DE MESAS</h2>
        <div class="grid-mesas" id="gridMesas"></div>
    </div>

    <div class="comanda-area">
        <div class="header-comanda" id="infoMesa">
            <h3>SELECIONE UMA MESA</h3>
        </div>

        <div id="areaPedido" style="display: none;">
            <select id="selectEstoque" class="select-prod"></select>
            <button class="btn btn-add" onclick="adicionarItem()"><i class="fas fa-plus"></i> LANÇAR ITEM</button>

            <div class="lista-itens" id="listaItens"></div>

            <div class="total-box" id="totalMesa">R$ 0,00</div>
            <button class="btn btn-fechar" onclick="finalizarMesa()">FECHAR CONTA</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mesaAtiva = null;

    function carregarMesas() {
        const grid = document.getElementById('gridMesas');
        for (let i = 1; i <= 12; i++) {
            db.ref('mesas/Mesa' + i).on('value', snap => {
                const dados = snap.val() || { status: 'Livre', cliente: '' };
                let div = document.getElementById('card-m'+i);
                if(!div) {
                    div = document.createElement('div');
                    div.id = 'card-m'+i;
                    grid.appendChild(div);
                }
                div.className = `mesa-card ${dados.status === 'Ocupada' ? 'ocupada' : ''}`;
                div.onclick = () => abrirMesa(i, dados);
                div.innerHTML = `
                    <i class="fas fa-wine-glass-alt"></i>
                    <b>MESA ${i}</b>
                    <span>${dados.status === 'Ocupada' ? dados.cliente : 'Livre'}</span>
                `;
            });
        }
    }

    db.ref('produtos').on('value', snap => {
        const select = document.getElementById('selectEstoque');
        select.innerHTML = '<option value="">--- PRODUTO ---</option>';
        snap.forEach(p => {
            const prod = p.val();
            select.innerHTML += `<option value='${JSON.stringify(prod)}'>${prod.nome} - R$ ${prod.venda.toFixed(2)}</option>`;
        });
    });

    function abrirMesa(num, dados) {
        mesaAtiva = num;
        document.getElementById('areaPedido').style.display = 'block';
        document.getElementById('infoMesa').innerHTML = `<h3>MESA ${num} - ${dados.cliente || 'NOVA'}</h3>`;
        
        if (dados.status === 'Livre') {
            const nomeCli = prompt("Nome do Cliente:");
            if (nomeCli) db.ref('mesas/Mesa' + num).set({ status: 'Ocupada', cliente: nomeCli.toUpperCase(), total: 0 });
            else document.getElementById('areaPedido').style.display = 'none';
        }
        carregarItensMesa(num);
    }

    function adicionarItem() {
        const select = document.getElementById('selectEstoque');
        if (!select.value || !mesaAtiva) return;
        const produto = JSON.parse(select.value);
        db.ref(`mesas/Mesa${mesaAtiva}/itens`).push({ nome: produto.nome, preco: produto.venda });
    }

    function carregarItensMesa(num) {
        db.ref(`mesas/Mesa${num}/itens`).on('value', snap => {
            const lista = document.getElementById('listaItens');
            const totalTxt = document.getElementById('totalMesa');
            lista.innerHTML = "";
            let total = 0;
            snap.forEach(item => {
                const i = item.val();
                total += i.preco;
                lista.innerHTML += `<div class="item"><span>${i.nome}</span><b>R$ ${i.preco.toFixed(2)}</b></div>`;
            });
            totalTxt.innerText = `R$ ${total.toFixed(2)}`;
            db.ref(`mesas/Mesa${num}`).update({ total: total });
        });
    }

    function finalizarMesa() {
        if(confirm(`Fechar Mesa ${mesaAtiva}?`)) {
            db.ref(`mesas/Mesa${mesaAtiva}`).set({ status: 'Livre', cliente: '', total: 0, itens: null });
            document.getElementById('areaPedido').style.display = 'none';
            document.getElementById('infoMesa').innerHTML = `<h3>SELECIONE UMA MESA</h3>`;
        }
    }
    carregarMesas();
</script>
</body>
</html>
