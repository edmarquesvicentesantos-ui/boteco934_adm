<div class="card" style="background:#1c1c1e;padding:20px;border-radius:15px;border:1px solid #333;max-width:450px;margin:auto;">

<h3 style="color:#ff9f0a;margin-top:0;border-bottom:1px solid #333;padding-bottom:10px;">
BEBIDAS / CERVEJAS
</h3>

<label>NOME DO PRODUTO</label>
<input type="text" id="nome-cerv" class="input-dark" placeholder="Ex: Coca lata 350ml">

<label>CÓDIGO DE BARRAS (BIP)</label>
<input type="text" id="cod-barras" class="input-dark" placeholder="Passe o leitor">

<div style="display:flex;gap:10px;margin-top:10px;">
<div style="flex:1;">
<label>CUSTO FARDO (R$)</label>
<input type="number" id="custo-fardo" class="input-dark" oninput="calcularTudo()" placeholder="0.00">
</div>

<div style="flex:1;">
<label>QTD NO FARDO</label>
<input type="number" id="qtd-fardo" class="input-dark" value="12" oninput="calcularTudo()">
</div>
</div>
<div style="margin-top:10px;background:#000;padding:12px;border-radius:10px;border:1px solid #30d158;">
    <div style="display:flex;justify-content:space-between;">
        <label style="color:#30d158;font-size:12px;">LUCRO POR UNIDADE</label>
        <div id="lucro-unidade" style="color:#30d158;font-weight:bold;">R$ 0,00</div>
    </div>
</div>
<!-- RESULTADOS -->
<div style="margin-top:15px;background:#000;padding:15px;border-radius:12px;border:1px solid #30d158;">
<div style="display:flex;justify-content:space-between;">
<div style="text-align:center;flex:1;">
<label style="color:#30d158;font-size:10px;">MARGEM</label>
<div id="margem-final" style="font-size:22px;font-weight:bold;color:#30d158;">0%</div>
</div>

<div style="text-align:center;flex:1;border-left:1px solid #333;">
<label style="color:#30d158;font-size:10px;">LUCRO FARDO</label>
<div id="lucro-dinheiro" style="font-size:22px;font-weight:bold;color:#30d158;">R$0</div>
</div>
</div>
</div>

<div style="margin-top:10px;background:#000;padding:10px;border-radius:10px;border:1px solid #ff9f0a;">
<div style="display:flex;justify-content:space-between;">
<label style="color:#ff9f0a;">MARKUP</label>
<div id="markup-real" style="color:#ff9f0a;font-weight:bold;">0%</div>
</div>
</div>

<div style="display:flex;gap:10px;margin-top:15px;">
<div style="flex:1;">
<label>VENDA FARDO</label>
<input type="text" id="venda-fardo" class="input-dark" readonly>
</div>

<div style="flex:1;">
<label>VENDA UNIDADE</label>
<input type="text" id="venda-un" class="input-dark" readonly>
</div>
</div>

<button onclick="salvarProduto()" style="width:100%;padding:18px;background:#28a745;color:white;border:none;border-radius:12px;font-weight:bold;margin-top:20px;font-size:16px;">
SALVAR PRODUTO
</button>

</div>

<style>
.input-dark{
width:100%;
padding:12px;
margin-top:5px;
background:#121212;
border:1px solid #444;
color:white;
border-radius:8px;
font-size:16px;
}
</style>

<script>
// MARGEM PADRÃO DO SEU NEGÓCIO
const MARGEM_PADRAO = 30;

function dinheiro(v){
return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function arredondar(v){
return Math.ceil(v) - 0.01;
}

function calcularTudo(){

let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
let qtd = parseFloat(document.getElementById('qtd-fardo').value) || 12;

if(custo<=0) return;

// preço de venda pela MARGEM
let vendaFardo = custo / (1 - (MARGEM_PADRAO/100));
vendaFardo = arredondar(vendaFardo);

let lucro = vendaFardo - custo;
let vendaUn = vendaFardo / qtd;
let markup = (lucro / custo) * 100;

document.getElementById('venda-fardo').value = dinheiro(vendaFardo);
document.getElementById('venda-un').value = dinheiro(vendaUn);
document.getElementById('lucro-dinheiro').innerText = dinheiro(lucro);
document.getElementById('margem-final').innerText = MARGEM_PADRAO+"%";
document.getElementById('markup-real').innerText = markup.toFixed(1)+"%";
}

// SALVAR NO BANCO LOCAL (PDV)
function salvarProduto(){

let produto = {
nome: document.getElementById('nome-cerv').value,
codigo: document.getElementById('cod-barras').value,
custo: document.getElementById('custo-fardo').value,
vendaFardo: document.getElementById('venda-fardo').value,
vendaUn: document.getElementById('venda-un').value
};

let banco = JSON.parse(localStorage.getItem("produtos")||"[]");
banco.push(produto);
localStorage.setItem("produtos", JSON.stringify(banco));

alert("Produto salvo com sucesso!");
}
</script>
