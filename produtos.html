<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque Inteligente - Boteco 934</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --muted: #94a3b8; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Cards de Ação */
        .actions-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
        
        input, select { background: #020617; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; outline: none; }
        .btn { background: var(--accent); color: #020617; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-excel { background: #22c55e; color: white; margin-top: 10px; }

        /* Estilo da Tabela */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 15px; color: var(--muted); font-size: 11px; text-transform: uppercase; }
        td { background: var(--card); padding: 15px; border-top: 1px solid #334155; border-bottom: 1px solid #334155; }
        td:first-child { border-left: 1px solid #334155; border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid #334155; border-radius: 0 12px 12px 0; }
        
        .badge-net { background: #6366f1; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 Gestão de Estoque A-Z</h1>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">← Voltar ao Caixa</a>
    </div>

    <div class="actions-grid">
        <div class="card">
            <h3>Cadastro Rápido</h3>
            <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Ao bipar um código novo, buscaremos na internet para você.</p>
            <div style="display:grid; grid-template-columns: 1fr 2fr; gap:10px;">
                <input type="text" id="p-cod" placeholder="Bipe o Código..." onchange="buscarNaWeb(this.value)">
                <input type="text" id="p-nome" placeholder="Nome do Produto">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="p-preco" placeholder="Preço Venda R$">
                <select id="p-cat">
                    <option>Cervejas</option>
                    <option>Refrigerantes</option>
                    <option>Alimentos</option>
                    <option>Boticário</option>
                </select>
            </div>
            <button class="btn" onclick="salvarManual()">SALVAR PRODUTO</button>
        </div>

        <div class="card" style="border-color: var(--success);">
            <h3>Importar Excel</h3>
            <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">Colunas: Código, Nome, Preço, Categoria</p>
            <input type="file" id="input-excel" accept=".xlsx, .xls" style="font-size:12px;">
            <button class="btn btn-excel" onclick="importarExcel()">CARREGAR PLANILHA</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>CÓDIGO</th>
                <th>CATEGORIA</th>
                <th>PRODUTO (A-Z)</th>
                <th>PREÇO</th>
                <th>AÇÃO</th>
            </tr>
        </thead>
        <tbody id="lista-prods"></tbody>
    </table>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('produtos')) || [];

    // 1. BUSCA AUTOMÁTICA NA INTERNET (Open Food Facts API)
    async function buscarNaWeb(codigo) {
        if(!codigo) return;
        
        // Se já existe no estoque, não busca
        if(produtos.find(p => p.codigo == codigo)) return;

        document.getElementById('p-nome').placeholder = "Buscando na internet...";
        
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${codigo}.json`);
            const data = await res.json();
            
            if(data.status === 1) {
                const nomeProd = data.product.product_name || data.product.generic_name;
                const marca = data.product.brands || "";
                document.getElementById('p-nome').value = `${nomeProd} ${marca}`.trim();
                document.getElementById('p-nome').style.borderColor = "#6366f1";
            } else {
                document.getElementById('p-nome').placeholder = "Não encontrado. Digite o nome.";
            }
        } catch (e) {
            console.log("Erro na busca web");
        }
    }

    // 2. IMPORTAÇÃO DE EXCEL
    function importarExcel() {
        const file = document.getElementById('input-excel').files[0];
        if(!file) return alert("Selecione um arquivo!");

        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const aba = workbook.Sheets[workbook.SheetNames[0]];
            const listaJson = XLSX.utils.sheet_to_json(aba);

            listaJson.forEach(item => {
                // Ajuste os nomes abaixo conforme as colunas do seu Excel
                let p = {
                    codigo: item.Código || item.codigo || "",
                    nome: item.Nome || item.nome || "Sem Nome",
                    preco: parseFloat(item.Preço || item.preco || 0),
                    cat: item.Categoria || item.categoria || "Diversos"
                };
                if(p.codigo) produtos.push(p);
            });

            localStorage.setItem('produtos', JSON.stringify(produtos));
            render();
            alert("Importação concluída com sucesso!");
        };
        reader.readAsArrayBuffer(file);
    }

    function salvarManual() {
        const cod = document.getElementById('p-cod').value;
        const nome = document.getElementById('p-nome').value;
        const preco = document.getElementById('p-preco').value;
        const cat = document.getElementById('p-cat').value;

        if(cod && nome && preco) {
            produtos.push({ codigo: cod, nome: nome, preco: parseFloat(preco), cat: cat });
            localStorage.setItem('produtos', JSON.stringify(produtos));
            document.getElementById('p-cod').value = '';
            document.getElementById('p-nome').value = '';
            document.getElementById('p-preco').value = '';
            render();
        }
    }

    function render() {
        // Organiza de A a Z
        produtos.sort((a, b) => a.nome.localeCompare(b.nome));
        
        const corpo = document.getElementById('lista-prods');
        corpo.innerHTML = produtos.map((p, i) => `
            <tr>
                <td style="font-family:monospace; font-size:12px;">${p.codigo}</td>
                <td style="color:var(--accent); font-size:11px; font-weight:bold;">${p.cat.toUpperCase()}</td>
                <td><b>${p.nome}</b></td>
                <td style="color:var(--success); font-weight:bold;">R$ ${p.preco.toFixed(2)}</td>
                <td><button onclick="apagar(${i})" style="background:none; border:none; color:red; cursor:pointer;">❌</button></td>
            </tr>
        `).join('');
    }

    function apagar(i) {
        if(confirm("Excluir item?")) {
            produtos.splice(i, 1);
            localStorage.setItem('produtos', JSON.stringify(produtos));
            render();
        }
    }

    window.onload = render;
</script>
</body>
</html>
