<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boticário - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: #00a896; border-bottom: 2px solid #00a896; padding-bottom: 10px; margin-bottom: 15px; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-dark { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .painel-lucro { background: #000; border: 2px solid #30d158; border-radius: 10px; padding: 15px; text-align: center; margin-top: 10px; }
        .btn-salvar { width: 100%; padding: 15px; background: #00a896; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">BOTICÁRIO @ BOTECO 934</h2>
    <button onclick="location.href='index.html'" style="background:none; border:1px solid #00a896; color:#00a896; margin-top:10px; border-radius:5px; padding: 5px 10px;">VOLTAR</button>
</div>

<div class="card">
    <label>NOME DO PRODUTO (Perfume/Creme)</label>
    <input type="text" id="bot-nome" class="input-dark" placeholder="Ex: Malbec 100ml">

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>PREÇO DE CUSTO</label>
            <input type="number" id="bot-custo" class="input-dark" onkeyup="calcBoticario()" placeholder="0.00">
        </div>
        <div style="flex: 1;">
            <label>PREÇO DE VENDA</label>
            <input type="number" id="bot-venda" class="input-dark" onkeyup="calcBoticario()" placeholder="0.00">
        </div>
    </div>

    <div class="painel-lucro">
        <div style="font-size: 12px; color: #30d158;">LUCRO LÍQUIDO NESTA VENDA</div>
        <div id="bot-res-lucro" style="font-size: 28px; font-weight: bold; color: #30d158;">R$ 0,00</div>
        <div id="bot-res-porcent" style="font-size: 14px; color: #8e8e93;">Margem: 0%</div>
    </div>

    <button onclick="salvarBoticario()" class="btn-salvar" style="margin-top: 15px;">CADASTRAR NO ESTOQUE</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function calcBoticario() {
        let custo = parseFloat(document.getElementById('bot-custo').value) || 0;
        let venda = parseFloat(document.getElementById('bot-venda').value) || 0;
        
        if (venda > 0) {
            let lucro = venda - custo;
            let margem = (lucro / venda) * 100;
            document.getElementById('bot-res-lucro').innerHTML = "R$ " + lucro.toFixed(2);
            document.getElementById('bot-res-porcent').innerHTML = "Margem: " + margem.toFixed(1) + "%";
        }
    }

    async function salvarBoticario() {
        const nome = document.getElementById('bot-nome').value.toUpperCase();
        const custo = document.getElementById('bot-custo').value;
        const venda = document.getElementById('bot-venda').value;
        if(!nome || !venda) return alert("Preencha Nome e Venda!");

        try {
            await db.collection("boticario").add({
                nome: nome, custo: custo, venda: venda, data: new Date()
            });
            alert("✅ " + nome + " salvo no estoque Boticário!");
            location.reload();
        } catch (e) { alert("Erro ao salvar!"); }
    }
</script>

</body>
</html>
