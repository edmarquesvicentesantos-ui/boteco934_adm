<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boticário - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .btn-menu { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; cursor: pointer; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-dark { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-salvar { width: 100%; padding: 15px; background: #00a896; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
        <button onclick="location.href='index.html'" class="btn-menu" style="background: #333; color: #fff;">🍺 PRODUTOS</button>
        <button onclick="location.href='vendas.html'" class="btn-menu" style="background: #333; color: #fff;">💰 VENDAS</button>
        <button onclick="location.href='clientes.html'" class="btn-menu" style="background: #333; color: #fff;">👥 PENDURA</button>
        <button onclick="location.href='boticario.html'" class="btn-menu" style="background: #00a896; color: #fff;">✨ BOTICÁRIO</button>
        <button onclick="location.href='despesas.html'" class="btn-menu" style="background: #333; color: #fff;">📉 GASTOS</button>
        <button onclick="location.href='dashboard.html'" class="btn-menu" style="background: #333; color: #fff;">📊 LUCRO</button>
    </div>

    <div class="card">
        <input type="text" id="bot-nome" class="input-dark" placeholder="Produto (Ex: Malbec)">
        <input type="number" id="bot-custo" class="input-dark" placeholder="Custo R$">
        <input type="number" id="bot-venda" class="input-dark" placeholder="Venda R$">
        <button onclick="salvarBoticario()" class="btn-salvar">SALVAR NO ESTOQUE</button>
    </div>

    <div id="lista-boticario"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function salvarBoticario() {
            const nome = document.getElementById('bot-nome').value.toUpperCase();
            const custo = document.getElementById('bot-custo').value;
            const venda = document.getElementById('bot-venda').value;
            await db.collection("boticario").add({ nome, custo, venda, data: new Date() });
            location.reload();
        }

        db.collection("boticario").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                let d = doc.data();
                h += `<div style="padding:10px; border-bottom:1px solid #333;">${d.nome} - <span style="color:#00a896;">R$ ${d.venda}</span></div>`;
            });
            document.getElementById('lista-boticario').innerHTML = h;
        });
    </script>
</body>
</html>
