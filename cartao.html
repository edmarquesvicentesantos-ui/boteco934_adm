<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartão Digital</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:25px;
  max-width:420px;
  margin:auto;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  position:relative;
  overflow:hidden;
}

/* Marca d'água */
.watermark{
  position:absolute;
  opacity:0.06;
  width:350px;
  top:120px;
  left:50%;
  transform:translateX(-50%);
}

/* Logo topo */
.logo{
  width:180px;
  margin-bottom:10px;
}

.subtitle{color:#9ca3af;margin-bottom:20px;}

.btn{
  display:block;
  margin:10px 0;
  padding:15px;
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
}

.whats{background:#25D366;}
.tel{background:#2563eb;}
.pix{background:#06b6d4;}

img.qr{
  width:200px;
  margin-top:10px;
  border-radius:12px;
}

.section{ margin-top:25px; }
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">
<img src="logo.png" class="watermark">

<div class="subtitle">Contato • Wi-Fi • PIX</div>

<a class="btn whats" href="https://wa.me/5587996806181">💬 WhatsApp</a>
<a class="btn tel" href="tel:+5587996806181">📞 Ligar</a>

<div class="btn pix">💳 PIX: 87996806181</div>

<div class="section">
<h3>📶 Wi-Fi do Local</h3>
<p><b>jr telecom jato da mangueira</b></p>
<img src="wifi.png" class="qr">
</div>

<div class="section">
<h3>💰 Pagar no PIX</h3>
<img src="pix.png" class="qr">
</div>

</div>

</body>
</html>
