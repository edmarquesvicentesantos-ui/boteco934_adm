<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BOTECO 934 - ELITE V7</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Boteco 934">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931949.png">

    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0c0c0c; --green: #00ff88; --border: #1a1a1a; --danger: #ff4444; }
        
        body { background: var(--bg); color: #eee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .navbar { background: #050505; border-bottom: 2px solid var(--gold); padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-brand { color: var(--gold); font-weight: bold; font-size: 20px; letter-spacing: 1px; }

        .view { padding: 15px; padding-bottom: 120px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        
        .mesa { background: var(--card); border: 1px solid var(--green); border-radius: 15px; display: flex; flex-direction: column; min-height: 480px; }
        .mesa.ocupada { border-color: var(--danger); box-shadow: 0 0 15px rgba(255, 68, 68, 0.1); }

        input, select { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: var(--gold); border-radius: 10px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-gold { background: var(--gold); color: #000; }

        /* BOTÃO FLUTUANTE (FAB) */
        .fab-container { position: fixed; bottom: 30px; right: 25px; z-index: 3000; }
        .fab-main { width: 70px; height: 70px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.6); cursor: pointer; }
        .fab-options { position: absolute; bottom: 85px; right: 0; display: none; flex-direction: column; gap: 12px; }
        .fab-item { background: #1a1a1a; color: var(--gold); padding: 15px 25px; border-radius: 30px; border: 1px solid var(--gold); white-space: nowrap; font-weight: bold; text-align: right; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        /* MODAIS EM TELA CHEIA PARA MOBILE */
        .modal-full { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:4000; padding:20px; overflow-y: auto; }
        .modal-content { background: var(--card); border: 1px solid var(--gold); padding: 30px; border-radius: 20px; max-width: 450px; margin: 20px auto; }

        .foto-prod { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; border: 1px solid #222; }
        .item-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #111; }
        
        .sugestoes { background: #0a0a0a; border: 1px solid var(--gold); position: absolute; width: 95%; z-index: 100; max-height: 250px; overflow-y: auto; display: none; bottom: 120px; border-radius: 10px; }
        .sugestao-item { padding: 18px; border-bottom: 1px solid #1a1a1a; color: var(--gold); font-size: 16px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">BOTECO 934 🏅</div>
    <div id="clock" style="color:var(--gold); font-family:monospace; font-size:16px;"></div>
</div>

<div id="v-mesas" class="view">
    <div class="grid" id="grid_mesas"></div>
</div>

<div class="fab-container">
    <div class="fab-options" id="fab-menu">
        <div class="fab-item" onclick="abrirModal('m-cliente')">👤 NOVO CLIENTE</div>
        <div class="fab-item" onclick="abrirModal('m-estoque')">📦 CADASTRAR PRODUTO</div>
        <div class="fab-item" onclick="exportarBackup()">📂 BAIXAR RELATÓRIO</div>
    </div>
    <div class="fab-main" onclick="toggleFab()">+</div>
</div>

<div id="m-cliente" class="modal-full">
    <div class="modal-content">
        <h2 style="color:var(--gold)">Novo Cliente</h2>
        <input type="text" id="c_nome" placeholder="Nome do Cliente">
        <input type="tel" id="c_whats" placeholder="WhatsApp (ex: 879...)">
        <button class="btn btn-gold" onclick="salvarCliente()">SALVAR CLIENTE</button>
        <button class="btn" style="background:#222; color:#fff; margin-top:15px;" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="m-estoque" class="modal-full">
    <div class="modal-content">
        <h2 style="color:var(--gold)">Novo Produto</h2>
        <input type="text" id="e_ean" placeholder="BIPE O CÓDIGO" onchange="buscarProdutoNet()">
        <input type="text" id="e_nome" placeholder="Nome do Produto">
        <input type="number" id="e_preco" placeholder="Preço de Venda R$">
        <input type="text" id="e_foto" placeholder="Link da Imagem">
        <button class="btn btn-gold" onclick="salvarProd()">SALVAR NO ESTOQUE</button>
        <button class="btn" style="background:#222; color:#fff; margin-top:15px;" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="m-pagamento" class="modal-full">
    <div class="modal-content" id="pay_content"></div>
</div>
