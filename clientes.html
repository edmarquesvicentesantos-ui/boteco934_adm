<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendura - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .btn-menu { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; cursor: pointer; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-dark { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn-salvar { width: 100%; padding: 15px; background: #ff9f0a; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .cliente-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; background: #121212; margin-bottom: 8px; border-radius: 10px; align-items: center; }
        .deuda { color: #ff453a; font-weight: bold; font-size: 18px; }
        .btn-zap { background: #25d366; border: none; border-radius: 50%; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
        <button onclick="location.href='index.html'" class="btn-menu" style="background: #333; color: #fff;">🍺 PRODUTOS</button>
        <button onclick="location.href='vendas.html'" class="btn-menu" style="background: #333; color: #fff;">💰 VENDAS</button>
        <button onclick="location.href='clientes.html'" class="btn-menu" style="background: #ff9f0a; color: #000;">👥 PENDURA</button>
        <button onclick="location.href='boticario.html'" class="btn-menu" style="background: #333; color: #fff;">✨ BOTICÁRIO</button>
        <button onclick="location.href='despesas.html'" class="btn-menu" style="background: #333; color: #fff;">📉 GASTOS</button>
        <button onclick="location.href='dashboard.html'" class="btn-menu" style="background: #333; color: #fff;">📊 LUCRO</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; color: #ff9f0a;">NOVO PENDURA</h4>
        <input type="text" id="cli-nome" class="input-dark" placeholder="Nome do Cliente">
        <input type="number" id="cli-fone" class="input-dark" placeholder="WhatsApp (ex: 87988887766)">
        <input type="number" id="cli-valor" class="input-dark" placeholder="Valor R$ 0.00">
        <button onclick="salvarPendura()" class="btn-salvar">REGISTRAR DÍVIDA</button>
    </div>

    <div id="lista-corpo">
        </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function salvarPendura() {
            const nome = document.getElementById('cli-nome').value.toUpperCase();
            const fone = document.getElementById('cli-fone').value;
            const valor = document.getElementById('cli-valor').value;
            
            if(!nome || !fone || !valor) return alert("Preencha tudo!");
            
            try {
                await db.collection("pendura").add({ 
                    nome, telefone: fone, valor: parseFloat(valor), data: new Date() 
                });
                alert("✅ Salvo!");
                location.reload();
            } catch (e) { alert("Erro ao salvar!"); }
        }

        db.collection("pendura").orderBy("data", "desc").onSnapshot((snapshot) => {
            let html = "";
            snapshot.forEach((doc) => {
                let d = doc.data();
                html += `
                <div class="cliente-item">
                    <div style="flex: 1;">
                        <div style="font-size:15px; font-weight:bold;">${d.nome}</div>
                        <div style="font-size:12px; color:#8e8e93;">${d.telefone}</div>
                        <div class="deuda">R$ ${parseFloat(d.valor).toFixed(2)}</div>
                    </div>
                    <button class="btn-zap" onclick="cobrarZap('${d.telefone}', '${d.nome}', '${d.valor}')">
                        <span style="font-size:20px;">📲</span>
                    </button>
                </div>`;
            });
            document.getElementById('lista-corpo').innerHTML = html;
        });

        function cobrarZap(fone, nome, valor) {
            let msg = `*BOTECO 934*%0A---------------------------%0AOlá, ${nome}!%0APassando para lembrar do seu consumo aqui no Boteco.%0A*Valor Pendente: R$ ${valor}*%0A---------------------------%0AAbraço!`;
            window.open(`https://wa.me/55${fone}?text=${msg}`);
        }
    </script>
</body>
</html>
