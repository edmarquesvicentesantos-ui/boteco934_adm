<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #12151c; padding: 15px; border-radius: 10px; border: 1px solid #1e293b; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; margin-right: 10px; }
        button { background: #ffb800; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body>
    <div class="card">
        <h3>CADASTRO DE CLIENTES (PENDURA)</h3>
        <input type="text" id="nome" placeholder="Nome do Cliente">
        <button onclick="salvar()">CADASTRAR</button>
    </div>
    <table>
        <thead><tr><th>NOME</th><th>DÍVIDA</th><th>AÇÃO</th></tr></thead>
        <tbody id="lista"></tbody>
    </table>
<script>
    const config = { databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    function salvar() {
        const n = document.getElementById('nome').value.toUpperCase().trim();
        if(n) db.ref('clientes/' + n).set({ nome: n, saldo: 0 }).then(() => document.getElementById('nome').value = "");
    }

    db.ref('clientes').on('value', snap => {
        const corpo = document.getElementById('lista');
        corpo.innerHTML = "";
        snap.forEach(item => {
            const c = item.val();
            const saldoFormatado = parseFloat(c.saldo || 0).toFixed(2);
            corpo.innerHTML += `<tr>
                <td>${c.nome}</td>
                <td style="color:${saldoFormatado > 0 ? '#ef4444' : '#10b981'}">R$ ${saldoFormatado}</td>
                <td><button onclick="quitar('${c.nome}')">QUITAR</button></td>
            </tr>`;
        });
    });

    function quitar(n) { if(confirm("Zerar dívida de " + n + "?")) db.ref('clientes/'+n).update({saldo: 0}); }
</script>
</body>
</html>
