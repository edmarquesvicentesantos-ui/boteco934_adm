<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Boteco 934</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 700px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        
        .header { margin-bottom: 30px; }
        h1 { font-size: 26px; font-weight: 700; }

        /* Card de Cadastro */
        .form-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .grid-inputs { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        label { display: block; color: var(--muted); font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
        input { background: #020617; border: 1px solid #334155; color: white; padding: 14px; border-radius: 12px; width: 100%; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        
        .btn-salvar { background: var(--accent); color: #020617; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-salvar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3); }

        /* Tabela de Clientes */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 10px 15px; color: var(--muted); font-size: 11px; text-transform: uppercase; }
        td { background: var(--card); padding: 15px; border-top: 1px solid #334155; border-bottom: 1px solid #334155; }
        td:first-child { border-left: 1px solid #334155; border-radius: 12px 0 0 12px; font-weight: 600; }
        td:last-child { border-right: 1px solid #334155; border-radius: 0 12px 12px 0; text-align: right; }
        
        .tel-link { color: var(--muted); text-decoration: none; font-size: 13px; }
        .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-del:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← VOLTAR AO PAINEL DE VENDAS</a>
    
    <div class="header">
        <h1>👥 Gestão de Clientes</h1>
        <p style="color:var(--muted); font-size:14px;">Cadastre seus clientes para o sistema de "Pendura" e identificação.</p>
    </div>

    <div class="form-card">
        <div class="grid-inputs">
            <div>
                <label>Nome do Cliente / Apelido</label>
                <input type="text" id="cli-nome" placeholder="Ex: João da Silva">
            </div>
            <div>
                <label>WhatsApp / Telefone</label>
                <input type="text" id="cli-tel" placeholder="(87) 9....">
            </div>
        </div>
        <button class="btn-salvar" onclick="salvarCliente()">CADASTRAR NOVO CLIENTE</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>NOME DO CLIENTE (A-Z)</th>
                <th>CONTATO</th>
                <th>AÇÃO</th>
            </tr>
        </thead>
        <tbody id="lista-clientes"></tbody>
    </table>
</div>

<script>
    // Busca a lista de clientes salva ou inicia uma vazia
    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

    function salvarCliente() {
        const nomeInput = document.getElementById('cli-nome');
        const telInput = document.getElementById('cli-tel');

        const nome = nomeInput.value.trim();
        const tel = telInput.value.trim();

        if (nome !== "") {
            // Adiciona o novo cliente
            clientes.push({
                nome: nome.toUpperCase(), // Salva em maiúsculo para padronizar
                tel: tel || "Não informado"
            });

            // Salva no banco de dados do navegador
            localStorage.setItem('clientes', JSON.stringify(clientes));

            // Limpa os campos
            nomeInput.value = '';
            telInput.value = '';
            nomeInput.focus();

            // Atualiza a tabela na tela
            render();
        } else {
            alert("Por favor, digite pelo menos o nome do cliente.");
        }
    }

    function render() {
        const corpoTabela = document.getElementById('lista-clientes');
        
        // ORDENAÇÃO A-Z: Aqui a mágica acontece
        clientes.sort((a, b) => a.nome.localeCompare(b.nome));

        if (clientes.length === 0) {
            corpoTabela.innerHTML = `<tr><td colspan="3" style="text-align:center; color:var(--muted)">Nenhum cliente cadastrado.</td></tr>`;
            return;
        }

        corpoTabela.innerHTML = clientes.map((c, i) => `
            <tr>
                <td>${c.nome}</td>
                <td><span class="tel-link">${c.tel}</span></td>
                <td>
                    <button class="btn-del" onclick="remover(${i})">❌</button>
                </td>
            </tr>
        `).join('');
    }

    function remover(i) {
        if (confirm("Deseja remover este cliente?")) {
            clientes.splice(i, 1);
            localStorage.setItem('clientes', JSON.stringify(clientes));
            render();
        }
    }

    // Carrega a lista assim que a página abre
    window.onload = render;
</script>

</body>
</html>
