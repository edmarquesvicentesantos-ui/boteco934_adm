<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BOTECO 934 - ELITE V4</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0c0c0c; --green: #00ff88; --border: #1a1a1a; --danger: #ff4444; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .navbar { background: #050505; border-bottom: 2px solid var(--gold); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: #000; }
        .tab { padding: 12px 20px; background: #111; border: 1px solid var(--border); color: #777; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; border-radius: 4px; white-space: nowrap; }
        .tab.active { border-color: var(--gold); color: var(--gold); }
        .tab-home { background: var(--gold) !important; color: #000 !important; }
        .view { display: none; padding: 15px; }
        .view.active { display: block; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .mesa { background: var(--card); border: 1px solid var(--green); border-radius: 8px; display: flex; flex-direction: column; min-height: 520px; }
        .mesa.ocupada { border-color: var(--danger); }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--gold); border-radius: 4px; margin-bottom: 5px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: #000; }
        .foto-prod { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; border: 1px solid #222; }
        .item-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #111; }
        #modal-pg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:#0a0a0a; border:2px solid var(--gold); padding:25px; border-radius:10px; width:90%; max-width:400px; text-align:center; }
        
        /* Sugestão de produtos */
        .sugestoes { background: #111; border: 1px solid var(--gold); position: absolute; width: 260px; z-index: 100; max-height: 150px; overflow-y: auto; display: none; }
        .sugestao-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 12px; }
        .sugestao-item:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="color:var(--gold); font-weight:bold;">BOTECO 934</div>
    <div id="clock" style="color:var(--gold); font-family:monospace;"></div>
</div>

<div class="nav-links">
    <div class="tab tab-home" onclick="tab(event, 'v-mesas')">🏠 HOME (CAIXA)</div>
    <div class="tab" onclick="tab(event, 'v-clientes')">👥 CLIENTES</div>
    <div class="tab" onclick="tab(event, 'v-estoque')">📦 ESTOQUE</div>
    <div class="tab" onclick="tab(event, 'v-backup')">📂 PLANILHAS</div>
</div>

<div id="v-mesas" class="view active">
    <div class="grid" id="grid_mesas"></div>
</div>

<div id="v-clientes" class="view">
    <div class="box">
        <h3>Novo Cliente</h3>
        <input type="text" id="c_nome" placeholder="Nome do Cliente">
        <input type="text" id="c_whats" placeholder="WhatsApp">
        <button class="btn btn-gold" onclick="salvarCliente()">Cadastrar</button>
    </div>
    <div id="lista_clientes_corpo"></div>
</div>

<div id="v-estoque" class="view">
    <div class="box">
        <h3>Cadastro de Produto</h3>
        <input type="text" id="e_ean" placeholder="BIPE O CÓDIGO AQUI" onchange="buscarProdutoNet()">
        <input type="text" id="e_nome" placeholder="Nome do Produto">
        <input type="number" id="e_preco" placeholder="Preço R$">
        <input type="number" id="e_qtd" placeholder="Qtd">
        <input type="text" id="e_foto" placeholder="Link da Imagem">
        <button class="btn btn-gold" onclick="salvarProd()">Salvar no Estoque</button>
    </div>
</div>

<div id="modal-pg">
    <div class="modal-box" id="modal_content"></div>
</div>

<script>
    let estoque = JSON.parse(localStorage.getItem('b934_estoque')) || [];
    let clientes = JSON.parse(localStorage.getItem('b934_clientes')) || [];
    let mesas = Array.from({ length: 10 }, (_, i) => ({ id: i + 1, cliente: '', consumo: {}, status: 'Livre' }));

    function formatarNome(n) { return n.toLowerCase().split(' ').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' '); }

    function tab(e, id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
    }

    // BUSCA NA INTERNET (API ATUALIZADA)
    async function buscarProdutoNet() {
        const ean = document.getElementById('e_ean').value;
        if(ean.length < 8) return;
        document.getElementById('e_nome').placeholder = "Buscando...";
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
            const data = await res.json();
            if(data.status === 1) {
                document.getElementById('e_nome').value = data.product.product_name.toUpperCase();
                document.getElementById('e_foto').value = data.product.image_url || "";
            }
        } catch(e) { console.log("Erro busca"); }
    }

    function salvarCliente() {
        let n = document.getElementById('c_nome').value;
        if(n) {
            clientes.push({ nome: formatarNome(n), whats: document.getElementById('c_whats').value });
            clientes.sort((a,b) => a.nome.localeCompare(b.nome));
            localStorage.setItem('b934_clientes', JSON.stringify(clientes));
            document.getElementById('c_nome').value = ''; 
            renderMesas(); alert("Cliente Salvo!");
        }
    }

    function renderMesas() {
        const grid = document.getElementById('grid_mesas');
        grid.innerHTML = mesas.map(m => {
            let soma = 0; let itensH = "";
            for (let n in m.consumo) {
                const it = m.consumo[n]; soma += (it.qtd * it.preco);
                itensH += `<div class="item-row"><img src="${it.foto}" class="foto-prod"><div><b>${it.qtd}x ${n}</b></div></div>`;
            }
            return `
                <div class="mesa ${m.status === 'Ocupada' ? 'ocupada' : ''}">
                    <div style="padding:10px; text-align:center;">
                        <b style="color:var(--gold)">MESA 0${m.id}</b><br>
                        <select onchange="mesas.find(x=>x.id===${m.id}).cliente=this.value">
                            <option value="">${m.cliente || 'CLIENTE'}</option>
                            ${clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('')}
                        </select>
                    </div>
                    <div style="flex:1; padding:10px; overflow-y:auto;">${itensH || '<small>Vazia</small>'}</div>
                    <div style="padding:10px; position:relative;">
                        <input type="text" placeholder="NOME OU BIPE..." oninput="mostrarSugestao(this, ${m.id})" onchange="bipar(this, ${m.id})">
                        <div id="sug-${m.id}" class="sugestoes"></div>
                        <input type="text" id="foto-rapida-${m.id}" placeholder="Link da Foto (Opcional)" style="font-size:10px; height:30px">
                    </div>
                    <div style="padding:10px; background:#111;">
                        <div style="display:flex; justify-content:space-between;"><b>TOTAL</b><b style="color:var(--green)">R$ ${soma.toFixed(2)}</b></div>
                        <button class="btn btn-gold" onclick="abrirPagamento(${m.id}, ${soma})">FECHAR</button>
                    </div>
                </div>`;
        }).join('');
    }

    function mostrarSugestao(input, mId) {
        const lista = document.getElementById(`sug-${mId}`);
        const busca = input.value.toUpperCase();
        if(busca.length < 2) { lista.style.display = 'none'; return; }
        const matches = estoque.filter(p => p.nome.includes(busca));
        if(matches.length > 0) {
            lista.innerHTML = matches.map(p => `<div class="sugestao-item" onclick="selecionarSugestao('${p.nome}', ${mId})">${p.nome} - R$ ${p.preco.toFixed(2)}</div>`).join('');
            lista.style.display = 'block';
        } else { lista.style.display = 'none'; }
    }

    function selecionarSugestao(nome, mId) {
        const p = estoque.find(x => x.nome === nome);
        adicionarAoConsumo(p, mId);
        document.querySelectorAll('input[placeholder="NOME OU BIPE..."]').forEach(i => i.value = '');
        document.querySelectorAll('.sugestoes').forEach(s => s.style.display = 'none');
    }

    function bipar(input, mId) {
        const val = input.value.toUpperCase();
        const p = estoque.find(x => x.ean === val || x.nome === val);
        if(p) { adicionarAoConsumo(p, mId); }
        input.value = '';
    }

    function adicionarAoConsumo(p, mId) {
        const m = mesas.find(x => x.id === mId);
        const fotoR = document.getElementById(`foto-rapida-${mId}`).value;
        if(m.consumo[p.nome]) m.consumo[p.nome].qtd++;
        else m.consumo[p.nome] = { qtd: 1, preco: p.preco, foto: fotoR || p.foto || 'https://via.placeholder.com/50' };
        m.status = 'Ocupada'; renderMesas();
    }

    function abrirPagamento(id, total) {
        if(total <= 0) return;
        document.getElementById('modal-pg').style.display = 'flex';
        document.getElementById('modal_content').innerHTML = `
            <h3>FECHAR MESA 0${id}</h3>
            <h2 style="color:var(--green)">R$ ${total.toFixed(2)}</h2>
            <input type="number" id="div_p" value="1" placeholder="Dividir por...">
            <select id="forma_p">
                <option>DINHEIRO</option>
                <option>PIX</option>
                <option>CARTÃO DÉBITO</option>
                <option>CARTÃO CRÉDITO</option>
                <option value="FIADO">FIADO (PENDURA)</option>
            </select>
            <button class="btn btn-gold" onclick="confirmar(${id})">CONFIRMAR</button>
            <button class="btn" style="background:#222; margin-top:5px" onclick="document.getElementById('modal-pg').style.display='none'">CANCELAR</button>
        `;
    }

    function confirmar(id) {
        const m = mesas.find(x => x.id === id);
        const f = document.getElementById('forma_p').value;
        if(f === 'FIADO' && !m.cliente) { alert("Selecione o Cliente primeiro!"); return; }
        alert("Pago via " + f);
        m.status = 'Livre'; m.cliente = ''; m.consumo = {};
        document.getElementById('modal-pg').style.display = 'none';
        renderMesas();
    }

    function salvarProd() {
        const n = document.getElementById('e_nome').value.toUpperCase();
        const p = parseFloat(document.getElementById('e_preco').value);
        if(n && p) {
            estoque.push({ ean: document.getElementById('e_ean').value, nome: n, preco: p, foto: document.getElementById('e_foto').value });
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
            alert("Salvo!");
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    renderMesas();
</script>
</body>
</html>
