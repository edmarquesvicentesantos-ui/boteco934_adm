<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: #ff9f0a; border-bottom: 2px solid #ff9f0a; padding-bottom: 10px; margin-bottom: 15px; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-dark { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-acao { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .btn-salvar { background: #28a745; }
        .btn-zap { background: #25d366; }
        .lista-clientes { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .cliente-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        .deuda { color: #ff453a; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">PENDURA - BOTECO 934</h2>
    <button onclick="location.href='index.html'" style="background:none; border:1px solid #ff9f0a; color:#ff9f0a; margin-top:10px; border-radius:5px; padding: 5px 10px;">INÍCIO</button>
</div>

<div class="card">
    <h4 style="margin:0 0 10px 0; color: #ff9f0a;">CADASTRAR / ATUALIZAR DÉBITO</h4>
    <label style="font-size: 12px; color: #8e8e93;">NOME DO CLIENTE</label>
    <input type="text" id="cli-nome" class="input-dark" placeholder="Ex: João do Pneu">
    
    <label style="font-size: 12px; color: #8e8e93;">VALOR DA CONTA (R$)</label>
    <input type="number" id="cli-valor" class="input-dark" placeholder="0.00">

    <button onclick="salvarPendura()" class="btn-acao btn-salvar">PENDURAR CONTA</button>
</div>

<div class="card lista-clientes">
    <h4 style="margin:0 0 10px 0; color: #ff9f0a;">CLIENTES DEVENDO</h4>
    <div id="lista-corpo">
        <div class="cliente-item">
            <span>Exemplo: Edmarques</span>
            <span class="deuda">R$ 50,00</span>
            <button onclick="cobrarZap('Edmarques', '50.00')" style="background: #25d366; border:none; border-radius: 50%; padding: 5px 8px;">📲</button>
        </div>
    </div>
</div>

<script>
    // Mesma config do Firebase que você já usa
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function salvarPendura() {
        const nome = document.getElementById('cli-nome').value.toUpperCase();
        const valor = document.getElementById('cli-valor').value;
        if(!nome || !valor) return alert("Preencha tudo!");

        try {
            await db.collection("pendura").add({
                nome: nome,
                valor: valor,
                data: new Date()
            });
            alert("✅ Conta pendurada para " + nome);
            document.getElementById('cli-nome').value = "";
            document.getElementById('cli-valor').value = "";
        } catch (e) { alert("Erro ao salvar!"); }
    }

    function cobrarZap(nome, valor) {
        let mensagem = `*BOTECO 934*%0A---------------------------%0AOlá, ${nome}!%0APassando para lembrar do seu consumo aqui no Boteco.%0A*Total pendente: R$ ${valor}*%0A---------------------------%0AQuando puder, passa aqui pra gente acertar! Valeu!`;
        window.open(`https://wa.me/?text=${mensagem}`);
    }
</script>

</body>
</html>
