<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .btn-menu { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; cursor: pointer; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .input-dark { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn-salvar { width: 100%; padding: 15px; background: #ff9f0a; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; width: 100%; }
        
        .cliente-row { background: #121212; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .info-cliente { flex: 1; }
        .nome-cliente { font-size: 16px; font-weight: bold; color: #ff9f0a; text-transform: uppercase; }
        .fone-cliente { font-size: 13px; color: #8e8e93; display: block; margin-top: 2px; }
        
        .acoes { display: flex; gap: 8px; }
        .btn-acao { border: none; border-radius: 6px; padding: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-cobrar { background: #25d366; color: white; }
        .btn-lancar { background: #5856d6; color: white; }
    </style>
</head>
<body>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
        <button onclick="location.href='index.html'" class="btn-menu" style="background: #333; color: #fff;">🍺 PRODUTOS</button>
        <button onclick="location.href='vendas.html'" class="btn-menu" style="background: #333; color: #fff;">💰 VENDAS</button>
        <button onclick="location.href='clientes.html'" class="btn-menu" style="background: #ff9f0a; color: #000;">👥 CLIENTES</button>
        <button onclick="location.href='boticario.html'" class="btn-menu" style="background: #333; color: #fff;">✨ BOTICÁRIO</button>
        <button onclick="location.href='despesas.html'" class="btn-menu" style="background: #333; color: #fff;">📉 GASTOS</button>
        <button onclick="location.href='dashboard.html'" class="btn-menu" style="background: #333; color: #fff;">📊 LUCRO</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; color: #ff9f0a;">NOVO CONTATO</h4>
        <input type="text" id="nome-contato" class="input-dark" placeholder="Nome do Cliente">
        <input type="number" id="fone-contato" class="input-dark" placeholder="WhatsApp (DDD+Número)">
        <button onclick="cadastrarCliente()" class="btn-salvar">SALVAR NA AGENDA</button>
    </div>

    <h4 style="color: #8e8e93; margin-left: 5px;">AGENDA DE CLIENTES</h4>
    <div id="lista-clientes-corpo">
        </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Cadastra o cliente na agenda
        async function cadastrarCliente() {
            const nome = document.getElementById('nome-contato').value.toUpperCase();
            const fone = document.getElementById('fone-contato').value;
            if(!nome || !fone) return alert("Preencha nome e Zap!");
            
            await db.collection("agenda_clientes").add({ nome, fone, data: new Date() });
            document.getElementById('nome-contato').value = "";
            document.getElementById('fone-contato').value = "";
            alert("✅ Cliente salvo!");
        }

        // 2. Mostra a lista de contatos visível
        db.collection("agenda_clientes").orderBy("nome", "asc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                let c = doc.data();
                html += `
                <div class="cliente-row">
                    <div class="info-cliente">
                        <span class="nome-cliente">${c.nome}</span>
                        <span class="fone-cliente">📲 ${c.fone}</span>
                    </div>
                    <div class="acoes">
                        <button class="btn-acao btn-cobrar" onclick="cobrarZap('${c.fone}', '${c.nome}')">ZAP</button>
                        <button class="btn-acao btn-lancar" onclick="lancarDivida('${doc.id}', '${c.nome}')">LANCAR</button>
                    </div>
                </div>`;
            });
