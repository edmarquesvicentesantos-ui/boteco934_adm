<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - ELITE MOBILE</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0c0c0c; --green: #00ff88; --border: #1a1a1a; --danger: #ff4444; }
        
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* NAVBAR COMPACTA */
        .navbar { background: #050505; border-bottom: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-brand { color: var(--gold); font-weight: bold; font-size: 20px; }

        /* GRID DE MESAS OTIMIZADO */
        .view { padding: 10px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        
        .mesa { background: var(--card); border: 1px solid var(--green); border-radius: 12px; display: flex; flex-direction: column; min-height: 450px; }
        .mesa.ocupada { border-color: var(--danger); box-shadow: 0 0 10px rgba(255, 68, 68, 0.2); }

        input, select { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: var(--gold); border-radius: 8px; margin-bottom: 8px; font-size: 16px; -webkit-appearance: none; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-gold { background: var(--gold); color: #000; }

        /* BOTÃO FLUTUANTE (ESTILO IPHONE) */
        .fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 3000; }
        .fab-main { width: 65px; height: 65px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; transition: 0.3s; }
        .fab-options { position: absolute; bottom: 80px; right: 0; display: none; flex-direction: column; gap: 10px; }
        .fab-item { background: #1a1a1a; color: var(--gold); padding: 12px 20px; border-radius: 30px; border: 1px solid var(--gold); white-space: nowrap; font-weight: bold; text-align: right; cursor: pointer; }

        /* MODAIS */
        .modal-full { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:4000; padding:20px; overflow-y: auto; }
        .modal-content { background: var(--card); border: 1px solid var(--gold); padding: 25px; border-radius: 15px; max-width: 500px; margin: 40px auto; }

        .foto-prod { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .item-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #111; }
        
        .sugestoes { background: #111; border: 1px solid var(--gold); position: absolute; width: 90%; z-index: 100; max-height: 200px; overflow-y: auto; display: none; bottom: 110px; }
        .sugestao-item { padding: 15px; border-bottom: 1px solid #222; color: var(--gold); font-size: 16px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">BOTECO 934 🏆</div>
    <div id="clock" style="color:var(--gold); font-family:monospace;"></div>
</div>

<div id="v-mesas" class="view">
    <div class="grid" id="grid_mesas"></div>
</div>

<div class="fab-container">
    <div class="fab-options" id="fab-menu">
        <div class="fab-item" onclick="abrirModal('m-cliente')">👥 NOVO CLIENTE</div>
        <div class="fab-item" onclick="abrirModal('m-estoque')">📦 NOVO PRODUTO</div>
        <div class="fab-item" onclick="exportarBackup()">📂 GERAR RELATÓRIO</div>
    </div>
    <div class="fab-main" onclick="toggleFab()">+</div>
</div>

<div id="m-cliente" class="modal-full">
    <div class="modal-content">
        <h2 style="color:var(--gold)">Novo Cliente</h2>
        <input type="text" id="c_nome" placeholder="Nome Completo">
        <input type="tel" id="c_whats" placeholder="WhatsApp (DDD+Número)">
        <button class="btn btn-gold" onclick="salvarCliente()">CADASTRAR</button>
        <button class="btn" style="background:#222; color:#fff; margin-top:10px;" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="m-estoque" class="modal-full">
    <div class="modal-content">
        <h2 style="color:var(--gold)">Novo Produto</h2>
        <input type="text" id="e_ean" placeholder="BIPE O CÓDIGO" onchange="buscarProdutoNet()">
        <input type="text" id="e_nome" placeholder="Nome do Produto">
        <input type="number" id="e_preco" placeholder="Preço de Venda R$">
        <input type="text" id="e_foto" placeholder="Link da Imagem (URL)">
        <button class="btn btn-gold" onclick="salvarProd()">SALVAR NO ESTOQUE</button>
        <button class="btn" style="background:#222; color:#fff; margin-top:10px;" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="m-pagamento" class="modal-full">
    <div class="modal-content" id="pay_content" style="text-align:center;"></div>
</div>

<script>
    let estoque = JSON.parse(localStorage.getItem('b934_estoque')) || [];
    let clientes = JSON.parse(localStorage.getItem('b934_clientes')) || [];
    let mesas = Array.from({ length: 12 }, (_, i) => ({ id: i + 1, cliente: '', consumo: {}, status: 'Livre' }));

    // FUNÇÕES DE INTERFACE
    function toggleFab() { 
        const menu = document.getElementById('fab-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function abrirModal(id) { fecharModais(); document.getElementById(id).style.display = 'block'; toggleFab(); }
    function fecharModais() { document.querySelectorAll('.modal-full').forEach(m => m.style.display = 'none'); }

    // BUSCA E CADASTRO
    async function buscarProdutoNet() {
        const ean = document.getElementById('e_ean').value;
        if(ean.length < 8) return;
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
            const data = await res.json();
            if(data.status === 1) {
                document.getElementById('e_nome').value = (data.product.product_name || "").toUpperCase();
                document.getElementById('e_foto').value = data.product.image_url || "";
            }
        } catch(e) { console.log("Erro API"); }
    }

    function salvarCliente() {
        let n = document.getElementById('c_nome').value;
        if(n) {
            clientes.push({ nome: n.toUpperCase(), whats: document.getElementById('c_whats').value.replace(/\D/g,'') });
            clientes.sort((a,b) => a.nome.localeCompare(b.nome));
            localStorage.setItem('b934_clientes', JSON.stringify(clientes));
            fecharModais(); renderMesas();
        }
    }

    function salvarProd() {
        const n = document.getElementById('e_nome').value.toUpperCase();
        const p = parseFloat(document.getElementById('e_preco').value);
        if(n && p) {
            estoque.push({ ean: document.getElementById('e_ean').value, nome: n, preco: p, foto: document.getElementById('e_foto').value });
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
            fecharModais(); alert("PRODUTO SALVO!");
        }
    }

    // LÓGICA DAS MESAS
    function renderMesas() {
        const grid = document.getElementById('grid_mesas');
        grid.innerHTML = mesas.map(m => {
            let soma = 0; let itensH = "";
            for (let n in m.consumo) {
                const it = m.consumo[n]; soma += (it.qtd * it.preco);
                itensH += `<div class="item-row"><img src="${it.foto}" class="foto-prod"><div><b>${it.qtd}x ${n}</b><br><small>R$ ${it.preco.toFixed(2)}</small></div></div>`;
            }
            return `
                <div class="mesa ${m.status === 'Ocupada' ? 'ocupada' : ''}">
                    <div style="padding:15px; text-align:center; background:#080808; border-radius:12px 12px 0 0;">
                        <b style="color:var(--gold); font-size:18px;">MESA 0${m.id}</b>
                        <select onchange="mesas.find(x=>x.id===${m.id}).cliente=this.value" style="margin-top:10px;">
                            <option value="">${m.cliente || 'SELECIONAR CLIENTE'}</option>
                            ${clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('')}
                        </select>
                    </div>
                    <div style="flex:1; padding:15px; overflow-y:auto;">${itensH || '<center style="opacity:0.2; margin-top:60px">ABERTA</center>'}</div>
                    <div style="padding:10px; position:relative;">
                        <input type="text" placeholder="BIPAR OU DIGITAR NOME..." oninput="mostrarSugestao(this, ${m.id})">
                        <div id="sug-${m.id}" class="sugestoes"></div>
                    </div>
                    <div style="padding:15px; background:#111; border-top:1px solid #222; border-radius:0 0 12px 12px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span style="font-size:14px">TOTAL</span><b style="color:var(--green); font-size:22px;">R$ ${soma.toFixed(2)}</b></div>
                        <button class="btn btn-gold" onclick="abrirPagamento(${m.id}, ${soma})">FECHAR CONTA</button>
                    </div>
                </div>`;
        }).join('');
    }

    function mostrarSugestao(input, mId) {
        const lista = document.getElementById(`sug-${mId}`);
        const busca = input.value.toUpperCase();
        if(busca.length < 2) { lista.style.display = 'none'; return; }
        const matches = estoque.filter(p => p.nome.includes(busca) || p.ean === busca);
        if(matches.length > 0) {
            lista.innerHTML = matches.map(p => `<div class="sugestao-item" onclick="adicionarProd('${p.nome}', ${mId})">${p.nome} <br> <small>R$ ${p.preco.toFixed(2)}</small></div>`).join('');
            lista.style.display = 'block';
        }
    }

    function adicionarProd(nome, mId) {
        const p = estoque.find(x => x.nome === nome);
        const m = mesas.find(x => x.id === mId);
        if(m.consumo[p.nome]) m.consumo[p.nome].qtd++;
        else m.consumo[p.nome] = { qtd: 1, preco: p.preco, foto: p.foto || 'https://via.placeholder.com/50' };
        m.status = 'Ocupada';
        document.querySelectorAll('.sugestoes').forEach(s => s.style.display = 'none');
        document.querySelectorAll('input[placeholder="BIPAR OU DIGITAR NOME..."]').forEach(i => i.value = '');
        renderMesas();
    }

    function abrirPagamento(id, total) {
        if(total <= 0) return;
        const m = mesas.find(x => x.id === id);
        document.getElementById('m-pagamento').style.display = 'block';
        document.getElementById('pay_content').innerHTML = `
            <h2 style="color:var(--gold)">MESA 0${id}</h2>
            <p style="color:#aaa">Cliente: <b>${m.cliente || "AVULSO"}</b></p>
            <h1 style="color:var(--green); font-size:40px;">R$ ${total.toFixed(2)}</h1>
            <select id="forma_p" style="height:60px" onchange="travaFiado('${m.cliente}')">
                <option value="PIX">PIX</option>
                <option value="DINHEIRO">DINHEIRO</option>
                <option value="DÉBITO">DÉBITO</option>
                <option value="CRÉDITO">CRÉDITO</option>
                <option value="FIADO" style="color:red">FIADO (PENDURA)</option>
            </select>
            <div id="erro-fiado" style="color:red; font-weight:bold; margin:10px 0; display:none;">⚠️ SELECIONE O CLIENTE NA MESA!</div>
            <button id="btn-pago" class="btn btn-gold" onclick="finalizar(${id}, ${total})">CONFIRMAR PAGAMENTO</button>
            <button class="btn" style="background:#222; margin-top:10px;" onclick="fecharModais()">VOLTAR</button>
        `;
    }

    function travaFiado(nome) {
        const f = document.getElementById('forma_p').value;
        const btn = document.getElementById('btn-pago');
        const erro = document.getElementById('erro-fiado');
        if(f === 'FIADO' && !nome) { btn.disabled = true; btn.style.opacity = '0.2'; erro.style.display = 'block'; }
        else { btn.disabled = false; btn.style.opacity = '1'; erro.style.display = 'none'; }
    }

    function finalizar(id, total) {
        const m = mesas.find(x => x.id === id);
        const f = document.getElementById('forma_p').value;
        if(f === 'FIADO') {
            const c = clientes.find(x => x.nome === m.cliente);
            if(c && c.whats) {
                const msg = encodeURIComponent(`*BOTECO 934*\nNova conta no FIADO registrada:\nValor: *R$ ${total.toFixed(2)}*`);
                window.open(`https://wa.me/55${c.whats}?text=${msg}`, '_blank');
            }
        }
        m.status = 'Livre'; m.cliente = ''; m.consumo = {};
        fecharModais(); renderMesas();
    }

    function exportarBackup() {
        let csv = "TIPO;NOME;VALOR\n";
        clientes.forEach(c => csv += `CLIENTE;${c.nome};${c.whats}\n`);
        estoque.forEach(p => csv += `PRODUTO;${p.nome};${p.preco}\n`);
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob); link.download = "boteco_backup.csv"; link.click();
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    renderMesas();
</script>
</body>
</html>
