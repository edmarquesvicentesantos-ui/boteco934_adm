<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BOTECO 934 - GESTÃO COMPLETA</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0c0c0c; --green: #00ff88; --border: #1a1a1a; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding: 10px; margin-bottom: 10px; }
        .nav { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px; background: #000; border: 1px solid var(--border); color: #555; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; text-align: center; border-radius: 4px; min-width: 110px; }
        .tab.active { border-color: var(--gold); color: var(--gold); background: #111; }

        .view { display: none; }
        .view.active { display: block; }

        .box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        
        /* GRID MESAS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .mesa { background: var(--card); border: 1px solid var(--green); border-radius: 8px; display: flex; flex-direction: column; min-height: 450px; }
        .mesa.ocupada { border-color: #ff4444; }
        
        /* FOTO DO PRODUTO NO RECIBO */
        .foto-prod { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; border: 1px solid var(--gold); }
        .item-linha { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 5px; }

        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--gold); border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: #000; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #111; text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color:var(--gold); font-size:16px; margin:0;">BOTECO 934 - PDV ELITE</h1>
    <div id="clock" style="font-family:monospace; color:var(--gold)"></div>
</div>

<div class="nav">
    <div class="tab active" onclick="tab(event, 'v-mesas')">Caixa/Mesas</div>
    <div class="tab" onclick="tab(event, 'v-clientes')">Clientes</div>
    <div class="tab" onclick="tab(event, 'v-estoque')">Estoque</div>
    <div class="tab" onclick="tab(event, 'v-backup')">Planilhas</div>
</div>

<div id="v-clientes" class="view">
    <div class="box">
        <h3 style="color:var(--gold)">Novo Cliente</h3>
        <input type="text" id="c_nome" placeholder="Nome Completo">
        <input type="text" id="c_whats" placeholder="WhatsApp (ex: 87999999999)">
        <button class="btn btn-gold" onclick="salvarCliente()">Cadastrar Cliente</button>
    </div>
    <div class="box">
        <h3>Lista de Contatos</h3>
        <table id="tabela_clientes">
            <thead><tr><th>Nome</th><th>WhatsApp</th><th>Ações</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="v-estoque" class="view">
    <div class="box">
        <h3 style="color:var(--gold)">Novo Produto</h3>
        <input type="text" id="e_ean" placeholder="Código de Barras">
        <input type="text" id="e_nome" placeholder="Nome do Produto">
        <input type="number" id="e_preco" placeholder="Preço de Venda R$" step="0.01">
        <input type="number" id="e_qtd" placeholder="Quantidade">
        <input type="text" id="e_foto" placeholder="Link da Foto (ou deixe vazio)">
        <button class="btn btn-gold" onclick="salvarProd()">Salvar Produto</button>
    </div>
</div>

<div id="v-mesas" class="view active">
    <div class="grid" id="grid_mesas"></div>
</div>

<div id="v-backup" class="view">
    <div class="box">
        <h3>Exportar Dados</h3>
        <button class="btn btn-gold" onclick="exportarTudo()">BAIXAR TODA A BASE (CSV)</button>
        <p style="font-size:11px; color:#555; margin-top:10px;">O arquivo baixado pode ser aberto no Google Planilhas.</p>
    </div>
</div>

<script>
    let estoque = JSON.parse(localStorage.getItem('b934_estoque')) || [];
    let clientes = JSON.parse(localStorage.getItem('b934_clientes')) || [];
    let mesas = Array.from({ length: 8 }, (_, i) => ({ id: i + 1, cliente: '', consumo: {}, status: 'Livre' }));

    function tab(e, id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        if(id === 'v-clientes') renderClientes();
    }

    // --- LOGICA CLIENTES ---
    function salvarCliente() {
        const nome = document.getElementById('c_nome').value.toUpperCase();
        const whats = document.getElementById('c_whats').value;
        if(nome) {
            clientes.push({ nome, whats });
            localStorage.setItem('b934_clientes', JSON.stringify(clientes));
            document.getElementById('c_nome').value = '';
            document.getElementById('c_whats').value = '';
            renderClientes();
        }
    }

    function renderClientes() {
        const tbody = document.querySelector('#tabela_clientes tbody');
        tbody.innerHTML = clientes.map((c, i) => `
            <tr>
                <td>${c.nome}</td>
                <td>${c.whats}</td>
                <td><button onclick="removerCliente(${i})" style="color:red; background:none; border:none; cursor:pointer">Excluir</button></td>
            </tr>
        `).join('');
    }

    function removerCliente(i) { clientes.splice(i, 1); localStorage.setItem('b934_clientes', JSON.stringify(clientes)); renderClientes(); }

    // --- LOGICA ESTOQUE ---
    function salvarProd() {
        const n = document.getElementById('e_nome').value.toUpperCase();
        const p = parseFloat(document.getElementById('e_preco').value);
        const q = parseInt(document.getElementById('e_qtd').value);
        const e = document.getElementById('e_ean').value;
        const f = document.getElementById('e_foto').value || 'https://via.placeholder.com/50';
        if(n && p) {
            estoque.push({ ean: e, nome: n, preco: p, qtd: q, foto: f });
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
            alert("Produto Salvo!");
            document.querySelectorAll('#v-estoque input').forEach(i => i.value = '');
        }
    }

    // --- LOGICA CAIXA ---
    function renderMesas() {
        const grid = document.getElementById('grid_mesas');
        grid.innerHTML = mesas.map(m => {
            let soma = 0;
            let itensHtml = "";
            for (let n in m.consumo) {
                const it = m.consumo[n];
                soma += (it.qtd * it.preco);
                itensHtml += `
                    <div class="item-linha">
                        <img src="${it.foto}" class="foto-prod">
                        <div style="flex-grow:1">
                            <b>${it.qtd}x ${n}</b><br>
                            <small>R$ ${it.preco.toFixed(2)}</small>
                        </div>
                    </div>`;
            }
            return `
                <div class="mesa ${m.status === 'Ocupada' ? 'ocupada' : ''}">
                    <div style="padding:10px; border-bottom:1px dashed #222; text-align:center;">
                        <b style="color:var(--gold)">MESA 0${m.id}</b><br>
                        <select onchange="vincularCliente(${m.id}, this.value)" style="margin-top:5px; font-size:11px;">
                            <option value="">${m.cliente || 'SELECIONE CLIENTE'}</option>
                            ${clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('')}
                        </select>
                    </div>
                    <div style="flex-grow:1; padding:10px; overflow-y:auto;">${itensHtml}</div>
                    <div style="padding:10px;"><input type="text" placeholder="BIPAR..." onchange="bipar(this, ${m.id})"></div>
                    <div style="padding:15px; background:#000; border-top:1px dashed var(--border);">
                        <div style="display:flex; justify-content:space-between;"><b>TOTAL</b><b style="color:var(--green)">R$ ${soma.toFixed(2)}</b></div>
                        <button class="btn btn-gold" onclick="fecharMesa(${m.id}, ${soma})">FECHAR CONTA</button>
                    </div>
                </div>`;
        }).join('');
    }

    function vincularCliente(mId, nome) {
        const m = mesas.find(x => x.id === mId);
        m.cliente = nome;
        renderMesas();
    }

    function bipar(input, mId) {
        const val = input.value.toUpperCase();
        const p = estoque.find(x => x.ean === val || x.nome === val);
        if(p && p.qtd > 0) {
            const m = mesas.find(x => x.id === mId);
            if(m.consumo[p.nome]) m.consumo[p.nome].qtd++;
            else m.consumo[p.nome] = { qtd: 1, preco: p.preco, foto: p.foto };
            p.qtd--; m.status = 'Ocupada';
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
            renderMesas();
        }
        input.value = ''; input.focus();
    }

    function fecharMesa(id, total) {
        if(total > 0 && confirm("Confirmar pagamento?")) {
            const m = mesas.find(x => x.id === id);
            m.status = 'Livre'; m.cliente = ''; m.consumo = {};
            renderMesas();
        }
    }

    function exportarTudo() {
        let csv = "Tipo;Identificador;Nome;Extra\n";
        clientes.forEach(c => csv += `CLIENTE;${c.whats};${c.nome};\n`);
        estoque.forEach(p => csv += `PRODUTO;${p.ean};${p.nome};${p.preco}\n`);
        
        let blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "base_completa_boteco934.csv";
        link.click();
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    renderMesas();
</script>
</body>
</html>
