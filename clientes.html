<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Boteco 934 Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 800px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-link:hover { opacity: 0.7; }

        .header-section { margin-bottom: 30px; }
        h1 { font-size: 28px; font-weight: 700; color: var(--text); }
        p { color: var(--muted); font-size: 14px; }

        /* Card de Cadastro */
        .form-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 40px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        label { display: block; color: var(--muted); font-size: 12px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { background: #020617; border: 1px solid #334155; color: white; padding: 15px; border-radius: 12px; font-size: 15px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }

        .btn-salvar { background: var(--accent); color: #020617; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 25px; width: 100%; transition: 0.3s; font-size: 16px; }
        .btn-salvar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3); }

        /* Tabela de Clientes */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 0 15px; color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 700; }
        td { background: var(--card); padding: 18px 15px; border-top: 1px solid #334155; border-bottom: 1px solid #334155; font-size: 15px; }
        td:first-child { border-left: 1px solid #334155; border-radius: 14px 0 0 14px; font-weight: 600; }
        td:last-child { border-right: 1px solid #334155; border-radius: 0 14px 14px 0; text-align: right; }

        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 11px; transition: 0.3s; }
        .btn-del:hover { background: var(--danger); color: white; }

        /* Badge para Boticário */
        .badge { background: #059669; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← VOLTAR AO CAIXA</a>
    
    <div class="header-section">
        <h1>👥 Gestão de Clientes</h1>
        <p>Cadastre clientes para consumo em mesa ou vendas Boticário.</p>
    </div>

    <div class="form-card">
        <div class="grid-inputs">
            <div>
                <label>Nome Completo</label>
                <input type="text" id="nome-cli" placeholder="Ex: Maria Silva">
            </div>
            <div>
                <label>WhatsApp / Telefone</label>
                <input type="text" id="tel-cli" placeholder="(81) 9....">
            </div>
        </div>
        <button class="btn-salvar" onclick="salvar()">CADASTRAR CLIENTE</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome do Cliente</th>
                <th>Contato</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="lista-clientes">
            </tbody>
    </table>
</div>

<script>
    let clientes = JSON.parse(localStorage.getItem('clientes')) || [{nome: "Consumidor Geral", tel: "-"}];

    function salvar() {
        const nome = document.getElementById('nome-cli').value;
        const tel = document.getElementById('tel-cli').value;
