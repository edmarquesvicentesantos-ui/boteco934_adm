<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - ELITE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #eee; }
        
        /* HEADER FIXO */
        header { background: #1a252f; color: white; padding: 10px; display: flex; justify-content: space-between; flex-shrink: 0; }

        /* CORPO DO SISTEMA */
        main { display: flex; flex: 1; overflow: hidden; }

        /* MENU LATERAL */
        nav { width: 70px; background: #2c3e50; display: flex; flex-direction: column; flex-shrink: 0; }
        .menu-btn { color: white; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 10px; border-bottom: 1px solid #34495e; }
        .active { background: #1abc9c; }

        /* AREA CENTRAL */
        #conteudo { flex: 1; background: white; padding: 10px; overflow-y: auto; }
        .tela { display: none; }
        .ativa { display: block; }

        /* CARRINHO FIXO NA DIREITA */
        aside { width: 250px; background: #fff; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; flex-shrink: 0; }
        
        /* ELEMENTOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .item { border: 1px solid #ddd; padding: 10px; text-align: center; cursor: pointer; border-radius: 5px; }
        .mesa { background: #f1c40f; padding: 15px; margin-bottom: 5px; border-radius: 5px; text-align: center; cursor: pointer; font-weight: bold; }
        .btn { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; font-weight: bold; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <strong>BOTECO 934 - ELITE</strong>
    <span>VENDA: R$ <span id="vTotal">0.00</span></span>
</header>

<main>
    <nav>
        <div class="menu-btn active" onclick="ver('v')">VENDAS</div>
        <div class="menu-btn" onclick="ver('e')">ESTOQUE</div>
        <div class="menu-btn" onclick="ver('c')">CLIENTES</div>
    </nav>

    <div id="conteudo">
        <div id="tela-v" class="tela ativa">
            <h3 style="margin-bottom:10px;">Mesas</h3>
            <div id="lista-mesas" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:20px;"></div>
            <hr>
            <h3 style="margin:10px 0;">Produtos</h3>
            <div id="lista-prods" class="grid"></div>
        </div>

        <div id="tela-e" class="tela">
            <h3>Novo Produto</h3>
            <input type="text" id="p-nome" placeholder="Nome" style="width:100%; padding:8px; margin:5px 0;">
            <input type="number" id="p-preco" placeholder="Preço" style="width:100%; padding:8px; margin:5px 0;">
            <button class="btn" style="background:green; color:white;" onclick="addProd()">SALVAR NO ESTOQUE</button>
        </div>

        <div id="tela-c" class="tela">
            <h3>Clientes</h3>
            <div id="lista-clientes"></div>
        </div>
    </div>

    <aside>
        <h4 id="status-mesa">Mesa não selecionada</h4>
        <div id="itens-carrinho" style="flex:1; border-bottom:1px solid #ddd; margin:10px 0; overflow-y:auto;"></div>
        <div style="font-size:18px; font-weight:bold;">Total: R$ <span id="c-total">0.00</span></div>
        <button class="btn" style="background:#27ae60; color:white;" onclick="pagar()">FINALIZAR PAGO</button>
        <button class="btn" style="background:#e67e22; color:white;" onclick="pagar()">PENDURAR</button>
    </aside>
</main>

<script>
    let produtos = [
        {id: 1, nome: "Cerveja Lata", preco: 6.50},
        {id: 2, nome: "Cerveja 600ml", preco: 14.00}
    ];
    let mesas = Array.from({length: 8}, (_, i) => ({ id: i+1, total: 0, itens: [] }));
    let mesaAtiva = null;

    function ver(id) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById('tela-'+id).classList.add('ativa');
    }

    function render() {
        // Render Mesas
        document.getElementById('lista-mesas').innerHTML = mesas.map(m => `
            <div class="mesa" onclick="selMesa(${m.id})" style="background:${m.total > 0 ? '#ff7675' : '#f1c40f'}">
                MESA ${m.id} <br> R$ ${m.total.toFixed(2)}
            </div>
        `).join('');
        // Render Produtos
        document.getElementById('lista-prods').innerHTML = produtos.map(p => `
            <div class="item" onclick="lancar(${p.id})">
                <strong>${p.nome}</strong><br>R$ ${p.preco.toFixed(2)}
            </div>
        `).join('');
    }

    function selMesa(id) {
        mesaAtiva = id;
        document.getElementById('status-mesa').innerText = "CONTA MESA " + id;
        attCarrinho();
    }

    function lancar(idProd) {
        if(!mesaAtiva) return alert("Selecione a Mesa primeiro!");
        let p = produtos.find(x => x.id == idProd);
        let m = mesas.find(x => x.id == mesaAtiva);
        m.itens.push(p);
        m.total += p.preco;
        render();
        attCarrinho();
    }

    function attCarrinho() {
        let m = mesas.find(x => x.id == mesaAtiva);
        document.getElementById('itens-carrinho').innerHTML = m.itens.map(i => `<div>${i.nome} - R$ ${i.preco.toFixed(2)}</div>`).join('');
        document.getElementById('c-total').innerText = m.total.toFixed(2);
    }

    function pagar() {
        if(!mesaAtiva) return;
        let m = mesas.find(x => x.id == mesaAtiva);
        alert("Venda Fechada: R$ " + m.total.toFixed(2));
        m.itens = []; m.total = 0;
        mesaAtiva = null;
        render(); attCarrinho();
        document.getElementById('status-mesa').innerText = "Mesa Livre";
    }

    render();
</script>

</body>
</html>
