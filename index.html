<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Ultra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* CABEÇALHO COM MENU DROP-DOWN */
        header { 
            background: #1a1a1a; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            height: 60px; 
            border-bottom: 2px solid #ffcc00; 
            z-index: 100;
        }
        .logo-area { font-weight: bold; color: #ffcc00; margin-right: 40px; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        
        .menu-container { display: flex; gap: 20px; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: none; border: none; color: white; cursor: pointer; padding: 20px 0; font-size: 0.9em; font-weight: 500; }
        .dropdown-content { 
            display: none; position: absolute; background-color: #222; min-width: 160px; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden;
        }
        .dropdown-content button { 
            color: white; padding: 12px 16px; text-decoration: none; display: block; 
            background: none; border: none; width: 100%; text-align: left; cursor: pointer;
        }
        .dropdown-content button:hover { background-color: #333; color: #ffcc00; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown:hover .dropbtn { color: #ffcc00; }

        /* ÁREA PRINCIPAL DIVIDIDA */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* CENTRO - MESAS COMPACTAS */
        .mesas-area { flex: 1; padding: 15px; overflow-y: auto; background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%); }
        #grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .card-mesa { 
            padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .status-livre { background: #1b5e20; }
        .status-ocupada { background: #b71c1c; }
        .mesa-header { font-size: 0.7em; opacity: 0.8; }
        .mesa-body { font-size: 0.9em; font-weight: bold; margin: 4px 0; }
        .mesa-valor { font-size: 0.85em; color: #ffcc00; }

        /* DIREITA - RECIBO */
        .sidebar-recibo { 
            width: 300px; background: #fff; color: #333; display: flex; flex-direction: column; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
        }
        .recibo-topo { padding: 15px; border-bottom: 2px dashed #eee; text-align: center; background: #f9f9f9; }
        .recibo-itens { flex: 1; padding: 15px; font-family: monospace; font-size: 0.85em; overflow-y: auto; }
        .recibo-total { padding: 15px; border-top: 2px dashed #eee; font-size: 1.2em; font-weight: bold; text-align: right; background: #f9f9f9; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">🍻 BOTECO 934</div>
        <div class="menu-container">
            <div class="dropdown">
                <button class="dropbtn">SISTEMA ▼</button>
                <div class="dropdown-content">
                    <button onclick="zerarSistema()">Zerar Tudo</button>
                    <button onclick="location.reload()">Atualizar Site</button>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">FINANCEIRO ▼</button>
                <div class="dropdown-content">
                    <button onclick="alert('Relatório de Vendas em breve')">Vendas do Dia</button>
                    <button onclick="alert('Penduras em breve')">Lista de Devedores</button>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">ESTOQUE ▼</button>
                <div class="dropdown-content">
                    <button onclick="alert('Gestão de XML em breve')">Importar XML</button>
                    <button onclick="alert('Ajuste de Preços em breve')">Preços Custo/Venda</button>
                </div>
            </div>
        </div>
    </header>

    <div class="workspace">
        <main class="mesas-area">
            <div id="grid-mesas"></div>
        </main>

        <aside class="sidebar-recibo">
            <div class="recibo-topo">
                <h3 style="margin:0">RECIBO</h3>
                <small id="data-recibo"></small>
            </div>
            <div class="recibo-itens" id="recibo-corpo">
                <p style="color:#999; text-align:center; margin-top:20px;">Clique em uma mesa ocupada para detalhar</p>
            </div>
            <div class="recibo-total" id="total-recibo">
                Total: R$ 0,00
            </div>
        </aside>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: "Cerveja 600ml Gelada", preco: 12.00 },
            { id: 2, nome: "Cerveja 600ml Grade", preco: 9.50 },
            { id: 3, nome: "Dose Whisky", preco: 12.00 },
            { id: 4, nome: "Refrigerante", preco: 6.00 },
            { id: 5, nome: "Gelo Pacote", preco: 15.00 }
        ];

        let mesas = JSON.parse(localStorage.getItem('boteco_v4')) || Array.from({ length: 24 }, (_, i) => ({
            id: i + 1, ocupada: false, cliente: "", total: 0, itens: []
        }));

        function salvar() { localStorage.setItem('boteco_v4', JSON.stringify(mesas)); }

        function renderizar() {
            document.getElementById('data-recibo').innerText = new Date().toLocaleDateString();
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = mesas.map(m => `
                <div class="card-mesa ${m.ocupada ? 'status-ocupada' : 'status-livre'}" onclick="gerenciar(${m.id})">
                    <div class="mesa-header">MESA ${m.id}</div>
                    <div class="mesa-body">${m.ocupada ? m.cliente.substring(0,10) : 'LIVRE'}</div>
                    <div class="mesa-valor">${m.ocupada ? 'R$' + m.total.toFixed(2) : ''}</div>
                </div>
            `).join('');
        }

        function gerenciar(id) {
            let mesa = mesas.find(m => m.id === id);
            if (!mesa.ocupada) {
                let n = prompt("Nome do Cliente:");
                if (n) { mesa.ocupada = true; mesa.cliente = n; mesa.itens = []; }
            } else {
                exibirRecibo(mesa);
                let op = prompt("1: + Adicionar | 2: PAGO | 3: PENDURA | 4: Sair");
                if (op === "1") {
                    let lista = produtos.map(p => `${p.id}: ${p.nome}`).join('\n');
                    let cod = prompt("CÓDIGO:\n" + lista);
                    let p = produtos.find(item => item.id == cod);
                    if (p) {
                        mesa.total += p.preco;
                        mesa.itens.push({ nome: p.nome, preco: p.preco });
                        exibirRecibo(mesa);
                    }
                } else if (op === "2" || op === "3") {
                    mesa.ocupada = false; mesa.cliente = ""; mesa.total = 0; mesa.itens = [];
                    document.getElementById('recibo-corpo').innerHTML = "<p>Mesa Finalizada!</p>";
                }
            }
            salvar(); renderizar();
        }

        function exibirRecibo(mesa) {
            const corpo = document.getElementById('recibo-corpo');
            corpo.innerHTML = `<div style="border-bottom:1px solid #ddd; padding-bottom:10px; margin-bottom:10px"><strong>CLIENTE: ${mesa.cliente}</strong></div>` + 
                mesa.itens.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.nome}</span><span>${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-recibo').innerText = "Total: R$ " + mesa.total.toFixed(2);
        }

        function zerarSistema() {
            if (confirm("Zerar todas as mesas?")) {
                mesas.forEach(m => { m.ocupada = false; m.cliente = ""; m.total = 0; m.itens = []; });
                salvar(); renderizar();
            }
        }
        renderizar();
    </script>
</body>
</html>
