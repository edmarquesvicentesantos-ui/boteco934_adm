<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boteco 934 - PDV Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --green: #22c55e; --text: #f8fafc; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; }
        
        .header-bar { text-align: center; padding: 10px; border-bottom: 1px solid #1e293b; margin-bottom: 15px; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        
        .lista-estoque { background: var(--card); border-radius: 12px; border: 1px solid #1e293b; overflow: hidden; }
        .produto-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1e293b; }
        .produto-item:last-child { border-bottom: none; }
        .nome-prod { font-size: 13px; font-weight: 600; text-transform: uppercase; flex: 1; padding-right: 10px; }
        .preco-prod { color: var(--green); font-weight: 900; font-size: 15px; white-space: nowrap; }

        .btn-acao { background: var(--green); color: black; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>

<div class="header-bar">
    <h2 style="color:var(--accent); margin:0; font-size: 20px;">BOTECO 934</h2>
    <span id="status-rede" class="status-tag" style="background:#450a0a; color:#f87171;">OFFLINE</span>
</div>

<div class="lista-estoque" id="display-estoque">
    <p style="padding:20px; text-align:center; color:#64748b;">Sincronizando com a nuvem...</p>
</div>

<button class="btn-acao" onclick="cadastrarNovo()">+ NOVO PRODUTO</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX70Jks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.appspot.com",
        messagingSenderId: "182023728304",
        appId: "1:182023728304:web:80c8402f068c8578508f75"
    };

    // Inicializa
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Monitor de Conexão (Para ver se o iPhone pegou a internet)
    db.ref('.info/connected').on('value', snap => {
        const el = document.getElementById('status-rede');
        if (snap.val() === true) {
            el.innerText = "SISTEMA ONLINE ✅";
            el.style.background = "#064e3b"; el.style.color = "#4ade80";
        } else {
            el.innerText = "SEM CONEXÃO ❌";
            el.style.background = "#450a0a"; el.style.color = "#f87171";
        }
    });

    // 2. Carregar e Corrigir os Dados (Resolve o erro do R$ NaN)
    db.ref('produtos').on('value', snapshot => {
        const listaDiv = document.getElementById('display-estoque');
        const dados = snapshot.val();
        
        if (dados) {
            let html = '';
            // Transforma em array e organiza
            const itens = Object.values(dados);
            
            itens.forEach(p => {
                // Força o preço a ser um número para não dar erro no iPhone
                let precoLimpo = parseFloat(p.preco) || 0;
                html += `
                    <div class="produto-item">
                        <div class="nome-prod">${p.nome || 'SEM NOME'}</div>
                        <div class="preco-prod">R$ ${precoLimpo.toFixed(2)}</div>
                    </div>
                `;
            });
            listaDiv.innerHTML = html;
        } else {
            listaDiv.innerHTML = '<p style="padding:20px; text-align:center;">Estoque vazio no Firebase.</p>';
        }
    }, error => {
        alert("Erro ao ler dados: " + error.message);
    });

    // 3. Função de Cadastro
    function cadastrarNovo() {
        const nome = prompt("Nome do Produto:");
        const preco = prompt("Preço (use ponto em vez de vírgula, ex: 10.50):");
        
        if (nome && preco) {
            const id = Date.now();
            db.ref('produtos/' + id).set({
                nome: nome.toUpperCase(),
                preco: preco.replace(',', '.') // Troca vírgula por ponto automaticamente
            }).then(() => {
                alert("Salvo com sucesso!");
            });
        }
    }
</script>

</body>
</html>
