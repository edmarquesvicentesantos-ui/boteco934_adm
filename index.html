<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --green: #22c55e; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #1e293b; font-weight: 900; letter-spacing: 2px; color: var(--accent); }
        .container { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .produto-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1e293b; font-weight: 600; }
        .status { font-size: 12px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .btn-cadastrar { position: fixed; bottom: 30px; right: 30px; background: var(--green); color: #000; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

<header>BOTECO 934</header>

<div class="container">
    <div class="card">
        <span class="status" id="status-conexao">Conectando...</span>
        <h2>Estoque na Nuvem</h2>
        <div id="lista-estoque">Aguardando dados...</div>
    </div>
</div>

<button class="btn-cadastrar" onclick="addProduto()">+</button>

<script>
    // CHAVES EXTRAÍDAS DAS SUAS FOTOS
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX70Jks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.appspot.com",
        messagingSenderId: "182023728304",
        appId: "1:182023728304:web:80c8402f068c8578508f75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Monitor de Conexão
    db.ref('.info/connected').on('value', snap => {
        const el = document.getElementById('status-conexao');
        if (snap.val() === true) {
            el.innerText = "● ONLINE (Firebase Conectado)";
            el.style.color = "var(--green)";
        } else {
            el.innerText = "● OFFLINE (Tentando conectar...)";
            el.style.color = "red";
        }
    });

    // Lê os produtos e mostra na tela
    db.ref('produtos').on('value', snapshot => {
        const lista = document.getElementById('lista-estoque');
        const dados = snapshot.val();
        
        if (dados) {
            let html = '';
            // Converte o objeto do Firebase em lista e organiza de A a Z
            const arrayProd = Object.values(dados).sort((a, b) => a.nome.localeCompare(b.nome));
            
            arrayProd.forEach(p => {
                html += `<div class="produto-item"><span>${p.nome}</span> <span style="color:var(--green)">R$ ${parseFloat(p.preco).toFixed(2)}</span></div>`;
            });
            lista.innerHTML = html;
        } else {
            lista.innerHTML = "O estoque está vazio no Firebase. Clique no botão + para cadastrar seu primeiro item!";
        }
    });

    // Função para cadastrar e enviar para a nuvem
    function addProduto() {
        const nome = prompt("Nome do Produto (Ex: Cerveja Skol):");
        const preco = prompt("Preço de Venda:");
        
        if (nome && preco) {
            const id = Date.now(); // Gera um ID único
            db.ref('produtos/' + id).set({
                nome: nome.toUpperCase(),
                preco: preco
            }).then(() => {
                alert("Sucesso! O produto foi enviado para a nuvem.");
            }).catch(err => {
                alert("Erro ao salvar: " + err.message);
            });
        }
    }
</script>

</body>
</html>
