<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 | SISTEMA OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; user-select: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col overflow-hidden">

    <header class="p-2 bg-black border-b border-yellow-500 flex justify-between items-center shadow-2xl">
        <h1 class="font-black text-yellow-500 italic text-xl tracking-tighter">BOTECO 934</h1>
        <div class="flex gap-2">
            <button onclick="abrirCalc()" class="bg-yellow-600 text-black px-3 py-2 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95">📊 CALC</button>
            <button onclick="abrirEstoque()" class="bg-blue-600 px-3 py-2 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95">📦 XML</button>
            <button onclick="zerarProdutos()" class="bg-red-600 px-3 py-2 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95">🗑️ LIMPAR</button>
            <button onclick="location.reload()" class="bg-slate-800 px-3 py-2 rounded-xl text-xs">🔄</button>
        </div>
    </header>

    <div id="grid-mesas" class="p-1 grid grid-cols-8 gap-1 bg-slate-950 border-b border-slate-800 overflow-y-auto max-h-24"></div>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-1/3 bg-slate-800 border-r border-slate-700 overflow-y-auto p-1" id="lista-prods"></aside>
        
        <main class="w-2/3 bg-black p-2 flex flex-col">
            <div class="bg-yellow-50 text-black flex-1 p-2 rounded shadow-inner overflow-y-auto">
                <p class="font-black border-b border-black mb-2 text-center uppercase text-[10px] tracking-widest" id="mesa-titulo">Selecione uma mesa</p>
                <div id="itens-lista" class="text-[11px] space-y-1 font-mono uppercase italic"></div>
            </div>
            <div class="mt-2 text-right p-3 bg-slate-900 rounded-2xl border border-slate-700">
                <p class="text-yellow-500 font-black text-3xl">R$ <span id="total-val">0.00</span></p>
                <button onclick="finalizarVenda()" class="w-full bg-green-600 py-5 mt-2 rounded-2xl font-black text-white uppercase shadow-lg text-sm active:bg-green-700 transition-all">Finalizar Venda</button>
            </div>
        </main>
    </div>

    <div id="modal-calc" class="hidden fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-4">
        <div class="bg-slate-100 p-6 rounded-[32px] w-full max-w-sm text-slate-900 shadow-2xl">
            <h2 class="font-black text-center mb-4 uppercase text-blue-700 italic border-b pb-2">Precificação Boteco 934</h2>
            <div class="space-y-3">
                <input type="number" id="calc-custo" class="w-full p-3 rounded-xl border border-slate-300" placeholder="Custo do Fardo/Garrafa (R$)" oninput="calcularLucro()">
                <input type="number" id="calc-qtd" class="w-full p-3 rounded-xl border border-slate-300" placeholder="Qtd de Itens/Doses" oninput="calcularLucro()">
                <input type="number" id="calc-extra" class="w-full p-3 rounded-xl border border-slate-300" placeholder="Gelo/Energia (R$)" oninput="calcularLucro()">
                <input type="number" id="calc-venda" class="w-full p-4 rounded-xl border-2 border-green-500 font-bold" placeholder="Preço de Venda Sugerido" oninput="calcularLucro()">
                
                <div class="bg-green-600 p-4 rounded-2xl text-white text-center shadow-inner">
                    <p class="text-[10px] uppercase font-bold opacity-80">Lucro Limpo no Bolso:</p>
                    <p class="text-3xl font-black">R$ <span id="res-lucro">0.00</span></p>
                    <p class="text-[10px] font-bold mt-1"><span id="res-porcent">0</span>% de Margem</p>
                </div>
            </div>
            <button onclick="abrirCalc()" class="w-full mt-5 py-2 text-slate-400 font-black text-[10px] uppercase tracking-widest text-center">Voltar ao Sistema</button>
        </div>
    </div>

    <div id="modal-xml" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-[32px] w-full max-w-sm text-black shadow-2xl text-center">
            <h2 class="font-black mb-6 uppercase italic text-lg border-b pb-2">Entrada de Estoque</h2>
            <div class="bg-blue-50 p-6 rounded-3xl border-2 border-dashed border-blue-400 mb-4">
                <input type="file" id="input-xml" accept=".xml" class="text-xs w-full mb-6">
                <button onclick="processarXMLTurbo()" id="btn-importar" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl text-sm">🚀 IMPORTAR AGORA</button>
            </div>
            <p id="status-msg" class="text-[10px] text-blue-600 mb-4 uppercase font-black animate-pulse"></p>
            <button onclick="abrirEstoque()" class="w-full py-2 text-gray-400 font-black text-[10px] uppercase">Sair</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE DO EDMARQUES
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let produtos = [];
        let mesaSelecionada = null;
        let mesas = Array.from({length: 16}, (_, i) => ({ id: i+1, itens: [], total: 0 }));

        async function carregar() {
            const snap = await db.collection("produtos").orderBy("nome").get();
            produtos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            desenharProds();
            desenharMesas();
        }

        function abrirCalc() { document.getElementById('modal-calc').classList.toggle('hidden'); }
        function abrirEstoque() { document.getElementById('modal-xml').classList.toggle('hidden'); }

        function calcularLucro() {
            const c = parseFloat(document.getElementById('calc-custo').value) || 0;
            const q = parseFloat(document.getElementById('calc-qtd').value) || 1;
            const e = parseFloat(document.getElementById('calc-extra').value) || 0;
            const v = parseFloat(document.getElementById('calc-venda').value) || 0;
            
            const custoUn = (c + e) / q;
            const lucro = v - custoUn;
            const margem = v > 0 ? (lucro / v) * 100 : 0;

            document.getElementById('res-lucro').innerText = lucro.toFixed(2);
            document.getElementById('res-porcent').innerText = margem.toFixed(0);
        }

        async function processarXMLTurbo() {
            const file = document.getElementById('input-xml').files[0];
            const btn = document.getElementById('btn-importar');
            const status = document.getElementById('status-msg');
            if(!file) return alert("Selecione a nota XML!");

            btn.innerText = "⚡ LENDO NOTA...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
                    const itens = xmlDoc.getElementsByTagName("det");
                    const batch = db.batch();

                    for (let i = 0; i < itens.length; i++) {
                        const nome = itens[i].getElementsByTagName("xProd")[0].textContent.toUpperCase();
                        const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent);
                        const novoRef = db.collection("produtos").doc();
                        batch.set(novoRef, { nome: nome, preco: custo * 1.4 });
                        status.innerText = "LENDO: " + (i+1) + "/" + itens.length;
                    }
                    status.innerText = "🚀 SALVANDO NO FIREBASE...";
                    await batch.commit();
                    alert("NOTA IMPORTADA COM SUCESSO!");
                    location.reload();
                } catch (err) {
                    alert("Erro: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "🚀 IMPORTAR AGORA";
                }
            };
            reader.readAsText(file);
        }

        async function zerarProdutos() {
            if(confirm("Deseja apagar TODO o seu estoque atual?")) {
                const snap = await db.collection("produtos").get();
                const batch = db.batch();
                snap.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("Estoque limpo!");
                location.reload();
            }
        }

        function desenharMesas() {
            document.getElementById('grid-mesas').innerHTML = mesas.map(m => `
                <button onclick="setMesa(${m.id})" class="h-12 ${m.id === mesaSelecionada ? 'ring-4 ring-yellow-400 scale-95 shadow-inner' : ''} ${m.total > 0 ? 'bg-red-600 animate-pulse' : 'bg-green-600'} rounded-xl text-[10px] font-black shadow-lg transition-all">M${m.id}<br>${m.total > 0 ? 'R$'+m.total.toFixed(0) : ''}</button>
            `).join('');
        }

        function setMesa(id) {
            mesaSelecionada = id;
            document.getElementById('mesa-titulo').innerText = "ATENDENDO MESA " + id;
            atualizarCupom(); desenharMesas();
        }

        function desenharProds() {
            document.getElementById('lista-prods').innerHTML = produtos.map(p => `
                <button onclick="add('${p.id}')" class="w-full bg-slate-700 p-3 rounded-2xl mb-2 text-left border border-slate-600 active:bg-slate-500 shadow-md">
                    <p class="text-[10px] font-black uppercase text-white truncate leading-tight">${p.nome}</p>
                    <p class="text-yellow-400 font-black text-xs italic">R$ ${p.preco.toFixed(2)}</p>
                </button>
            `).join('');
        }

        function add(id) {
            if(!mesaSelecionada) return alert("Selecione a MESA!");
            const p = produtos.find(x => x.id === id);
            const m = mesas.find(x => x.id === mesaSelecionada);
            m.itens.push(p);
            m.total = m.itens.reduce((a, b) => a + b.preco, 0);
            atualizarCupom(); desenharMesas();
        }

        function atualizarCupom() {
            const m = mesas.find(x => x.id === mesaSelecionada);
            document.getElementById('itens-lista').innerHTML = m.itens.map(i => `<div class="flex justify-between border-b border-gray-200 py-2"><span>1x ${i.nome}</span><span class="font-bold">${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-val').innerText = m.total.toFixed(2);
        }

        async function finalizarVenda() {
            const m = mesas.find(x => x.id === mesaSelecionada);
            if(!m || m.total === 0) return alert("Mesa vazia!");
            if(confirm("Finalizar Mesa " + mesaSelecionada + "?")) {
                await db.collection("vendas").add({ mesa: mesaSelecionada, total: m.total, data: new Date() });
                m.itens = []; m.total = 0;
                atualizarCupom(); desenharMesas();
                alert("Venda registrada!");
            }
        }

        carregar();
    </script>
</body>
</html>
