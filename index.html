<!DOCTYPE html>
<html lang="pt-br">
<head>
<button onclick="enviarFechamentoDia()" class="w-full mt-4 py-4 bg-red-700 text-white font-black rounded-2xl text-[10px] uppercase shadow-lg border-2 border-red-500 active:bg-red-800">
    🚀 Fechar Dia e Enviar Relatório
</button>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDV | BOTECO 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { touch-action: manipulation; background-color: #0f172a; color: white; }
        .cupom { font-family: 'Courier New', monospace; background-color: #fffdec; color: black; }
        .tracejado { border-top: 2px dashed #000; margin: 4px 0; }
        ::-webkit-scrollbar { display: none; }
        .btn-acao { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-acao:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-900 p-3 shadow-lg flex justify-between items-center border-b border-yellow-600">
        <div>
            <h1 class="text-xl font-black italic text-yellow-500 tracking-tighter">BOTECO 934</h1>
            <div class="flex gap-2 mt-1">
                <button onclick="abrirContatos()" class="text-[9px] bg-blue-700 px-2 py-1 rounded uppercase font-bold">👥 Contatos</button>
                <button onclick="abrirPainelGerente()" class="text-[9px] bg-yellow-600 px-2 py-1 rounded uppercase font-bold text-black">💰 Precificar</button>
            </div>
        </div>
        <div class="text-right">
            <p id="clock" class="text-xs font-mono text-yellow-500">00:00:00</p>
            <p class="text-[8px] text-gray-400 uppercase">Petrolina-PE</p>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-[45%] bg-slate-800 flex flex-col border-r border-slate-700">
            <div id="menu-categorias" class="flex overflow-x-auto bg-slate-900 p-1 gap-1 border-b border-slate-700">
                <button onclick="filtrar('Tudo')" class="px-4 py-3 text-[10px] font-bold uppercase text-yellow-500">Tudo</button>
                <button onclick="filtrar('Cervejas')" class="px-4 py-3 text-[10px] font-bold uppercase text-gray-400">Cervejas</button>
                <button onclick="filtrar('Doses')" class="px-4 py-3 text-[10px] font-bold uppercase text-gray-400">Doses</button>
            </div>
            <div id="lista-produtos" class="p-2 space-y-2 overflow-y-auto pb-24"></div>
        </aside>

        <main class="w-[55%] p-2 bg-slate-900 flex flex-col justify-between">
            <div class="cupom p-3 shadow-inner rounded-sm flex flex-col flex-1 overflow-hidden text-[10px]">
                <div class="text-center font-bold uppercase">
                    <p class="text-xs">*** RECIBO BOTECO 934 ***</p>
                    <div class="tracejado"></div>
                </div>
                <div id="itens-venda" class="flex-1 overflow-y-auto space-y-1 py-1"></div>
                <div class="mt-auto">
                    <div class="tracejado"></div>
                    <div class="flex justify-between font-black text-lg text-red-600">
                        <span>A PAGAR</span>
                        <span id="valor-total">0.00</span>
                    </div>
                </div>
            </div>

            <div class="mt-2 space-y-2">
                <select id="forma-pagamento" class="w-full p-3 bg-slate-800 text-yellow-500 rounded-xl border border-slate-600 font-bold text-xs uppercase outline-none">
                    <option value="DINHEIRO">💵 DINHEIRO</option>
                    <option value="PIX">💎 PIX</option>
                    <option value="CREDITO">💳 CRÉDITO</option>
                    <option value="DEBITO">💳 DÉBITO</option>
                    <option value="PENDURA">📝 PENDURA (FIADO)</option>
                </select>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="enviarWhatsApp()" class="btn-acao bg-green-700 text-white font-bold py-4 rounded-xl text-[10px] uppercase">WhatsApp</button>
                    <button onclick="finalizarVenda()" class="btn-acao bg-yellow-500 text-black font-black py-4 rounded-xl text-[10px] uppercase">Receber</button>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-contatos" class="hidden fixed inset-0 bg-black/95 z-50 p-4 flex items-center justify-center">
        <div class="bg-slate-800 rounded-2xl p-5 w-full max-w-sm border border-slate-600">
            <h2 class="text-yellow-500 font-bold uppercase mb-4 text-center">Agenda & Fornecedores</h2>
            <div class="space-y-2 mb-4">
                <input type="text" id="cont-nome" placeholder="Nome" class="w-full p-3 bg-slate-900 rounded-lg text-sm text-white border border-slate-700">
                <input type="number" id="cont-fone" placeholder="WhatsApp (DDD)" class="w-full p-3 bg-slate-900 rounded-lg text-sm text-white border border-slate-700">
                <button onclick="salvarContato()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg text-xs uppercase">Adicionar</button>
            </div>
            <div id="lista-contatos" class="max-h-60 overflow-y-auto space-y-2 border-t border-slate-700 pt-3"></div>
            <button onclick="fecharContatos()" class="w-full mt-4 py-2 text-gray-500 text-[10px] uppercase font-bold">Voltar</button>
        </div>
    </div>

    <div id="modal-gerente" class="hidden fixed inset-0 bg-black/95 z-50 p-4 flex items-center justify-center">
        <div class="bg-slate-800 rounded-2xl p-6 w-full max-w-sm border border-yellow-500">
            <h2 class="font-bold text-yellow-500 mb-4 uppercase text-center text-sm">Ajuste de Preços (18 Doses)</h2>
            <input type="text" id="calc-nome" placeholder="Produto" class="w-full p-3 bg-slate-900 rounded-lg mb-3 text-white border border-slate-700">
            <input type="number" id="calc-custo" placeholder="Custo da Garrafa (R$)" class="w-full p-3 bg-slate-900 rounded-lg mb-4 text-white font-bold text-lg border border-slate-700">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-700 text-center">
                    <p class="text-[8px] text-gray-500 uppercase">Dose Sugerida</p>
                    <p id="sugestao-dose" class="text-green-500 font-black">R$ 0,00</p>
                </div>
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-700 text-center">
                    <p class="text-[8px] text-gray-500 uppercase">Litro Sugerido</p>
                    <p id="sugestao-litro" class="text-green-500 font-black">R$ 0,00</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fecharPainelGerente()" class="flex-1 text-gray-500 text-[10px] uppercase">Cancelar</button>
                <button onclick="salvarPrecos()" class="flex-1 py-3 bg-yellow-500 text-black font-black rounded-xl text-[10px] uppercase">Salvar no PDV</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
