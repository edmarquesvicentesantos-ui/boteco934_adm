<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão 2.0</title>
    <style>
        :root { --amarelo: #ffcc00; --preto: #000; --cinza: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: #fff; }

        header { background: var(--amarelo); padding: 20px; color: #000; text-align: center; border-bottom: 5px solid #333; }
        nav { background: var(--cinza); display: flex; justify-content: center; border-bottom: 1px solid #444; }
        .nav-item { padding: 15px 30px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); background: rgba(255,204,0,0.1); }

        .container { padding: 25px; max-width: 900px; margin: auto; }
        .secao { display: none; }
        .ativa { display: block; }

        /* Inputs e Botões */
        .form-grupo { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; flex: 1; min-width: 200px; }
        button { background: var(--amarelo); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; }

        /* Lista de Clientes */
        .cliente-item { background: #fff; color: #000; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .cliente-nome { font-weight: 900; font-size: 18px; }
        .cliente-contato { color: #555; font-weight: bold; font-size: 14px; background: #eee; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO - CLIENTES</h1>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('clientes', this)">Clientes e Contatos</div>
    <div class="nav-item" onclick="mudar('estoque', this)">Estoque XML</div>
</nav>

<div class="container">
    <div id="clientes" class="secao ativa">
        <div class="form-grupo">
            <input type="text" id="nomeCliente" placeholder="Nome do Cliente">
            <input type="text" id="contatoCliente" placeholder="WhatsApp / Telefone">
            <button onclick="salvarCliente()">Cadastrar</button>
        </div>

        <div id="listaClientes">
            <div style="text-align: center; color: #666;">Buscando clientes no banco de dados...</div>
        </div>
    </div>

    <div id="estoque" class="secao">
        <h2 style="color: var(--amarelo)">Módulo de Estoque Ativo</h2>
        <p>Os produtos importados via XML aparecerão aqui.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Suas credenciais oficiais
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- SALVAR CLIENTE COM CONTATO ---
    window.salvarCliente = function() {
        const nome = document.getElementById('nomeCliente').value;
        const contato = document.getElementById('contatoCliente').value;

        if(!nome || !contato) {
            alert("Preencha Nome e Contato!");
            return;
        }

        push(ref(db, 'clientes'), {
            nome: nome,
            contato: contato
        }).then(() => {
            document.getElementById('nomeCliente').value = "";
            document.getElementById('contatoCliente').value = "";
            alert("✅ Cadastrado com sucesso!");
        }).catch((error) => {
            alert("Erro ao salvar: " + error.message);
        });
    };

    // --- LER CLIENTES EM TEMPO REAL ---
    const clientesRef = ref(db, 'clientes');
    onValue(clientesRef, (snapshot) => {
        const div = document.getElementById('listaClientes');
        div.innerHTML = "";
        
        if (snapshot.exists()) {
            const dados = snapshot.val();
            Object.values(dados).forEach((c) => {
                div.innerHTML += `
                    <div class="cliente-item">
                        <div class="cliente-nome">👤 ${c.nome.toUpperCase()}</div>
                        <div class="cliente-contato">📞 ${c.contato}</div>
                    </div>
                `;
            });
        } else {
            div.innerHTML = "<div style='color: #888; text-align: center;'>Nenhum cliente encontrado. Faça o primeiro cadastro acima!</div>";
        }
    });

    // Função de navegação
    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    };
</script>
</body>
</html>
