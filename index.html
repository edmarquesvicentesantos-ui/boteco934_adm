<!DOCTYPE html>

        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 30px; }

        /* TÍTULO OURO */
        .gold-header { text-align: center; padding: 10px; border-bottom: 2px solid var(--gold); color: var(--gold); text-transform: uppercase; margin-bottom: 15px; }
        .gold-header h1 { font-size: 20px; letter-spacing: 2px; margin: 0; }

        /* CAMPO DE BIPE */
        .input-container { margin-bottom: 15px; }
        input#barcodeInput { width: 100%; padding: 18px; border-radius: 10px; border: 2px solid var(--gold); background: #000; color: #fff; font-size: 18px; text-align: center; }

        /* CUPOM FISCAL BRANCO (VISUAL PROFISSIONAL) */
        #cupom-container { background: #fff; color: #000; padding: 20px; font-family: 'Courier New', Courier, monospace; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-height: 200px; }
        .cupom-topo { text-align: center; border-bottom: 1px dashed #000; margin-bottom: 15px; padding-bottom: 10px; line-height: 1.2; }
        
        .item-linha { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .item-info { flex: 1; }
        .item-nome { font-weight: bold; font-size: 14px; text-transform: uppercase; display: block; }
        .item-detalhe { font-size: 12px; color: #555; }

        /* BOTÕES DE CONTROLE (+ - X) */
        .controles { display: flex; gap: 8px; align-items: center; }
        .btn-c { width: 35px; height: 35px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }
        .btn-menos { background: #f39c12; }
        .btn-mais { background: #27ae60; }
        .btn-excluir { background: #e74c3c; }

        /* TOTAL */
        .cupom-total { border-top: 2px solid #000; margin-top: 15px; padding-top: 10px; font-size: 22px; font-weight: 900; text-align: right; }
        .cupom-rodape { text-align: center; font-size: 11px; margin-top: 15px; border-top: 1px dashed #000; padding-top: 10px; }

        /* BOTÃO WHATSAPP */
        .btn-whats { background: #25d366; color: #fff; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
    </style>
</head>
