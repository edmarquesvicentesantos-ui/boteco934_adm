<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ELITE - BOTECO 934</title>
    <style>
        /* ESTILOS DO PAINEL PRINCIPAL */
        :root { --dark: #1a252f; --sidebar: #2c3e50; --accent: #f39c12; --bg: #dfe6e9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* MENU LATERAL */
        nav { width: 220px; background: var(--dark); color: white; display: flex; flex-direction: column; border-right: 3px solid var(--accent); }
        .cabecalho-nav { padding: 25px 15px; background: #141d26; text-align: center; border-bottom: 1px solid #2c3e50; }
        .cabecalho-nav h1 { color: var(--accent); font-size: 18px; letter-spacing: 1px; }

        .nav-item { 
            padding: 15px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #2c3e50; 
            text-decoration: none; 
            color: #bdc3c7; 
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .nav-item:hover { background: var(--sidebar); color: var(--accent); padding-left: 30px; }
        .nav-item.active { background: var(--sidebar); color: var(--accent); border-left: 5px solid var(--accent); }

        /* ÁREA DE CONTEÚDO DINÂMICO */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* O IFRAME É ONDE AS OUTRAS PÁGINAS VÃO APARECER */
        #frame-conteudo { width: 100%; height: 100%; border: none; }

        .rodape-status { background: #fff; padding: 5px 15px; font-size: 11px; border-top: 1px solid #ccc; color: #666; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <nav>
        <div class="cabecalho-nav">
            <h1>BOTECO 934</h1>
            <small style="color: #7f8c8d;">Painel de Controle</small>
        </div>

        <a href="vendas.html" target="janela_principal" class="nav-item">🛒 Frente de Caixa</a>
        <a href="estoque.html" target="conteudo" class="nav-item">🧠 Mix Inteligente</a>
        <a href="financeiro.html" target="conteudo" class="nav-item">💸 Contas a Pagar</a>
        <a href="boticario.html" target="conteudo" class="nav-item">🌸 O Boticário</a>
        <a href="clientes.html" target="conteudo" class="nav-item">👥 Cadastro Pendura</a>
        
        <div style="margin-top: auto; padding: 20px;">
            <button onclick="window.location.reload()" style="width:100%; padding:8px; cursor:pointer; background:none; border:1px solid #444; color:#999; border-radius:4px;">Atualizar Sistema</button>
        </div>
    </nav>

    <main>
        <iframe name="conteudo" id="frame-conteudo" src="vendas.html"></iframe>
        
        <div class="rodape-status">
            <span>Operador: Edmarques Santos</span>
            <span>Status: Sistema Online</span>
        </div>
    </main>

    <script>
        // Lógica simples para marcar qual item do menu está ativo
        const links = document.querySelectorAll('.nav-item');
        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>

</body>
</html>
