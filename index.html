<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - GESTÃO COMPLETA</title>
    <style>
        :root { --gold: #ffcc00; --blue: #00d4ff; --bg: #050505; --glass: rgba(20, 20, 20, 0.98); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; }
        header { background: var(--gold); padding: 12px 25px; color: #000; font-weight: 900; display: flex; justify-content: space-between; }
        nav { background: #111; display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 18px 20px; cursor: pointer; color: #666; font-weight: bold; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        .nav-item.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .secao { display: none; }
        .ativa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 1px solid #333; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 13px; }
        .btn-zap { background: #25d366; color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div>934 BOTECO - SISTEMA</div>
    <div id="relogio">00:00:00</div>
</header>

<nav>
    <div class="nav-item active" onclick="mudarTela('vendas', this)">🛒 Vendas</div>
    <div class="nav-item" onclick="mudarTela('clientes', this)">👥 Clientes</div>
    <div class="nav-item" onclick="mudarTela('precificacao', this)">📊 Precificação</div>
    <div class="nav-item" onclick="mudarTela('estoque', this)">📦 Estoque / XML</div>
</nav>

<div class="container">
    
    <div id="clientes" class="secao">
        <div class="card">
            <h3 style="color:var(--gold); margin-bottom:15px;">👥 Cadastro de Clientes / Revenda</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:10px;">
                <input type="text" id="cli_nome" placeholder="Nome do Cliente">
                <input type="text" id="cli_zap" placeholder="WhatsApp (ex: 87999999999)">
                <button class="btn btn-gold" onclick="salvarCliente()" style="width:120px;">Salvar</button>
            </div>
            <table>
                <thead>
                    <tr><th>NOME</th><th>CONTATO</th><th>AÇÕES</th></tr>
                </thead>
                <tbody id="corpoClientes">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="vendas" class="secao ativa">
        <div style="display:grid; grid-template-columns: 1fr 380px; gap:20px;">
            <div class="card">
                <h3>Painel de Mesas</h3>
                <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; margin-top:15px;" id="gradeMesas"></div>
            </div>
            <div class="card" style="background:#fff; color:#000;">
                <div id="areaAbrir">
                    <h3>Abrir Mesa</h3>
                    <input type="text" id="nomeAtendimento" placeholder="Nome do Cliente" style="background:#f4f4f4; color:#000; margin-top:15px;">
                    <button class="btn btn-gold" onclick="abrirMesa()">Iniciar</button>
                </div>
                <div id="areaConsumo" style="display:none;">
                    <h3 id="hMesa">Mesa --</h3>
                    <p id="hCli" style="font-weight:bold; color:#666;"></p>
                    <div style="min-height:200px; margin-top:15px;">Total: R$ 0,00</div>
                    <select id="pagamento" style="background:#f4f4f4; color:#000;">
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="PIX">PIX</option>
                        <option value="Pendura">Pendura (Fiado)</option>
                    </select>
                    <button class="btn btn-gold" onclick="fechar()">Fechar Conta</button>
                </div>
            </div>
        </div>
    </div>

    <div id="precificacao" class="secao">
        <div class="card" style="max-width:500px; margin:auto;">
            <h3 style="color:var(--gold)">Cálculo de Margem Real</h3>
            <label>Custo</label><input type="number" id="c_custo" oninput="calc()">
            <label>Venda</label><input type="number" id="c_venda" oninput="calc()">
            <div style="background:#111; padding:20px; border-radius:10px; border-left:5px solid var(--gold); margin-top:15px;">
                <p style="font-size:11px;">LUCRO PORCENTAGEM:</p>
                <h2 id="resMargem" style="color:var(--gold)">0%</h2>
            </div>
        </div>
    </div>

    <div id="estoque" class="secao">
        <div class="card">
            <h3>Importar XML</h3>
            <input type="file" accept=".xml">
        </div>
    </div>

</div>

<script>
    let mesaSel = null;
    let mesas = {};
    let listaClientes = JSON.parse(localStorage.getItem('clientes_934')) || [];

    // Gerar Mesas
    const grade = document.getElementById('gradeMesas');
    for(let i=1; i<=20; i++){
        grade.innerHTML += `<div class="card" id="m${i}" style="padding:10px; text-align:center; cursor:pointer; background:#222;" onclick="selMesa(${i})">M${i}<br><small id="s${i}">Livre</small></div>`;
        mesas[i] = { ativa: false, cliente: '' };
    }

    function selMesa(n) {
        mesaSel = n;
        document.querySelectorAll('[id^="m"]').forEach(m => m.style.borderColor = "transparent");
        document.getElementById(`m${n}`).style.borderColor = "var(--gold)";
        if(mesas[n].ativa) {
            document.getElementById('areaAbrir').style.display='none';
            document.getElementById('areaConsumo').style.display='block';
            document.getElementById('hMesa').innerText = `Mesa ${n}`;
            document.getElementById('hCli').innerText = mesas[n].cliente;
        } else {
            document.getElementById('areaAbrir').style.display='block';
            document.getElementById('areaConsumo').style.display='none';
        }
    }

    function abrirMesa() {
        const nome = document.getElementById('nomeAtendimento').value;
        if(!nome) return alert("Dê um nome ao cliente!");
        mesas[mesaSel] = { ativa: true, cliente: nome };
        document.getElementById(`m${mesaSel}`).style.background = "#440000";
        document.getElementById(`s${mesaSel}`).innerText = nome;
        selMesa(mesaSel);
    }

    function fechar() {
        const forma = document.getElementById('pagamento').value;
        alert(`Recibo enviado para ${mesas[mesaSel].cliente} via ${forma}`);
        document.getElementById(`m${mesaSel}`).style.background = "#222";
        document.getElementById(`s${mesaSel}`).innerText = "Livre";
        mesas[mesaSel] = { ativa: false, cliente: '' };
        selMesa(mesaSel);
    }

    function salvarCliente() {
        const nome = document.getElementById('cli_nome').value;
        const zap = document.getElementById('cli_zap').value;
        if(nome && zap) {
            listaClientes.push({ nome, zap });
            localStorage.setItem('clientes_934', JSON.stringify(listaClientes));
            renderizarClientes();
            document.getElementById('cli_nome').value = '';
            document.getElementById('cli_zap').value = '';
        }
    }

    function renderizarClientes() {
        const corpo = document.getElementById('corpoClientes');
        corpo.innerHTML = '';
        listaClientes.forEach(c => {
            corpo.innerHTML += `<tr>
                <td>${c.nome}</td>
                <td>${c.zap}</td>
                <td><a href="https://wa.me/55${c.zap}" target="_blank" class="btn-zap">WhatsApp</a></td>
            </tr>`;
        });
    }

    function mudarTela(id, el) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    }

    function calc() {
        const c = document.getElementById('c_custo').value || 0;
        const v = document.getElementById('c_venda').value || 1;
        const m = ((v - c) / v) * 100;
        document.getElementById('resMargem').innerText = m.toFixed(1) + '%';
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    renderizarClientes();
</script>
</body>
</html>
