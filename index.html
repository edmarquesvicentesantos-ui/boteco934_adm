<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid #ff9f0a; padding-bottom: 10px; margin-bottom: 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .btn-menu { padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 15px; border: 1px solid #333; max-width: 500px; margin: auto; }
        .input-dark { width: 100%; padding: 12px; margin-top: 5px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        /* Estilo para as setas aparecerem melhor no celular */
        input[type=number]::-webkit-inner-spin-button { opacity: 1; height: 30px; }
        .painel-verde { margin-top: 15px; background: #000; padding: 15px; border-radius: 12px; border: 2px solid #30d158; text-align: center; }
        .resultado-texto { font-size: 24px; font-weight: bold; color: #30d158; }
        .btn-salvar { width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: #ff9f0a;">BOTECO 934</h2>
        <div class="menu-grid" style="margin-top:10px;">
            <button class="btn-menu" style="background: #ff9f0a; color: #000;" onclick="location.href='index.html'">Bebidas</button>
            <button class="btn-menu" style="background: #333; color: #fff;" onclick="location.href='vendas.html'">Vendas</button>
            <button class="btn-menu" style="background: #333; color: #fff;" onclick="location.href='clientes.html'">Pendura</button>
            <button class="btn-menu" style="background: #00a896; color: #fff;" onclick="location.href='boticario.html'">Boticário</button>
        </div>
    </div>

    <div class="card">
        <label style="font-size: 12px; color: #8e8e93;">NOME DO PRODUTO</label>
        <input type="text" id="nome-prod" class="input-dark" placeholder="Ex: Skol Lata">

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 11px; color: #8e8e93;">CUSTO FARDO</label>
                <input type="number" id="custo-fardo" class="input-dark" oninput="calcularPelaMargem()" step="0.01" placeholder="0.00">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 11px; color: #8e8e93;">QTD NO FARDO</label>
                <input type="number" id="qtd-fardo" class="input-dark" value="12" oninput="calcularPelaMargem()">
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 11px; color: #8e8e93;">MARKUP (%)</label>
                <input type="number" id="markup" class="input-dark" value="100" oninput="calcularPelaMargem()" step="1">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 11px; color: #8e8e93;">VENDA FARDO (R$)</label>
                <input type="number" id="venda-fardo" class="input-dark" oninput="calcularPeloPreco()" step="0.10" placeholder="0.00">
            </div>
        </div>

        <div class="painel-verde">
            <div style="font-size: 11px; color: #30d158;">LUCRO POR UNIDADE (LATA/GARRAFA)</div>
            <div id="res-lucro-un" class="resultado-texto">R$ 0,00</div>
            <div id="res-margem" style="font-size: 14px; color: #8e8e93; margin-top: 5px;">Margem: 50%</div>
        </div>

        <button onclick="salvarBebida()" class="btn-salvar">SALVAR NO ESTOQUE</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Se você mudar o Markup, calcula a Venda
        function calcularPelaMargem() {
            let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
            let mkp = parseFloat(document.getElementById('markup').value) || 0;
            let qtd = parseInt(document.getElementById('qtd-fardo').value) || 1;

            if (custo > 0) {
                let vendaTotal = custo * (1 + (mkp / 100));
                document.getElementById('venda-fardo').value = vendaTotal.toFixed(2);
                atualizarResumos(custo, vendaTotal, qtd);
            }
        }

        // Se você mudar o Preço de Venda, calcula o Markup
        function calcularPeloPreco() {
            let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
            let venda = parseFloat(document.getElementById('venda-fardo').value) || 0;
            let qtd = parseInt(document.getElementById('qtd-fardo').value) || 1;

            if (custo > 0 && venda > 0) {
                let mkp = ((venda / custo) - 1) * 100;
                document.getElementById('markup').value = mkp.toFixed(0);
                atualizarResumos(custo, venda, qtd);
            }
        }

        function atualizarResumos(custo, venda, qtd) {
            let lucroTotal = venda - custo;
            let lucroUn = lucroTotal / qtd;
            let margem = (lucroTotal / venda) * 100;

            document.getElementById('res-lucro-un').innerHTML = "R$ " + lucroUn.toFixed(2);
            document.getElementById('res-margem').innerHTML = "Margem Real: " + margem.toFixed(1) + "%";
        }

        async function salvarBebida() {
            const nome = document.getElementById('nome-prod').value.toUpperCase();
            const custo = document.getElementById('custo-fardo').value;
            const venda = document.getElementById('venda-fardo').value;
            const qtd = document.getElementById('qtd-fardo').value;

            if(!nome || !custo || !venda) return alert("Preencha os campos obrigatórios!");

            try {
                await db.collection("produtos").add({
                    nome, custo, venda, qtd_fardo: qtd, data: new Date()
                });
                alert("✅ " + nome + " cadastrado!");
                location.reload();
            } catch (e) { alert("Erro ao salvar!"); }
        }
    </script>
</body>
</html>
