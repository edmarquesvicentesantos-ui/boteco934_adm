<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV ELITE - Boteco 934</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --danger: #c0392b; --accent: #f1c40f; }
        
        /* Redução global do corpo e fontes */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-size: 0.85rem; /* Fonte reduzida */
        }

        header { 
            background: var(--primary); 
            color: white; 
            padding: 8px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
        }

        .dre-item { background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; }
        .dre-item span { font-weight: bold; color: var(--accent); }

        main { display: flex; flex: 1; overflow: hidden; }

        /* NOVA BARRA LATERAL (SIDEBAR) */
        .sidebar {
            width: 70px; /* Largura compacta */
            background: var(--primary);
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-top: 10px;
        }
        .menu-item {
            color: #bdc3c7;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left: 3px solid var(--accent);
        }
        .menu-item i { display: block; font-size: 1.2rem; margin-bottom: 3px; }

        /* ÁREA CENTRAL DE PRODUTOS */
        .area-venda { 
            flex: 2; 
            display: flex; 
            flex-direction: column; 
            background: white; 
            padding: 10px; 
            border-right: 1px solid #ddd;
        }
        .barra-topo { display: flex; gap: 8px; margin-bottom: 10px; }
        #busca { flex: 2; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        #clienteSelect { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem; }

        .grid-produtos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); /* Cards menores */
            gap: 8px; 
            overflow-y: auto; 
        }
        .card { 
            border: 1px solid #eee; 
            border-radius: 6px; 
            padding: 6px; 
            text-align: center; 
            cursor: pointer; 
            background: #fff;
        }
        .card:hover { border-color: var(--success); background: #f9fff9; }
        .card img { width: 100%; height: 65px; object-fit: cover; border-radius: 3px; }
        .card h4 { margin: 4px 0; font-size: 0.75rem; height: 30px; overflow: hidden; line-height: 1; }
