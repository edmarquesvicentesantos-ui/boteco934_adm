<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV | BOTECO 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .fonte-13 { font-size: 13px !important; }
        .tarja-botao { background-color: #1e3a8a; } /* Azul Marinho */
    </style>
</head>
<body class="bg-gray-200 min-h-screen">
    <nav class="bg-blue-900 text-white p-3 shadow-md flex justify-between items-center">
        <h1 class="font-bold italic">BOTECO 934</h1>
        <div id="status-conexao" class="text-[10px] bg-green-500 px-2 py-1 rounded-full uppercase">Online</div>
    </nav>

    <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2">
            <h2 class="text-gray-600 font-bold mb-3 uppercase text-xs tracking-widest">Cardápio</h2>
            <div id="lista-produtos" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-4 h-fit border-t-4 border-blue-900">
            <h3 class="font-bold mb-4 border-b pb-2">Venda Atual</h3>
            <div id="itens-venda" class="space-y-2 mb-4 max-h-60 overflow-y-auto">
                <p class="text-gray-400 text-sm italic text-center">Nenhum item selecionado</p>
            </div>
            <div class="border-t pt-4">
                <div class="flex justify-between text-xl font-black mb-4">
                    <span>TOTAL</span>
                    <span id="valor-total">R$ 0,00</span>
                </div>
                <button onclick="finalizarVenda()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase">Finalizar Venda</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
