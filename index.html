<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão Profissional</title>
    <style>
        :root { --amarelo: #ffcc00; --azul-header: #2b579a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; }

        /* Estilo da Tabela conforme sua última versão */
        .barra-azul { 
            display: grid; 
            grid-template-columns: 2fr 1fr 1.5fr 1.5fr 1fr 1.2fr; 
            background: var(--azul-header); 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: bold;
            text-align: center;
        }

        .linha-dados { 
            display: grid; 
            grid-template-columns: 2fr 1fr 1.5fr 1.5fr 1fr 1.2fr; 
            margin-top: 5px; 
            color: #000; 
            font-weight: bold; 
            text-align: center; 
        }

        /* Cores Harmonizadas */
        .c-prod { background: #3b5998; color: #fff; padding: 12px; border-radius: 5px 0 0 5px; }
        .c-qtd { background: #4a7ebb; color: #fff; padding: 12px; }
        .c-custo { background: #fff2cc; padding: 12px; }
        .c-venda { background: #d9e1f2; padding: 12px; }
        .c-lucro { background: #fce4ec; padding: 12px; }
        .c-margem { background: #e2efda; padding: 12px; border-radius: 0 5px 5px 0; }

        header { background: var(--amarelo); padding: 15px 40px; color: #000; display: flex; justify-content: space-between; }
        nav { background: #1a1a1a; display: flex; padding: 0 40px; border-bottom: 2px solid #333; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #888; font-size: 12px; font-weight: bold; }
        .active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }
        .secao { display: none; padding: 20px; }
        .ativa { display: block; }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <div>Petrolina-PE | 32°C</div>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('estoque', this)">ESTOQUE XML</div>
    <div class="nav-item" onclick="mudar('clientes', this)">CLIENTES/FIADO</div>
</nav>

<div id="estoque" class="secao ativa">
    <div style="background:#1a1a1a; padding:20px; border-radius:10px; margin-bottom:20px;">
        <input type="file" id="xmlInput" accept=".xml">
        <button onclick="lancarNoFirebase()" style="background:var(--amarelo); padding:10px 20px; border:none; font-weight:bold; cursor:pointer;">LANÇAR NO FIREBASE</button>
    </div>

    <div class="barra-azul">
        <div>PRODUTO</div><div>QTD</div><div>CUSTO UNIT.</div><div>VENDA UNIT.</div><div>LUCRO</div><div>MARGEM %</div>
    </div>
    <div id="listaProdutos"></div>
</div>

<div id="clientes" class="secao">
    <h2 style="color:var(--amarelo); margin-bottom:15px;">CLIENTES CADASTRADOS</h2>
    <div id="listaClientes" style="background:#fff; color:#000; border-radius:10px; padding:10px;">
        Carregando clientes do Firebase...
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Suas credenciais oficiais
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. RECUPERAR CLIENTES (Garante que eles voltem a aparecer)
    onValue(ref(db, 'clientes'), (snapshot) => {
        const div = document.getElementById('listaClientes');
        div.innerHTML = "";
        const dados = snapshot.val();
        if(dados) {
            Object.values(dados).forEach(c => {
                div.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">👤 ${c.nome || 'Cliente sem nome'}</div>`;
            });
        } else { div.innerHTML = "Nenhum cliente encontrado na pasta 'clientes'."; }
    });

    // 2. LANÇAR XML SEM ERRO DE "NOTA JÁ IMPORTADA"
    window.lancarNoFirebase = function() {
        const file = document.getElementById('xmlInput').files[0];
        if(!file) return alert("Selecione o XML!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const produtos = xml.getElementsByTagName("det");

            for(let i=0; i<produtos.length; i++) {
                const nome = produtos[i].getElementsByTagName("xProd")[0].textContent;
                const custo = parseFloat(produtos[i].getElementsByTagName("vUnCom")[0].textContent);
                
                // O segredo está no PUSH: ele gera um ID novo toda vez, evitando o erro de nota repetida
                push(ref(db, 'produtos'), {
                    nome: nome,
                    qtd: 1,
                    custo: custo,
                    venda: custo * 1.5, // Exemplo de margem
                    lucro: custo * 0.5,
                    margem: 50
                });
            }
            alert("Lançado com sucesso!");
        };
        reader.readAsText(file);
    };

    // 3. MOSTRAR PRODUTOS NA TABELA COLORIDA
    onValue(ref(db, 'produtos'), (snapshot) => {
        const lista = document.getElementById('listaProdutos');
        lista.innerHTML = "";
        const data = snapshot.val();
        if(data) {
            Object.values(data).forEach(p => {
                lista.innerHTML += `
                    <div class="linha-dados">
                        <div class="c-prod">${p.nome}</div>
                        <div class="c-qtd">${p.qtd}</div>
                        <div class="c-custo">R$ ${p.custo.toFixed(2)}</div>
                        <div class="c-venda">R$ ${p.venda.toFixed(2)}</div>
                        <div class="c-lucro">R$ ${p.lucro.toFixed(2)}</div>
                        <div class="c-margem">${p.margem}%</div>
                    </div>`;
            });
        }
    });

    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    };
</script>
</body>
</html>
