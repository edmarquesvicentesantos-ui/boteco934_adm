<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE - BOTECO 934</title>
    <style>
        :root { --dark: #1a252f; --sidebar: #2c3e50; --accent: #f39c12; --bg: #dfe6e9; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* MENU LATERAL FIXO */
        nav { width: 200px; background: var(--dark); color: white; display: flex; flex-direction: column; border-right: 2px solid var(--accent); }
        .logo { padding: 20px; color: var(--accent); font-weight: bold; text-align: center; border-bottom: 1px solid #34495e; }
        
        .nav-item { 
            padding: 15px; 
            cursor: pointer; 
            border-bottom: 1px solid #34495e; 
            text-decoration: none; 
            color: white; 
            font-weight: 600;
            display: block;
        }
        .nav-item:hover { background: var(--sidebar); color: var(--accent); border-left: 5px solid var(--accent); }

        /* ÁREA ONDE AS PÁGINAS VÃO APARECER */
        main { flex: 1; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo">BOTECO 934</div>
    <a href="vendas.html" target="conteudo" class="nav-item">🛒 VENDAS / MESAS</a>
    <a href="estoque.html" target="conteudo" class="nav-item">🧠 CALCULADORA / MIX</a>
    <a href="financeiro.html" target="conteudo" class="nav-item">💸 CONTAS A PAGAR</a>
    <a href="boticario.html" target="conteudo" class="nav-item">🌸 BOTICÁRIO</a>
</nav>

<main>
    <iframe name="conteudo" src="vendas.html"></iframe>
</main>

</body>
</html>
