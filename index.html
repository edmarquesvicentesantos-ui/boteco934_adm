<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - SISTEMA OFICIAL</title>
    <style>
        :root { --amarelo: #ffcc00; --azul: #2b579a; --preto: #000; --verde: #25d366; --cinza: #1a1a1a; --vermelho: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: #fff; }
        
        header { background: var(--amarelo); padding: 15px; color: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #333; }
        nav { background: var(--cinza); display: flex; border-bottom: 1px solid #333; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        .nav-item.active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }

        .container { padding: 20px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* CALCULADORA CRUCIAL */
        .grid-calc { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card-calc { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .res-box { background: #222; padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 4px solid var(--amarelo); }
        .res-box b { color: var(--amarelo); font-size: 18px; }

        /* PDV E ESTOQUE */
        .pdv-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .grid-vendas { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card-produto-venda { background: #fff; color: #000; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .card-produto-venda span { display: block; color: var(--azul); font-size: 18px; }
        
        .resumo-venda { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; height: fit-content; }
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 0.8fr; background: var(--azul); padding: 12px; font-weight: bold; font-size: 10px; text-align: center; }
        .grid-linha { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 0.8fr; background: #fff; color: #000; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; font-size: 12px; }
        .grid-linha div { padding: 12px; }

        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        button { background: var(--amarelo); color: #000; font-weight: bold; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        .card-cliente { background: #fff; color: #000; padding: 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }

        @media (max-width: 768px) { .pdv-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <span id="relogio" style="font-weight: 900;">00:00:00</span>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Vender</div>
    <div class="nav-item" onclick="mudar('calculadora', this)">🧮 Calculadora de Lucro</div>
    <div class="nav-item" onclick="mudar('estoque', this)">📦 Estoque XML</div>
    <div class="nav-item" onclick="mudar('clientes', this)">👥 Clientes</div>
</nav>

<div class="container">
    <div id="vendas" class="secao ativa">
        <div class="pdv-container">
            <div id="gradeProdutos" class="grid-vendas"></div>
            <div class="resumo-venda">
                <h3>Resumo</h3>
                <select id="selectCliente"></select>
                <div id="itensCarrinho" style="margin: 15px 0;"></div>
                <div style="font-size: 30px; color: var(--amarelo); font-weight: 900; margin-bottom: 15px;">R$ <span id="valorTotal">0.00</span></div>
                <button onclick="finalizarVenda()" style="background: var(--verde); color: #fff;">Fechar Venda</button>
            </div>
        </div>
    </div>

    <div id="calculadora" class="secao">
        <div class="grid-calc">
            <div class="card-calc">
                <h3 style="color:var(--amarelo)">Cervejas / Caixas</h3>
                <input type="number" id="c_qtdCx" placeholder="Qtd na Caixa (ex: 12 ou 24)">
                <input type="number" id="c_custoCx" placeholder="Custo da Caixa (R$)">
                <input type="number" id="c_margem" placeholder="Margem Desejada % (ex: 50)" value="50">
                <button onclick="calcCerveja()">Calcular Preços</button>
                <div id="resCerveja"></div>
            </div>
            <div class="card-calc">
                <h3 style="color:var(--amarelo)">Destilados (Dose/Litro)</h3>
                <input type="number" id="d_custoG" placeholder="Custo da Garrafa (R$)">
                <input type="number" id="d_mlG" placeholder="ML da Garrafa (ex: 750 ou 1000)">
                <input type="number" id="d_mlD" placeholder="ML da Dose (ex: 50)" value="50">
                <button onclick="calcDestilado()">Calcular Dose</button>
                <div id="resDestilado"></div>
            </div>
        </div>
    </div>

    <div id="estoque" class="secao">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="file" id="xmlInput" accept=".xml">
            <button onclick="lancarXML()" style="width:auto">Lançar XML</button>
        </div>
        <div class="grid-header">
            <div>PRODUTO</div><div>QTD</div><div>CUSTO</div><div>VENDA</div><div>LUCRO</div><div>%</div>
        </div>
        <div id="listaProdutos"></div>
    </div>

    <div id="clientes" class="secao">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="nomeCliente" placeholder="Nome">
            <input type="text" id="contatoCliente" placeholder="WhatsApp">
            <button onclick="salvarCliente()" style="width:auto">Salvar</button>
        </div>
        <div id="listaClientes"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let carrinho = [];
    let produtosDados = {};

    // --- RELÓGIO ---
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    // --- CALCULADORA CERVEJA ---
    window.calcCerveja = () => {
        const qtd = parseFloat(document.getElementById('c_qtdCx').value) || 0;
        const custo = parseFloat(document.getElementById('c_custoCx').value) || 0;
        const margem = parseFloat(document.getElementById('c_margem').value) || 0;
        if(!qtd || !custo) return;

        const uniCusto = custo / qtd;
        const vendaNat = uniCusto * (1 + (margem/100));
        const vendaGel = vendaNat * 1.20; // +20% energia/gelo

        document.getElementById('resCerveja').innerHTML = `
            <div class="res-box">Custo Uni: <b>R$ ${uniCusto.toFixed(2)}</b></div>
            <div class="res-box">Sugerido Natural: <b>R$ ${vendaNat.toFixed(2)}</b></div>
            <div class="res-box">Sugerido Gelada: <b>R$ ${Math.ceil(vendaGel)}.00</b></div>
        `;
    };

    // --- CALCULADORA DESTILADO ---
    window.calcDestilado = () => {
        const custoG = parseFloat(document.getElementById('d_custoG').value) || 0;
        const mlG = parseFloat(document.getElementById('d_mlG').value) || 0;
        const mlD = parseFloat(document.getElementById('d_mlD').value) || 50;
        if(!custoG || !mlG) return;

        const custoDose = (custoG / mlG) * mlD * 1.10; // +10% perda
        const vendaDose = custoDose * 3.5;

        document.getElementById('resDestilado').innerHTML = `
            <div class="res-box">Custo da Dose: <b>R$ ${custoDose.toFixed(2)}</b></div>
            <div class="res-box">Preço da Dose: <b>R$ ${Math.ceil(vendaDose)}.00</b></div>
            <div class="res-box">Garrafa Gelada: <b>R$ ${(custoG * 2.1).toFixed(2)}</b></div>
        `;
    };

    // --- PRODUTOS E ESTOQUE (ORDEM ALFABÉTICA) ---
    onValue(ref(db, 'produtos'), (snapshot) => {
        const grade = document.getElementById('gradeProdutos');
        const lista = document.getElementById('listaProdutos');
        grade.innerHTML = ""; lista.innerHTML = "";
        produtosDados = snapshot.val() || {};

        const ord = Object.entries(produtosDados).sort((a,b) => a[1].nome.localeCompare(b[1].nome));

        ord.forEach(([id, p]) => {
            grade.innerHTML += `<div class="card-produto-venda" onclick="adicionarAoCarrinho('${id}')">${p.nome.substring(0,20)}<span>R$ ${Number(p.venda).toFixed(2)}</span><small>Est: ${p.qtd}</small></div>`;
            lista.innerHTML += `<div class="grid-linha"><div style="text-align:left">${p.nome}</div><div>${p.qtd}</div><div style="background:#fff2cc">R$ ${Number(p.custo).toFixed(2)}</div><div style="background:#d9e1f2">R$ ${Number(p.venda).toFixed(2)}</div><div style="background:#fce4ec">R$ ${Number(p.lucro).toFixed(2)}</div><div style="background:#e2efda">${p.margem}%</div></div>`;
        });
    });

    // --- CARRINHO AGRUPADO ---
    window.adicionarAoCarrinho = (id) => {
        const p = produtosDados[id];
        if(p.qtd <= 0) return alert("Estoque Zerado!");
        carrinho.push({ id, nome: p.nome, preco: p.venda });
        atualizarResumo();
    };

    function atualizarResumo() {
        const div = document.getElementById('itensCarrinho');
        div.innerHTML = ""; let total = 0; const agrupado = {};
        carrinho.forEach(i => {
            if(agrupado[i.nome]) { agrupado[i.nome].q++; agrupado[i.nome].v += Number(i.preco); }
            else { agrupado[i.nome] = { q:1, v: Number(i.preco) }; }
            total += Number(i.preco);
        });
        for(let n in agrupado) { div.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span><b>${agrupado[n].q}x</b> ${n}</span><b>R$ ${agrupado[n].v.toFixed(2)}</b></div>`; }
        document.getElementById('valorTotal').innerText = total.toFixed(2);
    }

    window.finalizarVenda = () => {
        if(!carrinho.length) return;
        const cliente = document.getElementById('selectCliente').value;
        push(ref(db, 'vendas_gerais'), { cliente, total: document.getElementById('valorTotal').innerText, data: new Date().toLocaleString(), itens: carrinho });
        carrinho.forEach(i => { update(ref(db, `produtos/${i.id}`), { qtd: produtosDados[i.id].qtd - 1 }); });
        alert("Venda Concluída!"); carrinho = []; atualizarResumo();
    };

    // --- CLIENTES ---
    onValue(ref(db, 'clientes'), (snapshot) => {
        const sel = document.getElementById('selectCliente');
        const list = document.getElementById('listaClientes');
        sel.innerHTML = '<option value="Avulso">Venda Avulsa</option>'; list.innerHTML = "";
        if(snapshot.exists()) {
            const ord = Object.values(snapshot.val()).sort((a,b) => a.nome.localeCompare(b.nome));
            ord.forEach(c => {
                sel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
                list.innerHTML += `<div class="card-cliente"><span>👤 ${c.nome.toUpperCase()}</span><a href="https://wa.me/55${c.contato}" target="_blank" style="background:var(--verde); color:#fff; padding:5px; border-radius:4px; text-decoration:none;">📞 WhatsApp</a></div>`;
            });
        }
    });

    window.salvarCliente = () => {
        const n = document.getElementById('nomeCliente').value;
        const c = document.getElementById('contatoCliente').value;
        if(n && c) push(ref(db, 'clientes'), { nome: n, contato: c }).then(() => { document.getElementById('nomeCliente').value = ""; document.getElementById('contatoCliente').value = ""; });
    };

    window.lancarXML = () => {
        const file = document.getElementById('xmlInput').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const itens = xml.getElementsByTagName("det");
            for(let i=0; i<itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent;
                const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent) || 0;
                push(ref(db, 'produtos'), { nome, qtd: 12, custo, venda: custo * 1.5, lucro: custo * 0.5, margem: 50 });
            }
            alert("Estoque Atualizado!");
        };
        reader.readAsText(file);
    };

    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa'); el.classList.add('active');
    };
</script>
</body>
</html>
