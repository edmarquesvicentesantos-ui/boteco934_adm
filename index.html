<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Vivo - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid #ff9f0a; padding-bottom: 10px; margin-bottom: 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-menu { padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 15px; border: 1px solid #333; max-width: 500px; margin: auto; }
        .input-dark { width: 100%; padding: 12px; margin-top: 5px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 18px; outline: none; }
        .painel-verde { margin-top: 15px; background: #000; padding: 15px; border-radius: 12px; border: 2px solid #30d158; text-align: center; }
        .resultado-texto { font-size: 28px; font-weight: bold; color: #30d158; }
        .btn-salvar { width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; font-size: 16px; }
        label { font-size: 11px; color: #8e8e93; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: #ff9f0a;">BOTECO 934</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
    <button onclick="location.href='index.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #ff9f0a; color: #000;">🍺 PRODUTOS</button>
    <button onclick="location.href='vendas.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #333; color: #fff;">💰 VENDAS</button>
    <button onclick="location.href='clientes.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #333; color: #fff;">👥 PENDURA</button>
    
    <button onclick="location.href='boticario.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #00a896; color: #fff;">✨ BOTICÁRIO</button>
    <button onclick="location.href='despesas.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #ff453a; color: #fff;">📉 GASTOS</button>
    <button onclick="location.href='dashboard.html'" style="padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 10px; background: #5856d6; color: #fff;">📊 LUCRO</button>
</div>
<hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">
    </div>

    <div class="card">
        <label>NOME DO PRODUTO</label>
        <input type="text" id="nome-prod" class="input-dark" placeholder="Ex: Heineken LN">

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <div style="flex: 1;">
                <label>CUSTO FARDO (R$)</label>
                <input type="number" id="custo-fardo" class="input-dark" oninput="calcularPelaMargem()" step="0.01" value="0.00">
            </div>
            <div style="flex: 1;">
                <label>QTD NO FARDO</label>
                <input type="number" id="qtd-fardo" class="input-dark" value="12" oninput="calcularPelaMargem()">
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <div style="flex: 1;">
                <label>MARKUP (%)</label>
                <input type="number" id="markup" class="input-dark" value="100" oninput="calcularPelaMargem()" onchange="calcularPelaMargem()">
            </div>
            <div style="flex: 1;">
                <label>VENDA FARDO (R$)</label>
                <input type="number" id="venda-fardo" class="input-dark" oninput="calcularPeloPreco()" step="0.01">
            </div>
        </div>

        <div class="painel-verde">
            <div style="font-size: 12px; color: #30d158; margin-bottom: 5px;">LUCRO POR UNIDADE</div>
            <div id="res-lucro-un" class="resultado-texto">R$ 0,00</div>
            <div id="res-margem" style="font-size: 14px; color: #8e8e93; margin-top: 5px; font-weight: bold;">Margem Real: 0%</div>
        </div>

        <button onclick="salvarBebida()" class="btn-salvar">SALVAR NO ESTOQUE</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Essa função atualiza TUDO na tela
        function atualizarTudo() {
            let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
            let venda = parseFloat(document.getElementById('venda-fardo').value) || 0;
            let qtd = parseInt(document.getElementById('qtd-fardo').value) || 1;

            if (custo > 0 && venda > 0) {
                let lucroTotal = venda - custo;
                let lucroUn = lucroTotal / qtd;
                let margem = (lucroTotal / venda) * 100;

                document.getElementById('res-lucro-un').innerHTML = "R$ " + lucroUn.toFixed(2);
                document.getElementById('res-margem').innerHTML = "Margem Real: " + margem.toFixed(1) + "%";
            }
        }

        function calcularPelaMargem() {
            let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
            let mkp = parseFloat(document.getElementById('markup').value) || 0;
            
            let vendaSugerida = custo * (1 + (mkp / 100));
            document.getElementById('venda-fardo').value = vendaSugerida.toFixed(2);
            atualizarTudo();
        }

        function calcularPeloPreco() {
            let custo = parseFloat(document.getElementById('custo-fardo').value) || 0;
            let venda = parseFloat(document.getElementById('venda-fardo').value) || 0;

            if (custo > 0) {
                let mkpCalculado = ((venda / custo) - 1) * 100;
                document.getElementById('markup').value = mkpCalculado.toFixed(0);
                atualizarTudo();
            }
        }

        async function salvarBebida() {
            const nome = document.getElementById('nome-prod').value.toUpperCase();
            const custo = document.getElementById('custo-fardo').value;
            const venda = document.getElementById('venda-fardo').value;

            if(!nome || !custo || !venda) return alert("Preencha os campos!");

            try {
                await db.collection("produtos").add({
                    nome, custo, venda, data: new Date()
                });
                alert("✅ Salvo!");
                location.reload();
            } catch (e) { alert("Erro ao salvar!"); }
        }
    </script>
</body>
</html>
