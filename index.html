<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV & XML</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        header { background: #1c1e21; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-circulo { background: #f1c40f; color: black; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .search-bar { flex: 0 1 500px; }
        #busca-produto { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 16px; }

        main { display: flex; flex: 1; overflow: hidden; }

        /* Menu Lateral conforme image_ec6ed3.png */
        nav { width: 140px; background: #2c3e50; padding: 10px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .btn-nav { padding: 15px 10px; background: #34495e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-xml { background: #27ae60; margin-top: auto; }

        /* Vitrine de 5 Colunas */
        .vitrine { flex: 1; padding: 15px; overflow-y: auto; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .card { border: 1px solid #eee; padding: 12px; text-align: center; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); background: white; }
        .card img { height: 60px; object-fit: contain; margin-bottom: 8px; }
        .nome-p { display: block; font-size: 11px; font-weight: bold; height: 30px; color: #333; }
        .preco-p { display: block; color: #27ae60; font-weight: 800; margin: 6px 0; font-size: 14px; }
        .btn-add { width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Painel Lateral conforme image_ec6ed3.png */
        .painel { width: 350px; background: #f8f9fa; border-left: 1px solid #ddd; padding: 10px; display: flex; flex-direction: column; }
        .topo-venda { display: flex; gap: 5px; margin-bottom: 10px; }
        .input-v { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-weight: bold; }

        .cupom { background: white; border: 1px solid #bbb; flex: 1; padding: 10px; font-family: monospace; overflow-y: auto; font-size: 12px; }
        .item-linha { display: flex; justify-content: space-between; border-bottom: 1px dotted #ccc; padding: 5px 0; }

        .resumo { margin-top: 10px; padding: 10px; background: #eee; border-radius: 5px; }
        .resumo-linha { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .val-total { color: #c0392b; font-size: 20px; }

        .pg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-pg { padding: 10px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; }
        .btn-pendura { grid-column: span 2; background: #e67e22; color: white; border: none; border-radius: 4px; }

        .btn-fechar { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-fechar:disabled { background: #ccc; cursor: not-allowed; }

        /* Modal XML */
        #modal-xml { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; }
        .xml-box { background:white; padding:20px; border-radius:8px; width:90%; max-width:500px; text-align: center; }

        @media print {
            .no-print { display: none !important; }
            .cupom { border: none; width: 54mm; position: absolute; top: 0; left: 0; }
        }
    </style>
</head>
<body>

<header class="no-print">
    <div class="logo-area">
        <div class="logo-circulo">934</div>
        <h2 style="margin:0">BOTECO 934</h2>
    </div>
    <div class="search-bar"><input type="text" id="busca-produto" placeholder="Buscar produto..." oninput="buscar()"></div>
    <div id="data-hora" style="font-size: 13px; font-weight: bold;"></div>
</header>

<main>
    <nav class="no-print">
        <button class="btn-nav" onclick="render(produtos)">Todos</button>
        <button class="btn-nav" onclick="filtrar('Bebidas')">Bebidas</button>
        <button class="btn-nav" onclick="filtrar('Doses')">Doses</button>
        <button class="btn-nav" onclick="filtrar('Boticário')">Boticário</button>
        <button class="btn-nav btn-xml" onclick="document.getElementById('modal-xml').style.display='flex'">IMPORTAR XML</button>
    </nav>

    <section class="vitrine no-print">
        <div id="grid-produtos" class="grid"></div>
    </section>

    <aside class="painel">
        <div class="topo-venda no-print">
            <select id="mesa-sel" class="input-v" style="flex:1" onchange="trocarMesa()">
                <option value="Balcão">Balcão</option>
                <script>for(let i=1;i<=8;i++) document.write(`<option value="Mesa ${i}">Mesa ${i}</option>`);</script>
            </select>
            <input type="text" id="cliente-nome" class="input-v" style="flex:2" placeholder="Nome do Cliente" oninput="salvarVinculo()">
        </div>

        <div class="cupom" id="recibo">
            <div style="text-align:center; font-weight:bold; border-bottom:1px dashed #000; margin-bottom:10px;">BOTECO 934 - RECIBO</div>
            <div id="itens-lista"></div>
            <div style="border-top:1px solid #000; margin-top:10px; padding-top:5px; text-align:right;">
                <strong id="print-total">TOTAL: R$ 0,00</strong>
            </div>
        </div>

        <div class="resumo no-print">
            <div class="resumo-linha"><span>TOTAL:</span><span class="val-total">R$ <span id="res-total">0,00</span></span></div>
            <div class="resumo-linha"><span>FALTA:</span><span style="color:#e67e22">R$ <span id="res-falta">0,00</span></span></div>
        </div>

        <div class="pg-grid no-print">
            <button class="btn-pg" onclick="receber('Dinheiro')">DINHEIRO</button>
            <button class="btn-pg" onclick="receber('Pix')">PIX</button>
            <button class="btn-pg" onclick="receber('Cartão')" style="grid-column: span 2;">CARTÃO</button>
            <button class="btn-pg btn-pendura" onclick="receber('Pendura')">LANÇAR NO PENDURA</button>
        </div>

        <button class="btn-fechar no-print" id="btn-finalizar" onclick="fecharConta()" disabled>FECHAR E IMPRIMIR</button>
    </aside>
</main>

<div id="modal-xml">
    <div class="xml-box">
        <h3>Entrada de Estoque via XML</h3>
        <input type="file" id="xml-file" accept=".xml" onchange="lerXML()">
        <div id="xml-info" style="margin: 15px 0; font-size: 12px; color: #555;"></div>
        <button class="btn-nav" onclick="document.getElementById('modal-xml').style.display='none'">Fechar</button>
    </div>
</div>

<script>
    let banco = { "Balcão": { itens: [], pagos: 0, cliente: "" } };
    for(let i=1;i<=8;i++) banco[`Mesa ${i}`] = { itens: [], pagos: 0, cliente: "" };

    const produtos = [
        { nome: "Cerveja Latão", preco: 7.50, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer.png" },
        { nome: "Heineken 600ml", preco: 15.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer-bottle.png" },
        { nome: "Água s/ Gás", preco: 3.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/water-glass.png" },
        { nome: "Dose Pitu", preco: 4.00, cat: "Doses", img: "https://img.icons8.com/color/96/tequila-shot.png" },
        { nome: "Perfume Malbec", preco: 180.00, cat: "Boticário", img: "https://img.icons8.com/color/96/perfume-bottle.png" }
    ];

    function render(lista) {
        document.getElementById('grid-produtos').innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.img}">
                <span class="nome-p">${p.nome}</span>
                <span class="preco-p">R$ ${p.preco.toFixed(2)}</span>
                <button class="btn-add" onclick="add('${p.nome}', ${p.preco})">ADICIONAR</button>
            </div>
        `).join('');
    }

    function add(n, p) {
        const m = document.getElementById('mesa-sel').value;
        if(!banco[m].cliente) return alert("Identifique o cliente primeiro!");
        banco[m].itens.push({nome: n, preco: p});
        atualizar();
    }

    function atualizar() {
        const m = document.getElementById('mesa-sel').value;
        const mesa = banco[m];
        const listaDiv = document.getElementById('itens-lista');
        
        const agrupados = {};
        mesa.itens.forEach(i => {
            if(agrupados[i.nome]) { agrupados[i.nome].qtd++; agrupados[i.nome].total += i.preco; }
            else { agrupados[i.nome] = { qtd: 1, total: i.preco }; }
        });

        listaDiv.innerHTML = Object.keys(agrupados).map(n => `
            <div class="item-linha"><span>${agrupados[n].qtd}x ${n}</span><span>R$ ${agrupados[n].total.toFixed(2)}</span></div>
        `).join('');

        const total = mesa.itens.reduce((a, b) => a + b.preco, 0);
        const falta = total - mesa.pagos;

        document.getElementById('res-total').innerText = total.toFixed(2);
        document.getElementById('res-falta').innerText = Math.max(0, falta).toFixed(2);
        document.getElementById('print-total').innerText = `TOTAL: R$ ${total.toFixed(2)}`;
        document.getElementById('btn-finalizar').disabled = (falta > 0.01 || total === 0);
    }

    function receber(tipo) {
        const m = document.getElementById('mesa-sel').value;
        const total = banco[m].itens.reduce((a, b) => a + b.preco, 0);
        const falta = total - banco[m].pagos;
        if(falta <= 0) return;

        let v = prompt(`Receber no ${tipo}:`, falta.toFixed(2));
        if(v) { banco[m].pagos += parseFloat(v.replace(',', '.')); atualizar(); }
    }

    function fecharConta() {
        const m = document.getElementById('mesa-sel').value;
        const mesa = banco[m];
        const agrupados = {};
        mesa.itens.forEach(i => { agrupados[i.nome] = (agrupados[i.nome] || 0) + 1; });
        
        let msg = `*BOTECO 934 - COMPROVANTE*\nCliente: ${mesa.cliente}\n---\n`;
        for(let n in agrupados) msg += `${agrupados[n]}x ${n}\n`;
        msg += `---\n*TOTAL: R$ ${mesa.itens.reduce((a,b)=>a+b.preco,0).toFixed(2)}*`;

        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        window.print();
        banco[m] = { itens: [], pagos: 0, cliente: "" };
        document.getElementById('cliente-nome').value = "";
        atualizar();
    }

    function lerXML() {
        const file = document.getElementById('xml-file').files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(e.target.result, "text/xml");
            const itens = xml.getElementsByTagName("det");
            let txt = "<strong>Itens detectados:</strong><br>";
            for(let i=0; i < itens.length; i++) {
                txt += `- ${itens[i].getElementsByTagName("xProd")[0].textContent}<br>`;
            }
            document.getElementById('xml-info').innerHTML = txt + "<br><span style='color:green'>Estoque Pronto!</span>";
        };
        reader.readAsText(file);
    }

    function trocarMesa() { document.getElementById('cliente-nome').value = banco[document.getElementById('mesa-sel').value].cliente; atualizar(); }
    function salvarVinculo() { banco[document.getElementById('mesa-sel').value].cliente = document.getElementById('cliente-nome').value; }
    function filtrar(c) { render(produtos.filter(p => p.cat === c)); }
    function buscar() { const b = document.getElementById('busca-produto').value.toLowerCase(); render(produtos.filter(p => p.nome.toLowerCase().includes(b))); }
    
    setInterval(() => { document.getElementById('data-hora').innerText = new Date().toLocaleString('pt-br'); }, 1000);
    render(produtos);
</script>
</body>
</html>
