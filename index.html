<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Sistema Integrado</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --gold: #d4af37; --orange: #ff9800; --green: #00ff88; --border: #2a2a2a;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* Layout Superior */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 22px; letter-spacing: 3px; }

        /* Input de Código de Barras Gigante (Estilo PDV) */
        .pdv-scan { background: var(--card); border: 2px solid var(--gold); padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .pdv-scan input { width: 80%; background: transparent; border: none; color: var(--gold); font-size: 30px; text-align: center; font-family: monospace; outline: none; }
        .pdv-scan label { display: block; color: var(--gray); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        
        /* Tabela de Ordem Alfabética */
        .lista-container { margin-top: 20px; height: 300px; overflow-y: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; color: var(--gold); font-size: 11px; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        tr:hover { background: #1a1a1a; cursor: pointer; }

        /* Botões Estilizados */
        .btn { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--orange); color: var(--orange); }
