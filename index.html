<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - GESTÃO BLINDADA</title>
    <style>
        :root { --amarelo: #ffcc00; --azul: #2b579a; --preto: #000; --verde: #25d366; --cinza: #1a1a1a; --txt-cor: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: var(--txt-cor); }
        
        header { background: var(--amarelo); padding: 15px; color: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #333; }
        nav { background: var(--cinza); display: flex; border-bottom: 1px solid #333; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        .nav-item.active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }

        .container { padding: 20px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* CALCULADORA DE REALIDADE (Markup vs Margem) */
        .grid-calc { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card-calc { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .res-box { background: #222; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #444; }
        .res-box b { color: var(--amarelo); font-size: 1.1em; }
        .markup { border-left-color: var(--azul); }
        .margem-real { border-left-color: var(--verde); }

        /* PDV E ESTOQUE */
        .pdv-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .grid-vendas { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card-produto-venda { background: #fff; color: #000; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .card-produto-venda span { display: block; color: var(--azul); font-size: 1.2em; }
        
        .resumo-venda { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; height: fit-content; }
        .grid-header { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr; background: var(--azul); padding: 12px; font-weight: bold; font-size: 10px; text-align: center; }
        .grid-linha { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr; background: #fff; color: #000; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; font-size: 11px; }

        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        button { background: var(--amarelo); color: #000; font-weight: bold; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; text-transform: uppercase; }

        @media (max-width: 768px) { .pdv-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <span id="relogio" style="font-weight: 900;">00:00:00</span>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Vender</div>
    <div class="nav-item" onclick="mudar('calculadora', this)">🧮 Calculadora Realidade</div>
    <div class="nav-item" onclick="mudar('estoque', this)">📦 Estoque XML</div>
    <div class="nav-item" onclick="mudar('clientes', this)">👥 Clientes</div>
</nav>

<div class="container">
    <div id="vendas" class="secao ativa">
        <div class="pdv-container">
            <div id="gradeProdutos" class="grid-vendas"></div>
            <div class="resumo-venda">
                <h3>Pedido</h3>
                <select id="selectCliente"></select>
                <div id="itensCarrinho" style="margin: 15px 0;"></div>
                <div style="font-size: 30px; color: var(--amarelo); font-weight: 900;">R$ <span id="valorTotal">0.00</span></div>
                <button onclick="finalizarVenda()" style="background: var(--verde); color: #fff; margin-top:10px;">Fechar Venda</button>
            </div>
        </div>
    </div>

    <div id="calculadora" class="secao">
        <div class="grid-calc">
            <div class="card-calc">
                <h3>Cervejas & Caixas</h3>
                <input type="number" id="c_qtd" placeholder="Qtd na Caixa (ex: 12)">
                <input type="number" id="c_custo" placeholder="Custo da Caixa (R$)">
                <input type="number" id="c_perc" value="50" placeholder="Porcentagem (%)">
                <button onclick="calcCerveja()">Comparar Markup vs Margem</button>
                <div id="resCerveja"></div>
            </div>
            <div class="card-calc">
                <h3>Destilados & Doses</h3>
                <input type="number" id="d_custo" placeholder="Custo Garrafa (R$)">
                <input type="number" id="d_mlG" placeholder="ML Garrafa (ex: 1000)">
                <input type="number" id="d_mlD" value="50" placeholder="ML Dose">
                <button onclick="calcDestilado()">Calcular Lucro Dose</button>
                <div id="resDestilado"></div>
            </div>
        </div>
    </div>

    <div id="estoque" class="secao">
        <div style="display:flex; gap:10px; margin-bottom:20px;"><input type="file" id="xmlInput" accept=".xml"><button onclick="lancarXML()" style="width:auto">Importar XML</button></div>
        <div class="grid-header"><div>PRODUTO</div><div>QTD</div><div>CUSTO</div><div>VENDA</div><div>LUCRO</div></div>
        <div id="listaProdutos"></div>
    </div>

    <div id="clientes" class="secao">
        <div style="display:flex; gap:10px; margin-bottom:20px;"><input type="text" id="nCli" placeholder="Nome"><input type="text" id="tCli" placeholder="Zap"><button onclick="salvarCliente()" style="width:auto">Salvar</button></div>
        <div id="listaClientes"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let carrinho = [], produtosDados = {};

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    // --- LÓGICA DAS CALCULADORAS (MARKUP VS MARGEM) ---
    window.calcCerveja = () => {
        const q = parseFloat(document.getElementById('c_qtd').value) || 0;
        const c = parseFloat(document.getElementById('c_custo').value) || 0;
        const p = parseFloat(document.getElementById('c_perc').value) || 50;
        if(!q || !c) return;
        const uniCusto = c / q;
        const mkp = uniCusto * (1 + p/100); // Markup
        const mrg = uniCusto / (1 - p/100); // Margem Real
        document.getElementById('resCerveja').innerHTML = `
            <div class="res-box">Custo Unitário: <b>R$ ${uniCusto.toFixed(2)}</b></div>
            <div class="res-box markup">MARKUP (${p}%): <b>R$ ${mkp.toFixed(2)}</b><br><small>Sobra: R$ ${(mkp-uniCusto).toFixed(2)}</small></div>
            <div class="res-box margem-real">MARGEM REAL (${p}%): <b>R$ ${mrg.toFixed(2)}</b><br><small>Sobra: R$ ${(mrg-uniCusto).toFixed(2)}</small></div>
        `;
    };

    window.calcDestilado = () => {
        const c = parseFloat(document.getElementById('d_custo').value) || 0;
        const mG = parseFloat(document.getElementById('d_mlG').value) || 0;
        const mD = parseFloat(document.getElementById('d_mlD').value) || 50;
        if(!c || !mG) return;
        const custoDose = (c / mG) * mD * 1.10; // +10% perda
        document.getElementById('resDestilado').innerHTML = `
            <div class="res-box">Custo da Dose: <b>R$ ${custoDose.toFixed(2)}</b></div>
            <div class="res-box markup">Venda (Markup 100%): <b>R$ ${Math.ceil(custoDose*2)}.00</b></div>
            <div class="res-box margem-real">Venda (Margem 50%): <b>R$ ${Math.ceil(custoDose/0.5)}.00</b></div>
        `;
    };

    // --- PRODUTOS & VENDA ---
    onValue(ref(db, 'produtos'), (s) => {
        const g = document.getElementById('gradeProdutos'), l = document.getElementById('listaProdutos');
        g.innerHTML = ""; l.innerHTML = ""; produtosDados = s.val() || {};
        const ord = Object.entries(produtosDados).sort((a,b) => a[1].nome.localeCompare(b[1].nome));
        ord.forEach(([id, p]) => {
            g.innerHTML += `<div class="card-produto-venda" onclick="addCar('${id}')">${p.nome.substring(0,18)}<span>R$ ${Number(p.venda).toFixed(2)}</span><small>Est: ${p.qtd}</small></div>`;
            l.innerHTML += `<div class="grid-linha"><div style="text-align:left">${p.nome}</div><div>${p.qtd}</div><div>${Number(p.custo).toFixed(2)}</div><div>${Number(p.venda).toFixed(2)}</div><div style="color:var(--verde)">${Number(p.lucro).toFixed(2)}</div></div>`;
        });
    });

    window.addCar = (id) => {
        const p = produtosDados[id];
        if(p.qtd <= 0) return alert("Sem estoque!");
        carrinho.push({ id, nome: p.nome, preco: p.venda });
        attCar();
    };

    function attCar() {
        const d = document.getElementById('itensCarrinho'); d.innerHTML = ""; let t = 0, agr = {};
        carrinho.forEach(i => { if(agr[i.nome]) { agr[i.nome].q++; agr[i.nome].v += Number(i.preco); } else { agr[i.nome] = {q:1, v:Number(i.preco)}; } t += Number(i.preco); });
        for(let n in agr) { d.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:13px;"><span><b>${agr[n].q}x</b> ${n}</span><b>R$ ${agr[n].v.toFixed(2)}</b></div>`; }
        document.getElementById('valorTotal').innerText = t.toFixed(2);
    }

    window.finalizarVenda = () => {
        if(!carrinho.length) return;
        const cli = document.getElementById('selectCliente').value;
        push(ref(db, 'vendas_gerais'), { cliente: cli, total: document.getElementById('valorTotal').innerText, data: new Date().toLocaleString() });
        carrinho.forEach(i => { update(ref(db, `produtos/${i.id}`), { qtd: produtosDados[i.id].qtd - 1 }); });
        alert("Venda OK!"); carrinho = []; attCar();
    };

    // --- CLIENTES & XML ---
    onValue(ref(db, 'clientes'), (s) => {
        const sel = document.getElementById('selectCliente'), list = document.getElementById('listaClientes');
        sel.innerHTML = '<option value="Avulso">Venda Avulsa</option>'; list.innerHTML = "";
        if(s.exists()){
            const ord = Object.values(s.val()).sort((a,b) => a.nome.localeCompare(b.nome));
            ord.forEach(c => { sel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`; list.innerHTML += `<div class="card-cliente"><span>👤 ${c.nome}</span><a href="https://wa.me/55${c.contato}" target="_blank" style="text-decoration:none; color:var(--verde)">📞 WhatsApp</a></div>`; });
        }
    });

    window.salvarCliente = () => { 
        const n = document.getElementById('nCli').value, t = document.getElementById('tCli').value;
        if(n && t) push(ref(db, 'clientes'), { nome: n, contato: t }).then(() => { document.getElementById('nCli').value = ""; document.getElementById('tCli').value = ""; });
    };

    window.lancarXML = () => {
        const f = document.getElementById('xmlInput').files[0];
        const r = new FileReader();
        r.onload = (e) => {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const itens = xml.getElementsByTagName("det");
            for(let i=0; i<itens.length; i++) {
                const x = itens[i].getElementsByTagName("xProd")[0].textContent;
                const c = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent) || 0;
                push(ref(db, 'produtos'), { nome: x, qtd: 12, custo: c, venda: c * 1.5, lucro: c * 0.5, margem: 50 });
            }
            alert("Estoque Atualizado!");
        };
        r.readAsText(f);
    };

    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa'); el.classList.add('active');
    };
</script>
</body>
</html>
