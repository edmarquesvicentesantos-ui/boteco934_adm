<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 BOTECO - SISTEMA ATUALIZADO</title>
    <style>
        :root { --amarelo: #ffcc00; --azul: #2b579a; --preto: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: #fff; }
        header { background: var(--amarelo); padding: 15px; color: #000; display: flex; justify-content: space-between; align-items: center; }
        nav { background: #1a1a1a; display: flex; border-bottom: 1px solid #333; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }
        .container { padding: 20px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* Estilo Inputs */
        .card-input { background: #111; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; border: 1px solid #333; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; flex: 1; }
        button { background: var(--amarelo); color: #000; font-weight: bold; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; }

        /* Tabela Profissional */
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 0.8fr; background: var(--azul); padding: 12px; border-radius: 8px 8px 0 0; font-weight: bold; text-align: center; font-size: 10px; }
        .grid-linha { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 0.8fr; background: #fff; color: #000; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; font-size: 12px; }
        .grid-linha div { padding: 12px; border-left: 1px solid #eee; }
        
        /* Lista Clientes */
        .card-cliente { background: #fff; color: #000; padding: 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-whats { background: #25d366; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <span style="font-weight: 900; font-size: 12px;">PETROLINA-PE | 32°C</span>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('estoque', this)">ESTOQUE XML</div>
    <div class="nav-item" onclick="mudar('clientes', this)">CLIENTES / CONTATOS</div>
</nav>

<div class="container">
    <div id="estoque" class="secao ativa">
        <div class="card-input">
            <input type="file" id="xmlInput" accept=".xml">
            <button onclick="lancarXML()">LANÇAR XML</button>
        </div>
        <div class="grid-header">
            <div>PRODUTO</div><div>QTD</div><div>CUSTO</div><div>VENDA</div><div>LUCRO</div><div>%</div>
        </div>
        <div id="listaProdutos"></div>
    </div>

    <div id="clientes" class="secao">
        <div class="card-input">
            <input type="text" id="nomeCliente" placeholder="Nome do Cliente">
            <input type="text" id="contatoCliente" placeholder="WhatsApp (DDD + Número)">
            <button onclick="salvarCliente()">CADASTRAR</button>
        </div>
        <h3 style="color: var(--amarelo); margin-bottom: 15px; font-size: 14px;">CLIENTES ATIVOS</h3>
        <div id="listaClientes"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- FUNÇÕES DE CLIENTES (CORRIGE UNDEFINED) ---
    window.salvarCliente = function() {
        const nome = document.getElementById('nomeCliente').value;
        const contato = document.getElementById('contatoCliente').value;
        if(!nome || !contato) return alert("Preencha todos os campos!");
        push(ref(db, 'clientes'), { nome, contato }).then(() => {
            document.getElementById('nomeCliente').value = "";
            document.getElementById('contatoCliente').value = "";
        });
    };

    onValue(ref(db, 'clientes'), (snapshot) => {
        const div = document.getElementById('listaClientes');
        div.innerHTML = "";
        const dados = snapshot.val();
        if(dados) {
            Object.values(dados).forEach(c => {
                const fone = c.contato || "---";
                div.innerHTML += `
                <div class="card-cliente">
                    <span>👤 ${c.nome.toUpperCase()}</span>
                    <a href="https://wa.me/55${fone}" target="_blank" class="btn-whats">📞 ${fone}</a>
                </div>`;
            });
        }
    });

    // --- FUNÇÕES DE ESTOQUE (CORRIGE toFixed) ---
    window.lancarXML = function() {
        const file = document.getElementById('xmlInput').files[0];
        if(!file) return alert("Selecione o arquivo!");
        const reader = new FileReader();
        reader.onload = (e) => {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const itens = xml.getElementsByTagName("det");
            for(let i=0; i<itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent;
                const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent) || 0;
                push(ref(db, 'produtos'), { 
                    nome, qtd: 1, custo, venda: custo * 1.5, lucro: custo * 0.5, margem: 50 
                });
            }
            alert("Produtos Importados!");
        };
        reader.readAsText(file);
    };

    onValue(ref(db, 'produtos'), (snapshot) => {
        const div = document.getElementById('listaProdutos');
        div.innerHTML = "";
        const dados = snapshot.val();
        if(dados) {
            Object.values(dados).forEach(p => {
                // Proteção contra erro de valor vazio
                const nCusto = Number(p.custo || 0).toFixed(2);
                const nVenda = Number(p.venda || 0).toFixed(2);
                const nLucro = Number(p.lucro || 0).toFixed(2);
                
                div.innerHTML += `
                <div class="grid-linha">
                    <div style="text-align:left">${p.nome}</div>
                    <div>${p.qtd}</div>
                    <div style="background:#fff2cc">R$ ${nCusto}</div>
                    <div style="background:#d9e1f2">R$ ${nVenda}</div>
                    <div style="background:#fce4ec">R$ ${nLucro}</div>
                    <div style="background:#e2efda">${p.margem || 0}%</div>
                </div>`;
            });
        }
    });

    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    };
</script>
</body>
</html>
