<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Sistema Operacional</title>
    <style>
        /* Estilo Neo-Noir / Glassmorphism solicitado por Edmarques */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1a1a1a; color: #fff; }
        header { background: #ffcc00; padding: 15px 40px; color: #000; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .badge { background: #000; color: #ffcc00; padding: 5px 10px; border-radius: 4px; font-weight: 900; }
        
        nav { background: #333; display: flex; padding: 0 40px; border-bottom: 2px solid #444; }
        .nav-item { padding: 15px 20px; cursor: pointer; font-size: 13px; font-weight: bold; text-transform: uppercase; color: #aaa; transition: 0.3s; }
        .nav-item:hover, .active { color: #ffcc00; border-bottom: 3px solid #ffcc00; }

        .container { padding: 30px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* Estilo das Mesas */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .mesa { background: rgba(255, 255, 255, 0.1); border: 1px solid #555; padding: 30px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2em; }
        .mesa.ocupada { background: #d32f2f; border-color: #f44336; }

        /* Formulários e Tabelas */
        .card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input { padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; margin-right: 10px; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #ffcc00; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; color: #000; border-radius: 8px; overflow: hidden; }
        th { background: #2b579a; color: #fff; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-weight: bold; }
        .c-custo { background: #fff2cc; }
        .c-margem { background: #c6efce; color: #006100; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="badge">934</div>
        <h1 style="letter-spacing: -2px;">BOTECO</h1>
    </div>
    <div id="info">Petrolina-PE | <span id="temp">32°C</span></div>
</header>

<nav>
    <div class="nav-item active" onclick="irPara('operacional', this)">Operacional (Mesas)</div>
    <div class="nav-item" onclick="irPara('estoque', this)">Estoque / XML</div>
    <div class="nav-item" onclick="irPara('clientes', this)">Clientes (Fiado)</div>
</nav>

<div class="container">
    
    <div id="operacional" class="secao ativa">
