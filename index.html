<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Inteligente - Boteco 934</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #1a1a1a;
            --accent-orange: #ff9800;
            --text-gray: #ccc;
            --success-green: #00ff88;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-menu {
            background: #333;
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            border-bottom: 2px solid transparent;
        }

        .btn-menu.active {
            background: var(--accent-orange);
            color: black;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 4px;
        }

        .full-width { grid-column: span 2; }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--accent-orange); }

        .display-lucro {
            grid-column: span 2;
            border: 2px solid var(--success-green);
            padding: 15px;
            text-align: center;
            margin: 10px 0;
        }

        .display-lucro span {
            display: block;
            color: var(--success-green);
            font-size: 24px;
            font-weight: bold;
        }

        .display-lucro small {
            color: var(--text-gray);
        }

        .btn-save {
            grid-column: span 2;
            background: var(--accent-orange);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-save:hover { background: #e68a00; }

        .actions-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-util {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid #444;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-menu">
        <button class="btn-menu active">📦 PRODUTOS</button>
        <button class="btn-menu">💰 VENDAS</button>
        <button class="btn-menu">👥 CLIENTES</button>
    </div>

    <div class="form-grid">
        <div class="full-width">
            <label>Nome do Produto</label>
            <input type="text" id="nomeProduto" placeholder="Ex: Coca-Cola Lata 350ml">
        </div>

        <div>
            <label>Custo do Fardo (R$)</label>
            <input type="number" id="custoFardo" step="0.01" oninput="calcularPrecificacao()">
        </div>

        <div>
            <label>Qtd no Fardo (Unidades)</label>
            <input type="number" id="qtdFardo" oninput="calcularPrecificacao()">
        </div>

        <div>
            <label>Markup Pretendido (%)</label>
            <input type="number" id="markup" step="0.1" oninput="calcularPrecificacao()">
        </div>

        <div>
            <label>Preço Sugerido de Venda (Unidade)</label>
            <input type="number" id="precoVenda" step="0.01" readonly>
        </div>

        <div class="display-lucro">
            <small>LUCRO POR UNIDADE / MARGEM REAL</small>
            <span id="resultadoLucro">R$ 0,00</span>
            <small id="resultadoMargem">Margem: 0%</small>
        </div>

        <button class="btn-save" onclick="salvarNoEstoque()">SALVAR NO ESTOQUE</button>
    </div>

    <div class="actions-footer">
        <button class="btn-util">📤 EXPORTAR JSON</button>
        <button class="btn-util">📥 IMPORTAR LISTA</button>
    </div>
</div>

<script>
    function calcularPrecificacao() {
        const custoFardo = parseFloat(document.getElementById('custoFardo').value) || 0;
        const qtdFardo = parseInt(document.getElementById('qtdFardo').value) || 1;
        const markup = parseFloat(document.getElementById('markup').value) || 0;

        // 1. Calcula o custo por unidade
        const custoUnidade = custoFardo / qtdFardo;

        // 2. Calcula o preço de venda baseado no markup
        // Fórmula: Custo * (1 + (Markup / 100))
        const precoSugerido = custoUnidade * (1 + (markup / 100));
        document.getElementById('precoVenda').value = precoSugerido.toFixed(2);

        // 3. Calcula o Lucro Real em Reais
        const lucroReais = precoSugerido - custoUnidade;

        // 4. Calcula a Margem Real (Lucro / Preço de Venda)
        const margemReal = precoSugerido > 0 ? (lucroReais / precoSugerido) * 100 : 0;

        // Atualiza a tela
        document.getElementById('resultadoLucro').innerText = `R$ ${lucroReais.toFixed(2)}`;
        document.getElementById('resultadoMargem').innerText = `Margem Real: ${margemReal.toFixed(2)}%`;
    }

    function salvarNoEstoque() {
        const nome = document.getElementById('nomeProduto').value;
        if(!nome) {
            alert("Digite o nome do produto!");
            return;
        }
        alert(`Produto ${nome} salvo com sucesso!`);
        // Aqui você pode adicionar a lógica de LocalStorage que já estávamos usando.
    }
</script>

</body>
</html>
