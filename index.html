<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - GESTÃO TOTAL</title>
    <style>
        :root { --amarelo: #ffcc00; --azul: #2b579a; --preto: #000; --verde: #25d366; --vermelho: #ff4444; --cinza: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: #fff; }
        
        header { background: var(--amarelo); padding: 10px 20px; color: #000; display: flex; justify-content: space-between; align-items: center; }
        nav { background: var(--cinza); display: flex; overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
        .nav-item { padding: 15px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 10px; white-space: nowrap; }
        .nav-item.active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }

        .container { padding: 15px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* PDV VITRINE */
        .pdv-layout { display: grid; grid-template-columns: 1fr 380px; gap: 15px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .card-prod { background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; height: 110px; display: flex; flex-direction: column; justify-content: center; transition: 0.2s; }
        .card-prod:hover { transform: scale(1.02); background: #f0f0f0; }
        .card-prod span { display: block; color: var(--azul); font-size: 1.2em; margin-top: 5px; }

        /* CUPOM E CALC */
        .cupom { background: #fff; color: #000; padding: 15px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px; min-height: 350px; }
        .card-ferramenta { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; max-width: 500px; margin: 0 auto; }
        
        .btn-pgto { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-pgto button { padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: #fff; text-transform: uppercase; font-size: 11px; }
        
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        
        @media print { body * { visibility: hidden; } #reciboDigital, #reciboDigital * { visibility: visible; } #reciboDigital { position: absolute; left: 0; top: 0; width: 100%; } }
        @media (max-width: 800px) { .pdv-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <div id="relogio" style="font-weight: 900;">00:00:00</div>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Vendas / Mesas</div>
    <div class="nav-item" id="btnCalc" onclick="mudar('calculadora', this)">🧮 Calculadora de Lucro</div>
    <div class="nav-item" onclick="mudar('financeiro', this)">💰 Financeiro</div>
    <div class="nav-item" onclick="mudar('clientes', this)">👥 Clientes</div>
</nav>

<div class="container">
    
    <div id="vendas" class="secao ativa">
        <div class="pdv-layout">
            <div>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="selMesa" style="flex:1"><option value="Balcão">Balcão</option><script>for(let i=1;i<=20;i++) document.write(`<option value="Mesa ${i}">Mesa ${i}</option>`)</script></select>
                    <select id="selCliente" style="flex:2"></select>
                </div>
                <div id="gridProdutos" class="grid-produtos"></div>
            </div>

            <div>
                <div id="reciboDigital" class="cupom">
                    <div style="text-align:center; border-bottom:1px dashed #000; margin-bottom:10px; padding-bottom:10px;">
                        <b>934 BOTECO - PETROLINA</b><br>WhatsApp: (87) 9...<br>----------------------------
                    </div>
                    <div id="itensCupom" style="margin-bottom:20px;">Selecione os itens...</div>
                    <div style="border-top:1px dashed #000; padding-top:10px;">
                        <b style="font-size:1.4em;">TOTAL: R$ <span id="totalTxt">0.00</span></b>
                    </div>
                </div>
                
                <div class="btn-pgto">
                    <button style="background:#32bcad" onclick="fechar('PIX')">PIX</button>
                    <button style="background:#4caf50" onclick="fechar('DINHEIRO')">DINHEIRO</button>
                    <button style="background:#2196f3" onclick="fechar('CARTÃO')">CARTÃO</button>
                    <button style="background:#ff9800" onclick="fechar('PENDURA')">PENDURAR (4 DIAS)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="calculadora" class="secao">
        <div class="card-ferramenta">
            <h2 style="color:var(--amarelo); margin-bottom:20px; text-align:center;">Calculadora de Margem</h2>
            <label>Custo Unitário (R$):</label>
            <input type="number" id="c_custo" placeholder="Ex: 5.50">
            <label>Preço de Venda Atual (R$):</label>
            <input type="number" id="c_venda" placeholder="Ex: 12.00">
            <button onclick="calcularMargem()" style="background:var(--amarelo); color:#000; padding:15px; border:none; width:100%; font-weight:bold; cursor:pointer; border-radius:6px; margin-top:10px;">ANALISAR AGORA</button>
            <div id="resCalculadora" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="financeiro" class="secao">
        <div id="resumoFin" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
        <div id="listaHistorico"></div>
    </div>

    <div id="clientes" class="secao">
        <div class="card-ferramenta" style="max-width: 100%;">
            <input type="text" id="nCli" placeholder="Nome do Cliente">
            <input type="text" id="tCli" placeholder="WhatsApp">
            <button onclick="addCli()" style="background:var(--verde); color:#fff; padding:12px; border:none; width:100%; font-weight:bold; border-radius:6px;">CADASTRAR</button>
        </div>
        <div id="listaCliView" style="margin-top:20px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSy...", 
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", 
        projectId: "boteco934-afc3f" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let carrinho = [], produtosDados = {};

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    // VITRINE SEM REPETIÇÕES
    onValue(ref(db, 'produtos'), (s) => {
        const g = document.getElementById('gridProdutos'); g.innerHTML = "";
        produtosDados = s.val() || {};
        const nomesVistos = new Set();
        
        Object.entries(produtosDados)
            .sort((a,b) => a[1].nome.localeCompare(b[1].nome))
            .forEach(([id, p]) => {
                const nomeLimpo = p.nome.trim().toUpperCase();
                if(!nomesVistos.has(nomeLimpo)) {
                    nomesVistos.add(nomeLimpo);
                    g.innerHTML += `
                        <div class="card-prod" onclick="addCar('${id}')">
                            ${p.nome.substring(0,20)}
                            <span>R$ ${Number(p.venda).toFixed(2)}</span>
                        </div>`;
                }
            });
    });

    window.addCar = (id) => {
        carrinho.push({ nome: produtosDados[id].nome, preco: produtosDados[id].venda });
        const d = document.getElementById('itensCupom'); d.innerHTML = ""; let t = 0;
        carrinho.forEach(i => { 
            d.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.nome}</span> <b>R$ ${Number(i.preco).toFixed(2)}</b></div>`; 
            t += Number(i.preco); 
        });
        document.getElementById('totalTxt').innerText = t.toFixed(2);
    };

    window.calcularMargem = () => {
        const c = parseFloat(document.getElementById('c_custo').value);
        const v = parseFloat(document.getElementById('c_venda').value);
        if(!c || !v) return;
        const lucro = v - c;
        const margem = (lucro / v) * 100;
        document.getElementById('resCalculadora').innerHTML = `
            <div style="background:#222; padding:15px; border-radius:8px; border-left:5px solid var(--amarelo);">
                <p>Lucro Real: <b>R$ ${lucro.toFixed(2)}</b></p>
                <p>Margem: <b>${margem.toFixed(1)}%</b></p>
                <p style="margin-top:10px; font-size:12px; color:${margem < 35 ? 'var(--vermelho)' : 'var(--verde)'}">
                    ${margem < 35 ? '⚠️ Margem apertada!' : '✅ Ótima margem para revenda!'}
                </p>
            </div>`;
    };

    window.fechar = (metodo) => {
        if(!carrinho.length) return;
        const total = parseFloat(document.getElementById('totalTxt').innerText);
        const venc = new Date(); venc.setDate(venc.getDate() + 4);
        const venda = {
            cliente: document.getElementById('selCliente').value,
            total, metodo, data: new Date().toLocaleDateString(), hora: new Date().toLocaleTimeString(),
            vencimento: metodo === 'PENDURA' ? venc.toLocaleDateString() : 'Pago'
        };

        push(ref(db, 'vendas_fin'), venda).then(() => {
            if(metodo === 'PENDURA') {
                const msg = `Boteco 934: Olá! Sua conta de hoje deu R$ ${total.toFixed(2)}. O vencimento é em ${venc.toLocaleDateString()}.`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }
            window.print();
            carrinho = []; document.getElementById('itensCupom').innerHTML = "Aguardando..."; document.getElementById('totalTxt').innerText="0.00";
        });
    };

    onValue(ref(db, 'clientes'), (s) => {
        const sel = document.getElementById('selCliente'); sel.innerHTML = '<option value="Avulso">CLIENTE AVULSO</option>';
        if(s.exists()) Object.values(s.val()).forEach(c => { sel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`; });
    });

    window.addCli = () => {
        const n = document.getElementById('nCli').value, t = document.getElementById('tCli').value;
        if(n && t) push(ref(db, 'clientes'), { nome: n, contato: t }).then(()=> { alert("Cadastrado!"); document.getElementById('nCli').value=""; });
    };

    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa'); el.classList.add('active');
    };
</script>
</body>
</html>
