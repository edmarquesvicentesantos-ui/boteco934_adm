<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Oficial</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        /* Cabeçalho */
        header { background: #1c1e21; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .search-bar { flex: 0 1 500px; }
        #busca-produto { width: 100%; padding: 10px 20px; border-radius: 25px; border: none; outline: none; font-size: 14px; }

        main { display: flex; flex: 1; overflow: hidden; }

        /* Menu Lateral de Categorias */
        .categorias { width: 130px; background: #2c3e50; padding: 10px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .btn-cat { padding: 12px; background: #34495e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-cat:hover { background: #1abc9c; }

        /* Vitrine de Produtos - 5 por linha */
        .vitrine { flex: 1; padding: 15px; overflow-y: auto; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .card { border: 1px solid #eee; padding: 12px; text-align: center; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; background: white; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { height: 55px; object-fit: contain; margin-bottom: 8px; }
        .nome-prod { display: block; font-size: 11px; font-weight: bold; min-height: 30px; color: #333; line-height: 1.2; }
        .preco-prod { display: block; color: #27ae60; font-weight: 800; margin: 6px 0; font-size: 14px; }
        .btn-add { width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* Painel de Venda Otimizado */
        .painel-venda { width: 350px; background: #f8f9fa; border-left: 1px solid #ddd; padding: 10px; display: flex; flex-direction: column; flex-shrink: 0; }
        
        .topo-cliente { display: flex; gap: 5px; margin-bottom: 8px; }
        .input-cli { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-weight: bold; outline: none; }

        .cupom-tela { background: white; border: 1px solid #bbb; flex: 1; padding: 10px; font-family: 'Courier New', Courier, monospace; overflow-y: auto; box-shadow: inset 0 0 8px rgba(0,0,0,0.05); }
        .item-linha { display: flex; justify-content: space-between; font-size: 12px; border-bottom: 1px dotted #ccc; padding: 5px 0; }
        
        .financeiro { margin-top: 8px; padding: 8px; background: #fff; border: 1px solid #ddd; border-radius: 5px; }
        .total-linha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .txt-total { font-size: 20px; font-weight: 900; color: #c0392b; }
        .txt-falta { font-size: 15px; font-weight: bold; color: #e67e22; }

        .pagamentos { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
        .btn-pg { padding: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; transition: 0.2s; }
        .btn-pg:hover { background: #e9ecef; }
        .btn-pendura { grid-column: span 2; background: #d35400; color: white; border: none; font-size: 11px; }
