<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão Profissional</title>
    <style>
        :root {
            --primary: #ffcc00;
            --bg-dark: #121212;
            /* Cores Harmonizadas da Tabela */
            --col-prod: #3b5998;
            --col-custo: #fff2cc;
            --col-venda: #d9e1f2;
            --col-lucro: #fce4ec;
            --col-margem: #e2efda;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; }

        header { background: var(--primary); padding: 15px 40px; color: #000; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #000; color: var(--primary); padding: 5px 12px; border-radius: 4px; font-weight: 900; }

        nav { background: #1a1a1a; display: flex; padding: 0 40px; border-bottom: 2px solid #333; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { padding: 30px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* Mesas Independentes */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .mesa { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 35px 10px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .mesa.ocupada { background: #d32f2f; border-color: #ff5252; box-shadow: 0 0 15px rgba(211, 47, 47, 0.4); }

        /* Tabela Estilizada */
        .card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; background: #fff; color: #000; border-radius: 10px; overflow: hidden; }
        th { background: #2b579a; color: #fff; padding: 15px; text-align: left; font-size: 12px; }
        td { padding: 15px; font-weight: bold; border-bottom: 1px solid #eee; }

        /* Aplicação das Cores Harmonizadas */
        .c-prod { background: var(--col-prod); color: #fff; }
        .c-custo { background: var(--col-custo); }
        .c-venda { background: var(--col-venda); }
        .c-lucro { background: var(--col-lucro); }
        .c-margem { background: var(--col-margem); }

        button { background: var(--primary); color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 8px; }
        input[type="file"] { background: #333; color: #fff; padding: 10px; border-radius: 8px; margin-right: 10px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="badge">934</div>
        <h1 style="letter-spacing:-1.5px;">BOTECO</h1>
    </div>
    <div>Petrolina-PE | 32°C</div>
</header>

<nav>
    <div class="nav-item active" onclick="tela('operacional', this)">Mesas/Operacional</div>
    <div class="nav-item" onclick="tela('estoque', this)">Estoque XML</div>
</nav>

<div class="container">
    <div id="operacional" class="secao ativa">
        <div class="grid-mesas" id="gradeMesas"></div>
    </div>

    <div id="estoque" class="secao">
        <div class="card">
            <h3 style="color:var(--primary); margin-bottom:15px;">IMPORTAR NOTA FISCAL (XML)</h3>
            <input type="file" id="xmlInput" accept=".xml">
            <button onclick="importarXML()">LANÇAR NO FIREBASE</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>PRODUTO</th>
                    <th>QTD</th>
                    <th>CUSTO UNIT.</th>
                    <th>VENDA UNIT.</th>
                    <th>LUCRO</th>
                    <th>MARGEM %</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Configuração do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Mesas Dinâmicas
    const grade = document.getElementById('gradeMesas');
    for(let i=1; i<=15; i++) {
        grade.innerHTML += `<div class="mesa" onclick="this.classList.toggle('ocupada')">MESA ${i}</div>`;
    }

    // Processamento de XML
    window.importarXML = function() {
        const file = document.getElementById('xmlInput').files[0];
        if(!file) return alert("Selecione o arquivo!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const itens = xml.getElementsByTagName("det");

            for(let i=0; i<itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent;
                const qtd = parseFloat(itens[i].getElementsByTagName("qCom")[0].textContent);
                const custoUn = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent);
                
                // Cálculo automático de margem (Ex: 50% de lucro sobre o custo)
                const vendaSugestao = custoUn * 2;
                const lucro = vendaSugestao - custoUn;

                // Envio para a pasta 'produtos' no Firebase
                push(ref(db, 'produtos'), {
                    nome, qtd, custo: custoUn, venda: vendaSugestao, lucro, margem: 50
                });
            }
            alert("Estoque atualizado na nuvem!");
        };
        reader.readAsText(file);
    };

    // Atualização da Tabela em Tempo Real
    onValue(ref(db, 'produtos'), (snapshot) => {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        const data = snapshot.val();
        if(data) {
            Object.values(data).forEach(p => {
                corpo.innerHTML += `
                    <tr>
                        <td class="c-prod">${p.nome}</td>
                        <td>${p.qtd}</td>
                        <td class="c-custo">R$ ${p.custo.toFixed(2)}</td>
                        <td class="c-venda">R$ ${p.venda.toFixed(2)}</td>
                        <td class="c-lucro">R$ ${p.lucro.toFixed(2)}</td>
                        <td class="c-margem">${p.margem}%</td>
                    </tr>`;
            });
        }
    });

    window.tela = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    };
</script>
</body>
</html>
