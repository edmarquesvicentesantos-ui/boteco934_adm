<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - GESTÃO PRO</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --i: #3498db; --a: #f1c40f; --r: #e74c3c; --w: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: var(--w); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--a); }
        nav { background: #2c3e50; display: flex; height: 50px; flex-shrink: 0; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .nav-btn.active { color: var(--w); background: rgba(255,255,255,0.1); border-bottom: 4px solid var(--a); }
        main { flex: 1; display: flex; overflow: hidden; }
        .tela { display: none; width: 100%; height: 100%; padding: 15px; overflow-y: auto; }
        .ativa { display: flex !important; }
        .col-mesas { width: 160px; border-right: 1px solid #ddd; background: #fff; padding: 10px; overflow-y: auto; }
        .mesa { padding: 15px; margin-bottom: 10px; border: 2px solid var(--s); border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; }
        .mesa.ocupada { background: #fff9db; border-color: var(--a); color: #856404; }
        .mesa.sel { background: var(--p) !important; color: var(--w) !important; }
        .col-central { flex: 1; padding: 0 15px; display: flex; flex-direction: column; }
        .col-resumo { width: 340px; background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .btn { padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; width: 100%; }
        .grid-p { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 10px; }
        .card-p { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>

<header><h2>BOTECO 934</h2><div id="relogio">00:00:00</div></header>
<nav>
    <button class="nav-btn active" onclick="guia('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="guia('estoque', this)">Produtos</button>
    <button class="nav-btn" onclick="guia('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="guia('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="render-mesas"></div>
        <div class="col-central">
            <input type="text" id="campo-bipe" placeholder="BIPE O PRODUTO..." autocomplete="off">
            <div id="area-venda" style="display:none;">
                <label style="font-size:11px; font-weight:bold;">CLIENTE NA MESA:</label>
                <select id="select-cliente-venda"></select>
                <div class="grid-p" id="render-atalhos"></div>
            </div>
        </div>
        <div class="col-resumo">
            <h3 id="titulo-mesa" style="text-align:center;">Selecione uma mesa</h3>
            <div id="car-itens" style="flex:1; overflow-y:auto; margin-top:10px; font-size:13px;"></div>
            <div style="border-top:2px solid #333; padding-top:10px;">
                <h2 style="color:var(--r);">Total: R$ <span id="total-mesa-v">0.00</span></h2>
                <button class="btn" style="background:var(--s); margin-top:10px;" onclick="fechar()">FECHAR CONTA</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction:column;">
        <h3>Produtos</h3>
        <div style="max-width:350px;"><input id="p-ean" placeholder="EAN"><input id="p-nome" placeholder="Nome"><input id="p-val" placeholder="Preço"><button class="btn" style="background:var(--i);" onclick="addProd()">SALVAR</button></div>
        <table><thead><tr><th>EAN</th><th>Nome</th><th>R$</th><th>X</th></tr></thead><tbody id="t-estoque"></tbody></table>
    </div>

    <div id="clientes" class="tela" style="flex-direction:column;">
        <h3>Clientes</h3>
        <div style="max-width:350px;"><input id="c-nome" placeholder="Nome"><button class="btn" style="background:var(--p);" onclick="addCli()">SALVAR</button></div>
        <table><thead><tr><th>Nome</th><th>X</th></tr></thead><tbody id="t-clientes"></tbody></table>
    </div>

    <div id="caixa" class="tela" style="flex-direction:column;">
        <h2 id="cx-soma">R$ 0.00</h2>
        <table><thead><tr><th>Hora</th><th>Ref</th><th>Valor</th><th>Tipo</th></tr></thead><tbody id="t-hist"></tbody></table>
        <button onclick="if(confirm('Zerar tudo?')){localStorage.clear();location.reload();}" style="margin-top:20px; color:var(--r); background:none; border:none; cursor:pointer; text-decoration:underline;">REINICIAR SISTEMA</button>
    </div>
</main>

<script>
    let PRODS = JSON.parse(localStorage.getItem('b934_p')) || [];
    let CLIS = JSON.parse(localStorage.getItem('b934_c')) || [{n: "Consumidor Geral"}];
    let HIST = JSON.parse(localStorage.getItem('b934_h')) || [];
    let MESAS = Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, ocup: false }));
    let mesaAtiva = null;
    let clienteSelecionadoAtual = "Consumidor Geral"; // MEMÓRIA DA SELEÇÃO

    function salvar() {
        localStorage.setItem('b934_p', JSON.stringify(PRODS));
        localStorage.setItem('b934_c', JSON.stringify(CLIS));
        localStorage.setItem('b934_h', JSON.stringify(HIST));
    }

    function guia(id, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        btn.classList.add('active');
        if(id==='vendas') renderVendas();
        if(id==='estoque') renderEstoque();
        if(id==='clientes') renderClientes();
        if(id==='caixa') renderCaixa();
    }

    function renderVendas() {
        document.getElementById('render-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa ${m.ocup?'ocupada':''} ${mesaAtiva===m.id?'sel':''}" onclick="selMesa(${m.id})">MESA ${m.id}<br>R$ ${m.total.toFixed(2)}</div>
        `).join('');
        
        document.getElementById('render-atalhos').innerHTML = PRODS.map((p, i) => `
            <div class="card-p" onclick="lancar(${i})">${p.n}<br>R$ ${parseFloat(p.v).toFixed(2)}</div>
        `).join('');

        const selCli = document.getElementById('select-cliente-venda');
        selCli.innerHTML = CLIS.map(c => `<option value="${c.n}">${c.n}</option>`).join('');
        
        // FORÇA A VOLTA DO CLIENTE QUE ESTAVA SELECIONADO
        selCli.value = clienteSelecionadoAtual;
    }

    // CAPTURA A MUDANÇA MANUAL DO CLIENTE
    document.getElementById('select-cliente-venda').addEventListener('change', (e) => {
        clienteSelecionadoAtual = e.target.value;
    });

    function selMesa(id) {
        mesaAtiva = id;
        document.getElementById('titulo-mesa').innerText = "MESA " + id;
        document.getElementById('area-venda').style.display = 'block';
        renderVendas();
        atuCar();
        document.getElementById('campo-bipe').focus();
    }

    function lancar(idx) {
        if(!mesaAtiva) return;
        const m = MESAS.find(x => x.id === mesaAtiva);
        const p = PRODS[idx];
        
        // USA A MEMÓRIA PARA LANÇAR
        m.itens.push({ cli: clienteSelecionadoAtual, n: p.n, v: parseFloat(p.v) });
        m.total += parseFloat(p.v);
        m.ocup = true;
        
        renderVendas();
        atuCar();
        document.getElementById('campo-bipe').focus();
    }

    document.getElementById('campo-bipe').addEventListener('keypress', e => {
        if(e.key === 'Enter') {
            const idx = PRODS.findIndex(p => p.e === e.target.value);
            if(idx !== -1) { lancar(idx); e.target.value = ''; }
            else { alert("Não cadastrado!"); e.target.value = ''; }
        }
    });

    function atuCar() {
        const m = MESAS.find(x => x.id === mesaAtiva);
        document.getElementById('car-itens').innerHTML = m.itens.map(it => `<div><b>${it.cli}:</b> ${it.n} - R$ ${it.v.toFixed(2)}</div>`).join('');
        document.getElementById('total-mesa-v').innerText = m.total.toFixed(2);
    }

    function fechar() {
        const m = MESAS.find(x => x.id === mesaAtiva);
        if(!m || m.total === 0) return;
        const op = prompt("1-Total | 2-Por Cliente | 3-Dividir");
        let vF = 0; let ref = "Mesa "+m.id;
        if(op==="1"){ vF = m.total; m.itens=[]; m.total=0; m.ocup=false; }
        else if(op==="2"){
            let n = prompt("Nome do cliente:");
            let fits = m.itens.filter(i => i.cli === n);
            if(fits.length===0) return alert("Nada encontrado!");
            vF = fits.reduce((s,i)=>s+i.v, 0); ref = n;
            m.itens = m.itens.filter(i => i.cli !== n);
            m.total -= vF; if(m.total <= 0) m.ocup=false;
        } else if(op==="3"){
            let q = prompt("Quantos?"); vF = m.total/q; ref = "Rachado";
            m.total -= vF; if(m.total < 0.1){ m.itens=[]; m.total=0; m.ocup=false; }
        } else return;

        const f = prompt("PGTO: 1-Dinheiro | 2-PIX | 3-Cartão | 4-Pendura");
        const meios = {"1":"Dinheiro","2":"PIX","3":"Cartão","4":"Pendura"};
        if(meios[f]){ HIST.push({h:new Date().toLocaleTimeString(), r:ref, v:vF, t:meios[f]}); salvar(); renderVendas(); atuCar(); }
    }

    function addProd() { PRODS.push({e:document.getElementById('p-ean').value, n:document.getElementById('p-nome').value, v:document.getElementById('p-val').value}); salvar(); renderEstoque(); }
    function renderEstoque() { document.getElementById('t-estoque').innerHTML = PRODS.map((p,i)=>`<tr><td>${p.e}</td><td>${p.n}</td><td>${parseFloat(p.v).toFixed(2)}</td><td onclick="PRODS.splice(${i},1);salvar();renderEstoque()">❌</td></tr>`).join(''); }
    function addCli() { CLIS.push({n:document.getElementById('c-nome').value}); salvar(); renderClientes(); }
    function renderClientes() { document.getElementById('t-clientes').innerHTML = CLIS.map((c,i)=>`<tr><td>${c.n}</td><td onclick="CLIS.splice(${i},1);salvar();renderClientes()">❌</td></tr>`).join(''); }
    function renderCaixa() {
        const total = HIST.reduce((s,i)=>s+parseFloat(i.v),0);
        document.getElementById('cx-soma').innerText = "TOTAL RECEBIDO: R$ " + total.toFixed(2);
        document.getElementById('t-hist').innerHTML = HIST.map(h=>`<tr><td>${h.h}</td><td>${h.r}</td><td>R$ ${parseFloat(h.v).toFixed(2)}</td><td>${h.t}</td></tr>`).reverse().join('');
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = () => { renderVendas(); renderEstoque(); renderClientes(); };
</script>
</body>
</html>
