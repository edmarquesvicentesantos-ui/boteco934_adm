<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE PDV - Boteco 934</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --danger: #c0392b; --accent: #f1c40f; }
        
        /* Reset para travar o tamanho da tela */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; /* Impede que a página inteira role */
        }

        /* HEADER FIXO */
        header { 
            height: 50px;
            background: var(--primary); 
            color: white; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        main { display: flex; flex: 1; height: calc(100vh - 50px); overflow: hidden; }

        /* SIDEBAR FIXA (ESQUERDA) */
        .sidebar {
            width: 70px;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            flex-shrink: 0; /* Não deixa a barra espremer */
        }
        .nav-item {
            color: #bdc3c7;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 10px;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.1); }

        /* ÁREA CENTRAL (PRODUTOS / TABELAS) */
        .area-central { 
            flex: 1; /* Ocupa o espaço que sobrar */
            display: flex; 
            flex-direction: column; 
            background: #fff; 
            padding: 10px; 
            overflow: hidden; /* Protege contra estouro */
            border-right: 1px solid #ddd;
        }
        
        .tela { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .tela.ativa { display: flex; }

        /* Grade de Produtos com rolagem interna */
        .scroll-grid { 
            flex: 1;
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
            overflow-y: auto; 
            padding-bottom: 20px;
        }

        /* Tabelas Clientes/Estoque */
        .tabela-wrapper { flex: 1; overflow: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; position: sticky; top: 0; }

        /* CARRINHO FIXO (DIREITA) */
        .carrinho { 
            width: 300px; 
            background: #fff; 
            display: flex; 
            flex-direction: column; 
            padding: 10px; 
            flex-shrink: 0;
        }
        .itens-checkout { flex: 1; overflow-y: auto; border-bottom: 1px solid #eee; }

        /* Cards menores para não engolir espaço */
        .card-p { border: 1px solid #eee; padding: 5px; text-align: center; border-radius: 4px; cursor: pointer; }
        .card-p img { width: 100%; height: 50px; object-fit: cover; border-radius: 2px; }
        .card-p h4 { font-size: 10px; height: 24px; overflow: hidden; margin: 4px 0; }
        
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-finish { background: var(--success); color: white; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">BOTECO 934 - ELITE PDV</div>
    <div style="font-size: 12px;">Venda: R$ <span id="v_dia">0.00</span> | Lucro: R$ <span id="l_dia">0.00</span></div>
</header>

<main>
    <nav class="sidebar">
        <div class="nav-item active" onclick="ver('vendas', this)"><i>🛒</i><br>Vendas</div>
        <div class="nav-item" onclick="ver('clientes', this)"><i>👥</i><br>Clientes</div>
        <div class="nav-item" onclick="ver('estoque', this)"><i>📦</i><br>Estoque</div>
    </nav>

    <section class="area-central">
        <div id="vendas" class="tela ativa">
            <input type="text" id="busca" placeholder="Bipar ou buscar..." style="padding:10px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">
            <div id="grade" class="scroll-grid"></div>
        </div>

        <div id="clientes" class="tela">
            <h3>👥 Gestão de Clientes</h3>
            <div class="tabela-wrapper">
                <table>
                    <thead><tr><th>Nome</th><th>WhatsApp</th><th>Status</th></tr></thead>
                    <tbody id="tab-clientes"></tbody>
                </table>
            </div>
        </div>

        <div id="estoque" class="tela">
            <h3>📦 Controle de Estoque</h3>
            <div class="tabela-wrapper">
                <table>
                    <thead><tr><th>Cod</th><th>Produto</th><th>Custo</th><th>Venda</th></tr></thead>
                    <tbody id="tab-estoque"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section class="carrinho">
        <h4 style="margin-bottom: 10px; border-bottom: 2px solid var(--primary);">Carrinho</h4>
        <div id="c-itens" class="itens-checkout"></div>
        <div style="padding-top:10px;">
            <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;">
                <span>Total:</span><span>R$ <span id="c-total">0.00</span></span>
            </div>
            <button class="btn-finish" onclick="fechar()">Finalizar Venda</button>
        </div>
    </section>
</main>

<script>
    const db_p = [
        { ean: "001", nome: "Heineken LN", preco: 16.00, custo: 9.50, img: "https://via.placeholder.com/100" },
        { ean: "002", nome: "Skol Lata", preco: 6.50, custo: 3.80, img: "https://via.placeholder.com/100" },
        { ean: "003", nome: "Pitu 965ml", preco: 18.00, custo: 12.00, img: "https://via.placeholder.com/100" }
    ];

    const db_c = [
        { nome: "Edmarques", fone: "87 9...", status: "OK" },
        { nome: "Maria", fone: "87 9...", status: "Pendente" }
    ];

    let car = [];

    function ver(id, el) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
        if(id === 'clientes') carregarClientes();
        if(id === 'estoque') carregarEstoque();
    }

    function renderG() {
        const g = document.getElementById('grade');
        g.innerHTML = db_p.map(p => `
            <div class="card-p" onclick="add('${p.ean}')">
                <img src="${p.img}">
                <h4>${p.nome}</h4>
                <span style="color:var(--success); font-weight:bold;">R$ ${p.preco.toFixed(2)}</span>
            </div>
        `).join('');
    }

    function carregarClientes() {
        document.getElementById('tab-clientes').innerHTML = db_c.map(c => `<tr><td>${c.nome}</td><td>${c.fone}</td><td>${c.status}</td></tr>`).join('');
    }

    function carregarEstoque() {
        document.getElementById('tab-estoque').innerHTML = db_p.map(p => `<tr><td>${p.ean}</td><td>${p.nome}</td><td>R$ ${p.custo}</td><td>R$ ${p.preco}</td></tr>`).join('');
    }

    function add(ean) {
        const prod = db_p.find(p => p.ean === ean);
        if(prod) { car.push(prod); upC(); }
    }

    function upC() {
        const lista = document.getElementById('c-itens');
        let t = 0;
        lista.innerHTML = car.map(p => { t += p.preco; return `<div style="font-size:12px; display:flex; justify-content:space-between; padding:4px 0;"><span>${p.nome}</span><span>R$ ${p.preco.toFixed(2)}</span></div>`; }).join('');
        document.getElementById('c-total').innerText = t.toFixed(2);
    }

    renderG();
</script>
</body>
</html>
