<nav class="nav-bar">
    <button class="nav-btn active" onclick="ver('vendas', this)">🛒 Vendas</button>
    <button class="nav-btn" onclick="ver('financas', this)">💰 Caixa</button>
</nav>

<main id="conteudo-principal">
    <div id="vendas" class="tela" style="display: flex; width: 100%;">
        <aside class="col-mesas" id="lista-mesas"></aside>
        <section class="col-produtos">
            <select id="sel-cliente" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid var(--info); border-radius: 5px; font-weight: bold;">
                <option value="Balcão">Balcão (Geral)</option>
            </select>
            <div id="grid-produtos" class="grid-prods"></div>
        </section>
        <aside class="col-carrinho">
            <h3 id="mesa-titulo" style="text-align:center; padding: 10px;">Mesa Livre</h3>
            <div id="c-itens" style="flex:1; overflow-y:auto;"></div>
            <div style="border-top:2px solid #eee; padding-top:10px;">
                <div style="font-size:20px; font-weight:bold;">Total: R$ <span id="c-total">0.00</span></div>
                <button onclick="fecharConta()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:5px; margin-top:10px; font-weight:bold; cursor:pointer;">FINALIZAR</button>
            </div>
        </aside>
    </div>

    <div id="financas" class="tela" style="display: none; width: 100%; padding: 20px; flex-direction: column; overflow-y: auto;">
        <h2 style="margin-bottom: 20px;">💰 Resumo Financeiro</h2>
        <div id="caixa-resumo" style="display: flex; gap: 15px; margin-bottom: 30px;">
            </div>
        <h3>📋 Histórico de Vendas</h3>
        <table style="width: 100%; border-collapse: collapse; background: white; margin-top: 10px;">
            <thead>
                <tr style="background: var(--primary); color: white;">
                    <th style="padding: 10px; text-align: left;">Hora</th>
                    <th style="padding: 10px; text-align: left;">Origem</th>
                    <th style="padding: 10px; text-align: left;">Valor</th>
                    <th style="padding: 10px; text-align: left;">Pagamento</th>
                </tr>
            </thead>
            <tbody id="historico-corpo"></tbody>
        </table>
        <button onclick="limparTudo()" style="margin-top: 30px; background: var(--danger); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">Zerar Movimentação</button>
    </div>
</main>
