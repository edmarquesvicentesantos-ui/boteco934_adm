<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Detalhado - Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid #ff9f0a; padding-bottom: 10px; margin-bottom: 15px; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .input-dark { width: 100%; padding: 10px; margin-top: 5px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { font-size: 10px; color: #8e8e93; font-weight: bold; text-transform: uppercase; }
        .painel-lucro { margin-top: 15px; background: #000; padding: 12px; border-radius: 10px; border: 1px solid #30d158; }
        .res-valor { font-size: 20px; font-weight: bold; color: #30d158; }
        .btn-salvar { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; font-size: 16px; }
        .item-estoque { background: #1c1c1e; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid #ff9f0a; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: #ff9f0a;">CADASTRO DE ESTOQUE</h2>
    </div>

    <div class="card">
        <label>Nome do Produto</label>
        <input type="text" id="nome" class="input-dark" placeholder="Ex: Heineken 330ml">
        
        <label style="margin-top:10px; display:block;">Código de Barras</label>
        <input type="text" id="cod_barras" class="input-dark" placeholder="000000000000">

        <div class="grid-campos">
            <div>
                <label>Custo Fardo/Garrafa</label>
                <input type="number" id="custo" class="input-dark" oninput="calcular()" step="0.01">
            </div>
            <div>
                <label>Qtd no Fardo/Doses</label>
                <input type="number" id="qtd" class="input-dark" oninput="calcular()" value="12">
            </div>
            <div>
                <label>Markup Pretendido (%)</label>
                <input type="number" id="markup" class="input-dark" oninput="calcularPeloMarkup()" value="100">
            </div>
            <div>
                <label>Preço Praticado (Venda)</label>
                <input type="number" id="venda" class="input-dark" oninput="calcularPelaVenda()" step="0.01">
            </div>
        </div>

        <div class="painel-lucro">
            <label>Preço Sugerido (Base Markup): <span id="sugerido" style="color:#fff">R$ 0,00</span></label><br>
            <div style="margin-top:10px;">
                <label>Lucro p/ Unidade/Dose</label>
                <div id="lucro_un" class="res-valor">R$ 0,00</div>
            </div>
            <div class="grid-campos">
                <div>
                    <label>Margem Real (%)</label>
                    <div id="margem_real" style="color:#30d158; font-weight:bold;">0%</div>
                </div>
                <div>
                    <label>Markup Real (%)</label>
                    <div id="markup_real" style="color:#ff9f0a; font-weight:bold;">0%</div>
                </div>
            </div>
        </div>

        <button onclick="salvar()" class="btn-salvar">SALVAR NO ESTOQUE</button>
    </div>

    <h4 style="color:#8e8e93">ITENS EM ESTOQUE (ORDEM CRESCENTE)</h4>
    <div id="lista-estoque"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", authDomain: "boteco934-afc3f.firebaseapp.com", projectId: "boteco934-afc3f", storageBucket: "boteco934-afc3f.firebasestorage.app", appId: "1:182023728304:web:040a13bb6f61c9fff35f75" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function calcularPeloMarkup() {
            let custo = parseFloat(document.getElementById('custo').value) || 0;
            let mkp = parseFloat(document.getElementById('markup').value) || 0;
            let venda = custo * (1 + (mkp / 100));
            document.getElementById('venda').value = venda.toFixed(2);
            calcular();
        }

        function calcularPelaVenda() {
            let custo = parseFloat(document.getElementById('custo').value) || 0;
            let venda = parseFloat(document.getElementById('venda').value) || 0;
            if(custo > 0) {
                let mkpReal = ((venda / custo) - 1) * 100;
                document.getElementById('markup').value = mkpReal.toFixed(0);
            }
            calcular();
        }

        function calcular() {
            let custo = parseFloat(document.getElementById('custo').value) || 0;
            let venda = parseFloat(document.getElementById('venda').value) || 0;
            let qtd = parseInt(document.getElementById('qtd').value) || 1;
            let mkpPretendido = parseFloat(document.getElementById('markup').value) || 0;

            let sugerido = custo * (1 + (mkpPretendido / 100));
            let lucroTotal = venda - custo;
            let lucroUn = lucroTotal / qtd;
            let margemReal = (lucroTotal / (venda || 1)) * 100;
            let mkpReal = ((venda / (custo || 1)) - 1) * 100;

            document.getElementById('sugerido').innerText = "R$ " + sugerido.toFixed(2);
            document.getElementById('lucro_un').innerText = "R$ " + lucroUn.toFixed(2);
            document.getElementById('margem_real').innerText = margemReal.toFixed(1) + "%";
            document.getElementById('markup_real').innerText = mkpReal.toFixed(1) + "%";
        }

        async function salvar() {
            const dados = {
                nome: document.getElementById('nome').value.toUpperCase(),
                codigo: document.getElementById('cod_barras').value,
                custo: document.getElementById('custo').value,
                venda: document.getElementById('venda').value,
                qtd: document.getElementById('qtd').value,
                data: new Date()
            };
            if(!dados.nome || !dados.custo) return alert("Preencha o Nome e Custo!");
            await db.collection("produtos").add(dados);
            alert("Salvo!");
            location.reload();
        }

        // Lista em Ordem Crescente (Alfabética)
        db.collection("produtos").orderBy("nome", "asc").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                let p = doc.data();
                h += `<div class="item-estoque">
                    <b>${p.nome}</b> - Cód: ${p.codigo || 'N/A'}<br>
                    Venda: R$ ${p.venda} | Estoque: ${p.qtd} un
                </div>`;
            });
            document.getElementById('lista-estoque').innerHTML = h;
        });
    </script>
</body>
</html>
