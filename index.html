<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - OFICIAL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #1c1e21; overflow: hidden; }

        /* TOPO */
        header { background: #1c1e21; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; height: 65px; border-bottom: 2px solid #333; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .934 { background: #f1c40f; color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        #busca { width: 400px; padding: 10px 20px; border-radius: 25px; border: none; font-size: 16px; outline: none; }

        main { display: flex; flex: 1; overflow: hidden; background: #fff; }

        /* MENU ESQUERDO */
        nav { width: 140px; background: #2c3e50; padding: 10px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .btn-menu { padding: 15px 5px; background: #34495e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-menu:hover { background: #4e6a85; }
        .btn-xml { background: #27ae60; margin-top: auto; }

        /* CENTRO - PRODUTOS (TRAVADO) */
        .secao-produtos { flex: 1; padding: 20px; overflow-y: auto; background: #f4f7f6; min-width: 600px; }
        .grid-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .card-prod { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .card-prod:hover { transform: translateY(-3px); }
        .card-prod img { height: 70px; object-fit: contain; margin-bottom: 10px; }
        .card-prod strong { display: block; font-size: 14px; margin-bottom: 5px; height: 34px; overflow: hidden; }
        .card-prod span { display: block; color: #27ae60; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: #007bff; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* LATERAL DIREITA - VENDA (LARGURA FIXA) */
        .painel-venda { width: 380px; background: #fff; border-left: 2px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        .topo-painel { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; gap: 8px; }
        select, .input-cli { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }

        .cupom-fiscal { flex: 1; padding: 15px; font-family: 'Courier New', monospace; overflow-y: auto; font-size: 13px; }
        .linha-item { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px dotted #ccc; padding-bottom: 4px; }

        .rodape-venda { padding: 15px; background: #fff; border-top: 2px solid #eee; }
        .total-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-box h2 { color: #c0392b; font-size: 28px; }

        .grid-pagamento { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn-pg { padding: 12px; border: 1px solid #ddd; background: #fdfdfd; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-pendura { grid-column: span 2; background: #e67e22; color: white; border: none; font-size: 14px; }
        .btn-fechar { width: 100%; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-fechar:disabled { background: #ccc; cursor: not-allowed; }

        @media print { .no-print { display: none !important; } .cupom-fiscal { width: 100%; } }
    </style>
</head>
<body>

<header class="no-print">
    <div class="logo-box">
        <div class="934">934</div>
        <h2 style="letter-spacing: 1px;">BOTECO 934</h2>
    </div>
    <input type="text" id="busca" placeholder="O que o cliente deseja?" oninput="buscar()">
    <div id="relogio" style="font-weight: bold;"></div>
</header>

<main>
    <nav class="no-print">
        <button class="btn-menu" onclick="filtrarCat('TUDO')">TUDO</button>
        <button class="btn-menu" onclick="filtrarCat('Bebidas')">BEBIDAS</button>
        <button class="btn-menu" onclick="filtrarCat('Doses')">DOSES</button>
        <button class="btn-menu" onclick="filtrarCat('Boticário')">BOTICÁRIO</button>
        <button class="btn-menu btn-xml" onclick="alert('Selecione o arquivo XML da Nota Fiscal')">IMPORTAR XML</button>
    </nav>

    <section class="secao-produtos no-print">
        <div id="vitrine" class="grid-cards">
            </div>
    </section>

    <aside class="painel-venda">
        <div class="topo-painel no-print">
            <select id="sel-mesa" onchange="trocarMesa()">
                <option value="Balcão">Balcão</option>
                <option value="Mesa 01">Mesa 01</option>
                <option value="Mesa 02">Mesa 02</option>
                <option value="Mesa 03">Mesa 03</option>
                <option value="Mesa 04">Mesa 04</option>
            </select>
            <input type="text" id="cli-nome" class="input-cli" style="flex:1" placeholder="Nome do Cliente" oninput="salvarCliente()">
        </div>

        <div class="cupom-fiscal" id="cupom">
            <div style="text-align:center; border-bottom: 1px dashed #000; margin-bottom: 10px; padding-bottom: 10px;">
                <strong>BOTECO 934 - RECIBO</strong><br>
                <span>Obrigado pela preferência!</span>
            </div>
            <div id="lista-venda"></div>
        </div>

        <div class="rodape-venda no-print">
            <div class="total-box">
                <span>TOTAL A PAGAR:</span>
                <h2 id="txt-total">R$ 0,00</h2>
            </div>
            
            <div class="grid-pagamento">
                <button class="btn-pg" onclick="addPg('DINHEIRO')">💵 DINHEIRO</button>
                <button class="btn-pg" onclick="addPg('PIX')">💎 PIX</button>
                <button class="btn-pg" style="grid-column: span 2;" onclick="addPg('CARTÃO')">💳 CARTÃO DÉBITO/CRÉDITO</button>
                <button class="btn-pg btn-pendura" onclick="addPg('PENDURA')">📝 LANÇAR NO PENDURA</button>
            </div>

            <button class="btn-fechar" id="btn-finalizar" onclick="concluir()" disabled>FINALIZAR VENDA</button>
        </div>
    </aside>
</main>

<script>
    // Banco de Dados Local
    let mesas = { "Balcão": { itens: [], pago: 0, cliente: "" } };
    ["Mesa 01", "Mesa 02", "Mesa 03", "Mesa 04"].forEach(m => mesas[m] = { itens: [], pago: 0, cliente: "" });

    const produtos = [
        { nome: "Água s/ Gás", preco: 3.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/water-glass.png" },
        { nome: "Cerveja Heineken", preco: 12.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer-bottle.png" },
        { nome: "Cerveja Latão", preco: 7.50, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer.png" },
        { nome: "Dose de Pitu", preco: 4.00, cat: "Doses", img: "https://img.icons8.com/color/96/tequila-shot.png" },
        { nome: "Perfume Malbec", preco: 180.00, cat: "Boticário", img: "https://img.icons8.com/color/96/perfume-bottle.png" }
    ];

    function desenhar(lista) {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = lista.map(p => `
            <div class="card-prod">
                <img src="${p.img}">
                <strong>${p.nome}</strong>
                <span>R$ ${p.preco.toFixed(2)}</span>
                <button class="btn-add" onclick="vender('${p.nome}', ${p.preco})">ADICIONAR</button>
            </div>
        `).join('');
    }

    function vender(n, p) {
        const m = document.getElementById('sel-mesa').value;
        if(!mesas[m].cliente) return alert("Por favor, digite o nome do cliente no topo da conta.");
        mesas[m].itens.push({nome: n, preco: p});
        atualizar();
    }

    function atualizar() {
        const m = document.getElementById('sel-mesa').value;
        const dados = mesas[m];
        const listaDiv = document.getElementById('lista-venda');
        
        // Agrupar itens iguais
        const agrupar = {};
        dados.itens.forEach(i => {
            agrupar[i.nome] = agrupar[i.nome] || { qtd: 0, total: 0 };
            agrupar[i.nome].qtd++;
            agrupar[i.nome].total += i.preco;
        });

        listaDiv.innerHTML = Object.keys(agrupar).map(n => `
            <div class="linha-item">
                <span>${agrupar[n].qtd}x ${n}</span>
                <span>R$ ${agrupar[n].total.toFixed(2)}</span>
            </div>
        `).join('');

        const total = dados.itens.reduce((acc, i) => acc + i.preco, 0);
        document.getElementById('txt-total').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('btn-finalizar').disabled = (total === 0);
    }

    function trocarMesa() {
        const m = document.getElementById('sel-mesa').value;
        document.getElementById('cli-nome').value = mesas[m].cliente;
        atualizar();
    }

    function salvarCliente() {
        const m = document.getElementById('sel-mesa').value;
        mesas[m].cliente = document.getElementById('cli-nome').value;
    }

    function addPg(tipo) {
        alert("Pagamento em " + tipo + " registrado!");
    }

    function concluir() {
        const m = document.getElementById('sel-mesa').value;
        window.print();
        mesas[m] = { itens: [], pago: 0, cliente: "" };
        document.getElementById('cli-nome').value = "";
        atualizar();
    }

    function filtrarCat(c) {
        if(c === 'TUDO') desenhar(produtos);
        else desenhar(produtos.filter(p => p.cat === c));
    }

    function buscar() {
        const t = document.getElementById('busca').value.toLowerCase();
        desenhar(produtos.filter(p => p.nome.toLowerCase().includes(t)));
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString(); }, 1000);
    desenhar(produtos);
</script>
</body>
</html>
