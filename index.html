<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - GESTÃO TOTAL</title>
    <style>
        :root { --amarelo: #ffcc00; --azul: #2b579a; --preto: #000; --verde: #25d366; --cinza-escuro: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: #fff; }

        /* HEADER E NAV */
        header { background: var(--amarelo); padding: 15px; color: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #333; }
        nav { background: #1a1a1a; display: flex; border-bottom: 1px solid #333; overflow-x: auto; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
        .nav-item.active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }

        .container { padding: 20px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* PDV - VENDAS */
        .pdv-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .grid-vendas { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card-produto-venda { background: #fff; color: #000; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-produto-venda:hover { transform: translateY(-3px); background: #f0f0f0; }
        .card-produto-venda span { display: block; color: var(--azul); font-size: 18px; margin-top: 5px; }
        
        .resumo-venda { background: var(--cinza-escuro); padding: 20px; border-radius: 12px; border: 1px solid #333; height: fit-content; position: sticky; top: 20px; }
        .total-venda { font-size: 32px; color: var(--amarelo); font-weight: 900; margin: 20px 0; border-top: 1px solid #333; padding-top: 10px; }

        /* ESTOQUE - TABELA COLORIDA */
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 0.8fr; background: var(--azul); padding: 12px; border-radius: 8px 8px 0 0; font-weight: bold; text-align: center; font-size: 10px; }
        .grid-linha { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 0.8fr; background: #fff; color: #000; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; font-size: 12px; }
        .grid-linha div { padding: 12px; border-right: 1px solid #eee; }

        /* INPUTS E BOTÕES */
        .card-input { background: var(--cinza-escuro); padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; border: 1px solid #333; }
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; }
        button { background: var(--amarelo); color: #000; font-weight: bold; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        /* CLIENTES */
        .card-cliente { background: #fff; color: #000; padding: 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }

        @media (max-width: 768px) { .pdv-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <span id="relogio" style="font-weight: 900;">00:00:00</span>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Balcão (Venda)</div>
    <div class="nav-item" onclick="mudar('estoque', this)">📦 Estoque XML</div>
    <div class="nav-item" onclick="mudar('clientes', this)">👥 Clientes</div>
</nav>

<div class="container">
    <div id="vendas" class="secao ativa">
        <div class="pdv-container">
            <div id="gradeProdutos" class="grid-vendas"></div>
            <div class="resumo-venda">
                <h3 style="margin-bottom:15px;">Novo Pedido</h3>
                <select id="selectCliente" style="margin-bottom:15px;"></select>
                <div id="itensCarrinho" style="max-height:250px; overflow-y:auto; font-size:14px; margin-bottom:15px;"></div>
                <div class="total-venda">R$ <span id="valorTotal">0.00</span></div>
                <button onclick="finalizarVenda()" style="background: var(--verde); color: #fff; width:100%;">Finalizar Venda</button>
                <button onclick="limparCarrinho()" style="background: #444; color: #fff; width:100%; margin-top:10px; font-size:10px;">Limpar Pedido</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="secao">
        <div class="card-input">
            <input type="file" id="xmlInput" accept=".xml">
            <button onclick="lancarXML()">Importar XML</button>
        </div>
        <div class="grid-header">
            <div>PRODUTO</div><div>QTD</div><div>CUSTO</div><div>VENDA</div><div>LUCRO</div><div>%</div>
        </div>
        <div id="listaProdutos"></div>
    </div>

    <div id="clientes" class="secao">
        <div class="card-input">
            <input type="text" id="nomeCliente" placeholder="Nome Completo">
            <input type="text" id="contatoCliente" placeholder="WhatsApp">
            <button onclick="salvarCliente()">Cadastrar</button>
        </div>
        <div id="listaClientes"></div>
    </div>
</div>
