<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Boteco 934">
    
    <title>BOTECO 934 GOLD PRO</title>
    <style>
        :root { 
            --bg: #050505; 
            --card: #121212; 
            --gold-light: #ffd700; 
            --gold-dark: #b8860b; 
            --gold-gradient: linear-gradient(145deg, #ffd700, #b8860b);
            --blue: #00d2ff; --green: #00ff41; --red: #ff4b2b; --purple: #a855f7; --text: #e0e0e0; 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top); }
        
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #222; background: #000; }
        .header h1 { 
            font-size: 22px; font-weight: 900; letter-spacing: 3px; 
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(218, 165, 32, 0.4); text-transform: uppercase;
        }

        #main-content { flex: 1; padding: 15px; overflow-y: auto; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .gold-title { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; text-transform: uppercase; font-size: 14px; display: block; margin-bottom: 10px; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; background: var(--gold-gradient); color: #000; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #0a0a0a; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; text-decoration: none; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; color: #444; }
        .nav-item span { font-size: 9px; font-weight: bold; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        
        .nav-item.active.venda i { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .nav-item.active.estoque i { color: var(--green); text-shadow: 0 0 10px var(--green); }
        .nav-item.active.relatorio i { color: var(--red); text-shadow: 0 0 10px var(--red); }
        .nav-item.active.boticario i { color: var(--gold-light); text-shadow: 0 0 10px var(--gold-light); }
        .nav-item.active.config i { color: var(--purple); text-shadow: 0 0 10px var(--purple); }

        .hidden { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="header"><h1>BOTECO 934</h1></div>

    <div id="main-content">
        <div id="sec-vendas" class="content-section">
            <div class="card">
                <span class="gold-title"><i class="fa-solid fa-cart-shopping"></i> LANÇAR VENDA</span>
                <input type="text" placeholder="Produto...">
                <input type="number" value="1">
                <button>CONFIRMAR VENDA</button>
            </div>
        </div>
        <div id="sec-estoque" class="content-section hidden">
            <div class="card"><span class="gold-title">📥 ENTRADA XML</span><button>LER NOTA</button></div>
        </div>
        <div id="sec-relatorio" class="content-section hidden">
            <div class="card"><span class="gold-title">📊 DADOS HOJE</span><p>R$ 0,00</p></div>
        </div>
        <div id="sec-boticario" class="content-section hidden">
            <div class="card"><span class="gold-title">💄 BOTICÁRIO</span><button>CATÁLOGO</button></div>
        </div>
        <div id="sec-config" class="content-section hidden">
            <div class="card"><span class="gold-title">⚙️ AJUSTES</span><button style="background:#333; color:#fff">SINCRONIZAR</button></div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active venda" onclick="showSection('vendas', this)"><i class="fa-solid fa-dollar-sign"></i><span>Vendas</span></a>
        <a href="#" class="nav-item estoque" onclick="showSection('estoque', this)"><i class="fa-solid fa-boxes-packing"></i><span>Estoque</span></a>
        <a href="#" class="nav-item relatorio" onclick="showSection('relatorio', this)"><i class="fa-solid fa-chart-line"></i><span>Dados</span></a>
        <a href="#" class="nav-item boticario" onclick="showSection('boticario', this)"><i class="fa-solid fa-spray-can-sparkles"></i><span>Boticário</span></a>
        <a href="#" class="nav-item config" onclick="showSection('config', this)"><i class="fa-solid fa-sliders"></i><span>Ajustes</span></a>
    </nav>

    <script>
        function showSection(section, element) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + section).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
