<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* BOX DA IMAGEM: Garante que o espaço sempre exista */
        .img-container {
            width: 100%;
            height: 100px;
            background-color: #e9ecef; /* Cor cinza caso não tenha foto */
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Se a imagem quebrar, o texto ALT não bagunça o layout */
        .card img[alt] {
            font-size: 10px;
            color: #888;
        }

        .nome { display: block; font-weight: bold; font-size: 14px; min-height: 35px; }
        .preco { display: block; color: #28a745; font-weight: bold; margin-bottom: 10px; }

        .btn-add {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Produtos</h2>

    <div class="grid-container">
        <div class="card">
            <div class="img-container">
                <img src="nao-existe.jpg" alt="[ Foto ]">
            </div>
            <span class="nome">Cerveja Latão</span>
            <span class="preco">R$ 7,50</span>
            <button class="btn-add" onclick="vender('Cerveja Latão', 7.50)">Adicionar</button>
        </div>

        <div class="card">
            <div class="img-container">
                <img src="nao-existe.jpg" alt="[ Foto ]">
            </div>
            <span class="nome">Água s/ Gás</span>
            <span class="preco">R$ 3,00</span>
            <button class="btn-add" onclick="vender('Água s/ Gás', 3.00)">Adicionar</button>
        </div>
    </div>

    <script>
        function vender(nome, valor) {
            // O botão mantém você na página
            console.log("Vendido: " + nome);
            alert(nome + " adicionado!");
        }
    </script>

</body>
</html>
