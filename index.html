<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 BOTECO - GESTÃO TOTAL</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --glass: rgba(20, 20, 20, 0.98); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; }
        header { background: var(--gold); padding: 10px 20px; color: #000; display: flex; justify-content: space-between; font-weight: 900; }
        
        .container { padding: 20px; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        
        /* GRID DE MESAS */
        .grid-mesas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .mesa { 
            background: #222; padding: 20px 10px; border-radius: 10px; text-align: center; 
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .mesa.ocupada { background: #440000; border-color: #ff4444; }
        .mesa.selecionada { border-color: var(--gold); }

        /* COMANDA LATERAL */
        .comanda { background: #fff; color: #000; padding: 20px; border-radius: 15px; min-height: 80vh; position: sticky; top: 20px; }
        .comanda h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        input, select { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-fechar { background: #25d366; color: #fff; margin-top: 10px; }
        .btn-abrir { background: var(--gold); color: #000; }

        /* MODAL DE PAGAMENTO */
        #modalPagamento { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #000; padding: 30px; border-radius: 20px; z-index: 1000; width: 350px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* ÁREA DE IMPRESSÃO (OCULTA NO NAVEGADOR) */
        #reciboTermico { display: none; font-family: monospace; width: 80mm; color: #000; padding: 10px; }
    </style>
</head>
<body>

<header>
    <div>934 BOTECO - PDV</div>
    <div id="relogio">00:00:00</div>
</header>

<div class="container">
    <div>
        <h3 style="margin-bottom: 15px; color: var(--gold);">Painel de Atendimento</h3>
        <div class="grid-mesas" id="grade"></div>
    </div>

    <div class="comanda">
        <div id="areaAbertura">
            <h3>Nova Ocupação</h3>
            <label style="font-size: 12px; font-weight: bold;">NOME DO CLIENTE:</label>
            <input type="text" id="nomeCliente" placeholder="Obrigatório para abrir">
            <button class="btn btn-abrir" onclick="abrirMesa()">Abrir Mesa</button>
        </div>

        <div id="areaConsumo" style="display: none;">
            <h3 id="tituloMesa">Mesa --</h3>
            <p id="clienteAtual" style="font-weight: bold; color: #666; margin-bottom: 15px;"></p>
            
            <div id="listaItens" style="min-height: 200px; border-bottom: 1px solid #eee;">
                <p style="color: #999; font-size: 13px;">Clique nos produtos para adicionar...</p>
            </div>

            <div style="margin-top: 15px;">
                <h2>TOTAL: R$ <span id="totalVenda">0,00</span></h2>
                <button class="btn btn-fechar" onclick="prepararFechamento()">Finalizar Recebimento</button>
            </div>
        </div>
    </div>
</div>

<div id="modalPagamento">
    <h3>Recebimento</h3>
    <p style="margin-bottom: 15px;">Total a pagar: <b id="valorModal">R$ 0,00</b></p>
    
    <label>Forma de Pagamento:</label>
    <select id="meioPagamento">
        <option value="Dinheiro">Dinheiro</option>
        <option value="PIX">PIX</option>
        <option value="Crédito">Cartão de Crédito</option>
        <option value="Débito">Cartão de Débito</option>
        <option value="Pendura">Pendura (Fiado)</option>
    </select>

    <button class="btn btn-abrir" onclick="confirmarVenda()">Confirmar e Imprimir</button>
    <button class="btn" onclick="document.getElementById('modalPagamento').style.display='none'" style="background:#eee; margin-top:5px;">Cancelar</button>
</div>

<script>
    let mesaSelecionada = null;
    let dadosMesas = {};

    // Inicia 20 mesas
    const grade = document.getElementById('grade');
    for(let i=1; i<=20; i++) {
        grade.innerHTML += `<div class="mesa" id="m${i}" onclick="selecionarMesa(${i})">Mesa ${i}<br><small>Livre</small></div>`;
        dadosMesas[i] = { ocupada: false, cliente: '', total: 0 };
    }

    function selecionarMesa(n) {
        mesaSelecionada = n;
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('selecionada'));
        document.getElementById(`m${n}`).classList.add('selecionada');

        if(dadosMesas[n].ocupada) {
            document.getElementById('areaAbertura').style.display = 'none';
            document.getElementById('areaConsumo').style.display = 'block';
            document.getElementById('tituloMesa').innerText = `Mesa ${n}`;
            document.getElementById('clienteAtual').innerText = `Cliente: ${dadosMesas[n].cliente}`;
        } else {
            document.getElementById('areaAbertura').style.display = 'block';
            document.getElementById('areaConsumo').style.display = 'none';
        }
    }

    function abrirMesa() {
        const nome = document.getElementById('nomeCliente').value;
        if(!nome) return alert("Digite o nome do cliente para abrir a mesa!");
        
        dadosMesas[mesaSelecionada].ocupada = true;
        dadosMesas[mesaSelecionada].cliente = nome;
        
        const mEl = document.getElementById(`m${mesaSelecionada}`);
        mEl.classList.add('ocupada');
        mEl.innerHTML = `Mesa ${mesaSelecionada}<br><small>${nome}</small>`;
        
        selecionarMesa(mesaSelecionada);
        document.getElementById('nomeCliente').value = '';
    }

    function prepararFechamento() {
        document.getElementById('valorModal').innerText = `R$ 0,00`; // Aqui viria a soma real
        document.getElementById('modalPagamento').style.display = 'block';
    }

    function confirmarVenda() {
        const meio = document.getElementById('meioPagamento').value;
        const cliente = dadosMesas[mesaSelecionada].cliente;
        
        // Simulação de Recibo para WhatsApp
        const msg = `*BOTECO 934 - RECIBO*%0A---------------------------%0ACliente: ${cliente}%0AMesa: ${mesaSelecionada}%0AForma: ${meio}%0A---------------------------%0A*OBRIGADO PELA PREFERÊNCIA!*`;
        
        // Abrir WhatsApp com o recibo
        window.open(`https://wa.me/?text=${msg}`, '_blank');

        // Comando de Impressão Térmica
        window.print(); 

        // Reseta Mesa
        const mEl = document.getElementById(`m${mesaSelecionada}`);
        mEl.classList.remove('ocupada');
        mEl.innerHTML = `Mesa ${mesaSelecionada}<br><small>Livre</small>`;
        dadosMesas[mesaSelecionada] = { ocupada: false, cliente: '', total: 0 };
        
        document.getElementById('modalPagamento').style.display = 'none';
        document.getElementById('areaConsumo').style.display = 'none';
        document.getElementById('areaAbertura').style.display = 'block';
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>

</body>
</html>
