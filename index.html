<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão de Estoque</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --orange: #ff9800;
            --green: #00e676;
            --gray: #888;
        }

        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }

        /* Estilo das Abas */
        .tabs { display: flex; margin-bottom: 2px; }
        .tab-btn { 
            flex: 1; padding: 15px; cursor: pointer; border: none; 
            background: #222; color: var(--gray); font-weight: bold; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--orange); color: #000; }

        .panel { background: var(--card); padding: 25px; border: 1px solid #333; display: none; }
        .panel.active { display: block; }

        /* Grid de Inputs */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }

        label { display: block; color: var(--gray); font-size: 12px; margin-bottom: 8px; font-weight: bold; }
        input { 
            width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; 
            color: #fff; font-size: 16px; box-sizing: border-box; 
        }
        input:focus { border-color: var(--orange); outline: none; }

        /* Caixa de Resultado */
        .res-container { 
            margin-top: 20px; padding: 20px; border: 1px solid var(--green); 
            text-align: center; background: rgba(0, 230, 118, 0.05); 
        }
        .res-price { font-size: 32px; color: var(--green); font-weight: bold; display: block; }
        .res-detail { color: var(--gray); font-size: 14px; margin-top: 5px; }

        .btn-salvar { 
            width: 100%; padding: 15px; background: var(--green); color: #000; 
            border: none; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--orange);">CONTROLE DE ESTOQUE INTELIGENTE</h2>

    <div class="tabs">
        <div class="tab-btn active" onclick="mudarAba('mercadoria', this)">Cervejas / Refrigerantes / Cigarros</div>
        <div class="tab-btn" onclick="mudarAba('destilado', this)">Whiskys / Cachaças / Vodkas (Doses)</div>
    </div>

    <div id="mercadoria" class="panel active">
        <div class="grid">
            <div class="full">
                <label>NOME DO PRODUTO (FARDO OU UNIDADE)</label>
                <input type="text" id="m_nome" placeholder="Ex: Heineken 600ml">
            </div>
            <div>
                <label>VALOR DE CUSTO (FARDO OU CAIXA)</label>
                <input type="number" id="m_custo" oninput="calcularM()" step="0.01">
            </div>
            <div>
                <label>QUANTIDADE NO FARDO/CAIXA</label>
                <input type="number" id="m_qtd" oninput="calcularM()" value="1">
            </div>
            <div class="full">
                <label>MARKUP DESEJADO (%)</label>
                <input type="number" id="m_markup" oninput="calcularM()" value="100">
            </div>
        </div>

        <div class="res-container">
            <label>PREÇO DE VENDA POR UNIDADE</label>
            <span class="res-price" id="m_venda">R$ 0,00</span>
            <div class="res-detail" id="m_detalhe">Custo Unitário: R$ 0,00 | Lucro: R$ 0,00</div>
        </div>
        <button class="btn-salvar">SALVAR NO ESTOQUE</button>
    </div>

    <div id="destilado" class="panel">
        <div class="grid">
            <div class="full">
                <label>NOME DO DESTILADO (GARRAFA)</label>
                <input type="text" id="d_nome" placeholder="Ex: Black Label 1L">
            </div>
            <div>
                <label>CUSTO DA GARRAFA (R$)</label>
                <input type="number" id="d_custo_garrafa" oninput="calcularD()" step="0.01">
            </div>
            <div>
                <label>TAMANHO DA GARRAFA (ML)</label>
                <input type="number" id="d_ml_garrafa" oninput="calcularD()" value="1000">
            </div>
            <div>
                <label>TAMANHO DA DOSE (ML)</label>
                <input type="number" id="d_ml_dose" oninput="calcularD()" value="50">
            </div>
            <div>
                <label>MARKUP NA DOSE (%)</label>
                <input type="number" id="d_markup" oninput="calcularD()" value="100">
            </div>
        </div>

        <div class="res-container">
            <label>PREÇO DE VENDA POR DOSE</label>
            <span class="res-price" id="d_venda">R$ 0,00</span>
            <div class="res-detail" id="d_detalhe">Rende 0 doses | Custo por dose: R$ 0,00</div>
        </div>
        <button class="btn-salvar">SALVAR NO ESTOQUE</button>
    </div>
</div>

<script>
    // Função para trocar as telas
    function mudarAba(id, elemento) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        elemento.classList.add('active');
    }

    // LÓGICA 1: MERCADORIA (Fardo/Unitário)
    function calcularM() {
        const custoTotal = parseFloat(document.getElementById('m_custo').value) || 0;
        const qtd = parseInt(document.getElementById('m_qtd').value) || 1;
        const markup = parseFloat(document.getElementById('m_markup').value) || 0;

        const custoUnitario = custoTotal / qtd;
        const precoVenda = custoUnitario * (1 + (markup / 100));
        const lucroReais = precoVenda - custoUnitario;

        document.getElementById('m_venda').innerText = `R$ ${precoVenda.toFixed(2)}`;
        document.getElementById('m_detalhe').innerText = `Custo Unitário: R$ ${custoUnitario.toFixed(2)} | Lucro: R$ ${lucroReais.toFixed(2)}`;
    }

    // LÓGICA 2: DESTILADOS (Dose)
    function calcularD() {
        const custoGarrafa = parseFloat(document.getElementById('d_custo_garrafa').value) || 0;
        const mlGarrafa = parseFloat(document.getElementById('d_ml_garrafa').value) || 1;
        const mlDose = parseFloat(document.getElementById('d_ml_dose').value) || 1;
        const markup = parseFloat(document.getElementById('d_markup').value) || 0;

        const totalDoses = mlGarrafa / mlDose;
        const custoPorDose = custoGarrafa / totalDoses;
        const precoVendaDose = custoPorDose * (1 + (markup / 100));

        document.getElementById('d_venda').innerText = `R$ ${precoVendaDose.toFixed(2)}`;
        document.getElementById('d_detalhe').innerText = `Rende ${totalDoses.toFixed(1)} doses | Custo por dose: R$ ${custoPorDose.toFixed(2)}`;
    }
</script>

</body>
</html>
