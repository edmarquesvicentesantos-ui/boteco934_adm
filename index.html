<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE 934 - COMPLETO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --card: #111; --green: #25d366; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral */
        nav { width: 220px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 12px; cursor: pointer; border-radius: 6px; text-align: left; }
        .nav-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        /* Área Principal */
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* Cards e Layout */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
        .card.ocupada { border-color: var(--gold); background: #1a1600; }
        
        /* XML Drop Zone */
        .xml-zone { border: 2px dashed #444; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }

        /* Estilo da Conta */
        .linha-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .btn-pg { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<nav>
    <div style="text-align:center; margin-bottom: 30px;"><h1 style="color:var(--gold)">934</h1></div>
    <button class="nav-btn active" onclick="tab('vendas')">🪑 VENDAS / MESAS</button>
    <button class="nav-btn" onclick="tab('estoque')">📦 ESTOQUE & XML</button>
    <button class="nav-btn" onclick="tab('fiado')">👥 FIADO / CLIENTES</button>
</nav>

<main>
    <div id="vendas" class="view active">
        <div style="display: flex; gap: 20px;">
            <div style="flex: 2;">
                <h2>Mesas</h2>
                <div class="grid-mesas" id="gridMesas"></div>
            </div>
            <div style="flex: 1; background: var(--card); padding: 20px; border-radius: 10px;" id="painelVenda">
                <h3 id="tituloMesa">Selecione uma Mesa</h3>
                <div id="listaItens" style="margin: 20px 0; min-height: 200px;"></div>
                <div style="font-size: 20px; font-weight: bold; border-top: 2px solid var(--gold); padding-top: 10px;">
                    Total: <span id="totalMesa">R$ 0,00</span>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn-pg" style="background: var(--green);" onclick="fecharConta('caixa')">💰 CAIXA</button>
                    <button class="btn-pg" style="background: var(--red);" onclick="fecharConta('fiado')">📝 FIADO</button>
                </div>
            </div>
        </div>
    </div>

    <div id="estoque" class="view">
        <h2>Entrada via XML (Fracionado)</h2>
        <div class="xml-zone" onclick="document.getElementById('xmlIn').click()">
            Arraste seu XML aqui ou Clique para Importar
            <input type="file" id="xmlIn" hidden accept=".xml" onchange="importarXML(this.files[0])">
        </div>
        <table style="width:100%; text-align:left;">
            <thead><tr><th>Produto</th><th>Estoque (Unid)</th><th>Preço Venda</th></tr></thead>
            <tbody id="corpoEstoque"></tbody>
        </table>
    </div>

    <div id="fiado" class="view">
        <h2>Clientes com Pendura</h2>
        <div id="listaFiado" style="margin-top: 20px;"></div>
    </div>
</main>

<script>
    let db = {
        estoque: JSON.parse(localStorage.getItem('934_est')) || [],
        mesas: JSON.parse(localStorage.getItem('934_mes')) || Array(12).fill().map((_, i) => ({ id: i+1, ocupada: false, pedidos: [], total: 0 })),
        clientes: JSON.parse(localStorage.getItem('934_cli')) || []
    };
    let mesaAtiva = null;

    function tab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        render();
    }

    // --- LÓGICA XML FRACIONADO ---
    function importarXML(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const produtos = xml.getElementsByTagName("det");
            for (let p of produtos) {
                let nome = p.getElementsByTagName("xProd")[0].textContent;
                let qtdNF = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                let valNF = parseFloat(p.getElementsByTagName("vUnCom")[0].textContent);
                
                let fator = prompt(`Produto: ${nome}\nQuantos vêm no fardo/caixa?`, "12");
                if (fator) {
                    let totalUn = qtdNF * parseInt(fator);
                    let custoUn = valNF / parseInt(fator);
                    let index = db.estoque.findIndex(i => i.nome === nome);
                    if (index >= 0) db.estoque[index].qtd += totalUn;
                    else db.estoque.push({ nome, qtd: totalUn, preco: custoUn * 1.5, custo: custoUn });
                }
            }
            salvar(); render();
        };
        reader.readAsText(file);
    }

    // --- VENDAS ---
    function abrirMesa(id) {
        mesaAtiva = db.mesas.find(m => m.id === id);
        mesaAtiva.ocupada = true;
        render();
    }

    function addItem(nome) {
        let p = db.estoque.find(i => i.nome === nome);
        if (p.qtd <= 0) return alert("Estoque Zerado!");
        
        let item = mesaAtiva.pedidos.find(i => i.nome === nome);
        if (item) { item.qtd++; item.sub = item.qtd * item.preco; }
        else { mesaAtiva.pedidos.push({ nome, preco: p.preco, qtd: 1, sub: p.preco }); }
        
        p.qtd--; mesaAtiva.total = mesaAtiva.pedidos.reduce((a, b) => a + b.sub, 0);
        salvar(); render();
    }

    function fecharConta(tipo) {
        if (!mesaAtiva || mesaAtiva.total === 0) return;
        
        if (tipo === 'fiado') {
            let nome = prompt("Nome do Cliente?");
            if (!nome) return;
            let c = db.clientes.find(cli => cli.nome === nome);
            if (c) c.divida += mesaAtiva.total;
            else db.clientes.push({ nome, divida: mesaAtiva.total });
        }
        
        // Enviar Zap
        let txt = `*BOTECO 934*%0A${mesaAtiva.pedidos.map(i => `${i.qtd}x ${i.nome}`).join('%0A')}%0A*Total: R$ ${mesaAtiva.total.toFixed(2)}*`;
        window.open(`https://wa.me/?text=${txt}`);
        
        mesaAtiva.ocupada = false; mesaAtiva.pedidos = []; mesaAtiva.total = 0;
        salvar(); location.reload();
    }

    // --- FUNÇÕES DE APOIO ---
    function salvar() {
        localStorage.setItem('934_est', JSON.stringify(db.estoque));
        localStorage.setItem('934_mes', JSON.stringify(db.mesas));
        localStorage.setItem('934_cli', JSON.stringify(db.clientes));
    }

    function render() {
        // Render Mesas
        document.getElementById('gridMesas').innerHTML = db.mesas.map(m => `
            <div class="card ${m.ocupada ? 'ocupada' : ''}" onclick="abrirMesa(${m.id})">
                <h3>MESA ${m.id}</h3>
                <p>${m.ocupada ? 'R$ '+m.total.toFixed(2) : 'Livre'}</p>
            </div>
        `).join('');

        // Render Itens da Mesa Selecionada
        if (mesaAtiva) {
            document.getElementById('tituloMesa').innerText = "Mesa " + mesaAtiva.id;
            document.getElementById('listaItens').innerHTML = `
                <select onchange="addItem(this.value); this.value=''" style="width:100%; padding:10px; background:#000; color:#fff; margin-bottom:10px;">
                    <option value="">+ ADICIONAR ITEM</option>
                    ${db.estoque.map(p => `<option value="${p.nome}">${p.nome} (Sald: ${p.qtd})</option>`)}
                </select>
                ${mesaAtiva.pedidos.map(i => `<div class="linha-item"><span>${i.qtd}x ${i.nome}</span><span>R$ ${i.sub.toFixed(2)}</span></div>`).join('')}
            `;
            document.getElementById('totalMesa').innerText = "R$ " + mesaAtiva.total.toFixed(2);
        }

        // Render Estoque
        document.getElementById('corpoEstoque').innerHTML = db.estoque.map(p => `<tr><td>${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.preco.toFixed(2)}</td></tr>`).join('');

        // Render Fiado
        document.getElementById('listaFiado').innerHTML = db.clientes.map((c, i) => `
            <div style="display:flex; justify-content:space-between; background:#1a1a1a; padding:15px; margin-bottom:5px;">
                <span><b>${c.nome}</b> - <span style="color:var(--red)">R$ ${c.divida.toFixed(2)}</span></span>
                <button onclick="db.clientes[i].divida=0; salvar(); render();" style="color:var(--green); background:none; border:none; cursor:pointer;">QUITAR</button>
            </div>
        `).join('');
    }

    window.onload = render;
</script>
</body>
</html>
