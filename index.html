<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - ESTÁVEL</title>
    <style>
        /* Base do Sistema */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #1c1e21; overflow: hidden; }

        /* Cabeçalho */
        header { background: #1c1e21; color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; }
        .logo-934 { display: flex; align-items: center; gap: 10px; }
        .circulo { background: #f1c40f; color: #000; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #busca { width: 350px; padding: 8px 15px; border-radius: 20px; border: none; outline: none; }

        /* Corpo do App */
        .container-principal { display: flex; flex: 1; overflow: hidden; }

        /* Menu Lateral (Esquerda) - LARGURA FIXA */
        nav { width: 140px; background: #2c3e50; padding: 10px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .btn-menu { padding: 15px 5px; background: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-xml { background: #27ae60; margin-top: auto; }

        /* Vitrine de Produtos (Centro) - FLEXÍVEL MAS COM ESPAÇO GARANTIDO */
        .centro-produtos { flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa; }
        .grade-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .item-card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-card img { height: 65px; margin-bottom: 10px; object-fit: contain; }
        .item-card p { font-size: 14px; font-weight: bold; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .item-card span { color: #28a745; font-weight: 800; display: block; margin-bottom: 10px; }
        .btn-add { background: #007bff; color: white; border: none; width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Painel de Venda (Direita) - LARGURA FIXA TRAVADA */
        .painel-venda { width: 380px; background: white; border-left: 2px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        .venda-topo { padding: 15px; background: #f1f3f5; border-bottom: 1px solid #ddd; display: flex; gap: 5px; }
        .venda-topo select, .venda-topo input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

        .cupom { flex: 1; padding: 15px; font-family: monospace; overflow-y: auto; background: #fff; }
        .linha-cupom { display: flex; justify-content: space-between; border-bottom: 1px dotted #ccc; padding: 4px 0; font-size: 13px; }

        .venda-rodape { padding: 15px; background: #fff; border-top: 2px solid #eee; }
        .val-venda { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .val-venda h2 { color: #d63031; font-size: 26px; }

        .acoes-pg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-pg { padding: 10px; border: 1px solid #ddd; background: #f8f9fa; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-pendura { grid-column: span 2; background: #e67e22; color: white; border: none; padding: 12px; font-size: 14px; }
        .btn-concluir { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-934"><div class="circulo">934</div> <strong>BOTECO 934</strong></div>
    <input type="text" id="busca" placeholder="O que o cliente deseja?" oninput="filtrar()">
    <div id="data-hora" style="font-size: 13px;"></div>
</header>

<div class="container-principal">
    <nav>
        <button class="btn-menu" onclick="cat('TUDO')">TUDO</button>
        <button class="btn-menu" onclick="cat('Bebidas')">BEBIDAS</button>
        <button class="btn-menu" onclick="cat('Doses')">DOSES</button>
        <button class="btn-menu" onclick="cat('Boticário')">BOTICÁRIO</button>
        <button class="btn-menu btn-xml" onclick="alert('Funcionalidade XML pronta para integração.')">IMPORTAR XML</button>
    </nav>

    <section class="centro-produtos">
        <div id="grade" class="grade-produtos"></div>
    </section>

    <aside class="painel-venda">
        <div class="venda-topo">
            <select id="mesa-sel" onchange="trocar()">
                <option value="Balcão">Balcão</option>
                <option value="Mesa 01">Mesa 01</option>
                <option value="Mesa 02">Mesa 02</option>
            </select>
            <input type="text" id="cli-nome" style="flex:1" placeholder="Nome do Cliente" oninput="salvarNome()">
        </div>

        <div class="cupom">
            <div style="text-align:center; font-weight:bold; border-bottom: 1px dashed #000; margin-bottom:10px;">BOTECO 934 - RECIBO</div>
            <div id="lista-itens"></div>
        </div>

        <div class="venda-rodape">
            <div class="val-venda">
                <span>TOTAL:</span>
                <h2 id="total-txt">R$ 0,00</h2>
            </div>
            <div class="acoes-pg">
                <button class="btn-pg" onclick="alert('Dinheiro registrado')">DINHEIRO</button>
                <button class="btn-pg" onclick="alert('Pix registrado')">PIX</button>
                <button class="btn-pg" style="grid-column: span 2;" onclick="alert('Cartão registrado')">CARTÃO DÉBITO/CRÉDITO</button>
                <button class="btn-pg btn-pendura" onclick="alert('Lançado no Pendura')">LANÇAR NO PENDURA</button>
            </div>
            <button class="btn-concluir" id="btn-final" onclick="finalizar()" disabled>FINALIZAR E IMPRIMIR</button>
        </div>
    </aside>
</div>

<script>
    // Memória do Sistema
    let estado = { "Balcão": { itens: [], cliente: "" } };
    ["Mesa 01", "Mesa 02"].forEach(m => estado[m] = { itens: [], cliente: "" });

    const produtos = [
        { nome: "Cerveja Latão", preco: 7.50, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer.png" },
        { nome: "Heineken 600ml", preco: 15.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer-bottle.png" },
        { nome: "Água s/ Gás", preco: 3.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/water-glass.png" },
        { nome: "Dose Pitu", preco: 4.00, cat: "Doses", img: "https://img.icons8.com/color/96/tequila-shot.png" },
        { nome: "Perfume Malbec", preco: 180.00, cat: "Boticário", img: "https://img.icons8.com/color/96/perfume-bottle.png" }
    ];

    function render(f) {
        document.getElementById('grade').innerHTML = f.map(p => `
            <div class="item-card">
                <img src="${p.img}">
                <p>${p.nome}</p>
                <span>R$ ${p.preco.toFixed(2)}</span>
                <button class="btn-add" onclick="add('${p.nome}', ${p.preco})">ADICIONAR</button>
            </div>
        `).join('');
    }

    function add(n, p) {
        const m = document.getElementById('mesa-sel').value;
        if(!estado[m].cliente) return alert("Identifique o cliente primeiro!");
        estado[m].itens.push({nome: n, preco: p});
        up();
    }

    function up() {
        const m = document.getElementById('mesa-sel').value;
        const dados = estado[m];
        const container = document.getElementById('lista-itens');
        
        const agrupar = {};
        dados.itens.forEach(i => {
            agrupar[i.nome] = agrupar[i.nome] || { q: 0, t: 0 };
            agrupar[i.nome].q++;
            agrupar[i.nome].t += i.preco;
        });

        container.innerHTML = Object.keys(agrupar).map(n => `
            <div class="linha-cupom"><span>${agrupar[n].q}x ${n}</span><span>R$ ${agrupar[n].t.toFixed(2)}</span></div>
        `).join('');

        const total = dados.itens.reduce((acc, i) => acc + i.preco, 0);
        document.getElementById('total-txt').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('btn-final').disabled = (total === 0);
    }

    function trocar() {
        const m = document.getElementById('mesa-sel').value;
        document.getElementById('cli-nome').value = estado[m].cliente;
        up();
    }

    function salvarNome() {
        estado[document.getElementById('mesa-sel').value].cliente = document.getElementById('cli-nome').value;
    }

    function cat(c) { render(c === 'TUDO' ? produtos : produtos.filter(p => p.cat === c)); }
    function filtrar() { const t = document.getElementById('busca').value.toLowerCase(); render(produtos.filter(p => p.nome.toLowerCase().includes(t))); }
    function finalizar() { window.print(); estado[document.getElementById('mesa-sel').value] = { itens: [], cliente: "" }; document.getElementById('cli-nome').value = ""; up(); }

    setInterval(() => { document.getElementById('data-hora').innerText = new Date().toLocaleString('pt-br'); }, 1000);
    render(produtos);
</script>
</body>
</html>
