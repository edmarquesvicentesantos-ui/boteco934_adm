<div id="modal-lancamento" class="modal" style="display:none;">
    <div class="modal-content-largo">
        <h3 id="titulo-mesa-ativa">Lançar para: [Nome]</h3>
        
        <div class="busca-rapida">
            <input type="text" id="busca-produto" placeholder="Pesquisar produto..." onkeyup="filtrarProdutos()">
        </div>

        <div id="lista-produtos-lancamento" class="grid-produtos-pequeno">
            </div>

        <div class="resumo-mesa">
            <h4>Itens na Mesa:</h4>
            <ul id="itens-consumidos"></ul>
            <hr>
            <button onclick="fecharModalLancamento()" class="btn-fechar">Voltar</button>
            <button onclick="finalizarMesa()" class="btn-sucesso">Fechar Conta / Receber</button>
        </div>
    </div>
</div>
