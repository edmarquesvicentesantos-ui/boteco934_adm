<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 | GOLD FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: white; touch-action: manipulation; }
        .cupom { background-color: #fffdec; color: black; font-family: monospace; border-radius: 4px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-900 p-2 border-b border-yellow-600 flex justify-between items-center shadow-lg">
        <h1 class="text-lg font-black text-yellow-500 italic">BOTECO 934</h1>
        <div class="flex gap-1">
            <button onclick="btGerente()" class="bg-slate-700 px-3 py-1 rounded text-[10px] font-bold uppercase border border-slate-500">⚙️ Gerente / XML</button>
            <button onclick="btFecharDia()" class="bg-red-700 px-3 py-1 rounded text-[10px] font-bold uppercase">📊 Fim</button>
        </div>
    </header>

    <div id="grid-mesas" class="p-1 bg-slate-950 grid grid-cols-8 gap-1 border-b border-slate-800"></div>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-[40%] bg-slate-800 flex flex-col border-r border-slate-700">
            <input type="text" oninput="funcaoBusca(this.value)" placeholder="🔍 Buscar..." class="m-2 p-2 bg-slate-900 rounded text-xs border border-slate-700 outline-none">
            <div id="lista-prods" class="p-1 space-y-1 overflow-y-auto pb-10"></div>
        </aside>

        <main class="w-[60%] p-2 flex flex-col bg-black">
            <div class="cupom p-2 flex-1 flex flex-col text-[10px]">
                <div class="flex justify-between items-center mb-1 border-b border-gray-300 pb-1">
                    <p id="status-mesa" class="font-black text-blue-800 uppercase italic">Selecione uma mesa</p>
                    <button onclick="renomearMesa()" class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-[8px] font-black italic">NOME</button>
                </div>
                <div id="itens-cupom" class="flex-1 overflow-y-auto"></div>
                <div class="border-t-2 border-black mt-1 pt-1 font-black text-red-600 flex justify-between text-[12px]">
                    <span>TOTAL</span>
                    <span>R$ <span id="txt-total">0.00</span></span>
                </div>
            </div>
            <div class="mt-2 flex flex-col gap-1">
                <select id="select-pagto" class="p-2 bg-slate-800 text-yellow-500 rounded font-bold text-[10px] uppercase border border-slate-600">
                    <option value="DINHEIRO">💵 DINHEIRO</option>
                    <option value="PIX">💎 PIX</option>
                    <option value="CARTAO">💳 CARTÃO</option>
                </select>
                <button onclick="btReceber()" class="bg-yellow-500 text-black py-4 rounded-xl font-black uppercase text-[11px] shadow-lg active:bg-yellow-600">Receber / Dividir</button>
            </div>
        </main>
    </div>

    <div id="modal-gerente" class="hidden fixed inset-0 bg-black/95 z-50 p-6 flex items-center justify-center">
        <div class="bg-white p-5 rounded-2xl w-full max-w-sm text-black shadow-2xl text-center">
            <h2 class="font-black mb-6 uppercase text-sm border-b pb-2">Painel de Controle</h2>
            
            <div class="p-4 bg-blue-600 rounded-xl mb-6 text-white shadow-lg">
                <p class="text-[11px] font-black uppercase mb-3 italic underline">Lançar Nota Fiscal (XML)</p>
                <input type="file" id="xml-input" accept=".xml" onchange="importarXML(event)" class="text-[10px] w-full file:bg-white file:text-blue-600 file:font-bold file:rounded file:px-3 file:py-1 file:border-0 cursor-pointer">
                <p class="text-[8px] mt-2 opacity-80">Ao selecionar, o estoque carrega na hora!</p>
            </div>

            <div class="border-t pt-4 mb-4">
                <p class="text-[9px] font-bold text-gray-400 mb-2 italic">OU CADASTRO MANUAL</p>
                <input type="text" id="cad-nome" placeholder="NOME DO ITEM" class="w-full p-2 mb-2 rounded border border-gray-300 text-xs uppercase">
                <input type="number" id="cad-preco" placeholder="PREÇO DE VENDA" class="w-full p-2 mb-4 rounded border border-gray-300 text-xs">
                <button onclick="funcaoSalvarManual()" class="w-full py-2 bg-slate-800 text-white font-bold rounded text-[10px] uppercase shadow">Salvar Manual</button>
            </div>

            <button onclick="btGerente()" class="mt-4 text-xs font-bold text-gray-500 uppercase underline">Sair</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks",
            authDomain: "boteco934-afc3f.firebaseapp.com",
            projectId: "boteco934-afc3f",
            storageBucket: "boteco934-afc3f.firebasestorage.app",
            messagingSenderId: "182023728304",
            appId: "1:182023728304:web:040a13bb6f61c9fff35f75"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let mesas = Array.from({length: 16}, (_, i) => ({ num: i + 1, nome: "", status: 'livre', itens: [], total: 0 }));
        let mesaAtiva = null;
        let produtos = [];

        async function carregarProdutos() {
            const snapshot = await db.collection("produtos").get();
            produtos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizarProds();
        }

        // LÓGICA DO XML - AGORA AUTOMÁTICA
        async function importarXML(event) {
            const arquivo = event.target.files[0];
            if (!arquivo) return;

            const leitor = new FileReader();
            leitor.onload = async (e) => {
                const parser = new DOMParser();
                const xml = parser.parseFromString(e.target.result, "text/xml");
                const itens = xml.getElementsByTagName("det");
                
                for (let i = 0; i < itens.length; i++) {
                    let nome = itens[i].getElementsByTagName("xProd")[0].textContent.toUpperCase();
                    let custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent);
                    let precoVenda = custo * 1.4; // LUCRO DE 40%

                    const docRef = await db.collection("produtos").add({ nome, preco: precoVenda });
                    produtos.push({ id: docRef.id, nome, preco: precoVenda });
                }
                
                renderizarProds();
                btGerente(); // FECHA O MODAL SOZINHO
                alert("✅ ESTOQUE ATUALIZADO!");
            };
            leitor.readAsText(arquivo);
        }

        async function funcaoSalvarManual() {
            const n = document.getElementById('cad-nome').value.toUpperCase();
            const p = parseFloat(document.getElementById('cad-preco').value);
            if(!n || !p) return alert("Preencha tudo!");
            
            const docRef = await db.collection("produtos").add({ nome: n, preco: p });
            produtos.push({ id: docRef.id, nome: n, preco: p });
            renderizarProds();
            btGerente();
            alert("SALVO!");
        }

        function renderizarMesas() {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = mesas.map(m => {
                let cor = m.status === 'ocupada' ? 'bg-red-600' : 'bg-green-600';
                let borda = mesaAtiva === m.num ? 'ring-2 ring-white scale-105' : '';
                return `<button onclick="selecionarMesa(${m.num})" class="${cor} ${borda} h-10 rounded text-[8px] font-black text-white shadow-md">M${m.num}<br>${m.nome || ''}</button>`;
            }).join('');
        }

        function renderizarProds(lista = null) {
            const container = document.getElementById('lista-prods');
            const dados = lista || produtos;
            container.innerHTML = dados.map(p => `
                <button onclick="addItem('${p.id}')" class="w-full bg-slate-700 p-2 rounded border border-slate-600 text-left active:bg-slate-500 mb-1">
                    <p class="text-[9px] font-bold text-white uppercase">${p.nome}</p>
                    <p class="text-yellow-500 font-black text-[10px]">R$ ${p.preco.toFixed(2)}</p>
                </button>
            `).join('');
        }

        function selecionarMesa(n) {
            mesaAtiva = n;
            const mesa = mesas.find(m => m.num === n);
            document.getElementById('status-mesa').innerText = `MESA ${n} ${mesa.nome ? '- ' + mesa.nome : ''}`;
            atualizarCupom(mesa);
            renderizarMesas();
        }

        function addItem(id) {
            if(!mesaAtiva) return alert("Clique na mesa primeiro!");
            const mesa = mesas.find(m => m.num === mesaAtiva);
            const p = produtos.find(prod => prod.id === id);
            const idx = mesa.itens.findIndex(i => i.id === id);
            if(idx >= 0) mesa.itens[idx].qtd++;
            else mesa.itens.push({ ...p, qtd: 1 });
            mesa.status = 'ocupada';
            mesa.total = mesa.itens.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            atualizarCupom(mesa); renderizarMesas();
        }

        function atualizarCupom(mesa) {
            const container = document.getElementById('itens-cupom');
            container.innerHTML = mesa.itens.map(i => `
                <div class="flex justify-between border-b border-gray-200 py-1 font-bold text-[8px] uppercase">
                    <span>${i.qtd}x ${i.nome}</span>
                    <span>R$ ${(i.qtd * i.preco).toFixed(2)}</span>
                </div>
            `).join('');
            document.getElementById('txt-total').innerText = mesa.total.toFixed(2);
        }

        async function btReceber() {
            if(!mesaAtiva) return;
            const mesa = mesas.find(m => m.num === mesaAtiva);
            const valor = parseFloat(prompt("Valor Pago:", mesa.total.toFixed(2)));
            if(!valor) return;
            await db.collection("vendas").add({ mesa: mesaAtiva, valor, data: new Date() });
            mesa.total -= valor;
            if(mesa.total <= 0) { mesa.status = 'livre'; mesa.itens = []; mesa.nome = ""; mesaAtiva = null; }
            renderizarMesas(); atualizarCupom(mesa);
        }

        function btGerente() { document.getElementById('modal-gerente').classList.toggle('hidden'); }
        function renomearMesa() { 
            const n = prompt("Nome Cliente:"); 
            if(n) { mesas.find(m => m.num === mesaAtiva).nome = n.toUpperCase(); renderizarMesas(); selecionarMesa(mesaAtiva); }
        }
        function funcaoBusca(v) { renderizarProds(produtos.filter(p => p.nome.includes(v.toUpperCase()))); }

        carregarProdutos();
        renderizarMesas();
    </script>
</body>
</html>
