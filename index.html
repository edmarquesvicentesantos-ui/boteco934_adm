<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Cores e Estilo */
        :root { 
            --bg: #0b0f1a; 
            --card: #161b2a; 
            --accent: #38bdf8; 
            --success: #22c55e; 
            --text: #f8fafc; 
            --muted: #94a3b8; 
            --danger: #ef4444;
            --radius: 12px; /* Harmonia nos cantos */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            display: grid; 
            grid-template-rows: 70px 1fr; 
            grid-template-columns: 280px 1fr 420px; 
            height: 100vh;
            overflow: hidden;
        }

        /* --- CABEÇALHO HARMONIZADO --- */
        .top-header {
            grid-column: 1 / span 3;
            background: #020617;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            z-index: 10;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-934 { 
            background: var(--accent); 
            color: #020617; 
            padding: 8px 16px; 
            border-radius: var(--radius); 
            font-weight: 900; 
            font-size: 22px; 
            letter-spacing: -1px;
        }
        
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { 
            background: var(--card); color: var(--text); text-decoration: none; 
            padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 800; 
            border: 1px solid #334155; transition: 0.3s;
        }
        .nav-btn.active { background: var(--accent); color: #020617; border-color: var(--accent); }

        /* --- COLUNA ESQUERDA (MESAS) --- */
        .area-mesas { 
            background: rgba(15, 23, 42, 0.3); padding: 20px; overflow-y: auto; 
            border-right: 1px solid #1e293b; 
        }
        .mesa { 
            background: var(--card); padding: 20px; margin-bottom: 12px; border-radius: var(--radius); 
            cursor: pointer; border: 1px solid #1e293b; transition: 0.3s; text-align: center;
        }
        .mesa.ocupada { border-left: 6px solid var(--accent); }
        .mesa.ativa { background: var(--accent); color: #020617; border-color: white; transform: scale(1.02); }
        .mesa-num { font-size: 24px; font-weight: 900; display: block; }

        /* --- ÁREA CENTRAL --- */
        .painel-venda { padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        .titulo-secao { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        
        .input-box { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
        
        input, select { 
            background: var(--card); border: 2px solid #1e293b; color: white; 
            padding: 20px; border-radius: var(--radius); font-size: 16px; font-weight: 600; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: #1e293b; }

        /* --- COLUNA DIREITA (RESUMO) --- */
        .resumo { background: #020617; padding: 30px; display: flex; flex-direction: column; border-left: 2px solid #1e293b; }
        .item-carrinho { 
            background: var(--card); padding: 15px; border-radius: var(--radius); margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e293b;
        }
        .item-info b { display: block; font-size: 14px; font-weight: 800; }
        .item-info small { color: var(--accent); font-weight: 700; font-size: 10px; text-transform: uppercase; }

        .btn-finalizar { 
            width: 100%; padding: 25px; background: var(--accent); color: #020617; 
            border: none; border-radius: var(--radius); font-weight: 900; font-size: 18px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 15px;
        }
        .btn-finalizar:hover { filter: brightness(1.1); transform: translateY(-3px); }

        /* --- MODAL HARMONIZADO --- */
        .modal-content { 
            background: var(--card); padding: 40px; border-radius: 20px; 
            width: 100%; max-width: 500px; border: 2px solid var(--accent); text-align: center;
        }
        .btn-pgto { 
            background: #0b0f1a; border: 2px solid #1e293b; color: white; padding: 20px; 
            border-radius: var(--radius); font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-pgto:hover { border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo-area">
            <div class="logo-934">934</div>
            <h2 class="titulo-secao" style="font-size: 20px;">PDV ELITE</h2>
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn active">CAIXA</a>
            <a href="clientes.html" class="nav-btn">CLIENTES</a>
            <a href="produtos.html" class="nav-btn">ESTOQUE</a>
        </div>
    </header>

    <aside class="area-mesas" id="grid-mesas"></aside>

    <main class="painel-venda">
        <h1 id="titulo-mesa" class="titulo-secao">Selecione uma Mesa</h1>
        
        <div class="input-box">
            <label>👤 Cliente na Mesa</label>
            <select id="select-cliente"></select>
        </div>

        <div class="input-box">
            <label>🔍 Bipar Produto</label>
            <input type="text" id="codigo-bipe" placeholder="Aguardando leitura de código de barras..." autofocus>
        </div>
    </main>

    <section class="resumo">
        <label>🧾 Itens da Conta</label>
        <div id="lista-carrinho" style="flex:1; overflow-y:auto; margin-top:15px;"></div>
        
        <div style="padding-top:20px; border-top: 2px solid #1e293b;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label>Total Mesa</label>
                <span style="color:var(--success); font-weight:900; font-size:36px;">R$ <span id="total-v">0.00</span></span>
            </div>
            <button class="btn-finalizar" onclick="abrirPagamento()">Fechar Conta</button>
        </div>
    </section>

    <div id="modal-pagamento" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; justify-content:center; align-items:center;">
        <div class="modal-content">
            <h2 class="titulo-secao" style="font-size:24px;">Recebimento</h2>
            <div style="font-size: 48px; color: var(--success); font-weight: 900; margin: 20px 0;">R$ <span id="total-modal-v">0.00</span></div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button class="btn-pgto" onclick="finalizar('Dinheiro')">DINHEIRO</button>
                <button class="btn-pgto" onclick="finalizar('Pix')">PIX</button>
                <button class="btn-pgto" onclick="finalizar('Crédito')">CARTÃO CRÉDITO</button>
                <button class="btn-pgto" onclick="finalizar('Débito')">CARTÃO DÉBITO</button>
                <button class="btn-pgto" onclick="finalizar('Pendura')" style="grid-column: span 2; border-color: var(--danger); color: var(--danger);">📌 PENDURAR CONTA</button>
            </div>
            <button onclick="fecharModal()" style="margin-top:20px; background:none; border:none; color:var(--muted); cursor:pointer; font-weight:700;">CANCELAR</button>
        </div>
    </div>

    <script>
        // Mesma lógica anterior para manter o funcionamento do seu bar
        let PRODS = JSON.parse(localStorage.getItem('produtos')) || [];
        let CLIS = JSON.parse(localStorage.getItem('clientes')) || [{nome: "Consumidor Geral", tel: "-"}];
        let MESAS = JSON.parse(localStorage.getItem('mesas_estado')) || Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, ocupada: false }));
        let mesaAtiva = null;

        function carregarClientes() {
            const s = document.getElementById('select-cliente');
            CLIS.sort((a,b) => a.nome.localeCompare(b.nome));
            s.innerHTML = CLIS.map(c => `<option value="${c.nome}" data-tel="${c.tel}">${c.nome}</option>`).join('');
        }

        function renderMesas() {
            document.getElementById('grid-mesas').innerHTML = MESAS.map(m => `
                <div class="mesa ${m.ocupada?'ocupada':''} ${mesaAtiva===m.id?'ativa':''}" onclick="selMesa(${m.id})">
                    <span class="mesa-num">${String(m.id).padStart(2, '0')}</span>
                    <span style="font-weight:700; opacity:0.8;">R$ ${m.total.toFixed(2)}</span>
                </div>
            `).join('');
            localStorage.setItem('mesas_estado', JSON.stringify(MESAS));
        }

        function selMesa(id) {
            mesaAtiva = id;
            document.getElementById('titulo-mesa').innerText = "Mesa " + id;
            renderMesas(); renderCarrinho();
            document.getElementById('codigo-bipe').focus();
        }

        document.getElementById('codigo-bipe').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && mesaAtiva) {
                let p = PRODS.find(x => x.codigo == e.target.value);
                if(p) {
                    let m = MESAS.find(x => x.id === mesaAtiva);
                    let sel = document.getElementById('select-cliente');
                    m.itens.push({ cli: sel.value, tel: sel.options[sel.selectedIndex].getAttribute('data-tel'), nome: p.nome, preco: p.preco });
                    m.total += p.preco; m.ocupada = true;
                    e.target.value = ''; renderMesas(); renderCarrinho();
                } else { alert("Produto não cadastrado!"); e.target.value = ''; }
            }
        });

        function renderCarrinho() {
            if(!mesaAtiva) return;
            let m = MESAS.find(x => x.id === mesaAtiva);
            document.getElementById('lista-carrinho').innerHTML = m.itens.map((it, idx) => `
                <div class="item-carrinho">
                    <div class="item-info">
                        <small>${it.cli}</small>
                        <b>${it.nome}</b>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span style="font-weight:900;">R$ ${it.preco.toFixed(2)}</span>
                        <button onclick="removerItem(${idx})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕</button>
                    </div>
                </div>
            `).reverse().join('');
            document.getElementById('total-v').innerText = m.total.toFixed(2);
        }

        function removerItem(idx) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let realIdx = m.itens.length - 1 - idx;
            m.total -= m.itens[realIdx].preco;
            m.itens.splice(realIdx, 1);
            if(m.itens.length === 0) m.ocupada = false;
            renderMesas(); renderCarrinho();
        }

        function abrirPagamento() {
            let m = MESAS.find(x => x.id === mesaAtiva);
            if(!m || m.total === 0) return alert("Mesa sem consumo.");
            document.getElementById('total-modal-v').innerText = m.total.toFixed(2);
            document.getElementById('modal-pagamento').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

        function finalizar(metodo) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let textoRecibo = `*BOTECO 934 - RECIBO MESA ${m.id}*\n--------------------------\n`;
            m.itens.forEach(it => { textoRecibo += `${it.nome} - R$ ${it.preco.toFixed(2)} (${it.cli})\n`; });
            textoRecibo += `--------------------------\n*TOTAL: R$ ${m.total.toFixed(2)}*\nFORMA DE PGTO: ${metodo}\nObrigado!`;

            let tel = m.itens[m.itens.length-1].tel;
            if(tel && tel !== "-") {
                window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(textoRecibo)}`, '_blank');
            } else { alert("Venda Finalizada com Sucesso!"); }

            m.itens = []; m.total = 0; m.ocupada = false;
            fecharModal(); renderMesas(); renderCarrinho();
        }
function finalizar(metodo) {
    let m = MESAS.find(x => x.id === mesaAtiva);
    
    // REGISTRO PARA O RELATÓRIO
    let vendasRealizadas = JSON.parse(localStorage.getItem('historico_vendas')) || [];
    vendasRealizadas.push({
        data: new Date().toLocaleString('pt-BR'),
        mesa: m.id,
        valor: m.total,
        metodo: metodo,
        cliente: m.itens.length > 0 ? m.itens[0].cli : "Geral"
    });
    localStorage.setItem('historico_vendas', JSON.stringify(vendasRealizadas));

    // GERAR RECIBO WHATSAPP (Lógica que você já tem)
    let textoRecibo = `*BOTECO 934 - RECIBO MESA ${m.id}*\n--------------------------\n`;
    m.itens.forEach(it => { textoRecibo += `${it.nome} - R$ ${it.preco.toFixed(2)} (${it.cli})\n`; });
    textoRecibo += `--------------------------\n*TOTAL: R$ ${m.total.toFixed(2)}*\nPGTO: ${metodo}\nObrigado!`;

    let tel = m.itens.length > 0 ? m.itens[m.itens.length-1].tel : "-";
    if(tel && tel !== "-") {
        window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(textoRecibo)}`, '_blank');
    } else { alert(`Venda em ${metodo} registrada com sucesso!`); }

    // Resetar Mesa
    m.itens = []; m.total = 0; m.ocupada = false;
    fecharModal(); renderMesas(); renderCarrinho();
}
        carregarClientes(); renderMesas();
    </script>
</body>
</html>
