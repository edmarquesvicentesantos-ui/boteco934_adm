<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --success: #22c55e; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #000; padding: 15px; text-align: center; border-bottom: 1px solid #1e293b; color: var(--accent); font-weight: 900; }
        
        .status-bar { padding: 5px; text-align: center; font-size: 10px; font-weight: bold; background: #000; }
        
        .painel { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 16px; padding: 20px; }
        
        .btn-add { background: var(--success); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
        
        .produto-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #ffffff10; }
    </style>
</head>
<body>

<header>BOTECO 934</header>
<div class="status-bar" id="status">CONECTANDO...</div>

<div class="painel">
    <div class="card">
        <h3>Estoque Atual</h3>
        <div id="lista-estoque" style="margin-top:15px;">Aguardando dados do Firebase...</div>
    </div>
    
    <button class="btn-add" onclick="cadastrar()">+ CADASTRAR PRODUTO</button>
</div>

<script>
    // CHAVES OFICIAIS EXTRAÍDAS DAS SUAS FOTOS
    const firebaseConfig = {
      apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX70Jks", //
      authDomain: "boteco934-afc3f.firebaseapp.com", //
      databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", //
      projectId: "boteco934-afc3f", //
      storageBucket: "boteco934-afc3f.appspot.com", //
      messagingSenderId: "182023728304", //
      appId: "1:182023728304:web:80c8402f068c8578508f75" //
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Monitor de Conexão
    db.ref('.info/connected').on('value', snap => {
        const s = document.getElementById('status');
        if (snap.val() === true) {
            s.innerText = "SISTEMA ONLINE ✅";
            s.style.color = "#22c55e";
        } else {
            s.innerText = "SISTEMA OFFLINE ❌";
            s.style.color = "red";
        }
    });

    // Carregar Produtos
    db.ref('produtos').on('value', snap => {
        const lista = document.getElementById('lista-estoque');
        const dados = snap.val();
        if (dados) {
            let html = '';
            Object.values(dados).forEach(p => {
                html += `<div class="produto-item"><span>${p.nome}</span> <b>R$ ${parseFloat(p.preco).toFixed(2)}</b></div>`;
            });
            lista.innerHTML = html;
        } else {
            lista.innerHTML = "Estoque vazio. Cadastre o primeiro item!";
        }
    });

    // Função para Cadastrar
    function cadastrar() {
        const nome = prompt("Nome do Produto:");
        const preco = prompt("Preço:");
        if (nome && preco) {
            const id = Date.now();
            db.ref('produtos/' + id).set({
                nome: nome.toUpperCase(),
                preco: preco
            }).then(() => alert("Produto salvo na nuvem!"));
        }
    }
</script>
</body>
</html>
