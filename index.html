<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - PDV FINAL</title>
    <style>
        :root { --amarelo: #ffcc00; --azul: #2b579a; --preto: #000; --verde: #25d366; --cinza: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--preto); color: #fff; }
        
        header { background: var(--amarelo); padding: 10px 20px; color: #000; display: flex; justify-content: space-between; align-items: center; }
        nav { background: var(--cinza); display: flex; overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
        .nav-item { padding: 15px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 10px; white-space: nowrap; }
        .nav-item.active { color: var(--amarelo); border-bottom: 3px solid var(--amarelo); }

        .container { padding: 15px; }
        .secao { display: none; }
        .ativa { display: block; }

        /* PDV E VITRINE */
        .pdv-layout { display: grid; grid-template-columns: 1fr 380px; gap: 15px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .card-prod { background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; height: 110px; display: flex; flex-direction: column; justify-content: center; }
        .card-prod span { display: block; color: var(--azul); font-size: 1.2em; margin-top: 5px; }

        /* CALCULADORA */
        .card-calc { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 550px; margin: 20px auto; }
        .btn-calc { background: var(--amarelo); color: #000; padding: 18px; border: none; width: 100%; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 16px; text-transform: uppercase; margin-top: 10px; }

        /* CUPOM E BOTÕES */
        .cupom { background: #fff; color: #000; padding: 15px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px; min-height: 350px; }
        .btn-pgto { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-pgto button { padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: #fff; text-transform: uppercase; font-size: 11px; }
        
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 12px; font-size: 16px; }
        
        @media print { body * { visibility: hidden; } #reciboDigital, #reciboDigital * { visibility: visible; } #reciboDigital { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>934 BOTECO</h1>
    <div id="relogio" style="font-weight: 900;">00:00:00</div>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Vendas / Mesas</div>
    <div class="nav-item" onclick="mudar('calculadora', this)">🧮 Calculadora de Lucro</div>
    <div class="nav-item" onclick="mudar('produtos', this)">📦 Produtos</div>
    <div class="nav-item" onclick="mudar('financeiro', this)">💰 Financeiro</div>
</nav>

<div class="container">
    
    <div id="vendas" class="secao ativa">
        <input type="text" id="inputLeitor" placeholder="Escaneie o Código de Barras aqui..." oninput="lerBarras(this.value)" autofocus style="border: 2px solid var(--amarelo); margin-bottom: 20px;">
        
        <div class="pdv-layout">
            <div>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="selMesa" style="flex:1"><option value="Balcão">Balcão</option><script>for(let i=1;i<=20;i++) document.write(`<option value="Mesa ${i}">Mesa ${i}</option>`)</script></select>
                    <select id="selCliente" style="flex:2"></select>
                </div>
                <div id="gridProdutos" class="grid-produtos"></div>
            </div>

            <div>
                <div id="reciboDigital" class="cupom">
                    <div style="text-align:center; border-bottom:1px dashed #000; margin-bottom:10px; padding-bottom:10px;">
                        <b>934 BOTECO - PETROLINA</b><br>WhatsApp: (87) 9...<br>----------------------------
                    </div>
                    <div id="itensCupom" style="margin-bottom:20px;">Aguardando pedido...</div>
                    <div style="border-top:1px dashed #000; padding-top:10px;">
                        <b style="font-size:1.4em;">TOTAL: R$ <span id="totalTxt">0.00</span></b>
                    </div>
                </div>
                <div class="btn-pgto">
                    <button style="background:#32bcad" onclick="fechar('PIX')">PIX</button>
                    <button style="background:#4caf50" onclick="fechar('DINHEIRO')">DINHEIRO</button>
                    <button style="background:#2196f3" onclick="fechar('CARTÃO')">CARTÃO</button>
                    <button style="background:#ff9800" onclick="fechar('PENDURA')">PENDURAR (4 DIAS)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="calculadora" class="secao">
        <div class="card-calc">
            <h2 style="color:var(--amarelo); text-align:center; margin-bottom:30px;">Calculadora de Margem</h2>
            <label>Custo (R$):</label>
            <input type="number" id="c_custo" placeholder="0.00">
            <label>Venda (R$):</label>
            <input type="number" id="c_venda" placeholder="0.00">
            <button class="btn-calc" onclick="calcularMargem()">ANALISAR MARGEM</button>
            <div id="resCalc" style="margin-top:25px;"></div>
        </div>
    </div>

    <div id="produtos" class="secao">
        <div class="card-calc" style="max-width: 100%;">
            <h3 style="margin-bottom:15px;">Novo Produto</h3>
            <input type="text" id="p_ean" placeholder="Código de Barras (EAN)">
            <input type="text" id="p_nome" placeholder="Nome do Produto">
            <input type="number" id="p_venda" placeholder="Preço de Venda">
            <button onclick="salvarProd()" style="background:var(--verde); color:#fff; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold;">SALVAR NO SISTEMA</button>
        </div>
    </div>

    <div id="financeiro" class="secao">
        <div id="listaHistorico"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSy...", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let carrinho = [], produtosDados = {};

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    // VITRINE SEM DUPLICADOS
    onValue(ref(db, 'produtos'), (s) => {
        const g = document.getElementById('gridProdutos'); g.innerHTML = "";
        produtosDados = s.val() || {};
        const nomesVistos = new Set();
        Object.entries(produtosDados).forEach(([id, p]) => {
            const n = p.nome.toUpperCase();
            if(!nomesVistos.has(n)){
                nomesVistos.add(n);
                g.innerHTML += `<div class="card-prod" onclick="addCar('${id}')">${p.nome.substring(0,18)}<span>R$ ${Number(p.venda).toFixed(2)}</span></div>`;
            }
        });
    });

    window.lerBarras = (valor) => {
        Object.entries(produtosDados).forEach(([id, p]) => {
            if(p.ean === valor) {
                addCar(id);
                document.getElementById('inputLeitor').value = "";
            }
        });
    };

    window.addCar = (id) => {
        const p = produtosDados[id];
        carrinho.push({ nome: p.nome, preco: p.venda });
        const d = document.getElementById('itensCupom'); d.innerHTML = ""; let t = 0;
        carrinho.forEach(i => { d.innerHTML += `<div style="display:flex; justify-content:space-between"><span>${i.nome}</span><b>R$ ${Number(i.preco).toFixed(2)}</b></div>`; t += Number(i.preco); });
        document.getElementById('totalTxt').innerText = t.toFixed(2);
    };

    window.salvarProd = () => {
        const ean = document.getElementById('p_ean').value;
        const nome = document.getElementById('p_nome').value;
        const venda = document.getElementById('p_venda').value;
        if(nome && venda) {
            push(ref(db, 'produtos'), { ean, nome, venda: parseFloat(venda) });
            alert("Produto Salvo!");
            document.getElementById('p_ean').value = ""; document.getElementById('p_nome').value = ""; document.getElementById('p_venda').value = "";
        }
    };

    window.calcularMargem = () => {
        const c = parseFloat(document.getElementById('c_custo').value);
        const v = parseFloat(document.getElementById('c_venda').value);
        if(!c || !v) return;
        const lucro = v - c; const margem = (lucro / v) * 100;
        document.getElementById('resCalc').innerHTML = `<div style="background:#222; padding:15px; border-radius:10px; border-left:5px solid var(--amarelo)">Lucro: R$ ${lucro.toFixed(2)} | Margem: ${margem.toFixed(1)}%</div>`;
    };

    window.fechar = (metodo) => {
        if(!carrinho.length) return;
        const total = document.getElementById('totalTxt').innerText;
        const cli = document.getElementById('selCliente').value;
        const dV = new Date(); dV.setDate(dV.getDate() + 4);
        const venda = { cliente: cli, total, metodo, data: new Date().toLocaleDateString('pt-BR'), vencimento: metodo === 'PENDURA' ? dV.toLocaleDateString('pt-BR') : 'Pago' };

        push(ref(db, 'vendas_fin'), venda).then(() => {
            if(metodo === 'PENDURA') {
                const msg = `*BOTECO 934*%0AConta: *R$ ${total}*%0AVencimento: *${venda.vencimento}*`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            }
            window.print();
            location.reload();
        });
    };

    onValue(ref(db, 'clientes'), (s) => {
        const sel = document.getElementById('selCliente'); sel.innerHTML = '<option value="Avulso">CLIENTE AVULSO</option>';
        if(s.exists()) Object.values(s.val()).forEach(c => { sel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`; });
    });

    window.mudar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa'); el.classList.add('active');
    };
</script>
</body>
</html>
