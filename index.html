<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Gestão XML Pro</title>
    <style>
        /* Mantendo seu estilo profissional */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #fff; border-bottom: 4px solid #ffcc00; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 50px; height: 50px; background: #000; color: #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #ffcc00; }
        
        nav { background: #111; color: #fff; display: flex; padding: 0 20px; font-size: 0.75em; font-weight: bold; }
        .nav-item { position: relative; padding: 12px 18px; cursor: pointer; border-right: 1px solid #222; }
        .nav-item:hover { background: #ffcc00; color: #000; }
        .submenu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 100; }
        .nav-item:hover { .submenu { display: block; } }
        .nav-item:hover .submenu { display: block; }
        .submenu button, .submenu label { width: 100%; padding: 12px; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 1px solid #eee; color: #333; display: block; }

        .container { display: flex; flex: 1; overflow: hidden; }
        .mesas-grid { flex: 1; padding: 20px; overflow-y: auto; background: #dfe4ea; }
        #grade { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; }
        .mesa { background: #fff; padding: 15px 5px; border-radius: 8px; cursor: pointer; text-align: center; border-bottom: 4px solid #ced4da; }
        .livre { border-top: 5px solid #2e7d32; }
        .ocupada { border-top: 5px solid #c62828; }

        .painel-lateral { width: 320px; background: #fff; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        .recibo-itens { flex: 1; padding: 15px; font-family: monospace; font-size: 0.85em; overflow-y: auto; }
        .recibo-total { padding: 20px; background: #ffcc00; font-size: 1.3em; font-weight: 900; text-align: right; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="logo">934</div>
            <div><h1 style="font-size:1.4em;">Boteco 934</h1><small>IMPORTAÇÃO XML ATIVA</small></div>
        </div>
        <div id="relogio" style="font-weight:bold; color:#666;"></div>
    </header>

    <nav>
        <div class="nav-item">COMANDAS
            <div class="submenu"><button onclick="zerarTudo()">Zerar Mesas</button></div>
        </div>
        <div class="nav-item">ESTOQUE / XML
            <div class="submenu">
                <label for="input-xml">📁 Selecionar Arquivo XML
                    <input type="file" id="input-xml" accept=".xml" style="display:none" onchange="lerXML(this)">
                </label>
                <button onclick="verEstoque()">Ver Estoque Atual</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="mesas-grid"><div id="grade"></div></main>
        <aside class="painel-lateral">
            <div style="padding:15px; border-bottom:1px solid #eee;"><strong>CUPOM DE CONFERÊNCIA</strong></div>
            <div class="recibo-itens" id="lista-venda"></div>
            <div class="recibo-total" id="tot-final">R$ 0,00</div>
        </aside>
    </div>

    <script>
        // Dados iniciais
        let mesas = JSON.parse(localStorage.getItem('b934_v5')) || Array.from({ length: 20 }, (_, i) => ({
            id: i + 1, ocupada: false, cliente: "", total: 0, itens: []
        }));

        let estoque = JSON.parse(localStorage.getItem('b934_estoque')) || {};

        function salvar() { 
            localStorage.setItem('b934_v5', JSON.stringify(mesas)); 
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
        }

        // --- FUNÇÃO PUXA XML (O CÉREBRO) ---
        function lerXML(input) {
            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
                
                // Pega todos os produtos da nota (tag 'det')
                const itensNota = xmlDoc.getElementsByTagName("det");
                let resumo = "Nota Fiscal Lida com Sucesso!\n\nProdutos Encontrados:\n";

                for (let i = 0; i < itensNota.length; i++) {
                    let nome = itensNota[i].getElementsByTagName("xProd")[0].textContent;
                    let qtd = parseFloat(itensNota[i].getElementsByTagName("qCom")[0].textContent);
                    let vUnit = parseFloat(itensNota[i].getElementsByTagName("vUnCom")[0].textContent);

                    // Adiciona ao estoque local
                    estoque[nome] = (estoque[nome] || 0) + qtd;
                    resumo += `- ${nome}: ${qtd} un (Custo: R$ ${vUnit.toFixed(2)})\n`;
                }

                alert(resumo);
                salvar();
            };
            reader.readAsText(file);
        }

        function verEstoque() {
            let lista = "ESTOQUE ATUAL:\n\n";
            for (let item in estoque) {
                lista += `${item}: ${estoque[item]} un\n`;
            }
            alert(Object.keys(estoque).length > 0 ? lista : "Estoque vazio. Importe um XML!");
        }

        // --- LÓGICA DAS MESAS ---
        function renderizar() {
            const grade = document.getElementById('grade');
            grade.innerHTML = mesas.map(m => `
                <div class="mesa ${m.ocupada ? 'ocupada' : 'livre'}" onclick="gerenciarMesa(${m.id})">
                    <div style="font-size:0.6em">MESA ${m.id}</div>
                    <div style="font-weight:bold">${m.ocupada ? m.cliente : 'LIVRE'}</div>
                    <div style="color:#d32f2f; font-size:0.8em">${m.ocupada ? 'R$' + m.total.toFixed(2) : ''}</div>
                </div>
            `).join('');
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
        }

        function gerenciarMesa(id) {
            let m = mesas.find(x => x.id === id);
            if (!m.ocupada) {
                let n = prompt("Nome do Cliente:");
                if (n) { m.ocupada = true; m.cliente = n; m.itens = []; }
            } else {
                exibirRecibo(m);
                let op = prompt("1: + Cerveja (R$12)\n2: + Dose (R$15)\n3: FECHAR PAGO\n4: Sair");
                if (op === "1") { m.total += 12; m.itens.push({n: "Cerveja 600ml", v: 12}); }
                if (op === "2") { m.total += 15; m.itens.push({n: "Dose Whisky", v: 15}); }
                if (op === "3") { m.ocupada = false; m.total = 0; }
                exibirRecibo(m);
            }
            salvar(); renderizar();
        }

        function exibirRecibo(m) {
            document.getElementById('lista-venda').innerHTML = m.itens.map(i => `<div>${i.n} - R$ ${i.v.toFixed(2)}</div>`).join('');
            document.getElementById('tot-final').innerText = "R$ " + m.total.toFixed(2);
        }

        function zerarTudo() { if(confirm("Zerar?")) { mesas.forEach(x => x.ocupada=false); salvar(); renderizar(); } }

        setInterval(renderizar, 1000);
        renderizar();
    </script>
</body>
</html>
