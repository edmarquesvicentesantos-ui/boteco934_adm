<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - SISTEMA ESTÁVEL</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --glass: rgba(20, 20, 20, 0.95); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; }

        header { background: var(--gold); padding: 12px 25px; color: #000; display: flex; justify-content: space-between; align-items: center; font-weight: 900; }
        nav { background: #111; display: flex; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 18px; cursor: pointer; color: #666; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .secao { display: none; }
        .ativa { display: block; }

        /* CALCULADORA ESTRATÉGICA (ESTILO VIDRO) */
        .card-gestao {
            background: var(--glass); padding: 35px; border-radius: 25px; 
            border: 1px solid var(--border); max-width: 600px; margin: 20px auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; }
        input:focus { border-color: var(--gold); outline: none; }

        .res-painel {
            background: rgba(255,255,255,0.03); padding: 25px; border-radius: 15px;
            border-left: 8px solid var(--gold); display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .res-item p { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .res-item h3 { font-size: 22px; font-weight: 900; }
        .destaque-margem { font-size: 38px !important; color: var(--gold); }

        /* PDV SIMPLIFICADO PARA NÃO TRAVAR */
        .pdv-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .card-prod { background: #fff; color: #000; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; }
        .card-prod span { display: block; color: #2b579a; font-size: 1.1em; }
    </style>
</head>
<body>

<header>
    <div>934 BOTECO</div>
    <div id="relogio">00:00:00</div>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Vendas</div>
    <div class="nav-item" onclick="mudar('precificacao', this)">📊 Precificação</div>
</nav>

<div class="container">
    
    <div id="precificacao" class="secao">
        <div class="card-gestao">
            <h2 style="color: var(--gold); margin-bottom: 25px; text-align: center;">ENGENHARIA DE PREÇOS</h2>
            <div class="grid-inputs">
                <div><label>Custo Fardo/Caixa</label><input type="number" id="a" oninput="calc()"></div>
                <div><label>Qtd na Embalagem</label><input type="number" id="b" oninput="calc()"></div>
                <div><label>% Taxas/Cartão</label><input type="number" id="d" oninput="calc()"></div>
                <div><label>Preço de Venda</label><input type="number" id="f" oninput="calc()"></div>
            </div>

            <div class="res-painel">
                <div class="res-item"><p>Custo Unit.</p><h3 id="res-c">R$ 0,00</h3></div>
                <div class="res-item"><p>Markup</p><h3 id="res-e" style="color:#00d4ff">0.0x</h3></div>
                <div class="res-item"><p>Lucro Real</p><h3 id="res-g">R$ 0,00</h3></div>
                <div class="res-item"><p>Margem Real</p><h3 id="res-h" class="destaque-margem">0%</h3></div>
            </div>
        </div>
    </div>

    <div id="vendas" class="secao ativa">
        <div class="pdv-grid">
            <div class="vitrine" id="vitrine"></div>
            <div style="background:#fff; color:#000; padding:20px; border-radius:12px; min-height:400px;">
                <h3 style="border-bottom:1px solid #ddd; padding-bottom:10px;">CUPOM</h3>
                <div id="carrinho" style="margin:20px 0;"></div>
                <h2 style="font-size:30px;">TOTAL: R$ <span id="totalPdv">0,00</span></h2>
            </div>
        </div>
    </div>
</div>

<script>
    // Relógio simples
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    // Lógica de Precificação (Anota AI)
    function calc() {
        const a = parseFloat(document.getElementById('a').value) || 0;
        const b = parseFloat(document.getElementById('b').value) || 1;
        const d = parseFloat(document.getElementById('d').value) || 0;
        const f = parseFloat(document.getElementById('f').value) || 0;

        const c = a / b; // Custo Unitário
        const e = c > 0 ? (f / c) : 0; // Markup
        const lucro = f - c - (f * (d / 100)); // Lucro Real
        const margem = f > 0 ? (lucro / f) * 100 : 0; // Margem Real

        document.getElementById('res-c').innerText = `R$ ${c.toFixed(2)}`;
        document.getElementById('res-e').innerText = `${e.toFixed(2)}x`;
        document.getElementById('res-g').innerText = `R$ ${lucro.toFixed(2)}`;
        
        const h = document.getElementById('res-h');
        h.innerText = `${margem.toFixed(1)}%`;
        h.style.color = margem < 15 ? "#ff4444" : (margem < 25 ? "#ffcc00" : "#00ff88");
    }

    // Navegação
    function mudar(id, el) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    }
</script>
</body>
</html>
