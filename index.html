<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Precificação Inteligente - Boteco 934</title>
    <style>
        :root {
            --bg: #050505; --card: #111; --orange: #ff9800; --green: #00ff88; --gray: #888;
        }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 5px; }
        .tab { 
            flex: 1; padding: 15px; background: #222; border: none; color: var(--gray); 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .tab.active { background: var(--orange); color: #000; }

        .panel { background: var(--card); padding: 25px; border: 1px solid #333; display: none; }
        .panel.active { display: block; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }

        label { display: block; color: var(--gray); font-size: 11px; margin-bottom: 5px; font-weight: bold; }
        input { 
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; 
            color: #fff; font-size: 16px; box-sizing: border-box; 
        }
        input:focus { border-color: var(--orange); outline: none; }

        /* BOX DE INTELIGÊNCIA */
        .dashboard { 
            grid-column: span 2; margin-top: 20px; padding: 20px; 
            border: 1px solid #444; border-radius: 4px; background: #000;
        }
        .main-price { text-align: center; margin-bottom: 20px; }
        .main-price small { color: var(--orange); font-size: 12px; text-transform: uppercase; }
        .main-price span { display: block; font-size: 42px; color: var(--green); font-weight: bold; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .stat-box { padding: 10px; background: #1a1a1a; border-radius: 4px; }
        .stat-box label { font-size: 10px; margin-bottom: 2px; }
        .stat-box div { font-size: 16px; font-weight: bold; color: #fff; }

        .btn-save { 
            width: 100%; padding: 18px; background: var(--green); color: #000; 
            border: none; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="mudarAba('mercadoria', this)">Fardos / Unidades</button>
        <button class="tab" onclick="mudarAba('destilado', this)">Destilados (Doses)</button>
    </div>

    <div id="mercadoria" class="panel active">
        <div class="grid">
            <div class="full"><label>PRODUTO</label><input type="text" id="m_nome" placeholder="Ex: Heineken"></div>
            <div><label>CUSTO FARDO/CAIXA</label><input type="number" id="m_custo" oninput="calcM()"></div>
            <div><label>QTD NO FARDO</label><input type="number" id="m_qtd" oninput="calcM()" value="12"></div>
            <div class="full"><label>MARKUP DESEJADO (%)</label><input type="number" id="m_markup" oninput="calcM()" value="60"></div>
        </div>

        <div class="dashboard">
            <div class="main-price">
                <small>Preço Sugerido por Unidade</small>
                <span id="m_venda">R$ 0,00</span>
            </div>
<div class="input-group">
                <label>Código de Barras (EAN-13)</label>
                <input type="text" id="m_barcode" class="barcode-field" placeholder="Passe o leitor ou digite..." autofocus>
            </div>
            <div class="stats">
                <div class="stat-box"><label>MARGEM REAL</label><div id="m_margem">0%</div></div>
                <div class="stat-box"><label>LUCRO UNIT.</label><div id="m_lucro">R$ 0,00</div></div>
                <div class="stat-box"><label>CUSTO UNIT.</label><div id="m_c_unit">R$ 0,00</div></div>
            </div>
        </div>
        <button class="btn-save">SALVAR NO ESTOQUE</button>
    </div>

    <div id="destilado" class="panel">
        <div class="grid">
            <div class="full"><label>DESTILADO</label><input type="text" id="d_nome" placeholder="Ex: Red Label"></div>
            <div><label>CUSTO GARRAFA</label><input type="number" id="d_custo" oninput="calcD()"></div>
            <div><label>PERDA ESTIMADA (%)</label><input type="number" id="d_perda" oninput="calcD()" value="10"></div>
            <div><label>ML GARRAFA</label><input type="number" id="d_ml_g" oninput="calcD()" value="1000"></div>
            <div><label>ML DOSE</label><input type="number" id="d_ml_d" oninput="calcD()" value="50"></div>
            <div class="full"><label>MARKUP NA DOSE (%)</label><input type="number" id="d_markup" oninput="calcD()" value="100"></div>
        </div>

        <div class="dashboard">
            <div class="main-price">
                <small>Preço Sugerido por Dose</small>
                <span id="d_venda">R$ 0,00</span>
            </div>
            <div class="stats">
                <div class="stat-box"><label>DOSES REAIS</label><div id="d_total_d">0</div></div>
                <div class="stat-box"><label>MARGEM REAL</label><div id="d_margem">0%</div></div>
                <div class="stat-box"><label>LUCRO/DOSE</label><div id="d_lucro">R$ 0,00</div></div>
            </div>
        </div>
        <button class="btn-save">SALVAR NO ESTOQUE</button>
    </div>
</div>

<script>
    function mudarAba(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function calcM() {
        const custo = parseFloat(document.getElementById('m_custo').value) || 0;
        const qtd = parseInt(document.getElementById('m_qtd').value) || 1;
        const markup = parseFloat(document.getElementById('m_markup').value) || 0;

        const cUnit = custo / qtd;
        const vUnit = cUnit * (1 + (markup / 100));
        const lucro = vUnit - cUnit;
        const margem = vUnit > 0 ? (lucro / vUnit) * 100 : 0;

        document.getElementById('m_venda').innerText = `R$ ${vUnit.toFixed(2)}`;
        document.getElementById('m_margem').innerText = `${margem.toFixed(1)}%`;
        document.getElementById('m_lucro').innerText = `R$ ${lucro.toFixed(2)}`;
        document.getElementById('m_c_unit').innerText = `R$ ${cUnit.toFixed(2)}`;
    }

    function calcD() {
        const custoG = parseFloat(document.getElementById('d_custo').value) || 0;
        const perda = parseFloat(document.getElementById('d_perda').value) || 0;
        const mlG = parseFloat(document.getElementById('d_ml_g').value) || 1;
        const mlD = parseFloat(document.getElementById('d_ml_d').value) || 1;
        const markup = parseFloat(document.getElementById('d_markup').value) || 0;

        // Lógica de Inteligência: Volume útil após perda
        const mlUtil = mlG * (1 - (perda / 100));
        const dosesReais = mlUtil / mlD;
        
        const custoDose = custoG / dosesReais;
        const precoDose = custoDose * (1 + (markup / 100));
        const lucroDose = precoDose - custoDose;
        const margemDose = precoDose > 0 ? (lucroDose / precoDose) * 100 : 0;

        document.getElementById('d_venda').innerText = `R$ ${precoDose.toFixed(2)}`;
        document.getElementById('d_total_d').innerText = Math.floor(dosesReais);
        document.getElementById('d_margem').innerText = `${margemDose.toFixed(1)}%`;
        document.getElementById('d_lucro').innerText = `R$ ${lucroDose.toFixed(2)}`;
    }
</script>
</body>
</html>
