<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f7f6; }
        header { background: #fff; padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 3px solid #ffcc00; }
        .badge { background: #ffcc00; padding: 10px; border-radius: 5px; font-weight: bold; font-size: 1.5em; }
        nav { background: #000; display: flex; padding: 0 40px; }
        .nav-item { padding: 15px 20px; color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .nav-item:hover, .active { background: #ffcc00; color: #000; }
        .container { padding: 30px; }
        .tela { display: none; }
        .ativa { display: block; }
        
        /* GRID DE MESAS */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .mesa { background: #fff; border: 2px solid #2b579a; padding: 25px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .mesa.ocupada { background: #e74c3c; color: #fff; border-color: #c0392b; }

        /* TABELAS */
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #2b579a; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; }
        button { padding: 10px 15px; background: #2b579a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-reset { background: #d32f2f; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="badge">934</div>
        <h1>BOTECO</h1>
    </div>
    <div><strong>Petrolina-PE</strong></div>
</header>

<nav>
    <div class="nav-item active" onclick="abrir('operacional', this)">Operacional</div>
    <div class="nav-item" onclick="abrir('estoque', this)">Estoque / XML</div>
    <div class="nav-item" onclick="abrir('clientes', this)">Clientes</div>
</nav>

<div class="container">
    <div id="operacional" class="tela ativa">
        <h2 style="margin-bottom:20px;">CONTROLE DE MESAS</h2>
        <div id="grade" class="grid-mesas"></div>
    </div>

    <div id="estoque" class="tela">
        <div class="card">
            <h3>IMPORTAR XML</h3>
            <input type="file" id="xmlFile" style="margin-top:10px;">
            <button onclick="importarXML()">ATUALIZAR ESTOQUE</button>
            <button class="btn-reset" onclick="resetar()">LIMPAR TUDO</button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr><th>PRODUTO</th><th>QTD</th><th>CUSTO</th><th>VENDA</th></tr>
                </thead>
                <tbody id="corpoEstoque"></tbody>
            </table>
        </div>
    </div>

    <div id="clientes" class="tela">
        <div class="card">
            <h3>CLIENTES</h3>
            <div id="listaClientes">Nenhum cliente cadastrado.</div>
        </div>
    </div>
</div>

<script>
    // Memória do sistema
    let dados = JSON.parse(localStorage.getItem('boteco934_db')) || { estoque: {}, notas: [], clientes: [] };

    function abrir(id, el) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
        renderizar();
    }

    function renderizar() {
        // Renderizar Mesas
        const grade = document.getElementById('grade');
        grade.innerHTML = "";
        for(let i=1; i<=15; i++) {
            grade.innerHTML += `<div class="mesa" onclick="this.classList.toggle('ocupada')">MESA ${i}</div>`;
        }

        // Renderizar Estoque
        const corpo = document.getElementById('corpoEstoque');
        corpo.innerHTML = "";
        for(let p in dados.estoque) {
            corpo.innerHTML += `<tr>
                <td>${p}</td>
                <td>${dados.estoque[p].qtd}</td>
                <td>R$ ${dados.estoque[p].custo.toFixed(2)}</td>
                <td>R$ ${(dados.estoque[p].custo * 1.5).toFixed(2)}</td>
            </tr>`;
        }
    }

    function importarXML() {
        const file = document.getElementById('xmlFile').files[0];
        if(!file) return alert("Escolha o XML!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const chave = xml.getElementsByTagName("infNFe")[0]?.getAttribute("Id") || "N/A";

            if(dados.notas.includes(chave)) return alert("Nota já importada!");

            const itens = xml.getElementsByTagName("det");
            for(let i=0; i<itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent;
                const qtd = parseFloat(itens[i].getElementsByTagName("qCom")[0].textContent);
                const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent);

                if(dados.estoque[nome]) {
                    dados.estoque[nome].qtd += qtd;
                } else {
                    dados.estoque[nome] = { qtd: qtd, custo: custo };
                }
            }

            dados.notas.push(chave);
            localStorage.setItem('boteco934_db', JSON.stringify(dados));
            alert("Estoque Atualizado!");
            renderizar();
        };
        reader.readAsText(file);
    }

    function resetar() {
        if(confirm("Apagar todos os dados?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = renderizar;
</script>
</body>
</html>
