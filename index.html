<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE PDV - Boteco 934</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --danger: #c0392b; --accent: #f1c40f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f4f7f6; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            font-size: 13px; 
        }

        header { 
            height: 45px; 
            background: var(--primary); 
            color: white; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px; 
            flex-shrink: 0; 
        }

        main { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 65px; background: var(--primary); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { color: #bdc3c7; padding: 15px 0; text-align: center; cursor: pointer; font-size: 9px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.1); color: var(--accent); border-left: 3px solid var(--accent); }

        /* ÁREA CENTRAL */
        .area-central { flex: 1; min-width: 0; background: #fff; display: flex; flex-direction: column; padding: 10px; border-right: 1px solid #ddd; overflow: hidden; }
        .tela { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .tela.ativa { display: flex; }

        /* VENDAS INTEGRADA COM MESAS */
        .vendas-container { display: flex; gap: 10px; height: 100%; }
        .col-mesas { width: 140px; overflow-y: auto; border-right: 1px solid #eee; padding-right: 5px; }
        .mesa-btn { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; }
        .mesa-btn.ocupada { background: #fff9db; border-color: var(--accent); color: #d35400; }
        .mesa-btn.selecionada { background: var(--primary); color: white; border-color: var(--primary); }

        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; overflow-y: auto; }
        .card-p { border: 1px solid #eee; padding: 6px; text-align: center; border-radius: 4px; cursor: pointer; background: white; transition: 0.2s; }
        .card-p:hover { border-color: var(--success); }
