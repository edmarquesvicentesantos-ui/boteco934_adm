<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV GOLD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Boteco 934</h2>
            </div>
            <nav>
                <button onclick="carregarProdutos('bebidas')">Bebidas</button>
                <button onclick="carregarProdutos('boticario')">Boticário</button>
                <button class="btn-categoria">+ Categorias</button>
            </nav>
            <div id="alerta-estoque" class="alerta-minimo"></div>
        </aside>

        <main class="pdv-area">
            <header class="busca">
                <input type="text" placeholder="Buscar produto ou bipar código..." id="input-busca">
            </header>
            <div class="grid-produtos" id="grid-produtos">
                </div>
        </main>

        <section class="cupom-lateral">
            <h3>Consumo / Mesa</h3>
            <div id="lista-venda"></div>
            <div class="totalizador">
                <span>Total: R$ <strong id="total-venda">0,00</strong></span>
                <button class="btn-finalizar" onclick="abrirPagamento()">Finalizar (F1)</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
