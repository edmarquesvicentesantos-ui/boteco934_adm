<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Elite - Boteco 934</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #ecf0f1; }
        
        /* Cabeçalho e DRE */
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .dre-box { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 5px; font-size: 0.9rem; border-left: 4px solid var(--accent); }

        main { display: flex; flex: 1; overflow: hidden; gap: 10px; padding: 10px; }

        /* Esquerda: Busca e Produtos */
        .produtos-section { flex: 2; display: flex; flex-direction: column; background: white; border-radius: 8px; padding: 15px; }
        .controles-topo { display: flex; gap: 10px; margin-bottom: 15px; }
        #inputBusca { flex: 2; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 1rem; }
        #selecionarCliente { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 5px; }
        
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; overflow-y: auto; }
        .card-prod { border: 1px solid #eee; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff; }
        .card-prod:hover { border-color: var(--success); background: #f9fff9; }
        .card-prod img { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; }
        .card-prod h4 { margin: 5px 0; font-size: 0.85rem; height: 34px; overflow: hidden; }
        .card-prod span { color: var(--success); font-weight: bold; font-size: 0.9rem; }

        /* Direita: Carrinho */
        .carrinho-section { width: 380px; background: white; border-radius: 8px; display: flex; flex-direction: column; padding: 15px; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        .lista-itens { flex: 1; overflow-y: auto; border-bottom: 2px solid #eee; margin-bottom: 10px; }
        .item-car { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        
        .totais-area { padding: 5px 0; }
        .linha-total { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        .divisao-box { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 0.85rem; border: 1px solid #ddd; }

        button { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
        .btn-whats { background: #25d366; }
        .btn-whats:hover { background: #128c7e; }
        .btn-finalizar { background: var(--success); font-size: 1.1rem; }
        .btn-finalizar:hover { background: #219150; }
        .btn-limpar { background: var(--danger); opacity: 0.8; }

        /* Impressão Térmica 80mm */
        @media print {
            body * { visibility: hidden; }
            #cupom, #cupom * { visibility: visible; }
            #cupom { position: absolute; left: 0; top: 0; width: 80mm; font-family: monospace; padding: 5px; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div><strong>ELITE PDV</strong> - Boteco 934</div>
    <div class="dre-box">
        Vendas: R$ <span id="valorVendido">0.00</span> | <strong>Lucro (DRE): R$ <span id="valorLucro">0.00</span></strong>
    </div>
</header>

<main>
    <section class="produtos-section">
        <div class="controles-topo">
            <input type="text" id="inputBusca" placeholder="🔍 Nome do produto ou Bipar código..." autofocus>
            <select id="selecionarCliente">
                <option value="">👤 Cliente Avulso</option>
            </select>
        </div>
        <div id="gridProdutos" class="grid-produtos"></div>
    </section>

    <section class="carrinho-section">
        <h3>Pedido</h3>
        <div id="listaItens" class="lista-itens"></div>

        <div class="totais-area">
            <div class="divisao-box">
                Dividir para: <input type="number" id="qtdClientes" value="1" min="1" style="width: 40px;" onchange="atualizarTotais()"> pessoas
                <br>Por pessoa: <strong>R$ <span id="porPessoa">0.00</span></strong>
            </div>
            
            <div class="linha-total">
                <span>Total:</span>
                <span id="totalDisplay">R$ 0.00</span>
            </div>

            <button class="btn-whats" onclick="enviarWhats()">📱 Enviar via WhatsApp</button>
            <button class="btn-finalizar" onclick="finalizar()">✅ Finalizar e Imprimir</button>
            <button class="btn-limpar" onclick="limparCarrinho()">Limpar Carrinho</button>
        </div>
    </section>
</main>

<div id="cupom" style="display:none;"></div>

<script>
    // 1. BANCO DE DADOS (CLIENTES E PRODUTOS)
    const db_clientes = [
        { nome: "Edmarques", tel: "5587900000000" },
        { nome: "Esposa", tel: "5587900000000" },
        { nome: "Cliente VIP 1", tel: "5587900000000" }
    ];

    const db_produtos = [
        { cod: "7891991000853", nome: "Heineken 330ml", preco: 16.00, custo: 9.50, foto: "https://via.placeholder.com/100?text=Heineken" },
        { cod: "7891149107503", nome: "Skol Lata 350ml", preco: 6.50, custo: 3.80, foto: "https://via.placeholder.com/100?text=Skol" },
        { cod: "7896017300112", nome: "Pitu 965ml", preco: 18.00, custo: 12.00, foto: "https://via.placeholder.com/100?text=Pitu" },
        { cod: "001", nome: "Dose Whisky Red", preco: 15.00, custo: 7.20, foto: "https://via.placeholder.com/100?text=Whisky" },
        { cod: "002", nome: "Petisco Casa", preco: 35.00, custo: 18.00, foto: "https://via.placeholder.com/100?text=Petisco" }
    ];

    let carrinho = [];
    let vendasTotal = 0;
    let lucroTotal = 0;

    // 2. INICIALIZAÇÃO
    function init() {
        renderizarProdutos();
        const select = document.getElementById('selecionarCliente');
        db_clientes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.tel;
            opt.textContent = c.nome;
            select.appendChild(opt);
        });
    }

    // 3. LÓGICA DE PRODUTOS
    function renderizarProdutos(filtro = "") {
        const grid = document.getElementById('gridProdutos');
        grid.innerHTML = "";
        
        db_produtos.filter(p => p.nome.toLowerCase().includes(filtro.toLowerCase()) || p.cod.includes(filtro))
        .forEach(p => {
            const div = document.createElement('div');
            div.className = 'card-prod';
            div.onclick = () => adicionar(p);
            div.innerHTML = `
                <img src="${p.foto}">
                <h4>${p.nome}</h4>
