<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE 934 - GESTÃO TOTAL</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --card: #121212; --green: #25d366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral Estilo Premium */
        nav { width: 220px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 30px; border: 2px solid var(--gold); border-radius: 50%; width: 60px; height: 60px; line-height: 55px; margin-left: auto; margin-right: auto; }
        .nav-btn { background: none; border: 1px solid #333; color: #aaa; padding: 12px; text-align: left; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .nav-btn.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }

        /* Conteúdo Principal */
        main { flex: 1; padding: 25px; overflow-y: auto; background: linear-gradient(135deg, #050505 0%, #111 100%); }
        .view { display: none; }
        .view.active { display: block; }

        /* Grid de Mesas */
        .mesa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .mesa-card { background: var(--card); border: 1px solid #333; padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; position: relative; }
        .mesa-card.ocupada { border-color: var(--gold); background: #1a1600; }
        .mesa-card h3 { font-size: 18px; margin-bottom: 10px; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: #333; }
        .ocupada .status-badge { background: var(--gold); color: #000; }

        /* Estilo da Conta (Carrinho) */
        .carrinho-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; align-items: center; }
        .carrinho-info b { display: block; color: #fff; }
        .carrinho-info span { font-size: 11px; color: #888; }
        .carrinho-preco { color: var(--gold); font-weight: bold; }

        /* Tabelas de Estoque/Clientes */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: var(--gold); font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #222; }

        .btn-green { background: var(--green); color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo">934</div>
    <button class="nav-btn active" onclick="show('vendas')">🛒 FRENTE DE VENDA</button>
    <button class="nav-btn" onclick="show('estoque')">📦 ESTOQUE & PREÇO</button>
    <button class="nav-btn" onclick="show('clientes')">👤 CLIENTES / FIADO</button>
</nav>

<main>
    <div id="vendas" class="view active">
        <h2 style="margin-bottom: 20px;">Mapa de Mesas / Balcão</h2>
        <div class="mesa-grid" id="containerMesas"></div>
    </div>

    <div id="estoque" class="view">
        <h2 style="margin-bottom: 20px;">Gestão de Estoque</h2>
        <div style="background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px;">
                <input type="text" id="p_nome" placeholder="Nome do Produto">
                <input type="number" id="p_custo" placeholder="Custo Compra">
                <input type="number" id="p_venda" placeholder="Preço Venda">
                <button class="btn-green" onclick="addEstoque()">CADASTRAR</button>
            </div>
        </div>
        <table id="tabEstoque">
            <thead><tr><th>PRODUTO</th><th>ESTOQUE</th><th>PREÇO</th><th>AÇÕES</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="clientes" class="view">
        <h2>Controle de Fiado</h2>
        <p style="color: #666; margin-top: 10px;">Em desenvolvimento para o próximo módulo...</p>
    </div>
</main>

<script>
    // BANCO DE DADOS LOCAL
    let estoque = JSON.parse(localStorage.getItem('934_est')) || [];
    let mesas = JSON.parse(localStorage.getItem('934_mesas')) || Array(12).fill().map((_, i) => ({ id: i+1, ocupada: false, itens: [], total: 0 }));

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        if(id === 'vendas') renderMesas();
        if(id === 'estoque') renderEstoque();
    }

    function renderMesas() {
        const grid = document.getElementById('containerMesas');
        grid.innerHTML = mesas.map(m => `
            <div class="mesa-card ${m.ocupada ? 'ocupada' : ''}" onclick="abrirMesa(${m.id})">
                <span class="status-badge">${m.ocupada ? 'OCUPADA' : 'LIVRE'}</span>
                <h3>MESA ${m.id}</h3>
                <p>${m.ocupada ? 'R$ ' + m.total.toFixed(2) : '---'}</p>
            </div>
        `).join('');
    }

    function addEstoque() {
        const nome = document.getElementById('p_nome').value;
        const venda = parseFloat(document.getElementById('p_venda').value);
        if(!nome || !venda) return alert("Preencha Nome e Venda!");
        estoque.push({ nome, venda, qtd: 0 });
        save();
        renderEstoque();
    }

    function renderEstoque() {
        const tbody = document.querySelector('#tabEstoque tbody');
        tbody.innerHTML = estoque.map((p, index) => `
            <tr>
                <td>${p.nome}</td>
                <td>${p.qtd}</td>
                <td>R$ ${p.venda.toFixed(2)}</td>
                <td><button onclick="removerItem(${index})">❌</button></td>
            </tr>
        `).join('');
    }

    function save() {
        localStorage.setItem('934_est', JSON.stringify(estoque));
        localStorage.setItem('934_mesas', JSON.stringify(mesas));
    }

    function removerItem(i) {
        estoque.splice(i, 1);
        save();
        renderEstoque();
    }

    window.onload = () => { renderMesas(); renderEstoque(); };
</script>
</body>
</html>
