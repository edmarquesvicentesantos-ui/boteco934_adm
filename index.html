<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - SISTEMA COMPLETO</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --i: #3498db; --a: #f1c40f; --r: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 10px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--a); }
        nav { background: #2c3e50; display: flex; height: 45px; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; font-size: 11px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); border-bottom: 4px solid var(--a); }
        main { flex: 1; position: relative; overflow: hidden; display: flex; }
        .tela { display: none; width: 100%; height: 100%; padding: 15px; }
        .ativa { display: flex !important; }
        
        /* Layout Vendas */
        .col-mesas { width: 150px; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; }
        .mesa-card { padding: 15px 5px; margin: 8px; border: 2px solid var(--s); border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        .mesa-card.ocupada { background: #fff9db; border-color: var(--a); color: #d35400; }
        .mesa-card.sel { background: var(--p) !important; color: white !important; }
        
        .col-central { flex: 1; padding: 0 15px; overflow-y: auto; }
        .col-resumo { width: 320px; background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .prod-btn { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 11px; }
        
        .btn-acao { padding: 15px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

<header><strong>BOTECO 934</strong> <div id="relogio">00:00:00</div></header>

<nav>
    <button class="nav-btn active" onclick="trocar('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="trocar('estoque', this)">Produtos</button>
    <button class="nav-btn" onclick="trocar('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="trocar('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="render-mesas"></div>
        <div class="col-central">
            <input type="text" id="campo-bipe" placeholder="BIPE O CÓDIGO..." autocomplete="off">
            <div id="area-venda" style="display:none;">
                <label>CLIENTE:</label>
                <select id="sel-cli-venda"></select>
                <div id="render-prods" class="prod-grid"></div>
            </div>
        </div>
        <div class="col-resumo">
            <h3 id="txt-m-sel" style="text-align:center;">Mesa Livre</h3>
            <div id="carrinho" style="flex:1; overflow-y:auto; font-size:12px; margin-top:10px;"></div>
            <div style="border-top:2px solid #333; padding-top:10px;">
                <h2 style="color:var(--r);">Total Mesa: R$ <span id="total-v">0.00</span></h2>
                <button class="btn-acao" onclick="fecharEImprimir()">FECHAR CONTA / DIVIDIR</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction:column;">
        <h3>Produtos</h3>
        <input type="text" id="p-n" placeholder="Nome">
        <input type="number" id="p-v" placeholder="Preço">
        <button class="btn-acao" style="background:var(--i);" onclick="addP()">SALVAR</button>
    </div>
    <div id="clientes" class="tela" style="flex-direction:column;">
        <h3>Clientes</h3>
        <input type="text" id="c-n" placeholder="Nome">
        <input type="text" id="c-f" placeholder="WhatsApp (DDD+Número)">
        <button class="btn-acao" style="background:var(--p);" onclick="addC()">SALVAR</button>
    </div>
    <div id="caixa" class="tela" style="flex-direction:column;">
        <h3>Relatório de Caixa</h3>
        <div id="res-cx"></div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:red;">Resetar Sistema</button>
    </div>
</main>

<script>
    let PRODS = JSON.parse(localStorage.getItem('b934_p')) || [];
    let CLIS = JSON.parse(localStorage.getItem('b934_c')) || [{n: "Balcão", f: ""}];
    let FINAN = JSON.parse(localStorage.getItem('b934_f')) || { d: 0, h: [] };
    let MESAS = Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, status: 'livre' }));
    let mesaAtiva = null;

    function salvar() {
        localStorage.setItem('b934_p', JSON.stringify(PRODS));
        localStorage.setItem('b934_c', JSON.stringify(CLIS));
        localStorage.setItem('b934_f', JSON.stringify(FINAN));
    }

    function trocar(id, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'vendas') renderV();
        if(id === 'caixa') renderCX();
    }

    function renderV() {
        document.getElementById('render-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa-card ${m.status==='ocupada'?'ocupada':''} ${mesaAtiva===m.id?'sel':''}" onclick="selMesa(${m.id})">MESA ${m.id}<br>R$ ${m.total.toFixed(2)}</div>`).join('');
        document.getElementById('render-prods').innerHTML = PRODS.map((p, i) => `<div class="prod-btn" onclick="lancar(${i})">${p.n}<br>R$ ${parseFloat(p.v).toFixed(2)}</div>`).join('');
        document.getElementById('sel-cli-venda').innerHTML = CLIS.map(c => `<option value="${c.n}">${c.n}</option>`).join('');
    }

    function selMesa(id) {
        mesaAtiva = id;
        document.getElementById('txt-m-sel').innerText = "MESA " + id;
        document.getElementById('area-venda').style.display = 'block';
        renderV(); attCar();
    }

    function lancar(i) {
        let m = MESAS.find(x => x.id === mesaAtiva);
        let cli = document.getElementById('sel-cli-venda').value;
        m.itens.push({ cli: cli, n: PRODS[i].n, v: parseFloat(PRODS[i].v) });
        m.total += parseFloat(PRODS[i].v);
        m.status = 'ocupada';
        renderV(); attCar();
    }

    function attCar() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        document.getElementById('carrinho').innerHTML = m.itens.map(it => `<div><b>${it.cli}:</b> ${it.n} - R$ ${it.v.toFixed(2)}</div>`).join('');
        document.getElementById('total-v').innerText = m.total.toFixed(2);
    }

    function fecharEImprimir() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        if(!m || m.total <= 0) return;

        let modo = prompt("1-Mesa Toda | 2-Por Cliente | 3-Dividir Igual");
        let valorFinal = 0; let ref = ""; let itensRecibo = [];

        if(modo === "1") {
            valorFinal = m.total; ref = "Mesa " + m.id; itensRecibo = [...m.itens];
            m.itens = []; m.total = 0; m.status = 'livre';
        } else if(modo === "2") {
            let nome = prompt("Nome do Cliente na mesa:");
            itensRecibo = m.itens.filter(it => it.cli === nome);
            valorFinal = itensRecibo.reduce((s, it) => s + it.v, 0);
            ref = nome;
            m.itens = m.itens.filter(it => it.cli !== nome);
            m.total -= valorFinal;
            if(m.total <= 0) m.status = 'livre';
        } else if(modo === "3") {
            let qtd = prompt("Dividir em quantos?");
            valorFinal = m.total / qtd; ref = "Rachado 1/" + qtd;
            itensRecibo = m.itens; // Mostra tudo mas com valor dividido
            m.total -= valorFinal;
            if(m.total <= 0.1) { m.itens = []; m.total = 0; m.status = 'livre'; }
        }

        let fPag = prompt("1-Dinheiro | 2-PIX | 3-Débito | 4-Crédito | 5-Pendura");
        let meios = {"1":"Dinheiro","2":"PIX","3":"Débito","4":"Crédito","5":"Pendura"};
        
        gerarRecibo(ref, itensRecibo, valorFinal, meios[fPag]);
        salvar(); renderV(); attCar();
    }

    function gerarRecibo(cliente, itens, total, forma) {
        let txt = `--- BOTECO 934 ---\nCliente: ${cliente}\n------------------\n`;
        itens.forEach(it => txt += `${it.n} - R$ ${it.v.toFixed(2)}\n`);
        txt += `------------------\nTOTAL: R$ ${total.toFixed(2)}\nFORMA: ${forma}\nOBRIGADO!`;

        // Impressão Térmica
        let win = window.open('', '', 'width=300,height=600');
        win.document.write(`<pre style="font-family:monospace; font-size:12px;">${txt}</pre>`);
        win.print();
        win.close();

        // Envio WhatsApp
        let cliObj = CLIS.find(c => c.n === cliente);
        if(cliObj && cliObj.f) {
            let zapUrl = `https://api.whatsapp.com/send?phone=55${cliObj.f}&text=${encodeURIComponent(txt)}`;
            window.open(zapUrl, '_blank');
        }
    }

    function addP() { 
        let n = document.getElementById('p-n').value, v = document.getElementById('p-v').value;
        if(n && v) { PRODS.push({n, v}); salvar(); alert("Salvo!"); }
    }
    function addC() { 
        let n = document.getElementById('c-n').value, f = document.getElementById('c-f').value;
        if(n) { CLIS.push({n, f}); salvar(); alert("Salvo!"); }
    }
    
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = renderV;
</script>
</body>
</html>
