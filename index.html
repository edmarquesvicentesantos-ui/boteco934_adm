<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PDV - Caixa</title>
<style>
body{font-family:Arial;background:#111;color:#fff}
button,input{padding:10px;margin:5px}
</style>
</head>
<body>
<h1>CAIXA</h1>

<a href="clientes.html"><button>Clientes</button></a>
<a href="produtos.html"><button>Produtos</button></a>

<h3>Venda</h3>
<input id="codigo" placeholder="Código">
<button onclick="add()">Adicionar</button>

<div id="lista"></div>

<select id="pagamento">
<option>Dinheiro</option>
<option>PIX</option>
<option>Crédito</option>
<option>Débito</option>
<option>Pendura</option>
</select>

<button onclick="fechar()">Fechar Conta</button>

<script>
let produtos=JSON.parse(localStorage.getItem('produtos'))||[];
let venda=[];

function add(){
let cod=document.getElementById('codigo').value;
let p=produtos.find(x=>x.codigo==cod);
if(p){venda.push(p);render();}
}

function render(){
let l=document.getElementById('lista');
l.innerHTML='';
let total=0;
venda.forEach(p=>{l.innerHTML+=p.nome+' '+p.preco+'<br>';total+=p.preco});
l.innerHTML+='<hr>'+total;
}

function fechar(){
let total=venda.reduce((s,p)=>s+p.preco,0);
alert('Total: '+total);
window.print();
venda=[];render();
}
</script>
</body>
</html>
