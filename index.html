<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 ELITE - PDV & XML</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --card: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; height: 100vh; }
        
        /* Menu */
        nav { width: 200px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 12px; cursor: pointer; border-radius: 6px; text-align: left; }
        .nav-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        /* Main */
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* XML Drop Zone */
        // DENTRO DA FUNÇÃO DE LEITURA DO XML
document.getElementById('xmlInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        const parser = new DOMParser();
        const xml = parser.parseFromString(event.target.result, "text/xml");
        const produtos = xml.getElementsByTagName("det");
        
        for (let p of produtos) {
            let nome = p.getElementsByTagName("xProd")[0].textContent;
            let qtdComprada = parseFloat(p.getElementsByTagName("qCom")[0].textContent); // Ex: 10 fardos
            let valorUnNF = parseFloat(p.getElementsByTagName("vUnCom")[0].textContent); // Valor do fardo na nota
            
            // --- LÓGICA DE FRACIONAMENTO ---
            let fatorConversao = 1;

            // Se no nome do produto tiver "C/12", "CX12" ou "FD12", ele multiplica
            if (nome.includes("12")) fatorConversao = 12;
            else if (nome.includes("15")) fatorConversao = 15;
            else if (nome.includes("24")) fatorConversao = 24;
            else if (nome.includes("6")) fatorConversao = 6;

            let qtdRealEstoque = qtdComprada * fatorConversao; // 10 fardos x 12 = 120 unidades
            let custoUnitarioReal = valorUnNF / fatorConversao; // Preço do fardo / 12 = custo de cada lata
            // -------------------------------

            let existe = db_estoque.find(i => i.nome === nome);
            if (existe) {
                existe.qtd += qtdRealEstoque;
                existe.custo = custoUnitarioReal;
            } else {
                // Cadastra já com o preço sugerido (ex: 30% de margem sobre a unidade)
                db_estoque.push({ 
                    nome: nome, 
                    qtd: qtdRealEstoque, 
                    preco: custoUnitarioReal * 1.30, 
                    custo: custoUnitarioReal 
                });
            }
        }
        save();
        render();
        alert("XML Importado: Itens fracionados com sucesso!");
    };
    reader.readAsText(e.target.files[0]);
};
        /* Mesas */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .mesa { background: var(--card); border: 2px solid #333; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
        .mesa.ocupada { border-color: var(--gold); }

        /* Tabelas */
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 2px solid #222; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        
        .btn-venda { background: #25d366; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 24px; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 20px;">934</div>
    <button class="nav-btn active" onclick="tab('vendas')">🪑 VENDAS</button>
    <button class="nav-btn" onclick="tab('estoque')">📦 ESTOQUE/XML</button>
</nav>

<main>
    <div id="vendas" class="view active">
        <h2>Mapa de Mesas</h2>
        <div class="grid-mesas" id="gridMesas"></div>
        <div id="painelMesa" style="margin-top: 20px; display:none; background: var(--card); padding: 20px; border-radius: 8px;">
            <h3 id="tituloMesa">Mesa</h3>
            <div id="itensMesa"></div>
            <hr style="margin: 15px 0; border: #222 1px solid;">
            <div style="display:flex; justify-content: space-between; font-size: 18px; font-weight: bold;">
                <span>TOTAL:</span><span id="totalMesa">R$ 0,00</span>
            </div>
            <button class="btn-venda" style="width: 100%; margin-top: 15px;" onclick="fecharComZap()">FECHAR CONTA (WHATSAPP)</button>
        </div>
    </div>

    <div id="estoque" class="view">
        <h2>Importar XML de Compra</h2>
        <div class="xml-zone" id="dropZone">
            Arrastar arquivo XML aqui ou clique para selecionar
            <input type="file" id="xmlInput" hidden accept=".xml">
        </div>

        <h2>Produtos em Estoque</h2>
        <table>
            <thead><tr><th>NOME</th><th>QTD</th><th>PREÇO VENDA</th></tr></thead>
            <tbody id="corpoEstoque"></tbody>
        </table>
    </div>
</main>

<script>
    let db_estoque = JSON.parse(localStorage.getItem('934_est')) || [];
    let db_mesas = JSON.parse(localStorage.getItem('934_mes')) || Array(12).fill().map((_, i) => ({ id: i+1, ocupada: false, pedidos: [], total: 0 }));
    let mesaAberta = null;

    function tab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        render();
    }

    // LEITOR DE XML
    document.getElementById('dropZone').onclick = () => document.getElementById('xmlInput').click();
    document.getElementById('xmlInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            const produtos = xml.getElementsByTagName("det");
            
            for (let p of produtos) {
                let nome = p.getElementsByTagName("xProd")[0].textContent;
                let qtd = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                let vUn = parseFloat(p.getElementsByTagName("vUnCom")[0].textContent);
                
                let existe = db_estoque.find(i => i.nome === nome);
                if (existe) {
                    existe.qtd += qtd;
                } else {
                    db_estoque.push({ nome, qtd, preco: vUn * 1.3, custo: vUn });
                }
            }
            save();
            render();
            alert("Estoque Atualizado via XML!");
        };
        reader.readAsText(e.target.files[0]);
    };

    function detalharMesa(id) {
        mesaAberta = db_mesas.find(m => m.id === id);
        mesaAberta.ocupada = true;
        document.getElementById('painelMesa').style.display = 'block';
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        renderItensMesa();
    }

    // ADICIONAR ITEM COM BAIXA NO ESTOQUE
    function addItem(nome) {
        let pEstoque = db_estoque.find(i => i.nome === nome);
        if (pEstoque.qtd <= 0) return alert("Estoque zerado!");

        let item = mesaAberta.pedidos.find(i => i.nome === nome);
        if (item) {
            item.qtd++;
            item.subtotal = item.qtd * item.preco;
        } else {
            mesaAberta.pedidos.push({ nome, preco: pEstoque.preco, qtd: 1, subtotal: pEstoque.preco });
        }
        
        pEstoque.qtd--; // BAIXA NO ESTOQUE AQUI
        mesaAberta.total = mesaAberta.pedidos.reduce((a, b) => a + b.subtotal, 0);
        save();
        render();
        renderItensMesa();
    }

    function fecharComZap() {
        let texto = `*BOTECO 934 - MESA ${mesaAberta.id}*%0A%0A`;
        mesaAberta.pedidos.forEach(i => {
            texto += `${i.qtd}x ${i.nome} - R$ ${i.subtotal.toFixed(2)}%0A`;
        });
        texto += `%0A*TOTAL: R$ ${mesaAberta.total.toFixed(2)}*`;
        window.open(`https://wa.me/?text=${texto}`);
        
        mesaAberta.ocupada = false;
        mesaAberta.pedidos = [];
        mesaAberta.total = 0;
        save();
        location.reload();
    }

    function save() {
        localStorage.setItem('934_est', JSON.stringify(db_estoque));
        localStorage.setItem('934_mes', JSON.stringify(db_mesas));
    }

    function render() {
        // Grid Mesas
        document.getElementById('gridMesas').innerHTML = db_mesas.map(m => `
            <div class="mesa ${m.ocupada ? 'ocupada' : ''}" onclick="detalharMesa(${m.id})">
                <h4>MESA ${m.id}</h4>
                <p>${m.ocupada ? 'R$ '+m.total.toFixed(2) : 'Livre'}</p>
            </div>
        `).join('');

        // Tabela Estoque
        document.getElementById('corpoEstoque').innerHTML = db_estoque.map(p => `
            <tr>
                <td>${p.nome}</td>
                <td>${p.qtd}</td>
                <td>R$ ${p.preco.toFixed(2)}</td>
            </tr>
        `).join('');
    }

    function renderItensMesa() {
        document.getElementById('itensMesa').innerHTML = `
            <select onchange="addItem(this.value); this.value=''">
                <option value="">+ Adicionar Item do Estoque</option>
                ${db_estoque.map(p => `<option value="${p.nome}">${p.nome} (R$ ${p.preco.toFixed(2)})</option>`)}
            </select>
            ${mesaAberta.pedidos.map(i => `
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <span>${i.qtd}x ${i.nome}</span>
                    <span>R$ ${i.subtotal.toFixed(2)}</span>
                </div>
            `).join('')}
        `;
        document.getElementById('totalMesa').innerText = "R$ " + mesaAberta.total.toFixed(2);
    }

    window.onload = render;
</script>
</body>
</html>
