<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - v56 XML Import</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --subtext: #94a3b8; --border: #1e293b; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 200px; background: var(--card); border-right: 1px solid var(--border); padding: 10px; }
        .nav-btn { padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--subtext); border-radius: 10px; margin-bottom: 5px; }
        .nav-btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }

        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        input { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .btn { border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-gold { background: var(--accent); color: var(--bg); }
        .btn-xml { background: #3b82f6; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        th { color: var(--accent); font-size: 12px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="padding:20px; text-align:center; color:var(--accent); font-weight:700">BOTECO 934</div>
    <div class="nav-btn active" onclick="show('caixa', this)"><i class="fas fa-cash-register"></i> CAIXA</div>
    <div class="nav-btn" onclick="show('estoque', this)"><i class="fas fa-boxes-stacked"></i> ESTOQUE</div>
</nav>

<main class="main">
    <section id="caixa" class="view active">
        <h2>PDV Ativo</h2>
        <p>Use o menu para gerenciar produtos e clientes.</p>
    </section>

    <section id="estoque" class="view">
        <div style="display:grid; grid-template-columns: 350px 1fr; gap:20px">
            <div style="background:var(--card); padding:20px; border-radius:15px">
                <h3>Entrada de Produtos</h3>
                <input type="file" id="xmlInput" accept=".xml" style="display:none" onchange="lerXML(this)">
                <button class="btn btn-xml" onclick="document.getElementById('xmlInput').click()">
                    <i class="fas fa-file-code"></i> IMPORTAR NFe (XML)
                </button>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0">
                
                <input type="text" id="pNome" placeholder="Nome do Produto">
                <input type="number" id="pPreco" placeholder="Preço de Venda R$">
                <button class="btn btn-gold" onclick="addManual()">SALVAR MANUAL</button>
            </div>

            <div style="background:var(--card); padding:20px; border-radius:15px">
                <h3>Produtos Cadastrados</h3>
                <table>
                    <thead><tr><th>Produto</th><th>Preço</th><th>Ação</th></tr></thead>
                    <tbody id="listaEstoque"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let estoque = [];

    db.ref('produtos').on('value', snap => {
        estoque = snap.val() ? Object.values(snap.val()) : [];
        render();
    });

    function render() {
        document.getElementById('listaEstoque').innerHTML = estoque.map(p => `
            <tr><td>${p.nome}</td><td>R$ ${p.val.toFixed(2)}</td><td><i class="fas fa-trash" style="color:#ef4444; cursor:pointer" onclick="remover('${p.nome}')"></i></td></tr>
        `).join('');
    }

    // FUNÇÃO PARA LER XML DA NOTA FISCAL
    function lerXML(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(reader.result, "text/xml");
            
            // Busca as tags <det> que contêm os produtos na NFe
            const itens = xmlDoc.getElementsByTagName("det");
            
            if(itens.length === 0) return alert("XML Inválido ou sem produtos!");

            for (let i = 0; i < itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent;
                const precoCusto = itens[i].getElementsByTagName("vUnCom")[0].textContent;
                
                // Sugere um lucro de 50% em cima do custo do XML (você pode alterar depois)
                const precoVenda = parseFloat(precoCusto) * 1.5;

                // Adiciona ao Firebase
                db.ref('produtos/' + nome.replace(/[.#$/[\]]/g, "")).set({
                    nome: nome.toUpperCase(),
                    val: precoVenda
                });
            }
            alert(itens.length + " produtos importados com sucesso!");
        };
        reader.readAsText(input.files[0]);
    }

    function addManual() {
        const n = document.getElementById('pNome').value.toUpperCase();
        const v = parseFloat(document.getElementById('pPreco').value);
        if(n && v) db.ref('produtos/' + n).set({ nome: n, val: v });
    }

    function remover(nome) { if(confirm("Remover?")) db.ref('produtos/' + nome).remove(); }
    function show(id, b) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); b.classList.add('active'); }
</script>
</body>
</html>
