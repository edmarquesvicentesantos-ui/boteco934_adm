<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - v57.1 Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --subtext: #94a3b8; --border: #1e293b; --green: #10b981; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Menu Lateral Estilo Imagens */
        .sidebar { width: 180px; background: var(--card); border-right: 1px solid var(--border); padding: 10px; }
        .brand { padding: 20px 10px; color: var(--accent); font-weight: 700; font-size: 18px; text-transform: uppercase; }
        .nav-btn { padding: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--subtext); border-radius: 8px; margin-bottom: 5px; }
        .nav-btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }

        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* Cards e Inputs */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        input { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gold { background: var(--accent); color: var(--bg); }
        .btn-xml { background: #3b82f6; color: white; }

        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="brand">BOTECO 934</div>
    <div class="nav-btn active" onclick="nav('caixa', this)"><i class="fas fa-desktop"></i> CAIXA</div>
    <div class="nav-btn" onclick="nav('estoque', this)"><i class="fas fa-box"></i> ESTOQUE</div>
    <div class="nav-btn" onclick="nav('clientes', this)"><i class="fas fa-users"></i> CLIENTES</div>
    <div class="nav-btn" onclick="nav('financas', this)"><i class="fas fa-wallet"></i> FINANÇAS</div>
</nav>

<main class="main">
    <section id="caixa" class="view active">
        <h2>PDV Ativo</h2>
        <div class="card" style="max-width:400px">
            <input type="text" placeholder="BIPAR PRODUTO..." id="bip">
            <p style="color:var(--subtext)">Selecione uma mesa ou bipe o código.</p>
        </div>
    </section>

    <section id="estoque" class="view">
        <div style="display:grid; grid-template-columns: 350px 1fr; gap:20px">
            <div class="card">
                <h3>Entrada XML</h3>
                <input type="file" id="xmlIn" accept=".xml" onchange="lerXML(this)">
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0">
                <h3>Manual</h3>
                <input type="text" id="pNome" placeholder="Nome">
                <input type="number" id="pPreco" placeholder="Preço">
                <button class="btn btn-gold" onclick="addP()">SALVAR</button>
            </div>
            <div class="card">
                <table><thead><tr><th>Produto</th><th>Preço</th></tr></thead><tbody id="listaP"></tbody></table>
            </div>
        </div>
    </section>

    <section id="clientes" class="view">
        <div class="card" style="max-width:400px">
            <h3>Novo Cliente</h3>
            <input type="text" id="cNome" placeholder="Nome">
            <input type="text" id="cZap" placeholder="WhatsApp">
            <button class="btn btn-gold" onclick="addC()">SALVAR CLIENTE</button>
        </div>
    </section>

    <section id="financas" class="view">
        <div class="card" style="text-align:center">
            <h3>Vendido Hoje</h3>
            <h1 id="totalHoje" style="color:var(--green)">R$ 0,00</h1>
        </div>
    </section>
</main>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Sincronização e Correção do Erro .toFixed
    db.ref().on('value', snap => {
        const data = snap.val() || {};
        const prods = data.produtos ? Object.values(data.produtos) : [];
        
        // Renderiza lista com trava de segurança para valores nulos
        document.getElementById('listaP').innerHTML = prods.map(p => {
            const preco = p.val ? parseFloat(p.val).toFixed(2) : "0.00";
            return `<tr><td>${p.nome || 'Sem Nome'}</td><td>R$ ${preco}</td></tr>`;
        }).join('');

        const vendas = data.vendas ? Object.values(data.vendas) : [];
        const hoje = new Date().toLocaleDateString();
        const total = vendas.filter(v => v.data === hoje).reduce((a, b) => a + (parseFloat(b.valor) || 0), 0);
        document.getElementById('totalHoje').innerText = "R$ " + total.toFixed(2);
    });

    function lerXML(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const xml = new DOMParser().parseFromString(reader.result, "text/xml");
            const itens = xml.getElementsByTagName("det");
            for (let i = 0; i < itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent.toUpperCase();
                const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent) || 0;
                db.ref('produtos/' + nome.replace(/[.#$/[\]]/g, "")).set({ nome, val: custo * 1.5 });
            }
            alert("XML Importado!");
        };
        reader.readAsText(input.files[0]);
    }

    function addP() {
        const n = document.getElementById('pNome').value.toUpperCase();
        const v = parseFloat(document.getElementById('pPreco').value);
        if(n && v) db.ref('produtos/' + n).set({ nome: n, val: v });
    }

    function addC() {
        const n = document.getElementById('cNome').value.toUpperCase();
        const z = document.getElementById('cZap').value;
        if(n) db.ref('clientes/' + n).set({ nome: n, zap: z });
    }

    function nav(id, b) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        b.classList.add('active');
    }
</script>
</body>
</html>
