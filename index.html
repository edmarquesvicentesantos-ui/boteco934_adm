<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #05070a; font-family: sans-serif; }
        .sidebar { width: 80px; background: #0f1218; border-right: 1px solid #1e293b; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-item { color: #64748b; padding: 20px; cursor: pointer; font-size: 1.5rem; }
        .nav-item:hover, .active { color: #ffb800; }
        .main { flex: 1; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="ir('caixa.html', this)"><i class="fas fa-cash-register"></i></div>
        <div class="nav-item" onclick="ir('estoque.html', this)"><i class="fas fa-boxes-stacked"></i></div>
        <div class="nav-item" onclick="ir('clientes.html', this)"><i class="fas fa-users"></i></div>
    </div>
    <div class="main">
        <iframe id="tela" src="caixa.html"></iframe>
    </div>
    <script>
        function ir(pag, el) {
            document.getElementById('tela').src = pag;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
