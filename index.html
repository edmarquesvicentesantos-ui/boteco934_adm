<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; }
        .area-mesas { width: 250px; background: var(--card); padding: 20px; border-right: 1px solid #1e293b; overflow-y: auto; }
        .mesa { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #334155; }
        .mesa.ativa { border-color: var(--accent); background: var(--accent); color: #000; }
        .painel { flex: 1; padding: 30px; }
        input { background: #1e293b; border: 1px solid #334155; color: white; padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 20px; }
        /* Modal de cadastro rápido */
        #modal-cad { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: black; padding: 15px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="area-mesas" id="mesas"></div>

<div class="painel">
    <h2 id="mesa-nome">Selecione uma mesa</h2>
    <input type="text" id="bipe" placeholder="Bipar produto agora...">
    <div id="lista-carrinho"></div>
    <h3 id="total">Total: R$ 0.00</h3>
    <button onclick="alert('Funcionalidade de fechar em breve!')" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; font-weight:bold;">FECHAR CONTA</button>
</div>

<div id="modal-cad" onclick="cadastrarTeste()">+</div>

<script>
    // 1. COLOQUE SEUS DADOS AQUI (ESSENCIAL PARA FUNCIONAR)
    const firebaseConfig = {
      apiKey: "COLE_AQUI_SUA_API_KEY", 
      authDomain: "boteco934-afc3f.firebaseapp.com",
      databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
      projectId: "boteco934-afc3f",
      appId: "COLE_AQUI_SEU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let PRODUTOS = [];

    // 2. BUSCA O ESTOQUE NA NUVEM
    db.ref('produtos').on('value', snap => {
        const dados = snap.val();
        if (dados) {
            PRODUTOS = Object.values(dados);
            console.log("Estoque carregado:", PRODUTOS);
        } else {
            console.log("Estoque vazio no Firebase!");
        }
    });

    // 3. FUNÇÃO PARA CRIAR UM PRODUTO DE TESTE (Clique no + verde)
    function cadastrarTeste() {
        const cod = prompt("Digite o código de barras:");
        const nome = prompt("Nome do produto:");
        const preco = prompt("Preço:");
        if(cod && nome && preco) {
            db.ref('produtos/' + cod).set({
                codigo: cod,
                nome: nome,
                preco: parseFloat(preco)
            });
            alert("Produto salvo na nuvem!");
        }
    }

    // Desenha as mesas
    const grid = document.getElementById('mesas');
    for(let i=1; i<=12; i++) {
        grid.innerHTML += `<div class="mesa" id="m${i}" onclick="selMesa(${i})">Mesa ${i}</div>`;
    }

    function selMesa(id) {
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('ativa'));
        document.getElementById('m'+id).classList.add('ativa');
        document.getElementById('mesa-nome').innerText = "Mesa " + id;
        document.getElementById('bipe').focus();
    }
</script>
</body>
</html>
