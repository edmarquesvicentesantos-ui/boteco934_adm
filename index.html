<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE 934 - VERSÃO FINAL</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --card: #111; --green: #25d366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; height: 100vh; }
        
        /* Menu Lateral Estilizado */
        nav { width: 220px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 15px; cursor: pointer; border-radius: 8px; text-align: left; }
        .nav-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        /* Área Principal */
        main { flex: 1; padding: 20px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* Grade de Produtos (Onde ficam as fotos/cards) */
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .card-produto { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
        .card-produto:hover { border-color: var(--gold); }
        .card-produto b { display: block; font-size: 14px; color: var(--gold); }
        .card-produto span { font-size: 12px; color: #888; }

        /* Painel de Venda */
        .painel { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .linha { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<nav>
    <h2 style="color:var(--gold); text-align:center; margin-bottom:20px;">934 ELITE</h2>
    <button class="nav-btn active" onclick="tab('vendas')">🛒 VENDAS</button>
    <button class="nav-btn" onclick="tab('estoque')">📦 ESTOQUE/XML</button>
    <button class="nav-btn" onclick="tab('clientes')">👥 FIADO</button>
</nav>

<main>
    <div id="vendas" class="view active">
        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
            <div>
                <h3>Cardápio / Balcão</h3>
                <div class="grid-produtos" id="listaProdutosVenda">
                    </div>
            </div>
            <div class="painel">
                <h3 id="mesaTitulo">Mesa/Balcão</h3>
                <div id="carrinhoItens" style="min-height:200px; margin-top:10px;"></div>
                <div style="font-size:24px; font-weight:bold; margin-top:15px; color:var(--gold);">
                    Total: <span id="totalVenda">R$ 0,00</span>
                </div>
                <button onclick="fechar('caixa')" style="width:100%; padding:15px; background:var(--green); border:none; border-radius:5px; font-weight:bold; margin-top:10px; cursor:pointer;">PAGO (CAIXA)</button>
                <button onclick="fechar('fiado')" style="width:100%; padding:15px; background:#ff4444; border:none; border-radius:5px; font-weight:bold; margin-top:10px; cursor:pointer;">PENDURAR (FIADO)</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="view">
        <h2>Entrada XML & Calculadora de Doses</h2>
        <input type="file" id="xmlInput" onchange="lerXML(this.files[0])" style="margin:20px 0; color:var(--gold);">
        <table style="width:100%; text-align:left; background:#111;">
            <thead><tr><th>Produto</th><th>Estoque</th><th>Custo Un.</th><th>Venda</th></tr></thead>
            <tbody id="corpoEstoque"></tbody>
        </table>
    </div>
</main>

<script>
    let db = {
        estoque: JSON.parse(localStorage.getItem('934_est')) || [],
        clientes: JSON.parse(localStorage.getItem('934_cli')) || [],
        carrinho: []
    };

    function tab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render();
    }

    // LÓGICA DO XML COM FRAÇÃO E DOSE
    function lerXML(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const prods = xml.getElementsByTagName("det");
            for (let p of prods) {
                let nome = p.getElementsByTagName("xProd")[0].textContent;
                let qtdNF = parseFloat(p.getElementsByTagName("qCom")[0].textContent);
                let valUn = parseFloat(p.getElementsByTagName("vUnCom")[0].textContent);
                
                let tipo = prompt(`Produto: ${nome}\n1. Pacote/Fardo (Ex: Cerveja)\n2. Garrafa/Dose (Ex: Whisky)\nDigite 1 ou 2:`, "1");
                
                if(tipo == "1") {
                    let f = prompt("Quantas unidades vêm no pacote?", "12");
                    let totalUn = qtdNF * parseInt(f);
                    db.estoque.push({ nome, qtd: totalUn, preco: (valUn/f)*1.4, custo: valUn/f });
                } else {
                    let doses = prompt("Quantas doses (ex: 50ml) saem dessa garrafa?", "20");
                    db.estoque.push({ nome: nome + " (DOSE)", qtd: qtdNF * doses, preco: (valUn/doses)*2, custo: valUn/doses });
                }
            }
            salvar(); render();
        };
        reader.readAsText(file);
    }

    function add(nome) {
        let p = db.estoque.find(i => i.nome === nome);
        if(p.qtd <= 0) return alert("Sem estoque!");
        let item = db.carrinho.find(i => i.nome === nome);
        if(item) { item.qtd++; item.sub = item.qtd * item.preco; }
        else { db.carrinho.push({ nome, preco: p.preco, qtd: 1, sub: p.preco }); }
        p.qtd--; render();
    }

    function fechar(tipo) {
        let total = db.carrinho.reduce((a,b) => a + b.sub, 0);
        if(tipo === 'fiado') {
            let n = prompt("Nome do Cliente?");
            db.clientes.push({ nome: n, valor: total, data: new Date().toLocaleDateString() });
        }
        // Enviar WhatsApp
        let msg = `*BOTECO 934*%0A` + db.carrinho.map(i => `${i.qtd}x ${i.nome}`).join('%0A') + `%0A*TOTAL: R$ ${total.toFixed(2)}*`;
        window.open(`https://wa.me/?text=${msg}`);
        db.carrinho = []; salvar(); render();
    }

    function salvar() { localStorage.setItem('934_est', JSON.stringify(db.estoque)); localStorage.setItem('934_cli', JSON.stringify(db.clientes)); }

    function render() {
        // Render Cards de Venda
        document.getElementById('listaProdutosVenda').innerHTML = db.estoque.map(p => `
            <div class="card-produto" onclick="add('${p.nome}')">
                <b>${p.nome}</b>
                <span>R$ ${p.preco.toFixed(2)}</span>
            </div>
        `).join('');

        // Render Carrinho
        document.getElementById('carrinhoItens').innerHTML = db.carrinho.map(i => `
            <div class="linha"><span>${i.qtd}x ${i.nome}</span><b>R$ ${i.sub.toFixed(2)}</b></div>
        `).join('');
        document.getElementById('totalVenda').innerText = "R$ " + db.carrinho.reduce((a,b) => a + b.sub, 0).toFixed(2);

        // Render Estoque
        document.getElementById('corpoEstoque').innerHTML = db.estoque.map(p => `
            <tr><td>${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.custo.toFixed(2)}</td><td>R$ ${p.preco.toFixed(2)}</td></tr>
        `).join('');
    }

    window.onload = render;
</script>
</body>
</html>
