<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - QUANTUM SYSTEM</title>
    <style>
        :root {
            --gold: #ffcc00;
            --bg-dark: #050505;
            --glass: rgba(18, 18, 18, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            min-height: 100vh;
        }

        header { 
            background: var(--gold); 
            padding: 15px 25px; 
            color: #000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 20px rgba(255, 204, 0, 0.2);
        }

        nav { 
            background: #111; 
            display: flex; 
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .nav-item { 
            padding: 20px; 
            cursor: pointer; 
            color: #777; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 11px;
            letter-spacing: 1px;
        }

        .nav-item.active { 
            color: var(--gold); 
            border-bottom: 3px solid var(--gold);
        }

        .container { padding: 30px; max-width: 1200px; margin: auto; }
        .secao { display: none; }
        .ativa { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CALCULADORA QUÂNTICA (DESIGN PREMIUM) --- */
        .card-calc {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 30px;
            border: 1px solid var(--border);
            max-width: 550px;
            margin: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .card-calc h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 35px;
            font-size: 26px;
            text-transform: uppercase;
            font-weight: 900;
        }

        label { display: block; margin-bottom: 10px; color: #aaa; font-size: 13px; font-weight: bold; text-transform: uppercase; }

        input {
            background: rgba(0,0,0,0.4);
            border: 1px solid #333;
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); outline: none; background: rgba(0,0,0,0.6); }

        .btn-calc {
            background: var(--gold);
            color: #000;
            padding: 22px;
            border: none;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            border-radius: 15px;
            font-size: 18px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-calc:active { transform: scale(0.98); }

        /* O QUADRO DE RESULTADO DA FOTO */
        .res-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            border-left: 10px solid var(--gold);
            margin-top: 35px;
            text-align: left;
            display: none;
        }

        .res-container p { font-size: 14px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .res-container h3 { font-size: 32px; font-weight: 900; }

        /* PDV E VITRINE */
        .pdv-layout { display: grid; grid-template-columns: 1fr 400px; gap: 25px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 12px; }
        .card-prod { 
            background: #fff; color: #000; padding: 15px; border-radius: 12px; 
            text-align: center; font-weight: 900; cursor: pointer; min-height: 110px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .card-prod span { color: #2b579a; font-size: 1.3em; margin-top: 5px; }

    </style>
</head>
<body>

<header>
    <h1 style="font-weight: 900; letter-spacing: -1px;">934 BOTECO</h1>
    <div id="relogio" style="font-weight: 900;">00:00:00</div>
</header>

<nav>
    <div class="nav-item active" onclick="mudar('vendas', this)">🛒 Vendas / Mesas</div>
    <div class="nav-item" onclick="mudar('calculadora', this)">📊 Calculadora Quântica</div>
    <div class="nav-item" onclick="mudar('produtos', this)">📦 Produtos</div>
</nav>

<div class="container">
    
    <div id="calculadora" class="secao">
        <div class="card-calc">
            <h2>Gestão de Margem</h2>
            
            <label>Custo Unitário (R$):</label>
            <input type="number" id="c_custo" placeholder="0,00" step="0.01">
            
            <label>Preço de Venda (R$):</label>
            <input type="number" id="c_venda" placeholder="0,00" step="0.01">
            
            <button class="btn-calc" onclick="calcularQuantum()">Processar Dados</button>
            
            <div id="resCalc" class="res-container">
                <p>Lucro por Unidade</p>
                <h3 id="lucroTxt" style="margin-bottom: 15px;">R$ 0,00</h3>
                <p>Margem de Performance</p>
                <h3 id="margemTxt" style="color: var(--gold); font-size: 45px;">0%</h3>
            </div>
        </div>
    </div>

    <div id="vendas" class="secao ativa">
        <div class="pdv-layout">
            <div id="vitrine" class="vitrine">
                </div>
            <div style="background:#fff; color:#000; border-radius:8px; padding:20px;">
                <h3 style="border-bottom: 2px solid #eee; padding-bottom:10px;">CUPOM 934</h3>
                <div id="carrinho" style="margin:20px 0; min-height:300px;"></div>
                <h2 style="font-size: 30px;">TOTAL: R$ <span id="totalVenda">0,00</span></h2>
            </div>
        </div>
    </div>

</div>

<script>
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    function calcularQuantum() {
        const custo = parseFloat(document.getElementById('c_custo').value);
        const venda = parseFloat(document.getElementById('c_venda').value);
        
        if (custo > 0 && venda > 0) {
            const lucro = venda - custo;
            const margem = (lucro / venda) * 100;
            
            const res = document.getElementById('resCalc');
            res.style.display = 'block';
            
            document.getElementById('lucroTxt').innerText = `R$ ${lucro.toFixed(2)}`;
            document.getElementById('margemTxt').innerText = `${margem.toFixed(1)}%`;
        }
    }

    function mudar(id, el) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    }
</script>
</body>
</html>
