<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV GOLD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand"><h2>Boteco 934</h2></div>
            <div class="mesa-seletor">
                <label>Mesa/Local:</label>
                <select id="select-mesa" onchange="trocarMesa()">
                    <option value="1">Mesa 01</option>
                    <option value="2">Mesa 02</option>
                    <option value="balcao">Balcão</option>
                </select>
                <input type="text" id="cliente-nome" placeholder="Cliente da Mesa" readonly>
                <button class="btn-abrir" onclick="abrirMesa()">Abrir Mesa</button>
            </div>
            <nav>
                <button onclick="abrirModalCliente()" class="btn-verde">+ Cadastrar Cliente</button>
                <button onclick="abrirModalProd()">+ Novo Produto</button>
            </nav>
        </aside>
        <main class="main-content">
            <input type="text" id="busca" placeholder="Buscar produto..." oninput="buscar()">
            <div id="grade-produtos" class="grid-produtos"></div>
        </main>
        <section class="checkout-panel">
            <h3>Consumo</h3>
            <div id="carrinho-itens" class="carrinho-lista"></div>
            <div class="checkout-footer">
                <div id="total-valor">R$ 0,00</div>
                <button class="btn-zap" onclick="enviarWhatsApp()">Enviar Recibo (Zap)</button>
                <button class="btn-fechar" onclick="abrirModalPagamento()">Fechar Recibo</button>
            </div>
        </section>
    </div>

    <div id="modal-cliente" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Novo Cliente</h3>
            <input type="text" id="c-nome" placeholder="Nome">
            <input type="text" id="c-fone" placeholder="WhatsApp (ex: 55879...)">
            <button onclick="salvarCliente()">Salvar</button>
            <button onclick="fecharModalCliente()">Sair</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
