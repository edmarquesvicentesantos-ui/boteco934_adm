<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Oficial</title>
    <style>
        /* DESIGN MODERNO E PROFISSIONAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: white; padding: 15px; }
        
        /* ESPAÇO PARA SUA LOGO */
        .header-container { 
            text-align: center; 
            padding: 20px; 
            border-bottom: 2px solid #ffcc00; 
            margin-bottom: 25px;
            background: #1a1a1a;
            border-radius: 0 0 20px 20px;
        }
        .logo-placeholder {
            width: 80px; height: 80px;
            background-color: #333;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px;
            border: 2px solid #ffcc00;
            font-size: 0.7em; color: #888;
        }
        h1 { color: #ffcc00; font-size: 1.5em; letter-spacing: 1px; }

        /* GRADE DE MESAS - FOCO EM CLAREZA */
        #grid-mesas { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
        }
        .card-mesa { 
            padding: 18px; border-radius: 15px; cursor: pointer; 
            transition: 0.2s; position: relative; border: 1px solid rgba(255,255,255,0.05);
        }
        .status-livre { background: linear-gradient(145deg, #1b5e20, #2e7d32); }
        .status-ocupada { background: linear-gradient(145deg, #b71c1c, #c62828); }
        
        .mesa-header { font-size: 0.75em; opacity: 0.8; font-weight: bold; }
        .mesa-body { margin-top: 8px; font-size: 1.1em; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mesa-valor { color: #ffcc00; margin-top: 5px; font-size: 1em; }

        .btn-reset { 
            margin-top: 50px; background: transparent; border: 1px solid #333; 
            color: #555; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-placeholder">SUA LOGO</div>
        <h1>BOTECO 934</h1>
        <p style="font-size: 0.8em; opacity: 0.6;">SISTEMA DE GESTÃO E DISTRIBUIÇÃO</p>
    </div>

    <div id="grid-mesas"></div>

    <button class="btn-reset" onclick="zerarSistema()">Reiniciar dia (Zerar Tudo)</button>

    <script>
        // LISTA DE PRODUTOS ESTRATÉGICA
        const produtos = [
            { id: 1, nome: "Cerveja 600ml Gelada", preco: 12.00 },
            { id: 2, nome: "Cerveja 600ml Grade", preco: 9.50 },
            { id: 3, nome: "Whisky Dose", preco: 12.00 },
            { id: 4, nome: "Whisky Garrafa", preco: 110.00 },
            { id: 5, nome: "Cerveja Lata", preco: 5.50 },
            { id: 6, nome: "Refrigerante", preco: 6.00 },
            { id: 7, nome: "Gelo Pacote", preco: 15.00 },
            { id: 8, nome: "Cachaça Dose", preco: 3.00 }
        ];

        let mesas = JSON.parse(localStorage.getItem('boteco_934_final')) || Array.from({ length: 12 }, (_, i) => ({
            id: i + 1, ocupada: false, cliente: "", total: 0
        }));

        function salvar() { localStorage.setItem('boteco_934_final', JSON.stringify(mesas)); }

        function renderizar() {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = mesas.map(m => `
                <div class="card-mesa ${m.ocupada ? 'status-ocupada' : 'status-livre'}" onclick="gerenciar(${m.id})">
                    <div class="mesa-header">MESA ${m.id}</div>
                    <div class="mesa-body">${m.ocupada ? m.cliente : 'LIVRE'}</div>
                    <div class="mesa-valor">${m.ocupada ? 'R$ ' + m.total.toFixed(2) : '---'}</div>
                </div>
            `).join('');
        }

        function gerenciar(id) {
            let mesa = mesas.find(m => m.id === id);
            if (!mesa.ocupada) {
                let n = prompt("Nome do Cliente:");
                if (n) { mesa.ocupada = true; mesa.cliente = n; }
            } else {
                let op = prompt("1: + Adicionar | 2: PAGO | 3: PENDURA | 4: Sair");
                if (op === "1") {
                    let lista = produtos.map(p => `${p.id}: ${p.nome} (R$${p.preco})`).join('\n');
                    let cod = prompt("Código:\n" + lista);
                    let p = produtos.find(item => item.id == cod);
                    if (p) mesa.total += p.preco;
                } else if (op === "2" || op === "3") {
                    let msg = op === "2" ? "PAGO!" : "ENVIADO AO PENDURA!";
                    alert(`Total: R$ ${mesa.total.toFixed(2)}\nStatus: ${msg}`);
                    mesa.ocupada = false; mesa.cliente = ""; mesa.total = 0;
                }
            }
            salvar(); renderizar();
        }

        function zerarSistema() {
            if (confirm("Limpar todas as mesas para amanhã?")) {
                mesas.forEach(m => { m.ocupada = false; m.cliente = ""; m.total = 0; });
                salvar(); renderizar();
            }
        }
        renderizar();
    </script>
</body>
</html>
