<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .painel { border: 2px solid #f39c12; padding: 20px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; width: 100%; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>
    <div class="painel">
        <h2>🧠 CALCULADORA DE MIX INTELIGENTE</h2>
        <div class="grid">
            <div>
                <label>Custo da Caixa (R$)</label>
                <input type="number" id="custo-cx" value="60.00" oninput="calcular()">
            </div>
            <div>
                <label>Unidades</label>
                <input type="number" id="qtd-cx" value="24" oninput="calcular()">
            </div>
            <div style="background:#1a252f; color:#f39c12; padding:10px; border-radius:4px; text-align:center;">
                Custo Unitário:<br><b id="res-unit">R$ 2,50</b>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>Tipo</th><th>Venda</th><th>Lucro</th></tr>
            </thead>
            <tbody id="resultado"></tbody>
        </table>
    </div>

    <script>
        function calcular() {
            let cx = parseFloat(document.getElementById('custo-cx').value) || 0;
            let q = parseInt(document.getElementById('qtd-cx').value) || 1;
            let u = cx / q;
            document.getElementById('res-unit').innerText = "R$ " + u.toFixed(2);
            
            let html = `
                <tr><td>Natural</td><td>R$ ${(u*1.4).toFixed(2)}</td><td>R$ ${(u*0.4).toFixed(2)}</td></tr>
                <tr><td>Gelada</td><td>R$ ${(u*1.4+1.5).toFixed(2)}</td><td>R$ ${(u*0.4+1.5).toFixed(2)}</td></tr>
            `;
            document.getElementById('resultado').innerHTML = html;
        }
        window.onload = calcular;
    </script>
</body>
</html>
