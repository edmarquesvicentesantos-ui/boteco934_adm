<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>934 ELITE - GESTÃO TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --card: #0a0a0a; 
            --accent: #00ffff; /* Ciano Neon */
            --green: #39ff14;  /* Verde Limão Neon */
            --yellow: #fff000; /* Amarelo Puro */
            --text: #ffffff; 
            --red: #ff0000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background: #000; padding: 12px; border-bottom: 3px solid var(--accent); display: flex; flex-direction: column; gap: 10px; }
        .topo { display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--accent); font-weight: 900; font-size: 22px; text-shadow: 0 0 15px var(--accent); }
        
        /* Mesas Vibrantes */
        .botoes-mesas { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .btn-mesa { background: #111; color: #fff; border: 2px solid #444; padding: 10px 15px; border-radius: 10px; font-size: 11px; font-weight: 900; min-width: 90px; text-align: center; }
        .btn-mesa.ocupada { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 10px rgba(255, 240, 0, 0.3); }
        .btn-mesa.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .btn-mesa span { display: block; font-size: 10px; color: #fff; background: rgba(0,0,0,0.5); border-radius: 4px; margin-top: 4px; }

        .main { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Campo de Bipe com Cor Forte */
        input#bipe { 
            width: 100%; 
            background: #111; 
            border: 3px solid var(--green); 
            padding: 18px; 
            border-radius: 15px; 
            color: var(--green); 
            font-size: 22px; 
            font-weight: 900; 
            outline: none; 
            margin-bottom: 15px; 
            text-shadow: 0 0 10px var(--green);
        }

        /* Painel de Fechamento */
        .painel-venda { background: #000; border: 3px solid var(--yellow); border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255, 240, 0, 0.2); }
        .btn-fechar { background: var(--red); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; box-shadow: 0 0 15px var(--red); }

        /* Tabela com Coluna de Código */
        .tabela-header { display: grid; grid-template-columns: 100px 1fr 60px 90px; padding: 10px; font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #333; }
        .lista-produtos { flex: 1; overflow-y: auto; }
        .linha-produto { 
            display: grid; 
            grid-template-columns: 100px 1fr 60px 90px; 
            padding: 16px 10px; 
            border-bottom: 2px solid #1a1a1a; 
            align-items: center; 
            font-size: 14px; 
        }
        
        .cod-txt { color: var(--yellow); font-weight: 900; letter-spacing: 1px; }
        .nome-txt { font-weight: 900; color: #fff; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .qtd-txt { text-align: center; background: #222; color: var(--green); padding: 6px; border-radius: 6px; font-weight: 900; border: 1px solid var(--green); }
        .preco-txt { text-align: right; color: var(--accent); font-weight: 900; font-size: 16px; }

        .btn-novo { background: var(--green); border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; color: #000; font-size: 12px; box-shadow: 0 0 10px var(--green); }
        #status-ws { font-size: 10px; text-align: center; padding: 5px; font-weight: 900; }
    </style>
</head>
<body>

<header>
    <div class="topo">
        <div class="logo">934 ELITE</div>
        <button class="btn-novo" onclick="cadastrar()">+ PRODUTO</button>
    </div>
    <div class="botoes-mesas" id="container-mesas"></div>
</header>

<div id="status-ws">CONECTANDO...</div>

<div class="main">
    <div id="painel-fechamento" class="painel-venda" style="display:none;">
        <p id="info-cliente" style="font-size: 14px; color: var(--yellow);"></p>
        <p id="total-mesa" style="font-size: 24px; font-weight: 900; color: var(--green);">Total: R$ 0.00</p>
        <button class="btn-fechar" onclick="fecharMesa()">CONFIRMAR PAGAMENTO</button>
    </div>

    <input type="text" id="bipe" placeholder="BIPAR PRODUTO..." autofocus>

    <div class="tabela-header">
        <span>CÓDIGO</span><span>PRODUTO</span><span style="text-align:center">EST.</span><span style="text-align:right">PREÇO</span>
    </div>
    <div class="lista-produtos" id="estoque-real"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX70Jks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.appspot.com",
        messagingSenderId: "182023728304",
        appId: "1:182023728304:web:80c8402f068c8578508f75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mesaAtiva = null;
    let dadosMesas = {};

    function atualizarMesasUI() {
        const box = document.getElementById('container-mesas');
        box.innerHTML = '';
        for(let i=1; i<=15; i++) {
            let info = dadosMesas[i] || { nome: "Livre", total: 0 };
            let classe = info.total > 0 ? "btn-mesa ocupada" : "btn-mesa";
            if(mesaAtiva == i) classe += " active";
            box.innerHTML += `<button class="${classe}" onclick="selecionarMesa(${i})">MESA ${i}<span>${info.nome}</span></button>`;
        }
    }

    function selecionarMesa(n) {
        mesaAtiva = n;
        if(!dadosMesas[n] || dadosMesas[n].total == 0) {
            let nome = prompt("Nome do Cliente:");
            if(nome) {
                dadosMesas[n] = { nome: nome.toUpperCase(), total: 0 };
                db.ref('mesas_ativas/' + n).set(dadosMesas[n]);
            } else { mesaAtiva = null; }
        }
        mostrarPainel();
        atualizarMesasUI();
        document.getElementById('bipe').focus();
    }

    function mostrarPainel() {
        const p = document.getElementById('painel-fechamento');
        if(mesaAtiva && dadosMesas[mesaAtiva] && dadosMesas[mesaAtiva].total > 0) {
            p.style.display = 'block';
            document.getElementById('info-cliente').innerText = "Cliente: " + dadosMesas[mesaAtiva].nome;
            document.getElementById('total-mesa').innerText = "Total: R$ " + dadosMesas[mesaAtiva].total.toFixed(2);
        } else { p.style.display = 'none'; }
    }

    function fecharMesa() {
        if(confirm("Deseja zerar a conta desta mesa?")) {
            db.ref('mesas_ativas/' + mesaAtiva).remove();
            mesaAtiva = null;
        }
    }

    db.ref('mesas_ativas').on('value', snap => {
        dadosMesas = snap.val() || {};
        atualizarMesasUI();
        mostrarPainel();
    });

    document.getElementById('bipe').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const cod = e.target.value;
            if(!mesaAtiva) { alert("Selecione uma mesa!"); e.target.value = ''; return; }
            db.ref('produtos/' + cod).once('value', snap => {
                const p = snap.val();
                if(p) {
                    if(p.estoque > 0) {
                        db.ref('produtos/' + cod + '/estoque').set(p.estoque - 1);
                        let novoTotal = (dadosMesas[mesaAtiva].total || 0) + parseFloat(p.preco);
                        db.ref('mesas_ativas/' + mesaAtiva + '/total').set(novoTotal);
                    } else { alert("Estoque esgotado!"); }
                } else { alert("Código não encontrado!"); }
            });
            e.target.value = '';
        }
    });

    db.ref('produtos').on('value', snap => {
        const container = document.getElementById('estoque-real');
        const dados = snap.val() || {};
        let html = '';
        Object.values(dados).sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
            html += `
                <div class="linha-produto">
                    <span class="cod-txt">${p.codigo}</span>
                    <span class="nome-txt">${p.nome}</span>
                    <span class="qtd-txt" onclick="mudarEstoque('${p.codigo}', ${p.estoque})">${p.estoque}</span>
                    <span class="preco-txt">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                </div>`;
        });
        container.innerHTML = html;
    });

    function cadastrar() {
        const cod = prompt("CÓDIGO:");
        const nome = prompt("NOME:");
        const preco = prompt("PREÇO:");
        const qtd = prompt("ESTOQUE INICIAL:");
        if(cod && nome && preco) {
            db.ref('produtos/' + cod).set({
                codigo: cod, nome: nome.toUpperCase(),
                preco: preco.replace(',', '.'), estoque: parseInt(qtd) || 0
            });
        }
    }

    function mudarEstoque(cod, atual) {
        const nova = prompt("Repor estoque para:", atual);
        if(nova !== null) db.ref('produtos/' + cod + '/estoque').set(parseInt(nova));
    }

    db.ref('.info/connected').on('value', s => {
        const st = document.getElementById('status-ws');
        st.innerText = s.val() ? "ONLINE - 934 CLOUD" : "DISPOSITIVO OFFLINE";
        st.style.color = s.val() ? var(--green) : var(--red);
    });
</script>
</body>
</html>
