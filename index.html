<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Boteco 934">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/931/931949.png">

    <title>ADM MASTER | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --card: #161b22; --green: #2ecc71; --blue: #3498db; --red: #ff4757; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .header h1 { color: var(--gold); font-size: 22px; letter-spacing: 2px; margin: 0; }
        .header p { color: #888; font-size: 11px; text-transform: uppercase; }

        .section-title { font-size: 12px; color: var(--gold); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: bold; opacity: 0.7; }

        /* Grade de Botões */
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .app-card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 18px;
            padding: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.2s;
        }
        .app-card:active { transform: scale(0.95); background: #1c222d; }
        .app-card i { font-size: 28px; margin-bottom: 10px; }
        .app-card span { font-size: 13px; font-weight: 500; }

        /* Cores Específicas */
        .c-vendas { color: var(--green); }
        .c-financeiro { color: #54a0ff; }
        .c-custo { color: var(--gold); }
        .c-estoque { color: var(--blue); }
        .c-clientes { color: #a55eea; }
        .c-devedores { color: var(--red); }

        .footer { margin-top: 40px; text-align: center; font-size: 10px; color: #444; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>BOTECO 934</h1>
        <p>Sistema de Gestão Integrado</p>
    </div>

    <div class="section-title">Operacional e Vendas</div>
    <div class="app-grid">
        <a href="vendas.html" class="app-card">
            <i class="fas fa-chart-line c-vendas"></i>
            <span>Monitor de Vendas</span>
        </a>
        <a href="produtos.html" class="app-card">
            <i class="fas fa-wine-bottle c-vendas"></i>
            <span>Produtos</span>
        </a>
    </div>

    <div class="section-title">Financeiro e Custos</div>
    <div class="app-grid">
        <a href="gestao_mensal.html" class="app-card">
            <i class="fas fa-calendar-alt c-financeiro"></i>
            <span>Gestão Mensal</span>
        </a>
        <a href="contas_cartao.html" class="app-card">
            <i class="fas fa-credit-card c-financeiro"></i>
            <span>Contas Cartão</span>
        </a>
        <a href="calculadora_custo.html" class="app-card">
            <i class="fas fa-calculator c-custo"></i>
            <span>Custo de Fardo</span>
        </a>
        <a href="calculadora.html" class="app-card">
            <i class="fas fa-hand-holding-usd c-custo"></i>
            <span>Calculadora</span>
        </a>
    </div>

    <div class="section-title">Administração</div>
    <div class="app-grid">
        <a href="estoque.html" class="app-card">
            <i class="fas fa-boxes c-estoque"></i>
            <span>Estoque Geral</span>
        </a>
        <a href="lista_clientes.html" class="app-card">
            <i class="fas fa-users c-clientes"></i>
            <span>Clientes A-Z</span>
        </a>
        <a href="devedores.html" class="app-card">
            <i class="fas fa-user-times c-devedores"></i>
            <span>Devedores</span>
        </a>
        <a href="script.html" class="app-card">
            <i class="fas fa-code" style="color:#888"></i>
            <span>Scripts/Backup</span>
        </a>
    </div>

    <div class="footer">
        Boteco 934 | Desenvolvido para iPhone & Web
    </div>
</div>

</body>
</html>
