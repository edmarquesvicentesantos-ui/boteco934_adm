<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Gestão Avançada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* CABEÇALHO ESTILO PORTAL UOL */
        header { background: #fff; border-bottom: 4px solid #ffcc00; padding: 10px 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .topo { display: flex; justify-content: space-between; align-items: center; }
        .marca { display: flex; align-items: center; gap: 12px; }
        .logo { width: 50px; height: 50px; background: #000; color: #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #ffcc00; }
        .titulo h1 { font-size: 1.5em; color: #000; letter-spacing: -1px; }
        .titulo span { font-size: 0.65em; color: #d32f2f; font-weight: bold; text-transform: uppercase; }

        /* BARRA DE NAVEGAÇÃO */
        nav { background: #111; color: #fff; display: flex; padding: 0 20px; font-size: 0.75em; font-weight: bold; }
        .nav-item { position: relative; padding: 12px 18px; cursor: pointer; border-right: 1px solid #222; }
        .nav-item:hover { background: #ffcc00; color: #000; }
        .submenu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 100; }
        .nav-item:hover .submenu { display: block; }
        .submenu button { width: 100%; padding: 12px; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 1px solid #eee; color: #333; }
        .submenu button:hover { background: #f5f5f5; }

        /* ÁREA DE TRABALHO */
        .container { display: flex; flex: 1; overflow: hidden; }
        .mesas-grid { flex: 1; padding: 20px; overflow-y: auto; background: #dfe4ea; }
        #grade { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; }
        
        .mesa { background: #fff; padding: 12px 5px; border-radius: 8px; cursor: pointer; text-align: center; border-bottom: 4px solid #ced4da; transition: 0.2s; }
        .livre { border-top: 5px solid #2e7d32; }
        .ocupada { border-top: 5px solid #c62828; background: #fff5f5; }
        .mesa-id { font-size: 0.6em; color: #999; margin-bottom: 3px; }
        .mesa-cli { font-weight: bold; font-size: 0.85em; color: #333; height: 1.2em; overflow: hidden; }
        .mesa-tot { color: #d32f2f; font-weight: bold; font-size: 0.9em; margin-top: 5px; }

        /* PAINEL DIREITO */
        .painel-lateral { width: 320px; background: #fff; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        .recibo-header { padding: 15px; border-bottom: 1px solid #eee; background: #fafafa; }
        .recibo-itens { flex: 1; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.85em; overflow-y: auto; }
        .recibo-total { padding: 20px; background: #ffcc00; color: #000; font-size: 1.3em; font-weight: 900; text-align: right; }
        
        .caixa-resumo { padding: 10px; background: #111; color: #ffcc00; font-size: 0.75em; text-align: center; border-top: 1px solid #ffcc00; }

        @media print { body * { visibility: hidden; } #recibo-print, #recibo-print * { visibility: visible; } #recibo-print { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>

    <header>
        <div class="topo">
            <div class="marca">
                <div class="logo">934</div>
                <div class="titulo">
                    <h1>Boteco 934</h1>
                    <span>Gestão & Distribuição Pro</span>
                </div>
            </div>
            <div style="text-align: center; font-size: 0.8em; color: #666;">
                Petrolina-PE | <span id="clock"></span><br>
                <strong>CAIXA ABERTO</strong>
            </div>
            <div style="font-size: 0.7em; color: #aaa; text-align: right;">v4.0 Final<br><strong>ESTÁVEL</strong></div>
        </div>
    </header>

    <nav>
        <div class="nav-item">COMANDAS / MESAS
            <div class="submenu">
                <button onclick="zerarTudo()">Zerar Todas as Mesas</button>
                <button onclick="location.reload()">Sincronizar Dados</button>
            </div>
        </div>
        <div class="nav-item">FINANCEIRO
            <div class="submenu">
                <button onclick="verRelatorio()">Ver Vendas do Dia</button>
                <button onclick="verPenduras()">Ver Lista de Penduras</button>
                <button onclick="limparVendas()">Limpar Histórico de Vendas</button>
            </div>
        </div>
        <div class="nav-item">ESTOQUE / XML
            <div class="submenu">
                <button onclick="alert('Importação XML em breve')">Importar Nota Fiscal</button>
                <button onclick="alert('Ajuste de Preços em breve')">Tabela de Preços</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="mesas-grid">
            <div id="grade"></div>
        </main>

        <aside class="painel-lateral" id="recibo-print">
            <div class="recibo-header">
                <h3 style="margin:0; font-size: 0.9em;">CUPOM DE CONFERÊNCIA</h3>
                <small id="cli-atual">Selecione uma mesa ativa</small>
            </div>
            <div class="recibo-itens" id="lista-venda"></div>
            <div class="recibo-total" id="tot-final">R$ 0,00</div>
            <div class="caixa-resumo">VENDA TOTAL HOJE: <span id="venda-dia">R$ 0,00</span></div>
        </aside>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: "Cerveja 600ml Gelada", preco: 12.00 },
            { id: 2, nome: "Cerveja 600ml Grade", preco: 10.00 },
            { id: 3, nome: "Dose de Whisky", preco: 15.00 },
            { id: 4, nome: "Cerveja Lata", preco: 6.00 },
            { id: 5, nome: "Refrigerante", preco: 6.00 },
            { id: 6, nome: "Gelo Pacote", preco: 15.00 }
        ];

        let mesas = JSON.parse(localStorage.getItem('b934_mesas')) || Array.from({ length: 24 }, (_, i) => ({
            id: i + 1, ocupada: false, cliente: "", total: 0, itens: []
        }));

        let vendasDia = JSON.parse(localStorage.getItem('b934_vendas')) || [];
        let penduras = JSON.parse(localStorage.getItem('b934_penduras')) || [];

        function salvar() {
            localStorage.setItem('b934_mesas', JSON.stringify(mesas));
            localStorage.setItem('b934_vendas', JSON.stringify(vendasDia));
            localStorage.setItem('b934_penduras', JSON.stringify(penduras));
            atualizarCaixa();
        }

        function renderizar() {
            const grade = document.getElementById('grade');
            grade.innerHTML = mesas.map(m => `
                <div class="mesa ${m.ocupada ? 'ocupada' : 'livre'}" onclick="gerenciarMesa(${m.id})">
                    <div class="mesa-id">MESA ${m.id}</div>
                    <div class="mesa-cli">${m.ocupada ? m.cliente : '---'}</div>
                    <div class="mesa-tot">${m.ocupada ? 'R$' + m.total.toFixed(2) : 'LIVRE'}</div>
                </div>
            `).join('');
            atualizarCaixa();
        }

        function gerenciarMesa(id) {
            let m = mesas.find(x => x.id === id);
            if (!m.ocupada) {
                let n = prompt("Nome do Cliente:");
                if (n) { m.ocupada = true; m.cliente = n; m.itens = []; }
            } else {
                exibirRecibo(m);
                let acao = prompt("1: + Item | 2: PAGO | 3: PENDURA | 4: Sair");
                if (acao === "1") {
                    let cod = prompt(produtos.map(p => `${p.id}: ${p.nome}`).join('\n'));
                    let p = produtos.find(i => i.id == cod);
                    if (p) { m.total += p.preco; m.itens.push({ n: p.nome, v: p.preco }); exibirRecibo(m); }
                } else if (acao === "2") {
                    vendasDia.push({ cliente: m.cliente, valor: m.total, data: new Date() });
                    fecharMesa(m);
                } else if (acao === "3") {
                    penduras.push({ cliente: m.cliente, valor: m.total, data: new Date() });
                    fecharMesa(m);
                }
            }
            salvar(); renderizar();
        }

        function fecharMesa(m) {
            m.ocupada = false; m.cliente = ""; m.total = 0; m.itens = [];
            document.getElementById('lista-venda').innerHTML = "";
            document.getElementById('cli-atual').innerText = "Mesa Finalizada";
        }

        function exibirRecibo(m) {
            document.getElementById('cli-atual').innerText = "CLIENTE: " + m.cliente;
            document.getElementById('lista-venda').innerHTML = m.itens.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.n}</span><span>${i.v.toFixed(2)}</span></div>`).join('');
            document.getElementById('tot-final').innerText = "R$ " + m.total.toFixed(2);
        }

        function atualizarCaixa() {
            let total = vendasDia.reduce((a, b) => a + b.valor, 0);
            document.getElementById('venda-dia').innerText = "R$ " + total.toFixed(2);
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }

        function verRelatorio() {
            let total = vendasDia.reduce((a, b) => a + b.valor, 0);
            alert(`Faturamento de Hoje: R$ ${total.toFixed(2)}\nTotal de Vendas: ${vendasDia.length}`);
        }

        function verPenduras() {
            if (penduras.length === 0) return alert("Nenhum pendura hoje!");
            let lista = penduras.map(p => `${p.cliente}: R$ ${p.valor.toFixed(2)}`).join('\n');
            alert("LISTA DE PENDURAS:\n\n" + lista);
        }

        function zerarTudo() { if (confirm("Zerar mesas?")) { mesas.forEach(x => { x.ocupada = false; x.cliente = ""; x.total = 0; x.itens = []; }); salvar(); renderizar(); } }
        function limparVendas() { if (confirm("Limpar histórico de vendas?")) { vendasDia = []; penduras = []; salvar(); renderizar(); } }

        setInterval(atualizarCaixa, 1000);
        renderizar();
    </script>
</body>
</html>
