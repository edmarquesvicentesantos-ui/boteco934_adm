<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV GOLD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand"><h2>Boteco 934</h2></div>
            
            <div class="mesa-seletor">
                <label>Mesa/Local:</label>
                <select id="select-mesa" onchange="trocarMesa()">
                    <option value="1">Mesa 01</option>
                    <option value="2">Mesa 02</option>
                    <option value="3">Mesa 03</option>
                    <option value="4">Mesa 04</option>
                    <option value="5">Mesa 05</option>
                    <option value="balcao">Balcão</option>
                </select>
                <input type="text" id="cliente-nome" placeholder="Nome do Cliente" readonly>
                <button class="btn-abrir" onclick="abrirMesa()">Abrir Mesa</button>
            </div>

            <nav>
                <button onclick="filtrar('bebidas')">Bebidas</button>
                <button onclick="filtrar('boticario')">Boticário</button>
                <button class="btn-add-prod" onclick="abrirModalProd()">+ Novo Produto</button>
            </nav>
            <div id="status-estoque" class="status-box"></div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <input type="text" id="busca" placeholder="Buscar produto..." oninput="buscar()">
            </header>
            <div id="grade-produtos" class="grid-produtos"></div>
        </main>

        <section class="checkout-panel">
            <h3>Consumo Atual</h3>
            <div id="carrinho-itens" class="carrinho-lista"></div>
            <div class="checkout-footer">
                <div id="total-valor">R$ 0,00</div>
                <button class="btn-fechar" onclick="abrirModalPagamento()">Fechar Recibo</button>
            </div>
        </section>
    </div>

    <div id="modal-pagamento" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Fechar Conta - Boteco 934</h3>
            <div id="info-recibo"></div>
            <hr>
            <label>Dividir por quantas pessoas?</label>
            <input type="number" id="dividir-pessoas" value="1" oninput="calcularDivisao()">
            <p id="valor-dividido"></p>
            
            <label>Forma de Pagamento:</label>
            <select id="metodo-pagamento">
                <option value="Dinheiro">Dinheiro</option>
                <option value="PIX">PIX</option>
                <option value="Cartão Débito">Cartão Débito</option>
                <option value="Cartão Crédito">Cartão Crédito</option>
                <option value="Pendura">Pendura (Fiado)</option>
            </select>
            <button class="btn-confirmar" onclick="finalizarVenda()">Confirmar Pagamento</button>
            <button class="btn-cancelar" onclick="fecharModalPagamento()">Voltar</button>
        </div>
    </div>

    <div id="modal-produto" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Cadastrar Produto</h3>
            <input type="text" id="p-nome" placeholder="Nome">
            <input type="number" id="p-estoque" placeholder="Estoque">
            <input type="number" id="p-preco" placeholder="Preço">
            <select id="p-cat">
                <option value="bebidas">Bebidas</option>
                <option value="boticario">Boticário</option>
            </select>
            <button onclick="salvarProduto()">Salvar</button>
            <button onclick="fecharModalProd()">Sair</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
