<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV Boteco 934 V4</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#020617;color:#fff}
header{text-align:center;padding:10px}
.container{display:flex;flex-wrap:wrap}
.mesas{width:30%;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mesa{padding:20px;border-radius:10px;background:green;text-align:center;cursor:pointer}
.mesa.ocupada{background:red}
.vendas{width:70%;padding:10px}
button,input{padding:10px;margin:5px;border:none;border-radius:8px}
button{background:#2563eb;color:#fff}
.box{background:#111;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<h1>PDV Boteco 934</h1>
Total: R$ <span id="totalDia">0</span>
</header>

<div class="container">

<div class="mesas" id="mesas"></div>

<div class="vendas">

<input id="clienteNome" placeholder="Cliente">
<button onclick="addCliente()">Add Cliente</button>
<div id="clientes"></div>

<input id="codigo" placeholder="Código" onkeypress="if(event.key==='Enter')buscarProduto()">
<button onclick="buscarProduto()">Add Produto</button>

<div class="box" id="lista"></div>

<button onclick="fecharMesa()">Fechar Mesa</button>

<div class="box" id="historico"></div>

</div>

</div>

<script>

// 🔥 COLE AQUI SUA CONFIG DO FIREBASE
const firebaseConfig = {
 apiKey: "COLE_AQUI",
 authDomain: "COLE_AQUI",
 projectId: "COLE_AQUI",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let mesas=[], caixa=[], produtos=[
{codigo:'1',nome:'Cerveja',preco:6,estoque:100},
{codigo:'2',nome:'Whisky',preco:10,estoque:50}
];

let mesaAtual=null, clienteAtual=null;

function criarMesas(){
let m=document.getElementById('mesas');
for(let i=1;i<=12;i++){
mesas[i]={clientes:[],ocupada:false};
let d=document.createElement('div');
d.className='mesa';
d.innerText='Mesa '+i;
d.onclick=()=>{mesaAtual=i};
m.appendChild(d);
}
}

function addCliente(){
let nome=clienteNome.value;
mesas[mesaAtual].clientes.push({nome,consumo:[]});
}

function buscarProduto(){
let cod=codigo.value;
let p=produtos.find(x=>x.codigo==cod);
if(p && p.estoque>0){
p.estoque--;
mesas[mesaAtual].clientes[0].consumo.push(p);
}
}

function fecharMesa(){
let total=0;
mesas[mesaAtual].clientes.forEach(c=>{
c.consumo.forEach(p=> total+=p.preco);
});

caixa.push({total});
db.collection("vendas").add({total});

document.getElementById('totalDia').innerText=total;
}

criarMesas();

</script>

</body>
</html>
