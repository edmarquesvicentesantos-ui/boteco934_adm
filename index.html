<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - PDV Profissional</title>
    <style>
        :root { --bg: #000; --gold: #d4af37; --green: #00ff88; --border: #1a1a1a; --danger: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding: 10px; margin-bottom: 15px; }
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #000; border: 1px solid var(--border); color: #666; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* MESAS */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .mesa-recibo { background: #050505; border: 1px solid var(--green); border-radius: 6px; display: flex; flex-direction: column; min-height: 420px; position: relative; }
        .mesa-recibo.ocupada { border-color: var(--danger); }
        .recibo-itens { flex-grow: 1; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; color: #ccc; overflow-y: auto; }
        
        /* MODAL DE PAGAMENTO */
        #modal-pagamento { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; 
        }
        .modal-content { background: #0a0a0a; border: 1px solid var(--gold); padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; text-align: center; }
        
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--gold); margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-pg { background: var(--green); color: #000; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color:var(--gold); margin:0; font-size:18px;">BOTECO 934 - CAIXA</h1>
    <div id="relogio" style="color:var(--gold); font-family:monospace;"></div>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="ver('mesas')">Mesas</button>
    <button class="tab-btn" onclick="ver('estoque_tab')">Estoque</button>
</div>

<div id="mesas" class="content-section active">
    <div class="grid-mesas" id="grid_mesas"></div>
</div>

<div id="modal-pagamento">
    <div class="modal-content">
        <h2 style="color:var(--gold); margin-top:0;">FECHAR CONTA</h2>
        <div id="detalhes-pg" style="margin-bottom:20px; font-size:18px;"></div>
        
        <label style="font-size:10px; color:#888; display:block; text-align:left;">DIVIDIR PARA QUANTAS PESSOAS?</label>
        <input type="number" id="split_pessoas" value="1" min="1" oninput="calcularDivisao()">
        
        <div id="valor-dividido" style="color:var(--gold); font-weight:bold; margin-bottom:15px;"></div>

        <label style="font-size:10px; color:#888; display:block; text-align:left;">FORMA DE PAGAMENTO</label>
        <select id="forma_pg">
            <option value="PIX">PIX</option>
            <option value="CARTÃO">CARTÃO</option>
            <option value="DINHEIRO">DINHEIRO</option>
        </select>

        <button class="btn btn-pg" onclick="finalizarTudo()">CONFIRMAR PAGAMENTO</button>
        <button class="btn" style="background:transparent; color:#666; margin-top:10px;" onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<div id="estoque_tab" class="content-section">
    <div style="background:#0a0a0a; padding:20px; border:1px solid var(--border); border-radius:8px;">
        <input type="text" id="p_ean" placeholder="Código de Barras">
        <input type="text" id="p_nome" placeholder="Nome do Produto">
        <input type="number" id="p_preco" placeholder="Preço Venda" step="0.01">
        <input type="number" id="p_qtd" placeholder="Qtd Estoque">
        <button class="btn" style="background:var(--gold)" onclick="addEstoque()">SALVAR PRODUTO</button>
    </div>
</div>

<script>
    let estoque = JSON.parse(localStorage.getItem('b934_estoque')) || [];
    let mesas = Array.from({ length: 8 }, (_, i) => ({ id: i + 1, cliente: '', consumo: {}, status: 'Livre', total: 0 }));
    let mesaSendoFechada = null;

    function ver(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'mesas') desenharMesas();
    }

    function desenharMesas() {
        const grid = document.getElementById('grid_mesas');
        grid.innerHTML = mesas.map(m => {
            let soma = 0;
            let itensHtml = "";
            for (let n in m.consumo) {
                const it = m.consumo[n];
                const sub = it.qtd * it.preco;
                soma += sub;
                itensHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${it.qtd}x ${n}</span><span>${sub.toFixed(2)}</span>
                </div>`;
            }
            m.total = soma;
            return `
                <div class="mesa-recibo ${m.status === 'Ocupada' ? 'ocupada' : ''}">
                    <div style="padding:10px; border-bottom:1px dashed #222; text-align:center;" onclick="setCliente(${m.id})">
                        <b style="color:var(--gold)">MESA 0${m.id}</b><br>
                        <small>${m.cliente || 'CLIQUE PARA NOME'}</small>
                    </div>
                    <div class="recibo-itens">${itensHtml || '<div style="text-align:center; opacity:0.1; margin-top:100px;">BOTECO 934</div>'}</div>
                    <div style="padding:10px; background:#0a0a0a; border-top:1px solid var(--border);">
                        <input type="text" style="margin:0; font-size:12px;" placeholder="Bipe aqui..." onchange="bipar(this, ${m.id})">
                    </div>
                    <div style="padding:15px; background:#0a0a0a; border-top:1px dashed #222;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <small>TOTAL</small><span style="font-size:22px; color:var(--green); font-weight:bold;">R$ ${soma.toFixed(2)}</span>
                        </div>
                        <button class="btn" style="background:var(--gold); color:#000; margin-top:10px;" onclick="abrirModalPagamento(${m.id})">FECHAR CONTA</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function abrirModalPagamento(id) {
        const m = mesas.find(x => x.id === id);
        if(m.total <= 0) return alert("Mesa sem consumo.");
        mesaSendoFechada = m;
        document.getElementById('modal-pagamento').style.display = 'flex';
        document.getElementById('detalhes-pg').innerHTML = `Cliente: <b>${m.cliente}</b><br>Total: <b style="color:var(--green)">R$ ${m.total.toFixed(2)}</b>`;
        calcularDivisao();
    }

    function calcularDivisao() {
        const pessoas = document.getElementById('split_pessoas').value || 1;
        const valorCada = mesaSendoFechada.total / pessoas;
        document.getElementById('valor-dividido').innerText = `Fica R$ ${valorCada.toFixed(2)} para cada.`;
    }

    function finalizarTudo() {
        const forma = document.getElementById('forma_pg').value;
        const pessoas = document.getElementById('split_pessoas').value;
        
        alert(`CONTA FECHADA!\n\nMesa: ${mesaSendoFechada.id}\nTotal: R$ ${mesaSendoFechada.total.toFixed(2)}\nPagamento: ${forma}\nDividido em: ${pessoas}x`);
        
        mesaSendoFechada.status = 'Livre';
        mesaSendoFechada.cliente = '';
        mesaSendoFechada.consumo = {};
        mesaSendoFechada.total = 0;
        
        fecharModal();
        desenharMesas();
    }

    function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

    function bipar(input, mesaId) {
        const busca = input.value.toUpperCase();
        const p = estoque.find(x => x.ean === busca || x.nome === busca);
        if(p && p.qtd > 0) {
            const m = mesas.find(x => x.id === mesaId);
            if(!m.cliente) m.cliente = prompt("Nome do Cliente:");
            if(m.consumo[p.nome]) m.consumo[p.nome].qtd++;
            else m.consumo[p.nome] = { qtd: 1, preco: p.preco };
            p.qtd--; m.status = 'Ocupada';
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
            desenharMesas();
        }
        input.value = ''; input.focus();
    }

    function setCliente(id) { 
        const m = mesas.find(x => x.id === id); 
        const n = prompt("Nome do Cliente:"); 
        if(n) { m.cliente = n; desenharMesas(); } 
    }

    function addEstoque() {
        const n = document.getElementById('p_nome').value.toUpperCase();
        const p = parseFloat(document.getElementById('p_preco').value);
        const q = parseInt(document.getElementById('p_qtd').value);
        const e = document.getElementById('p_ean').value;
        if(n && p) {
            estoque.push({ ean: e, nome: n, preco: p, qtd: q });
            localStorage.setItem('b934_estoque', JSON.stringify(estoque));
            alert("Produto Salvo!");
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    desenharMesas();
</script>
</body>
</html>
