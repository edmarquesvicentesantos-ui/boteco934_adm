<script>
    function navegar(pagina, elemento) {
        const iframe = document.getElementById('tela-principal');
        
        // Adiciona um pequeno carregamento para evitar o erro visual
        iframe.style.opacity = '0.5';
        
        // Tenta carregar a página
        iframe.src = pagina;

        iframe.onload = function() {
            iframe.style.opacity = '1';
        };

        // Atualiza o visual do menu lateral
        const itens = document.querySelectorAll('.nav-item');
        itens.forEach(item => item.classList.remove('active'));
        elemento.classList.add('active');
    }
</script>
