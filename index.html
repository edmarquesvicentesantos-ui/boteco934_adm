<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boteco 934 - Gestão Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Cabeçalho com Botões Pequenos */
        header { background: #000; padding: 10px 15px; border-bottom: 1px solid #1e293b; display: flex; flex-direction: column; gap: 10px; }
        .topo-info { display: flex; justify-content: space-between; align-items: center; }
        .botoes-nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        
        .btn-sm { background: #1e293b; color: var(--text); border: 1px solid #334155; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .btn-sm.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-add { background: var(--green); color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; }

        /* Área de Venda e Estoque */
        .main-content { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        input#bipe { background: #111827; border: 1px solid #374151; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; outline: none; margin-bottom: 5px; }

        /* Tabela de Estoque Profissional */
        .tabela-estoque { background: var(--card); border-radius: 10px; border: 1px solid #1e293b; width: 100%; }
        .item-estoque { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1e293b; font-size: 12px; gap: 10px; }
        .item-estoque:last-child { border-bottom: none; }
        
        .col-nome { flex: 1; font-weight: bold; color: #cbd5e1; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; }
        .col-qtd { width: 60px; text-align: center; background: #1e293b; color: var(--accent); padding: 4px; border-radius: 4px; font-weight: 800; border: 1px solid #334155; }
        .col-preco { width: 75px; text-align: right; color: var(--green); font-weight: 800; }

        #status-con { font-size: 9px; font-weight: bold; text-align: center; padding: 2px; }
    </style>
</head>
<body>

<header>
    <div class="topo-info">
        <h2 style="color:var(--accent); font-size: 18px; font-weight: 900;">934 ELITE</h2>
        <button class="btn-add" onclick="cadastrar()">+ NOVO</button>
    </div>
    
    <div class="botoes-nav" id="btn-mesas">
        </div>
</header>

<div id="status-con">CONECTANDO...</div>

<div class="main-content">
    <input type="text" id="bipe" placeholder="Bipar código de barras..." autofocus>
    
    <div style="display: flex; justify-content: space-between; font-size: 10px; color: #64748b; padding: 0 10px; font-weight: bold;">
        <span>PRODUTO</span>
        <div style="display: flex; gap: 35px;">
            <span>ESTOQUE</span>
            <span>PREÇO</span>
        </div>
    </div>

    <div class="tabela-estoque" id="lista-estoque">
        <p style="text-align:center; padding: 20px; color:#64748b;">Sincronizando banco de dados...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX70Jks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.appspot.com",
        messagingSenderId: "182023728304",
        appId: "1:182023728304:web:80c8402f068c8578508f75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Gerar Mesas Pequenas no Topo
    const navMesas = document.getElementById('btn-mesas');
    for(let i=1; i<=12; i++) {
        navMesas.innerHTML += `<button class="btn-sm" id="m${i}" onclick="selMesa(${i})">M${i}</button>`;
    }

    let mesaAtiva = null;
    function selMesa(n) {
        mesaAtiva = n;
        document.querySelectorAll('.btn-sm').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+n).classList.add('active');
        document.getElementById('bipe').focus();
    }

    // Monitor de Conexão
    db.ref('.info/connected').on('value', s => {
        const el = document.getElementById('status-con');
        if(s.val()) { el.innerText = "SISTEMA SINCRONIZADO ✅"; el.style.color = "#22c55e"; }
        else { el.innerText = "OFFLINE ❌"; el.style.color = "#ef4444"; }
    });

    // Listar Estoque com Quantidade
    db.ref('produtos').on('value', snap => {
        const container = document.getElementById('lista-estoque');
        const dados = snap.val() || {};
        let html = '';
        
        Object.values(dados).sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
            let preco = parseFloat(p.preco) || 0;
            let qtd = p.estoque || 0; // Se não existir estoque, mostra 0

            html += `
                <div class="item-estoque">
                    <div class="col-nome">${p.nome}</div>
                    <div class="col-qtd" onclick="editarEstoque('${p.codigo}', ${qtd})">${qtd}</div>
                    <div class="col-preco">R$ ${preco.toFixed(2)}</div>
                </div>
            `;
        });
        container.innerHTML = html || '<p style="padding:20px; text-align:center;">Estoque vazio.</p>';
    });

    function cadastrar() {
        const cod = prompt("Código:");
        const nome = prompt("Nome:");
        const preco = prompt("Preço:");
        const qtd = prompt("Quantidade em Estoque:");
        if(cod && nome && preco) {
            db.ref('produtos/' + cod).set({
                codigo: cod,
                nome: nome.toUpperCase(),
                preco: preco.replace(',', '.'),
                estoque: parseInt(qtd) || 0
            });
        }
    }

    // Função para editar estoque rapidamente clicando no número
    function editarEstoque(cod, atual) {
        const novaQtd = prompt("Nova quantidade em estoque:", atual);
        if(novaQtd !== null) {
            db.ref('produtos/' + cod + '/estoque').set(parseInt(novaQtd));
        }
    }
</script>

</body>
</html>
