<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - PDV</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="topo">
        <h1>Boteco 934</h1>
        <div class="controles-topo">
            <select id="select-mesa"><option value="1">Mesa 01</option><option value="balcao">Balcão</option></select>
            <input type="text" id="cliente-nome" placeholder="Nome do Cliente">
            <button onclick="abrirModal('modal-financeiro')" class="btn-azul">📊 Finanças</button>
            <button onclick="abrirModal('modal-nota')" class="btn-ciano">📑 Notas</button>
            <button onclick="abrirModal('modal-produto')" class="btn-branco">➕ Novo Produto</button>
        </div>
    </div>

    <div id="grade-produtos" class="grade"></div>

    <div class="consumo-container">
        <h3>Consumo</h3>
        <div id="lista-carrinho"></div>
        <p class="total-texto">Total: R$ <span id="total-venda">0,00</span></p>
        <button onclick="abrirModal('modal-pagamento')" class="btn-fechar">Fechar Recibo</button>
    </div>

    <div id="modal-financeiro" class="modal">
        <div class="modal-content">
            <h3>Fluxo de Caixa / Finanças</h3>
            <p>Dinheiro: R$ <span id="f-dinheiro">0,00</span></p>
            <p>PIX: R$ <span id="f-pix">0,00</span></p>
            <p style="color:red">Pendura (Fiado): R$ <span id="f-pendura">0,00</span></p>
            <button onclick="fecharModal('modal-financeiro')">Fechar</button>
        </div>
    </div>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h3>Cadastrar Novo Produto</h3>
            <input type="text" id="p-nome" placeholder="Nome do Produto">
            <input type="number" id="p-preco" placeholder="Preço">
            <button onclick="salvarProduto()">Gravar</button>
            <button onclick="fecharModal('modal-produto')">Sair</button>
        </div>
    </div>

    <div id="modal-pagamento" class="modal">
        <div class="modal-content">
            <h3>Finalizar Venda</h3>
            <select id="metodo-final"><option>Dinheiro</option><option>PIX</option><option>Pendura</option></select>
            <button onclick="finalizarVenda()">Confirmar Pagamento</button>
            <button onclick="fecharModal('modal-pagamento')">Voltar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
