<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - GESTÃO ESTRATÉGICA</title>
    <style>
        :root {
            --gold: #ffcc00;
            --blue: #00d4ff;
            --bg: #050505;
            --glass: rgba(18, 18, 18, 0.9);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; }

        header { 
            background: var(--gold); padding: 15px 30px; color: #000; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 25px rgba(255, 204, 0, 0.3);
        }

        nav { 
            background: rgba(20, 20, 20, 0.95); display: flex; 
            border-bottom: 1px solid var(--card-border); sticky; top: 0; z-index: 1000;
        }

        .nav-item { 
            padding: 20px 25px; cursor: pointer; color: #666; 
            font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
        }

        .nav-item.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .container { padding: 30px; max-width: 1300px; margin: auto; }
        .secao { display: none; }
        .ativa { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CALCULADORA DE PRECIFICAÇÃO (SISTEMA PREMIUM) --- */
        .card-gestao {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--card-border);
            max-width: 700px; margin: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .card-gestao h2 { color: var(--gold); text-align: center; margin-bottom: 30px; text-transform: uppercase; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        input {
            background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff;
            padding: 18px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold;
        }

        input:focus { border-color: var(--gold); outline: none; }

        .res-painel {
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 20px;
            border-left: 10px solid var(--gold); margin-top: 30px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
        }

        .res-item p { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .res-item h3 { font-size: 24px; font-weight: 900; }
        .res-destaque { font-size: 40px !important; color: var(--gold); }

        /* --- PDV --- */
        .pdv-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card-prod {
            background: #fff; color: #000; padding: 15px; border-radius: 12px;
            text-align: center; font-weight: 900; cursor: pointer; min-height: 115px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .card-prod span { color: #2b579a; font-size: 1.3em; margin-top: 5px; }
    </style>
</head>

<header>

    <div class="nav-item" onclick="mudar('estoque', this)">📦 Produtos</div>
</nav>
