<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>934 - CAIXA PDV</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0b0b0b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        /* Lado Esquerdo: Mesas e Produtos */
        .painel-venda { flex: 1; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .mesa { background: #222; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .mesa.ocupada { background: #4a0000; border-color: #ff4444; }
        .mesa.selecionada { border-color: var(--gold); }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .prod-btn { background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        /* Lado Direito: Cupom */
        .cupom { width: 350px; background: #fff; color: #000; padding: 20px; display: flex; flex-direction: column; }
        .btn-fechar { background: #25d366; color: #fff; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: auto; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="painel-venda">
        <h2 style="color:var(--gold)">MESAS</h2>
        <div id="gridMesas" class="grid-mesas"></div>
        <h2 style="color:var(--gold)">BEBIDAS / MERCADORIAS</h2>
        <div id="vitrineVendas" class="vitrine"></div>
    </div>
    <div class="cupom">
        <h3 id="hMesa">Selecione uma mesa</h3>
        <div id="listaItens" style="flex: 1; border-top: 1px solid #ddd; padding-top: 10px;"></div>
        <hr>
        <h2>TOTAL: R$ <span id="totalVenda">0,00</span></h2>
        <button class="btn-fechar" onclick="finalizar()">FECHAR CONTA (WHATSAPP)</button>
    </div>

    <script>
        let mSel = null;
        let mesas = JSON.parse(localStorage.getItem('mesas_934')) || {};
        let estoque = JSON.parse(localStorage.getItem('boteco_est')) || [];

        function init() {
            const grid = document.getElementById('gridMesas');
            for(let i=1; i<=20; i++) {
                if(!mesas[i]) mesas[i] = { ocupada: false, itens: [], total: 0 };
                grid.innerHTML += `<div class="mesa ${mesas[i].ocupada?'ocupada':''}" id="m${i}" onclick="selMesa(${i})">M${i}</div>`;
            }
            renderVitrine();
        }

        function selMesa(n) {
            mSel = n;
            document.querySelectorAll('.mesa').forEach(m => m.classList.remove('selecionada'));
            document.getElementById(`m${n}`).classList.add('selecionada');
            document.getElementById('hMesa').innerText = "Mesa " + n;
            if(!mesas[n].ocupada) { 
                if(confirm("Abrir mesa " + n + "?")) { mesas[n].ocupada = true; document.getElementById(`m${n}`).classList.add('ocupada'); }
            }
            atualizarLista();
        }

        function renderVitrine() {
            const v = document.getElementById('vitrineVendas');
            v.innerHTML = estoque.map(p => `<div class="prod-btn" onclick="add('${p.nome}', ${p.venda})">${p.nome}<br>R$ ${p.venda.toFixed(2)}</div>`).join('');
        }

        function add(n, v) {
            if(!mSel) return alert("Selecione a mesa!");
            mesas[mSel].itens.push({ n, v });
            mesas[mSel].total += v;
            atualizarLista();
            localStorage.setItem('mesas_934', JSON.stringify(mesas));
        }

        function atualizarLista() {
            if(!mSel) return;
            document.getElementById('listaItens').innerHTML = mesas[mSel].itens.map(i => `<div>${i.n} - R$ ${i.v.toFixed(2)}</div>`).join('');
            document.getElementById('totalVenda').innerText = mesas[mSel].total.toFixed(2);
        }

        function finalizar() {
            const msg = `*BOTECO 934*%0AMesa ${mSel}%0ATotal: R$ ${mesas[mSel].total.toFixed(2)}`;
            window.open(`https://wa.me/?text=${msg}`);
            mesas[mSel] = { ocupada: false, itens: [], total: 0 };
            document.getElementById(`m${mSel}`).classList.remove('ocupada');
            localStorage.setItem('mesas_934', JSON.stringify(mesas));
            location.reload();
        }
        init();
    </script>
</body>
</html>
