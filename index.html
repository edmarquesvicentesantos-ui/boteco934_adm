<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA BOTECO 934</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --info: #3498db; --accent: #f1c40f; --danger: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); }
        nav { background: #2c3e50; display: flex; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .nav-btn.active { background: #1abc9c; color: white; border-bottom: 3px solid var(--accent); }
        main { flex: 1; position: relative; }
        .tela { display: none; width: 100%; height: 100%; position: absolute; background: #f4f7f6; }
        .tela-ativa { display: flex !important; }
        .col { height: 100%; overflow-y: auto; background: white; border-right: 1px solid #ddd; padding: 10px; }
        .mesa-btn { width: 100%; padding: 15px 5px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; background: white; }
        .mesa-ocupada { background: #fff9db; border-color: var(--accent); color: #d35400; }
        .mesa-sel { background: var(--primary); color: white; border-color: var(--primary); }
        .grid-p { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        .card-p { border: 1px solid #eee; padding: 15px 5px; text-align: center; border-radius: 8px; cursor: pointer; background: white; font-size: 11px; font-weight: bold; }
        .cli-box { background: #f0f7ff; padding: 8px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid var(--info); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<header><strong>BOTECO 934</strong> <div id="clock">00:00:00</div></header>

<nav>
    <button class="nav-btn active" onclick="ver('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="ver('estoque', this)">Estoque</button>
    <button class="nav-btn" onclick="ver('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="ver('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela tela-ativa">
        <div class="col" style="width: 120px;" id="render-mesas"></div>
        <div class="col" style="flex: 1;">
            <select id="select-cli" style="width:100%; padding:12px; margin-bottom:15px; border:2px solid var(--info);"></select>
            <div id="render-prods" class="grid-p"></div>
        </div>
        <div class="col" style="width: 280px;">
            <h3 id="txt-mesa" style="text-align:center;">Mesa Livre</h3>
            <div id="render-itens" style="flex:1; margin:15px 0;"></div>
            <h2>Total: R$ <span id="txt-total">0.00</span></h2>
            <button onclick="pagar()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">FECHAR CONTA</button>
        </div>
    </div>

    <div id="estoque" class="tela" style="padding:20px; flex-direction:column;">
        <h2>📦 Cadastro de Produtos</h2>
        <div style="margin:15px 0;">
            <input type="text" id="in-pn" placeholder="Nome">
            <input type="number" id="in-pp" placeholder="Preço">
            <button onclick="addP()">Adicionar</button>
        </div>
        <table id="tab-p"><thead><tr><th>Item</th><th>Preço</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="clientes" class="tela" style="padding:20px; flex-direction:column;">
        <h2>👥 Cadastro de Clientes</h2>
        <div style="margin:15px 0;">
            <input type="text" id="in-cn" placeholder="Nome do Cliente">
            <button onclick="addC()">OK</button>
        </div>
        <table id="tab-c"><thead><tr><th>Nome</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="caixa" class="tela" style="padding:20px; flex-direction:column;">
        <h2>💰 Financeiro</h2>
        <div id="resumo" style="display:flex; gap:10px; margin:15px 0;"></div>
        <table id="tab-h"><thead><tr><th>Hora</th><th>Mesa</th><th>Total</th><th>Tipo</th></tr></thead><tbody></tbody></table>
        <button onclick="reset()" style="margin-top:20px; color:red; border:none; background:none; cursor:pointer;">⚠️ Limpar Sistema</button>
    </div>
</main>

<script>
    // Se der erro nos dados antigos, ele começa do zero
    function getDB(key, defaultVal) {
        try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : defaultVal;
        } catch (e) { return defaultVal; }
    }

    let PRODS = getDB('b934_prods', [{n:"Cerveja LN", p:16.0}]);
    let CLIS = getDB('b934_clis', [{n:"Balcão"}]);
    let FIN = getDB('b934_fin', { DINHEIRO: 0, PIX: 0, CARTAO: 0 });
    let HIST = getDB('b934_hist', []);
    let MESAS = Array.from({length:12}, (_, i) => ({id: i+1, consumo: {}, total: 0, status: 'livre'}));
    let ATIVA = null;

    function salvar() {
        localStorage.setItem('b934_prods', JSON.stringify(PRODS));
        localStorage.setItem('b934_clis', JSON.stringify(CLIS));
        localStorage.setItem('b934_fin', JSON.stringify(FIN));
        localStorage.setItem('b934_hist', JSON.stringify(HIST));
    }

    function ver(id, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('tela-ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('tela-ativa');
        btn.classList.add('active');
        if(id === 'vendas') renderV();
        if(id === 'estoque') renderE();
        if(id === 'clientes') renderC();
        if(id === 'caixa') renderCX();
    }

    function renderV() {
        document.getElementById('render-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa-btn ${m.status==='ocupada'?'mesa-ocupada':''} ${ATIVA===m.id?'mesa-sel':''}" onclick="setMesa(${m.id})">MESA ${m.id}<br>R$ ${m.total.toFixed(2)}</div>`).join('');
        document.getElementById('render-prods').innerHTML = PRODS.map((p, i) => `<div class="card-p" onclick="addV(${i})">${p.n}<br>R$ ${p.p.toFixed(2)}</div>`).join('');
        document.getElementById('select-cli').innerHTML = CLIS.map(c => `<option value="${c.n}">${c.n}</option>`).join('');
    }
