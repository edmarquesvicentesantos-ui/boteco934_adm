<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTOQUE | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; color: var(--gold); margin-bottom: 25px; text-transform: uppercase; }
        
        /* Estilo das Categorias */
        .categoria-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .categoria-titulo { color: var(--gold); font-weight: bold; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
        
        /* Inputs Flexíveis */
        .grid-item { display: grid; grid-template-columns: 1fr 80px 80px; gap: 10px; margin-bottom: 10px; }
        input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 5px; font-size: 14px; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn-salvar { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-voltar { display: block; text-align: center; color: #94a3b8; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-boxes"></i> GESTÃO DE PRODUTOS</h2>
    </div>

    <div class="categoria-card">
        <div class="categoria-titulo"><i class="fas fa-beer"></i> CERVEJAS</div>
        <div class="grid-item">
            <span><b>Produto</b></span> <span><b>Custo</b></span> <span><b>Venda</b></span>
        </div>
        <div class="grid-item">
            <input type="text" placeholder="Ex: Heineken 600ml">
            <input type="text" placeholder="R$">
            <input type="text" placeholder="R$">
        </div>
        <div class="grid-item">
            <input type="text" placeholder="Ex: Skol Lata">
            <input type="text" placeholder="R$">
            <input type="text" placeholder="R$">
        </div>
        <div id="maisCervejas"></div>
    </div>

    <div class="categoria-card">
        <div class="categoria-titulo"><i class="fas fa-glass-whiskey"></i> DOSES / MIX</div>
        <div class="grid-item">
            <input type="text" placeholder="Ex: Dose de Cana">
            <input type="text" placeholder="R$">
            <input type="text" placeholder="R$">
        </div>
        <div class="grid-item">
            <input type="text" placeholder="Ex: Dose de Whisky">
            <input type="text" placeholder="R$">
            <input type="text" placeholder="R$">
        </div>
    </div>

    <div class="categoria-card">
        <div class="categoria-titulo"><i class="fas fa-utensils"></i> PETISCOS</div>
        <div class="grid-item">
            <input type="text" placeholder="Ex: Porção Batata">
            <input type="text" placeholder="R$">
            <input type="text" placeholder="R$">
        </div>
    </div>

    <button class="btn-salvar" onclick="alert('Dados salvos no sistema local!')">
        <i class="fas fa-save"></i> SALVAR PREÇOS NO SISTEMA
    </button>

    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> VOLTAR AO MENU</a>
</div>

</body>
</html>
