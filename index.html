<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* BARRA LATERAL ESQUERDA (BOTÕES) */
        .sidebar-left { width: 15%; background: #1a1a1a; border-right: 2px solid #ffcc00; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .btn-side { background: #333; color: #ffcc00; border: 1px solid #444; padding: 15px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8em; }
        .btn-side:hover { background: #ffcc00; color: black; }

        /* CENTRO (MESAS E LOGO) */
        .main-content { width: 55%; padding: 20px; overflow-y: auto; position: relative; }
        .bg-logo-suave { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0.05; width: 300px; filter: grayscale(1); z-index: -1;
        }
        #grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .card-mesa { padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .status-livre { background: #2e7d32; }
        .status-ocupada { background: #c62828; }

        /* LADO DIREITO (RECIBO) */
        .sidebar-right { width: 30%; background: #f9f9f9; color: #333; padding: 15px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .recibo-header { border-bottom: 2px dashed #ccc; padding-bottom: 10px; text-align: center; margin-bottom: 10px; }
        .recibo-corpo { flex-grow: 1; font-family: 'Courier New', monospace; font-size: 0.9em; overflow-y: auto; }
        .recibo-footer { border-top: 2px dashed #ccc; padding-top: 10px; font-weight: bold; font-size: 1.2em; text-align: right; }
    </style>
</head>
<body>

    <aside class="sidebar-left">
        <div style="color: #ffcc00; font-weight: bold; margin-bottom: 20px; text-align: center;">MENU</div>
        <button class="btn-side" onclick="renderizar()">🔄 Atualizar</button>
        <button class="btn-side" onclick="zerarSistema()">🧹 Zerar Dia</button>
        <button class="btn-side" onclick="alert('Módulo Boticário em breve!')">💄 Boticário</button>
        <button class="btn-side" onclick="alert('Relatórios em breve!')">📊 Vendas</button>
    </aside>

    <main class="main-content">
        <div class="bg-logo-suave">LOGO</div>
        <h2 style="color: #ffcc00; margin-bottom: 20px;">Painel de Mesas</h2>
        <div id="grid-mesas"></div>
    </main>

    <aside class="sidebar-right">
        <div class="recibo-header">
            <h3>BOTECO 934</h3>
            <p>Distribuidora & Bar</p>
            <p id="recibo-data"></p>
        </div>
        <div class="recibo-corpo" id="detalhes-recibo">
            <p style="text-align: center; color: #999;">Selecione uma mesa ocupada para ver o recibo</p>
        </div>
        <div class="recibo-footer">
            Total: <span id="recibo-total">R$ 0,00</span>
        </div>
    </aside>

    <script>
        const produtos = [
            { id: 1, nome: "Cerveja 600ml Gelada", preco: 12.00 },
            { id: 2, nome: "Cerveja 600ml Grade", preco: 9.50 },
            { id: 3, nome: "Dose Whisky", preco: 12.00 },
            { id: 4, nome: "Refrigerante", preco: 6.00 },
            { id: 5, nome: "Gelo Pacote", preco: 15.00 }
        ];

        let mesas = JSON.parse(localStorage.getItem('boteco_v3')) || Array.from({ length: 15 }, (_, i) => ({
            id: i + 1, ocupada: false, cliente: "", total: 0, itens: []
        }));

        function salvar() { localStorage.setItem('boteco_v3', JSON.stringify(mesas)); }

        function renderizar() {
            document.getElementById('recibo-data').innerText = new Date().toLocaleDateString();
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = mesas.map(m => `
                <div class="card-mesa ${m.ocupada ? 'status-ocupada' : 'status-livre'}" onclick="gerenciar(${m.id})">
                    <div class="mesa-header">MESA ${m.id}</div>
                    <div class="mesa-body">${m.ocupada ? m.cliente : 'LIVRE'}</div>
                    <div class="mesa-valor">${m.ocupada ? 'R$ ' + m.total.toFixed(2) : ''}</div>
                </div>
            `).join('');
        }

        function gerenciar(id) {
            let mesa = mesas.find(m => m.id === id);
            if (!mesa.ocupada) {
                let n = prompt("Nome do Cliente:");
                if (n) { mesa.ocupada = true; mesa.cliente = n; mesa.itens = []; }
            } else {
                atualizarRecibo(mesa);
                let op = prompt("1: Adicionar Item | 2: PAGO | 3: PENDURA | 4: Sair");
                if (op === "1") {
                    let lista = produtos.map(p => `${p.id}: ${p.nome}`).join('\n');
                    let cod = prompt("CÓDIGO:\n" + lista);
                    let p = produtos.find(item => item.id == cod);
                    if (p) {
                        mesa.total += p.preco;
                        mesa.itens.push({ nome: p.nome, preco: p.preco });
                        atualizarRecibo(mesa);
                    }
                } else if (op === "2" || op === "3") {
                    mesa.ocupada = false; mesa.cliente = ""; mesa.total = 0; mesa.itens = [];
                    document.getElementById('detalhes-recibo').innerHTML = "<p>Mesa Finalizada!</p>";
                }
            }
            salvar(); renderizar();
        }

        function atualizarRecibo(mesa) {
            const corpo = document.getElementById('detalhes-recibo');
            corpo.innerHTML = `<strong>CLIENTE: ${mesa.cliente}</strong><br><br>` + 
                mesa.itens.map(i => `<div>${i.nome.padEnd(20, '.')} R$ ${i.preco.toFixed(2)}</div>`).join('');
            document.getElementById('recibo-total').innerText = "R$ " + mesa.total.toFixed(2);
        }

        function zerarSistema() {
            if (confirm("Limpar tudo?")) {
                mesas.forEach(m => { m.ocupada = false; m.cliente = ""; m.total = 0; m.itens = []; });
                salvar(); renderizar();
            }
        }
        renderizar();
    </script>
</body>
</html>
