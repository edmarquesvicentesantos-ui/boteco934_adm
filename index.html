<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - GESTÃO E CONTATOS</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --i: #3498db; --a: #f1c40f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--a); }
        nav { background: #2c3e50; display: flex; height: 50px; flex-shrink: 0; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); border-bottom: 4px solid var(--a); }
        main { flex: 1; position: relative; overflow: hidden; }
        .tela { display: none; width: 100%; height: 100%; position: absolute; padding: 15px; }
        .ativa { display: flex !important; }
        
        .col-mesas { width: 130px; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; padding: 5px; }
        .col-central { flex: 1; padding: 0 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .col-resumo { width: 320px; background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        
        .mesa-card { width: 100%; padding: 15px 5px; margin-bottom: 8px; border: 2px solid #eee; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        .mesa-card.ocupada { background: #fff9db; border-color: var(--a); color: #d35400; }
        .mesa-card.sel { background: var(--p) !important; color: white !important; }
        
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .prod-btn { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 6px; width: 100%; font-size: 14px; margin-bottom: 10px; }
        .btn-acao { padding: 15px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<header><strong>BOTECO 934</strong> <div id="relogio">00:00:00</div></header>

<nav>
    <button class="nav-btn active" onclick="trocar('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="trocar('estoque', this)">Produtos</button>
    <button class="nav-btn" onclick="trocar('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="trocar('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="render-mesas"></div>
        <div class="col-central">
            <input type="text" id="campo-bipe" placeholder="BIPE O CÓDIGO AQUI...">
            <select id="sel-cli-venda"></select>
            <div id="render-prods" class="prod-grid"></div>
        </div>
        <div class="col-resumo">
            <h3 id="txt-mesa" style="text-align: center; margin-bottom: 10px;">Selecione a Mesa</h3>
            <div id="carrinho" style="flex: 1; overflow-y: auto;"></div>
            <div style="border-top: 2px solid #eee; padding-top: 10px;">
                <h2>Total: R$ <span id="total-venda">0.00</span></h2>
                <button class="btn-acao" onclick="fecharConta()">FINALIZAR / DIVIDIR</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction: column; overflow-y: auto;">
        <h2>📦 Cadastro de Produtos</h2>
        <div style="max-width: 500px;">
            <input type="text" id="p-ean" placeholder="Código de Barras">
            <input type="text" id="p-nome" placeholder="Nome do Produto">
            <input type="number" id="p-preco" placeholder="Preço (Ex: 10.00)">
            <button class="btn-acao" style="background: var(--i);" onclick="addP()">SALVAR PRODUTO</button>
        </div>
        <table id="tab-p"><thead><tr><th>EAN</th><th>Produto</th><th>Preço</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="clientes" class="tela" style="flex-direction: column; overflow-y: auto;">
        <h2>👥 Cadastro de Clientes</h2>
        <div style="max-width: 500px;">
            <input type="text" id="c-nome" placeholder="Nome do Cliente">
            <input type="text" id="c-fone" placeholder="WhatsApp / Telefone">
            <button class="btn-acao" style="background: var(--p);" onclick="addC()">SALVAR CLIENTE</button>
        </div>
        <table id="tab-c"><thead><tr><th>Nome</th><th>Contato</th><th>Ações</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="caixa" class="tela" style="flex-direction: column; overflow-y: auto;">
        <h2>💰 Financeiro</h2>
        <div id="resumo-caixa" style="display: flex; gap: 10px; margin: 15px 0;"></div>
        <table id="tab-h"><thead><tr style="background:#eee;"><th>Hora</th><th>Ref</th><th>Valor</th><th>Tipo</th></tr></thead><tbody></tbody></table>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top: 30px; color: red; border: none; background: none; cursor: pointer;">⚠️ Resetar Sistema</button>
    </div>
</main>

<script>
    let db_p = JSON.parse(localStorage.getItem('b934_p')) || [];
    let db_c = JSON.parse(localStorage.getItem('b934_c')) || [{n: "Balcão", f: "-"}];
    let db_f = JSON.parse(localStorage.getItem('b934_f')) || { d: 0, p: 0, c: 0, h: [] };
    let MESAS = Array.from({length: 12}, (_, i) => ({ id: i+1, pedidos: [], total: 0, status: 'livre' }));
    let mesaAtiva = null;

    function salvar() {
        localStorage.setItem('b934_p', JSON.stringify(db_p));
        localStorage.setItem('b934_c', JSON.stringify(db_c));
        localStorage.setItem('b934_f', JSON.stringify(db_f));
    }

    function trocar(id, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'vendas') renderV();
        if(id === 'estoque') renderP();
        if(id === 'clientes') renderC();
        if(id === 'caixa') renderCX();
    }

    // --- VENDAS ---
    function renderV() {
        document.getElementById('render-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa-card ${m.status==='ocupada'?'ocupada':''} ${mesaAtiva===m.id?'sel':''}" onclick="selMesa(${m.id})">MESA ${m.id}<br>R$ ${m.total.toFixed(2)}</div>`).join('');
        document.getElementById('render-prods').innerHTML = db_p.map((p, i) => `
            <div class="prod-btn" onclick="lancar(${i})">${p.n}<br><span style="color:var(--s)">R$ ${p.v.toFixed(2)}</span></div>`).join('');
        document.getElementById('sel-cli-venda').innerHTML = db_c.map(c => `<option value="${c.n}">${c.n} ${c.f !== '-' ? '('+c.f+')' : ''}</option>`).join('');
    }

    function selMesa(id) {
        mesaAtiva = id;
        document.getElementById('txt-mesa').innerText = "CONTA MESA " + id;
        renderV(); attCar();
        document.getElementById('campo-bipe').focus();
    }

    function lancar(idx) {
        if(!mesaAtiva) return alert("Selecione a mesa!");
        let m = MESAS.find(x => x.id === mesaAtiva);
        let cli = document.getElementById('sel-cli-venda').value;
        m.pedidos.push({ c: cli, n: db_p[idx].n, v: db_p[idx].v });
        m.total += db_p[idx].v; m.status = 'ocupada';
        renderV(); attCar();
    }

    document.getElementById('campo-bipe').addEventListener('keypress', e => {
        if(e.key === 'Enter') {
            let p = db_p.find(x => x.e === e.target.value);
            if(p) { lancar(db_p.indexOf(p)); e.target.value = ''; }
            else { alert("Não cadastrado!"); e.target.value = ''; }
        }
    });

    function attCar() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        if(!m) return;
        document.getElementById('carrinho').innerHTML = m.pedidos.map(p => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee; font-size:12px;">
                <span><b>${p.c}:</b> ${p.n}</span><span>R$ ${p.v.toFixed(2)}</span>
            </div>`).join('');
        document.getElementById('total-venda').innerText = m.total.toFixed(2);
    }

    function fecharConta() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        if(!m || m.pedidos.length === 0) return;
        let clis = [...new Set(m.pedidos.map(p => p.c))];
        let menu = "FECHAR:\n0-TUDO (R$ "+m.total.toFixed(2)+")\n";
        clis.forEach((c, i) => {
            let s = m.pedidos.filter(p => p.c === c).reduce((acc, p) => acc + p.v, 0);
            menu += (i+1) + "-SÓ " + c + " (R$ "+s.toFixed(2)+")\n";
        });
        let op = prompt(menu); if(op === null) return;
        let val = 0; let ref = "";
        if(op === "0") {
            val = m.total; ref = "Mesa "+m.id; m.pedidos = []; m.total = 0; m.status = 'livre';
        } else {
            let cNome = clis[parseInt(op)-1];
            val = m.pedidos.filter(p => p.c === cNome).reduce((acc, p) => acc + p.v, 0);
            ref = cNome + " (M"+m.id+")";
            m.pedidos = m.pedidos.filter(p => p.c !== cNome);
            m.total -= val; if(m.pedidos.length === 0) m.status = 'livre';
        }
        let f = prompt("PG R$ "+val.toFixed(2)+"\n1-DINHEIRO | 2-PIX | 3-CARTÃO");
        let tps = {"1":["d","DINHEIRO"],"2":["p","PIX"],"3":["c","CARTÃO"]};
        if(tps[f]) {
            db_f[tps[f][0]] += val;
            db_f.h.push({ h: new Date().toLocaleTimeString(), r: ref, v: val, t: tps[f][1] });
            salvar(); renderV(); attCar();
        }
    }

    // --- PRODUTOS ---
    function renderP() {
        document.querySelector('#tab-p tbody').innerHTML = db_p.map((p, i) => `<tr><td>${p.e||'--'}</td><td>${p.n}</td><td>R$ ${p.v.toFixed(2)}</td><td><button onclick="db_p.splice(${i},1);salvar();renderP()">❌</button></td></tr>`).join('');
    }
    function addP() {
        let e = document.getElementById('p-ean').value, n = document.getElementById('p-nome').value, v = parseFloat(document.getElementById('p-preco').value);
        if(n && v) { db_p.push({e, n, v}); salvar(); renderP(); document.getElementById('p-ean').value=''; document.getElementById('p-nome').value=''; document.getElementById('p-preco').value=''; }
    }

    // --- CLIENTES ---
    function renderC() {
        document.querySelector('#tab-c tbody').innerHTML = db_c.map((c, i) => `<tr><td>${c.n}</td><td>${c.f}</td><td><button onclick="db_c.splice(${i},1);salvar();renderC()">Excluir</button></td></tr>`).join('');
    }
    function addC() {
        let n = document.getElementById('c-nome').value;
        let f = document.getElementById('c-fone').value || '-';
        if(n) { db_c.push({n, f}); salvar(); renderC(); document.getElementById('c-nome').value = ''; document.getElementById('c-fone').value = ''; alert("Cliente Salvo!"); }
    }

    // --- CAIXA ---
    function renderCX() {
        document.getElementById('resumo-caixa').innerHTML = `
            <div style="flex:1; background:#fff; padding:10px; border-bottom:4px solid var(--s); text-align:center;">💵 <b>Dinheiro</b><br>R$ ${db_f.d.toFixed(2)}</div>
            <div style="flex:1; background:#fff; padding:10px; border-bottom:4px solid var(--i); text-align:center;">⚡ <b>PIX</b><br>R$ ${db_f.p.toFixed(2)}</div>
            <div style="flex:1; background:#fff; padding:10px; border-bottom:4px solid var(--a); text-align:center;">💳 <b>Cartão</b><br>R$ ${db_f.c.toFixed(2)}</div>`;
        document.querySelector('#tab-h tbody').innerHTML = db_f.h.map(h => `<tr><td>${h.h}</td><td>${h.r}</td><td>R$ ${h.v.toFixed(2)}</td><td>${h.t}</td></tr>`).reverse().join('');
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = () => { renderV(); };
</script>
</body>
</html>
