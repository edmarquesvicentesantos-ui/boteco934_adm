<button onclick="abrirPainelGerente()" class="px-4 py-3 text-[10px] font-bold uppercase bg-yellow-500 text-white">💰 Precificar</button>

<div id="modal-gerente" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
        <h2 class="font-black text-blue-900 mb-4 border-b pb-2 uppercase text-sm">Calculadora de Lucro (18 Doses)</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Nome do Destilado</label>
                <input type="text" id="calc-nome" placeholder="Ex: Whisky Red Label" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Custo da Garrafa (1L)</label>
                <input type="number" id="calc-custo" placeholder="R$ 0,00" class="w-full p-2 border rounded">
            </div>
            
            <div class="grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300">
                <div>
                    <p class="text-[9px] font-bold text-blue-900 uppercase">Sugestão Dose</p>
                    <p id="sugestao-dose" class="text-lg font-black text-green-600">R$ 0,00</p>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-blue-900 uppercase">Sugestão Litro</p>
                    <p id="sugestao-litro" class="text-lg font-black text-green-600">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div class="flex gap-2 mt-6">
            <button onclick="fecharPainelGerente()" class="flex-1 py-3 text-xs font-bold uppercase text-gray-500">Cancelar</button>
            <button onclick="salvarPrecos()" class="flex-1 py-3 bg-blue-900 text-white rounded-xl text-xs font-bold uppercase">Cadastrar Produtos</button>
        </div>
    </div>
</div>
