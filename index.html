<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV | BOTECO 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .fonte-13 { font-size: 13px !important; }
        .tarja-botao { background-color: #1e3a8a; }
        .area-logo { height: 80px; }
        /* Estilo Cupom */
        .cupom { font-family: 'Courier New', Courier, monospace; background-color: #fff9e6; }
        .border-cupom { border-top: 2px dashed #ccc; border-bottom: 2px dashed #ccc; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-white area-logo flex items-center justify-center border-b shadow-sm">
        <h1 class="text-xl font-black italic text-blue-900">BOTECO 934</h1>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-1/2 md:w-5/12 bg-gray-200 flex flex-col border-r">
            <div id="menu-categorias" class="flex overflow-x-auto bg-white border-b">
                <button onclick="filtrar('Tudo')" class="px-4 py-3 text-[10px] font-bold uppercase">Tudo</button>
                <button onclick="filtrar('Cervejas')" class="px-4 py-3 text-[10px] font-bold uppercase">Cervejas</button>
                <button onclick="filtrar('Petiscos')" class="px-4 py-3 text-[10px] font-bold uppercase">Petiscos</button>
            </div>
            <div id="lista-produtos" class="p-2 grid grid-cols-1 gap-2 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 p-2 bg-gray-300 flex flex-col justify-between">
            <div class="cupom p-4 shadow-inner rounded-sm h-full flex flex-col">
                <div class="text-center text-[10px] mb-2 uppercase">
                    <p class="font-bold">** BOTECO 934 **</p>
                    <p>Petrolina - PE</p>
                    <p id="data-recibo">00/00/0000 00:00:00</p>
                    <p class="border-cupom my-1">CUPOM DE VENDA</p>
                </div>

                <div class="flex justify-between text-[10px] font-bold mb-1 border-b border-gray-300">
                    <span class="w-1/2">ITEM/DESCRIÇÃO</span>
                    <span class="w-1/4 text-right">UN</span>
                    <span class="w-1/4 text-right">TOTAL</span>
                </div>

                <div id="itens-venda" class="flex-1 overflow-y-auto text-[11px] space-y-1">
                    </div>

                <div class="mt-2 pt-2 border-cupom uppercase">
                    <div class="flex justify-between font-bold text-lg">
                        <span>TOTAL R$:</span>
                        <span id="valor-total">0,00</span>
                    </div>
                    <p class="text-[9px] text-center mt-2 italic">Obrigado pela preferência!</p>
                </div>
            </div>

            <button onclick="finalizarVenda()" class="mt-2 w-full bg-blue-900 text-white font-black py-4 rounded-xl shadow-lg uppercase active:scale-95">
                Fechar Venda
            </button>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
