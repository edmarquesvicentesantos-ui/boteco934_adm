<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 Elite - Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2a; --accent: #38bdf8; --success: #22c55e; 
            --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        /* Layout Mobile-First: Uma coluna só, tudo empilhado */
        body { 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- CABEÇALHO --- */
        .top-header {
            background: #020617; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1e293b;
        }
        .logo-934 { 
            background: var(--accent); color: #020617; padding: 8px 12px; 
            border-radius: 8px; font-weight: 900; font-size: 18px; 
        }
        .nav-btn { 
            background: var(--card); color: var(--text); text-decoration: none; 
            padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 900; 
            border: 1px solid #334155;
        }

        /* --- BARRA DE MESAS HORIZONTAL (Abaixo do cabeçalho) --- */
        .area-mesas { 
            display: flex; gap: 10px; padding: 15px; 
            overflow-x: auto; /* Permite deslizar para o lado no iPhone */
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 2px solid #1e293b;
            scrollbar-width: none; /* Esconde barra no PC */
        }
        .area-mesas::-webkit-scrollbar { display: none; } /* Esconde barra no Chrome/Safari */

        .mesa { 
            min-width: 80px; background: var(--card); padding: 12px; 
            border-radius: 10px; border: 2px solid #1e293b; 
            text-align: center; flex-shrink: 0; transition: 0.3s;
        }
        .mesa.ocupada { border-top: 4px solid var(--accent); }
        .mesa.ativa { background: var(--accent); color: #020617; border-color: white; }
        .mesa-num { font-size: 18px; font-weight: 900; display: block; }
        .mesa-val { font-size: 10px; font-weight: 900; }

        /* --- CORPO DO CAIXA --- */
        .conteudo-principal { 
            flex: 1; display: flex; flex-direction: column; 
            overflow-y: auto; padding: 20px; gap: 20px;
        }

        .painel-venda { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 14px; font-weight: 900; color: var(--muted); text-transform: uppercase; }
        
        input, select { 
            background: var(--card); border: 2px solid #1e293b; color: white; 
            padding: 18px; border-radius: var(--radius); 
            font-size: 16px; font-weight: 900; outline: none; width: 100%;
        }

        /* --- CARRINHO / RESUMO --- */
        .resumo { background: #020617; padding: 20px; border-top: 2px solid #1e293b; }
        .item-carrinho { 
            background: var(--card); padding: 12px; border-radius: 10px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .item-info b { font-size: 14px; font-weight: 900; text-transform: uppercase; display: block; }
        .item-info small { color: var(--accent); font-size: 10px; font-weight: 900; }

        .btn-finalizar { 
            width: 100%; padding: 20px; background: var(--accent); color: #020617; 
            border: none; border-radius: var(--radius); font-weight: 900; 
            font-size: 18px; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }

        /* Modal */
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo-934">934</div>
        <div style="font-weight: 900; font-size: 14px;">PDV ELITE</div>
        <div class="nav-buttons">
            <a href="produtos.html" class="nav-btn">ESTOQUE</a>
        </div>
    </header>

    <div class="area-mesas" id="grid-mesas"></div>

    <main class="conteudo-principal">
        <h1 id="titulo-mesa" style="font-weight: 900; font-size: 24px; text-transform: uppercase;">Selecione a Mesa</h1>
        
        <div class="painel-venda">
            <div>
                <label>👤 Cliente</label>
                <select id="select-cliente"></select>
            </div>
            <div>
                <label>🔍 Produto</label>
                <input type="text" id="codigo-bipe" placeholder="BIPE O CÓDIGO..." autofocus>
            </div>
        </div>

        <div id="lista-carrinho"></div>
    </main>

    <footer class="resumo">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <span style="font-weight: 900; color: var(--muted);">TOTAL</span>
            <span style="color:var(--success); font-weight: 900; font-size: 28px;">R$ <span id="total-v">0.00</span></span>
        </div>
        <button class="btn-finalizar" onclick="abrirPagamento()">Fechar Conta</button>
    </footer>

    <div id="modal-pagamento" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center;">
        <div class="modal-content">
            <h2 style="font-weight: 900; margin-bottom: 10px;">PAGAMENTO</h2>
            <div style="font-size: 35px; color: var(--success); font-weight: 900; margin-bottom: 20px;">R$ <span id="total-modal-v">0.00</span></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="finalizar('Dinheiro')" style="padding:15px; font-weight:900; border-radius:8px; border:none; background:#1e293b; color:white;">DINHEIRO</button>
                <button onclick="finalizar('Pix')" style="padding:15px; font-weight:900; border-radius:8px; border:none; background:#1e293b; color:white;">PIX</button>
                <button onclick="finalizar('Cartão')" style="padding:15px; font-weight:900; border-radius:8px; border:none; background:#1e293b; color:white;">CARTÃO</button>
                <button onclick="finalizar('Pendura')" style="padding:15px; font-weight:900; border-radius:8px; border:none; background:var(--danger); color:white;">PENDURA</button>
            </div>
            <button onclick="fecharModal()" style="margin-top:20px; background:none; border:none; color:var(--muted); font-weight:900;">VOLTAR</button>
        </div>
    </div>

    <script>
        let PRODS = JSON.parse(localStorage.getItem('produtos')) || [];
        let CLIS = JSON.parse(localStorage.getItem('clientes')) || [{nome: "Consumidor Geral", tel: "-"}];
        // Iniciando com 8 mesas como pedido
        let MESAS = JSON.parse(localStorage.getItem('mesas_estado')) || Array.from({length: 8}, (_, i) => ({ id: i+1, itens: [], total: 0, ocupada: false }));
        let mesaAtiva = null;

        function carregarClientes() {
            const s = document.getElementById('select-cliente');
            CLIS.sort((a,b) => a.nome.localeCompare(b.nome));
            s.innerHTML = CLIS.map(c => `<option value="${c.nome}" data-tel="${c.tel}">${c.nome}</option>`).join('');
        }

        function renderMesas() {
            document.getElementById('grid-mesas').innerHTML = MESAS.map(m => `
                <div class="mesa ${m.ocupada?'ocupada':''} ${mesaAtiva===m.id?'ativa':''}" onclick="selMesa(${m.id})">
                    <span class="mesa-num">${m.id}</span>
                    <span class="mesa-val">R$${m.total.toFixed(0)}</span>
                </div>
            `).join('');
            localStorage.setItem('mesas_estado', JSON.stringify(MESAS));
        }

        function selMesa(id) {
            mesaAtiva = id;
            document.getElementById('titulo-mesa').innerText = "Mesa " + id;
            renderMesas(); renderCarrinho();
            document.getElementById('codigo-bipe').focus();
        }

        document.getElementById('codigo-bipe').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && mesaAtiva) {
                let p = PRODS.find(x => x.codigo == e.target.value);
                if(p) {
                    let m = MESAS.find(x => x.id === mesaAtiva);
                    let sel = document.getElementById('select-cliente');
                    m.itens.push({ cli: sel.value, tel: sel.options[sel.selectedIndex].getAttribute('data-tel'), nome: p.nome, preco: p.preco });
                    m.total += p.preco; m.ocupada = true;
                    e.target.value = ''; renderMesas(); renderCarrinho();
                } else { alert("Não cadastrado!"); e.target.value = ''; }
            }
        });

        function renderCarrinho() {
            if(!mesaAtiva) return;
            let m = MESAS.find(x => x.id === mesaAtiva);
            document.getElementById('lista-carrinho').innerHTML = m.itens.map((it, idx) => `
                <div class="item-carrinho">
                    <div class="item-info"><small>${it.cli}</small><b>${it.nome}</b></div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-weight:900;">R$${it.preco.toFixed(2)}</span>
                        <button onclick="removerItem(${idx})" style="background:none; border:none; color:var(--danger); font-weight:900; font-size:18px;">✕</button>
                    </div>
                </div>
            `).reverse().join('');
            document.getElementById('total-v').innerText = m.total.toFixed(2);
        }

        function removerItem(idx) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let realIdx = m.itens.length - 1 - idx;
            m.total -= m.itens[realIdx].preco;
            m.itens.splice(realIdx, 1);
            if(m.itens.length === 0) m.ocupada = false;
            renderMesas(); renderCarrinho();
        }

        function abrirPagamento() {
            let m = MESAS.find(x => x.id === mesaAtiva);
            if(!m || m.total === 0) return alert("Mesa vazia!");
            document.getElementById('total-modal-v').innerText = m.total.toFixed(2);
            document.getElementById('modal-pagamento').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

        function finalizar(metodo) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let textoRecibo = `*BOTECO 934*\n*MESA ${m.id}*\n------------------\n`;
            m.itens.forEach(it => { textoRecibo += `${it.nome} - R$ ${it.preco.toFixed(2)}\n`; });
            textoRecibo += `------------------\n*TOTAL: R$ ${m.total.toFixed(2)}*\nPGTO: ${metodo}`;

            let tel = m.itens[m.itens.length-1].tel;
            if(tel && tel !== "-") {
                window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(textoRecibo)}`, '_blank');
            } else { alert("Finalizado!"); }

            m.itens = []; m.total = 0; m.ocupada = false;
            fecharModal(); renderMesas(); renderCarrinho();
        }

        carregarClientes(); renderMesas();
    </script>
</body>
</html>
