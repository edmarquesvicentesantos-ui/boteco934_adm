<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>934 BOTECO - QUANTUM OS</title>
    <style>
        :root {
            --quantum-gold: #ffcc00;
            --quantum-blue: #00d4ff;
            --glass-bg: rgba(17, 17, 17, 0.85);
            --border-glass: rgba(255, 255, 255, 0.12);
            --black-hole: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--black-hole); 
            color: #fff; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        header { 
            background: var(--quantum-gold); 
            padding: 15px 30px; 
            color: #000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
        }

        nav { 
            background: rgba(20, 20, 20, 0.9);
            display: flex; 
            justify-content: center;
            border-bottom: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-item { 
            padding: 20px 25px; 
            cursor: pointer; 
            color: #666; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item.active { 
            color: var(--quantum-gold); 
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
            border-bottom: 3px solid var(--quantum-gold);
        }

        .container { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .secao { display: none; }
        .ativa { display: block; animation: quantum-entry 0.6s ease-out; }

        @keyframes quantum-entry {
            from { opacity: 0; transform: scale(0.98) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* --- CALCULADORA QUÂNTICA --- */
        .card-quantum {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px;
            border-radius: 35px;
            border: 1px solid var(--border-glass);
            max-width: 550px;
            margin: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
        }

        .card-quantum::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--quantum-gold));
            animation: rotate-quantum 10s linear infinite;
            opacity: 0.1;
            z-index: -1;
        }

        @keyframes rotate-quantum { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card-quantum h2 {
            color: var(--quantum-gold);
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        label { display: block; margin-bottom: 10px; font-size: 14px; color: #aaa; font-weight: 600; text-transform: uppercase; }

        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            color: #fff;
            padding: 20px;
            border-radius: 18px;
            width: 100%;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--quantum-gold);
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            outline: none;
        }

        .btn-quantum {
            background: linear-gradient(135deg, var(--quantum-gold), #e6b800);
            color: #000;
            padding: 22px;
            border: none;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            border-radius: 18px;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.3);
            transition: all 0.3s;
        }

        .btn-quantum:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 204, 0, 0.4); }

        .res-quantum {
            margin-top: 35px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 8px solid var(--quantum-gold);
            padding: 30px;
            border-radius: 20px;
            display: none;
        }

        /* PDV E OUTROS */
        .pdv-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .prod-card {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }
        .prod-card:hover { transform: translateY(-5px); }
        .prod-card span { display: block; color: var(--quantum-blue); font-size: 1.3em; margin-top: 8px; }

    </style>
</head>
<body>

<header>
    <h1 style="font-weight: 900; font-size: 32px;">934 BOTECO</h1>
    <div id="relogio" style="font-weight: 900; font-size: 20px; letter-spacing: 2px;">00:00:00</div>
</header>

<nav>
    <div class="nav-item active" onclick="navegar('vendas', this)">🛒 Terminal Vendas</div>
    <div class="nav-item" onclick="navegar('calculadora', this)">⚡ Quantum Calc</div>
    <div class="nav-item" onclick="navegar('produtos', this)">📦 Inventário</div>
</nav>

<div class="container">
    
    <div id="calculadora" class="secao">
        <div class="card-quantum">
            <h2>Calculadora de Margem</h2>
            
            <label>Custo de Aquisição (R$):</label>
            <input type="number" id="q_custo" placeholder="Ex: 5.60" step="0.01">
            
            <label>Valor de Saída (R$):</label>
            <input type="number" id="q_venda" placeholder="Ex: 16.00" step="0.01">
            
            <button class="btn-quantum" onclick="processarQuantum()">EXECUTAR ANÁLISE</button>
            
            <div id="resQuantum" class="res-quantum">
                <p style="color: #888; text-transform: uppercase; font-size: 12px; margin-bottom: 5px;">Lucro Líquido</p>
                <h3 id="txtLucro" style="font-size: 28px; margin-bottom: 20px;">R$ 0,00</h3>
                <p style="color: #888; text-transform: uppercase; font-size: 12px; margin-bottom: 5px;">Eficiência de Margem</p>
                <h3 id="txtMargem" style="font-size: 48px; color: var(--quantum-gold); font-weight: 900;">0%</h3>
            </div>
        </div>
    </div>

    <div id="vendas" class="secao ativa">
        <div class="pdv-grid">
            <div class="vitrine" id="vitrineProds">
                </div>
            <div id="pdv-checkout">
                <div style="background:#fff; color:#000; padding:20px; border-radius:10px; min-height:400px;">
                    <h3 style="border-bottom:2px solid #eee; padding-bottom:10px;">CUPOM FISCAL</h3>
                    <div id="listaItens" style="margin: 20px 0;"></div>
                    <h2 style="font-size: 35px;">TOTAL: R$ <span id="totalVenda">0,00</span></h2>
                </div>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSy...", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // RELÓGIO ATÔMICO
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

    // PROCESSAMENTO DA CALCULADORA
    window.processarQuantum = () => {
        const custo = parseFloat(document.getElementById('q_custo').value);
        const venda = parseFloat(document.getElementById('q_venda').value);
        
        if(custo > 0 && venda > 0) {
            const lucro = venda - custo;
            const margem = (lucro / venda) * 100;
            
            const box = document.getElementById('resQuantum');
            box.style.display = 'block';
            
            document.getElementById('txtLucro').innerText = `R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('txtMargem').innerText = `${margem.toFixed(1)}%`;
            
            // Efeito de pulso no resultado
            box.style.animation = 'none';
            setTimeout(() => box.style.animation = 'quantum-entry 0.4s ease-out', 10);
        }
    };

    // NAVEGAÇÃO
    window.navegar = (id, el) => {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
    };

    // CARREGAR VITRINE
    onValue(ref(db, 'produtos'), (s) => {
        const v = document.getElementById('vitrineProds');
        v.innerHTML = "";
        const dados = s.val() || {};
        Object.values(dados).forEach(p => {
            v.innerHTML += `<div class="prod-card">${p.nome}<span>R$ ${p.venda.toFixed(2)}</span></div>`;
        });
    });
</script>

</body>
</html>
