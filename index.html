<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Sistema Integrado</title>
    <style>
        :root { --azul-uol: #2b579a; --amarelo-uol: #ffcc00; --cor-custo: #fff2cc; --cor-lucro: #fce4d6; --cor-margem: #c6efce; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER ESTILO PORTAL */
        header { background: #fff; border-bottom: 4px solid var(--amarelo-uol); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-934 { width: 50px; height: 50px; background: #000; color: var(--amarelo-uol); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--amarelo-uol); }
        
        nav { background: #111; color: #fff; display: flex; padding: 0 20px; font-size: 0.75em; }
        .nav-item { position: relative; padding: 12px 18px; cursor: pointer; border-right: 1px solid #333; font-weight: bold; }
        .nav-item:hover { background: var(--amarelo-uol); color: #000; }
        .submenu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1000; }
        .nav-item:hover .submenu { display: block; }
        .submenu button, .submenu label { width: 100%; padding: 12px; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 1px solid #eee; color: #333; display: block; }

        /* CONTEÚDO PRINCIPAL */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; background: #dfe4ea; }
        
        /* TABELA ESTILO PLANILHA (IGUAL À IMAGEM ENVIADA) */
        .tabela-vendas { width: 100%; border-collapse: collapse; background: #fff; font-size: 0.8em; margin-top: 10px; }
        .tabela-vendas th { background: var(--azul-uol); color: white; padding: 10px; border: 1px solid #ccc; }
        .tabela-vendas td { padding: 8px; border: 1px solid #ccc; text-align: center; }
        .custo { background: var(--cor-custo); font-weight: bold; }
        .lucro { background: var(--cor-lucro); font-weight: bold; }
        .margem { background: var(--cor-margem); color: #006100; font-weight: bold; }

        /* GRID DE MESAS */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .mesa { background: #fff; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border-bottom: 4px solid #ccc; }
        .livre { border-top: 5px solid #2e7d32; }
        .ocupada { border-top: 5px solid #d32f2f; background: #fff5f5; }

        /* PAINEL LATERAL */
        .sidebar { width: 300px; background: #fff; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        .recibo { flex: 1; padding: 15px; font-family: monospace; font-size: 0.85em; }
        .total-box { padding: 20px; background: var(--amarelo-uol); font-size: 1.4em; font-weight: 900; text-align: right; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-934">934</div>
        <div><h1 style="font-size:1.4em">Boteco 934</h1><small>Gestão de Bar e Distribuidora</small></div>
    </div>
    <div id="relogio" style="font-weight:bold; color:#666"></div>
</header>

<nav>
    <div class="nav-item">OPERACIONAL
        <div class="submenu">
            <button onclick="setVisao('mesas')">Painel de Mesas</button>
            <button onclick="zerarMesas()">Zerar Tudo</button>
        </div>
    </div>
    <div class="nav-item">ESTOQUE / XML
        <div class="submenu">
            <button onclick="setVisao('estoque')">Planilha de Vendas</button>
            <label>📁 Importar XML <input type="file" accept=".xml" style="display:none" onchange="lerXML(this)"></label>
        </div>
    </div>
</nav>

<div class="main-container">
    <main class="content-area" id="view-principal"></main>
    <aside class="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee; background:#f9f9f9"><strong>CUPOM ATUAL</strong></div>
        <div class="recibo" id="recibo-corpo"></div>
        <div class="total-box" id="total-venda">R$ 0,00</div>
    </aside>
</div>

<script>
    let visaoAtual = 'mesas';
    let mesas = JSON.parse(localStorage.getItem('b934_mesas')) || Array.from({length: 20}, (_, i) => ({id: i+1, ocupada: false, cliente: "", total: 0, itens: []}));
    let estoque = JSON.parse(localStorage.getItem('b934_estoque_v2')) || [];

    function salvar() {
        localStorage.setItem('b934_mesas', JSON.stringify(mesas));
        localStorage.setItem('b934_estoque_v2', JSON.stringify(estoque));
        render();
    }

    function setVisao(v) { visaoAtual = v; render(); }

    function render() {
        const area = document.getElementById('view-principal');
        if (visaoAtual === 'mesas') {
            area.innerHTML = `<div class="grid-mesas">${mesas.map(m => `
                <div class="mesa ${m.ocupada ? 'ocupada' : 'livre'}" onclick="clickMesa(${m.id})">
                    <div style="font-size:0.7em">MESA ${m.id}</div>
                    <div style="font-weight:bold">${m.ocupada ? m.cliente : 'LIVRE'}</div>
                    <div style="color:red; font-weight:bold">${m.ocupada ? 'R$ '+m.total.toFixed(2) : ''}</div>
                </div>`).join('')}</div>`;
        } else {
            area.innerHTML = `<h2>📊 Planilha de Vendas</h2><table class="tabela-vendas">
                <thead><tr><th>Produto</th><th>Qtd/Cx</th><th>Venda Uni.</th><th>Total Vend.</th><th class="custo">Custo</th><th class="lucro">Lucro</th><th class="margem">Margem %</th></tr></thead>
                <tbody>${estoque.map(p => {
                    const totalV = p.venda * p.qtd;
                    const totalC = p.custo * p.qtd;
                    const lucro = totalV - totalC;
                    const margem = (lucro / totalV) * 100;
                    return `<tr><td>${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.venda.toFixed(2)}</td><td>R$ ${totalV.toFixed(2)}</td><td class="custo">R$ ${p.custo.toFixed(2)}</td><td class="lucro">R$ ${lucro.toFixed(2)}</td><td class="margem">${margem.toFixed(2)}%</td></tr>`;
                }).join('')}</tbody></table>`;
        }
    }
