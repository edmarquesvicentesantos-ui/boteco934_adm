<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 | SUPER APP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --card: #161b22; --green: #2ecc71; --pink: #ff69b4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        .app-header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .app-header h1 { margin: 0; font-size: 18px; color: var(--gold); letter-spacing: 2px; }
        
        .tela { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .tela.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .item-lista { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; align-items: center; }
        
        /* Menu Inferior */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #333; padding: 8px 0; z-index: 1000; }
        .nav-btn { flex: 1; text-align: center; color: #666; font-size: 10px; cursor: pointer; }
        .nav-btn.ativo { color: var(--gold); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <h1>BOTECO 934</h1>
</div>

<div id="vendas" class="tela ativa">
    <div class="card" style="border-left: 5px solid var(--green);">
        <small>RESUMO DE HOJE</small>
        <h2 id="resumo-total">R$ 0,00</h2>
    </div>
    <div id="lista-vendas-corpo"></div>
</div>

<div id="estoque" class="tela">
    <div class="card">
        <h3><i class="fas fa-boxes"></i> Estoque</h3>
        <div id="lista-estoque-corpo"></div>
    </div>
</div>

<div id="clientes" class="tela">
    <div class="card">
        <h3><i class="fas fa-users"></i> Meus Clientes</h3>
        <input type="text" id="busca-cli" placeholder="🔍 Buscar cliente..." onkeyup="filtrarCli()">
        <div id="lista-cli-corpo">
            </div>
    </div>
</div>

<div id="boticario" class="tela">
    <div class="card" style="border-left: 5px solid var(--pink);">
        <h3 style="color: var(--pink);"><i class="fas fa-magic"></i> Revenda Boticário</h3>
        <p style="font-size: 12px; color: #888;">Controle de pedidos e catálogo.</p>
        <button class="btn-add" style="background: var(--pink); color: white;">NOVO PEDIDO</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-btn ativo" onclick="abrir('vendas', this)"><i class="fas fa-home"></i>Início</div>
    <div class="nav-btn" onclick="abrir('estoque', this)"><i class="fas fa-list"></i>Estoque</div>
    <div class="nav-btn" onclick="abrir('clientes', this)"><i class="fas fa-user"></i>Clientes</div>
    <div class="nav-btn" onclick="abrir('boticario', this)"><i class="fas fa-heart"></i>Boticário</div>
</nav>

<script>
    // MUDANÇA DE TELA
    function abrir(telaId, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById(telaId).classList.add('ativa');
        btn.classList.add('ativo');

        if(telaId === 'clientes') carregarClientes();
    }

    // CARREGAR CLIENTES DO NAVEGADOR
    function carregarClientes() {
        // Tenta buscar por vários nomes de chave comuns para não perder seus dados antigos
        const dadosSalvos = localStorage.getItem('clientesBoteco934') || localStorage.getItem('clientes') || '[]';
        let cli = JSON.parse(dadosSalvos);
        const corpo = document.getElementById('lista-cli-corpo');
        
        if (cli.length === 0) {
            corpo.innerHTML = '<p style="text-align:center;color:#444">Nenhum cliente encontrado.</p>';
            return;
        }

        // Organizar de A a Z
        cli.sort((a, b) => a.nome.localeCompare(b.nome));
        
        corpo.innerHTML = '';
        cli.forEach(c => {
            // Deixa a primeira letra maiúscula
            const nomeF = c.nome.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, l => l.toUpperCase());
            corpo.innerHTML += `
                <div class="item-lista">
                    <div>
                        <strong>${nomeF}</strong><br>
                        <small style="color:#666">${c.contato || '(87) -----'}</small>
                    </div>
                    <i class="fas fa-comment-dots" style="color:var(--gold)"></i>
                </div>
            `;
        });
    }

    function filtrarCli() {
        let busca = document.getElementById('busca-cli').value.toUpperCase();
        let itens = document.querySelectorAll('#lista-cli-corpo .item-lista');
        itens.forEach(i => {
            i.style.display = i.innerText.toUpperCase().includes(busca) ? "flex" : "none";
        });
    }

    // Carrega a primeira tela
    window.onload = () => {
        // Se você já tiver clientes, ele já prepara o terreno
        carregarClientes();
    };
</script>

</body>
</html>
