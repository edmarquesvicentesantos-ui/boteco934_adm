<script>
    // Sua configuração do Firebase permanece a mesma
    
    async function importarParaFirebase() {
        const file = document.getElementById('input-xml').files[0];
        const status = document.getElementById('status-msg');
        if(!file) return alert("Selecione o arquivo!");

        const reader = new FileReader();
        reader.onload = async (e) => {
            const parser = new DOMParser();
            const xml = parser.parseFromString(e.target.result, "text/xml");
            const itens = Array.from(xml.getElementsByTagName("det"));

            // Dizemos ao sistema para salvar na coleção (pasta) "produtos"
            const pastaProdutos = db.collection("produtos");

            for (let i = 0; i < itens.length; i += 5) {
                const batch = db.batch();
                const bloco = itens.slice(i, i + 5);

                bloco.forEach(item => {
                    const nome = item.getElementsByTagName("xProd")[0].textContent.toUpperCase();
                    const custo = parseFloat(item.getElementsByTagName("vUnCom")[0].textContent);
                    
                    // Criamos o documento dentro da "pasta"
                    const novoDoc = pastaProdutos.doc(); 
                    batch.set(novoDoc, { 
                        nome: nome, 
                        preco: custo * 1.4, // Sua margem de lucro
                        data_entrada: new Date()
                    });
                });

                await batch.commit();
                status.innerText = `Salvando na pasta: ${i + bloco.length} de ${itens.length}`;
            }
            alert("✅ Tudo salvo na coleção 'produtos'!");
            location.reload();
        };
        reader.readAsText(file);
    }
</script>
