<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Elite - Boteco 934</title>
    <style>
        /* ESTILO (CSS) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; display: flex; height: 100vh; margin: 0; }
        
        #lado-esquerdo { width: 40%; background: #fff; border-right: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        #lado-direito { width: 60%; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #27ae60; padding-bottom: 5px; }
        
        select, input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-transform: uppercase; }
        
        .caixa-lista { flex-grow: 1; overflow-y: auto; background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 5px; }
        
        .grid-pagamento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .total-box { font-size: 28px; font-weight: bold; color: #27ae60; text-align: center; padding: 15px; background: #e8f5e9; border-radius: 8px; }
        .restante-box { font-size: 20px; font-weight: bold; color: #e74c3c; text-align: center; }

        .btn-acao { cursor: pointer; padding: 15px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-fechar { background: #27ae60; color: white; width: 100%; }
        .btn-fechar:hover { background: #219150; }
        
        .contato-destaque { font-weight: bold; color: #2980b9; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="lado-esquerdo">
        <h2>📦 Mercadorias</h2>
        <input type="text" id="busca-produto" placeholder="Buscar produto..." oninput="filtrarProdutos()">
        <select id="lista-produtos" size="12" ondoubleclick="adicionarAoCarrinho()"></select>
        
        <h3>🛒 Itens da Venda</h3>
        <div class="caixa-lista" id="carrinho">
            </div>
        <div class="total-box" id="visor-total">Total: R$ 0,00</div>
    </div>

    <div id="lado-direito">
        <h2>👤 Cliente & Cobrança</h2>
        
        <input type="text" id="busca-cliente" placeholder="Buscar cliente..." oninput="filtrarClientes()">
        <select id="lista-clientes" size="5" onchange="selecionarCliente()"></select>
        <div id="contato-cliente" class="contato-destaque">Contato: ---</div>

        <div class="grid-pagamento">
            <div>
                <label>💵 Dinheiro:</label>
                <input type="number" id="pg-dinheiro" class="pg-input" step="0.01" placeholder="0.00" oninput="calcularPagamento()">
            </div>
            <div>
                <label>💳 Cartão Crédito:</label>
                <input type="number" id="pg-credito" class="pg-input" step="0.01" placeholder="0.00" oninput="calcularPagamento()">
            </div>
            <div>
                <label>💳 Cartão Débito:</label>
                <input type="number" id="pg-debito" class="pg-input" step="0.01" placeholder="0.00" oninput="calcularPagamento()">
            </div>
            <div>
                <label>📱 PIX:</label>
                <input type="number" id="pg-pix" class="pg-input" step="0.01" placeholder="0.00" oninput="calcularPagamento()">
            </div>
            <div style="grid-column: span 2;">
                <label>📝 FIADO (Pendura):</label>
                <input type="number" id="pg-fiado" class="pg-input" step="0.01" placeholder="0.00" oninput="calcularPagamento()">
            </div>
        </div>

        <div class="restante-box" id="visor-restante">Falta: R$ 0,00</div>
        
        <button class="btn-acao btn-fechar" onclick="finalizarVenda()">FINALIZAR CONTA</button>
    </div>

    <script>
        // DADOS DO SISTEMA
        let produtosBD = [
            { nome: "Cerveja Lata", preco: 6.50 },
            { nome: "Coca-Cola 2L", preco: 12.00 },
            { nome: "Petisco Misto", preco: 25.00 },
            { nome: "Agua Mineral", preco: 3.50 }
        ];

        let clientesBD = [
            { nome: "Adriano Santos", fone: "(87) 98888-1111" },
            { nome: "Bruno Oliveira", fone: "(87) 98888-2222" },
            { nome: "Zeca Pagodinho", fone: "(87) 98888-3333" },
            { nome: "Carlos Lima", fone: "(87) 98888-4444" }
        ];

        let totalVenda = 0;

        // INICIALIZAÇÃO
        function init() {
            carregarProdutos();
            carregarClientes();
        }

        function carregarProdutos() {
            const select = document.getElementById('lista-produtos');
            select.innerHTML = "";
            produtosBD.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
                let opt = document.createElement('option');
                opt.text = `${p.nome.toUpperCase()} - R$ ${p.preco.toFixed(2)}`;
                opt.value = p.preco;
                select.add(opt);
            });
        }

        function carregarClientes() {
            const select = document.getElementById('lista-clientes');
            select.innerHTML = "";
            clientesBD.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(c => {
                let opt = document.createElement('option');
                opt.text = c.nome.toUpperCase();
                opt.setAttribute('data-fone', c.fone);
                select.add(opt);
            });
        }

        function selecionarCliente() {
            const select = document.getElementById('lista-clientes');
            const fone = select.options[select.selectedIndex].getAttribute('data-fone');
            document.getElementById('contato-cliente').innerText = "Contato: " + fone;
        }

        function adicionarAoCarrinho() {
            const select = document.getElementById('lista-produtos');
            if (select.selectedIndex == -1) return;
            
            const preco = parseFloat(select.value);
            const nome = select.options[select.selectedIndex].text;
            
            totalVenda += preco;
            document.getElementById('visor-total').innerText = "Total: R$ " + totalVenda.toFixed(2);
            
            const item = document.createElement('div');
            item.innerText = nome;
            document.getElementById('carrinho').appendChild(item);
            calcularPagamento();
        }

        function calcularPagamento() {
            let pago = 0;
            document.querySelectorAll('.pg-input').forEach(input => {
                pago += parseFloat(input.value) || 0;
            });

            let falta = totalVenda - pago;
            const visorFalta = document.getElementById('visor-restante');
            
            if(falta <= 0) {
                visorFalta.innerText = "CONTA PAGA / TROCO: R$ " + Math.abs(falta).toFixed(2);
                visorFalta.style.color = "#27ae60";
            } else {
                visorFalta.innerText = "Falta: R$ " + falta.toFixed(2);
                visorFalta.style.color = "#e74c3c";
            }
        }

        function finalizarVenda() {
            const fiado = parseFloat(document.getElementById('pg-fiado').value) || 0;
            const cliente = document.getElementById('lista-clientes').value;
            const falta = totalVenda - Array.from(document.querySelectorAll('.pg-input')).reduce((acc, input) => acc + (parseFloat(input.value) || 0), 0);

            if (fiado > 0 && !cliente) {
                alert("❌ ERRO: Para FIADO, selecione um cliente!");
                return;
            }

            if (falta > 0.01) {
                alert("❌ ERRO: O valor pago é menor que o total!");
                return;
            }

            alert("✅ VENDA FINALIZADA NO BOTECO 934!");
            location.reload(); // Reseta para a próxima venda
        }

        window.onload = init;
    </script>
</body>
</html>
