<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - RECORREÇÃO TOTAL</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --i: #3498db; --a: #f1c40f; --r: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--a); }
        nav { background: #2c3e50; display: flex; height: 50px; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; font-size: 11px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); border-bottom: 4px solid var(--a); }
        main { flex: 1; position: relative; overflow: hidden; }
        .tela { display: none; width: 100%; height: 100%; position: absolute; padding: 15px; }
        .ativa { display: flex !important; }
        .col-mesas { width: 140px; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; padding: 5px; }
        .mesa-card { width: 100%; padding: 15px 5px; margin-bottom: 8px; border: 2px solid #27ae60; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; background: #fff; }
        .mesa-card.ocupada { background: #fff9db; border-color: var(--a); color: #d35400; }
        .mesa-card.sel { background: var(--p) !important; color: white !important; }
        .col-central { flex: 1; padding: 0 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .col-resumo { width: 300px; background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .prod-btn { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        .btn-acao { padding: 15px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<header><strong>BOTECO 934</strong> <div id="relogio">00:00:00</div></header>
<nav>
    <button class="nav-btn active" onclick="trocar('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="trocar('estoque', this)">Produtos</button>
    <button class="nav-btn" onclick="trocar('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="trocar('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="render-mesas"></div>
        <div class="col-central">
            <input type="text" id="campo-bipe" placeholder="BIPE O CÓDIGO..." autocomplete="off">
            <div id="area-venda" style="display:none;">
                <p>CLIENTE: <b id="nome-cli" style="color:var(--i);"></b></p>
                <div id="render-prods" class="prod-grid"></div>
            </div>
            <div id="aviso" style="text-align:center; padding:40px; color:#999;">Selecione uma mesa</div>
        </div>
        <div class="col-resumo">
            <h4 id="txt-m">Mesa</h4>
            <div id="carrinho" style="flex:1; overflow-y:auto; font-size:12px;"></div>
            <hr>
            <h3>Total: R$ <span id="total-v">0.00</span></h3>
            <button class="btn-acao" onclick="receber()">PAGAR</button>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction:column; overflow-y:auto;">
        <h3>Produtos</h3>
        <input type="text" id="p-e" placeholder="Código">
        <input type="text" id="p-n" placeholder="Nome">
        <input type="number" id="p-v" placeholder="Preço">
        <button class="btn-acao" style="background:var(--i);" onclick="addP()">SALVAR</button>
        <table id="t-p"><thead><tr><th>EAN</th><th>Nome</th><th>R$</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="clientes" class="tela" style="flex-direction:column; overflow-y:auto;">
        <h3>Clientes</h3>
        <input type="text" id="c-n" placeholder="Nome">
        <input type="text" id="c-f" placeholder="WhatsApp">
        <button class="btn-acao" style="background:var(--p);" onclick="addC()">SALVAR</button>
        <table id="t-c"><thead><tr><th>Nome</th><th>Fone</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="caixa" class="tela" style="flex-direction:column; overflow-y:auto;">
        <h3>Caixa</h3>
        <div id="res-cx" style="display:flex; gap:10px; margin-bottom:10px;"></div>
        <table id="t-h"><thead><tr><th>Hora</th><th>Ref</th><th>Valor</th></tr></thead><tbody></tbody></table>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:red;">LIMPAR TUDO</button>
    </div>
</main>

<script>
    // Inicialização Blindada
    let P = [], C = [{n:"Balcão", f:"-"}], F = {d:0, p:0, c:0, h:[]};
    try {
        const sp = localStorage.getItem('b934_p'); if(sp) P = JSON.parse(sp);
        const sc = localStorage.getItem('b934_c'); if(sc) C = JSON.parse(sc);
        const sf = localStorage.getItem('b934_f'); if(sf) F = JSON.parse(sf);
    } catch(e) { console.error("Erro dados corrompidos"); }

    let MESAS = Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, status: 'livre', cliente: "" }));
    let mesaAtiva = null;

    function salvar() {
        localStorage.setItem('b934_p', JSON.stringify(P));
        localStorage.setItem('b934_c', JSON.stringify(C));
        localStorage.setItem('b934_f', JSON.stringify(F));
    }

    function trocar(id, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'vendas') renderV();
        if(id === 'estoque') renderP();
        if(id === 'clientes') renderC();
        if(id === 'caixa') renderCX();
    }

    function renderV() {
        document.getElementById('render-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa-card ${m.status==='ocupada'?'ocupada':''} ${mesaAtiva===m.id?'sel':''}" onclick="abrirM(${m.id})">
                M${m.id}<br><small>${m.status==='ocupada'?m.cliente:'Livre'}</small><br>R$${m.total.toFixed(2)}
            </div>`).join('');
        document.getElementById('render-prods').innerHTML = P.map((p, i) => `<div class="prod-btn" onclick="lancar(${i})">${p.n}<br>R$${parseFloat(p.v).toFixed(2)}</div>`).join('');
    }

    function abrirM(id) {
        let m = MESAS.find(x => x.id === id);
        if(m.status === 'livre') {
            let n = C.map((cl, i) => (i+1) + "-" + cl.n).join("\n");
            let op = prompt("Cliente número:\n" + n);
            if(C[op-1]) { m.cliente = C[op-1].n; m.status = 'ocupada'; } else return;
        }
        mesaAtiva = id;
        document.getElementById('txt-m').innerText = "Mesa " + id + " - " + m.cliente;
        document.getElementById('nome-cli').innerText = m.cliente;
        document.getElementById('area-venda').style.display = 'block';
        document.getElementById('aviso').style.display = 'none';
        renderV(); att();
    }

    function lancar(i) {
        let m = MESAS.find(x => x.id === mesaAtiva);
        m.itens.push({n: P[i].n, v: parseFloat(P[i].v)});
        m.total += parseFloat(P[i].v);
        renderV(); att();
    }

    function att() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        document.getElementById('carrinho').innerHTML = m.itens.map(it => `<div>${it.n} - R$${it.v.toFixed(2)}</div>`).join('');
        document.getElementById('total-v').innerText = m.total.toFixed(2);
    }

    function receber() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        let v = parseFloat(prompt("Valor a pagar? Total: " + m.total.toFixed(2)));
        if(!v || v > m.total + 0.1) return;
        let f = prompt("1-Dinheiro 2-Pix 3-Cartão");
        let tp = {"1":"d","2":"p","3":"c"}[f];
        if(tp) {
            F[tp] += v; F.h.push({h: new Date().toLocaleTimeString(), r: m.cliente, v: v});
            m.total -= v;
            if(m.total < 0.1) { m.total=0; m.itens=[]; m.status='livre'; m.cliente=""; }
            salvar(); renderV(); att();
        }
    }

    function addP() {
        let e = document.getElementById('p-e').value, n = document.getElementById('p-n').value, v = document.getElementById('p-v').value;
        if(n && v) { P.push({e,n,v}); salvar(); renderP(); }
    }
    function renderP() {
        document.querySelector('#t-p tbody').innerHTML = P.map((p,i)=>`<tr><td>${p.e}</td><td>${p.n}</td><td>${p.v}</td><td onclick="P.splice(${i},1);salvar();renderP()">❌</td></tr>`).join('');
    }
    function addC() {
        let n = document.getElementById('c-n').value, f = document.getElementById('c-f').value;
        if(n) { C.push({n,f}); salvar(); renderC(); }
    }
    function renderC() {
        document.querySelector('#t-c tbody').innerHTML = C.map((c,i)=>`<tr><td>${c.n}</td><td>${c.f}</td><td onclick="C.splice(${i},1);salvar();renderC()">❌</td></tr>`).join('');
    }
    function renderCX() {
        document.getElementById('res-cx').innerHTML = `<div>D: R$${F.d.toFixed(2)}</div><div>P: R$${F.p.toFixed(2)}</div><div>C: R$${F.c.toFixed(2)}</div>`;
        document.querySelector('#t-h tbody').innerHTML = F.h.map(h=>`<tr><td>${h.h}</td><td>${h.r}</td><td>${h.v}</td></tr>`).reverse().join('');
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = renderV;
</script>
</body>
</html>
