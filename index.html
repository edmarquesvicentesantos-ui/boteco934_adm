<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV</title>
    <style>
        /* O ESTILO AGORA ESTÁ AQUI DENTRO PARA NÃO DAR ERRO */
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #ffcc00; }
        #grid-mesas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .card-mesa {
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .status-livre { background-color: #2e7d32; } /* Verde */
        .status-ocupada { background-color: #c62828; } /* Vermelho */
        
        .mesa-header { font-weight: bold; font-size: 0.9em; }
        .mesa-body { margin-top: 10px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>🍻 Boteco 934</h1>
    <p>Controle de Mesas e Distribuição</p>

    <div id="grid-mesas">
        </div>

    <script src="app.js"></script>
</body>
</html>
