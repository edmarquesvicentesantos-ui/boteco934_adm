<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - v53 Gold Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; --subtext: #94a3b8; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --border: #1e293b; }
        
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Elegante */
        .sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px; }
        .brand { padding: 30px 10px; text-align: center; color: var(--accent); font-weight: 700; font-size: 22px; letter-spacing: 1px; }
        .nav-btn { padding: 16px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: var(--subtext); border-radius: 12px; margin-bottom: 5px; font-weight: 500; }
        .nav-btn:hover { background: rgba(255, 184, 0, 0.1); color: var(--accent); }
        .nav-btn.active { background: var(--accent); color: var(--bg); }

        /* Layout de Caixa */
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .caixa-container { display: grid; grid-template-columns: 1fr 400px; gap: 25px; height: 88vh; }

        /* Mesas Estilizadas */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .mesa-card { background: var(--card); border: 2px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; position: relative; }
        .mesa-card.ocupada { background: var(--blue); border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .mesa-card.selecionada { border-color: var(--accent); scale: 1.05; }
        .mesa-card h4 { margin: 0; font-size: 14px; }
        .mesa-card span { font-size: 10px; color: var(--subtext); display: block; margin-top: 4px; }
        .mesa-card.ocupada span { color: white; font-weight: bold; }

        /* Painel de Vendas (Direita) - CORREÇÃO FINAL V50/V51 */
        .panel-venda { background: var(--card); border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .cart-body { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .cart-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }

        /* Botões Gold */
        .btn { border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-green { background: var(--green); color: white; }
        .btn-gold { background: var(--accent); color: var(--bg); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        
        /* Grid de Produtos Compacto */
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; overflow-y: auto; max-height: 400px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .p-item { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; }
        .p-item:hover { border-color: var(--accent); background: #1c212b; }
        .p-item b { color: var(--accent); display: block; font-size: 16px; margin-top: 5px; }

        input { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-size: 16px; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(255,184,0,0.2); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; text-align: left; color: var(--subtext); font-size: 12px; text-transform: uppercase; }
        td { background: var(--card); padding: 15px; font-size: 14px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-radius: 12px 0 0 12px; border-left: 1px solid var(--border); }
        td:last-child { border-radius: 0 12px 12px 0; border-right: 1px solid var(--border); }

        #impresso { display: none; width: 80mm; padding: 15px; color: #000; background: #fff; font-family: 'Courier New', monospace; }
        @media print { body * { display: none; } #impresso { display: block; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">BOTECO 934</div>
    <div class="nav-btn active" onclick="nav('v-caixa', this)"><i class="fas fa-desktop"></i> PDV CAIXA</div>
    <div class="nav-btn" onclick="nav('v-estoque', this)"><i class="fas fa-warehouse"></i> ESTOQUE</div>
    <div class="nav-btn" onclick="nav('v-clientes', this)"><i class="fas fa-address-book"></i> CLIENTES</div>
    <div class="nav-btn" onclick="nav('v-financas', this)"><i class="fas fa-wallet"></i> FINANCEIRO</div>
</aside>

<main class="main">
    <section id="v-caixa" class="view active">
        <div class="caixa-container">
            <div>
                <div class="grid-mesas" id="mesasUI"></div>
                <div style="background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border);">
                    <input type="text" id="scanner" placeholder="🔍 Buscar por nome ou bipar código..." onkeypress="handleScan(event)">
                    <div class="product-list" id="produtosUI"></div>
                </div>
            </div>

            <div id="checkout" class="panel-venda" style="display:none">
                <div class="cart-header">
                    <h2 id="cartMesaTitle" style="margin:0; color:var(--accent)">MESA --</h2>
                    <span id="cartUser" style="color:var(--subtext); font-size:12px"></span>
                </div>
                
                <div class="cart-body" id="cartItens"></div>
                
                <div style="background:rgba(255,184,0,0.05); padding:15px; border-radius:15px; margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px; color:var(--subtext)"><span>Soma parcial:</span><span id="parcial">R$ 0,00</span></div>
                    <div style="display:flex; justify-content:space-between; align-items:center"><h3 style="margin:0">Total a Pagar:</h3><h2 id="totalFinal" style="margin:0; color:var(--accent)">R$ 0,00</h2></div>
                </div>

                <select id="pagForm">
                    <option value="PIX">💠 PIX</option>
                    <option value="DINHEIRO">💵 DINHEIRO</option>
                    <option value="DÉBITO">💳 CARTÃO DÉBITO</option>
                    <option value="CRÉDITO">💳 CARTÃO CRÉDITO</option>
                    <option value="PENDURA">📝 PENDURA / CONTA</option>
                </select>

                <button class="btn btn-green" onclick="fechar()"><i class="fas fa-check-circle"></i> FINALIZAR VENDA</button>
                <button class="btn btn-outline" onclick="whatsapp()"><i class="fab fa-whatsapp"></i> ENVIAR COMANDA</button>
                <button class="btn" style="background:var(--red); font-size:10px" onclick="cancelarMesa()">CANCELAR MESA</button>
            </div>
        </div>
    </section>

    <section id="v-estoque" class="view">
        <div style="display:flex; gap:15px; margin-bottom:25px;">
            <button class="btn btn-gold" style="width:200px" onclick="exportExcel()">EXPORTAR EXCEL</button>
            <button class="btn btn-outline" style="width:200px" onclick="document.getElementById('imp').click()">IMPORTAR EXCEL</button>
            <input type="file" id="imp" style="display:none" onchange="importExcel(event)">
        </div>
        <table><thead><tr><th>Produto</th><th>Categoria</th><th>Valor</th><th>Ação</th></tr></thead><tbody id="listaEstoque"></tbody></table>
    </section>

    <section id="v-financas" class="view">
        <div class="panel-venda" style="max-width:500px">
            <h2 style="color:var(--accent)">Fechamento de Caixa</h2>
            <div id="resumoFinal" style="font-size:20px; line-height:2.5"></div>
        </div>
    </section>
</main>

<div id="impresso"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let estoque = [], vendas = [], mesas = Array(12).fill(null).map((_, i) => ({ id: i+1, itens: [], cliente: null }));
    let mesaSel = null;

    db.ref().on('value', snap => {
        const d = snap.val() || {};
        estoque = d.produtos ? Object.values(d.produtos).sort((a,b) => a.nome.localeCompare(b.nome)) : [];
        vendas = d.vendas ? Object.values(d.vendas) : [];
        render();
    });

    function render() {
        document.getElementById('mesasUI').innerHTML = mesas.map(m => `
            <div class="mesa-card ${m.itens.length > 0 ? 'ocupada' : ''} ${mesaSel && mesaSel.id === m.id ? 'selecionada' : ''}" onclick="selMesa(${m.id})">
                <h4>MESA ${m.id}</h4>
                <span>${m.cliente || (m.itens.length > 0 ? 'Em aberto' : 'Livre')}</span>
            </div>
        `).join('');

        document.getElementById('produtosUI').innerHTML = estoque.map(p => `
            <div class="p-item" onclick="add('${p.nome}')">${p.nome}<b>R$ ${p.val.toFixed(2)}</b></div>
        `).join('');

        document.getElementById('listaEstoque').innerHTML = estoque.map(p => `<tr><td>${p.nome}</td><td>${p.cat}</td><td>R$ ${p.val.toFixed(2)}</td><td><i class="fas fa-trash" style="color:var(--red); cursor:pointer"></i></td></tr>`).join('');
        
        const h = new Date().toLocaleDateString();
        const vH = vendas.filter(v => v.data === h);
        const t = { PIX:0, DINHEIRO:0, DÉBITO:0, CRÉDITO:0, PENDURA:0 };
        vH.forEach(v => t[v.metodo] += v.valor);
        document.getElementById('resumoFinal').innerHTML = Object.entries(t).map(([k,v]) => `<div style="display:flex; justify-content:space-between"><span>${k}</span><b>R$ ${v.toFixed(2)}</b></div>`).join('');
    }

    function selMesa(
