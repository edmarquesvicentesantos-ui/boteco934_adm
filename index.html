<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão Pro</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --gold: #d4af37; --orange: #ff9800; --green: #00ff88; --border: #2a2a2a; --gray: #888;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); color: var(--gray); cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; font-size: 11px; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .scan-area { background: #000; border: 1px dashed var(--gold); padding: 15px; text-align: center; margin-bottom: 15px; }
        .scan-area input { background: transparent; border: none; color: var(--gold); font-size: 22px; text-align: center; width: 100%; outline: none; font-family: monospace; }

        label { display: block; font-size: 10px; color: var(--gray); margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        input:focus { border-color: var(--gold); outline: none; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--gold); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid #1a1a1a; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-gold { background: var(--gold); color: #000; }
        
        .res-p { font-size: 11px; color: var(--green); margin-bottom: 10px; display: block; font-weight: bold; }
        .sugestao-caixa { background: #1a1500; border: 1px solid #443300; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>BOTECO 934</h1>
    <div id="relogio" style="color: var(--gold);"></div>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab('vendas')">Estoque/Preço</button>
    <button class="tab-btn" onclick="openTab('mesas')">Mesas</button>
    <button class="tab-btn" onclick="openTab('pendura')">Pendura</button>
    <button class="tab-btn" onclick="openTab('dash')">Dashboard</button>
</div>

<div id="vendas" class="content-section active">
    <div class="scan-area">
        <label>Leitor de Código de Barras (EAN-13)</label>
        <input type="text" id="scan_ean" placeholder="||||||||||||||||||" onchange="focarNome()">
    </div>

    <div class="grid-2">
        <div class="box">
            <h3>Calculadora de Precificação</h3>
            <label>Produto</label>
            <input type="text" id="p_nome" oninput="detectarDivisor()" placeholder="Ex: Skol Ambev">
            
            <div class="grid-2">
                <div><label>Qtd por Caixa</label><input type="number" id="p_divisor" oninput="calcular()" value="12"></div>
                <div><label>Custo da Caixa (R$)</label><input type="number" id="p_custo" oninput="calcular()"></div>
            </div>

            <div class="grid-2">
                <div><label>Markup Unitário (%)</label><input type="number" id="p_markup" value="50" oninput="calcular()"></div>
                <div><label>Sugerido Unidade</label><input type="number" id="p_sugerido" readonly style="color:var(--orange)"></div>
            </div>

            <div class="sugestao-caixa">
                <label style="color: var(--gold);">Venda da Caixa (Atacado)</label>
                <div class="grid-2">
                    <div><label>Markup Caixa %</label><input type="number" id="p_markup_caixa" value="20" oninput="calcular()"></div>
                    <div><label>Sugerido Caixa</label><input type="number" id="p_sugerido_caixa" readonly style="color:var(--green); font-weight:bold; font-size:16px;"></div>
                </div>
            </div>

            <label>Preço Praticado Unidade</label>
            <input type="number" id="p_venda" oninput="calcular()" placeholder="Valor no balcão">

            <span class="res-p" id="res_lucro">Lucro Real Unidade: R$ 0,00</span>
            <button class="btn btn-gold" onclick="salvarProduto()">Salvar no Estoque</button>
        </div>

        <div class="box">
            <h3>Estoque (Ordem Alfabética)</h3>
            <div style="max-height: 500px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr><th>PRODUTO</th><th>CUSTO UN.</th><th>VENDA UN.</th><th>SUG. CAIXA</th></tr>
                    </thead>
                    <tbody id="lista_estoque"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="mesas" class="content-section"><div class="grid-2" id="grid_mesas"></div></div>
<div id="pendura" class="content-section"><div class="box"><h3>Pendura</h3><table id="tab_clientes"></table></div></div>
<div id="dash" class="content-section"><div class="grid-2"><div class="box"><label>Lucro Estoque</label><h2 id="d_lucro_e" style="color: var(--green);">R$ 0,00</h2></div></div></div>

<script>
    let estoque = [];

    function openTab(name) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function detectarDivisor() {
        const nome = document.getElementById('p_nome').value.toLowerCase();
        let divisor = 12;
        if (nome.includes('dose')) divisor = 18;
        else if (nome.includes('ambev')) divisor = 23;
        else if (nome.includes('amstel')) divisor = 24;
        
        document.getElementById('p_divisor').value = divisor;
        calcular();
    }

    function calcular() {
        const custoCaixa = parseFloat(document.getElementById('p_custo').value) || 0;
        const divisor = parseInt(document.getElementById('p_divisor').value) || 1;
        const markupUn = parseFloat(document.getElementById('p_markup').value) || 0;
        const markupCx = parseFloat(document.getElementById('p_markup_caixa').value) || 0;
        const vendaUn = parseFloat(document.getElementById('p_venda').value) || 0;

        const cUnit = custoCaixa / divisor;
        
        // Sugerido Unidade
        const sugeridoUn = cUnit * (1 + (markupUn / 100));
        document.getElementById('p_sugerido').value = sugeridoUn.toFixed(2);

        // Sugerido Caixa (Atacado)
        const sugeridoCx = custoCaixa * (1 + (markupCx / 100));
        document.getElementById('p_sugerido_caixa').value = sugeridoCx.toFixed(2);

        const lucroRealUn = vendaUn - cUnit;
        document.getElementById('res_lucro').innerText = `Lucro Real p/ Unidade: R$ ${lucroRealUn.toFixed(2)}`;
    }

    function salvarProduto() {
        const p = {
            ean: document.getElementById('scan_ean').value || '---',
            nome: document.getElementById('p_nome').value.toUpperCase(),
            custo_caixa: parseFloat(document.getElementById('p_custo').value) || 0,
            divisor: parseInt(document.getElementById('p_divisor').value) || 1,
            venda: parseFloat(document.getElementById('p_venda').value) || 0,
            sugerido_caixa: parseFloat(document.getElementById('p_sugerido_caixa').value) || 0
        };
        if(!p.nome) return;
        estoque.push(p);
        estoque.sort((a,b) => a.nome.localeCompare(b.nome));
        renderEstoque();
        limpar();
    }

    function renderEstoque() {
        const html = estoque.map(p => {
            const cUn = p.custo_caixa / p.divisor;
            return `<tr>
                <td><small>${p.ean}</small><br>${p.nome} (${p.divisor} un)</td>
                <td>R$ ${cUn.toFixed(2)}</td>
                <td style="color:var(--green)">R$ ${p.venda.toFixed(2)}</td>
                <td style="color:var(--gold)">R$ ${p.sugerido_caixa.toFixed(2)}</td>
            </tr>`;
        }).join('');
        document.getElementById('lista_estoque').innerHTML = html;
        
        let lucroTotal = estoque.reduce((acc, p) => acc + (p.venda - (p.custo_caixa / p.divisor)), 0);
        document.getElementById('d_lucro_e').innerText = `R$ ${lucroTotal.toFixed(2)}`;
    }

    function focarNome() { document.getElementById('p_nome').focus(); }
    
    function limpar() { 
        document.getElementById('scan_ean').value = '';
        document.getElementById('p_nome').value = '';
        document.getElementById('p_custo').value = '';
        document.getElementById('p_venda').value = '';
        document.getElementById('scan_ean').focus();
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
