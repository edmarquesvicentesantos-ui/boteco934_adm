<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV GOLD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <img src="logo.png" alt="Boteco 934" onerror="this.src='https://via.placeholder.com/50?text=B934'">
                <span>PDV Gold</span>
            </div>
            <nav>
                <button onclick="filtrarCategoria('bebidas')">Bebidas</button>
                <button onclick="filtrarCategoria('boticario')">Boticário</button>
                <button class="btn-add-cat">+ Categorias</button>
            </nav>
            <div id="status-estoque" class="status-box"></div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <input type="text" id="busca" placeholder="Bipar código ou digitar nome..." oninput="buscarProduto()">
            </header>
            
            <div id="grade-produtos" class="grid-produtos">
                </div>
        </main>

        <section class="checkout-panel">
            <h3>Consumo Atual</h3>
            <div id="carrinho-itens" class="carrinho-lista"></div>
            
            <div class="checkout-footer">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="total-valor">R$ 0,00</span>
                </div>
                <button class="btn-finalizar" onclick="finalizarVenda()">Finalizar Venda (F1)</button>
                <button class="btn-whatsapp" onclick="enviarExtratoWhatsApp()">Enviar p/ WhatsApp</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
