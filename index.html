<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - v60 Blindada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        /* 1. CENTRAL DE PADRONIZAÇÃO (Mude aqui para mudar no App todo) */
        :root { 
            --bg: #05070a; --card: #12151c; --accent: #ffb800; --text: #ffffff; 
            --subtext: #94a3b8; --border: #1e293b; --green: #10b981; --red: #ef4444;
            /* FONTES PADRONIZADAS */
            --f-base: 14px; --f-title: 1.1rem; --f-button: 0.9rem; --f-data: 0.85rem;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; font-size: var(--f-base); overflow: hidden; }

        /* SIDEBAR FIXA */
        .sidebar { width: 180px; background: var(--card); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; z-index: 100; }
        .brand { color: var(--accent); font-weight: 700; font-size: 1rem; padding-bottom: 25px; text-align: center; text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .nav-btn { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--subtext); border-radius: 8px; margin-bottom: 8px; border: none; background: none; width: 100%; transition: 0.3s; font-size: var(--f-button); }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,184,0,0.12); color: var(--accent); font-weight: 600; }

        /* ÁREA PRINCIPAL */
        .main-container { flex: 1; padding: 20px; overflow-y: auto; position: relative; }
        .view { display: none; width: 100%; height: 100%; }
        .view.active { display: block; animation: fadeIn 0.3s; }

        /* ELEMENTOS PADRÃO */
        .card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 12px; margin-bottom: 15px; }
        .grid-caixa { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .grid-itens { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 12px; }
        
        .item-card { background: #1c212b; border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; }
        .item-card b { font-size: var(--f-button); color: var(--accent); display: block; margin-top: 5px; }
        .item-card span { font-size: 0.75rem; color: var(--subtext); }
        .item-card.mesa-ativa { border-color: var(--accent); background: rgba(255,184,0,0.05); }

        input, select { background: #0a0c10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; font-size: var(--f-button); }
        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: var(--f-button); transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-gold { background: var(--accent); color: var(--bg); }

        table { width: 100%; border-collapse: collapse; font-size: var(--f-data); }
        th { text-align: left; color: var(--subtext); padding: 12px; border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">Boteco 934</div>
    <button class="nav-btn active" onclick="nav('caixa', this)"><i class="fas fa-desktop"></i> CAIXA</button>
    <button class="nav-btn" onclick="nav('estoque', this)"><i class="fas fa-boxes-stacked"></i> ESTOQUE</button>
    <button class="nav-btn" onclick="nav('clientes', this)"><i class="fas fa-address-book"></i> CLIENTES</button>
    <button class="nav-btn" onclick="nav('financas', this)"><i class="fas fa-chart-line"></i> FINANÇAS</button>
</aside>

<main class="main-container">
    <section id="caixa" class="view active">
        <div class="grid-caixa">
            <div>
                <div class="grid-itens" id="mesasUI" style="margin-bottom:25px"></div>
                <div class="grid-itens" id="prodsUI"></div>
            </div>
            <div id="checkout" class="card" style="display:none; position: sticky; top: 0;">
                <h3 id="mesaTit" style="color:var(--accent); margin-bottom:15px">MESA --</h3>
                <div id="cartLista" style="min-height: 200px; border-top: 1px solid var(--border); padding: 15px 0;"></div>
                <div style="text-align:right; border-top: 1px solid var(--border); padding-top:15px">
                    <span style="font-size:0.75rem; color:var(--subtext)">VALOR TOTAL</span>
                    <h2 id="cartTotal" style="color:var(--green); font-size:1.8rem">R$ 0,00</h2>
                </div>
                <button class="btn btn-gold" style="margin-top:20px" onclick="pagar()"><i class="fas fa-check-circle"></i> FINALIZAR VENDA</button>
            </div>
        </div>
    </section>

    <section id="estoque" class="view">
        <div style="display:grid; grid-template-columns: 350px 1fr; gap:20px">
            <div class="card">
                <h3 style="margin-bottom:15px">Entrada via XML</h3>
                <input type="file" id="xmlIn" accept=".xml" onchange="processXML(this)">
                <p style="font-size:0.7rem; color:var(--subtext); margin-bottom:15px">O sistema lê a nota e aplica 50% de lucro.</p>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0">
                <h3>Manual</h3>
                <input type="text" id="pNome" placeholder="Produto">
                <input type="number" id="pVal" placeholder="Preço">
                <button class="btn btn-gold" onclick="addManual()">SALVAR PRODUTO</button>
            </div>
            <div class="card">
                <table><thead><tr><th>Item</th><th>Preço</th><th>Ação</th></tr></thead><tbody id="listaEstoque"></tbody></table>
            </div>
        </div>
    </section>

    <section id="clientes" class="view">
        <div style="display:grid; grid-template-columns: 350px 1fr; gap:20px">
            <div class="card">
                <h3>Novo Cliente</h3>
                <input type="text" id="cliNome" placeholder="Nome">
                <input type="text" id="cliZap" placeholder="WhatsApp">
                <button class="btn btn-gold" onclick="addCli()">CADASTRAR</button>
            </div>
            <div class="card">
                <table><thead><tr><th>Cliente</th><th>Contato</th></tr></thead><tbody id="listaClientes"></tbody></table>
            </div>
        </div>
    </section>

    <section id="financas" class="view">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px">
            <div class="card" style="text-align:center">
                <h3 style="color:var(--subtext)">TOTAL VENDIDO HOJE</h3>
                <h1 id="finHoje" style="color:var(--green); font-size:2.5rem; margin-top:10px">R$ 0,00</h1>
            </div>
            <div class="card">
                <h3>Histórico Recente</h3>
                <table><thead><tr><th>Data</th><th>Valor</th></tr></thead><tbody id="listaVendas"></tbody></table>
            </div>
        </div>
    </section>
</main>

<script>
    // CONFIGURAÇÃO CENTRAL
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let estoque = [], clientes = [], vendas = [], mesas = Array(12).fill(null).map((_,i)=>({id:i+1, itens:[]}));
    let mesaSel = null;

    // ESCUTA ÚNICA (Resolve o problema de apagar coisas ao carregar)
    db.ref().on('value', snap => {
        const d = snap.val() || {};
        estoque = d.produtos ? Object.values(d.produtos) : [];
        clientes = d.clientes ? Object.values(d.clientes) : [];
        vendas = d.vendas ? Object.values(d.vendas).reverse() : [];
        renderAll();
    });

    function renderAll() {
        // Render Mesas
        document.getElementById('mesasUI').innerHTML = mesas.map(m => `
            <div class="item-card ${m.itens.length > 0 ? 'mesa-ativa' : ''}" onclick="abrirMesa(${m.id})">
                <span>MESA</span><b>${m.id}</b>
            </div>
        `).join('');

        // Render Produtos no Caixa
        document.getElementById('prodsUI').innerHTML = estoque.map(p => `
            <div class="item-card" onclick="addAoCarrinho('${p.nome}')">
                <span>Item</span><b>${p.nome}</b>
            </div>
        `).join('');

        // Render Tabelas (Estoque, Clientes, Finanças)
        document.getElementById('listaEstoque').innerHTML = estoque.map(p => `<tr><td>${p.nome}</td><td>R$ ${parseFloat(p.val).toFixed(2)}</td><td><i class="fas fa-trash" style="color:var(--red); cursor:pointer" onclick="del('produtos/${p.nome}')"></i></td></tr>`).join('');
        document.getElementById('listaClientes').innerHTML = clientes.map(c => `<tr><td>${c.nome}</td><td>${c.zap}</td></tr>`).join('');
        
        const hoje = new Date().toLocaleDateString();
        const totalHoje = vendas.filter(v => v.data === hoje).reduce((a,b) => a + b.valor, 0);
        document.getElementById('finHoje').innerText = "R$ " + totalHoje.toFixed(2);
        document.getElementById('listaVendas').innerHTML = vendas.slice(0, 10).map(v => `<tr><td>${v.data}</td><td style="color:var(--green)">R$ ${v.valor.toFixed(2)}</td></tr>`).join('');
    }

    // LÓGICA DE NAVEGAÇÃO
    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // LÓGICA DO CAIXA
    function abrirMesa(id) {
        mesaSel = mesas.find(m => m.id === id);
        document.getElementById('checkout').style.display = 'block';
        document.getElementById('mesaTit').innerText = "MESA " + id;
        atualizarResumo();
    }

    function addAoCarrinho(nome) {
        if(!mesaSel) return alert("Clique em uma mesa primeiro!");
        const p = estoque.find(x => x.nome === nome);
        const ex = mesaSel.itens.find(i => i.nome === p.nome);
        if(ex) ex.qtd++; else mesaSel.itens.push({...p, qtd:1});
        atualizarResumo(); renderAll();
    }

    function atualizarResumo() {
        const total = mesaSel.itens.reduce((a,b) => a + (b.val * b.qtd), 0);
        document.getElementById('cartLista').innerHTML = mesaSel.itens.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:var(--f-data)">
                <span>${i.qtd}x ${i.nome}</span><b>R$ ${(i.val*i.qtd).toFixed(2)}</b>
            </div>
        `).join('');
        document.getElementById('cartTotal').innerText = "R$ " + total.toFixed(2);
    }

    function pagar() {
        const total = parseFloat(document.getElementById('cartTotal').innerText.replace('R$ ',''));
        if(total > 0) {
            db.ref('vendas').push({ valor: total, data: new Date().toLocaleDateString() });
            mesaSel.itens = [];
            document.getElementById('checkout').style.display = 'none';
            renderAll();
        }
    }

    // XML E CADASTROS
    function processXML(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const xml = new DOMParser().parseFromString(reader.result, "text/xml");
            const itens = xml.getElementsByTagName("det");
            for (let i = 0; i < itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent.toUpperCase();
                const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent) || 0;
                db.ref('produtos/' + nome.replace(/[.#$/[\]]/g, "")).set({ nome, val: custo * 1.5 });
            }
            alert("XML Importado!");
        };
        reader.readAsText(input.files[0]);
    }

    function addManual() {
        const n = document.getElementById('pNome').value.toUpperCase(), v = parseFloat(document.getElementById('pVal').value);
        if(n && v) db.ref('produtos/' + n).set({ nome: n, val: v });
    }

    function addCli() {
        const n = document.getElementById('cliNome').value.toUpperCase(), z = document.getElementById('cliZap').value;
        if(n) db.ref('clientes/' + n).set({ nome: n, zap: z });
    }

    function del(path) { if(confirm("Remover?")) db.ref(path).remove(); }
</script>
</body>
</html>
