<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV | BOTECO 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .fonte-13 { font-size: 13px !important; }
        .tarja-botao { background-color: #1e3a8a; }
        /* Ajuste para a logo não ficar esmagada */
        .area-logo { height: 120px; border-bottom: 2px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-white area-logo flex items-center justify-center p-4 shadow-sm">
        <div class="text-center">
            <h1 class="text-3xl font-black italic text-blue-900 tracking-tighter">BOTECO 934</h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Distribuidora & Bar</p>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-1/2 md:w-1/3 bg-gray-200 p-4 overflow-y-auto border-r border-gray-300">
            <h2 class="text-gray-600 font-bold mb-4 uppercase text-[10px] tracking-widest">Produtos</h2>
            <div id="lista-produtos" class="grid grid-cols-1 gap-3">
                </div>
        </aside>

        <main class="flex-1 p-4 bg-white flex flex-col justify-between">
            <div>
                <h3 class="font-bold mb-4 text-blue-900 border-b pb-2 uppercase text-xs">Venda Atual</h3>
                <div id="itens-venda" class="space-y-3">
                    </div>
            </div>

            <div class="mt-auto pt-6 border-t-2 border-dashed border-gray-200">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-gray-400 font-bold text-xs uppercase">Total a Pagar</span>
                    <span id="valor-total" class="text-4xl font-black text-gray-900 leading-none">R$ 0,00</span>
                </div>
                <button onclick="finalizarVenda()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-200 active:scale-95 transition-all text-xl uppercase">
                    Fechar Conta (PIX)
                </button>
            </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
