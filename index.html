<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>934 Elite - Otimizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2a; --accent: #38bdf8; --success: #22c55e; 
            --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- CABEÇALHO --- */
        .top-header {
            background: #020617; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1e293b;
        }
        .logo-934 { 
            background: var(--accent); color: #020617; padding: 5px 10px; 
            border-radius: 6px; font-weight: 900; font-size: 16px; 
        }

        /* --- BARRA DE MESAS (MINI) --- */
        .area-mesas { 
            display: flex; gap: 8px; padding: 10px; 
            overflow-x: auto; background: rgba(15, 23, 42, 0.8);
            border-bottom: 2px solid #1e293b;
        }
        .area-mesas::-webkit-scrollbar { display: none; }

        .mesa { 
            min-width: 65px; background: var(--card); padding: 8px; 
            border-radius: 8px; border: 2px solid #1e293b; 
            text-align: center; flex-shrink: 0;
        }
        .mesa.ocupada { border-top: 3px solid var(--accent); }
        .mesa.ativa { background: var(--accent); color: #020617; border-color: white; }
        .mesa-num { font-size: 16px; font-weight: 900; display: block; }
        .mesa-val { font-size: 9px; font-weight: 900; opacity: 0.8; }

        /* --- DIVISÃO DO CAIXA (CENTRO) --- */
        .conteudo-principal { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Parte 1: Busca e Lançamento */
        .secao-busca { 
            padding: 15px; background: #0b0f1a; 
            border-bottom: 1px solid #1e293b;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Parte 2: Lista de Produtos (Carrinho) */
        .secao-lista { flex: 1; overflow-y: auto; padding: 15px; background: #020617; }

        label { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-left: 4px; }
        
        input, select { 
            background: var(--card); border: 2px solid #334155; color: white; 
            padding: 14px; border-radius: var(--radius); 
            font-size: 15px; font-weight: 900; outline: none; width: 100%;
        }
        input:focus { border-color: var(--accent); }

        .item-carrinho { 
            background: var(--card); padding: 12px; border-radius: 10px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #1e293b;
        }
        .item-info b { font-size: 13px; font-weight: 900; text-transform: uppercase; }
        .item-info small { color: var(--accent); font-size: 10px; font-weight: 900; display: block; }

        /* --- RODAPÉ FIXO --- */
        .resumo { padding: 15px; background: #020617; border-top: 2px solid #1e293b; }
        .btn-finalizar { 
            width: 100%; padding: 18px; background: var(--accent); color: #020617; 
            border: none; border-radius: var(--radius); font-weight: 900; 
            font-size: 18px; cursor: pointer; text-transform: uppercase;
        }

        /* Modal Pagamento */
        .grid-pgto { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-modal { padding: 15px; background: #1e293b; color: white; border: none; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo-934">934</div>
        <div style="font-weight: 900; font-size: 12px; color: var(--muted);">CAIXA MÓVEL</div>
        <a href="produtos.html" style="text-decoration:none; font-size:12px; font-weight:900; color:var(--accent);">ESTOQUE</a>
    </header>

    <div class="area-mesas" id="grid-mesas"></div>

    <main class="conteudo-principal">
        <section class="secao-busca">
            <h2 id="titulo-mesa" style="font-size: 18px; font-weight: 900; color: var(--accent);">MESA ...</h2>
            <div>
                <label>👤 CLIENTE</label>
                <select id="select-cliente"></select>
            </div>
            <div>
                <label>🔍 BIPAR / BUSCAR</label>
                <input type="text" id="codigo-bipe" placeholder="CÓDIGO OU NOME..." autofocus>
            </div>
        </section>

        <section class="secao-lista" id="lista-carrinho">
            </section>
    </main>

    <footer class="resumo">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <span style="font-weight: 900; color: var(--muted); font-size: 14px;">TOTAL</span>
            <span style="color:var(--success); font-weight: 900; font-size: 26px;">R$ <span id="total-v">0.00</span></span>
        </div>
        <button class="btn-finalizar" onclick="abrirPagamento()">FECHAR CONTA</button>
    </footer>

    <div id="modal-pagamento" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:25px; border-radius:20px; width:90%; border:2px solid var(--accent); text-align:center;">
            <h2 style="font-weight:900; font-size:20px;">RECEBIMENTO</h2>
            <div style="font-size: 35px; color:var(--success); font-weight:900; margin:15px 0;">R$ <span id="total-modal-v">0.00</span></div>
            <div class="grid-pgto">
                <button onclick="finalizar('Dinheiro')" class="btn-modal">DINHEIRO</button>
                <button onclick="finalizar('Pix')" class="btn-modal">PIX</button>
                <button onclick="finalizar('Cartão')" class="btn-modal">CARTÃO</button>
                <button onclick="finalizar('Pendura')" class="btn-modal" style="background:var(--danger)">PENDURA</button>
            </div>
            <button onclick="fecharModal()" style="margin-top:20px; background:none; border:none; color:var(--muted); font-weight:900;">CANCELAR</button>
        </div>
    </div>

    <script>
        let PRODS = JSON.parse(localStorage.getItem('produtos')) || [];
        let CLIS = JSON.parse(localStorage.getItem('clientes')) || [{nome: "AVULSO", tel: "-"}];
        let MESAS = JSON.parse(localStorage.getItem('mesas_state')) || Array.from({length: 8}, (_, i) => ({ id: i+1, itens: [], total: 0, ocupada: false }));
        let mesaAtiva = null;

        function carregarClientes() {
            const s = document.getElementById('select-cliente');
            CLIS.sort((a,b) => a.nome.localeCompare(b.nome));
            s.innerHTML = CLIS.map(c => `<option value="${c.nome}" data-tel="${c.tel}">${c.nome}</option>`).join('');
        }

        function renderMesas() {
            document.getElementById('grid-mesas').innerHTML = MESAS.map(m => `
                <div class="mesa ${m.ocupada?'ocupada':''} ${mesaAtiva===m.id?'ativa':''}" onclick="selMesa(${m.id})">
                    <span class="mesa-num">${m.id}</span>
                    <span class="mesa-val">R$${m.total.toFixed(0)}</span>
                </div>
            `).join('');
            localStorage.setItem('mesas_state', JSON.stringify(MESAS));
        }

        function selMesa(id) {
            mesaAtiva = id;
            document.getElementById('titulo-mesa').innerText = "MESA " + id;
            renderMesas(); renderCarrinho();
            document.getElementById('codigo-bipe').focus();
        }

        document.getElementById('codigo-bipe').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && mesaAtiva) {
                let p = PRODS.find(x => x.codigo == e.target.value || x.nome.toLowerCase() == e.target.value.toLowerCase());
                if(p) {
                    let m = MESAS.find(x => x.id === mesaAtiva);
                    let sel = document.getElementById('select-cliente');
                    m.itens.push({ cli: sel.value, tel: sel.options[sel.selectedIndex].getAttribute('data-tel'), nome: p.nome, preco: p.preco });
                    m.total += p.preco; m.ocupada = true;
                    e.target.value = ''; renderMesas(); renderCarrinho();
                } else { alert("Produto não encontrado!"); e.target.value = ''; }
            }
        });

        function renderCarrinho() {
            if(!mesaAtiva) return;
            let m = MESAS.find(x => x.id === mesaAtiva);
            document.getElementById('lista-carrinho').innerHTML = m.itens.map((it, idx) => `
                <div class="item-carrinho">
                    <div class="item-info"><small>${it.cli}</small><b>${it.nome}</b></div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span style="font-weight:900; font-size:16px;">R$${it.preco.toFixed(2)}</span>
                        <button onclick="removerItem(${idx})" style="background:none; border:none; color:var(--danger); font-weight:900; font-size:20px;">✕</button>
                    </div>
                </div>
            `).reverse().join('');
            document.getElementById('total-v').innerText = m.total.toFixed(2);
        }

        function removerItem(idx) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let realIdx = m.itens.length - 1 - idx;
            m.total -= m.itens[realIdx].preco;
            m.itens.splice(realIdx, 1);
            if(m.itens.length === 0) m.ocupada = false;
            renderMesas(); renderCarrinho();
        }

        function abrirPagamento() {
            let m = MESAS.find(x => x.id === mesaAtiva);
            if(!m || m.total === 0) return alert("Selecione uma mesa com consumo!");
            document.getElementById('total-modal-v').innerText = m.total.toFixed(2);
            document.getElementById('modal-pagamento').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

        function finalizar(metodo) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let textoRecibo = `*BOTECO 934*\n*MESA ${m.id}*\n------------------\n`;
            m.itens.forEach(it => { textoRecibo += `${it.nome} - R$ ${it.preco.toFixed(2)}\n`; });
            textoRecibo += `------------------\n*TOTAL: R$ ${m.total.toFixed(2)}*\nPGTO: ${metodo}`;

            let tel = m.itens[m.itens.length-1].tel;
            if(tel && tel !== "-") {
                window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(textoRecibo)}`, '_blank');
            } else { alert("Finalizado com sucesso!"); }

            m.itens = []; m.total = 0; m.ocupada = false;
            fecharModal(); renderMesas(); renderCarrinho();
        }

        carregarClientes(); renderMesas();
    </script>
</body>
</html>
