<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - VERSÃO DEFINITIVA</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --i: #3498db; --a: #f1c40f; --r: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--a); }
        nav { background: #2c3e50; display: flex; height: 50px; flex-shrink: 0; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); border-bottom: 4px solid var(--a); }
        main { flex: 1; display: flex; overflow: hidden; }
        .tela { display: none; width: 100%; height: 100%; padding: 15px; overflow-y: auto; }
        .ativa { display: flex !important; }
        .col-mesas { width: 150px; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; padding: 10px; }
        .mesa-card { padding: 15px; margin-bottom: 10px; border: 2px solid var(--s); border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; }
        .mesa-card.ocupada { background: #fff9db; border-color: var(--a); color: #d35400; }
        .mesa-card.sel { background: var(--p) !important; color: white !important; }
        .col-central { flex: 1; padding: 0 15px; }
        .col-resumo { width: 320px; background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .btn-acao { padding: 15px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .prod-btn { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<header><h2>BOTECO 934</h2> <div id="relogio">00:00:00</div></header>

<nav>
    <button class="nav-btn active" onclick="trocar('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="trocar('estoque', this)">Produtos</button>
    <button class="nav-btn" onclick="trocar('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="trocar('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="render-mesas"></div>
        <div class="col-central">
            <input type="text" id="campo-bipe" placeholder="BIPE O CÓDIGO AQUI..." autocomplete="off">
            <div id="area-venda" style="display:none;">
                <label style="font-size:11px; font-weight:bold;">CLIENTE SELECIONADO:</label>
                <select id="sel-cli-venda"></select>
                <div id="render-prods" class="prod-grid"></div>
            </div>
        </div>
        <div class="col-resumo">
            <h3 id="txt-m-sel" style="text-align:center;">Selecione uma mesa</h3>
            <div id="carrinho" style="flex:1; overflow-y:auto; font-size:13px; margin-top:10px;"></div>
            <div style="border-top:2px solid #333; padding-top:10px;">
                <h2 style="color:var(--r);">Total Mesa: R$ <span id="total-v">0.00</span></h2>
                <button class="btn-acao" onclick="fecharConta()">FINALIZAR / DIVIDIR</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction:column;">
        <h3>📦 Produtos</h3>
        <input type="text" id="p-e" placeholder="Código de Barras">
        <input type="text" id="p-n" placeholder="Nome">
        <input type="number" id="p-v" placeholder="Preço">
        <button class="btn-acao" style="background:var(--i);" onclick="addP()">SALVAR PRODUTO</button>
        <table id="t-p"><thead><tr><th>EAN</th><th>Nome</th><th>R$</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="clientes" class="tela" style="flex-direction:column;">
        <h3>👥 Cadastro de Clientes</h3>
        <input type="text" id="c-n" placeholder="Nome do Cliente">
        <button class="btn-acao" style="background:var(--p);" onclick="addC()">SALVAR CLIENTE</button>
        <table id="t-c"><thead><tr><th>Nome</th><th>Ação</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="caixa" class="tela" style="flex-direction:column;">
        <h3>💰 Resumo do Caixa</h3>
        <div style="background:white; padding:15px; border-radius:8px; margin-bottom:15px; border-left:5px solid var(--s);">
            <small>TOTAL RECEBIDO:</small> <h2 id="cx-total">R$ 0.00</h2>
        </div>
        <table id="t-h"><thead><tr><th>Hora</th><th>Ref/Cliente</th><th>Valor</th><th>Pagto</th></tr></thead><tbody></tbody></table>
