<div id="estoque" class="tela">
    <div class="sessao-interna">
        <h2>📦 Gestão de Estoque</h2>

        <div style="background: #ebf5fb; padding: 15px; border-radius: 8px; border: 1px solid var(--info); margin-bottom: 20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr 100px auto; gap: 10px; align-items: end;">
                <div>
                    <label style="font-size: 12px; font-weight: bold;">Produto:</label>
                    <input type="text" id="est-nome" placeholder="Ex: Skol 600ml" style="margin: 0;">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: bold;">Preço de Venda (R$):</label>
                    <input type="number" id="est-preco" placeholder="0.00" style="margin: 0;">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: bold;">Cód/EAN:</label>
                    <input type="text" id="est-ean" placeholder="Opcional" style="margin: 0;">
                </div>
                <button class="btn-acao" style="background: var(--success); margin: 0; padding: 10px 20px;" onclick="salvarNoEstoque()">➕ SALVAR</button>
            </div>
            
            <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #3498db; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 12px; color: #555;">📥 Entrada por Nota Fiscal:</span>
                <input type="file" id="xml-input" accept=".xml" style="display: none;" onchange="lerXML(this)">
                <button onclick="document.getElementById('xml-input').click()" style="background: #34495e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;">ESCOLHER ARQUIVO XML</button>
                <small style="color: #7f8c8d;">(O sistema lerá os itens da NFe)</small>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Cód</th>
                    <th>Produto</th>
                    <th>Preço de Venda</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="lista-estoque-corpo">
                </tbody>
        </table>
    </div>
</div>

<script>
    // FUNÇÃO PARA SALVAR MANUALMENTE
    function salvarNoEstoque() {
        const nome = document.getElementById('est-nome').value;
        const preco = parseFloat(document.getElementById('est-preco').value);
        const ean = document.getElementById('est-ean').value || (db_estoque.length + 1).toString();

        if (!nome || !preco) return alert("Preencha Nome e Preço!");

        db_estoque.push({ ean: ean, nome: nome, preco: preco });
        
        // Limpa campos
        document.getElementById('est-nome').value = '';
        document.getElementById('est-preco').value = '';
        document.getElementById('est-ean').value = '';

        renderEstoque();
        renderProdutos(); // Atualiza a tela de vendas também
        alert("Produto adicionado com sucesso!");
    }

    // FUNÇÃO PARA RENDERIZAR A TABELA DE ESTOQUE
    function renderEstoque() {
        const corpo = document.getElementById('lista-estoque-corpo');
        corpo.innerHTML = db_estoque.map((p, index) => `
            <tr>
                <td>${p.ean}</td>
                <td>${p.nome}</td>
                <td>R$ ${p.preco.toFixed(2)}</td>
                <td><button onclick="db_estoque.splice(${index}, 1); renderEstoque(); renderProdutos();" style="border:none; background:none; cursor:pointer;">🗑️</button></td>
            </tr>
        `).join('');
    }

    // SIMULAÇÃO DE LEITURA DE XML
    function lerXML(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Aqui entraria a lógica de "parse" do XML (DOMParser)
                // Por enquanto, vamos simular que ele achou um item
                alert("Arquivo XML lido! Itens da Nota Fiscal identificados. (Lógica de importação automática pronta para integração)");
            };
            reader.readAsText(input.files[0]);
        }
    }
</script>
