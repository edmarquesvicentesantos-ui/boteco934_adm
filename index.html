<div id="modal-produto" class="modal">
    <div class="modal-content">
        <h3>Cadastrar Produto ou Dose</h3>
        <input type="text" id="p-nome" placeholder="Nome (Ex: Dose Whisky)">
        <input type="number" id="p-preco" placeholder="Preço de Venda">
        <input type="number" id="p-estoque" placeholder="Qtd. Inicial (Garrafas/Unid)">
        
        <label>Tipo de Venda:</label>
        <select id="p-tipo">
            <option value="unidade">Unidade (Lata/Garrafa)</option>
            <option value="dose">Dose (Fracionado)</option>
        </select>
        
        <button onclick="salvarProduto()">Salvar Produto</button>
        <button onclick="fecharModal('modal-produto')">Sair</button>
    </div>
</div>
