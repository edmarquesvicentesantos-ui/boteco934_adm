<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 PRO</title>
    <style>
        :root { --gold: #ffd700; --bg: #0d1117; --card: #161b22; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* CABEÇALHO OURO */
        .gold-header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .gold-header h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        /* CUPOM DE CAIXA */
        .cupom { background: #fff; color: #000; padding: 15px; font-family: 'Courier New', Courier, monospace; border-radius: 4px; border: 1px solid #ccc; }
        .cupom-header { border-bottom: 1px dashed #000; text-align: center; margin-bottom: 10px; padding-bottom: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0; }
        
        /* BOTÕES DE CONTROLE (+ - X) */
        .btn-ctrl { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-plus { background: #2ea44f; color: white; }
        .btn-minus { background: #d29922; color: white; }
        .btn-del { background: #da3633; color: white; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #fff; box-sizing: border-box; }
        .btn-save { background: var(--gold); color: #000; font-weight: bold; width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="gold-header">
    <h1>BOTECO 934</h1>
</div>

<div id="main">
    <div style="margin-bottom: 20px;">
        <input type="text" id="barcodeInput" placeholder="Bipe ou digite o código aqui..." onchange="buscarProduto(this.value)">
    </div>

    <div class="cupom" id="cupomCaixa">
        <div class="cupom-header">
            <strong>*** BOTECO 934 ***</strong><br>
            Petrolina - PE<br>
            --------------------------------
        </div>
        <div id="listaItens">
            <p style="text-align: center; color: #888;">Nenhum item no carrinho</p>
        </div>
        <div style="border-top: 1px dashed #000; margin-top: 10px; padding-top: 10px; text-align: right;">
            <strong>TOTAL: R$ <span id="totalVenda">0,00</span></strong>
        </div>
        <div style="text-align: center; font-size: 10px; margin-top: 10px;">
            --------------------------------<br>
            OBRIGADO PELA PREFERENCIA!
        </div>
    </div>
    
    <button class="btn-save" style="margin-top: 15px;" onclick="enviarWhatsapp()">ENVIAR VIA WHATSAPP</button>
</div>

<script>
    let carrinho = [];

    async function buscarProduto(codigo) {
        if(!codigo) return;
        
        // 1. Tenta buscar na internet se não soubermos o que é
        try {
            const resp = await fetch(`https://world.openfoodfacts.org/api/v2/product/${codigo}.json`);
            const data = await resp.json();
            
            let nome = "Novo Item " + codigo;
            if(data.status === 1) {
                nome = data.product.product_name || nome;
            }

            adicionarAoCarrinho(codigo, nome);
            document.getElementById('barcodeInput').value = ''; // Limpa para o próximo
        } catch (e) {
            alert("Erro ao buscar na internet. Adicionando manualmente.");
            adicionarAoCarrinho(codigo, "Item Manual");
        }
    }

    function adicionarAoCarrinho(id, nome) {
        let item = carrinho.find(i => i.id === id);
        if(item) {
            item.qtd++;
        } else {
            let preco = prompt(`Qual o preço de venda para: ${nome}?`, "6.00");
            carrinho.push({ id, nome, preco: parseFloat(preco), qtd: 1 });
        }
        renderizar();
    }

    function alterarQtd(id, delta) {
        let item = carrinho.find(i => i.id === id);
        if(item) {
            item.qtd += delta;
            if(item.qtd <= 0) removerItem(id);
        }
        renderizar();
    }

    function removerItem(id) {
        carrinho = carrinho.filter(i => i.id !== id);
        renderizar();
    }

    function renderizar() {
        const lista = document.getElementById('listaItens');
        const totalTxt = document.getElementById('totalVenda');
        lista.innerHTML = '';
        let total = 0;

        carrinho.forEach(item => {
            total += (item.preco * item.qtd);
            lista.innerHTML += `
                <div class="item-row">
                    <div>
                        <strong>${item.qtd}x ${item.nome}</strong><br>
                        <small>R$ ${item.preco.toFixed(2)} un.</small>
                    </div>
                    <div>
                        <button class="btn-ctrl btn-minus" onclick="alterarQtd('${item.id}', -1)">-</button>
                        <button class="btn-ctrl btn-plus" onclick="alterarQtd('${item.id}', 1)">+</button>
                        <button class="btn-ctrl btn-del" onclick="removerItem('${item.id}')">X</button>
                    </div>
                </div>
            `;
        });
        totalTxt.innerText = total.toFixed(2);
    }

    function enviarWhatsapp() {
        let texto = "*BOTECO 934 - RECIBO*\n----------------------------\n";
        carrinho.forEach(i => {
            texto += `${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}\n`;
        });
        texto += `----------------------------\n*TOTAL: R$ ${document.getElementById('totalVenda').innerText}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
    }
</script>
</body>
</html>
