<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - DIVISÃO DE CONTA</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --i: #3498db; --a: #f1c40f; --r: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--a); }
        nav { background: #2c3e50; display: flex; height: 50px; flex-shrink: 0; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); border-bottom: 4px solid var(--a); }
        main { flex: 1; display: flex; overflow: hidden; }
        .tela { display: none; width: 100%; height: 100%; padding: 15px; overflow-y: auto; }
        .ativa { display: flex !important; }
        .col-mesas { width: 150px; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; padding: 10px; }
        .mesa-card { padding: 15px; margin-bottom: 10px; border: 2px solid var(--s); border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; }
        .mesa-card.ocupada { background: #fff9db; border-color: var(--a); color: #d35400; }
        .mesa-card.sel { background: var(--p) !important; color: white !important; }
        .col-central { flex: 1; padding: 0 15px; }
        .col-resumo { width: 320px; background: #fff; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .btn-acao { padding: 15px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .prod-btn { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<header><h2>BOTECO 934</h2> <div id="relogio">00:00:00</div></header>

<nav>
    <button class="nav-btn active" onclick="trocar('vendas', this)">Vendas</button>
    <button class="nav-btn" onclick="trocar('estoque', this)">Produtos</button>
    <button class="nav-btn" onclick="trocar('clientes', this)">Clientes</button>
    <button class="nav-btn" onclick="trocar('caixa', this)">Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="render-mesas"></div>
        <div class="col-central">
            <input type="text" id="campo-bipe" placeholder="BIPE O CÓDIGO AQUI..." autocomplete="off">
            <div id="area-venda" style="display:none;">
                <label style="font-size:11px; font-weight:bold;">QUEM ESTÁ PEDINDO?</label>
                <select id="sel-cli-venda"></select>
                <div id="render-prods" class="prod-grid"></div>
            </div>
        </div>
        <div class="col-resumo">
            <h3 id="txt-m-sel" style="text-align:center;">Selecione uma mesa</h3>
            <div id="carrinho" style="flex:1; overflow-y:auto; font-size:13px; margin-top:10px;"></div>
            <div style="border-top:2px solid #333; padding-top:10px;">
                <h2 style="color:var(--r);">Total Mesa: R$ <span id="total-v">0.00</span></h2>
                <button class="btn-acao" onclick="fecharConta()">FECHAR / DIVIDIR CONTA</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction:column;">
        <h3>📦 Produtos</h3>
        <input type="text" id="p-e" placeholder="EAN / Código">
        <input type="text" id="p-n" placeholder="Nome">
        <input type="number" id="p-v" placeholder="Preço">
        <button class="btn-acao" style="background:var(--i);" onclick="addP()">SALVAR</button>
        <table id="t-p"><thead><tr><th>EAN</th><th>Nome</th><th>R$</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="clientes" class="tela" style="flex-direction:column;">
        <h3>👥 Clientes</h3>
        <input type="text" id="c-n" placeholder="Nome do Cliente">
        <input type="text" id="c-f" placeholder="WhatsApp">
        <button class="btn-acao" style="background:var(--p);" onclick="addC()">CADASTRAR</button>
        <table id="t-c"><thead><tr><th>Nome</th><th>Whats</th><th>X</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="caixa" class="tela" style="flex-direction:column;">
        <h3>💰 Caixa</h3>
        <div style="background:white; padding:15px; border-radius:8px; margin-bottom:15px; border-left:5px solid var(--s);">
            <small>VENDIDO HOJE:</small> <h2 id="cx-total">R$ 0.00</h2>
        </div>
        <table id="t-h"><thead><tr><th>Hora</th><th>Ref/Cliente</th><th>Valor</th><th>Tipo</th></tr></thead><tbody></tbody></table>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:var(--r); background:none; border:none; cursor:pointer; text-decoration:underline;">Reiniciar Sistema</button>
    </div>
</main>

<script>
    let PRODS = JSON.parse(localStorage.getItem('b934_p')) || [];
    let CLIS = JSON.parse(localStorage.getItem('b934_c')) || [{n: "Consumidor Geral", f: ""}];
    let HIST = JSON.parse(localStorage.getItem('b934_h')) || [];
    let MESAS = Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, status: 'livre' }));
    let mesaAtiva = null;

    function salvar() {
        localStorage.setItem('b934_p', JSON.stringify(PRODS));
        localStorage.setItem('b934_c', JSON.stringify(CLIS));
        localStorage.setItem('b934_h', JSON.stringify(HIST));
    }

    function trocar(id, btn) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        btn.classList.add('active');
        if(id === 'vendas') renderV();
        if(id === 'estoque') renderP();
        if(id === 'clientes') renderC();
        if(id === 'caixa') renderCX();
    }

    function renderV() {
        document.getElementById('render-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa-card ${m.status==='ocupada'?'ocupada':''} ${mesaAtiva===m.id?'sel':''}" onclick="selMesa(${m.id})">MESA ${m.id}<br>R$ ${m.total.toFixed(2)}</div>`).join('');
        document.getElementById('render-prods').innerHTML = PRODS.map((p, i) => `<div class="prod-btn" onclick="lancar(${i})">${p.n}<br>R$ ${parseFloat(p.v).toFixed(2)}</div>`).join('');
        document.getElementById('sel-cli-venda').innerHTML = CLIS.map(c => `<option value="${c.n}">${c.n}</option>`).join('');
    }

    function selMesa(id) {
        mesaAtiva = id;
        document.getElementById('txt-m-sel').innerText = "MESA " + id;
        document.getElementById('area-venda').style.display = 'block';
        renderV(); attCar();
        document.getElementById('campo-bipe').focus();
    }

    function lancar(i) {
        if(!mesaAtiva) return;
        let m = MESAS.find(x => x.id === mesaAtiva);
        let cli = document.getElementById('sel-cli-venda').value;
        m.itens.push({ cli: cli, n: PRODS[i].n, v: parseFloat(PRODS[i].v) });
        m.total += parseFloat(PRODS[i].v);
        m.status = 'ocupada';
        renderV(); attCar();
    }

    document.getElementById('campo-bipe').addEventListener('keypress', e => {
        if(e.key === 'Enter') {
            let pIdx = PRODS.findIndex(x => x.e === e.target.value);
            if(pIdx !== -1) { lancar(pIdx); e.target.value = ''; }
            else { alert("Não cadastrado!"); e.target.value = ''; }
        }
    });

    function attCar() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        document.getElementById('carrinho').innerHTML = m.itens.map(it => `<div><b>${it.cli}:</b> ${it.n} - R$ ${it.v.toFixed(2)}</div>`).join('');
        document.getElementById('total-v').innerText = m.total.toFixed(2);
    }

    function fecharConta() {
        let m = MESAS.find(x => x.id === mesaAtiva);
        if(!m || m.total <= 0) return;

        let op = prompt("DIVISÃO DE CONTA:\n1- Mesa Toda\n2- Por Cliente Específico\n3- Dividir Igual (Rachado)");
        
        let valorFechar = 0;
        let referencia = "Mesa " + m.id;

        if(op === "1") {
            valorFechar = m.total;
            m.itens = []; m.total = 0; m.status = 'livre';
        } else if(op === "2") {
            let nomeCli = prompt("Digite o nome do cliente que vai pagar:");
            let itensCli = m.itens.filter(i => i.cli === nomeCli);
            if(itensCli.length === 0) { alert("Cliente não encontrado na mesa!"); return; }
            valorFechar = itensCli.reduce((s, i) => s + i.v, 0);
            referencia = nomeCli;
            m.itens = m.itens.filter(i => i.cli !== nomeCli);
            m.total -= valorFechar;
            if(m.total <= 0) m.status = 'livre';
        } else if(op === "3") {
            let qtd = prompt("Dividir por quantas pessoas?");
            valorFechar = m.total / qtd;
            referencia = "Rachado 1/" + qtd;
            m.total -= valorFechar;
            if(m.total < 0.1) { m.itens = []; m.total = 0; m.status = 'livre'; }
        } else { return; }

        let f = prompt("PAGAMENTO:\n1-Dinheiro | 2-PIX | 3-Cartão | 4-Pendura");
        let meios = {"1":"Dinheiro","2":"PIX","3":"Cartão","4":"Pendura"};
        
        if(meios[f]) {
            HIST.push({ h: new Date().toLocaleTimeString(), r: referencia, v: valorFechar, t: meios[f] });
            alert("R$ " + valorFechar.toFixed(2) + " recebido (" + referencia + ")");
            salvar(); renderV(); attCar();
        }
    }

    function addP() { PRODS.push({e:document.getElementById('p-e').value, n:document.getElementById('p-n').value, v:document.getElementById('p-v').value}); salvar(); renderP(); }
    function renderP() { document.querySelector('#t-p tbody').innerHTML = PRODS.map((p,i)=>`<tr><td>${p.e}</td><td>${p.n}</td><td>${parseFloat(p.v).toFixed(2)}</td><td onclick="PRODS.splice(${i},1);salvar();renderP()">❌</td></tr>`).join(''); }
    
    function addC() { CLIS.push({n:document.getElementById('c-n').value, f:document.getElementById('c-f').value}); salvar(); renderC(); }
    function renderC() { document.querySelector('#t-c tbody').innerHTML = CLIS.map((c,i)=>`<tr><td>${c.n}</td><td>${c.f}</td><td onclick="CLIS.splice(${i},1);salvar();renderC()">❌</td></tr>`).join(''); }

    function renderCX() {
        let t = HIST.reduce((s,i)=>s+parseFloat(i.v),0);
        document.getElementById('cx-total').innerText = "R$ " + t.toFixed(2);
        document.getElementById('t-h tbody').innerHTML = HIST.map(h=>`<tr><td>${h.h}</td><td>${h.r}</td><td>R$ ${parseFloat(h.v).toFixed(2)}</td><td>${h.t}</td></tr>`).reverse().join('');
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = () => { renderV(); renderP(); renderC(); };
</script>
</body>
</html>
