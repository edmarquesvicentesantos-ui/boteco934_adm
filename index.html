<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Painel Administrativo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f4; color: #333; display: flex; flex-direction: column; height: 100vh; }

        /* CABEÇALHO ESTILO PORTAL */
        header { background: #fff; border-bottom: 3px solid #ffcc00; padding: 10px 20px; }
        
        .topo-superior { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .marca { display: flex; align-items: center; gap: 15px; }
        .logo-box { width: 60px; height: 60px; background: #333; color: #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8em; border: 2px solid #ffcc00; }
        .titulo-bar { line-height: 1; }
        .titulo-bar h1 { font-size: 1.8em; color: #000; letter-spacing: -1px; }
        .titulo-bar span { font-size: 0.7em; color: #666; font-weight: bold; text-transform: uppercase; }

        .info-centro { text-align: center; font-size: 0.85em; color: #444; }
        .info-centro strong { color: #d32f2f; }

        /* BARRA DE NAVEGAÇÃO (BOTÕES) */
        nav { background: #000; color: #fff; display: flex; padding: 0 20px; font-size: 0.8em; font-weight: bold; overflow-x: auto; }
        .nav-item { position: relative; padding: 12px 15px; cursor: pointer; text-transform: uppercase; border-right: 1px solid #333; white-space: nowrap; }
        .nav-item:hover { background: #ffcc00; color: #000; }
        
        /* MENU QUE ABRE AO PASSAR O MOUSE */
        .submenu { display: none; position: absolute; top: 100%; left: 0; background: #222; min-width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        .nav-item:hover .submenu { display: block; }
        .submenu-btn { width: 100%; padding: 12px; text-align: left; background: none; border: none; color: #fff; border-bottom: 1px solid #333; cursor: pointer; font-size: 0.9em; }
        .submenu-btn:hover { background: #444; color: #ffcc00; }

        /* ÁREA DE TRABALHO */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        .mesas-container { flex: 1; padding: 20px; overflow-y: auto; background: #e9e9e9; }
        #grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        
        .card-mesa { padding: 15px; border-radius: 5px; cursor: pointer; text-align: center; border-bottom: 4px solid rgba(0,0,0,0.2); transition: 0.2s; background: #fff; color: #333; }
        .status-livre { border-top: 5px solid #2e7d32; }
        .status-ocupada { border-top: 5px solid #c62828; background: #fff5f5; }
        .mesa-id { font-size: 0.7em; color: #888; margin-bottom: 5px; }
        .mesa-nome { font-weight: bold; font-size: 0.9em; }
        .mesa-vlr { color: #d32f2f; font-size: 0.85em; margin-top: 5px; font-weight: bold; }

        /* RECIBO NA DIREITA */
        .painel-recibo { width: 320px; background: #fff; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .recibo-head { padding: 15px; background: #f8f8f8; border-bottom: 1px solid #eee; }
        .recibo-lista { flex: 1; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.85em; overflow-y: auto; }
        .recibo-total { padding: 15px; font-size: 1.3em; font-weight: bold; text-align: right; background: #ffcc00; color: #000; }
    </style>
</head>
<body>

    <header>
        <div class="topo-superior">
            <div class="marca">
                <div class="logo-box">934</div>
                <div class="titulo-bar">
                    <h1>Boteco 934</h1>
                    <span>Distribuidora e Bar</span>
                </div>
            </div>
            
            <div class="info-centro">
                📍 Petrolina-PE | <span id="data-atual"></span><br>
                Dólar: <strong>R$ 5,01</strong> | Euro: <strong>R$ 5,87</strong>
            </div>

            <div style="font-size: 0.7em; text-align: right;">
                SISTEMA OPERACIONAL<br><strong>V 3.0 PRO</strong>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-item">Mesas / Comandas
            <div class="submenu">
                <button class="submenu-btn" onclick="zerarSistema()">Zerar Todas as Mesas</button>
                <button class="submenu-btn" onclick="location.reload()">Atualizar Painel</button>
            </div>
        </div>
        <div class="nav-item">Financeiro
            <div class="submenu">
                <button class="submenu-btn">Vendas do Dia</button>
                <button class="submenu-btn">Lista de Penduras</button>
                <button class="submenu-btn">Fechamento de Caixa</button>
            </div>
        </div>
        <div class="nav-item">Estoque
            <div class="submenu">
                <button class="submenu-btn">Entrada de Mercadoria (XML)</button>
                <button class="submenu-btn">Tabela de Preços</button>
                <button class="submenu-btn">Relatório de Quebras</button>
            </div>
        </div>
        <div class="nav-item">Boticário
            <div class="submenu">
                <button class="submenu-btn">Catálogo de Produtos</button>
                <button class="submenu-btn">Vendas Cosméticos</button>
            </div>
        </div>
    </nav>

    <div class="workspace">
        <main class="mesas-container">
            <div id="grid-mesas"></div>
        </main>

        <aside class="painel-recibo">
            <div class="recibo-head">
                <h4 style="margin:0">CUPOM DE CONFERÊNCIA</h4>
                <small id="cliente-foco">Selecione uma mesa</small>
            </div>
            <div class="recibo-lista" id="recibo-corpo"></div>
            <div class="recibo-total" id="total-final">R$ 0,00</div>
        </aside>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: "Cerveja 600ml Gelada", preco: 12.00 },
            { id: 2, nome: "Cerveja 600ml Grade", preco: 9.50 },
            { id: 3, nome: "Dose Whisky", preco: 12.00 },
            { id: 4, nome: "Refrigerante", preco: 6.00 },
            { id: 5, nome: "Gelo Pacote", preco: 15.00 }
        ];

        let mesas = JSON.parse(localStorage.getItem('boteco_portal_v1')) || Array.from({ length: 20 }, (_, i) => ({
            id: i + 1, ocupada: false, cliente: "", total: 0, itens: []
        }));

        function salvar() { localStorage.setItem('boteco_portal_v1', JSON.stringify(mesas)); }

        function renderizar() {
            document.getElementById('data-atual').innerText = new Date().toLocaleDateString();
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = mesas.map(m => `
                <div class="card-mesa ${m.ocupada ? 'status-ocupada' : 'status-livre'}" onclick="gerenciar(${m.id})">
                    <div class="mesa-id">MESA ${m.id}</div>
                    <div class="mesa-nome">${m.ocupada ? m.cliente.substring(0,10) : 'DISPONÍVEL'}</div>
                    <div class="mesa-vlr">${m.ocupada ? 'R$' + m.total.toFixed(2) : '---'}</div>
                </div>
            `).join('');
        }

        function gerenciar(id) {
            let mesa = mesas.find(m => m.id === id);
            if (!mesa.ocupada) {
                let n = prompt("Nome do Cliente:");
                if (n) { mesa.ocupada = true; mesa.cliente = n; mesa.itens = []; }
            } else {
                exibirRecibo(mesa);
                let op = prompt("1: + Adicionar | 2: PAGO | 3: PENDURA | 4: Sair");
                if (op === "1") {
                    let lista = produtos.map(p => `${p.id}: ${p.nome}`).join('\n');
                    let cod = prompt("CÓDIGO:\n" + lista);
                    let p = produtos.find(item => item.id == cod);
                    if (p) {
                        mesa.total += p.preco;
                        mesa.itens.push({ nome: p.nome, preco: p.preco });
                        exibirRecibo(mesa);
                    }
                } else if (op === "2" || op === "3") {
                    mesa.ocupada = false; mesa.cliente = ""; mesa.total = 0; mesa.itens = [];
                    document.getElementById('recibo-corpo').innerHTML = "";
                    document.getElementById('cliente-foco').innerText = "Mesa Finalizada";
                }
            }
            salvar(); renderizar();
        }

        function exibirRecibo(mesa) {
            document.getElementById('cliente-foco').innerText = "CLIENTE: " + mesa.cliente;
            const corpo = document.getElementById('recibo-corpo');
            corpo.innerHTML = mesa.itens.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.nome}</span><span>${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('total-final').innerText = "R$ " + mesa.total.toFixed(2);
        }

        function zerarSistema() {
            if (confirm("Deseja zerar todas as mesas agora?")) {
                mesas.forEach(m => { m.ocupada = false; m.cliente = ""; m.total = 0; m.itens = []; });
                salvar(); renderizar();
            }
        }
        renderizar();
    </script>
</body>
</html>
