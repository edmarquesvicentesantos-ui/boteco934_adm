<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Recibo Inteligente</title>
    <style>
        :root {
            --bg: #000000; --gold: #d4af37; --green: #00ff88; --border: #1a1a1a; --danger: #ff4444;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding: 10px; margin-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 18px; letter-spacing: 2px; }

        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #000; border: 1px solid var(--border); color: #666; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); }

        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        
        /* MESA ESTILO RECIBO TOTAL */
        .mesa-recibo { 
            background: #050505; 
            border: 1px solid var(--green); /* Inicia Verde (Livre) */
            border-radius: 4px; 
            display: flex; 
            flex-direction: column; 
            min-height: 380px; 
            transition: 0.3s;
        }
        .mesa-recibo.ocupada { border-color: var(--danger); }

        .recibo-topo { 
            padding: 10px; 
            border-bottom: 1px dashed var(--border); 
            text-align: center; 
            background: #0a0a0a;
        }
        .recibo-topo b { color: var(--gold); font-size: 14px; display: block; }
        .cliente-tag { color: #fff; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 5px; display: block; min-height: 15px;}

        .recibo-itens { 
            flex-grow: 1; 
            padding: 15px; 
            font-family: 'Courier New', monospace; 
            font-size: 13px; 
            color: #aaa; 
            overflow-y: auto; 
        }
        .linha-item { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .qtd-item { color: var(--gold); margin-right: 8px; font-weight: bold; }

        .recibo-rodape { 
            padding: 15px; 
            background: #0a0a0a; 
            border-top: 2px dashed var(--border); 
        }
        .total-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .total-v { font-size: 22px; font-weight: bold; color: var(--green); }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-bottom: 5px; }
        .btn-add { background: var(--gold); color: #000; }
        .btn-fechar { background: transparent; border: 1px solid #333; color: #666; }
        
        /* Cadastro simples */
        .box-adm { background: #0a0a0a; padding: 20px; border: 1px solid var(--border); border-radius: 8px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--gold); margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h1>BOTECO 934 - PDV</h1>
    <div id="relogio" style="color: var(--gold);"></div>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="ver('mesas')">Mesas</button>
    <button class="tab-btn" onclick="ver('adm')">Estoque</button>
</div>

<div id="mesas" class="content-section active">
    <div class="grid-mesas" id="grid_mesas"></div>
</div>

<div id="adm" class="content-section">
    <div class="box-adm">
        <h3>Cadastrar Produto</h3>
        <input type="text" id="p_nome" placeholder="NOME DO PRODUTO (Ex: COCA LATA)">
        <input type="number" id="p_preco" placeholder="PREÇO DE VENDA (R$)" step="0.01">
        <button class="btn btn-add" onclick="addEstoque()">SALVAR NO SISTEMA</button>
    </div>
</div>

<script>
    let estoque = [];
    let mesas = Array.from({ length: 8 }, (_, i) => ({ 
        id: i + 1, 
        cliente: '', 
        consumo: {}, 
        status: 'Livre' 
    }));

    function ver(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'mesas') desenharMesas();
    }

    function desenharMesas() {
        const grid = document.getElementById('grid_mesas');
        grid.innerHTML = mesas.map(m => {
            let soma = 0;
            let itensLista = "";
            
            for (let n in m.consumo) {
                const item = m.consumo[n];
                const sub = item.qtd * item.preco;
                soma += sub;
                itensLista += `
                    <div class="linha-item">
                        <span><span class="qtd-item">${item.qtd}x</span> ${n}</span>
                        <span>${sub.toFixed(2)}</span>
                    </div>`;
            }

            return `
                <div class="mesa-recibo ${m.status === 'Ocupada' ? 'ocupada' : ''}" onclick="cliqueMesa(${m.id})">
                    <div class="recibo-topo">
                        <b>EXTRATO MESA 0${m.id}</b>
                        <span class="cliente-tag">${m.cliente || 'CLIQUE P/ ABRIR'}</span>
                    </div>
                    
                    <div class="recibo-itens">
                        ${itensLista || '<div style="text-align:center;margin-top:80px;opacity:0.2">MESA VAZIA</div>'}
                    </div>

                    <div class="recibo-rodape">
                        <div class="total-box">
                            <small style="color:#666">TOTAL</small>
                            <span class="total-v">R$ ${soma.toFixed(2)}</span>
                        </div>
                        <button class="btn btn-add" onclick="event.stopPropagation(); lancar(${m.id})">+ ADICIONAR PRODUTO</button>
                        <button class="btn btn-fechar" onclick="event.stopPropagation(); fechar(${m.id}, ${soma})">FECHAR CONTA</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function cliqueMesa(id) {
        const m = mesas.find(x => x.id === id);
        if(m.status === 'Livre') {
            const nome = prompt("Nome do Cliente para Mesa 0" + id + ":");
            if(nome) {
                m.cliente = nome;
                desenharMesas();
            }
        }
    }

    function lancar(id) {
        const m = mesas.find(x => x.id === id);
        if(!m.cliente) {
            const nome = prompt("Defina o nome do cliente primeiro:");
            if(!nome) return;
            m.cliente = nome;
        }

        let lista = "PRODUTOS:\n";
        estoque.forEach((p, i) => lista += `${i+1}. ${p.nome} - R$ ${p.preco}\n`);
        
        const busca = prompt(lista + "\nQual produto?");
        if(!busca) return;

        const prod = estoque.find(p => p.nome === busca.toUpperCase());
        if(prod) {
            if(m.consumo[prod.nome]) m.consumo[prod.nome].qtd++;
            else m.consumo[prod.nome] = { qtd: 1, preco: prod.preco };
            m.status = 'Ocupada';
            desenharMesas();
        } else {
            alert("Produto não cadastrado!");
        }
    }

    function fechar(id, total) {
        if(total === 0) return;
        if(confirm(`Fechar Mesa 0${id}?\nTotal: R$ ${total.toFixed(2)}`)) {
            const m = mesas.find(x => x.id === id);
            m.status = 'Livre'; m.cliente = ''; m.consumo = {};
            desenharMesas();
        }
    }

    function addEstoque() {
        const n = document.getElementById('p_nome').value.toUpperCase();
        const p = parseFloat(document.getElementById('p_preco').value);
        if(n && p) {
            estoque.push({ nome: n, preco: p });
            estoque.sort((a,b) => a.nome.localeCompare(b.nome));
            alert("Salvo!");
            document.getElementById('p_nome').value = '';
            document.getElementById('p_preco').value = '';
        }
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    desenharMesas();
</script>
</body>
</html>
