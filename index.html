<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Estoque e Preço Praticado</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --orange: #ff9800; --green: #00ff88; --gray: #a0a0a0; --border: #333;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { text-align: center; border-bottom: 2px solid var(--orange); padding-bottom: 10px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--orange); text-transform: uppercase; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .box h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--orange); text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--gray); margin-bottom: 4px; font-weight: bold; }
        input { 
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); 
            color: #fff; font-size: 15px; box-sizing: border-box; border-radius: 4px;
        }
        input:focus { border-color: var(--orange); outline: none; }

        .res-dash { background: #000; border: 1px solid var(--green); padding: 15px; margin-top: 15px; border-radius: 4px; text-align: center; }
        .res-dash small { font-size: 10px; color: var(--gray); display: block; margin-bottom: 5px; }
        .res-dash div { font-size: 24px; color: var(--green); font-weight: bold; }

        .btn { width: 100%; padding: 15px; background: var(--orange); border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        /* Estilo da Lista */
        .lista-section { margin-top: 30px; background: var(--card); padding: 20px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--orange); font-size: 12px; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; }
        tr:hover { background: #1f1f1f; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Boteco 934 - Gestão de Vendas</h1></div>

    <div class="main-grid">
        <div class="box">
            <h3>Mercadorias (Fardo/Unidade)</h3>
            <div class="input-group"><label>Produto</label><input type="text" id="m_nome"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="input-group"><label>Custo Fardo (R$)</label><input type="number" id="m_custo" oninput="calcM()"></div>
                <div class="input-group"><label>Qtd Fardo</label><input type="number" id="m_qtd" oninput="calcM()" value="12"></div>
            </div>
            <div class="input-group"><label>Preço Praticado na Unidade (R$)</label><input type="number" id="m_venda" oninput="calcM()"></div>
            
            <div class="res-dash">
                <small>LUCRO LÍQUIDO NO FARDO</small>
                <div id="m_lucro_f">R$ 0,00</div>
            </div>
            <button class="btn" onclick="salvar('M')">Adicionar Mercadoria</button>
        </div>

        <div class="box">
            <h3>Destilados (Doses)</h3>
            <div class="input-group"><label>Destilado</label><input type="text" id="d_nome"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="input-group"><label>Custo Garrafa (R$)</label><input type="number" id="d_custo" oninput="calcD()"></div>
                <div class="input-group"><label>Perda Real (%)</label><input type="number" id="d_perda" oninput="calcD()" value="10"></div>
                <div class="input-group"><label>ML Garrafa</label><input type="number" id="d_ml_g" oninput="calcD()" value="1000"></div>
                <div class="input-group"><label>ML Dose</label><input type="number" id="d_ml_d" oninput="calcD()" value="50"></div>
            </div>
            <div class="input-group"><label>Preço Praticado na Dose (R$)</label><input type="number" id="d_venda" oninput="calcD()"></div>

            <div class="res-dash">
                <small>LUCRO LÍQUIDO NA GARRAFA</small>
                <div id="d_lucro_g">R$ 0,00</div>
            </div>
            <button class="btn" onclick="salvar('D')">Adicionar Destilado</button>
        </div>
    </div>

    <div class="lista-section">
        <h3>Produtos Cadastrados (Ordem Alfabética)</h3>
        <table>
            <thead>
                <tr>
                    <th>PRODUTO</th>
                    <th>TIPO</th>
                    <th>CUSTO UNIT/DOSE</th>
                    <th>PREÇO PRATICADO</th>
                    <th>LUCRO UNIT/DOSE</th>
                    <th>MARGEM REAL</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>
</div>

<script>
    let estoque = [];

    function calcM() {
        const custo = parseFloat(document.getElementById('m_custo').value) || 0;
        const qtd = parseInt(document.getElementById('m_qtd').value) || 1;
        const venda = parseFloat(document.getElementById('m_venda').value) || 0;
        const lucroF = (venda * qtd) - custo;
        document.getElementById('m_lucro_f').innerText = `R$ ${lucroF.toFixed(2)}`;
    }

    function calcD() {
        const custoG = parseFloat(document.getElementById('d_custo').value) || 0;
        const mlG = parseFloat(document.getElementById('d_ml_g').value) || 1;
        const mlD = parseFloat(document.getElementById('d_ml_d').value) || 1;
        const perda = parseFloat(document.getElementById('d_perda').value) || 0;
        const vendaD = parseFloat(document.getElementById('d_venda').value) || 0;

        const doses = (mlG * (1 - (perda/100))) / mlD;
        const lucroG = (vendaD * doses) - custoG;
        document.getElementById('d_lucro_g').innerText = `R$ ${lucroG.toFixed(2)}`;
    }

    function salvar(tipo) {
        let item = {};
        if(tipo === 'M') {
            const custo = parseFloat(document.getElementById('m_custo').value) || 0;
            const qtd = parseInt(document.getElementById('m_qtd').value) || 1;
            const venda = parseFloat(document.getElementById('m_venda').value) || 0;
            const cUnit = custo / qtd;
            item = {
                nome: document.getElementById('m_nome').value.toUpperCase(),
                tipo: 'Unidade',
                custo: cUnit,
                venda: venda,
                lucro: venda - cUnit,
                margem: venda > 0 ? ((venda - cUnit) / venda * 100) : 0
            };
        } else {
            const custoG = parseFloat(document.getElementById('d_custo').value) || 0;
            const mlG = parseFloat(document.getElementById('d_ml_g').value) || 1;
            const mlD = parseFloat(document.getElementById('d_ml_d').value) || 1;
            const perda = parseFloat(document.getElementById('d_perda').value) || 0;
            const vendaD = parseFloat(document.getElementById('d_venda').value) || 0;
            const doses = (mlG * (1 - (perda/100))) / mlD;
            const cDose = custoG / doses;
            item = {
                nome: document.getElementById('d_nome').value.toUpperCase(),
                tipo: 'Dose',
                custo: cDose,
                venda: vendaD,
                lucro: vendaD - cDose,
                margem: vendaD > 0 ? ((vendaD - cDose) / vendaD * 100) : 0
            };
        }
        
        if(item.nome) {
            estoque.push(item);
            // ORDEM ALFABÉTICA
            estoque.sort((a, b) => a.nome.localeCompare(b.nome));
            renderizarTabela();
        }
    }

    function renderizarTabela() {
        const corpo = document.getElementById('tabela-corpo');
        corpo.innerHTML = '';
        estoque.forEach(item => {
            corpo.innerHTML += `
                <tr>
                    <td>${item.nome}</td>
                    <td>${item.tipo}</td>
                    <td>R$ ${item.custo.toFixed(2)}</td>
                    <td style="color:var(--green); font-weight:bold;">R$ ${item.venda.toFixed(2)}</td>
                    <td>R$ ${item.lucro.toFixed(2)}</td>
                    <td>${item.margem.toFixed(1)}%</td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
