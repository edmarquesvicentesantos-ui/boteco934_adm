<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>934 Elite - Lado a Lado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2a; --accent: #38bdf8; --success: #22c55e; 
            --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); color: var(--text); 
            display: grid;
            grid-template-rows: 60px 1fr; /* Cabeçalho e Corpo */
            height: 100vh; overflow: hidden;
        }

        /* --- CABEÇALHO --- */
        .top-header {
            background: #020617; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1e293b;
        }
        .logo-934 { background: var(--accent); color: #020617; padding: 5px 12px; border-radius: 8px; font-weight: 900; }

        /* --- CORPO DIVIDIDO --- */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* DIVISÃO EXATA: ESQUERDA | DIREITA */
            overflow: hidden;
        }

        /* --- LADO ESQUERDO: SELEÇÃO E MESAS --- */
        .left-panel {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-right: 2px solid #1e293b;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .area-mesas-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 mesas por linha */
            gap: 8px;
        }

        .mesa-mini {
            aspect-ratio: 1; background: var(--card); border-radius: 8px;
            border: 2px solid #334155; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .mesa-mini.ocupada { border-color: var(--accent); }
        .mesa-mini.ativa { background: var(--accent); color: #020617; border-color: white; }
        .mesa-mini b { font-size: 16px; font-weight: 900; }
        .mesa-mini span { font-size: 8px; font-weight: 900; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; }
        select, input { 
            background: var(--card); border: 2px solid #334155; color: white; padding: 12px; 
            border-radius: 10px; font-size: 14px; font-weight: 900; outline: none;
        }

        /* --- LADO DIREITO: EXTRATO DO CAIXA --- */
        .right-panel {
            display: flex;
            flex-direction: column;
            background: #020617;
            padding: 15px;
        }

        .extrato-lista { flex: 1; overflow-y: auto; padding-right: 5px; }

        .item-linha {
            background: var(--card); padding: 10px; border-radius: 8px;
            margin-bottom: 6px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #1e293b;
        }
        .item-linha b { font-size: 12px; font-weight: 900; text-transform: uppercase; }
        .item-linha small { color: var(--accent); font-size: 9px; font-weight: 900; display: block; }

        .footer-caixa {
            border-top: 2px solid #1e293b; padding-top: 15px; margin-top: 10px;
        }

        .btn-fechar {
            width: 100%; padding: 18px; background: var(--accent); color: #020617;
            border: none; border-radius: 12px; font-weight: 900; font-size: 18px;
            cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo-934">934</div>
        <div style="font-weight: 900; font-size: 12px;" id="mesa-atual">SELECIONE MESA</div>
        <a href="produtos.html" style="text-decoration:none; color:var(--accent); font-weight:900; font-size:12px;">ESTOQUE</a>
    </header>

    <div class="main-container">
        <aside class="left-panel">
            <div class="input-group">
                <label>👤 Cliente</label>
                <select id="select-cliente"></select>
            </div>
            
            <div class="input-group">
                <label>🔍 Produto (Bipe)</label>
                <input type="text" id="codigo-bipe" placeholder="CÓDIGO..." autofocus>
            </div>

            <label>🪑 Mesas</label>
            <div class="area-mesas-grid" id="grid-mesas">
                </div>
        </aside>

        <main class="right-panel">
            <label>🧾 Extrato de Consumo</label>
            <div class="extrato-lista" id="lista-carrinho"></div>

            <div class="footer-caixa">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                    <span style="font-weight:900; color:var(--muted); font-size: 12px;">TOTAL</span>
                    <span style="color:var(--success); font-weight:900; font-size: 24px;">R$ <span id="total-v">0.00</span></span>
                </div>
                <button class="btn-fechar" onclick="abrirPagamento()">FECHAR</button>
            </div>
        </main>
    </div>

    <script>
        let PRODS = JSON.parse(localStorage.getItem('produtos')) || [];
        let CLIS = JSON.parse(localStorage.getItem('clientes')) || [{nome: "AVULSO", tel: "-"}];
        let MESAS = JSON.parse(localStorage.getItem('mesas_st')) || Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, ocupada: false }));
        let mesaAtiva = null;

        function carregarClientes() {
            const s = document.getElementById('select-cliente');
            s.innerHTML = CLIS.map(c => `<option value="${c.nome}" data-tel="${c.tel}">${c.nome}</option>`).join('');
        }

        function renderMesas() {
            document.getElementById('grid-mesas').innerHTML = MESAS.map(m => `
                <div class="mesa-mini ${m.ocupada?'ocupada':''} ${mesaAtiva===m.id?'ativa':''}" onclick="selMesa(${m.id})">
                    <b>${m.id}</b>
                    <span>R$${m.total.toFixed(0)}</span>
                </div>
            `).join('');
            localStorage.setItem('mesas_st', JSON.stringify(MESAS));
        }

        function selMesa(id) {
            mesaAtiva = id;
            document.getElementById('mesa-atual').innerText = "MESA " + id;
            renderMesas(); renderCarrinho();
            document.getElementById('codigo-bipe').focus();
        }

        document.getElementById('codigo-bipe').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && mesaAtiva) {
                let p = PRODS.find(x => x.codigo == e.target.value);
                if(p) {
                    let m = MESAS.find(x => x.id === mesaAtiva);
                    let sel = document.getElementById('select-cliente');
                    m.itens.push({ cli: sel.value, tel: sel.options[sel.selectedIndex].getAttribute('data-tel'), nome: p.nome, preco: p.preco });
                    m.total += p.preco; m.ocupada = true;
                    e.target.value = ''; renderMesas(); renderCarrinho();
                } else { alert("Não encontrado!"); e.target.value = ''; }
            }
        });

        function renderCarrinho() {
            if(!mesaAtiva) return;
            let m = MESAS.find(x => x.id === mesaAtiva);
            document.getElementById('lista-carrinho').innerHTML = m.itens.map((it, idx) => `
                <div class="item-linha">
                    <div><small>${it.cli}</small><b>${it.nome}</b></div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-weight:900;">R$${it.preco.toFixed(2)}</span>
                        <button onclick="removerItem(${idx})" style="background:none; border:none; color:var(--danger); font-weight:900;">✕</button>
                    </div>
                </div>
            `).reverse().join('');
            document.getElementById('total-v').innerText = m.total.toFixed(2);
        }

        function removerItem(idx) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let realIdx = m.itens.length - 1 - idx;
            m.total -= m.itens[realIdx].preco;
            m.itens.splice(realIdx, 1);
            if(m.itens.length === 0) m.ocupada = false;
            renderMesas(); renderCarrinho();
        }

        function abrirPagamento() {
            let m = MESAS.find(x => x.id === mesaAtiva);
            if(!m || m.total === 0) return alert("Selecione uma mesa!");
            alert("Finalizando R$ " + m.total.toFixed(2));
            m.itens = []; m.total = 0; m.ocupada = false; renderMesas(); renderCarrinho();
        }

        carregarClientes(); renderMesas();
    </script>
</body>
</html>
