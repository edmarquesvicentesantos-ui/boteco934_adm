<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        body { margin: 0; background: #05070a; color: white; font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 90px; background: #0f1218; border-right: 1px solid #1e293b; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .nav-item { padding: 20px 0; width: 100%; text-align: center; cursor: pointer; color: #64748b; font-size: 0.6rem; text-transform: uppercase; font-weight: 700; transition: 0.2s; }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .nav-item:hover, .active { color: #ffb800; background: #1c222d; }
        .main { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="ir('caixa.html', this)"><i class="fas fa-cash-register"></i>Caixa</div>
        <div class="nav-item" onclick="ir('estoque.html', this)"><i class="fas fa-boxes-stacked"></i>Estoque</div>
        <div class="nav-item" onclick="ir('clientes.html', this)"><i class="fas fa-users"></i>Clientes</div>
    </div>
    <div class="main">
        <iframe id="janela" src="caixa.html"></iframe>
    </div>
    <script>
        function ir(pag, el) {
            document.getElementById('janela').src = pag;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
