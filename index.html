<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE PDV - Boteco 934</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --danger: #c0392b; --accent: #f1c40f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial; background: #f4f7f6; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; font-size: 13px; }

        header { height: 45px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; }
        main { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 65px; background: var(--primary); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { color: #bdc3c7; padding: 15px 0; text-align: center; cursor: pointer; font-size: 9px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.1); color: var(--accent); border-left: 3px solid var(--accent); }

        /* ÁREA CENTRAL */
        .area-central { flex: 1; min-width: 0; background: #fff; display: flex; flex-direction: column; padding: 10px; border-right: 1px solid #ddd; }
        .tela { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .tela.ativa { display: flex; }

        /* SEÇÃO DE MESAS E PRODUTOS (LADO A LADO) */
        .vendas-container { display: flex; gap: 10px; height: 100%; }
        .col-mesas { width: 180px; overflow-y: auto; border-right: 1px solid #eee; padding-right: 10px; }
        .col-produtos { flex: 1; overflow-y: auto; }

        .mesa-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; border: 2px solid #ddd; border-radius: 6px; 
            text-align: center; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .mesa-btn.livre { background: #f9f9f9; color: #7f8c8d; }
        .mesa-btn.ocupada { background: #fff9db; border-color: var(--accent); color: #d35400; }
        .mesa-btn.selecionada { border-color: var(--primary); background: var(--primary); color: white; }

        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; }
        .card-p { border: 1px solid #eee; padding: 6px; text-align: center; border-radius: 4px; cursor: pointer; background: white; }
        .card-p img { width: 100%; height: 45px; object-fit: cover; border-radius: 2px; }
        .card-p h4 { font-size: 10px; margin: 4px 0; height: 24px; overflow: hidden; }

        /* CARRINHO */
        .carrinho { width: 280px; background: #fff; display: flex; flex-direction: column; padding: 10px; flex-shrink: 0; }
        .itens-lista { flex: 1; overflow-y: auto; border-bottom: 2px solid #f4f4f4; }
        .item-venda { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dotted #ccc; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 8px; color: white; }
    </style>
</head>
<body>

<header>
    <strong>BOTECO 934 - ELITE PDV</strong>
    <div style="font-size: 11px;">VENDA: R$ <span id="vTotal">0.00</span> | LUCRO: R$ <span id="lTotal">0.00</span></div>
</header>

<main>
    <nav class="sidebar">
        <div class="nav-item active" onclick="ver('vendas', this)"><i>🛒</i><br>VENDAS</div>
        <div class="nav-item" onclick="ver('clientes', this)"><i>👥</i><br>CLIENTES</div>
        <div class="nav-item" onclick="ver('estoque', this)"><i>📦</i><br>ESTOQUE</div>
    </nav>

    <section class="area-central">
        <div id="vendas" class="tela ativa">
            <div class="vendas-container">
                <div class="col-mesas">
                    <h4 style="margin-bottom:10px;">Mesas</h4>
                    <div id="lista-mesas"></div>
                </div>
                <div class="col-produtos">
                    <input type="text" id="busca" placeholder="Buscar no estoque..." style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px;">
                    <div id="grid-produtos" class="grid-produtos"></div>
                </div>
            </div>
        </div>

        <div id="clientes" class="tela">
            <h4>Gerenciar Clientes</h4>
            <table>
                <thead><tr><th>Nome</th><th>WhatsApp</th></tr></thead>
                <tbody id="t-cli"></tbody>
            </table>
        </div>

        <div id="estoque" class="tela">
            <h4>Controle de Estoque</h4>
            <table>
                <thead><tr><th>Ref</th><th>Item</th><th>Qtd</th><th>Preço</th></tr></thead>
                <tbody id="t-est"></tbody>
            </table>
        </div>
    </section>

    <section class="carrinho">
        <h4 id="conta-titulo" style="background:var(--primary); color:white; padding:5px; text-align:center; border-radius:4px;">Selecione uma Mesa</h4>
        <div id="c-itens" class="itens-lista"></div>
        <div style="padding:10px 0;">
            <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;">
                <span>Total:</span><span>R$ <span id="c-total">0.00</span></span>
            </div>
            <button class="btn" style="background:var(--success)" onclick="fecharMesa()">PAGAR E FECHAR</button>
        </div>
    </section>
</main>

<script>
    // ESTOQUE GLOBAL
    let db_estoque = [
        { ean: "001", nome: "Heineken 330ml", preco: 16.0, custo: 9.5, qtd: 24, img: "https://via.placeholder.com/80?text=HNK" },
        { ean: "002", nome: "Skol Lata", preco: 6.5, custo: 3.8, qtd: 50, img: "https://via.placeholder.com/80?text=SKL" },
        { ean: "003", nome: "Pitu 965ml", preco: 18.0, custo: 12.0, qtd: 10, img: "https://via.placeholder.com/80?text=PTU" }
    ];

    // INICIALIZAÇÃO DE 10 MESAS
    let mesas = Array.from({length: 10}, (_, i) => ({ id: i + 1, itens: [], total: 0, status: 'livre' }));
    let mesaAtiva = null;

    function ver(id, el) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
        if(id === 'estoque') renderEstoque();
    }

    // RENDERIZAR LISTA DE MESAS NA LATERAL DA VENDA
    function renderMesas() {
        const div = document.getElementById('lista-mesas');
        div.innerHTML = mesas.map(m => `
            <div class="mesa-btn ${m.status} ${mesaAtiva === m.id ? 'selecionada' : ''}" onclick="selecionarMesa(${m.id})">
                Mesa ${m.id} <br>
                <small>${m.status === 'ocupada' ? 'R$ '+m.total.toFixed(2) : 'Livre'}</small>
            </div>
        `).join('');
    }

    function selecionarMesa(id) {
        mesaAtiva = id;
        const m = mesas.find(x => x.id === id);
        document.getElementById('conta-titulo').innerText = "Conta Mesa " + id;
        renderMesas();
        attCarrinho();
        renderProdutos();
    }

    function renderProdutos() {
        document.getElementById('grid-produtos').innerHTML = db_estoque.map(p => `
            <div class="card-p" onclick="lancarItem('${p.ean}')">
                <img src="${p.img}">
                <h4>${p.nome}</h4>
                <b style="color:var(--success)">R$ ${p.preco.toFixed(2)}</b>
                <div style="font-size:9px; color:#999;">Qtd: ${p.qtd}</div>
            </div>
        `).join('');
    }

    function lancarItem(ean) {
        if(!mesaAtiva) return alert("Selecione uma mesa à esquerda!");
        const p = db_estoque.find(x => x.ean === ean);
        const m = mesas.find(x => x.id === mesaAtiva);
        
        if(p.qtd > 0) {
            m.itens.push({...p});
            m.total += p.preco;
            m.status = 'ocupada';
            p.qtd--; // BAIXA NO ESTOQUE
            attCarrinho();
            renderProdutos();
            renderMesas();
        } else {
            alert("Estoque insuficiente!");
        }
    }

    function attCarrinho() {
        if(!mesaAtiva) return;
        const m = mesas.find(x => x.id === mesaAtiva);
        const div = document.getElementById('c-itens');
        div.innerHTML = m.itens.map(i => `
            <div class="item-venda"><span>${i.nome}</span><span>${i.preco.toFixed(2)}</span></div>
        `).join('');
        document.getElementById('c-total').innerText = m.total.toFixed(2);
    }

    function fecharMesa() {
        if(!mesaAtiva) return;
        const m = mesas.find(x => x.id === mesaAtiva);
        if(m.itens.length === 0) return alert("Mesa sem consumo!");
        
        alert(`Mesa ${m.id} paga: R$ ${m.total.toFixed(2)}`);
        m.itens = []; m.total = 0; m.status = 'livre';
        mesaAtiva = null;
        document.getElementById('conta-titulo').innerText = "Selecione uma Mesa";
        renderMesas();
        attCarrinho();
    }

    function renderEstoque() {
        document.getElementById('t-est').innerHTML = db_estoque.map(p => `
            <tr><td>${p.ean}</td><td>${p.nome}</td><td>${p.qtd}</td><td>R$ ${p.preco.toFixed(2)}</td></tr>
        `).join('');
    }

    // INICIALIZAÇÃO
    renderMesas();
    renderProdutos();
</script>
</body>
</html>
