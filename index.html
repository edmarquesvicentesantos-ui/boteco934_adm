<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Gestão Blindada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #fff; }
        header { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .badge { background: #ffcc00; color: #000; padding: 10px; border-radius: 5px; font-weight: 900; font-size: 1.8em; }
        .brand { font-size: 2.2em; font-weight: 900; letter-spacing: -2px; }
        nav { display: flex; padding: 0 40px; gap: 25px; border-bottom: 1px solid #eee; }
        .nav-link { padding: 15px 0; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; }
        .active { border-bottom: 3px solid #ffcc00; color: #ffcc00; }
        .container { padding: 30px 40px; }
        .secao { display: none; }
        .ativa { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: #2b579a; color: white; padding: 12px; border: 1px solid #ccc; }
        td { padding: 10px; border: 1px solid #ccc; text-align: center; font-weight: bold; }
        .c-custo { background: #fff2cc; }
        .c-margem { background: #c6efce; color: #006100; }
        .form-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        input { padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #2b579a; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><div class="badge">934</div><div class="brand">BOTECO</div></div>
    <div class="indicadores">Dólar <b>▼ 5,011</b> | Euro <b>▼ 5,877</b></div>
</header>

<nav>
    <div class="nav-link active" onclick="navegar('operacional', this)">Operacional</div>
    <div class="nav-link" onclick="navegar('estoque', this)">Estoque / XML</div>
    <div class="nav-link" onclick="navegar('clientes', this)">Clientes</div>
</nav>

<div class="container">
    
    <div id="operacional" class="secao ativa">
        <h2>SISTEMA DE BALCÃO</h2>
        <p>Pronto para vender.</p>
    </div>

    <div id="estoque" class="secao">
        <h2>ESTOQUE E ENTRADA XML</h2>
        <div class="form-box">
            <input type="file" id="xmlFile" accept=".xml">
            <button onclick="lerXML()">IMPORTAR E SOMAR ESTOQUE</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Qtd em Mãos</th>
                    <th>Custo Unit.</th>
                    <th>Venda</th>
                    <th class="c-margem">Margem %</th>
                </tr>
            </thead>
            <tbody id="listaEstoque"></tbody>
        </table>
    </div>

    <div id="clientes" class="secao">
        <h2>NOVO CLIENTE</h2>
        <div class="form-box">
            <input type="text" id="cNome" placeholder="Nome">
            <input type="text" id="cZap" placeholder="WhatsApp">
            <input type="number" id="cLimite" placeholder="Limite">
            <button onclick="salvarCliente()">CADASTRAR</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>WhatsApp</th>
                    <th>Limite</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody id="listaClientes"></tbody>
        </table>
    </div>

</div>

<script>
    // Memória do Boteco 934 - Carrega o que foi salvo
    let db_estoque = JSON.parse(localStorage.getItem('b934_estoque')) || {};
    let db_clientes = JSON.parse(localStorage.getItem('b934_clientes')) || [];
    let db_notas = JSON.parse(localStorage.getItem('b934_notas')) || [];

    function navegar(id, btn) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        btn.classList.add('active');
        atualizarTelas();
    }

    // --- SALVAR CLIENTE ---
    function salvarCliente() {
        const nome = document.getElementById('cNome').value;
        const zap = document.getElementById('cZap').value;
        const limite = document.getElementById('cLimite').value;

        if(!nome || !limite) return alert("Preencha Nome e Limite!");

        db_clientes.push({ nome, zap, limite: parseFloat(limite), saldo: 0 });
        localStorage.setItem('b934_clientes', JSON.stringify(db_clientes));
        
        alert("Cliente Salvo!");
        document.getElementById('cNome').value = "";
        document.getElementById('cZap').value = "";
        document.getElementById('cLimite').value = "";
        atualizarTelas();
    }

    // --- LER XML E SOMAR ---
    function lerXML() {
        const file = document.getElementById('xmlFile').files[0];
        if(!file) return alert("Escolha o arquivo!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
            const chave = xml.getElementsByTagName("infNFe")[0]?.getAttribute("Id") || "";

            if(db_notas.includes(chave)) return alert("Nota já lançada!");

            const itens = xml.getElementsByTagName("det");
            for(let i = 0; i < itens.length; i++) {
                const nome = itens[i].getElementsByTagName("xProd")[0].textContent;
                const qtd = parseFloat(itens[i].getElementsByTagName("qCom")[0].textContent);
                const custo = parseFloat(itens[i].getElementsByTagName("vUnCom")[0].textContent);

                if(db_estoque[nome]) {
                    db_estoque[nome].qtd += qtd; // SOMA À QUANTIDADE ANTIGA
                    db_estoque[nome].custo = custo;
                } else {
                    db_estoque[nome] = { qtd: qtd, custo: custo, venda: custo * 1.5 };
                }
            }

            db_notas.push(chave);
            localStorage.setItem('b934_estoque', JSON.stringify(db_estoque));
            localStorage.setItem('b934_notas', JSON.stringify(db_notas));
            alert("Estoque Atualizado!");
            atualizarTelas();
        };
        reader.readAsText(file);
    }
