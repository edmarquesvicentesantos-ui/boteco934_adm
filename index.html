<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>934 ELITE - BUSCA AUTO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --accent: #00ffff; --green: #39ff14; --yellow: #fff000; --red: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background: #000; padding: 12px; border-bottom: 3px solid var(--accent); }
        .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { color: var(--accent); font-size: 20px; text-shadow: 0 0 10px var(--accent); }
        
        .botoes-mesas { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .btn-mesa { background: #111; color: #fff; border: 2px solid #444; padding: 10px; border-radius: 10px; min-width: 85px; font-size: 10px; text-align: center; }
        .btn-mesa.ocupada { border-color: var(--yellow); color: var(--yellow); }
        .btn-mesa.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .main { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        input#bipe { width: 100%; background: #111; border: 3px solid var(--green); padding: 18px; border-radius: 15px; color: var(--green); font-size: 22px; font-weight: 900; outline: none; margin-bottom: 15px; text-shadow: 0 0 10px var(--green); }

        .painel-venda { background: #000; border: 3px solid var(--yellow); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .btn-fechar { background: var(--red); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; margin-top: 10px; cursor: pointer; }

        .tabela-header { display: grid; grid-template-columns: 100px 1fr 60px 90px; padding: 10px; font-size: 10px; color: var(--accent); border-bottom: 1px solid #333; }
        .linha-produto { display: grid; grid-template-columns: 100px 1fr 60px 90px; padding: 15px 10px; border-bottom: 2px solid #1a1a1a; align-items: center; font-size: 14px; }
        
        .cod-txt { color: var(--yellow); font-size: 12px; }
        .nome-txt { font-weight: 900; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qtd-txt { text-align: center; background: #222; color: var(--green); padding: 5px; border-radius: 6px; border: 1px solid var(--green); }
        .preco-txt { text-align: right; color: var(--accent); font-weight: 900; }

        .btn-novo { background: var(--green); border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; color: #000; }
    </style>
</head>
<body>

<header>
    <div class="topo">
        <div class="logo">934 ELITE</div>
        <button class="btn-novo" onclick="cadastrarComBusca()">+ CADASTRAR</button>
    </div>
    <div class="botoes-mesas" id="container-mesas"></div>
</header>

<div class="main">
    <div id="painel-fechamento" class="painel-venda" style="display:none;">
        <p id="info-cliente" style="color: var(--yellow); font-size: 14px;"></p>
        <p id="total-mesa" style="font-size: 24px; font-weight: 900; color: var(--green);">Total: R$ 0.00</p>
        <button class="btn-fechar" onclick="fecharMesa()">CONFIRMAR PAGAMENTO</button>
    </div>

    <input type="text" id="bipe" placeholder="BIPAR PRODUTO..." autofocus>

    <div class="tabela-header">
        <span>CÓDIGO</span><span>PRODUTO</span><span style="text-align:center">EST.</span><span style="text-align:right">PREÇO</span>
    </div>
    <div class="lista-produtos" id="estoque-real"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX70Jks",
        authDomain: "boteco934-afc3f.firebaseapp.com",
        databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com",
        projectId: "boteco934-afc3f",
        storageBucket: "boteco934-afc3f.appspot.com",
        messagingSenderId: "182023728304",
        appId: "1:182023728304:web:80c8402f068c8578508f75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let mesaAtiva = null;
    let dadosMesas = {};

    // BUSCA AUTOMÁTICA NA INTERNET
    async function cadastrarComBusca() {
        const cod = prompt("BIPE O CÓDIGO DE BARRAS:");
        if (!cod) return;

        let nomeSugerido = "";
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${cod}.json`);
            const data = await res.json();
            if (data.status === 1) {
                nomeSugerido = data.product.product_name || "";
            }
        } catch (e) { console.log("Erro na busca"); }

        const nome = prompt("CONFIRME O NOME DO PRODUTO:", nomeSugerido.toUpperCase());
        const preco = prompt("PREÇO DE VENDA:");
        const qtd = prompt("ESTOQUE INICIAL:");

        if (nome && preco) {
            db.ref('produtos/' + cod).set({
                codigo: cod, nome: nome.toUpperCase(),
                preco: preco.replace(',', '.'), estoque: parseInt(qtd) || 0
            });
        }
    }

    // Lógica do BIPE
    document.getElementById('bipe').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const cod = e.target.value;
            if(!mesaAtiva) { alert("Selecione uma mesa!"); e.target.value = ''; return; }
            db.ref('produtos/' + cod).once('value', snap => {
                const p = snap.val();
                if(p) {
                    if(p.estoque > 0) {
                        db.ref('produtos/' + cod + '/estoque').set(p.estoque - 1);
                        let novoTotal = (dadosMesas[mesaAtiva].total || 0) + parseFloat(p.preco);
                        db.ref('mesas_ativas/' + mesaAtiva + '/total').set(novoTotal);
                    } else { alert("Estoque esgotado!"); }
                } else { alert("Produto não cadastrado! Use o botão + CADASTRAR."); }
            });
            e.target.value = '';
        }
    });

    // Sincronização e UI (Mesas e Estoque)
    db.ref('mesas_ativas').on('value', snap => {
        dadosMesas = snap.val() || {};
        const box = document.getElementById('container-mesas');
        box.innerHTML = '';
        for(let i=1; i<=15; i++) {
            let m = dadosMesas[i] || { nome: "Livre", total: 0 };
            let cl = m.total > 0 ? "btn-mesa ocupada" : "btn-mesa";
            if(mesaAtiva == i) cl += " active";
            box.innerHTML += `<button class="${cl}" onclick="selMesa(${i})">MESA ${i}<br><span>${m.nome}</span></button>`;
        }
        if(mesaAtiva && dadosMesas[mesaAtiva] && dadosMesas[mesaAtiva].total > 0) {
            document.getElementById('painel-fechamento').style.display = 'block';
            document.getElementById('info-cliente').innerText = "Cliente: " + dadosMesas[mesaAtiva].nome;
            document.getElementById('total-mesa').innerText = "Total: R$ " + dadosMesas[mesaAtiva].total.toFixed(2);
        } else { document.getElementById('painel-fechamento').style.display = 'none'; }
    });

    function selMesa(n) {
        mesaAtiva = n;
        if(!dadosMesas[n] || dadosMesas[n].total == 0) {
            let nome = prompt("Nome do Cliente:");
            if(nome) db.ref('mesas_ativas/' + n).set({ nome: nome.toUpperCase(), total: 0 });
            else mesaAtiva = null;
        }
        document.getElementById('bipe').focus();
    }

    function fecharMesa() {
        if(confirm("Confirmar fechamento?")) { db.ref('mesas_ativas/' + mesaAtiva).remove(); mesaAtiva = null; }
    }

    db.ref('produtos').on('value', snap => {
        const container = document.getElementById('estoque-real');
        const dados = snap.val() || {};
        let html = '';
        Object.values(dados).sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
            html += `<div class="linha-produto"><span class="cod-txt">${p.codigo}</span><span class="nome-txt">${p.nome}</span><span class="qtd-txt">${p.estoque}</span><span class="preco-txt">R$ ${parseFloat(p.preco).toFixed(2)}</span></div>`;
        });
        container.innerHTML = html;
    });
</script>
</body>
</html>
