<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Gestão Total</title>
    <style>
        :root { --blue: #0081f2; --orange: #e67e22; --bg: #f8f8f7; --border: #e5e7eb; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        aside { width: 240px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-weight: 800; font-size: 20px; margin-bottom: 20px; }
        .nav-btn { padding: 12px; border-radius: 8px; border: none; text-align: left; cursor: pointer; background: #fff; font-weight: 600; }
        .nav-btn:hover { background: #eee; }

        /* Principal */
        main { flex: 1; display: flex; flex-direction: column; background: #fff; margin: 10px; border-radius: 12px; border: 1px solid var(--border); }
        
        /* Cabeçalho Editável */
        header { padding: 15px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: #fdfdfd; }
        .head-input { padding: 8px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; }

        .grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; overflow-y: auto; flex: 1; }
        
        .card { border: 1px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; }
        .card h3 { font-size: 14px; margin: 10px 0; }
        .price { color: var(--blue); font-weight: 800; font-size: 18px; }

        /* Painel Direita */
        .panel { width: 320px; border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; background: #fafafa; }
        .recibo { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 15px 0; font-size: 13px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-blue { background: var(--blue); }
        .btn-orange { background: var(--orange); }
    </style>
</head>
<body>

<aside>
    <div class="logo">BOTECO 934</div>
    <button class="nav-btn" onclick="mostrarSecao('vendas')">🛒 Frente de Caixa</button>
    <button class="nav-btn" onclick="mostrarSecao('clientes')">👥 Lista de Clientes</button>
    <button class="nav-btn" onclick="addManual()">➕ Item Avulso</button>
</aside>

<main id="secao-vendas">
    <header>
        <input type="text" class="head-input" placeholder="Pesquisar Produto..." id="busca">
        <input type="text" class="head-input" placeholder="Nome do Cliente" id="cliente-atual">
        <div id="info-cliente" style="font-size: 12px; color: var(--orange); padding-top: 8px;">Saldo: R$ 0.00</div>
    </header>

    <div class="grid" id="lista-prods"></div>
</main>

<section class="panel">
    <h3>RECIBO</h3>
    <div class="recibo" id="recibo-lista">Vazio</div>
    <h2 id="total-venda" style="margin-bottom: 10px;">R$ 0,00</h2>
    <button class="btn btn-orange" onclick="lancarPendura()">Lançar no Pendura</button>
    <button class="btn btn-blue" onclick="finalizarVenda()">Finalizar no PIX/Dinheiro</button>
</section>

<script>
    // 1. DADOS DE CLIENTES E SALDO
    const clientes = [
        { nome: "Edmarques", tel: "55879...", saldo: 150.00 },
        { nome: "João Silva", tel: "5587...", saldo: 45.00 }
    ];

    // 2. DADOS DE PRODUTOS (Altere aqui PREÇO e CUSTO)
    const produtos = [
        { id: 1, nome: "Heineken 600ml", preco: 18.00, custo: 9.00, icon: "🍻" },
        { id: 2, nome: "Dose Pitu", preco: 5.00, custo: 1.50, icon: "🥃" },
        { id: 3, nome: "Perfume Malbec", preco: 199.90, custo: 120.00, icon: "✨" }
    ];

    let carrinho = [];
    let totalVenda = 0;

    // Função para carregar os cards
    function render() {
        const grade = document.getElementById('lista-prods');
        grade.innerHTML = produtos.map(p => `
            <div class="card">
                <div style="font-size:30px">${p.icon}</div>
                <h3>${p.nome}</h3>
                <div class="price">R$ ${p.preco.toFixed(2)}</div>
                <button class="btn btn-blue" style="padding:5px" onclick="add(${p.id})">ADD</button>
            </div>
        `).join('');
    }

    // 3. ADICIONAR PRODUTO MANUAL (AVULSO)
    function addManual() {
        const nome = prompt("Nome do item avulso:");
        const preco = parseFloat(prompt("Preço de venda:"));
        if(nome && preco) {
            carrinho.push({ nome, preco });
            totalVenda += preco;
            atualizarRecibo();
        }
    }

    function add(id) {
        const p = produtos.find(i => i.id === id);
        carrinho.push(p);
        totalVenda += p.preco;
        atualizarRecibo();
    }

    function atualizarRecibo() {
        document.getElementById('total-venda').innerText = `R$ ${totalVenda.toFixed(2)}`;
        document.getElementById('recibo-lista').innerHTML = carrinho.map(i => `<div>${i.nome} - R$ ${i.preco.toFixed(2)}</div>`).join('');
    }

    // 4. LÓGICA DO PENDURA COM WHATSAPP
    function lancarPendura() {
        const nome = document.getElementById('cliente-atual').value;
        if(!nome) return alert("Quem é o cliente?");
        
        let msg = `*BOTECO 934 - NOTA*%0ACliente: ${nome}%0ATotal: R$ ${totalVenda.toFixed(2)}%0A---%0A`;
        carrinho.forEach(i => msg += `- ${i.nome}%0A`);
        
        window.open(`https://wa.me/?text=${msg}`);
        limpar();
    }

    function limpar() {
        carrinho = []; totalVenda = 0;
        document.getElementById('cliente-atual').value = "";
        atualizarRecibo();
    }

    render();

    // Busca automática por nome de cliente para mostrar o saldo
    document.getElementById('cliente-atual').addEventListener('input', (e) => {
        const c = clientes.find(cli => cli.nome.toLowerCase().includes(e.target.value.toLowerCase()));
        if(c) document.getElementById('info-cliente').innerText = `Saldo Devedor: R$ ${c.saldo.toFixed(2)}`;
    });
</script>

</body>
</html>
