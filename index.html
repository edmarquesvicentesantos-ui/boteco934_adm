<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - PDV OFICIAL</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="topo">
        <h1>Boteco 934</h1>
        <div class="controles">
            <select id="select-mesa"><option value="1">Mesa 01</option><option value="balcao">Balcão</option></select>
            <input type="text" id="cliente-nome" placeholder="Nome do Cliente">
            <button onclick="abrirModal('modal-financeiro')" style="background:#007bff;color:#fff">📊 Finanças</button>
            <button onclick="abrirModal('modal-nota')" style="background:#17a2b8;color:#fff">📑 Notas</button>
            <button onclick="abrirModal('modal-produto')" style="background:#f8f9fa;color:#000">➕ Novo Produto</button>
        </div>
    </div>

    <div id="grade-produtos"></div>

    <div id="modal-financeiro" class="modal">
        <div class="modal-content">
            <h3>Caixa</h3>
            <p id="f-resumo">Carregando...</p>
            <button onclick="fecharModal('modal-financeiro')">Fechar</button>
        </div>
    </div>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h3>Cadastrar Item</h3>
            <input type="text" id="p-nome" placeholder="Nome">
            <input type="number" id="p-preco" placeholder="Preço">
            <button onclick="salvarProduto()">Salvar</button>
            <button onclick="fecharModal('modal-produto')">Sair</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
