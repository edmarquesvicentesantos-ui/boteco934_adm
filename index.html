<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caixa Boteco 934 - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral */
        nav { width: 80px; background: #020617; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid #334155; }
        nav a { color: var(--muted); text-decoration: none; margin-bottom: 25px; font-size: 10px; font-weight: 700; text-align: center; }
        
        /* Área de Mesas */
        .area-mesas { width: 280px; background: rgba(30, 41, 59, 0.5); padding: 20px; overflow-y: auto; border-right: 1px solid #334155; }
        .mesa { background: var(--card); padding: 15px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; border: 1px solid #334155; transition: 0.3s; position: relative; }
        .mesa.ocupada { border-left: 5px solid var(--accent); }
        .mesa.ativa { background: var(--accent); color: #020617; border-color: white; }
        
        /* Painel Central */
        .painel-venda { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        input, select { background: var(--card); border: 1px solid #334155; color: white; padding: 15px; border-radius: 10px; font-size: 16px; margin-bottom: 15px; outline: none; width: 100%; }
        
        /* Resumo Lateral */
        .resumo { width: 420px; background: #020617; padding: 25px; display: flex; flex-direction: column; border-left: 1px solid #334155; }
        #lista-carrinho { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .item-carrinho { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 13px; }
        
        /* Modal de Pagamento */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 450px; border: 1px solid var(--accent); }
        .metodo-pag { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-pg { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-pg:hover { border-color: var(--accent); color: var(--accent); }
        .total-modal { font-size: 32px; color: var(--success); font-weight: 800; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

    <nav>
        <div style="color:var(--accent); font-weight:900; margin-bottom:30px;">934</div>
        <a href="index.html">CAIXA</a>
        <a href="clientes.html">CLIENTES</a>
        <a href="produtos.html">ESTOQUE</a>
    </nav>

    <div class="area-mesas" id="grid-mesas"></div>

    <div class="painel-venda">
        <h1 id="titulo-mesa">Selecione uma Mesa</h1>
        <div style="margin-top:20px;">
            <label style="font-size:11px; color:var(--muted)">CLIENTE NA MESA</label>
            <select id="select-cliente"></select>
            
            <label style="font-size:11px; color:var(--muted)">BIPAR PRODUTO</label>
            <input type="text" id="codigo-bipe" placeholder="Bipe o código de barras..." autofocus>
        </div>
    </div>

    <div class="resumo">
        <h3>Consumo da Mesa</h3>
        <div id="lista-carrinho"></div>
        <div style="border-top: 1px solid #334155; padding-top:15px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>TOTAL:</span>
                <span style="color:var(--success); font-weight:800; font-size:24px;">R$ <span id="total-v">0.00</span></span>
            </div>
            <button onclick="abrirPagamento()" style="width:100%; padding:18px; background:var(--accent); color:#020617; border:none; border-radius:12px; font-weight:800; cursor:pointer;">FECHAR CONTA / RECIBO</button>
        </div>
    </div>

    <div id="modal-pagamento" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center">Finalizar Venda</h2>
            <div class="total-modal">R$ <span id="total-modal-v">0.00</span></div>
            
            <label style="font-size:11px;">MÉTODO DE RECEBIMENTO:</label>
            <div class="metodo-pag">
                <button class="btn-pg" onclick="finalizar('Dinheiro')">💵 Dinheiro</button>
                <button class="btn-pg" onclick="finalizar('Pix')">💎 Pix</button>
                <button class="btn-pg" onclick="finalizar('Cartão Crédito')">💳 Crédito</button>
                <button class="btn-pg" onclick="finalizar('Cartão Débito')">💳 Débito</button>
                <button class="btn-pg" onclick="finalizar('Pendura')" style="grid-column: span 2; border-color:var(--danger); color:var(--danger);">📌 Pendurar (Conta do Cliente)</button>
            </div>
            <button onclick="fecharModal()" style="margin-top:20px; background:none; border:none; color:var(--muted); width:100%; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        let PRODS = JSON.parse(localStorage.getItem('produtos')) || [];
        let CLIS = JSON.parse(localStorage.getItem('clientes')) || [{nome: "Consumidor Geral", tel: "-"}];
        // Inicia 12 mesas
        let MESAS = JSON.parse(localStorage.getItem('mesas_estado')) || Array.from({length: 12}, (_, i) => ({ id: i+1, itens: [], total: 0, ocupada: false }));
        let mesaAtiva = null;

        function carregarClientes() {
            const s = document.getElementById('select-cliente');
            CLIS.sort((a,b) => a.nome.localeCompare(b.nome));
            s.innerHTML = CLIS.map(c => `<option value="${c.nome}" data-tel="${c.tel}">${c.nome}</option>`).join('');
        }

        function renderMesas() {
            document.getElementById('grid-mesas').innerHTML = MESAS.map(m => `
                <div class="mesa ${m.ocupada?'ocupada':''} ${mesaAtiva===m.id?'ativa':''}" onclick="selMesa(${m.id})">
                    <b>MESA ${String(m.id).padStart(2, '0')}</b><br>
                    <span style="font-size:12px; opacity:0.8">R$ ${m.total.toFixed(2)}</span>
                </div>
            `).join('');
            localStorage.setItem('mesas_estado', JSON.stringify(MESAS));
        }

        function selMesa(id) {
            mesaAtiva = id;
            document.getElementById('titulo-mesa').innerText = "Mesa " + id;
            renderMesas(); renderCarrinho();
            document.getElementById('codigo-bipe').focus();
        }

        document.getElementById('codigo-bipe').onkeypress = (e) => {
            if(e.key === 'Enter' && mesaAtiva) {
                let p = PRODS.find(x => x.codigo == e.target.value);
                if(p) {
                    let m = MESAS.find(x => x.id === mesaAtiva);
                    let sel = document.getElementById('select-cliente');
                    let nomeCli = sel.value;
                    let telCli = sel.options[sel.selectedIndex].getAttribute('data-tel');
                    
                    m.itens.push({ cli: nomeCli, tel: telCli, nome: p.nome, preco: p.preco });
                    m.total += p.preco; m.ocupada = true;
                    e.target.value = ''; renderMesas(); renderCarrinho();
                } else { alert("Produto não cadastrado no estoque!"); e.target.value = ''; }
            }
        }

        function renderCarrinho() {
            if(!mesaAtiva) return;
            let m = MESAS.find(x => x.id === mesaAtiva);
            document.getElementById('lista-carrinho').innerHTML = m.itens.map((it, idx) => `
                <div class="item-carrinho">
                    <span><b>${it.cli}</b>: ${it.nome}</span>
                    <span>R$ ${it.preco.toFixed(2)} <button onclick="removerItem(${idx})" style="background:none; border:none; color:red; cursor:pointer; margin-left:5px;">x</button></span>
                </div>
            `).reverse().join('');
            document.getElementById('total-v').innerText = m.total.toFixed(2);
        }

        function removerItem(idx) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            // Reverter o reverse() do render
            let realIdx = m.itens.length - 1 - idx;
            m.total -= m.itens[realIdx].preco;
            m.itens.splice(realIdx, 1);
            if(m.itens.length === 0) m.ocupada = false;
            renderMesas(); renderCarrinho();
        }

        function abrirPagamento() {
            let m = MESAS.find(x => x.id === mesaAtiva);
            if(!m || m.total === 0) return alert("Mesa vazia!");
            document.getElementById('total-modal-v').innerText = m.total.toFixed(2);
            document.getElementById('modal-pagamento').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-pagamento').style.display = 'none'; }

        function finalizar(metodo) {
            let m = MESAS.find(x => x.id === mesaAtiva);
            let textoRecibo = `*BOTECO 934 - RECIBO MESA ${m.id}*\n--------------------------\n`;
            
            m.itens.forEach(it => {
                textoRecibo += `${it.nome} - R$ ${it.preco.toFixed(2)} (${it.cli})\n`;
            });
            
            textoRecibo += `--------------------------\n*TOTAL: R$ ${m.total.toFixed(2)}*\nFORMA DE PGTO: ${metodo}\nObrigado pela preferência!`;

            // Enviar para WhatsApp do último cliente selecionado (se houver tel)
            let tel = m.itens[m.itens.length-1].tel;
            if(tel && tel !== "-") {
                let link = `https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(textoRecibo)}`;
                window.open(link, '_blank');
            } else {
                alert("Venda Finalizada com Sucesso! (Cliente sem WhatsApp para recibo)");
            }

            // Resetar Mesa
            m.itens = []; m.total = 0; m.ocupada = false;
            fecharModal(); renderMesas(); renderCarrinho();
        }

        carregarClientes(); renderMesas();
    </script>
</body>
</html>
