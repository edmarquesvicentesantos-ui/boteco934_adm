<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - v51 Clean Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #020617; --sidebar: #0f172a; --accent: #fbbf24; --card: #1e293b; --text: #f8fafc; --success: #22c55e; --info: #3b82f6; --f-13: 13px; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--primary); color: var(--text); overflow: hidden; }
        
        .sidebar { width: 140px; background: var(--sidebar); border-right: 1px solid #334155; flex-shrink: 0; display: flex; flex-direction: column; }
        .logo-area { padding: 15px; text-align: center; color: var(--accent); font-weight: bold; border-bottom: 1px solid #334155; }
        .menu-item { padding: 12px; cursor: pointer; color: #94a3b8; font-size: 11px; border-bottom: 1px solid #1e293b; }
        .menu-item.active { background: #1e293b; color: var(--accent); border-left: 3px solid var(--accent); }

        .main-content { flex: 1; overflow-y: auto; padding: 10px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .glass-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid #475569; margin-bottom: 10px; }

        /* Grade de Mesas */
        .mesa-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 10px; }
        .mesa-card { padding: 10px 5px; border-radius: 6px; text-align: center; cursor: pointer; border: 1px solid #334155; background: #0f172a; color: #94a3b8; font-size: 10px; font-weight: bold; }
        .mesa-card.ocupada { background: var(--info); color: white; border-color: #fff; }

        /* Área de Venda Direita - Onde estava o erro */
        .painel-venda { display: flex; flex-direction: column; height: 100%; min-height: 400px; }
        .lista-itens { flex: 1; overflow-y: auto; margin: 10px 0; border-top: 1px solid #444; padding-top: 10px; font-size: 12px; }
        
        input, select { background: #0f172a; border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        
        .btn { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; width: 100%; font-size: 12px; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .grade-venda { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; }
        .item-grade { background: #1e293b; padding: 12px; border-radius: 6px; text-align: center; cursor: pointer; border: 1px solid #475569; font-size: 11px; }

        #reciboArea { display: none; width: 80mm; font-family: monospace; padding: 10px; color: black; background: white; }
        @media print { body * { display: none; } #reciboArea { display: block; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-area">BOTECO 934</div>
    <div class="menu-item active" onclick="show('view-mesas', this)">CAIXA</div>
    <div class="menu-item" onclick="show('view-estoque', this)">ESTOQUE</div>
    <div class="menu-item" onclick="show('view-clientes', this)">CLIENTES</div>
    <div class="menu-item" onclick="show('view-financas', this)">FINANÇAS</div>
</aside>

<main class="main-content">
    <section id="view-mesas" class="view-section active">
        <div style="display: grid; grid-template-columns: 1fr 320px; gap: 15px;">
            <div>
                <div class="mesa-grid" id="mapaMesas"></div>
                <div class="glass-card">
                    <input type="text" id="barcodeMesa" placeholder="BIPAR CÓDIGO..." onkeypress="handleBarcode(event)" autofocus>
                    <div id="gradeVenda" class="grade-venda"></div>
                </div>
            </div>
            
            <div id="detalheMesa" class="glass-card painel-venda" style="display:none; border: 2px solid var(--accent);">
                <h3 id="tituloMesa" style="margin:0">Mesa --</h3>
                <div id="consumoMesa" class="lista-itens"></div>
                <h2 id="totalMesa" style="text-align:right; color:var(--accent); margin: 10px 0;">R$ 0,00</h2>
                
                <select id="metodoPagamento">
                    <option value="DINHEIRO">DINHEIRO</option>
                    <option value="CARTÃO CRÉDITO">CARTÃO CRÉDITO</option>
                    <option value="CARTÃO DÉBITO">CARTÃO DÉBITO</option>
                    <option value="PENDURA">PENDURA</option>
                </select>
                
                <button class="btn" style="background:var(--success)" onclick="finalizar()">
                    <i class="fas fa-print"></i> PAGAR E IMPRIMIR
                </button>
                <button class="btn" style="background:#25d366" onclick="enviarZap()">
                    <i class="fab fa-whatsapp"></i> ENVIAR WHATSAPP
                </button>
            </div>
        </div>
    </section>

    <section id="view-estoque" class="view-section">
        <div class="glass-card">
            <h3>Gerenciar Estoque (A-Z)</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn" style="background:#1d6f42" onclick="exportarExcel()">EXPORTAR EXCEL</button>
                <button class="btn" style="background:#3b82f6" onclick="document.getElementById('excelInput').click()">IMPORTAR EXCEL</button>
                <input type="file" id="excelInput" style="display:none" onchange="importarExcel(event)">
            </div>
            <table style="width:100%; text-align:left; font-size:12px;">
                <thead><tr style="color:var(--accent)"><th>Produto</th><th>Cat.</th><th>Preço</th></tr></thead>
                <tbody id="tabEstoque"></tbody>
            </table>
        </div>
    </section>

    <section id="view-financas" class="view-section">
        <div class="glass-card">
            <h3>Fechamento de Caixa</h3>
            <div id="resumoFinanceiro" style="font-size: 18px; line-height: 2;"></div>
        </div>
    </section>
</main>

<div id="reciboArea"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAxjhzLPeqBqJ18S8m7lagxuvF9LX7OJks", databaseURL: "https://boteco934-afc3f-default-rtdb.firebaseio.com", projectId: "boteco934-afc3f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let estoque = [], vendas = [], mesas = Array(12).fill(null).map((_, i) => ({ id: i+1, itens: [] }));
    let mesaAtiva = null;

    db.ref().on('value', snap => {
        const d = snap.val() || {};
        estoque = d.produtos ? Object.values(d.produtos).sort((a,b) => a.nome.localeCompare(b.nome)) : [];
        vendas = d.vendas ? Object.values(d.vendas) : [];
        renderAll();
    });

    function renderAll() {
        renderMesas(); renderEstoque(); renderFinancas();
        document.getElementById('gradeVenda').innerHTML = estoque.map(p => `
            <div class="item-grade" onclick="addItem('${p.nome}')">${p.nome}<br><b>R$ ${p.val.toFixed(2)}</b></div>
        `).join('');
    }

    function addItem(nome) {
        if(!mesaAtiva) return;
        const p = estoque.find(x => x.nome === nome);
        const it = mesaAtiva.itens.find(i => i.nome === p.nome);
        if(it) it.qtd++; else mesaAtiva.itens.push({...p, qtd: 1});
        renderDetalhe();
    }

    function renderDetalhe() {
        const total = mesaAtiva.itens.reduce((s, i) => s + (i.val * i.qtd), 0);
        document.getElementById('consumoMesa').innerHTML = mesaAtiva.itens.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${i.qtd}x ${i.nome}</span><b>R$ ${(i.val*i.qtd).toFixed(2)}</b>
            </div>
        `).join('');
        document.getElementById('totalMesa').innerText = "R$ " + total.toFixed(2);
        renderMesas();
    }

    function finalizar() {
        const total = mesaAtiva.itens.reduce((s, i) => s + (i.val * i.qtd), 0);
        if(total === 0) return;
        const met = document.getElementById('metodoPagamento').value;
        vendas.push({ valor: total, metodo: met, data: new Date().toLocaleDateString() });
        db.ref('vendas').set(vendas);
        
        // Gerar Recibo Térmico
        const itensStr = mesaAtiva.itens.map(i => `${i.qtd}x ${i.nome.substring(0,15)} R$${(i.val*i.qtd).toFixed(2)}`).join('<br>');
        document.getElementById('reciboArea').innerHTML = `<center><b>BOTECO 934</b><br>${new Date().toLocaleString()}<br>---<br>${itensStr}<br>---<br><b>TOTAL: R$ ${total.toFixed(2)}</b><br>PAGTO: ${met}</center>`;
        
        mesaAtiva.itens = [];
        document.getElementById('detalheMesa').style.display = 'none';
        window.print();
    }

    function renderFinancas() {
        const hoje = new Date().toLocaleDateString();
        const vH = vendas.filter(v => v.data === hoje);
        const totais = { DINHEIRO: 0, 'CARTÃO CRÉDITO': 0, 'CARTÃO DÉBITO': 0, PENDURA: 0 };
        vH.forEach(v => { if(totais[v.metodo] !== undefined) totais[v.metodo] += v.valor; });
        document.getElementById('resumoFinanceiro').innerHTML = Object.entries(totais).map(([k, v]) => `<b>${k}:</b> R$ ${v.toFixed(2)}`).join('<br>');
    }

    function renderMesas() {
        document.getElementById('mapaMesas').innerHTML = mesas.map(m => `
            <div class="mesa-card ${m.itens.length > 0 ? 'ocupada' : ''}" onclick="abrirMesa(${m.id})">MESA ${m.id}</div>
        `).join('');
    }

    function abrirMesa(id) {
        mesaAtiva = mesas.find(m => m.id === id);
        document.getElementById('detalheMesa').style.display = 'flex';
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        renderDetalhe();
    }

    function exportarExcel() {
        const ws = XLSX.utils.json_to_sheet(estoque);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Produtos");
        XLSX.writeFile(wb, "estoque_934.xlsx");
    }

    function importarExcel(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('produtos').set(data);
        };
        reader.readAsBinaryString(e.target.files[0]);
    }

    function handleBarcode(e) { if(e.key === 'Enter') { const p = estoque.find(x => x.cod === e.target.value.trim()); if(p) addItem(p.nome); e.target.value = ''; } }
    function renderEstoque() { document.getElementById('tabEstoque').innerHTML = estoque.map(p => `<tr><td>${p.nome}</td><td>${p.cat}</td><td>R$ ${p.val.toFixed(2)}</td></tr>`).join(''); }
    function show(id, el) { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active')); el.classList.add('active'); }
    function enviarZap() { window.open(`https://wa.me/?text=Boteco 934: Total R$ ${document.getElementById('totalMesa').innerText}`); }
</script>
</body>
</html>
