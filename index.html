<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ELITE PDV - Cloud Boteco 934</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* [Seus estilos CSS anteriores permanecem aqui] */
        :root { --primary: #1a252f; --success: #27ae60; --danger: #c0392b; --accent: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; }
        main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 70px; background: var(--primary); display: flex; flex-direction: column; }
        .venda-grid { flex: 2; padding: 15px; display: flex; flex-direction: column; background: white; }
        .carrinho { width: 350px; background: #fff; padding: 15px; border-left: 1px solid #ddd; }
        .active-screen { display: flex !important; }
        .hidden { display: none !important; }
        /* Estilos de tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

<header>
    <h2>BOTECO 934</h2>
    <div style="display: flex; gap: 15px;">
        <div style="background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 4px;">
            Venda: R$ <span id="venda_total">0.00</span>
        </div>
        <div style="background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 4px;">
            Lucro: R$ <span id="lucro_total">0.00</span>
        </div>
    </div>
</header>

<main>
    <nav class="sidebar">
        <div onclick="showScreen('vendas')" class="nav-item"><i>🛒</i></div>
        <div onclick="showScreen('clientes')" class="nav-item"><i>👥</i></div>
        <div onclick="showScreen('estoque')" class="nav-item"><i>📦</i></div>
    </nav>

    <section id="screen-vendas" class="venda-grid active-screen">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="busca" placeholder="Bipar ou pesquisar..." style="flex:2; padding:10px;">
            <select id="cliente-select" style="flex:1; padding:10px;"><option value="">Avulso</option></select>
        </div>
        <div id="produtos-lista" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px; overflow-y:auto;"></div>
    </section>

    <section id="screen-clientes" class="venda-grid hidden">
        <h3>Lista de Clientes</h3>
        <table>
            <thead><tr><th>Nome</th><th>Contato</th></tr></thead>
            <tbody id="lista-clientes-body"></tbody>
        </table>
    </section>

    <section id="screen-estoque" class="venda-grid hidden">
        <h3>Estoque Atual</h3>
        <table>
            <thead><tr><th>Código</th><th>Produto</th><th>Custo</th><th>Venda</th></tr></thead>
            <tbody id="lista-estoque-body"></tbody>
        </table>
    </section>

    <section class="carrinho">
        <h3>Carrinho</h3>
        <div id="carrinho-itens" style="flex:1; overflow-y:auto;"></div>
        <div style="margin-top:auto; background:#f9f9f9; padding:10px;">
            <p>Total: <b>R$ <span id="total-carrinho">0.00</span></b></p>
            <button onclick="finalizarVenda()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">FINALIZAR</button>
        </div>
    </section>
</main>

<script>
    // CONFIGURAÇÃO FIREBASE (Substitua pelos seus dados)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO_ID",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "SEU_ID",
        appId: "SEU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let produtos = [];
    let carrinho = [];

    // CARREGAR DADOS DO FIREBASE
    async function syncData() {
        // Carregar Produtos
        db.collection("produtos").onSnapshot(snapshot => {
            produtos = snapshot.docs.map(doc => doc.data());
            renderProdutos();
            renderEstoque();
        });

        // Carregar Clientes
        db.collection("clientes").onSnapshot(snapshot => {
            const clientes = snapshot.docs.map(doc => doc.data());
            renderClientes(clientes);
        });
    }

    function renderProdutos() {
        const div = document.getElementById('produtos-lista');
        div.innerHTML = produtos.map(p => `
            <div onclick="addToCarrinho('${p.ean}')" style="border:1px solid #ddd; padding:8px; text-align:center; cursor:pointer;">
                <img src="${p.img}" style="width:100%; height:60px; object-fit:cover;">
                <div style="font-size:11px;">${p.nome}</div>
                <b style="color:green;">R$ ${p.preco.toFixed(2)}</b>
            </div>
        `).join('');
    }

    function addToCarrinho(ean) {
        const p = produtos.find(item => item.ean === ean);
        if(p) {
            carrinho.push(p);
            updateCarrinho();
        }
    }

    function updateCarrinho() {
        const lista = document.getElementById('carrinho-itens');
        const totalTxt = document.getElementById('total-carrinho');
        let total = 0;
        lista.innerHTML = carrinho.map(p => {
            total += p.preco;
            return `<div style="display:flex; justify-content:space-between; font-size:12px; padding:5px 0;"><span>${p.nome}</span><span>R$ ${p.preco.toFixed(2)}</span></div>`;
        }).join('');
        totalTxt.innerText = total.toFixed(2);
    }

    // TROCA DE TELAS
    function showScreen(screen) {
        document.querySelectorAll('section.venda-grid').forEach(s => s.classList.add('hidden'));
        document.getElementById(`screen-${screen}`).classList.remove('hidden');
        document.getElementById(`screen-${screen}`).classList.add('active-screen');
    }

    function renderClientes(lista) {
        const body = document.getElementById('lista-clientes-body');
        const select = document.getElementById('cliente-select');
        body.innerHTML = lista.map(c => `<tr><td>${c.nome}</td><td>${c.contato}</td></tr>`).join('');
        select.innerHTML = '<option value="">Avulso</option>' + lista.map(c => `<option value="${c.contato}">${c.nome}</option>`).join('');
    }

    function renderEstoque() {
        const body = document.getElementById('lista-estoque-body');
        body.innerHTML = produtos.map(p => `<tr><td>${p.ean}</td><td>${p.nome}</td><td>R$ ${p.custo}</td><td>R$ ${p.preco}</td></tr>`).join('');
    }

    syncData();
</script>
</body>
</html>
