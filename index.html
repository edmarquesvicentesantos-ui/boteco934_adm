<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - ESTÁVEL</title>
    <style>
        :root { --p: #1a252f; --s: #27ae60; --a: #f1c40f; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: #f4f7f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 10px; display: flex; justify-content: space-between; }
        nav { background: #2c3e50; display: flex; height: 50px; }
        .nav-btn { flex: 1; border: none; background: transparent; color: #bdc3c7; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: white; border-bottom: 3px solid var(--a); }
        main { flex: 1; display: flex; overflow: hidden; }
        .tela { display: none; width: 100%; height: 100%; padding: 10px; }
        .ativa { display: flex !important; }
        .col-mesas { width: 120px; border-right: 1px solid #ccc; overflow-y: auto; padding-right: 5px; }
        .col-central { flex: 1; padding: 0 10px; overflow-y: auto; }
        .col-carrinho { width: 300px; background: #fff; border-left: 1px solid #ccc; padding: 10px; display: flex; flex-direction: column; }
        .mesa-btn { width: 100%; padding: 12px 5px; margin-bottom: 8px; border: 2px solid #ccc; border-radius: 5px; text-align: center; cursor: pointer; font-weight: bold; }
        .ocupada { background: #fff9db; border-color: var(--a); }
        .sel { background: var(--p) !important; color: white !important; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .item-card { background: white; border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        input, select { padding: 10px; width: 100%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-pg { padding: 15px; background: var(--s); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<header><strong>BOTECO 934</strong> <span id="relógio">00:00:00</span></header>

<nav>
    <button class="nav-btn active" onclick="mudar('vendas', this)">VENDAS</button>
    <button class="nav-btn" onclick="mudar('estoque', this)">PRODUTOS</button>
    <button class="nav-btn" onclick="mudar('caixa', this)">CAIXA</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <div class="col-mesas" id="lista-mesas"></div>
        <div class="col-central">
            <input type="text" id="bip" placeholder="BIPE O CÓDIGO AQUI...">
            <select id="cli-atual"><option value="Balcão">Balcão</option></select>
            <div id="grid-prods" class="grid"></div>
        </div>
        <div class="col-carrinho">
            <h3 id="txt-mesa">Escolha uma Mesa</h3>
            <div id="lista-itens" style="flex:1; overflow-y:auto; margin:10px 0; border-top:1px solid #eee;"></div>
            <div style="border-top: 2px solid #333; padding-top:10px;">
                <h2 style="margin-bottom:10px;">Total: R$ <span id="total-txt">0.00</span></h2>
                <button class="btn-pg" onclick="fechar()">FECHAR / DIVIDIR</button>
            </div>
        </div>
    </div>

    <div id="estoque" class="tela" style="flex-direction:column;">
        <h3>Cadastrar Produto</h3><br>
        <input type="text" id="e-cod" placeholder="Código de Barras">
        <input type="text" id="e-nome" placeholder="Nome">
        <input type="number" id="e-valor" placeholder="Preço">
        <button class="btn-pg" style="background:#3498db" onclick="addProd()">SALVAR PRODUTO</button>
        <br><table border="1" style="width:100%; border-collapse:collapse; background:white;">
            <thead><tr><th>EAN</th><th>Item</th><th>R$</th><th>X</th></tr></thead>
            <tbody id="corpo-estoque"></tbody>
        </table>
    </div>

    <div id="caixa" class="tela" style="flex-direction:column;">
        <h3>Histórico de Vendas</h3><br>
        <div id="resumo-hoje" style="padding:10px; background:white; margin-bottom:10px; border-radius:5px;"></div>
        <table border="1" style="width:100%; border-collapse:collapse; background:white;">
            <thead><tr><th>Hora</th><th>Ref</th><th>Valor</th><th>Tipo</th></tr></thead>
            <tbody id="corpo-caixa"></tbody>
        </table>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:red; border:none; background:none; cursor:pointer;">Limpar tudo e reiniciar</button>
    </div>
</main>

<script>
    let PRODS = JSON.parse(localStorage.getItem('b934_p')) || [];
    let FINAN = JSON.parse(localStorage.getItem('b934_f')) || { DINHEIRO: 0, PIX: 0, CARTAO: 0, LOG: [] };
    let MESAS = Array.from({length: 12}, (_, i) => ({ id: i+1, pedidos: [], status: 'livre', total: 0 }));
    let mesaAtiva = null;

    function salvar() {
        localStorage.setItem('b934_p', JSON.stringify(PRODS));
        localStorage.setItem('b934_f', JSON.stringify(FINAN));
    }

    function mudar(id, b) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        b.classList.add('active');
        desenharVendas(); desenharEstoque(); desenharCaixa();
    }

    function desenharVendas() {
        document.getElementById('lista-mesas').innerHTML = MESAS.map(m => `
            <div class="mesa-btn ${m.status==='ocupada'?'ocupada':''} ${mesaAtiva===m.id?'sel':''}" onclick="focarMesa(${m.id})">MESA ${m.id}<br>R$ ${m.total.toFixed(2)}</div>`).join('');
        document.getElementById('grid-prods').innerHTML = PRODS.map((p, i) => `
            <div class="item-card" onclick="addAoCarrinho(${i})">${p.nome}<br>R$ ${p.preco.toFixed(2)}</div>`).join('');
    }
