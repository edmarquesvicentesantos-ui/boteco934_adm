            <button onclick="abrirModal('modal-xml')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95">📦 IMPORTAR XML</button>
            <button onclick="location.reload()" class="bg-slate-800 p-2 rounded-xl border border-slate-700">🔄</button>

    <div id="grid-mesas" class="p-2 grid grid-cols-8 gap-2 bg-slate-950 border-b border-slate-800 overflow-y-auto max-h-28 scroll-custom"></div>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-1/3 bg-slate-900 border-r border-slate-800 overflow-y-auto p-2 scroll-custom" id="lista-prods">
            <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Estoque Disponível</p>
            <div id="container-produtos" class="space-y-2"></div>
        </aside>
        
        <main class="w-2/3 bg-black p-3 flex flex-col">
            <div class="bg-yellow-50 text-black flex-1 p-4 rounded-2xl shadow-inner overflow-y-auto border-4 border-yellow-200 scroll-custom">
                <div class="border-b-2 border-dashed border-black/20 pb-2 mb-3 text-center">
                    <p class="font-black uppercase text-sm" id="mesa-titulo">Selecione uma Mesa</p>
                    <p class="text-[9px] text-gray-500 italic">Petrolina - Pernambuco</p>
                </div>
                <div id="itens-lista" class="text-xs space-y-2 font-mono uppercase font-bold italic"></div>
            </div>

            <div class="mt-4 p-4 bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-400 font-bold uppercase text-xs">Total a Pagar</span>
                    <span class="text-yellow-500 font-black text-4xl">R$ <span id="total-val">0.00</span></span>
                </div>
                <button onclick="finalizarVenda()" class="w-full bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-black text-white uppercase text-lg shadow-xl transition-all active:scale-95">FECHAR CONTA</button>
            </div>
        </main>
    </div>

    <div id="modal-calc" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-[40px] w-full max-w-sm text-slate-900 shadow-2xl">
            <h2 class="font-black text-center mb-6 uppercase text-blue-800 italic border-b-2 pb-2">Lucro Boteco 934</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400 ml-2">Custo da Nota</label>
                    <input type="number" id="calc-custo" class="w-full p-4 rounded-2xl bg-slate-100 border-none font-bold" placeholder="R$ 0.00" oninput="recalcular()">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400 ml-2">Quantidade</label>
                    <input type="number" id="calc-qtd" class="w-full p-4 rounded-2xl bg-slate-100 border-none font-bold" placeholder="Ex: 12" oninput="recalcular()">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-gray-400 ml-2">Preço de Venda</label>
                    <input type="number" id="calc-venda" class="w-full p-4 rounded-2xl bg-green-50 border-2 border-green-500 font-black text-green-700" placeholder="R$ 0.00" oninput="recalcular()">
                </div>
                <div class="bg-blue-700 p-5 rounded-3xl text-white text-center shadow-lg">
                    <p class="text-[10px] uppercase font-bold opacity-70">Lucro por Unidade</p>
                    <p class="text-4xl font-black">R$ <span id="res-lucro">0.00</span></p>
                </div>
            </div>
            <button onclick="fecharModal('modal-calc')" class="w-full mt-6 py-2 text-gray-400 font-bold uppercase text-[10px]">Fechar Calculadora</button>
        </div>
    </div>

    <div id="modal-xml" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[40px] w-full max-w-sm text-black shadow-2xl text-center border-t-8 border-blue-600">
            <h2 class="font-black mb-2 uppercase italic text-xl">Entrada de Estoque</h2>
            <p class="text-gray-500 text-[10px] mb-6 font-bold uppercase italic">A pasta 'PRODUTOS' será atualizada</p>
            
            <div class="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-300 mb-6">
                <input type="file" id="input-xml" accept=".xml" class="text-xs w-full mb-4">
                <button onclick="importarXMLFatiado()" id="btn-importar" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-700 transition-all">🚀 IMPORTAR AGORA</button>
            </div>
            
            <p id="status-xml" class="text-blue-600 font-black text-[11px] uppercase animate-pulse"></p>
            <button onclick="fecharModal('modal-xml')" class="mt-4 text-gray-400 font-bold text-[10px] uppercase">Cancelar</button>
        </div>
    </div>
