<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV</title>
    <style>
        /* CSS Integrado para não ter erro de carregamento */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h2 { color: #333; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .card img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 5px;
            background-color: #eee; /* Cor de fundo caso a imagem falhe */
        }

        .info {
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        .nome { font-weight: bold; color: #444; }
        .preco { color: #27ae60; font-weight: bold; margin-top: 4px; }

        .btn-add {
            display: block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 8px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-add:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Produtos</h2>

    <div class="grid-container">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Cerveja">
            <div class="info">
                <span class="nome">Cerveja Latão</span>
                <span class="preco">R$ 7,50</span>
            </div>
            <a href="javascript:void(0)" class="btn-add" onclick="vender('Cerveja Latão', 7.50)">Adicionar</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Agua">
            <div class="info">
                <span class="nome">Água s/ Gás</span>
                <span class="preco">R$ 3,00</span>
            </div>
            <a href="javascript:void(0)" class="btn-add" onclick="vender('Água s/ Gás', 3.00)">Adicionar</a>
        </div>
    </div>

    <script>
        // Função para processar o clique sem sair da página
        function vender(nome, valor) {
            // O "javascript:void(0)" no link já impede o recarregamento
            console.log("Vendido: " + nome + " - R$ " + valor);
            
            // Aqui você pode colocar a lógica de somar no total ou salvar no banco
            alert(nome + " adicionado ao pedido!");
        }
    </script>

</body>
</html>
