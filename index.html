<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Sistema Pro</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --gold: #d4af37; --orange: #ff9800; --green: #00ff88; --border: #2a2a2a; --gray: #888;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); color: var(--gray); cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; font-size: 11px; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .scan-area { background: #000; border: 1px dashed var(--gold); padding: 15px; text-align: center; margin-bottom: 15px; }
        .scan-area input { background: transparent; border: none; color: var(--gold); font-size: 22px; text-align: center; width: 100%; outline: none; font-family: monospace; }

        label { display: block; font-size: 10px; color: var(--gray); margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        input:focus { border-color: var(--gold); outline: none; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--gold); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid #1a1a1a; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-gold { background: var(--gold); color: #000; }
        
        .res-p { font-size: 11px; color: var(--green); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="header">
    <h1>BOTECO 934</h1>
    <div id="relogio" style="color: var(--gold);"></div>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab('vendas')">Estoque/Preço</button>
    <button class="tab-btn" onclick="openTab('mesas')">Mesas</button>
    <button class="tab-btn" onclick="openTab('pendura')">Pendura</button>
    <button class="tab-btn" onclick="openTab('dash')">Dashboard</button>
</div>

<div id="vendas" class="content-section active">
    <div class="scan-area">
        <label>Leitor de Código de Barras (EAN-13)</label>
        <input type="text" id="scan_ean" placeholder="||||||||||||||||||" onchange="focarNome()">
    </div>

    <div class="grid-2">
        <div class="box">
            <h3>Calculadora Inteligente</h3>
            <label>Nome do Produto</label>
            <input type="text" id="p_nome">
            
            <div class="grid-2">
                <div><label>Custo (Fardo/Garrafa)</label><input type="number" id="p_custo" oninput="calcular()"></div>
                <div><label>Markup %</label><input type="number" id="p_markup" value="50" oninput="calcular()"></div>
            </div>

            <div class="grid-2">
                <div><label>Sugerido (Un/Dose)</label><input type="number" id="p_sugerido" readonly style="color:var(--orange)"></div>
                <div><label>Praticado (Venda)</label><input type="number" id="p_venda" oninput="calcular()"></div>
            </div>

            <span class="res-p" id="res_lucro">Lucro Real: R$ 0,00</span>
            <button class="btn btn-gold" onclick="salvarProduto()">Salvar no Estoque</button>
        </div>

        <div class="box">
            <h3>Estoque (Ordem Alfabética)</h3>
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr><th>EAN / PRODUTO</th><th>CUSTO</th><th>VENDA</th><th>LUCRO</th></tr>
                    </thead>
                    <tbody id="lista_estoque"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="mesas" class="content-section">
    <div class="grid-2" id="grid_mesas"></div>
</div>

<div id="pendura" class="content-section">
    <div class="box">
        <h3>Cadastrar Cliente</h3>
        <div class="grid-2">
            <input type="text" id="c_nome" placeholder="Nome">
            <input type="text" id="c_whats" placeholder="Zap (DDD)">
        </div>
        <button class="btn btn-gold" onclick="salvarCliente()">Cadastrar</button>
    </div>
    <div class="box"><table id="tab_clientes"></table></div>
</div>

<div id="dash" class="content-section">
    <div class="grid-2">
        <div class="box" style="border-left: 5px solid var(--green);">
            <label>Lucro Estimado no Estoque</label>
            <h2 id="d_lucro_e" style="color: var(--green);">R$ 0,00</h2>
        </div>
        <div class="box" style="border-left: 5px solid var(--orange);">
            <label>Pendura Total</label>
            <h2 id="d_pendura" style="color: var(--orange);">R$ 0,00</h2>
        </div>
    </div>
</div>

<script>
    let estoque = [];
    let clientes = [];

    function openTab(name) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function calcular() {
        const custo = parseFloat(document.getElementById('p_custo').value) || 0;
        const markup = parseFloat(document.getElementById('p_markup').value) || 0;
        const venda = parseFloat(document.getElementById('p_venda').value) || 0;
        
        // Simulação: se for fardo de 12 ou garrafa (doses reais 18)
        const divisor = document.getElementById('p_nome').value.toLowerCase().includes('dose') ? 18 : 12;
        const cUnit = custo / divisor;
        
        const sugerido = cUnit * (1 + (markup / 100));
        const lucroReal = venda - cUnit;

        document.getElementById('p_sugerido').value = sugerido.toFixed(2);
        document.getElementById('res_lucro').innerText = `Lucro Real p/ Unidade: R$ ${lucroReal.toFixed(2)} (Divisor: ${divisor})`;
    }

    function salvarProduto() {
        const p = {
            ean: document.getElementById('scan_ean').value || '---',
            nome: document.getElementById('p_nome').value.toUpperCase(),
            custo: parseFloat(document.getElementById('p_custo').value) || 0,
            venda: parseFloat(document.getElementById('p_venda').value) || 0
        };
        if(!p.nome) return;
        estoque.push(p);
        estoque.sort((a,b) => a.nome.localeCompare(b.nome));
        renderEstoque();
        limpar();
    }

    function renderEstoque() {
        const html = estoque.map(p => `
            <tr>
                <td><small style="color:var(--gold)">${p.ean}</small><br>${p.nome}</td>
                <td>R$ ${p.custo.toFixed(2)}</td>
                <td style="color:var(--green)">R$ ${p.venda.toFixed(2)}</td>
                <td>R$ ${(p.venda - (p.custo/12)).toFixed(2)}</td>
            </tr>
        `).join('');
        document.getElementById('lista_estoque').innerHTML = html;
        
        let lucroE = estoque.reduce((acc, p) => acc + (p.venda - (p.custo/12)), 0);
        document.getElementById('d_lucro_e').innerText = `R$ ${lucroE.toFixed(2)}`;
    }

    function salvarCliente() {
        clientes.push({ nome: document.getElementById('c_nome').value.toUpperCase(), whats: document.getElementById('c_whats').value, saldo: 0 });
        renderClientes();
    }

    function renderClientes() {
        let h = `<tr><th>NOME</th><th>SALDO</th></tr>`;
        clientes.forEach(c => h += `<tr><td>${c.nome}</td><td style="color:var(--orange)">R$ ${c.saldo.toFixed(2)}</td></tr>`);
        document.getElementById('tab_clientes').innerHTML = h;
    }

    function focarNome() { document.getElementById('p_nome').focus(); }
    function limpar() { 
        document.getElementById('scan_ean').value = ''; 
        document.getElementById('p_nome').value = ''; 
        document.getElementById('p_custo').value = ''; 
        document.getElementById('p_venda').value = ''; 
        document.getElementById('scan_ean').focus();
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    
    // Gerar 8 Mesas
    for(let i=1; i<=8; i++) {
        document.getElementById('grid_mesas').innerHTML += `<div class="box" style="text-align:center"><b style="color:var(--gold)">MESA 0${i}</b><br><small>Livre</small><button class="btn btn-gold" style="margin-top:10px; height:30px; padding:0">Abrir</button></div>`;
    }
</script>
</body>
</html>
