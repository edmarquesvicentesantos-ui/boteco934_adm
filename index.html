<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - Gestão Profissional</title>
    <style>
        /* Estilos base mantidos e aprimorados */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        
        header { background: #1c1e21; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .search-bar { flex: 0 1 400px; }
        #busca-produto { width: 100%; padding: 8px; border-radius: 20px; border: none; }

        main { display: flex; flex: 1; overflow: hidden; }
        .categorias { width: 120px; background: #2c3e50; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .btn-cat { padding: 10px; background: #34495e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }

        .vitrine { flex: 1; padding: 15px; overflow-y: auto; background: white; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .card { border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 8px; }
        .card img { height: 50px; margin-bottom: 5px; }

        /* Painel Lateral de Conta */
        .painel-venda { width: 350px; background: #f8f9fa; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .cliente-info { margin-bottom: 10px; }
        input.input-venda { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }

        .cupom { background: white; border: 1px solid #bbb; flex: 1; padding: 10px; font-family: monospace; overflow-y: auto; }
        .item-linha { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        
        .totais { margin-top: 10px; padding: 10px; background: #eee; border-radius: 4px; }
        .total-valor { font-size: 20px; font-weight: bold; color: #c0392b; text-align: right; }
        .falta-valor { font-size: 14px; color: #2980b9; text-align: right; }

        .metodos-pagamento { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-pg { padding: 8px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .btn-finalizar { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; margin-top: 10px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="background:#f1c40f; color:black; padding:5px 10px; border-radius:50%; font-weight:bold;">934</div>
            <span>Boteco 934</span>
        </div>
        <div class="search-bar"><input type="text" id="busca-produto" placeholder="Buscar produto..." oninput="buscar()"></div>
        <div id="data-hora"></div>
    </header>

    <main>
        <nav class="categorias">
            <button class="btn-cat" onclick="filtrar('Todos')">TUDO</button>
            <button class="btn-cat" onclick="filtrar('Bebidas')">BEBIDAS</button>
            <button class="btn-cat" onclick="filtrar('Doses')">DOSES</button>
            <button class="btn-cat" onclick="filtrar('Boticário')">BOTICÁRIO</button>
        </nav>

        <section class="vitrine">
            <div id="grid-produtos" class="grid"></div>
        </section>

        <aside class="painel-venda">
            <div class="cliente-info">
                <select id="select-mesa" class="input-venda" onchange="trocarMesa()">
                    <option value="1">Mesa 01</option>
                    <option value="2">Mesa 02</option>
                    <option value="3">Mesa 03</option>
                    <option value="4">Mesa 04</option>
                    <option value="5">Mesa 05</option>
                    <option value="6">Mesa 06</option>
                    <option value="7">Mesa 07</option>
                    <option value="8">Mesa 08</option>
                </select>
                <input type="text" id="nome-cliente" class="input-venda" placeholder="Nome do Cliente (Obrigatório)">
            </div>

            <div class="cupom" id="cupom-itens">
                </div>

            <div class="totais">
                <div class="total-valor">Total: R$ <span id="resumo-total">0,00</span></div>
                <div class="falta-valor">Faltando: R$ <span id="resumo-falta">0,00</span></div>
            </div>

            <div class="metodos-pagamento">
                <button class="btn-pg" onclick="registrarPagamento('Dinheiro')">💵 DINHEIRO</button>
                <button class="btn-pg" onclick="registrarPagamento('Pix')">💎 PIX</button>
                <button class="btn-pg" onclick="registrarPagamento('Débito')">💳 DÉBITO</button>
                <button class="btn-pg" onclick="registrarPagamento('Crédito')">💳 CRÉDITO</button>
                <button class="btn-pg" style="grid-column: span 2; background: #e67e22; color: white; border: none;" onclick="registrarPagamento('Pendura')">📝 PENDURA (CONTA)</button>
            </div>

            <button class="btn-finalizar" onclick="fecharConta()">FECHAR E IMPRIMIR</button>
        </aside>
    </main>

    <script>
        // Memória das Mesas (Cada mesa tem seus itens e pagamentos)
        let mesas = { 1: { itens: [], pagos: 0, cliente: "" }, 2: { itens: [], pagos: 0, cliente: "" }, 3: { itens: [], pagos: 0, cliente: "" }, 4: { itens: [], pagos: 0, cliente: "" }, 5: { itens: [], pagos: 0, cliente: "" }, 6: { itens: [], pagos: 0, cliente: "" }, 7: { itens: [], pagos: 0, cliente: "" }, 8: { itens: [], pagos: 0, cliente: "" } };
        
        let produtos = [
            { nome: "Cerveja Latão", preco: 7.50, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer.png" },
            { nome: "Heineken 600ml", preco: 15.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer-bottle.png" },
            { nome: "Dose Pitu", preco: 4.00, cat: "Doses", img: "https://img.icons8.com/color/96/tequila-shot.png" },
            { nome: "Perfume Malbec", preco: 180.00, cat: "Boticário", img: "https://img.icons8.com/color/96/perfume-bottle.png" }
        ].sort((a,b) => a.nome.localeCompare(b.nome));

        function trocarMesa() {
            const m = document.getElementById('select-mesa').value;
            document.getElementById('nome-cliente').value = mesas[m].cliente;
            atualizarPainel();
        }

        function adicionarItem(nome, preco) {
            const m = document.getElementById('select-mesa').value;
            const nomeCli = document.getElementById('nome-cliente').value;
            if(!nomeCli) return alert("Digite o nome do cliente para abrir a mesa!");
            
            mesas[m].cliente = nomeCli;
            mesas[m].itens.push({nome, preco});
            atualizarPainel();
        }

        function registrarPagamento(tipo) {
            const m = document.getElementById('select-mesa').value;
            const total = mesas[m].itens.reduce((acc, i) => acc + i.preco, 0);
            const falta = total - mesas[m].pagos;

            if(falta <= 0) return alert("Conta já está paga!");

            let valor = prompt(`Valor no ${tipo} (Faltando R$ ${falta.toFixed(2)}):`, falta.toFixed(2));
            if(valor) {
                mesas[m].pagos += parseFloat(valor);
                atualizarPainel();
            }
        }

        function atualizarPainel() {
            const m = document.getElementById('select-mesa').value;
            const cupom = document.getElementById('cupom-itens');
            const total = mesas[m].itens.reduce((acc, i) => acc + i.preco, 0);
            const falta = total - mesas[m].pagos;

            cupom.innerHTML = mesas[m].itens.map(i => `<div class="item-linha"><span>${i.nome}</span> <span>${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('resumo-total').innerText = total.toFixed(2);
            document.getElementById('resumo-falta').innerText = falta.toFixed(2);
        }

        function fecharConta() {
            const m = document.getElementById('select-mesa').value;
            const total = mesas[m].itens.reduce((acc, i) => acc + i.preco, 0);
            const falta = total - mesas[m].pagos;

            if(falta > 0.01) return alert(`Não pode fechar! Falta receber R$ ${falta.toFixed(2)}`);

            // Simulação de Recibo/WhatsApp
            const texto = `*BOTECO 934*\nCliente: ${mesas[m].cliente}\nTotal: R$ ${total.toFixed(2)}\nObrigado!`;
            const linkZap = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
            
            alert("Imprimindo recibo e abrindo WhatsApp...");
            window.open(linkZap, '_blank');
            window.print();

            // Reseta a mesa
            mesas[m] = { itens: [], pagos: 0, cliente: "" };
            document.getElementById('nome-cliente').value = "";
            atualizarPainel();
        }

        // Funções de inicialização e busca mantidas...
        function carregar(lista) {
            document.getElementById('grid-produtos').innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <span class="nome">${p.nome}</span>
                    <span class="preco">R$ ${p.preco.toFixed(2)}</span>
                    <button class="btn-add" onclick="adicionarItem('${p.nome}', ${p.preco})">ADD</button>
                </div>
            `).join('');
        }
        function filtrar(c) { carregar(c==='Todos'?produtos:produtos.filter(p=>p.cat===c)); }
        function buscar() { const t = document.getElementById('busca-produto').value.toLowerCase(); carregar(produtos.filter(p=>p.nome.toLowerCase().includes(t))); }
        setInterval(() => { document.getElementById('data-hora').innerText = new Date().toLocaleString('pt-br'); }, 1000);
        carregar(produtos);
    </script>
</body>
</html>
