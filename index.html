<style>
    @media print {
        body * { visibility: hidden; }
        #reciboDigital, #reciboDigital * { visibility: visible; }
        #reciboDigital { position: absolute; left: 0; top: 0; width: 100%; font-size: 14px; color: #000; }
        button, input, select { display: none !important; }
    }
</style>

<script type="module">
    // ... (mantenha seu import e config do Firebase)

    window.finalizar = (metodo) => {
        if(!carrinho.length) return;
        
        const mesa = document.getElementById('selMesa').value;
        const clienteNome = document.getElementById('selCliente').value;
        const total = parseFloat(document.getElementById('totalTxt').innerText);
        const dataAtual = new Date();
        
        // Regra dos 4 dias para o Pendura
        const dataVencimento = new Date();
        dataVencimento.setDate(dataAtual.getDate() + 4);

        const venda = {
            mesa,
            cliente: clienteNome,
            total,
            metodo,
            data: dataAtual.toLocaleDateString(),
            vencimento: metodo === 'PENDURA' ? dataVencimento.toLocaleDateString() : 'Pago',
            hora: dataAtual.toLocaleTimeString()
        };

        push(ref(db, 'vendas_financeiro'), venda).then(() => {
            // Baixa no estoque
            carrinho.forEach(i => {
                update(ref(db, `produtos/${i.id}`), { qtd: produtosDados[i.id].qtd - 1 });
            });

            // Se for pendura, já prepara o Zap
            if(metodo === 'PENDURA') {
                enviarZapPendura(clienteNome, total, dataVencimento.toLocaleDateString());
            }

            alert(`Venda registrada como ${metodo}!`);
            imprimirRecibo(); // Chama a impressão automática
            carrinho = []; 
            attCar();
        });
    };

    window.imprimirRecibo = () => {
        window.print(); // Abre a tela de impressão configurada pelo CSS @media print
    };

    function enviarZapPendura(nome, valor, dataVenc) {
        // Busca o contato do cliente nos dados carregados
        // Nota: Assumindo que você tem os dados dos clientes em uma variável global 'clientesDados'
        const msg = `Olá ${nome}! Passando para registrar sua conta de hoje no *Boteco 934*.\n\n*Total:* R$ ${valor.toFixed(2)}\n*Vencimento:* ${dataVenc}\n\nAté a próxima! 🍻`;
        const linkZap = `https://wa.me/?text=${encodeURIComponent(msg)}`;
        
        // Abre em uma nova aba para não travar o PDV
        window.open(linkZap, '_blank');
    }

    // --- ATUALIZAÇÃO DO FINANCEIRO PARA MOSTRAR VENCIMENTOS ---
    onValue(ref(db, 'vendas_financeiro'), (s) => {
        const hist = document.getElementById('listaVendasDia');
        hist.innerHTML = "<h4>Movimentação de Hoje</h4>";
        
        if(s.exists()){
            Object.values(s.val()).reverse().forEach(v => {
                const corStatus = v.metodo === 'PENDURA' ? 'color:var(--vermelho)' : 'color:var(--verde)';
                hist.innerHTML += `
                    <div class="card-fin">
                        <b>${v.hora} - ${v.mesa}</b> | ${v.cliente}<br>
                        Pagamento: <span style="${corStatus}">${v.metodo}</span><br>
                        Total: <b>R$ ${v.total.toFixed(2)}</b><br>
                        ${v.metodo === 'PENDURA' ? `<small>⏳ Vence em: ${v.vencimento}</small>` : ''}
                    </div>`;
            });
        }
    });
</script>
