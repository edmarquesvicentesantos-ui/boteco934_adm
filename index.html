<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV | BOTECO 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .fonte-13 { font-size: 13px !important; }
        .tarja-botao { background-color: #1e3a8a; }
        .cupom { font-family: 'Courier New', Courier, monospace; background-color: #fffdec; }
        .tracejado { border-top: 2px dashed #000; margin: 5px 0; }
    </style>
</head>
<body class="bg-gray-200 min-h-screen flex flex-col">

    <header class="bg-white p-2 shadow-sm flex justify-center border-b-2 border-blue-900">
        <h1 class="text-xl font-black italic text-blue-900">BOTECO 934</h1>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-1/2 md:w-5/12 bg-gray-300 flex flex-col border-r border-gray-400">
            <div class="p-2 bg-white border-b">
                <input type="text" id="input-busca" placeholder="Bipe o código ou digite..." 
                    class="w-full p-3 bg-gray-100 rounded-lg border-2 border-blue-200 focus:border-blue-900 outline-none text-sm">
                <p class="text-[9px] text-gray-400 mt-1 uppercase font-bold text-center">O sistema busca fotos na internet automaticamente</p>
            </div>

            <div id="menu-categorias" class="flex overflow-x-auto bg-white border-b">
                <button onclick="filtrar('Tudo')" class="px-4 py-3 text-[10px] font-bold uppercase">Tudo</button>
                <button onclick="filtrar('Cervejas')" class="px-4 py-3 text-[10px] font-bold uppercase">Cervejas</button>
                <button onclick="filtrar('Doses')" class="px-4 py-3 text-[10px] font-bold uppercase">Doses</button>
            </div>
            <div id="lista-produtos" class="p-2 grid grid-cols-1 gap-2 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 p-2 bg-gray-400 flex flex-col justify-between">
            <div class="cupom p-4 shadow-lg rounded-sm h-full flex flex-col text-black">
                <div class="text-center text-[10px] uppercase font-bold">
                    <p>BOTECO 934 - PETROLINA PE</p>
                    <p id="data-recibo">--/--/-- --:--</p>
                    <div class="tracejado"></div>
                </div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase">
                    <span class="w-1/2">DESCRIÇÃO</span>
                    <span class="w-1/4 text-right">QTDxUN</span>
                    <span class="w-1/4 text-right">TOTAL</span>
                </div>
                <div id="itens-venda" class="flex-1 overflow-y-auto text-[11px] leading-tight"></div>
                <div class="mt-auto">
                    <div class="tracejado"></div>
                    <div class="flex justify-between font-black text-xl">
                        <span>TOTAL R$</span>
                        <span id="valor-total">0.00</span>
                    </div>
                </div>
            </div>
            <button onclick="finalizarVenda()" class="mt-2 w-full bg-blue-900 text-white font-black py-4 rounded-xl shadow-xl uppercase">Finalizar Venda</button>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
