<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE PDV - Boteco 934</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --danger: #c0392b; --accent: #f1c40f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial; background: #f4f7f6; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; font-size: 13px; }

        header { height: 45px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; }
        main { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 65px; background: var(--primary); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { color: #bdc3c7; padding: 15px 0; text-align: center; cursor: pointer; font-size: 9px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.1); color: var(--accent); border-left: 3px solid var(--accent); }

        /* ÁREA CENTRAL */
        .area-central { flex: 1; min-width: 0; background: #fff; display: flex; flex-direction: column; padding: 10px; border-right: 1px solid #ddd; overflow: hidden; }
        .tela { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .tela.ativa { display: flex; }

        /* VENDAS */
        .vendas-container { display: flex; gap: 10px; height: 100%; }
        .col-mesas { width: 140px; overflow-y: auto; border-right: 1px solid #eee; }
        .mesa-btn { width: 100%; padding: 10px; margin-bottom: 5px; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; }
        .mesa-btn.ocupada { background: #fff9db; border-color: var(--accent); }
        .mesa-btn.selecionada { background: var(--primary); color: white; border-color: var(--primary); }

        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; overflow-y: auto; }
        .card-p { border: 1px solid #eee; padding: 5px; text-align: center; border-radius: 4px; cursor: pointer; }
        .card-p img { width: 100%; height: 40px; object-fit: cover; }

        /* CLIENTES E FORMULÁRIO */
        .form-cliente { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* TABELAS */
        .wrap-tab { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f8f9fa; position: sticky; top: 0; }

        /* CARRINHO */
        .carrinho { width: 280px; background: #fff; display: flex; flex-direction: column; padding: 10px; flex-shrink: 0; }
        .itens-lista { flex: 1; overflow-y: auto; border-bottom: 2px solid #f4f4f4; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; color: white; }
    </style>
</head>
<body>

<header>
    <strong>BOTECO 934 - ELITE</strong>
    <div style="font-size: 11px;">VENDAS HOJE: R$ <span id="vTotal">0.00</span></div>
</header>

<main>
    <nav class="sidebar">
        <div class="nav-item active" onclick="ver('vendas', this)"><i>🛒</i><br>VENDAS</div>
        <div class="nav-item" onclick="ver('clientes', this)"><i>👥</i><br>CLIENTES</div>
        <div class="nav-item" onclick="ver('estoque', this)"><i>📦</i><br>ESTOQUE</div>
    </nav>

    <section class="area-central">
        <div id="vendas" class="tela ativa">
            <div class="vendas-container">
                <div class="col-mesas" id="lista-mesas"></div>
                <div style="flex:1; display:flex; flex-direction:column;">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="text" id="busca" placeholder="Buscar produto..." style="flex:1;">
                        <select id="select-cliente-venda" style="padding:8px; width:120px;">
                            <option value="">👤 Avulso</option>
                        </select>
                    </div>
                    <div id="grid-produtos" class="grid-produtos"></div>
                </div>
            </div>
        </div>

        <div id="clientes" class="tela">
            <h4>➕ Cadastrar Novo Cliente</h4>
            <div class="form-cliente">
                <div><label>Nome:</label><br><input type="text" id="c-nome" style="width:100%"></div>
                <div><label>WhatsApp:</label><br><input type="text" id="c-zap" style="width:100%"></div>
                <button onclick="salvarCliente()" class="btn" style="background:var(--primary); margin:0;">Salvar</button>
            </div>
            <div class="wrap-tab">
                <table>
                    <thead><tr><th>Nome</th><th>WhatsApp</th><th>Ações</th></tr></thead>
                    <tbody id="tab-clientes"></tbody>
                </table>
            </div>
        </div>

        <div id="estoque" class="tela">
    <h4>📦 Cadastrar Novo Produto / Entrada</h4>
    <div class="form-cliente" style="grid-template-columns: 1fr 1fr 1fr 1fr auto;">
        <div><label>Código (EAN):</label><br><input type="text" id="p-ean" placeholder="Bipe o código..." style="width:100%"></div>
        <div><label>Nome Produto:</label><br><input type="text" id="p-nome" placeholder="Ex: Skol 600ml" style="width:100%"></div>
        <div><label>Custo (R$):</label><br><input type="number" id="p-custo" step="0.01" style="width:100%"></div>
        <div><label>Venda (R$):</label><br><input type="number" id="p-venda" step="0.01" style="width:100%"></div>
        <div><label>Qtd:</label><br><input type="number" id="p-qtd" style="width:60px"></div>
        <button onclick="salvarProduto()" class="btn" style="background:var(--success); margin:0; padding: 8px 15px;">＋ Add</button>
    </div>

    <div class="wrap-tab">
        <table>
            <thead>
                <tr>
                    <th width="20%">Código</th>
                    <th width="40%">Produto</th>
                    <th width="15%">Custo</th>
                    <th width="15%">Venda</th>
                    <th width="10%">Qtd</th>
                </tr>
            </thead>
            <tbody id="tab-estoque"></tbody>
        </table>
    </div>
</div>
    </section>

    <section class="carrinho">
        <h4 id="conta-titulo" style="text-align:center;">Mesa --</h4>
        <div id="c-itens" class="itens-lista"></div>
        <div style="padding-top:10px;">
            <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;">
                <span>Total:</span><span>R$ <span id="c-total">0.00</span></span>
            </div>
            <button class="btn" style="background:var(--success)" onclick="fecharConta('dinheiro')">💰 DINHEIRO / PIX</button>
            <button class="btn" style="background:var(--accent); color:#000" onclick="fecharConta('pendura')">📝 PENDURAR (FIADO)</button>
        </div>
    </section>
</main>

<script>
    let db_estoque = [
        { ean: "001", nome: "Heineken 330ml", preco: 16.0, custo: 9.5, qtd: 24, img: "https://via.placeholder.com/80?text=HNK" },
        { ean: "002", nome: "Skol Lata", preco: 6.5, custo: 3.8, qtd: 50, img: "https://via.placeholder.com/80?text=SKL" }
    ];

    let db_clientes = [
        { nome: "Edmarques", zap: "87900000000" }
    ];

    let mesas = Array.from({length: 8}, (_, i) => ({ id: i + 1, itens: [], total: 0, status: 'livre', cliente: '' }));
    let mesaAtiva = null;
    let vendasHoje = 0;

    function ver(id, el) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        el.classList.add('active');
        if(id === 'clientes') renderListaClientes();
        if(id === 'estoque') renderEstoque();
    }

    // --- LÓGICA DE CLIENTES ---
    function salvarCliente() {
        const nome = document.getElementById('c-nome').value;
        const zap = document.getElementById('c-zap').value;
        if(!nome) return alert("Digite o nome!");
        db_clientes.push({ nome, zap });
        document.getElementById('c-nome').value = '';
        document.getElementById('c-zap').value = '';
        renderListaClientes();
        renderSelectClientes();
        alert("Cliente cadastrado!");
    }
// --- LÓGICA DE ESTOQUE AVANÇADA ---

function salvarProduto() {
    const ean = document.getElementById('p-ean').value;
    const nome = document.getElementById('p-nome').value;
    const custo = parseFloat(document.getElementById('p-custo').value);
    const venda = parseFloat(document.getElementById('p-venda').value);
    const qtd = parseInt(document.getElementById('p-qtd').value);

    if (!ean || !nome || isNaN(venda)) {
        return alert("Preencha Código, Nome e Preço de Venda!");
    }

    // Verifica se o produto já existe (para atualizar estoque)
    const index = db_estoque.findIndex(p => p.ean === ean);

    if (index >= 0) {
        // Atualiza quantidade se o código já existir
        db_estoque[index].qtd += qtd;
        db_estoque[index].preco = venda;
        db_estoque[index].custo = custo;
        alert("Estoque do produto atualizado!");
    } else {
        // Adiciona novo
        db_estoque.push({
            ean,
            nome,
            preco: venda,
            custo: custo || 0,
            qtd: qtd || 0,
            img: "https://via.placeholder.com/80?text=PROD" 
        });
        alert("Novo produto cadastrado com sucesso!");
    }

    // Limpa campos
    document.getElementById('p-ean').value = '';
    document.getElementById('p-nome').value = '';
    document.getElementById('p-custo').value = '';
    document.getElementById('p-venda').value = '';
    document.getElementById('p-qtd').value = '';

    renderEstoque();
    renderProdutos(); // Atualiza a tela de vendas também
}

function renderEstoque() {
    const tbody = document.getElementById('tab-estoque');
    tbody.innerHTML = db_estoque.map(p => `
        <tr>
            <td style="color:#666; font-family: monospace;">${p.ean}</td>
            <td style="font-weight:bold;">${p.nome}</td>
            <td style="color:var(--danger)">R$ ${p.custo.toFixed(2)}</td>
            <td style="color:var(--success)">R$ ${p.preco.toFixed(2)}</td>
            <td style="text-align:center; background:#f9f9f9;"><b>${p.qtd}</b></td>
        </tr>
    `).reverse().join(''); // Mostra os últimos cadastrados no topo
}

// DICA: Evento para o leitor de código de barras focar no campo automático
document.addEventListener('keydown', function(e) {
    // Se você estiver na tela de estoque e apertar F2 (ou outra tecla), foca no EAN
    if(e.key === "F2") {
        document.getElementById('p-ean').focus();
    }
});
    function renderListaClientes() {
        document.getElementById('tab-clientes').innerHTML = db_clientes.map((c, i) => `
            <tr><td>${c.nome}</td><td>${c.zap}</td><td><button onclick="removerCliente(${i})" style="color:red; background:none; border:none; cursor:pointer;">Excluir</button></td></tr>
        `).join('');
    }

    function renderSelectClientes() {
        const sel = document.getElementById('select-cliente-venda');
        sel.innerHTML = '<option value="">👤 Avulso</option>' + 
            db_clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
    }

    // --- LÓGICA DE VENDAS E MESAS ---
    function renderMesas() {
        document.getElementById('lista-mesas').innerHTML = mesas.map(m => `
            <div class="mesa-btn ${m.status} ${mesaAtiva === m.id ? 'selecionada' : ''}" onclick="selecionarMesa(${m.id})">
                Mesa ${m.id}<br><small>${m.status === 'ocupada' ? 'R$ '+m.total.toFixed(2) : 'Livre'}</small>
            </div>
        `).join('');
    }

    function selecionarMesa(id) {
        mesaAtiva = id;
        const m = mesas.find(x => x.id === id);
        document.getElementById('conta-titulo').innerText = "Mesa " + id + (m.cliente ? " - " + m.cliente : "");
        renderMesas();
        attCarrinho();
        renderProdutos();
    }

    function renderProdutos() {
        document.getElementById('grid-produtos').innerHTML = db_estoque.map(p => `
            <div class="card-p" onclick="lancar('${p.ean}')">
                <img src="${p.img}">
                <div style="font-size:10px; font-weight:bold;">${p.nome}</div>
                <div style="color:var(--success)">R$ ${p.preco.toFixed(2)}</div>
            </div>
        `).join('');
    }

    function lancar(ean) {
        if(!mesaAtiva) return alert("Selecione a mesa!");
        const p = db_estoque.find(x => x.ean === ean);
        const m = mesas.find(x => x.id === mesaAtiva);
        const cliVenda = document.getElementById('select-cliente-venda').value;
        
        if(p.qtd > 0) {
            m.itens.push({...p});
            m.total += p.preco;
            m.status = 'ocupada';
            if(cliVenda) m.cliente = cliVenda;
            p.qtd--;
            selecionarMesa(mesaAtiva);
        } else { alert("Sem estoque!"); }
    }

    function attCarrinho() {
        const m = mesas.find(x => x.id === mesaAtiva);
        document.getElementById('c-itens').innerHTML = m ? m.itens.map(i => `
            <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dotted #ccc;">
                <span>${i.nome}</span><span>${i.preco.toFixed(2)}</span>
            </div>
        `).join('') : '';
        document.getElementById('c-total').innerText = m ? m.total.toFixed(2) : "0.00";
    }

    function fecharConta(tipo) {
        if(!mesaAtiva) return;
        const m = mesas.find(x => x.id === mesaAtiva);
        if(m.itens.length === 0) return;

        if(tipo === 'pendura' && !m.cliente) {
            return alert("Para pendurar, selecione um cliente na lista antes de lançar o item!");
        }

        vendasHoje += m.total;
        document.getElementById('vTotal').innerText = vendasHoje.toFixed(2);
        
        alert(`Conta Fechada (${tipo})!\nTotal: R$ ${m.total.toFixed(2)}\nCliente: ${m.cliente || 'Avulso'}`);
        
        m.itens = []; m.total = 0; m.status = 'livre'; m.cliente = '';
        mesaAtiva = null;
        renderMesas();
        attCarrinho();
    }

    function renderEstoque() {
        document.getElementById('tab-estoque').innerHTML = db_estoque.map(p => `
            <tr><td>${p.nome}</td><td>${p.custo.toFixed(2)}</td><td>${p.preco.toFixed(2)}</td><td>${p.qtd}</td></tr>
        `).join('');
    }

    renderMesas();
    renderSelectClientes();
</script>
</body>
</html>
