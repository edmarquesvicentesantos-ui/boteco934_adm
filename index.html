<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDV GOLD | BOTECO 934</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        body { touch-action: manipulation; background-color: #0f172a; color: white; font-family: sans-serif; }
        .cupom { font-family: 'Courier New', monospace; background-color: #fffdec; color: black; border-radius: 4px; }
        .tracejado { border-top: 2px dashed #000; margin: 4px 0; }
        ::-webkit-scrollbar { display: none; }
        #interactive.viewport canvas, #interactive.viewport video { width: 100%; height: auto; border-radius: 15px; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-900 p-3 shadow-xl flex justify-between items-center border-b border-yellow-600">
        <div>
            <h1 class="text-xl font-black italic text-yellow-500 tracking-tighter">BOTECO 934 <span class="text-[10px] bg-yellow-600 text-black px-1 rounded">GOLD</span></h1>
            <div class="flex gap-2 mt-2">
                <button onclick="abrirContatos()" class="text-[9px] bg-blue-700 px-3 py-1 rounded-full uppercase font-bold">👥 Contatos</button>
                <button onclick="abrirPainelGerente()" class="text-[9px] bg-slate-700 px-3 py-1 rounded-full uppercase font-bold border border-slate-500">⚙️ Gerente</button>
                <button onclick="enviarFechamentoDia()" class="text-[9px] bg-red-700 px-3 py-1 rounded-full uppercase font-bold">📊 Fechar Dia</button>
            </div>
        </div>
        <div class="text-right">
            <p id="clock" class="text-sm font-mono text-yellow-500 font-bold">00:00:00</p>
            <p class="text-[8px] text-gray-400 uppercase tracking-widest">Petrolina - PE</p>
        </div>
    </header>

    <nav id="painel-mesas" class="p-2 bg-slate-950 grid grid-cols-5 gap-2 border-b border-slate-800 overflow-x-auto"></nav>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-[45%] bg-slate-800 flex flex-col border-r border-slate-700">
            <div class="p-2 bg-slate-900 flex gap-1">
                <input type="text" id="busca-produto" oninput="buscarNaLista(this.value)" placeholder="Buscar ou Barcode..." class="flex-1 p-2 bg-slate-950 rounded-lg text-xs border border-slate-700 outline-none focus:border-yellow-500">
                <button onclick="iniciarScanner()" class="bg-blue-600 p-2 rounded-lg"><img src="https://cdn-icons-png.flaticon.com/512/241/241528.png" class="w-4 h-4 invert"></button>
            </div>
            <div id="menu-categorias" class="flex overflow-x-auto p-1 gap-1 border-b border-slate-700 bg-slate-900">
                <button onclick="filtrar('Tudo')" class="px-3 py-2 text-[10px] font-bold uppercase text-yellow-500">Tudo</button>
                <button onclick="filtrar('Cervejas')" class="px-3 py-2 text-[10px] font-bold uppercase text-gray-400">Cervejas</button>
                <button onclick="filtrar('Doses')" class="px-3 py-2 text-[10px] font-bold uppercase text-gray-400">Doses</button>
            </div>
            <div id="lista-produtos" class="p-2 space-y-2 overflow-y-auto pb-20"></div>
        </aside>

        <main class="w-[55%] p-2 bg-slate-950 flex flex-col">
            <div class="cupom p-3 shadow-2xl flex flex-col flex-1 overflow-hidden text-[10px]">
                <div class="text-center font-bold">
                    <p class="text-xs">*** BOTECO 934 ***</p>
                    <p id="info-mesa-cupom" class="text-blue-700">SELECIONE UMA MESA</p>
                    <div class="tracejado"></div>
                </div>
                <div id="itens-venda" class="flex-1 overflow-y-auto py-1"></div>
                <div class="mt-auto">
                    <div class="tracejado"></div>
                    <div class="flex justify-between font-black text-lg text-red-600">
                        <span>FALTA R$</span>
                        <span id="valor-total">0.00</span>
                    </div>
                </div>
            </div>

            <div class="mt-2 space-y-2">
                <select id="forma-pagamento" class="w-full p-3 bg-slate-800 text-yellow-500 rounded-xl border border-slate-600 font-bold text-xs outline-none">
                    <option value="DINHEIRO">💵 DINHEIRO</option>
                    <option value="PIX">💎 PIX</option>
                    <option value="CREDITO">💳 CRÉDITO</option>
                    <option value="PENDURA">📝 PENDURA (FIADO)</option>
                </select>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="enviarWhatsApp()" class="bg-green-700 py-4 rounded-xl font-bold text-[10px] uppercase">WhatsApp</button>
                    <button onclick="finalizarVenda()" class="bg-yellow-500 text-black py-4 rounded-xl font-black text-[10px] uppercase">Receber</button>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-gerente" class="hidden fixed inset-0 bg-black/95 z-50 p-4 flex items-center justify-center">
        <div class="bg-slate-800 rounded-3xl p-6 w-full max-w-sm border border-yellow-500">
            <h2 class="text-yellow-500 font-bold mb-4 uppercase text-center">Gestão & XML</h2>
            <input type="text" id="calc-nome" placeholder="Nome do Produto" class="w-full p-3 bg-slate-950 rounded-lg mb-2 text-white border border-slate-700">
            <input type="number" id="calc-custo" placeholder="Custo Pago (R$)" class="w-full p-3 bg-slate-950 rounded-lg mb-4 text-white font-bold border border-slate-700">
            <div class="p-3 bg-slate-900 rounded-xl border border-dashed border-slate-600 mb-4 text-center">
                <p class="text-[9px] text-yellow-500 mb-2 uppercase">Entrada via XML</p>
                <input type="file" id="xml-input" accept=".xml" onchange="importarXML(event)" class="text-[10px] text-gray-500">
            </div>
            <div class="flex gap-2">
                <button onclick="fecharPainelGerente()" class="flex-1 text-gray-500 text-[10px] font-bold uppercase">Sair</button>
                <button onclick="salvarPrecos()" class="flex-1 py-3 bg-yellow-500 text-black font-black rounded-xl text-[10px] uppercase">Salvar</button>
            </div>
        </div>
    </div>

    <div id="scanner-container" class="hidden fixed inset-0 bg-black z-[60] flex flex-col">
        <div id="interactive" class="viewport flex-1"></div>
        <button onclick="pararScanner()" class="p-5 bg-red-600 text-white font-black uppercase">Fechar Scanner</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
