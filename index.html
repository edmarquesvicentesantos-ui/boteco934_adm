<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV Avançado</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CABEÇALHO COM BUSCA --- */
        header {
            background-color: #1c1e21;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-placeholder { 
            width: 40px; height: 40px; background: #f1c40f; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000;
        }

        .search-container { flex: 0 1 400px; margin: 0 20px; }
        #busca-produto {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        /* --- ESTRUTURA PRINCIPAL --- */
        main { display: flex; flex: 1; overflow: hidden; }

        .categorias-menu {
            width: 130px;
            background: #2c3e50;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-categoria {
            width: 100%; padding: 12px 5px; background: #34495e; border: none;
            color: white; border-radius: 6px; cursor: pointer; font-size: 11px;
            font-weight: bold; text-transform: uppercase;
        }

        .btn-categoria:hover, .btn-categoria.active { background: #1abc9c; }

        /* Grade de Produtos Fixa */
        .produtos-container { flex: 1; padding: 20px; overflow-y: auto; background: #fff; }
        
        .grid-container {
            display: grid;
            /* Mantém o tamanho do card fixo entre 120px e 150px */
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .card {
            background: #fff; border-radius: 10px; padding: 10px;
            text-align: center; border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .img-container { height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .img-container img { max-width: 100%; max-height: 100%; }
        
        .nome { display: block; font-weight: bold; font-size: 12px; min-height: 30px; color: #333; line-height: 1.2; }
        .preco { display: block; color: #27ae60; font-weight: bold; margin: 5px 0; font-size: 14px; }

        .btn-add {
            background: #007bff; color: white; border: none; padding: 8px;
            width: 100%; border-radius: 6px; cursor: pointer; font-size: 12px;
        }

        /* --- RECIBO --- */
        .painel-pedido { width: 320px; background: #f8f9fa; border-left: 1px solid #ddd; display: flex; flex-direction: column; padding: 15px; }
        .recibo { background: white; border: 1px solid #ccc; padding: 15px; flex: 1; display: flex; flex-direction: column; font-family: monospace; }
        .recibo-header { border-bottom: 1px dashed #aaa; padding-bottom: 10px; text-align: center; margin-bottom: 10px; }
        #lista-pedido { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        .item-pedido { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px dotted #eee; }

        .total-container { border-top: 2px solid #333; padding-top: 10px; text-align: right; font-size: 22px; font-weight: bold; color: #c0392b; }
        .btn-finalizar { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; width: 100%; }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-placeholder">934</div>
            <h2 style="margin:0; font-size: 18px;">Boteco 934</h2>
        </div>
        
        <div class="search-container">
            <input type="text" id="busca-produto" placeholder="Buscar produto ou bipar código..." oninput="buscar()">
        </div>

        <div id="data-hora" style="font-size: 13px;"></div>
    </header>

    <main>
        <nav class="categorias-menu">
            <button class="btn-categoria" onclick="filtrar('Todos')">Tudo</button>
            <button class="btn-categoria" onclick="filtrar('Bebidas')">Bebidas</button>
            <button class="btn-categoria" onclick="filtrar('Doses')">Doses</button>
            <button class="btn-categoria" onclick="filtrar('Boticário')">Boticário</button>
        </nav>

        <section class="produtos-container">
            <h4 id="titulo-categoria" style="margin:0 0 15px 0; color:#777; text-transform: uppercase;">Todos os Produtos</h4>
            <div id="grid-produtos" class="grid-container"></div>
        </section>

        <aside class="painel-pedido">
            <div class="recibo">
                <div class="recibo-header"><strong>CUPOM NÃO FISCAL</strong></div>
                <ul id="lista-pedido"></ul>
                <div class="total-container">TOTAL R$ <span id="valor-total">0,00</span></div>
            </div>
            <button class="btn-finalizar" onclick="finalizarVenda()">FINALIZAR VENDA (F2)</button>
        </aside>
    </main>

    <script>
        // LISTA DE PRODUTOS (Será organizada alfabeticamente pelo código)
        let produtos = [
            { nome: "Cerveja Latão", preco: 7.50, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer.png" },
            { nome: "Água s/ Gás", preco: 3.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/water-glass.png" },
            { nome: "Dose de Pitu", preco: 4.00, cat: "Doses", img: "https://img.icons8.com/color/96/tequila-shot.png" },
            { nome: "Perfume Malbec", preco: 180.00, cat: "Boticário", img: "https://img.icons8.com/color/96/perfume-bottle.png" },
            { nome: "Cerveja Heineken", preco: 12.00, cat: "Bebidas", img: "https://img.icons8.com/color/96/beer-bottle.png" }
        ];

        let totalGeral = 0;
        let categoriaAtual = 'Todos';

        // 1. ORGANIZA EM ORDEM ALFABÉTICA
        function ordenarProdutos() {
            produtos.sort((a, b) => a.nome.localeCompare(b.nome));
        }

        function carregarProdutos(lista) {
            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = "";
            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="img-container"><img src="${p.img}" alt="${p.nome}"></div>
                        <span class="nome">${p.nome}</span>
                        <span class="preco">R$ ${p.preco.toFixed(2)}</span>
                        <button class="btn-add" onclick="adicionarItem('${p.nome}', ${p.preco})">Adicionar</button>
                    </div>
                `;
            });
        }

        // 2. BUSCA DINÂMICA
        function buscar() {
            const termo = document.getElementById('busca-produto').value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            carregarProdutos(filtrados);
        }

        function filtrar(categoria) {
            categoriaAtual = categoria;
            document.getElementById('titulo-categoria').innerText = categoria;
            const filtrados = categoria === 'Todos' ? produtos : produtos.filter(p => p.cat === categoria);
            carregarProdutos(filtrados);
        }

        function adicionarItem(nome, preco) {
            totalGeral += preco;
            document.getElementById('valor-total').innerText = totalGeral.toLocaleString('pt-br', {minimumFractionDigits: 2});
            const lista = document.getElementById('lista-pedido');
            const item = document.createElement('li');
            item.className = 'item-pedido';
            item.innerHTML = `<span>${nome}</span> <span>${preco.toFixed(2)}</span>`;
            lista.appendChild(item);
            lista.scrollTop = lista.scrollHeight;
        }

        function finalizarVenda() {
            if(totalGeral === 0) return;
            alert("Venda Finalizada: R$ " + totalGeral.toFixed(2));
            totalGeral = 0;
            document.getElementById('valor-total').innerText = "0,00";
            document.getElementById('lista-pedido').innerHTML = "";
            document.getElementById('busca-produto').value = "";
            carregarProdutos(produtos);
        }

        // Relógio
        setInterval(() => {
            document.getElementById('data-hora').innerText = new Date().toLocaleString('pt-br');
        }, 1000);

        // Inicialização
        ordenarProdutos();
        carregarProdutos(produtos);
    </script>
</body>
</html>
