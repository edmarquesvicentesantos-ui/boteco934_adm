<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTECO 934 - GESTÃO TOTAL</title>
    <style>
        :root { --primary: #1a252f; --success: #27ae60; --danger: #e74c3c; --accent: #f1c40f; --info: #3498db; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); flex-shrink: 0; }
        .nav-bar { background: #2c3e50; display: flex; flex-shrink: 0; }
        .nav-btn { flex: 1; padding: 12px 5px; border: none; background: #2c3e50; color: #bdc3c7; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .nav-btn.active { background: #1abc9c; color: white; border-bottom: 3px solid var(--accent); }
        main { flex: 1; overflow: hidden; display: flex; position: relative; }
        .tela { display: none; width: 100%; height: 100%; overflow: hidden; }
        .tela.ativa { display: flex; flex-direction: row; }
        
        /* COLUNAS VENDAS */
        .col-mesas { width: 130px; background: #fff; border-right: 2px solid #ddd; overflow-y: auto; padding: 10px; flex-shrink: 0; }
        .col-produtos { flex: 1; padding: 15px; overflow-y: auto; background: #fff; }
        .col-carrinho { width: 310px; background: #fff; border-left: 2px solid #ddd; display: flex; flex-direction: column; padding: 10px; flex-shrink: 0; }
        
        .mesa-btn { width: 100%; padding: 12px 5px; margin-bottom: 8px; border: 2px solid #ccc; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; font-size: 11px; background: #fff; }
        .mesa-btn.ocupada { background: #fff9db; border-color: var(--accent); color: #d35400; }
        .mesa-btn.selecionada { background: var(--primary); color: white; border-color: var(--primary); }
        
        .grid-prods { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 8px; }
        .card-p { border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; background: white; font-size: 11px; position: relative; }
        .badge-estoque { position: absolute; top: -5px; right: -5px; background: var(--primary); color: white; padding: 2px 6px; border-radius: 10px; font-size: 9px; }

        .sessao-interna { padding: 20px; width: 100%; overflow-y: auto; display: block !important; }
        .tarja-add { background: #ebf5fb; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 80px 80px auto; gap: 10px; align-items: flex-end; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-acao { background: var(--success); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<header><strong>BOTECO 934 - SISTEMA PRO</strong><div id="relogio">00:00:00</div></header>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="ver('vendas', this)">🛒 Vendas</button>
    <button class="nav-btn" onclick="ver('clientes', this)">👥 Clientes</button>
    <button class="nav-btn" onclick="ver('estoque', this)">📦 Estoque</button>
    <button class="nav-btn" onclick="ver('financas', this)">💰 Caixa</button>
</nav>

<main>
    <div id="vendas" class="tela ativa">
        <aside class="col-mesas" id="lista-mesas"></aside>
        <section class="col-produtos">
            <select id="sel-cliente-venda" style="border: 2px solid var(--info); font-weight: bold; margin-bottom: 10px;"></select>
            <div id="grid-produtos" class="grid-prods"></div>
        </section>
        <aside class="col-carrinho">
            <h3 id="mesa-titulo" style="text-align:center; border-bottom:2px solid var(--primary); padding-bottom:5px;">Mesa Livre</h3>
            <div id="c-itens" style="flex:1; overflow-y:auto; padding:5px;"></div>
            <div style="border-top:2px solid #eee; padding-top:10px;">
                <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;">TOTAL: R$ <span id="c-total">0.00</span></div>
                <select id="metodo-pagamento" style="margin: 10px 0;"><option value="DINHEIRO">💵 DINHEIRO</option><option value="PIX">⚡ PIX</option><option value="CARTÃO">💳 CARTÃO</option><option value="PENDURA">📝 FIADO</option></select>
                <button class="btn-acao" onclick="fecharConta()">FECHAR CONTA (BAIXA ESTOQUE)</button>
            </div>
        </aside>
    </div>

    <div id="clientes" class="tela">
        <div class="sessao-interna">
            <h2>👥 Clientes</h2>
            <div class="tarja-add" style="grid-template-columns: 1fr 1fr auto;">
                <div><label>Nome</label><input type="text" id="cli-nome"></div>
                <div><label>WhatsApp</label><input type="text" id="cli-fone"></div>
                <button onclick="addCliente()" class="btn-acao" style="background:var(--info)">ADD</button>
            </div>
            <table><thead><tr><th>Nome</th><th>Contato</th><th>Ação</th></tr></thead><tbody id="lista-cli-corpo"></tbody></table>
        </div>
    </div>

    <div id="estoque" class="tela">
        <div class="sessao-interna">
            <h2>📦 Gestão de Estoque (Entradas)</h2>
            <div class="tarja-add">
                <div><label>Produto</label><input type="text" id="est-nome"></div>
                <div><label>Preço Venda</label><input type="number" id="est-preco" step="0.01"></div>
                <div><label>Qtd Inicial</label><input type="number" id="est-qtd"></div>
                <div><label>Cód/EAN</label><input type="text" id="est-ean"></div>
                <button onclick="salvarNoEstoque()" class="btn-acao">SALVAR</button>
            </div>
            <table><thead><tr><th>Cód</th><th>Produto</th><th>Preço</th><th>Qtd Atual</th><th>Ação</th></tr></thead><tbody id="lista-est-corpo"></tbody></table>
        </div>
    </div>

    <div id="financas" class="tela"><div class="sessao-interna"><h2>💰 Caixa</h2><div id="caixa-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;"></div></div></div>
</main>

<script>
    // QUANTIDADE ADICIONADA AO OBJETO
    let db_estoque = [
        {ean:"1", nome:"Heineken LN", preco:16.0, qtd: 24}, 
        {ean:"2", nome:"Skol Lata", preco:6.5, qtd: 50}
    ];
    let db_clientes = [{nome: "Balcão", fone: "-"}];
    let mesas = Array.from({length: 12}, (_, i) => ({ id: i + 1, consumo: {}, total: 0, status: 'livre' }));
    let financeiro = { DINHEIRO: 0, PIX: 0, CARTÃO: 0, PENDURA: 0 };
    let mesaAtiva = null;

    function ver(id, el) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('ativa');
        if(el) el.classList.add('active');
        if(id === 'estoque') renderEstoque();
        if(id === 'financas') atualizarFinanceiro();
        if(id === 'vendas') { renderMesas(); renderProdutos(); renderSelects(); }
    }

    // SALVAR COM QUANTIDADE
    function salvarNoEstoque() {
        const n = document.getElementById('est-nome').value;
        const p = parseFloat(document.getElementById('est-preco').value);
        const q = parseInt(document.getElementById('est-qtd').value) || 0;
        const e = document.getElementById('est-ean').value || (db_estoque.length + 1);
        if(!n || isNaN(p)) return alert("Preencha Nome e Preço!");
        db_estoque.push({ean: e.toString(), nome: n, preco: p, qtd: q});
        document.getElementById('est-nome').value=''; document.getElementById('est-preco').value=''; document.getElementById('est-qtd').value='';
        renderEstoque(); renderProdutos();
    }

    function renderEstoque() {
        document.getElementById('lista-est-corpo').innerHTML = db_estoque.map((p, i) => `
            <tr><td>${p.ean}</td><td><b>${p.nome}</b></td><td>R$ ${p.preco.toFixed(2)}</td>
            <td style="color:${p.qtd < 5 ? 'red' : 'black'}"><b>${p.qtd} un</b></td>
            <td><button onclick="db_estoque.splice(${i},1);renderEstoque();renderProdutos();">🗑️</button></td></tr>`).join('');
    }

    function renderProdutos() {
        document.getElementById('grid-produtos').innerHTML = db_estoque.map(p => `
            <div class="card-p" onclick="lancar('${p.ean}')">
                <span class="badge-estoque">${p.qtd}</span>
                <b>${p.nome}</b><br><span style="color:var(--success)">R$ ${p.preco.toFixed(2)}</span>
            </div>`).join('');
    }

    function lancar(ean) {
        const cli = document.getElementById('sel-cliente-venda').value;
        if(!mesaAtiva || !cli) return alert("Selecione Mesa e Cliente!");
        
        const p = db_estoque.find(x => x.ean === ean);
        if(p.qtd <= 0) return alert("Produto ESGOTADO no estoque!");

        const m = mesas.find(x => x.id === mesaAtiva);
        if(!m.consumo[cli]) m.consumo[cli] = [];
        
        m.consumo[cli].push({...p}); // Lança uma cópia do produto
        m.total += p.preco;
        m.status = 'ocupada';
        attCar(); renderMesas();
    }

    // BAIXA NO ESTOQUE AO FECHAR CONTA
    function fecharConta() {
        const m = mesas.find(x => x.id === mesaAtiva);
        if(!m || m.total === 0) return alert("Mesa vazia!");
        
        // Percorre o consumo da mesa e retira do estoque real
        for(let cliente in m.consumo) {
            m.consumo[cliente].forEach(itemVendido => {
                const produtoNoEstoque = db_estoque.find(prod => prod.ean === itemVendido.ean);
                if(produtoNoEstoque) {
                    produtoNoEstoque.qtd -= 1; // Deduz 1 unidade
                }
            });
        }

        const met = document.getElementById('metodo-pagamento').value;
        financeiro[met] += m.total;
        m.consumo = {}; m.total = 0; m.status = 'livre'; mesaAtiva = null;
        
        renderMesas(); attCar(); renderProdutos();
        alert("✅ Conta Fechada e Estoque Atualizado!");
    }

    // CLIENTES
    function addCliente() {
        const n = document.getElementById('cli-nome').value;
        const f = document.getElementById('cli-fone').value || "-";
        if(n) { db_clientes.push({nome: n, fone: f}); document.getElementById('cli-nome').value=''; renderClientes(); renderSelects(); }
    }
    function renderClientes() {
        document.getElementById('lista-cli-corpo').innerHTML = db_clientes.map((c, i) => `<tr><td><b>${c.nome}</b></td><td>${c.fone}</td><td><button onclick="db_clientes.splice(${i},1);renderClientes();renderSelects();">❌</button></td></tr>`).join('');
    }
    function renderSelects() {
        document.getElementById('sel-cliente-venda').innerHTML = '<option value="">-- QUEM ESTÁ PEDINDO? --</option>' + db_clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
    }
    function atualizarFinanceiro() {
        document.getElementById('caixa-grid').innerHTML = Object.keys(financeiro).map(tipo => `
            <div style="background:white; padding:15px; border-radius:10px; text-align:center;">
                <small>${tipo}</small><br><b style="color:var(--success)">R$ ${financeiro[tipo].toFixed(2)}</b>
            </div>`).join('');
    }

    function attCar() {
        if(!mesaAtiva) return;
        const m = mesas.find(x => x.id === mesaAtiva);
        document.getElementById('c-itens').innerHTML = Object.keys(m.consumo).map(c => `<div style="font-size:11px; margin-bottom:4px; padding:5px; background:#f0f0f0; border-left:3px solid var(--info)"><b>${c}:</b> ${m.consumo[c].length} itens</div>`).join('');
        document.getElementById('c-total').innerText = m.total.toFixed(2);
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = () => { renderMesas(); renderProdutos(); renderSelects(); renderEstoque(); };
</script>
</body>
</html>
