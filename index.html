<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Sistema Integrado</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --gold: #d4af37; --orange: #ff9800; --green: #00ff88; --border: #2a2a2a; --gray: #888;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 2px; }

        /* Abas Navegação */
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); color: var(--gray); cursor: pointer; font-weight: bold; border-radius: 4px; }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Cards e Layout */
        .box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Estilo PDV / Código de Barras */
        .scan-area { background: #000; border: 1px dashed var(--gold); padding: 20px; text-align: center; margin-bottom: 15px; }
        .scan-area input { background: transparent; border: none; color: var(--gold); font-size: 24px; text-align: center; width: 100%; outline: none; font-family: monospace; }

        /* Inputs */
        label { display: block; font-size: 11px; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; color: var(--gold); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; }

        /* Botões */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-green { background: var(--green); color: #000; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>BOTECO 934 - PDV & GESTÃO</h1>
    <div id="relogio" style="color: var(--gold); font-weight: bold;"></div>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab('vendas')">Vendas/Estoque</button>
    <button class="tab-btn" onclick="openTab('mesas')">Mesas</button>
    <button class="tab-btn" onclick="openTab('pendura')">Pendura</button>
    <button class="tab-btn" onclick="openTab('dash')">Dashboard</button>
</div>

<div id="vendas" class="content-section active">
    <div class="scan-area">
        <label>Aguardando Leitura de Código de Barras (EAN-13)</label>
        <input type="text" id="scan_ean" placeholder="|||||||||||||||||||||||||" onchange="processarLeitura()">
    </div>

    <div class="grid-2">
        <div class="box">
            <h3>Novo Cadastro</h3>
            <label>Nome do Produto</label>
            <input type="text" id="p_nome">
            <div class="grid-2">
                <div><label>Custo Unit.</label><input type="number" id="p_custo"></div>
                <div><label>Preço Praticado</label><input type="number" id="p_venda"></div>
            </div>
            <button class="btn btn-gold" onclick="salvarProduto()">Salvar Produto</button>
        </div>

        <div class="box">
            <h3>Lista (Ordem Alfabética)</h3>
            <div style="max-height: 250px; overflow-y: auto;">
                <table>
                    <thead><tr><th>PRODUTO</th><th>VENDA</th></tr></thead>
                    <tbody id="lista_estoque"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="mesas" class="content-section">
    <div class="grid-2" id="grid_mesas">
        </div>
</div>

<div id="pendura" class="content-section">
    <div class="box">
        <h3>Controle de Fiado</h3>
        <div class="grid-2">
            <input type="text" id="c_nome" placeholder="Nome do Cliente">
            <input type="text" id="c_whats" placeholder="WhatsApp (DDD)">
        </div>
        <button class="btn btn-gold" onclick="salvarCliente()">Cadastrar Cliente</button>
    </div>
    <div class="box">
        <table>
            <thead><tr><th>NOME</th><th>DÉBITO</th><th>AÇÃO</th></tr></thead>
            <tbody id="lista_clientes"></tbody>
        </table>
    </div>
</div>

<div id="dash" class="content-section">
    <div class="grid-2">
        <div class="box" style="border-left: 5px solid var(--green);">
            <label>Lucro Total Estimado</label>
            <h2 id="d_lucro_total" style="color: var(--green);">R$ 0,00</h2>
        </div>
        <div class="box" style="border-left: 5px solid var(--orange);">
            <label>Total a Receber (Pendura)</label>
            <h2 id="d_pendura_total" style="color: var(--orange);">R$ 0,00</h2>
        </div>
    </div>
</div>

<script>
    let produtos = [];
    let clientes = [];
    let vendas_dia = 0;

    function openTab(tabName) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function salvarProduto() {
        const p = {
            ean: document.getElementById('scan_ean').value || 'S/C',
            nome: document.getElementById('p_nome').value.toUpperCase(),
            custo: parseFloat(document.getElementById('p_custo').value) || 0,
            venda: parseFloat(document.getElementById('p_venda').value) || 0
        };
        if(!p.nome) return;
        produtos.push(p);
        produtos.sort((a,b) => a.nome.localeCompare(b.nome));
        renderEstoque();
        limparCampos();
    }

    function renderEstoque() {
        const html = produtos.map(p => `<tr><td>${p.nome}</td><td>R$ ${p.venda.toFixed(2)}</td></tr>`).join('');
        document.getElementById('lista_estoque').innerHTML = html;
    }

    function salvarCliente() {
        const c = { 
            nome: document.getElementById('c_nome').value.toUpperCase(), 
            whats: document.getElementById('c_whats').value, 
            saldo: 0 
        };
        clientes.push(c);
        renderClientes();
    }

    function renderClientes() {
        const html = clientes.map((c, i) => `
            <tr>
                <td>${c.nome}</td>
                <td style="color:var(--orange)">R$ ${c.saldo.toFixed(2)}</td>
                <td><button onclick="cobrar(${i})" style="background:none; border:1px solid var(--green); color:var(--green); cursor:pointer;">Zap</button></td>
            </tr>
        `).join('');
        document.getElementById('lista_clientes').innerHTML = html;
        atualizarDash();
    }

    function atualizarDash() {
        const totalP = clientes.reduce((acc, c) => acc + c.saldo, 0);
        document.getElementById('d_pendura_total').innerText = `R$ ${totalP.toFixed(2)}`;
    }

    function cobrar(idx) {
        const c = clientes[idx];
        const msg = encodeURIComponent(`Olá ${c.nome}, o Boteco 934 passando para lembrar do seu saldo de R$ ${c.saldo.toFixed(2)}.`);
        window.open(`https://wa.me/55${c.whats}?text=${msg}`);
    }

    function limparCampos() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('scan_ean').focus();
    }

    // Relógio
    setInterval(() => {
        document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Inicializar Mesas
    for(let i=1; i<=8; i++) {
        document.getElementById('grid_mesas').innerHTML += `
            <div class="box" style="text-align:center">
                <h4 style="color:var(--gold)">MESA 0${i}</h4>
                <p>Status: Livre</p>
                <button class="btn btn-gold">Abrir</button>
            </div>
        `;
    }
</script>
</body>
</html>
