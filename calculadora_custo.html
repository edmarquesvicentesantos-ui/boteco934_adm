<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIX INTELIGENTE | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .header { text-align: center; color: var(--gold); margin-bottom: 20px; font-weight: bold; }
        
        .card { background: var(--glass); border: 1px solid rgba(255,215,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        input { width: 100%; background: #000; border: 1px solid var(--gold); padding: 12px; color: white; border-radius: 8px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }

        /* Painel de Resultados */
        .painel-lucro { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { padding: 15px; border-radius: 12px; text-align: center; }
        .box-natural { border: 1px solid #94a3b8; background: rgba(148, 163, 184, 0.1); }
        .box-gelada { border: 1px solid var(--blue); background: rgba(52, 152, 219, 0.1); }
        
        .val { display: block; font-size: 20px; font-weight: bold; margin: 5px 0; }
        .margem { font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 5px; display: inline-block; }
        .m-natural { background: #475569; color: white; }
        .m-gelada { background: var(--green); color: black; }

        .btn-voltar { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-chart-line"></i> MIX INTELIGENTE 934</div>

    <div class="card">
        <label>CUSTO DO FARDO/CAIXA (R$)</label>
        <input type="number" id="custoFardo" placeholder="Ex: 46.12" oninput="calcular()">

        <label>QUANTIDADE DE UNIDADES NO FARDO</label>
        <input type="number" id="qtdUnid" placeholder="Ex: 12" oninput="calcular()">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>PREÇO VENDA (NATURAL)</label>
                <input type="number" id="vendaNat" placeholder="Ex: 4.50" oninput="calcular()">
            </div>
            <div>
                <label>PREÇO VENDA (GELADA)</label>
                <input type="number" id="vendaGel" placeholder="Ex: 5.50" oninput="calcular()">
            </div>
        </div>
    </div>

    <div class="painel-lucro">
        <div class="box box-natural">
            <small>LUCRO UN. (NATURAL)</small>
            <span id="lucroNat" class="val" style="color:#94a3b8">R$ 0,00</span>
            <span id="margemNat" class="margem m-natural">0%</span>
        </div>

        <div class="box box-gelada">
            <small>LUCRO UN. (GELADA)</small>
            <span id="lucroGel" class="val" style="color:var(--green)">R$ 0,00</span>
            <span id="margemGel" class="margem m-gelada">0%</span>
        </div>
    </div>

    <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> VOLTAR AO MENU</a>
</div>

<script>
    function calcular() {
        const custoFardo = parseFloat(document.getElementById('custoFardo').value);
        const qtdUnid = parseFloat(document.getElementById('qtdUnid').value);
        const vendaNat = parseFloat(document.getElementById('vendaNat').value);
        const vendaGel = parseFloat(document.getElementById('vendaGel').value);

        if (custoFardo > 0 && qtdUnid > 0) {
            const custoUnid = custoFardo / qtdUnid;

            // Cálculo Natural
            if (vendaNat > 0) {
                const lNat = vendaNat - custoUnid;
                const mNat = (lNat / vendaNat) * 100;
                document.getElementById('lucroNat').innerText = "R$ " + lNat.toFixed(2).replace('.', ',');
                document.getElementById('margemNat').innerText = mNat.toFixed(1) + "% MARGEM";
            }

            // Cálculo Gelada
            if (vendaGel > 0) {
                const lGel = vendaGel - custoUnid;
                const mGel = (lGel / vendaGel) * 100;
                document.getElementById('lucroGel').innerText = "R$ " + lGel.toFixed(2).replace('.', ',');
                document.getElementById('margemGel').innerText = mGel.toFixed(1) + "% MARGEM";
            }
        }
    }
</script>

</body>
</html>
