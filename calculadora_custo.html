<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA DOS DEUSES | BOTECO 934</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #0b0f19; --glass: rgba(255, 255, 255, 0.05); --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
        
        /* Layout Lado a Lado */
        .painel-duplo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 900px; margin: auto; }
        
        .card { background: var(--glass); border: 1px solid rgba(255,215,0,0.2); border-radius: 15px; padding: 15px; backdrop-filter: blur(10px); }
        .card.destilados { border-left: 4px solid var(--gold); }
        .card.diversos { border-left: 4px solid var(--green); }
        
        h3 { font-size: 14px; margin-top: 0; color: var(--gold); text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .campo { margin-bottom: 10px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 3px; }
        input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 10px; color: white; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }

        .res-card { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 10px; margin-top: 15px; text-align: center; }
        .res-valor { display: block; font-size: 22px; font-weight: bold; color: var(--green); }
        .sugestao { display: block; font-size: 10px; color: var(--gold); margin-top: 5px; }

        .btn-voltar { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; }
        
        @media (max-width: 600px) { .painel-duplo { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-calculator"></i> PAINEL DE CUSTOS BOTECO 934
</div>

<div class="painel-duplo">
    
    <div class="card destilados">
        <h3><i class="fas fa-wine-bottle"></i> DESTILADOS</h3>
        <div class="campo">
            <label>CUSTO DA GARRAFA (R$)</label>
            <input type="number" id="custoA" placeholder="Ex: 100.00" oninput="calcA()">
        </div>
        <div class="campo">
            <label>TAMANHO TOTAL (ML)</label>
            <input type="number" id="totalA" placeholder="Ex: 1000" oninput="calcA()">
        </div>
        <div class="campo">
            <label>DOSE A SERVIR (ML)</label>
            <input type="number" id="doseA" placeholder="Ex: 50" oninput="calcA()">
        </div>
        <div class="res-card">
            <small>CUSTO POR DOSE</small>
            <span id="resA" class="res-valor">R$ 0,00</span>
            <span id="sugA" class="sugestao"></span>
        </div>
    </div>

    <div class="card diversos">
        <h3><i class="fas fa-boxes"></i> DIVERSOS</h3>
        <div class="campo">
            <label>CUSTO DO TOTAL (R$)</label>
            <input type="number" id="custoB" placeholder="Ex: 46.12" oninput="calcB()">
        </div>
        <div class="campo">
            <label>QUANTIDADE NO TOTAL</label>
            <input type="number" id="totalB" placeholder="Ex: 12 (latinhas) ou 1000 (g)" oninput="calcB()">
        </div>
        <div class="campo">
            <label>UNIDADE/PESO DA VENDA</label>
            <input type="number" id="doseB" placeholder="Ex: 1 (unid) ou 200 (g)" oninput="calcB()">
        </div>
        <div class="res-card">
            <small>CUSTO POR UNIDADE</small>
            <span id="resB" class="res-valor">R$ 0,00</span>
            <span id="sugB" class="sugestao"></span>
        </div>
    </div>

</div>

<a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> VOLTAR AO MENU PRINCIPAL</a>

<script>
    function calcA() {
        const custo = parseFloat(document.getElementById('custoA').value);
        const total = parseFloat(document.getElementById('totalA').value);
        const dose = parseFloat(document.getElementById('doseA').value);
        if (custo && total && dose) {
            const final = (custo / total) * dose;
            document.getElementById('resA').innerText = "R$ " + final.toFixed(2).replace('.', ',');
            document.getElementById('sugA').innerText = "VENDA SUGERIDA: R$ " + (final * 2).toFixed(2);
        }
    }

    function calcB() {
        const custo = parseFloat(document.getElementById('custoB').value);
        const total = parseFloat(document.getElementById('totalB').value);
        const dose = parseFloat(document.getElementById('doseB').value);
        if (custo && total && dose) {
            const final = (custo / total) * dose;
            document.getElementById('resB').innerText = "R$ " + final.toFixed(2).replace('.', ',');
            document.getElementById('sugB').innerText = "VENDA SUGERIDA: R$ " + (final * 2).toFixed(2);
        }
    }
</script>

</body>
</html>
